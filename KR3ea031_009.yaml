body:
  text: 卷第九經脈之二經脈正別平按此篇見靈樞卷三第十一經別篇又見甲乙經卷二第一下篇黃帝問於岐伯曰余聞人之合於天道也內有五臟以應五音五色五時五味五位外有六腑以應六律六律建主陽天地變化之理謂之天道人從天生故人合天道天道大數有二謂五與六故人亦應之內有五臟以應音色時味位等主陰也外有六腑以應六律主陽也建立也平按天道甲乙經作天地建主陽靈樞作建陰陽甲乙經作主持陰陽諸經而合之十二月十二辰十二節諸經謂人之十二經脈也與月辰節水時等諸十二數合也十二節謂四時八節也又十二月各有節也十二經水十二時十二經脈者此五臟六腑之所以應天道也夫十二經脈者人之所以生十二經脈乃是五臟六腑經隧故遍勸通之舉其八德以勸通之人之受身時一月而膏二月而脈為形之先故所以生也病之所以成邪客孫脈入經通於腑臟成病故曰所以也人之所以治行諸血氣營於陰陽濡於筋骨利諸關節理身者謂經脈病之所以起經脈是動所生故病起也學之所以始將學長生之始須行導引調於經脈也工之所止也欲行十全之道濟人可留心調於經脈止留也粗之所易愚人以經脈為易同楚人之賤寶也工之所難也智者以經脈為妙若和璧之難知也平按工靈樞甲乙經均作上請問其離合出入奈何經脈之別曰離與出復還本經曰合與入也廣陳其理請解其所由故曰奈何也岐伯稽首再拜答曰明乎哉問也此粗之所過工之所息也請卒言之近學淺知謂之粗也深求遠達謂之工也工者宅心經脈之道以十全為意粗者志存名利之弊假媒寄過而已息留也為益之大故請卒言之平按工靈樞甲乙經作上息卒二字甲乙經均作悉足太陽之正別入於膕中其一道下尻五寸別入於肛屬於膀胱之腎循膂當心入散直者從膂上出於項復屬於太陽此為一經十二大經復有正別正謂六陽大經別行還閣府經別謂六陰大經別行合於府經不還本經故名為別足少陰足厥陰雖稱為正生別經不還本經也唯此二陰為正余陰皆別或以諸陰為正者黃帝以後撰集之人以二本莫定故前後時有稱或有言一曰皆是不定之説足太陽正者調正經也別者大經下行至足小指外側分出二道一道上行至於膕中一道上行至於尻臀下入於肛肛謂白䐈亦名廣腸次屬膀胱上散之腎循膂上行當心入內而散直者謂循膂上行至項屬於太陽此為一正經之別平按膀胱下靈樞甲乙經有散字復屬於太陽太陽二字袁刻誤作大腸注唯此二陰別本無唯字黃帝上別本有乃字足少陰之正至膕中別走太陽而合上至腎當十四椎出屬帶脈直者系舌本復出於項合於太陽此為一合或以諸陰之別皆為正足三陽大經從頭至足其正別則從足向頭其別皆從足指大經終處別而上行並至其出處而論屬合也足三陰大經從足至胸其正別則從足上行向頭亦至其出處而言屬合足少陰正上行至膕別走太陽合而上行至腎出屬帶脈起季肋端故少陰當十四椎出屬帶脈也直而不屬帶脈者上行至項復合太陽則此少陰二合太陽此太陽少陰表裡以為一合也平按自足少陰至出屬帶脈二十五字又見本書卷十帶脈篇椎靈樞作顀或作成甲乙無或以諸陰之別皆為正九字注云九墟云或以諸陰之別者皆為正也又本注上行向頭向字袁刻作項足少陽之正繞髀入毛際合於厥陰別者入季肋之間循胸裡屬膽散之上肝貫心上挾咽出頤頷中散於面系目系合少陽於外眥足少陽正上行至髀繞髀入陰毛中厥陰大經環陰器故即與合也合厥陰外別循胸裡屬膽上肝貫心上行至面還合本經平按肋靈樞甲乙經作脅上肝甲乙經作肝上足厥陰之正別跗上上至毛際入合於少陽與別俱行此為二合足厥陰正與大經並行至跗上上行陰毛少陽行於此故與之合已並行向頭此足少陽厥陰表裡以為二合平按跗正統本甲乙經作膝足陽明之正上至髀入於腹裡屬於胃散之脾上通於心上循咽出於口上頞䪼還系目系合於陽明足陽明正上行至髀入腹屬胃之脾通心上行至目系還合本經也平按上至髀髀字正統本甲乙經作踝足太陰之別上至髀合於陽明與別俱行上絡於咽貫舌本此為三合足太陰別上行至髀與陽明合併而行上貫於舌中故舌下中脈者足太陰也此足陽明太陰表裡以為三合也平按足太陰之別別字靈樞作正甲乙經作正則別三字靈樞上絡作上結舌本作舌中手太陽之正指地別於肩解入掖走心系小腸地下也手太陽正從手至肩下行走心系小腸為指地也小腸即太陽也手之六經唯此一經下行余並上行向頭也手少陰之別入於泉掖兩筋之間屬於心上走喉嚨出於面合目內眥此為四合手少陰別上行入於泉掖入屬心上行出面合目內眥內眥即手太陽也此手太陽少陰表裡以為四合平按靈樞甲乙經手少陰之別作手少陰之正別泉掖均作淵腋袁刻改泉作淵查唐人諱淵為泉宜仍依原抄作泉以存真相下同不再舉屬於心甲乙經作屬心主手少陽之正指天別於巔入於缺盆下走三焦散於胸中天上也手少陽之正提上巔為指天也下走三焦即手少陽上散胸中也手心主之別下泉掖三寸入於胸中別屬三焦上循喉嚨出耳後合少陽完骨之下此為五合手心主別從手上行至掖下掖三寸至於泉掖入於胸中屬三焦已上行出耳後寬骨下合手少陽此手少陽心主表裡以為五合平按靈樞甲乙經手心主之別作之正別上循作出循注寬骨據經文應作完骨手陽明之正至膺乳別上於肩髃入柱骨之下走大腸屬於肺上循喉嚨出缺盆合於陽明手陽明正從手上行注於膺乳上行至肩髃柱骨之下下走大腸上屬於肺上出缺盆之處合大經也平按至膺乳靈樞作從手循膺乳甲乙經同手太陰之別入泉掖少陰之前入走肺散之大腸上出缺盆循喉嚨復合陽明此為六合手太陰別從手上行至掖下掖至泉掖至手少陰前入走肺之於大腸上出缺盆循喉嚨合於陽明至於大腸以為六合至喉嚨更合故云復也此陽明太陰表裡以為六合此十二經脈正別行處與十二大經大有不同學者多不在意所以診病生處不能細知也平按靈樞甲乙經之別作之正別散之大腸靈樞作散之太陽正統本甲乙經作散上大腸脈行同異平按此篇自篇首至因天之序見靈樞卷十第七十一邪客篇自手太陰之脈至逆數之曲折也見甲乙經卷三第二十四又自心主之脈至內絡心肺見甲乙經卷三第二十五自黃帝曰手少陰至因天之敘見甲乙經卷三第二十六自黃帝曰經脈十二至末見靈樞卷九第六十二動腧篇又見甲乙經卷二第一下篇黃帝問於岐伯曰脈之屈折出入之處焉至而出焉至而止焉至而徐焉至而疾焉至而入六腑之輸於身者余願盡聞其序舉其五義問五臟脈行處並問身之六腑之輸平按其序靈樞作少序別離之處離而入陰別而行陽皆何道從行願聞其方岐伯對曰窘乎哉問明乎哉道問陰陽二脈離合之處也平按靈樞別而行陽作別而入陽皆何道從行作此何道而從行窘乎哉問二句作帝之所問針道畢矣二句黃帝曰願卒聞之岐伯曰手太陰之脈出於大指之端內屈循白肉至本節之後太泉留以淡以外屈上於本節手太陰脈從臟行至腕後一支上大指次指之端變為手陽明脈其本從腕後上魚循魚際出大指之端即指端內屈回循大指白肉至本節後太泉穴處停留成淡而動然後外出上於本節也淡從濫反平按內屈甲乙經作內側循白肉靈樞甲乙經均作循白肉際太泉均作太淵唐人諱淵作泉説見前留甲乙經作溜上於本節甲乙作本指以下注一支袁刻誤作一丈本節後袁刻脫後字以下內屈與手少陰心主諸絡會於魚際數脈並注上本節已方從本節以下內屈與手少陰心主諸絡會於魚際然後則與數絡共為流注也平按與手少陰心主諸絡靈樞甲乙經作與諸陰絡又注與手少陰與字袁刻誤作於其氣滑利伏行壅骨之下外屈出於寸口而行上至於肘內廉入於大筋之下內屈上行臑陰入掖下內屈走肺壅骨謂手魚骨也臑陰謂手三陰脈行於臑中故曰臑陰其脈元出中焦以是肺脈上屬於肺令從外還俱至於肺故手太陰經上下常通是動所生之病療此一經也平按外屈下甲乙經無出字注云一本下有出字此順行逆數之屈折也手太陰一經之中上下常行名之為順數其屈折從手向身故曰逆數也心主之脈出於中指之端內屈循中指內廉以上留於掌中伏行兩骨之間外屈其兩筋之間骨肉之際其氣滑利上行三寸外屈行兩筋之間上至肘內廉入於小筋之下兩骨之會上入於胸中內絡心肺心主之脈從心包起出於中指之端即中指端內屈回循中指內廉上入胸中內絡心肺心主一經上下恆通是動所生但療此經舉手太陰心主二經余之十經順行逆數例皆同也營衛之氣一日一夜行二十八脈五十周如環無端與正經異也平按心主上甲乙經有手字外屈其靈樞其作出甲乙經無其字上行三寸靈樞甲乙經作上二寸外屈行靈樞作外屈出行甲乙經注云一本有出字兩骨之會靈樞作留兩骨之會甲乙經注云一本有留字內絡心肺靈樞作內絡於心脈甲乙經作內絡心包又注與正經異袁刻與作於正作五黃帝曰手少陰之脈獨無輸何也岐伯曰少陰心脈也心者五臟六腑之大主也精神之舍也其臟堅固邪弗能客也客之則心傷心傷則神去神去則死矣故諸邪之在於心者皆在於心之包絡包絡者心主之脈也故獨無輸焉黃帝曰少陰獨無輸者不病乎岐伯曰其外經病而臟不病故獨取其經於掌後兌骨之端其臟堅固者如五臟中心有堅脆心脆者則善病消疸以不堅故善病消疸即是受邪故知不受邪者不得多受外邪至於飲食資心以致病者不得無邪所以少陰心之主所生病皆有療也又明堂手少陰亦有五輸主病不得無輸即其信也兌骨之端手少陰輸也平按輸靈樞作腧甲乙經作俞大主也下甲乙經有為帝主三字客靈樞甲乙經作容正統本甲乙經作客少陰獨無輸甲乙經作少陰脈獨無俞不病乎甲乙經作心不病乎兌骨靈樞作鋭骨其餘脈出入屈折其行之徐疾皆如手太陰心主之脈行也余謂十種經脈者也平按屈折甲乙經作曲折其行之徐疾甲乙經無此句手太陰靈樞作手少陰甲乙經同注云少陰少字宜作太字銅人經作厥字正統本甲乙經亦作厥故本輸者皆因其氣之實虛疾徐以取之是謂因沖而瀉因衰而補如是者邪氣得去真氣堅固是謂因天之序因沖沖盛也真氣和氣也是謂因天四時之序得邪去真存也黃帝曰經脈十二而手太陰足少陰陽明獨動不休何也總問三脈常動之由平按太陰下甲乙經有之脈二字無足少陰陽明五字岐伯曰足陽明胃脈也胃者五臟六腑之海也谷入於胃變為糟粕津液宗氣分為三隧泌津液注之於脈化而為血以營四末內注五臟六腑以應刻數名為營氣其出悍氣慓疾先行四末分肉皮膚之間晝夜不休者名為衛氣營出中焦衛出上焦也大氣搏而不行名為宗氣積於胸中命曰氣海出於肺循喉嚨呼則出吸則入也故胃為五臟六腑之海也平按足陽明靈樞作是明二字其清氣上注於肺氣從太陰而行之胃之清氣上注於肺從手太陰一經之脈上下而行平按肺下靈樞甲乙經重肺字其行也以息往來其手太陰脈上下行也要由胸中氣海之氣出肺循喉嚨呼出吸入以息往來故手太陰脈得上下行故人一呼脈再動一吸脈亦再動呼吸不已故動而不止脈手太陰脈也人受穀氣積於胸中呼則推於手太陰以為二動吸則引於手太陰復為二動命為氣海呼吸不已故手太陰動不止也黃帝曰氣之過於寸口也上焉息下焉伏何道從還不知其極氣謂手太陰脈氣從手寸口上入肺而息從肺下至手指而屈伏屈也肺氣循手太陰脈道下手至手指端還肺之時為從本脈而還為別有脈道還也吾不知端極之也平按上焉息下焉伏靈樞作上十焉息下八焉伏甲乙經作上出焉息下出焉伏岐伯曰氣之離於臟也卒如弓弩之發如水之下崖上於魚以反衰其餘衰散以逆上故其行微氣手太陰脈氣也手太陰脈氣從胃中焦上入於肺下腋向手上魚至少商之時以乘臟腑盛氣如弓弩之發機比湍流之下岸言其盛也從少商返回逆上向肺雖從本脈而還以去臟腑漸遠其臟腑餘氣衰散故其行遲微也平按卒如靈樞甲乙經作卒然如三字袁刻作卒然於三字崖靈樞作岸如水之下崖甲乙經作如水岸之下其餘衰散靈樞甲乙經作其餘氣衰散黃帝曰足之陽明何因而動十二經脈此皆有動余之九經動有休時唯此三經常動不息太陰常動已具前章故次問陽明常動之義故曰何因動也平按何因甲乙經作因何岐伯曰胃氣上注於肺問曰十二經脈別走皆從臟之陰絡別走之陽亦從腑之陽絡別走之陰此之別走乃別胃腑盛氣還走胃脈陽明經者何也答曰胃者水穀之海五臟六腑皆悉稟之別起一道之氣合於陽明故陽明得在經脈中長動在結喉兩箱名曰人迎五臟六腑脈氣並出其中所以別走與余不同平按肺甲乙經作胃其悍氣上衝頭者循咽上走空竅悍氣衝時循咽上走七竅使七竅通明也悍音汗循眼系入絡腦出頷下客主人循牙車合陽明復循眼系絡腦兩箱出於頷下頷謂牙車骨屬顱骨之下也平按頷靈樞作顑並下人迎此胃氣別走於陽明者也足陽明經及別走氣二脈並下以為人迎也故胃彆氣走陽明也平按甲乙經無別字故陰陽上下其動也若一陰謂寸口手太陰也陽謂人迎足陽明也上謂人迎下謂寸口有其二義人迎是陽所以居上也寸口是陰所以居下也又人迎在頸所以為上寸口在手所以為下人迎寸口之動上下相應俱來譬之引繩故若一也所論人迎寸口唯出黃帝正經計此之外不可更有異端近相傳者直以兩手左右為人迎寸口是則兩手相望以為上下竟無正經可憑恐誤物深也故陽病而陽脈小者為逆陰病而陰脈大者為逆陽大陰小乃是陰陽之性陽病人迎大小俱病而大者為順小者為逆陰病寸口大小俱病而小者為順大者為逆順則易療逆則為難也故陰陽俱靜與其動若引繩相頓者病也謂人迎寸口之脈乍靜乍躁若引繩相頓乍動乍靜者病也平按陰陽俱靜與其動靈樞作陰陽俱靜俱動甲乙經作陰陽俱盛與其俱動又靈樞甲乙經頓均作傾黃帝曰足少陰何因而動已言陽明常動於前次論足少陰脈動不休也平按何因甲乙經作因何岐伯曰衝脈者十二經之海也與少陰之大絡起於腎下出於氣街循陰股內廉邪入膕中循脛骨內廉並少陰之經下入內踝之後入足下其別者邪入踝出屬跗上入大指之間注諸絡以溫足脛此脈之常動者也少陰正經從足心上內踝之後上行循脛向腎衝脈起於腎下與少陰大絡下行出氣街循脛入內踝後下入足下按逆順肥瘦少陰獨下中雲注少陰大絡若爾則衝脈共少陰常動也若取與少陰大絡俱下則是衝脈常動少陰不能動也平按甲乙經邪作斜脛骨作胻骨足脛作足跗注少陰正經袁刻經作陰黃帝曰營衛之行也上下相貫如環之毋端今有其卒然遇邪氣及逢大寒手足懈惰其脈陰陽之道相輸之會行相失也氣何由得還營行手太陰下至手大指次指之端回為手陽明上行至頭下足陽明如此十二經脈陰陽相貫如環無端也卒有邪氣及寒客於四肢陰陽相輸之道不通何由還也平按營衛甲乙經作衛氣懈惰作不隨得還得字靈樞甲乙經均無岐伯曰夫四末陰陽之會者此氣之大絡也四街者氣之徑也故絡絶則經通四末解則氣從合相輸如環四末謂四肢身之末也四街謂胸腹頭胻脈氣道也邪氣大寒客於四末先客絡脈絡脈雖壅內經尚通故氣相輸如環寒邪解已復得通也平按氣之徑靈樞作氣之徑路甲乙作氣之經注經一作徑正統本甲乙經作徑相輸袁刻作相輔注同黃帝曰善此所謂如環之毋端莫知其紀終而復始之謂也述其所解經絡別異平按此篇見靈樞卷三第十經脈篇又見甲乙經卷二第一下篇黃帝曰經脈十二經脈者伏行分肉之間深而不見其常見者足太陰過於內踝之上毋所隱故見也諸脈之浮而常見者皆絡脈也十二經脈及諸絡脈其不見者謂十一經也其可見者謂足太陰經上行至於踝上以其皮薄故見也諸餘絡脈皆見者也平按足太陰下甲乙經有脈字內踝靈樞甲乙經均作外踝正統本甲乙經作內踝查陰脈行內陽脈行外足太陰為陰脈應行內踝再檢本書脾足太陰之脈上內踝前廉楊注云十二經脈皆行筋肉骨間唯此足太陰經上於內踝薄肉之處脈得見者也與此處正相發明作外踝者恐誤六經絡手陽明少陽之大絡也起於五指間上合肘中六陽絡中手陽明絡肺腑之絡也手少陽絡三焦之絡也手陽明大腸之經起大指次指之間即大指次指及中指內間手陽明絡起也手少陽經起小指次指間即小指次指及中指外間手少陽脈起也故二脈絡起五指間也平按少陽甲乙經作少陰注手少陽手字袁刻脫飲酒者衛氣先行皮膚先充絡脈絡脈先盛故衛氣已平營氣乃滿而經脈大盛也酒是熟谷之液入胃先行皮膚故衛氣盛衛氣注入脈中故平營氣滿也營氣滿於所入之經則所入經脈絡大盛動也平按故衛氣已平甲乙經作則衛氣以平脈之卒然動者皆邪氣居之留於本末十二經脈有卒然動者皆是營衛之氣將邪氣入此脈中故此脈動也本末即是此經本末也絡脈將邪入於衛氣衛氣將邪入於此脈本末之中留而不出故為動也酒即邪也不動則熱若邪在脈中盛而不動則當邪居處蒸而熱也不堅則陷且空不與衆同是以知其何脈之病當邪居處熱邪盛也必為堅硬若寒邪盛多脈陷肉空與平人不同以此候之知十二經中何經之病平按病靈樞甲乙經作動也二字注必為堅硬硬字右旁有五孟反三字小注袁刻作必為堅堅孟硬反與原抄不合雷公曰何以知經脈之與絡脈異耶黃帝曰經脈者常不可見其虛實也以氣口知之脈之見者皆絡脈也經脈不見若候其虛實當診寸口可知之也絡脈橫居五色可見即目觀之以知虛實也雷公曰細子無以明其然細子謙稱也經脈診氣口可知虛實猶未明其絡脈見之然也黃帝曰諸絡脈皆不能經大節之間必行絶而道出入復合於皮中其會皆見於外大節謂四肢十二大節等也凡絡脈之行至大節間止緣於絡道出節至外入於皮中與余絡合見於皮絶止也平按自雷公曰至黃帝曰甲乙經無此十三字而道靈樞甲乙經作道而故諸刺絡脈者必刺其結上甚血者雖毋結急取之以瀉其邪而出其血留之發為痹此言療絡所在也結謂聚也邪客於絡有血聚處可刺去之雖無聚處觀於絡脈血盛之處即有邪居可刺去之恐其邪氣停留發為痹病也平按諸刺道藏本靈樞作刺諸甲乙經雖毋結作雖無血結凡診絡脈脈色青則寒且痛赤則有熱胃中寒手魚之絡多青矣胃中有熱魚絡亦赤魚黑者留久痹也其有赤有青有黑者寒熱此言診絡虛實法也絡色有三青赤黑也但青有寒但赤有熱但黑有痹三色具者即有寒熱也色之候者青赤二色候胃中也皆候魚絡胃者手陽明脈與太陰合太陰之脈循胃口至魚故候太陰之絡知胃寒熱胃中有痹亦可候魚若邪客處久留成痹即便診之平按甲乙經胃中寒作胃中有寒魚絡亦赤靈樞作魚際絡赤甲乙經作則魚際之絡赤魚黑者靈樞甲乙經均作其暴黑者寒熱下靈樞有氣也二字其青而小短者少氣也青色主寒而短小者即寒氣少也平按靈樞無而小二字凡刺寒熱者皆多血絡必間日而一取之血盡而止乃調其虛實此言刺絡脈法也寒熱胃中寒熱也以胃氣故青赤絡脈血乃多者也欲為多日刺之故間日取得平乃止也其小而短者少氣甚瀉之則悗悗甚則僕不能言悗則急坐之陰絡小而短者則陰氣少故甚瀉踣倒坐而屈之即脈滿故醒而能言也亦可陰陽絡皆短小即二氣俱少瀉之僕也僕踣也平按兩甚字原抄本均作其謹依靈樞甲乙經作甚悗靈樞甲乙經均作悶注踣上原缺一字袁刻作則十五絡脈平按此篇見靈樞卷三第十經脈篇又見甲乙經卷二第一下篇手太陰之別名曰列缺十二正經有八奇經合二十脈名為之經二十脈中十二經脈督脈及任脈衝脈有十四經各別出一脈有十四脈脾臟復出一脈合有十五脈名為大絡任沖及脾所出散絡而已餘十三絡從經而出行散絡已別走余經以為交通從十五絡別出小絡名為孫絡任沖二脈雖別同稱一絡名曰尾翳似不別也別於太陰經故曰別也余皆放之此別走絡分別大經所以稱缺此穴列於缺減大經之處故曰列缺也平按注別於太陰下原缺一字袁刻作一起於掖下分間掖下分間即手太陰經也平按掖下靈樞甲乙經均作腕上千金作掖下並太陰之經直入掌中散入於魚際其病手兌掌熱取之去腕一寸半別走陽明並薄浪反絡入魚際別走陽明經也陽明與太陰合也余皆放此平按之經經字袁刻誤作道手兌掌熱靈樞作實則手鋭掌熱虛則欠呿小便遺數甲乙經作手兌骨掌熱余與靈樞同一寸半靈樞作半寸甲乙經作一寸手少陰之別名曰通里去腕一寸別而上行循經入於心中系舌本屬目系其實則支鬲虛則不能言取之腕後一寸別走太陽里居處也此穴乃是手少陰脈氣別通為絡居處故曰通里也支搘也少陰脈起心中故實則搘膈而間之虛則不能言也平按去腕去字甲乙經作在一寸靈樞甲乙經均作一寸半腕後一寸靈樞作掌後一寸手心主之別名曰內關手心主至此太陰少陰之內起於別絡內通心包入於少陽故曰內關也去腕二寸出於兩筋間循經以上繫於心包絡心系實則心痛虛則為煩取之兩筋間檢明堂經兩筋間下有別走少陽之言此經無者當是脫也平按為煩靈樞作為頭強甲乙經作為煩心手太陽之別名曰支正正正經也支絡脈也太陽正經之上支別此絡走向少陰故曰支正也去腕五寸內注少陰其別者上走肘絡肩髃實則節施肘廢虛則生疣小者如指痂疥取之所別施縱緩也疣音尤䃤也又贅也皮外小結也䃤音目痂假瑕反瘡甲也疥公薤反平按去腕靈樞甲乙經作上腕節施作節弛按施與弛通注䃤袁刻誤作腫手陽明之別名曰偏歷手陽明經上偏出此絡經歷手臂別走太陰故曰偏歷也去腕三寸別走太陰其別者上循臂乘肩髃上曲頰偏齒其別者入耳會於宗脈實則齲耳聾虛則齒寒疸鬲取之所別手陽明絡上於曲頰偏入下齒之中宗總也耳中有手太陽手少陽足少陽足陽明絡四脈總會之處故曰宗脈手陽明絡別入耳中與宗脈會故實則齲而聾也五陽之脈皆貫於膈故陽虛膈中疸熱之病如此也平按別走靈樞作別入偏齒正統甲乙經作遍齒按集韻偏通作遍會靈樞作合齲耳聾靈樞無耳字甲乙經耳上有齒字疸靈樞甲乙經均作痹注四脈四字原抄作曰恐誤袁刻作四五陽之脈脈字袁刻作絡手少陽之別名曰外關此處少陽之絡別行心主外關故曰外關也去腕二寸外繞臂注胸中合心主其病實則肘攣虛則不收取之所別實則肘急故攣虛則緩縱故肘不收也平按其病其字靈樞無甲乙無其病二字足太陽之別名曰飛陽此太陽絡別走向少陰經迅疾如飛故曰飛陽也去踝七寸別走少陰實則鼻窒頭背痛虛則鼽衄取之所別窒塞也知栗反太陽走目內眥絡入鼻中故實則鼻塞也虛則無力自守故鼻衄也平按鼻窒靈樞作鼽窒甲乙經作窒鼻足少陽之別名曰光明光明即眼也少陽厥陽主眼故少陽絡得其名也去踝五寸別走厥陰下絡足跗上實則厥虛則痿躄坐不能起取之所別少陽之絡腰以上實多生厥逆病也腰以下脈虛則痿躄跛不能行也躄音擘平按踝下甲乙經有上字厥陰下甲乙經有並經二字跗下靈樞甲乙經無上字足陽明之別名曰豐隆足陽明穀氣隆盛至此處豐溢出於大絡故曰豐隆去踝八寸別走太陰其別者循脛骨外廉上絡頭合諸經之氣下絡喉嗌其病氣逆則喉痹卒喑實則狂癲疾虛則足不收脛枯取之所別實並於上故為癲疾虛則下不足故足不收平按靈樞甲乙經頭下均有項字卒喑均作瘁喑狂癲疾靈樞作狂顛甲乙經作顛狂均無疾字足太陰之別名曰公孫肝木為公心火為子脾土為孫穴在公孫之脈因名公孫也平按注脾土袁刻誤作啤上因誤作固去本節之後一寸別走陽明其別者入絡腸胃厥氣上逆則霍亂實則腹中切痛虛則鼓脹取之所別陽明絡入腸胃清濁相干厥氣亂於腸胃遂有霍亂食多脈實故腹中痛無食脈虛故邪氣脹滿也平按腹中靈樞甲乙經作腸中注脹袁刻誤作振足少陰之別名曰大鐘鍾注也此穴是少陰大絡別注之處故曰大鐘平按大鐘正統本甲乙經作太鍾當踝後繞跟別走太陽其別者並經上走於心包下貫腰脊其病氣逆則煩悶實則閉癃虛則腰痛取之所別大鐘絡走心包故病則煩悶實則膀胱閉淋不足則為腰痛也平按貫上靈樞有外字閉癃甲乙經作癃閉足厥陰之別名曰蠡溝蠡力灑反瓢勺也胻骨之內上下虛處有似瓢勺渠溝此因名曰蠡溝去內踝五寸別走少陽其別者循脛上皋結於莖其病氣逆則皋腫卒疝實則挺長熱虛則暴癢取之所別皋囊也此絡上囊聚於陰莖也挺長陰挺出長也虛則陰癢也平按踝下甲乙經有上字循脛上皋靈樞作經脛上睪甲乙經作循經上睪督脈之別名曰長強督脈諸陽脈長其氣強盛穴居其處故曰長強也俠膂上項上散頭上下當肩甲左右別走太陽入貫膂實則脊強虛則頭重高搖之俠脊之有過者取之所別俠脊有過則知督脈兩道以為定也平按督脈一段靈樞甲乙經均在任脈之後俠膂靈樞作挾膂甲乙經作俠脊肩甲靈樞甲乙經均作肩胛高搖之俠脊之有過者九字甲乙經注九墟無此九字注定字袁刻誤作病任沖之別名曰尾翳下鳩尾散於腹實則腹皮痛虛則癢搔取之所別尾則鳩尾一名尾翳是心之蔽骨此之絡脈起於尾翳故得其名任沖二經此中合有一絡者以其營處是同故合之也任沖浮絡行腹皮中故實盛痛也虛以不足故邪為癢搔葉牢反平按任沖靈樞甲乙經均作任脈癢搔甲乙經作搔癢脾之大絡脈名曰大包脾為中土四臟之主包裹處也故曰大包也平按大絡脈袁刻作大脈絡靈樞甲乙經無脈字注中土袁刻誤作中上出泉掖下三寸布胸脅實則身盡痛虛則百節皆縱此脈若羅絡之血者皆取之所別脾之盛氣腋下三寸當泉掖而出布於胸脅散於百體故實則遍身皆痛虛則穀氣不足所以百節緩縱此脈乃是人身之上羅絡之血脈也由是有病皆取之也平按泉掖靈樞甲乙經均作淵腋説見前身上甲乙有一字百節甲乙經作百脈皆取之所別靈樞作皆取之脾之大絡脈也甲乙經無所別二字凡此十五絡者實則必見虛則必下視之不見求之上下人經不同絡脈異所盛則血滿脈中故必見虛則脈中少血故必下脈下難見故上下求之人之稟氣得身百體不可一者豈有經絡而得同乎故須上下求之方得見也平按異所下靈樞甲乙經均有別也二字注脈下難見袁刻作脈中經脈皮部平按此篇自篇首至而生大病黃帝曰善見素問卷十五第五十六皮部論篇自夫經絡之見也至末見素問卷十五第五十七經絡論又自篇首至末見甲乙經卷二第一下篇黃帝問岐伯曰余聞皮有分部前説十五大絡循其行處以求其病次説皮部十二絡之以十二經上之以皮分十二部以取其病故曰皮有部也脈有經紀大絡小絡總以十二大脈以為皮部經紀筋有結絡十二經筋各有結聚各有包絡骨有度量骨有大小長短度量其所生病各異以其皮脈筋骨各各不同故皮脈筋骨生病異之別其分部左右上下陰陽所在別在皮脈筋骨分部異者有左有右有上有下有陰有陽六種所在病之終始病客前六有初有極也平按終始素問作始終願聞其道岐伯曰欲知皮部以經脈為紀諸經皆然欲知皮之部別十二經為綱紀也十二經皮部絡皆以此為例也平按注部別袁刻作別部陽明之陽名曰害蜚上下同法蜚扶貴反陽明大經為陽故大小絡為陽明之陽陽明之脈有手有足手則為上足則為下又手陽明在手為下在頭為上足陽明在頭為上在足為下診色行針皆同法也余皆放此平按蜚下甲乙經有十二經三字視其部中有浮絡者皆陽明之絡也浮謂大小絡見於皮者也其色多青則痛多黑則痹絡脈俱有五色然衆絡以色偏多者候其別病邪客分肉之間迫肉初痛故絡青也久留為冷為熱或為不仁以成於痹故絡青深為胎黑也多黃赤則熱疸熱在中氣溢皮膚故絡黃赤也平按素問甲乙經無多字多白則寒堊白寒也故寒氣在中絡白色也五色皆見則寒熱青赤黃等為陽色也白黑二種為陰色也今二色俱見當知所病有寒熱也絡盛則入於經盛大小絡盛也大小絡中痛痹熱寒寒熱五邪盛者則循絡入經也平按入下素問甲乙經有客字陽主外陰主內陽絡主外陰絡主內也在陽絡者主外在陰絡者主內也少陽之陽名曰樞特上下同法視其部中有浮絡脈者皆少陽之絡也絡盛則入經故在陽者主內在陰者主出滲於內也諸經皆然矣少陽絡盛則入於經故主內也經盛外溢故主出也諸陰陽絡主內出者例以此知也滲山蔭反下入也平按樞特素問作樞持甲乙經作樞杼注云一作持上下同法甲乙經無此四字絡脈脈字素問甲乙經均無主出甲乙經作主外注下入也三字袁刻脫太陽之陽名曰關樞上下同法視其部中有浮絡脈者皆太陽之絡也絡盛則入客於經外盛者則入於大經也少陰之陰名曰樞檽而泉反平按檽素問作儒新校正云甲乙經作檽今本甲乙經仍作儒正統本甲乙經作檽日本丹波元簡素問識謂檽音軟引倉頡篇為柱上承鬥之曲木宜從甲乙經作檽上下同法視其部中有浮絡者皆少陰之絡也絡盛則入客於經其入於經也從陽部注於經從陽絡部注於陽經也其經出者從陰注於骨從陰絡部出注陰經內注於骨少陰主骨也平按素問甲乙經無經字陰字下素問有內字甲乙經有部內二字心主之陰名曰害肩上下同法視其部中有浮絡者皆心主之絡也絡盛則入客於經太陰之陰名曰關樞平按關樞素問作關蟄新校正云甲乙蟄作執今本甲乙仍作蟄正統本甲乙經作執袁刻亦作蟄上下同法視其部中有浮絡者皆太陰之絡也絡盛則入客於經凡十二經脈者皮之部也皮有部者以十二脈分為部也平按經脈者素問甲乙經作經絡脈者是故百病之始生也下廣論外邪主於百病次第所由也必先客於皮毛邪中之則腠理開開則入客於絡脈留而不去傳入於腑稟於腸胃外邪氣風寒暑濕邪入身為病先著皮毛留而不出則腠理孔開因開而入即客於絡脈絡脈傳入陽經陽經傳入六腑於是稟承腸胃之氣以為百病平按絡脈下素問甲乙經均有留而不去傳入於經八字邪之始入於皮也泝然起豪毛開腠理泝蘇護反流逆上也謂寒邪逆入腠理也外邪入身為病也初著皮毛能開腠理也平按泝甲乙經作淅其入於絡也則絡脈盛色變能令絡盛色變也其入客於經也則減虛乃陷下減氣為虛乃血少脈陷也平按減素問作感道藏本作盛甲乙經亦作盛其留於筋骨之間寒多則筋攣骨痛熱多則筋施骨消肉爍䐃破毛直而敗矣循經入於筋骨之間留而不去寒邪不去則為二病筋攣拘急一也骨乃疼痛二也若熱邪不去則以五病筋熱緩施一也骨熱消細二也身肉爍三也爍余藥反淫邪在肉也䐃臑破裂四也毛焦而直五也熱邪如此客於筋骨之間遂至於死也平按施素問甲乙經作弛䐃甲乙經作膕注淫邪在肉袁刻肉作內䐃臑䐃字袁刻作膕黃帝曰夫子言皮之十二部其生病何如岐伯曰皮者脈之部也邪客於皮則腠理開開則邪入客於絡脈絡脈滿則注於經脈經脈滿則入舍於腑臟故皮者有分部不與而生大病前明邪入皮毛乃至稟於腸胃次言邪入乃至筋骨之間今言邪入至於臟腑皆可以從淺至深以至於大在淺不療遂生大病也與療也平按不與今本甲乙經作不愈正統本作不與素問新校正云甲乙經不與作不愈全元起本作不與元起云氣不與經脈和調則氣傷於外邪流入於內必生大病也本注與訓療與元起所解亦異黃帝曰善夫絡脈之見也其五色各異青黃赤白黑不同其故何也岐伯曰經有常色而絡無常變常謂五色見者定是絡色也然五臟六腑之注定屬五行故臟腑大經各有常色陰絡隨於陰經色亦不改陽絡雖屬陽經以是陽脈之陽故隨時變也平按甲乙經無青黃赤白黑不同七字絡無常變正統本甲乙經作絡脈無常變黃帝曰經之常色何如岐伯曰心赤肺白肝青脾黃腎黑皆亦應其經脈之色五臟五行之色皆合經脈故經之色常也平按注常下原缺一字依經文當作應黃帝曰其絡之陰陽亦應其經乎岐伯曰陰絡之色應其經陽絡之色變無常隨時而行絡有陰陽陰絡是陰之陰故隨經色不變陽絡是陽之陽故隨時變也平按時上素問甲乙經均有四字寒多則涘泣涘泣則青黑熱多則淖澤淖澤則黃赤此其常色者謂之無病也淖丈卓反濡甚也解其陽絡隨時而變也冬月寒甚則經脈涘泣涘泣不通則陽絡壅而青黑夏日熱甚血氣濡甚則陽絡熱而黃赤也陽絡如此隨四時而變者此為陽絡常色謂之無病之候也不可見而色見者病也平按涘泣素問甲乙經均作凝泣淖澤今本甲乙經作滜澤正統本甲乙作淖澤此其素問其作皆常色者者字袁刻作也注則經脈則字袁刻作雖色俱見者謂之寒熱黃帝曰善隨一時中五色俱見者此為寒熱之病也
