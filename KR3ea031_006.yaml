body:
  text: 卷第六卷首缺臟腑之一平按此篇自喜樂者以上日本原抄正本殘缺篇目亦不可考平從日本仁和寺宮御藏本殘卷十三紙中檢出自在我者以下至竭絕而失生經文楊注證以靈樞本神篇補入喜樂者以上斷珪零璧缺而復完洵堪寶貴自在我者以上惜無從查出故自黃帝問於岐伯曰至地之謹依靈樞卷二第八本神篇補入自喜樂者以下至末均見本神篇又見甲乙經卷一第一黃帝問於岐伯曰凡刺之法必先本於神血脈營氣精神此五臟之所藏也至其淫泆離藏則精失魂魄飛揚志意恍亂智慮去身者何因而然乎天之罪與人之過乎何謂德氣生精神魂魄心意志思智慮請問其故岐伯答曰天之在我者德也地之以上從靈樞本神篇補入在我者氣也德流氣薄而生者也未形之分梚與我身謂之德者天之道也故莊子曰未形之分物得之以生謂之德也陰陽和氣質成我身者地之道也德中之分流動陰陽之氣和亭遂使天道無形之分動氣和亭物得生也平按注梚字恐系施字之誤故生之來謂之精雄雌兩神相搏共成一形先我身生故謂之精也兩精相搏謂之神即前兩精相搏共成一形一形之中靈者謂之神者也即乃身之微也問曰謂之神者未知於此精中始生未知先有今來答曰案此內經但有神傷神去與此神生之言是知來者非曰始生也及案釋教精合之時有神氣來托則知先有理不虛也故孔丘不答有知無知量有所由唯佛明言是可依隨神往來者謂之魂魂者神之別靈也故隨神往來藏於肝名曰魂並精而出入者謂之魄魄亦神之別靈也並精出此而入彼謂為魄也並薄浪反所以任物者謂之心物萬物也心神之用也任知萬物必有所以神物任物故謂之心也心有所憶謂之意意亦神之用也任物之心有所追憶謂之意也意之所存謂之志志亦神之用也所憶之意有所專存謂之志也因志而存變謂之思思亦神之用也專存之志變轉異求謂之思也因思而遠慕謂之慮慮亦神之用也變求之思逆慕將來謂之慮也因慮而處物謂之智智亦神之用也因慮所知處物是非謂之智也故智者之養生也神之所用窮在於智故曰智者之養生也必順四時而適寒暑智者養生要有之道春夏養陽使適於暑也秋冬養陰使適於寒和喜怒而安居處喜怒所生生於居處智者發而中節故因以和安也節陰陽而調柔剛陰以致剛陽以起柔兩者有節則剛柔得矣平按柔剛靈樞甲乙均作剛柔如是則邪僻不至長生久視智者行和節養之道則五養神安六腑氣調經脈用營腠理密緻如此疵癘元本不生八正四邪無由得至自斯已往或齊天地莫見冬擟或類彭年長生久視也平按注五養恐系五臟之誤冬擟二字未詳因原抄如是故仍之是故怵惕思慮者流溢而不固怵惕思慮多傷於心神傷無守所為不固也悲哀動中者竭絕而失生人之悲哀動中傷於肝魂淚竭筋絕故失也平按註失下原缺一字據經文應作生喜樂者樿散而不藏喜樂志達氣散於肺魄故精不守藏也樿立安反牽引也平按樿靈樞甲乙均作憚原抄作樿考樿音展上聲木白理也音義均不合疑作撣音彈寒韻太玄經撣系其名提持也與本注音義為近再查日本抄本凡手旁多從木如搏作榑之類今樿字恐系撣字傳寫之誤注氣散下原缺一字據上注傷於肝魂應作傷魄下原有故精不守藏也六字袁刻脫愁憂者閉塞而不行愁憂氣結傷於脾意故閉塞不行也平按閉上靈樞甲乙有氣字盛怒者迷惑而不理盛怒氣聚傷於腎志故迷惑失理也平按理靈樞甲乙作治恐懼者蕩憚而不收右腎命門藏精氣恐懼驚蕩則精氣無守而精自下故曰不收平按甲乙注云太素不收作失守今仍作不收或另有本耶心怵惕思慮則傷神心藏也怵惕腎來乘心也思慮則脾來乘心二邪乘甚故傷神也神傷則恐懼自失破䐃脫肉神為其主故傷神則反傷右腎故恐懼自失也亦反傷脾故破䐃脫肉也毛悴色夭死於冬毛悴肺傷色夭肝傷也以神傷則五臟皆傷也冬火死時也肝悲哀動中則傷魂肝藏也悲哀太甚傷肝故曰動中肝傷則魂傷平按肝上靈樞有脾憂愁至死於春一段本書在後魂傷則狂忘不精不敢正當人魂既傷已肝腎亦傷故及不精不敢當人也平按狂忘甲乙作狂妄不精不敢正當人甲乙作其精不守注一本作不精不精則不正當靈樞作狂忘不精不精則不正當人注故下缺二字及下缺一字袁刻作故狂妄不精與原抄不合縮而攣筋兩脅骨舉肝足厥陰脈環陰器故魂肝傷宗筋縮也肝又主諸筋故攣也肝在兩脅故肝病兩脅骨舉也平按縮上靈樞有陰字骨舉靈樞作骨不舉甲乙作令人陰縮而筋攣兩脅肋骨不舉毛悴色夭死於秋秋木死時也肺喜樂無極則傷魄肺臟也喜樂心喜乘肺無極傷魄也平按無極甲乙作樂極魄傷則狂狂者意不存人皮革焦魄傷則傷臟故發狂病也以樂蕩神故狂病意不當人又肺病皮革焦也平按人皮革焦甲乙作其人皮革焦毛悴色夭死於夏夏金死時脾愁憂而不解則傷意意傷則悗亂四肢不舉肺來乘脾故憂愁不已傷意發狂悗亂並脾病四肢不舉也平按悗甲乙作悶毛悴色夭死於春春土死時也問曰脾主愁憂又云精氣並於肝則憂即肝為憂也素問云心在變動為憂即心為憂也肺在志為憂也即肺為憂其義何也答曰脾為四臟之本意主愁憂故心在變動為憂即意之憂也或在肺志為憂亦意之憂也若在腎志為憂亦是意之憂也故愁憂所在皆屬脾也平按心之憂在心變動肺之憂在肺之志詳素問陰陽應象大論新校正引楊注又見甲乙經精神五臟論所引楊注按甲乙經云肝之與腎脾之與肺互相成也脾者土也四臟皆受成焉故恐發於肝而成於腎愛發於脾而成於肝又云心之與肺脾之與心亦互相成也故喜變於心而成於肺思發於脾而成於心一過其節二臟俱傷此經互言其義耳又新校正謂甲乙經具有此說取五志迭相勝而為言各舉一則義俱不足兩見之則互相成義也腎盛怒而不止則傷志肝來乘腎故不已傷志也志傷則善忘其前言腰脊不可以俯仰屈伸腎志傷故喜忘腎在腰脊之中故腎病不可俯仰屈伸也平按善靈樞甲乙均作喜屈伸二字甲乙無毛悴色夭死於季夏季夏水死時也恐懼而不解則傷精恐懼起自命門故不解傷精也精傷則骨酸痿厥精精為骨髓之液故精傷則骨痠疼及骨痿也平按厥精下原缺二字靈樞甲乙作時自下三字是故五臟主藏精者也人腎有二左為腎臟右為命門命門藏精精者五臟精液故五臟藏精不可傷傷則守失而陰虛陰虛則無氣無氣則死矣五臟之神不可傷也傷五神者則神去無守臟守失也六腑為陽五臟為陰臟無神守故陰虛也陰臟氣無遂致死也故不死之道者養五神也人皆怵惕思慮則以傷神悲哀動中日亡魂性喜樂無極神魄散揚愁憂不解志意悗亂盛怒無止失志多忘恐懼驚神傷精痿骨以千端之禍害此一生終以萬品欲情澆亂真性仍服金石貴寶摧斯易生之軀多求神仙芳草日役百年之命昔彭𣆀以道怡性壽命遐長秦武採藥求仙早升霞氣故廣成子語黃帝曰來吾語汝至道無視無聽抱神以靜形將自正也必靜必清無勞汝形無搖汝精心無所知神將守形可以長生故我修身千二百歲人皆盡死而我獨存得吾道者上為皇下為王失吾道者上見光下為土是知安國安人之道莫大怡神亡神亡國之災無出情欲故岐伯以斯至道上答黃軒述千古之遺風拯萬葉之荼苦也平按守失靈樞甲乙作失守注痿骨下原缺一字據下文終以終字此疑作始又注遺風別本作道風是故用針者察觀病人之能以知精神魂魄之存亡得失之意五臟已傷針不可以治之也上古但有湯液之為而不用針至黃帝賊邪傷物故用針石並藥灸等雜合行之以除疾病療病之要必本其人五神存亡可得可失死生之意然後命諸針藥以行調養若其人縱逸五神以傷愚醫不候神氣存亡更加針藥必其早夭不待時也平按察觀甲乙作觀察能靈樞甲乙均作態肝藏血血舍魂肝氣虛則恐實則怒肝心脾肺腎謂之五臟藏精氣也血脈營氣精謂之五精氣舍五神也肝主於筋人臥之時血歸於肝故魂得舍血也腎為水臟主於恐懼肝為木臟主怒也水以生木故肝子虛者腎母乘之故肝虛恐也心藏脈脈舍神心氣虛則悲實則笑不休肝為木臟主悲哀也心為火臟主於笑也木以生火故火子虛者木母乘之故心虛悲者也脾藏營營舍意脾氣虛則四肢不用五臟不安實則脹經溲不利溲小留反營血肉也脾主水穀臟腑之主虛則陽腑四肢不用陰臟不安實則脹滿及女子月經並大小便不利故以他乘致病也平按此段靈樞在心臟脈之上則脹靈樞作則腹脹經溲甲乙作涇溲肺藏氣氣舍魄肺氣虛則息利少氣實則喘喝胸憑仰息肺主五臟穀氣亦不受他乘故虛則喘息利而少氣實則胸滿息難也平按息利靈樞作鼻塞不利甲乙經作鼻息不利胸憑靈樞作胸盈甲乙作憑注云九墟作盈腎藏精精舍志腎氣虛則厥實則脹五臟不安肺為金臟主於狂厥腎為水臟主於水脹五臟不安金以生水故水子虛者金母乘之故狂厥逆也平按志甲乙作氣必審察五臟之病形以知其氣之虛實而謹調之醫療之道先識五臟氣之虛實及知虛實所生之病然後命乎針藥謹而調之平按靈樞無察字而謹調之作謹而調之也五臟命分平按此篇自篇首至末見靈樞卷七第四十七本藏篇又見甲乙經卷一第五黃帝問於岐伯曰人之血氣精神者所以奉於生而周於性命者也太初之無謂之道也太極未形物得以生謂之德也未形德者有分且然無間謂之命也此命流動生物物成生理謂之形也形體保神各有所儀謂之性也是以血氣精神奉於一形之生周於形體所儀之性亦周有分無間之命故命分流動成形體保神為性形性久居為生者皆血氣之所奉也平按奉下靈樞無於字經脈者所以行血氣而營陰陽濡筋骨利關節者也十二經脈也十二經脈行營血氣營於三陰三陽濡潤筋骨利關節也衛氣者所以溫分肉充皮膚肥腠理司關闔者也衛氣慓悍行於分肉司腠理關闔也平按關字原抄作閞乃關字省文袁刻作開靈樞作關志意者所以御精神收魂魄適寒溫和喜怒者也脾腎之神志意者能御精神令之守身收於魂魄使之不散調於寒暑得於中和和於喜怒不過其節者皆志意之德也平按和喜怒和字原缺袁刻作知恐誤靈樞作和謹依靈樞補入注御字原缺據經文應作御是故血和則經脈流行營覆陰陽筋骨勁強關節滑利矣營氣和益也覆者營氣能營覆陰陽也平按滑靈樞作清衛氣和則分解滑利皮膚調柔腠理致密矣衛司腠理故緻密也平按分解滑利靈樞作分肉解利志意和則精神專直魂魄不散悔怒不至五臟不受邪氣矣志意所為必當故無悔矣志意司腠理外邪不入故五臟不受也平按靈樞不至作不起不受邪氣作不受邪寒溫和則六腑化谷風痹不作寒暑內適六腑則中和谷化賊風邪痹無由起也經脈通利支節得矣此人之常平也若爾血氣營衛志意調者乃是人之平和者平按得下靈樞有安字五臟者所以藏精神血氣魂魄者也六腑者所以化谷而行津液者也此人之所以具受於天也愚智賢不肖毋以相倚也五臟藏神六腑化谷此乃天之命分愚智雖殊得之不相依倚也津液即泣汗涎涕唾也平按谷上靈樞有水字液者二字原缺謹據靈樞補入愚上靈樞有無字然其有獨盡天壽而毋邪僻之病百年不衰雖犯風雨卒寒大暑猶不能害也有其不離屏蔽室內無怵惕之恐然猶不免於病者何也願聞其故人有勞神怵惕無所不為雖犯賊風邪氣獨盡天年復有閒居無思不預外邪不免於病不道傷命同稟血氣何乃有殊願聞其故也平按其有靈樞作有其猶不能害靈樞作猶有弗能害邪僻僻字原缺之恐二字原缺謹據靈樞補入岐伯對曰窘乎哉問也窘奇殞反急也五臟者所以參天地副陰陽而連四時化五節者也肺心居其上故參天也肝脾腎在下故參地也肝心為牡副陽也脾肺腎等牝副陰也肝春心夏肺秋腎冬即連四時也從五時而變即化五節節時也平按五節者也也字原缺據靈樞補入五臟者固有小大高下堅脆端正偏傾者六腑者亦有長短小大厚薄結直緩急者天地陰陽四時八節造化不同用參五臟何得一也五臟各有五別六腑皆準五臟亦有五別故臟腑別言各有五別五五二十五也五臟既五六腑亦五三焦一腑屬於膀胱故唯有五平按注各有五別下空二格別本作各有五色五別下二格不空凡此二十五者各各不同或善或惡或吉或凶請言其方心小則安此為善也易傷以憂即為惡也心堅則臟安守固此為吉也心脆則喜病消癉熱中即為凶也如此臟腑隨義皆有善惡吉凶請具陳也平按其方其字原缺謹據靈樞補心小則安邪弗能傷易傷以憂心大則憂不能傷易傷於邪臟小則神不敢自寬故常安邪不入也臟大則神氣宣縱故憂不能傷邪入不安也平按甲乙經以憂作於憂又按甲乙經注云太素邪作外邪今本仍無外字又注神下一字原缺左旁恐系收字袁刻作敢心高則滿於肺中悗而喜忘難開以言心臟高者則神高也心高肺逼於心故悗喜忘也以其神高不受他言故難開以言也平按肺中中字原缺謹據靈樞補入喜靈樞作善注心高高字原缺下方細玩剩處於高字為近謹據經文作高過下一字原不全細玩剩處與近字相似袁刻作小恐未安謹空一格心下則藏外易傷於寒易恐以言心下則在肺臟之外神亦居外故寒易傷也亦以神下故易恐以言也心堅則臟安守固臟堅則神守亦堅固故其心臟安不病其神守堅固心脆則喜病消癉熱中五臟柔脆神亦柔脆故臟柔脆人血脈上行轉而為熱消肌膚故病消癉熱中也癉音丹熱中胃中熱故也平按脆原缺謹據靈樞甲乙補熱中中字原缺旁有小注中字據注熱中胃中熱也應作熱中靈樞甲乙同袁刻作注刻在五臟柔脆上則混經於注矣心端正則和利難傷五臟端正神亦端正也神端正性亦和柔故聲色芳味之利難相傷也斯乃賢人君子所以得心神也心偏傾操持不一無守司也心臟偏傾不一神亦如之故操持百端竟無守司之恆此為眾人小人所得心神也心臟言神有此八變後之四臟但言臟變皆不言神變者以神為魂魄意志之主言其神變則四種皆知故略不言也平按甲乙經注引楊上善注云心臟言神有八變後四臟但言臟變不言神變者以神為魂魄意之主言其神變則四臟可知故略而不言也與此注正合袁刻心臟言神誤作之神意志下空十一格不合肺小則少飲不病喘喝人分所得肺小則少飲漿水又肺小不受外邪故不病喘喝喝喘聲平按甲乙無喝字大則喜病胸痹喉痹逆氣肺大喜受外邪故喜病痹及逆氣也平按大則下靈樞甲乙有多飲二字甲乙無喉痹二字肺高則上氣肩息欲咳肺高則上迫缺盆故上氣喘息兩肩並動故曰肩息又肺上迫故數欲咳平按肩息欲咳靈樞無欲字甲乙作喘息咳逆肺下則居賁迫肝善脅下痛賁當膈也補昆反氣來委膈下迫於肝致脅下痛以肝居脅下故也平按居賁甲乙作逼賁迫肝靈樞甲乙作迫肺注委膈原校作垂膈肺堅則不病咳上氣肺臟堅固不為邪傷故無咳與上氣也平按咳甲乙作咳逆肺脆則善病消癉易傷以上四臟之變例同心臟平按善靈樞作苦甲乙易傷下有也字注云一云易傷於熱喘息鼻衄肺端正則和利難傷也肺偏傾則胸偏痛也偏傾者隨偏所在即偏處胸痛也肝小則安無脅下之病肝小不受外邪故安無兩脅下痛平按安上靈樞有藏字肝大則逼胃迫咽迫咽則喜鬲中且脅下痛胃居肝下咽在肝旁肝大下逼於胃旁迫於咽迫咽則咽膈不通飲食故曰膈中也肝大受邪故兩脅下痛平按咽迫咽三字原缺謹據甲乙補喜靈樞作苦肝高則上支賁切脅急為息賁肝高上支於膈又切於脅支膈切脅既急即喘息於賁故曰息賁也平按切甲乙作加急靈樞作悗肝下則安胃脅下空空則易受邪胃居肝下是以肝下則安於胃上脅下無物故易受邪氣平按安胃靈樞作逼胃肝堅則臟安難傷也肝堅則外邪不入故安難傷也肝脆則喜病消癉易傷也肝端正則和利難傷也肝偏傾則脅下偏痛也偏近一箱則一箱空處偏痛也平按偏痛偏字靈樞無脾小則安難傷於邪也脾小外邪不入故安而難傷也脾大則善湊䏚而痛不能疾行䏚以沼反胠空處也脾大湊向空䏚而痛大不行則胠空也平按善靈樞甲乙作苦䏚甲乙音停注不行上原缺一字袁刻作力則下原缺一字袁刻作脅脾高則䏚引季脅而痛脾下則䏚緩高則䏚牽季脅中痛也脾下則下加於大腸加於大腸則臟外善受邪脾下即是大腸故脾下加出於脾臟所居之外故喜受邪平按外善受邪靈樞無外字善作苦脾堅則臟安難傷也外邪不傷故安脾脆則喜病消癉易傷也脾端正則和利難傷也脾偏傾則喜瘈喜脹瘈充曳反牽縱也脾偏形近一箱動而多痹又氣聚為脹也平按喜瘈喜脹靈樞作善滿善脹甲乙經作瘈瘲喜脹腎小則安難傷也腎小不受外邪故安而難傷也腎大則喜病腰痛不可以俯仰易傷以邪也腎大在於腰中故俯仰皆痛也腎高則善背膂痛不可以俯仰腎高去腰著於脊膂故脊膂痛不得俯仰也腎下則腰尻痛不可以俯仰為狐疝腎下入於尻中下迫膀胱故尻痛不可俯仰疝所奸反小腹痛大小便難曰疝疝有多種此為狐疝謂狐夜時不得小便少腹處痛日出方得人亦如此因名狐疝也腎堅則不病腰背痛腎在腰背之間故腎堅則腰不痛也腎脆則喜病消癉腎端正則和利難傷也腎偏傾則喜腰尻偏痛二腎有一偏傾則偏處痛也平按癉下靈樞甲乙有易傷二字凡此二十五變者人之所以喜常病也人之五臟受之天分有此二十五變者不由人之失養之愆故雖不離屏蔽常喜有前病也黃帝曰何以知其然也五臟二十五變皆在身中變生常病亦居其內未知因候知以為調養也岐伯曰赤色小理者心小粗理者心大理者肉之文理粗音粗也無𩩲骭者心高𩩲骭小短舉者心下𩩲骭長者心堅𩩲骭弱以薄者心脆𩩲骭直下不舉者心端正𩩲骭倚一方者心偏傾也𩩲骭胸前蔽骨蔽心神也其心上入肺中不須蔽骨故心高以無蔽骨為候也高者志意高遠也故短小舉者為心下之候下者志意卑近也平按骭靈樞作藇弱下靈樞甲乙有小字白色小理者肺小粗理者肺大巨肩反膺陷喉者肺高合掖張脅者肺下好肩背厚者肺堅肩背薄者肺脆好肩膺者肺端正脅偏竦者肺偏傾也大肩胸膺反喉骨陷入肺必高上平按巨肩巨字原抄作臣謹依靈樞甲乙作巨掖靈樞甲乙作腋好肩膺靈樞甲乙作背膺厚竦靈樞作疏甲乙作竦注云一作欹青色小理者肝小粗理者肝大廣胸反骹者肝高合脅菟骹者肝下胸脅好者肝堅脅骨弱者肝脆膺腹好好相得者肝端正脅骨偏舉者肝偏傾也骹足脛也反前曲出也平按菟靈樞作兔甲乙作脆好好靈樞甲乙均不重恐衍黃色小理者脾小粗理者脾大揭唇者脾高唇下縱者脾下唇堅者脾堅唇大而不堅者脾脆唇上下好者脾端正唇偏舉者脾偏傾也揭舉也起輒反黑色小理者腎小粗理者腎大高耳者腎高耳後陷者腎下耳堅者腎堅耳薄不堅者腎脆耳好前居牙車者腎端正耳偏高者腎偏傾一箱獨高為偏平按高耳甲乙作耳高凡此諸變者持則安減則病凡此二十五變過分以為不善減則為病持平安和以為大則也平按減原抄作咸謹依靈樞甲乙作減黃帝曰善哉然非余之所問也願聞人之有不可病者至盡天壽雖有深憂大恐怵惕之志猶不能感也甚寒大熱弗能傷也其有不離屏蔽室內又無怵惕之恐然不免於病者何也願聞其故子言五臟之變所知是要然非吾之問本意問本意者人生盡於天壽內則深憂大恐外則甚寒極熱然無所傷不為病也而有外無寒暑之侵內去怵惕之懷而疾病百端其故何也平按感靈樞作減岐伯曰五臟六腑者邪之舍也請言其故五臟六腑堅端正者和利得人則道之宅也臟腑脆而偏傾則邪氣舍也為道之宅則其性和柔神明聰利人之受附也為邪之舍不離病也心奸邪也喜為盜也乖公正也言不恆也是知二十五變雖得之於天調養得中縱內外邪侵不為病也乖和失理雖不離屏蔽終為病也前言一臟各有五病未極理也今言一變具有五臟方得盡理故請言故也五臟皆小者少病善焦心愁憂夫五神以依臟故前言心臟之變神亦隨之次說四臟之變不言神變今總論五臟初有四變唯言於神次有二變但說於臟次有二變復但言神也心臟形小外邪難入故少病神亦隨小故不自申焦心愁憂也平按靈樞甲乙善均作苦愁憂上均有大字注自申袁刻自作白五臟皆大者緩於事難使憂五臟皆高者好高舉措措置也旦故反平按憂上靈樞甲乙均有以字舉措正統本甲乙經作舉指五臟皆下者好出人下意志卑弱五臟皆堅者無病五臟皆脆者不離於病五臟皆端正者和利得人五臟皆偏傾者邪心喜盜不可以為人平反覆言語也喜虛意反好也和謂神性和柔利謂薄於名利併為人所附也平按得人下靈樞甲乙均有心字喜盜均作善盜不可以為人甲乙無以字覆甲乙作復臟腑應候平按此篇自篇首至末見靈樞卷七第四十七本藏篇又見甲乙經卷一第五黃帝問曰願聞六腑之應五臟應候已說於前六腑之候闕而未論故次問之岐伯答曰肺合大腸大腸者皮其應也心合小腸小腸者脈其應也肝合膽膽者筋其應也脾合胃胃者肉其應也腎合三焦膀胱三焦膀胱者腠理豪毛其應也腎合三焦膀胱故有五腑也五臟為陰合於五腑五腑為陽故皮脈筋肉腠理豪毛五腑候也平按肝合膽肝字原缺謹依靈樞甲乙補豪靈樞甲乙作毫黃帝曰應之奈何岐伯答曰肺應皮皮厚者大腸厚皮薄者大腸薄皮緩腹果大者大腸大而長皮急者大腸急而短皮滑者大腸直皮肉不相離者大腸結應候也肺以皮為候肺合大腸故以其皮候大腸也結紆屈多平按果靈樞甲乙作裹大而長大字甲乙作緩皮急者大腸急而短甲乙作皮急而短皮滑皮字原缺不全靈樞甲乙均作皮袁刻作外恐誤心應脈皮厚者脈厚脈厚者小腸厚皮薄者脈薄脈薄者小腸薄皮緩者脈緩脈緩者小腸大而長皮薄而脈衝小者小腸小而短心合於脈脈在皮中故得以皮候脈脈候小腸也沖虛也脈虛小也平按小腸大而長小字原缺謹依靈樞甲乙補脈衝小者沖字道藏本靈樞作沖諸陽經脈皆多紆屈者小腸結諸陽脈六陽經也小腸之脈太陽也太陽與諸陽為長故諸陽經紆屈多者則知小腸亦紆屈也紆屈即名為結也陽經在於膚不見候其陽絡即經可知矣平按多字原缺謹依靈樞甲乙補注與諸陽與字袁刻脫脾應肉肉䐃堅大者胃厚肉䐃麼者胃薄肉䐃小而麼者胃不堅脾以合胃故以肉䐃候於胃也麼小也莫可反平按麼袁刻作縻注同靈樞甲乙均作麼肉䐃不稱其身者胃下下者下管約不利肉䐃不堅者胃緩謂䐃顆累與身大小不相稱也胃下逼於下管故便溲不利平按管甲乙作脘下管約甲乙注云太素作下脘未約肉䐃無小果累者胃急肉䐃多小累者胃結者胃上管約不利果音顆謂肉䐃無小顆段連累平按果靈樞甲乙作裹小果累下甲乙有標緊二字多小累靈樞作多少裹累胃結二字靈樞甲乙重肝應爪爪厚色黃者膽厚爪薄者膽薄爪堅者膽急爪濡者膽緩肝以合膽膽以應筋爪為筋余故以爪候膽也平按應爪甲乙作應筋爪薄爪堅爪濡下靈樞甲乙有色紅色青色赤等字爪無弱者膽直無弱強也爪強膽直也平按無弱者靈樞甲乙作直色白無約者爪惡色多敗者膽結人之爪甲色不得明淨又多好破壞者其人膽紆屈結也平按多敗二字靈樞作黑多紋三字甲乙作黑多文三字腎應骨密理厚皮者三焦膀胱厚粗理薄皮者三焦膀胱薄腠理疏者三焦膀胱緩急皮而無豪毛者三焦膀胱急豪毛美而粗者三焦膀胱直希豪毛者三焦膀胱結腎以應骨骨應三焦膀胱三焦膀胱氣發腠理故以腠理候三焦膀胱也三焦之氣如霧漚溝瀆與膀胱水腑是同故合為一腑也腠理豪毛在皮故亦以皮之豪毛為候也平按腠理疏靈樞作疏腠理急皮二字靈樞甲乙均作皮急希均作稀黃帝曰薄厚美惡皆有形願聞其所病已聞六腑美惡之形然未知美惡生病何如平按薄厚靈樞作厚薄形上甲乙有其字岐伯曰各視其所外應以知其內臟則知其所病矣各視外候則知所生病矣平按各字靈樞無所外應所字靈樞甲乙無臟腑氣液平按此篇自篇首至不得盡期而死矣見靈樞卷四第十七脈度篇自肺氣通於鼻至不得盡期而死矣見甲乙經卷一第四自五臟氣心主噫至腎主骨見素問卷七第二十三宣明五氣篇自黃帝問至實而不滿見素問卷三第十一陰陽別論自腦髓骨脈膽至實而不滿見甲乙經卷一第三自問曰太陰陽明至下先受之見素問卷八第二十九太陰陽明論篇又見甲乙經七卷第一上篇自問曰見真臟至帝曰善見素問卷六第十九玉機真臟論篇又見甲乙經卷四第一上篇自問曰脾病而四肢不用至末見素問太陰陽明論又見甲乙經卷九第六又按素問玉機真臟論新校正云詳自黃帝問至帝曰善一段全元起本在第四卷太陰陽明表裡篇中王冰移於此據此則太素與全元起本同惜全本已亡無從查究耳五臟常內閱於上在七竅閱余說反簡也其和氣上於七竅能知臭味色谷音等五物各有五別也平按在七竅靈樞作七竅也肺氣通於鼻鼻和則鼻能知臭香矣肺脈手太陰正別及絡皆不至於鼻而別之入於手陽明脈中上挾鼻孔故得肺氣通於鼻也又氣有不循經者積於胸中上肺循喉嚨而成呼吸故通於鼻也鼻為肺竅故肺氣和者則鼻得和氣故鼻知臭香素問言有五臭經無五香香脾之臭也平按鼻和靈樞作肺和臭香甲乙作香臭心氣通於舌舌和則舌能知五味矣舌雖非竅手少陰別脈循經入心中上系舌本故得心氣通舌也素問赤色入通於心開竅於耳者腎者水也心者火也水火相濟心氣通耳故以竅言之即心以耳為竅又手太陽心之表脈入於耳中故心開竅在於耳也平按舌和靈樞作心和肝氣通於目目和則目能辨五色肝脈足厥陰上頑顙也連目系故得通於目系平按目和靈樞作肝和甲乙辨作視脾氣通於口口和則口能知五穀矣脾足太陰脈上膈挾咽連舌本散舌下故得氣通口也谷有五味舌已知之五穀之別口知之也故食麥之者不言菽也平按口和靈樞作脾和甲乙知作別谷下有味字注麥之之字疑衍腎氣通於耳耳和則耳能聞五音矣手足少陽手足太陽及足陽明絡皆入耳中手少陽足少陽手太陽此三正經入於耳中足太陽脈在耳上角又入腦中即亦絡入於耳足陽明耳前上行亦可絡入耳中手陽明絡別入耳中計正經及絡手足六陽皆入耳中經說五絡入耳中疑足太陽絡不至於耳也平按耳和靈樞作腎和五臟不和則七竅不通六腑不和則留為癰疽五臟主藏精神其脈手足六陰絡於六腑屬於五臟六腑主貯水穀其脈手足六陽絡於五臟屬於六腑七竅者精神戶牖也故六陰受邪入臟則五臟不和五臟不和則七竅不通利也六陽受邪入腑則六腑不和六腑不和則陽氣留處處為癰疽平按七竅甲乙作九竅留為癰疽甲乙作留結為癰靈樞無疽字注處處下處字疑衍故邪在腑則陽脈不利陽脈不利則氣留之氣留之則陽氣盛矣故外邪循脈入腑則腑內不調流於陽脈陽脈澀而不利陽氣留停不和於陰故陽獨盛也平按不利靈樞甲乙作不和陽氣大盛則陰脈不利陰脈不利則氣留之氣留之則陰氣盛矣陰氣大盛則陽氣弗能營也故曰關陰氣和陽故陰氣和利也陽氣盛不和於陰則陰氣澀也陰氣澀而停留則陰氣獨而盛也陰脈別走和陽故陽得通也陰既獨盛不和於陽則陽氣不能營陰故陰脈關閉也平按陽氣大盛甲乙作邪在臟三字不利甲乙作不和氣留兩氣字靈樞甲乙均作血弗能營甲乙作不得相營陽氣大盛則陰氣弗得營也故曰格陰陽俱盛弗得相營也故曰關格陽氣獨盛不和於陰則陰脈不能營陽以陽拒格故名格平按自上節故曰關及本節陽氣大盛則陰氣弗得營也甲乙無關格者不得盡期而死矣陰陽脈有關格即以其時與之短期不可極乎天壽者也五臟氣心主噫肺主咳肝主語脾主吞腎主欠噫乙戒反飽滿出氣也五臟從口中所出之氣皆是人常氣之變也素問腎主嚏不同也平按五臟氣素問作五氣所病五主字素問均作為欠下素問有為嚏二字六腑氣膽為怒胃為氣逆為噦小腸大腸為泄膀胱不約為遺溺下焦溢為水皆是六腑之氣所變之病素問胃為逆氣為恐腸為泄膀胱不利癃遺溺也平按素問無六腑氣三字膽為怒在遺溺下為噦下有為恐二字小腸大腸作大腸小腸為泄下有下焦溢為水五字膀胱下有不利為癃四字遺溺下無下焦溢為水五字五並精氣並於肝則憂並於心則喜並於肺則悲並於腎則恐並於脾則畏是謂精氣並於臟也精謂命門所藏精也五臟之所生也五精有所不足不足之臟虛而病也五精有餘所並之臟亦實而病也命門通名為腎肝之母也母實並子故為憂也心為火也精為水也水克於火遂壞為喜肺為金也水子並母故有悲憐精並左腎則腎實生恐脾為土也並於土被克生畏素問精並於脾消食生飢如是相併為病乃有無窮斯為陰陽五行之變也平按素問五並作五精所並心肺肝脾腎以次為序與此不同是謂精氣並於臟句作是謂五並虛而相併者也注左腎袁刻作於腎五惡肝惡風心惡熱肺惡寒腎惡燥脾惡濕此五臟氣所惡東方生風風生於肝肝之盛即便惡風以子從樹生子生多盛必衰本樹相生之物理皆然也故肝惡風也南方生熱熱從心生故心惡熱也素問曰西方生燥燥生於肺若爾則肺惡於燥今此肺惡寒腎惡燥者燥在於秋寒之始也寒在於冬燥之終也肺在於秋以肺惡寒之甚故言其終腎在於冬以腎惡燥不甚故言其始也中央生濕濕生於脾以其脾感故惡濕也平按素問五惡作五臟所惡心肺肝脾腎仍以次為序此五臟氣所惡句作是謂五惡又新校正節引此注自肺惡燥至言其始也止五液心主汗肝主淚肺主涕腎主唾脾主涎此五液所生汗者水也遍身腠理之液也心者火也人因熱飲熱食及因時熱蒸於濕氣液出腠理謂之汗也肝通於目目中出液謂之淚也肺通於鼻鼻中之液謂之涕也腎脈足少陰上至頏顙通出口中名之為唾故腎主唾也脾足太陰脈通於五穀之液上出廉泉故名為涎平按素問五液作五臟化液心肺肝脾腎仍以次為序五主字均作為此五液所生句作是謂五液五藏心藏神肺藏魄肝藏魂脾藏意腎藏精志五藏財浪反腎有二枚左箱為腎藏志也在右為命門藏精也平按五藏素問作五藏所藏精志精字素問無新校正云按上善云腎有兩枚左為腎藏志右為命門藏精與此正合五主心主脈肺主皮肝主筋脾主肌腎主骨平按五主素問作五臟所主肌素問作肉黃帝問於岐伯曰余聞方士或以腦髓為臟或以為腑或以腸胃為臟或以為腑敢問更相反皆自謂是不知其道願聞其說方道也異道之士所說臟腑不同腦髓骨脈膽及女子胞此六或有說之為臟或有說之為腑胃大腸小腸三焦膀胱此五或有說之為臟或有說之為腑所說臟腑相反何者為真平按素問黃帝問下無於岐伯三字岐伯曰腦髓骨脈膽及女子胞此六者地氣所生也皆藏於陰而象於地故藏而不瀉名曰奇恆之府胞豹交反生兒裹也地主苞納收藏腦髓等六法地之氣陰藏不瀉故得名臟以其聚故亦名府腑聚也此本非是常府乃是奇恆之府奇異恆常平按六者二字原缺謹依素問補入寫甲乙作瀉下同夫胃大腸小腸三焦膀胱者天氣之所生也其氣象於天故瀉而不藏此受五臟濁氣故名曰腑天主輸泄風氣雨露故此五者受於五臟糟粕之濁去於天氣輸瀉不藏故是恆府唯有五者以膽一種藏而不瀉割入奇府是肝之表故得名府也平按素問膀胱下有此五二字故名曰府作名曰傳化之府甲乙同此不能久留輸瀉魄門並精之處謂之魄門此五之中三焦亦能輸瀉精氣於魄門也平按輸瀉下素問甲乙有者也二字魄門二字屬下節亦為五臟使水穀不得久藏五臟在內為主六腑在外為使使之行於水穀也所謂五臟者藏精神而不瀉者也故滿而不能實精神遍於臟中不離故不瀉而滿也雖滿常虛故不實平按精神素問作精氣新校正云按全元起本及甲乙經太素精氣作精神與此正合六腑者實而不能滿所以然者水穀之入口則胃實而腸虛食下則腸實而胃虛故曰實而不滿腸胃更滿故為實也更虛故不滿也飽食未消腸中未有糟粕即胃實腸虛也食消以下於腸胃中未有食入即腸實胃虛也以其胃虛故氣得上也以其腸虛故氣得下也氣得上下神氣宣通長生久視平按六腑者下素問甲乙均有傳化物而不藏句問曰太陰陽明表裡也脾胃脈也生病異何也足太陰足陽明脾胃二脈諸經之海生病受益以為根本故別舉為問也平按太陰上甲乙有足字表裡上素問甲乙有為字生病異甲乙作生病異者素問作生病而異者答曰陰陽異位更實更虛更逆更順或從內或從外所從不同故病異名太陰為陰陽明為陽即異位也春夏陽明為實太陰為虛秋冬太陰為實陽明為虛即更虛實也春夏太陰為逆陽明為順秋冬陽明為逆太陰為順也手三陰從內向外也手三陽從外向內也足之三陰從外向內足之三陽從外向內也十二經脈陰陽六種不同生病固亦多也平按更實更虛更逆更順素問作更虛更實更逆更從又按素問新校正所引楊注與此正合黃帝曰願聞其異狀問其病異答曰陽者天氣也主外陰者地氣也主內故陽道實陰道虛陽為天氣主外故陽道實也陰為地氣主內故陰道虛也故犯賊風虛邪者陽受之食飲不節起居不時者陰受之風寒暑濕虛邪外入腠理則六陽之脈受之飲食男女不節則六陰受之平按甲乙陽受之下有則入腑三字陰受之下有則入臟三字本書在下陽受之則入六腑陰受之則入五臟六陽受於外邪傳入六腑六陰受於內邪傳入五臟也入六腑則身熱不時臥上為喘呼六腑陽氣在外故身熱也陽盛晝眠不得至夜故不時臥也陽氣盛於上故上為喘呼也平按不時臥甲乙作不得眠入五臟則䐜滿閉塞下為飧泄久為腸澼陰邪在中實則䐜脹腸滿閉塞不通虛則下利腸澼故喉主天氣咽主地氣肺為天也喉出肺中之氣呼吸故主天脾為地咽出脾胃噫氣故主地故陽受風氣陰受濕氣風從上下故陽受之濕從下上故陰受之故陰氣從足上行至頭而下循臂至指端陽氣從手上行至頭而下至足足三陰脈從足至頭走頭下胸橫出腋下循臂至指端為手三陰脈也變為手三陽脈從手指端上行至頭下行至足為足三陽陰陽相注如環無端平按兩下字下素問甲乙均有行字故曰陽病者上行極而下行陰病者下行極而上行故傷於風者上先受之傷於濕者下先受之陽病者三陰之脈上行至頭極已為陽受風熱已下行陰病者三陽之脈下行至足極已為陰受寒濕已上行故傷風上先受之傷濕下先受之平按而下行而上行兩行字素問甲乙無注風熱已已字袁刻作矣問曰見真臟曰死何也無餘物和雜故名真也五臟之氣皆胃氣和之不得獨用如至剛不得獨用獨用即折和柔用之即固也五臟之氣和於胃氣即得長生若真獨見無和胃氣必死期也欲知五臟真見為死和胃為生者於寸口診手太陰即可知之也見者如弦是肝脈也微弦為平好也微弦謂弦之少也三分有一分為微二分胃氣與一分弦氣俱動為微弦也三分並是弦氣竟無胃氣為見真臟也見真臟死其理至妙請陳其理故曰何也平按素問新校正引此注甚詳答曰五臟者皆稟氣於胃胃者五臟之本也五臟不能自致於手太陰必因於胃氣乃能至手太陰胃受水穀變化精氣而資五臟故五臟得至手太陰寸口見於微弦也故五臟各以其時自為而至手太陰五臟主於五時至其時也其臟有病之甚者胃氣不與之居不因胃氣以呼吸之力獨自至於太陰寸口見於真弦也平按自字原缺謹依素問補注不與之居別本居作俱故邪氣勝者精氣衰真臟脈弦不微無胃氣者則知肝病勝也肝病邪勝則胃穀精氣衰故病甚者胃氣不能與之俱至於手太陰故真臟之氣獨見獨見者為病勝臟也故曰死黃帝目善真見病甚故致死也平按自問曰見真臟至此新校正謂全元起本在太陰陽明表裡篇中此乃王氏所移今檢素問太陰陽明論篇前後均在此篇惟此一段在玉機真臟論中其為王氏所移益信問曰脾病而四肢不用何也五臟皆連四肢何因脾病獨四肢不用也平按脾字原缺謹依素問補入答曰四肢皆稟氣於胃而不得徑至必因脾乃得稟今脾病不能為胃行其津液四肢不得稟水穀氣氣日以衰脈道不利筋骨肌肉皆無氣生故不用焉土旺四季四季皆有土也脾長四臟四臟皆有脾也何者四肢百體稟氣於胃胃以水穀津液資四肢當用資四肢之時胃氣不能徑到四肢要因於脾得水穀津液營衛之氣營於四肢四肢稟承方得用也若其脾病脈道不通則筋骨肌肉無氣以生故不用也平按徑至袁刻誤作俱至素問作至經新校正云太素至經作徑至楊上善云胃以水穀資四肢不能徑至四肢要因於脾得水穀津液營衛於四肢與此注合不利甲乙作不通皆無氣生素問作皆無氣以生甲乙同問曰脾之不主時何也答曰脾者土也治中央常以四時長四臟各十八日寄治不得獨主時脾臟有常著土之精也四臟之本皆為土也十八日用故曰寄也著澄略反在也脾臟在土之精妙也平按治中央甲乙作土者中央不得獨主時甲乙無得字素問作不得獨主於時也脾臟有常著甲乙作脾者土臟常著胃素問作脾臟者常著胃土者主萬物而法天地故上下至頭足不得主時土為萬物之質法於天地與萬物為質故身與頭手足為體身不別主時平按主素問甲乙作生天地天字主時二字原缺謹依素問甲乙補問曰脾與胃也以募相逆耳而能為之行津液何也脾陰胃陽脾內胃外其位各別故相逆也其別異何能為胃行津液氣也一曰相連脾胃表裡陰陽募既相假故曰相連也平按以募相逆素問作以膜相連耳新校正云按太素作以募相逆楊上善云脾陰胃陽脾內胃外其位各異故相逆也又注故相下原抄缺二字依新校正所引應作逆也二字袁刻相上脫故字逆下脫也字又注陰陽募袁刻募誤作前答曰足太陰三陰也脈貫胃屬脾絡嗌故太陰為之行氣於三陰嗌於末反咽也足太陰脈貫胃屬脾上行絡嗌其氣強盛能行三陰之脈故太陰脈得三陰名也平按脈上素問甲乙有其字陽明者表也五臟六腑之海也亦為之行氣於三陽臟腑各因其經而受氣於陽明故為胃行其津液四肢不得稟水穀之氣日以益衰陰道不利筋骨脈肉皆毋氣以主故不用焉陽明為陰陽臟腑之海五臟六腑各因十二經脈受氣於陽明故經脈得為胃行津液之氣四肢稟承四肢得經脈不陽明則陰脈不通筋骨脈肉無氣以主也平按陽明者表也者表二字原缺謹依素問甲乙補入水穀下素問甲乙無之字日以益衰甲乙作氣日以衰脈肉二字原缺素問甲乙作肌肉依本注應作脈肉
