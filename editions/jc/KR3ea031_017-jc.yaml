body:
  text: 卷第十七卷首缺只餘卷尾篇目亦缺證候之一平按此篇自此五色之死也以上殘缺篇目亦不可考故自心之合脈也至白如枯骨者死從素問五藏生成篇補入自此五色之死也至針之緣而去也見素問卷三第十五藏生成篇又見甲乙經卷一第十五惟編次小異自目色赤至末見靈樞卷十一第七十四論疾診尺篇又見甲乙經卷十二第四心之合脈也其榮色也其主腎也肺之合皮也其榮毛也其主心也肝之合筋也其榮爪也其主肺也脾之合肉也其榮唇也其主肝也腎之合骨也其榮發也其主脾也是故多食鹹則脈凝泣而變色多食苦則皮槁而毛拔多食辛則筋急而爪枯多食酸則肉胝䐢而唇揭多食甘則骨痛而發落此五味之所傷也故心欲苦肺欲辛肝欲酸脾欲甘腎欲咸此五味之合五臟之氣也平按素問作此五味之所合也五臟之氣新校正云按全元起本云此五味之合五臟之氣也連上文太素同故色見青如草茲者死黃如枳實者死黑如炱者死赤如衃血者死白如枯骨者死以上從素問五藏生成篇補入此五色之死也茲青之惡色也炱音苔謂草煙棲聚炱煤黑之惡色也衃凝惡之血也枯骨白之惡色也平按素問之下有見字青如翠羽者生黑如烏羽者生赤如雞冠者生黃如蟹腹者生白如豕膏者生此五色見而生者也此五者皆病候不死者色也平按素問黑如烏羽者生在白如豕膏者生下見而生者也作之見生也甲乙羽下冠下腹下膏下均無者生二字生於心如以縞裹朱生於肺如以縞裹紅生於肝如以縞裹紺生於脾如以縞裹栝蔞生於腎如以縞裹紫此五臟所生之榮也縞工道反白練此五者皆是無病平人之色也平按甲乙樓作蔞蔞下有實字素問榮上有外字甲乙同味當五臟白當肺辛赤當心苦青當肝酸黃當脾甘黑當腎咸此言五味藏色所當也平按素問味上有色字故白當皮赤當脈黃當肉青當筋黑當骨此言五事五色所當也平按素問青當筋在黃當肉上諸脈者皆屬於目諸髓者皆屬於腦諸筋者皆屬於肝諸血者皆屬於心諸氣者皆屬於肺此四肢八溪之朝夕也諸脈髓筋血氣等五屬血氣皆於四肢八溪朝夕往來八溪八脈也平按素問肝作節故人臥血歸於肝肝受血而能視足受血而能步掌受血而能握指受血而能捕人臥之時肝足掌手指四事皆受作於四能有所用也平按捕素問作攝注指上手字據經文肝足掌指四事疑衍臥出而風吹之血涘而膚者為痹涘於脈者為泣涘於足者為厥出不覆身也臥不覆身為風所吹寒風入腠血寒凝聚積膚為痹積脈血澀積足為厥厥逆也平按涘素問作凝而膚而字素問作於應依素問為允此五者血行而不得反其故空為厥痹此諸五者為得寒邪入血凝澀不得流入空竅中故聚為足厥之病有三無五五當字誤也平按五素問作三故空素問作空故據本注應依素問為允人有大谷十二分小溪三百五十四名小十二關此皆衛氣之所留止邪氣之所容也針之緣而去也小曰溪大曰谷溪谷皆流水處也故十二經脈名為大谷三百六十五絡名曰小溪據前後體例無五十四手足十二大節名十二關此等溪谷關節皆是氣之行止之處故為衛氣所留邪氣所容緣此針石行之以去諸疾也平按小十二關素問作少十二俞新校正云太素俞作關容素問作客針之緣而去也素問作針石緣而去之目色赤者病在心白在肺青在肝黃在脾黑在腎黃色不可名者病在胸中惡黃之色不可譬喻言之言之故不可名之也平按甲乙白青黃黑下均有色者病三字
