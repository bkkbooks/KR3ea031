body:
  text: 卷第二十二九針之二刺法平按此篇自皇帝曰持針縱舍奈何以上袁刻及別抄本均缺楊惺吾氏日本卷子抄本自篇目刺法左一行上二字仍缺第三字至第七字有問岐伯曰余五字以下至注半反衝也上覆缺計共缺六行每行十八字除去問岐伯曰餘五字並問字上所空二格外下共缺一百零一字應空一百零一格自黃帝曰持針縱舍奈何至故拘攣見靈樞卷十第七十一邪客篇又見甲乙經卷五第七自黃帝問岐伯曰余聞針道於夫子至則經可通也見靈樞卷六第三十八逆順肥瘦篇又見甲乙經卷五第六自黃帝問曰逆順五體至末見靈樞卷二第五根結篇甲乙經同上問岐伯曰余半反沖也謂沖皮也黃帝曰持針縱舍奈何岐伯對曰必先明知十二經之本末起處為本出處為末膚之寒熱皮膚熱即血氣通寒即脈氣壅也平按膚上靈樞甲乙有皮字脈之盛衰滑澀其脈滑而盛者病日進虛而細者久而持陽氣盛而微熱謂之滑也多血少氣微寒謂之澀脈細微平按而持靈樞甲乙作以持大以澀者為痛痹多氣少血為大多血少氣為澀故為痛痹也陰陽如一者瘤難治其本末陰陽之脈不可辨故如一也瘤懸疣類也以不可辨故本末難療也平按瘤靈樞甲乙作病其上甲乙有察字上熱者病尚在其熱以衰者其病亦去矣頭及皮膚熱也其頭及皮膚熱衰病必去平按上熱靈樞作尚熱甲乙作上下熱以衰靈樞甲乙作已衰注去上袁刻脫必字因持其尺察其肉之堅脆小大滑澀寒溫燥濕也持尺皮膚決死生也平按持上靈樞無因字因視目之五色以知五臟而決死生五臟之精華並歸於目心藏視其血脈察其五色以知其寒熱痛痹候色脈尺平按甲乙無其字注右方有候色脈尺四字左方缺應空四小格黃帝曰持針縱舍余未得其意也針縱舍故重問也岐伯曰持針之道欲端以正安以靜持針當穴故端正以志不亂故安靜也先知虛實而行疾徐補瀉所由也左指執骨右手修之毋與肉果之堅固故曰執骨之手修不可傷肉果也果音顆平按靈樞甲乙左指作左手修之作循之果下無之字瀉欲端以正補必閉膚直入直出故曰端正平按端下甲乙無以字補袁刻誤作萌注直入上原缺二字上一字不可辨下一字右方有欠字平據經文擬作瀉欲二字轉針導氣邪得淫泆真氣得居淫泆泄出令真氣居而不散也平按邪得淫泆甲乙作邪氣不得淫泆黃帝曰扞皮開腠理奈何岐伯曰因其分肉在別其膚膚皮也以手按得分肉之穴當穴皮上下針故曰在別其膚也平按在別靈樞甲乙作左別微內而徐端之適神不散邪氣得去黃帝曰善瀉法雖以審詳為先故曰微內而徐正之得酒調也平按注雖以下原缺六字上三字不可考下三字右方作必余余平擬作端正而必徐徐六字黃帝問岐伯曰人有八虛各何以候岐伯答曰以候五臟八虛者兩肘兩腋兩髀兩膕此之虛故曰八虛以其虛故真邪二氣留過故為機關之室真過則機關動利邪留則不得屈伸故此八虛候五臟之氣也平按各何以候袁刻作各以何候曰上袁刻脫答字黃帝曰候之奈何岐伯曰肺心有邪其氣留於兩肘兩肘肺脈手太陰心脈手少陰二脈所行故肺心有邪肘為候也肝有邪其氣留於兩腋兩腋脅下肝氣在中肝有邪腋為候也脾有邪其氣留於兩髀脾足太陰脈循股內前廉入腹故脾有邪髀為候也腎有邪其氣留於兩膕腎脈足少陰出膕內廉故腎有邪膕為候也凡此八虛者皆機關之室真氣之所過血絡之所遊邪氣惡血因不得住留留則傷筋絡骨節機關不得屈伸故痀攣此八大節相屬虛處乃是之動機關又機關之室痀其俱反曲脊背偃也平按因不得住留靈樞作固不得住留故痀攣靈樞作故病攣也黃帝問岐伯曰余聞針道於夫子眾多畢悉矣夫子之應若失而據未有堅然者夫子之問學熟乎將審察於物而生乎據依也堅定也言夫子所說九針之應曲從物理而變似未有定為也夫子所問所學從誰得乎心手也平按靈樞應上有道字而生乎作而心生之乎岐伯答曰聖人之為道者上合於天下合於地中合於人事必有明法以起度數法式檢押乃後可傳焉合理乃後傳之三合而為法度故可傳也故匠人不能釋尺寸而意短長廢繩墨而起水平也工人不能置規而為圓去矩而為方匠人尺寸之度非以意而為短長准不有私而水為巧也工為置欲為為棄矩而妙此為大工也聖人之為教也法自然之至理以起法度為而稱聖人也平按注匠人下原缺一字謹擬作準不有私上原缺四字謹依經文作繩墨之法四字水字上原缺一字水字下原缺二字為下原缺一字謹依經文作而起水平以為技巧也工下原缺一字為下原缺二字置下原缺四字謹依經文作工欲為員無置規而為能無棄矩上原缺二字而下原缺一字謹依經文作欲為方亦無棄矩而為妙法度下原缺一字謹擬作之稱上原缺一字謹擬作後知用此者固自然之物易用之教逆順之常繩墨非他亦自然之繩墨因其自然故其教用易是故違之則為逆順之得常也平按固自然之物據注固應作因注違之袁刻作遵之黃帝曰願聞自然奈何岐伯曰臨深決水不用功力而水可竭也循掘決沖而經可通此言氣之滑澀血之清濁行之逆順夫自然者非為自能與也所謂因氣之滑澀血之清濁行之逆順通之如臨深決水取自然之便而水可竭故曰自然也平按循掘掘字原缺靈樞甲乙作掘下經文亦作掘袁刻作地恐誤決衝下甲乙有不顧堅密四字此言此字原缺靈樞甲乙作此袁刻作於恐誤注夫自然者袁刻脫自字黃帝曰願聞人之白黑肥瘦少長各有數乎白黑色異也肥瘦形異也少長強弱異也刺之淺深多為分不同故曰有數也平按注多下恐脫少字岐伯曰年質壯大血氣充盈膚革堅固因加以邪刺此者深而留之此為肥人平按盈甲乙作盛注此為肥人靈樞甲乙作經文廣肩腋項肉薄皮厚而黑色唇臨臨然其血黑而濁其氣澀其為人貪於取與刺此者深而留之多益其數此黑色人也平按皮厚靈樞甲乙作厚皮臨臨然下甲乙有者字澀下靈樞甲乙有以遲二字取與甲乙作取予黃帝曰刺瘦人奈何岐伯曰刺瘦人者薄皮色少肉廉廉然薄唇輕言其血清氣滑易脫於氣易損於血刺此者淺而疾之瘦人謂夭皮也平按注夭下原缺二字謹依經文擬作色薄二字袁刻夭作天皮作人黃帝曰刺常人奈何岐伯曰視其白黑各為調之其端正長厚者其血氣和調刺此者無失常數之常謂平和不肥瘦人刺之依於深淺常數不深之不淺之也平按長厚靈樞作敦厚甲乙作純厚常數之靈樞作常數也甲乙作其常數黃帝曰刺壯士真骨者奈何岐伯曰刺壯士真骨堅肉縱節監監然此人重則氣澀血濁刺此者深而留之多益其數壯士骨堅大者也平按縱節靈樞甲乙作緩節堅堅甲乙作驗驗注一作監監注骨下原缺一字謹擬作節勁則氣滑血清刺此淺而疾之勁急也黃帝曰刺嬰兒奈何岐伯曰嬰兒者其肉脆血少氣弱刺此者以豪針淺刺而疾髮針日再可也刺嬰兒日再者不得過多也黃帝曰臨深決水奈何岐伯曰血清氣滑疾瀉之則氣竭焉自有血清氣滑刺之如臨深決水不可行也若血濁氣澀而形壯氣盛可取自然之便刺而瀉之如臨深決水平按氣滑靈樞甲乙作氣濁黃帝曰循掘決沖奈何岐伯曰血濁氣澀疾瀉之則經可通也循其血氣掘決其沖瀉而通之使其平也黃帝問曰逆順五體言人骨節之小大肉之堅脆皮之薄厚血之清濁氣之滑澀脈之長短血之多少經絡之數余已知之矣此皆布衣匹夫之士也平按逆順五體甲乙作逆順五體經絡之數直接下文此皆布衣匹夫之士也無言人骨節之小大及余已知之矣數句夫王公大人血食之君身體柔脆肌肉耎弱血氣慓悍滑利其刺之徐疾淺深多少可得同乎平按夫王公大人血食之君甲乙作血食者三字注云九墟作血食之君靈樞耎弱作軟弱岐伯答曰夫膏粱菽藿之味何可同也氣滑則出疾氣澀則針大而入深深則欲留淺則欲疾以此觀之刺布衣者深以留刺大人者微以徐此皆因氣慓悍滑利者也脈氣五十動有代者順也不滿五十動一代者逆也言大人食以膏粱布衣故刺之深淺去留之異也平按氣滑則出疾下靈樞有其氣澀則出遲氣悍則針小而入淺甲乙同惟氣澀上無其字注布衣二字下原缺八字袁刻補食以菽藿四字仍與缺處未盡合謹依經文擬作匹夫之士食以菽藿八字黃帝問曰形氣之逆順奈何岐伯答曰形氣不足病氣有餘是邪勝也急瀉之急瀉邪氣補形氣也形氣有餘病氣不足急補之急以正氣補之氣實則病除也形氣不足病氣不足此陰陽氣俱不足也不可刺之刺之則重不足重不足則陰陽俱竭血氣皆盡五臟空虛筋骨髓枯老者絕滅壯者不復矣俱不足者不可行刺宜以湯藥調也形氣有餘病氣有餘此謂陰陽俱有餘也急瀉其邪調其實虛故曰有餘者瀉之不足者補之此之謂也形氣為陽病氣為陰俱有餘者可以瀉邪氣以調形氣使和也平按注陰下原缺一字右方剩氣字半形謹擬作氣袁刻脫故曰刺不知逆順真邪相薄滿而補之則陰陽四溢腸胃充郭肝肺內瞋陰陽相錯滿而補之陰陽之氣滿於故曰四溢腸胃氣聚所以脹而充郭肝肺俱滿故曰內瞋叱鄰反陰陽俱盛所以相錯也平按甲乙四溢作血氣皆溢內瞋作內脹注滿於下原缺二字上一字不可考下一字下半剩又字謹擬作四肢二字虛而瀉之則經脈空虛血氣竭枯腸胃攝闢皮膚薄著毛腠夭焦予之死期攝闢腸胃無氣也攝紙輒反平按竭枯甲乙作枯竭攝靈樞作㒤甲乙作懾焦靈樞作膲故曰用針之要在乎知調調陰與陽精氣乃光合形與氣使神內藏光章盛貌神內藏者五神守藏也平按知調下原缺一字靈樞作陰與陽調陰與陽七字甲乙重調字謹依甲乙擬作調乃光甲乙作乃充使神內藏使字原缺謹依靈樞甲乙補作使袁刻作五故曰上工平氣中工亂經下工絕氣危生故下工不可不慎也平氣致氣和也下工守形不知氣傷口實故不可不慎也平按甲乙無故下工三字注氣傷上原缺一字謹依經文擬作平傷下原缺二字謹擬作生損二字必審其五臟變化之病五脈之應經絡之實虛皮之柔粗而後取之五脈五時之脈也柔粗謂調尺之皮膚柔弱粗強也平按審下靈樞無其字甲乙審作察變化上有之字下無之病二字應上有相字皮下有膚字九針所主平按此篇自篇首至末見靈樞卷二第七官針篇又見甲乙經卷五第二惟編次前後略異九針之要官針最妙官者謂用針時於針也平按九針之要靈樞甲乙作凡刺之要九針之宜各有所為長短大小各有所施不得其用病不能移病淺針深內傷良肉皮膚為癕平按癕靈樞甲乙作癰病深針淺病氣不瀉反為大膿病小針大氣瀉大疾必後為害病大針小大氣不瀉亦復為敗夫針之宜大者大瀉小者不移已言其過請言其所施言九針之用所宜各異並言用法也平按大疾靈樞甲乙作太甚必後為害靈樞作疾必為害甲乙作病後必為害大氣不瀉靈樞作氣不瀉泄亦復為敗甲乙作亦為後敗病在皮膚無常處者取以鑱針於病所膚白勿取鑱針頭大末兌主瀉陽氣故皮膚痛無常處陽氣盛也痛處膚當色赤故白處痛移不可取也病在分肉間者取以員針於病所員針之狀鋒如卵揩摩分間內不傷肌以瀉分氣也平按注狀下袁刻脫鋒字卵下袁刻多一形字病在脈氣少當補者取以鍉針於井滎分輸鍉針之狀鋒如黍粟之兌主當行補於井滎之輸以致於氣也平按滎甲乙作營袁刻作榮病為大膿者取以䤵針䤵針之狀末如劍鋒以取大膿也平按大膿者甲乙作大膿血䤵靈樞甲乙作鈹病痹氣暴發者取以員利針員利針狀如耗耗毛也用取暴痹痹病氣痛而不去者取以豪針豪針之狀尖如蚊虻之喙靜以徐往留之養神以取痛痹也平按痹病靈樞作病痹病在中者取以長針長針之狀鋒利身薄以取臟中遠痹也病為水腫不能過關節者取以大針大針之狀尖如筳筳如平筳其鋒微圓以通關節也平按靈樞過作通注狀下袁刻脫尖字病在五臟固居者取以鋒針瀉於井滎分輸取以四時鋒針之狀刃三隅以發固居之疾瀉於井滎分輸取以四時也平按甲乙輸作俞三刺平按此篇自所謂三刺至不可以為工也見靈樞卷二第七官針篇又見甲乙經卷五第二自凡刺之屬三刺至谷至末見靈樞卷二第九終始篇又見甲乙經卷五第五所謂三刺則穀氣出者先淺刺絕皮以出陽邪三刺者陽邪刺陰邪刺穀道氣刺也陽邪浮淺在皮故一刺淺之陽邪得出也平按三刺下甲乙有之字再刺則陰邪出者少益深絕皮致肌肉未入分間也陰邪次深在於肌肉故再刺出之也平按分下靈樞甲乙有肉字已入分肉之間則穀氣出穀氣者正氣也故後刺極深以致正氣也平按甲乙已入上有後刺深之四字故刺法曰始刺淺之以逐邪氣而來血氣後刺深之以致陰氣之邪最後刺極深之以下穀氣此之謂也逐邪氣者逐陽邪來血氣引正氣也下穀氣不下引之令下也平按以逐邪氣甲乙作以逐陽邪之氣無而來血氣四字以致陰氣之邪甲乙作以致陰邪之氣故用針者不知年之所加氣之衰盛虛實之所起不可以為工也人之大忌七歲以上次第加九至一百六名曰年加也不知年加氣之衰盛虛實為不知也凡刺之屬三刺至谷三刺得於穀氣也平按靈樞甲乙谷下有氣字邪僻妄合陰陽二邪妄與正氣相合一也陰陽易居臟腑一氣相乘名曰易居二也平按甲乙易居作移居逆順相反營氣逆肺衛氣順脈以為相反三也沉浮異處春脈或沉冬脈或浮故曰異處四也四時不得謂四時脈不相順五也平按甲乙不得作不相得稽留淫泆言血氣或有稽留壅遏或有淫泆過度六也須針而去以此六過故須微針以去之也一刺則陽邪出再刺則陰邪出三刺則穀氣至穀氣至而止所謂穀氣至者已補而實已瀉而虛故以知穀氣至也已補而實已瀉而虛皆正氣至故病愈也平按甲乙一刺再刺下均無則字穀氣至三字不重邪氣獨去者陰與陽未能調而病知愈也行補瀉已邪氣已去以陰陽未調病雖不愈後必愈矣故曰補則實瀉則虛痛雖不隨針減病必衰去矣引上經證也平按痛甲乙作病靈樞針下無減字陰盛而陽虛先補其陽後瀉其陰而和之陰虛而陽盛先補其陰後瀉其陽而和之重實瀉之為易重虛補之為難故先補後瀉也三脈重足大趾之間三脈足陽明足厥陰足太陰三脈也足太陰脈起足大趾端循趾內側白肉際過核骨後上內踝不言大趾岐間此言重在大趾間者從大趾端循大趾內側入大趾間以過核骨而上也足厥陰脈起大趾叢毛上入大趾間重在太陰之上上循足跗足陽明支別跗上入大趾間重在厥陰之上平按重靈樞甲乙作動甲乙經注云一作重又注重字原抄均作重袁刻易作動必審其實虛虛而瀉之是謂重虛重虛病益甚必審大趾間三脈虛實以手按之先補虛者後瀉實者若不知三脈有實瀉其虛者是謂重虛重虛病益甚也凡刺此者以指按之脈動而實且病者疾瀉之虛而徐者則補之反此者病益甚其重也陽明在上厥陰在中太陰在下三脈有動而實者有徐而虛者皆審調補瀉也平按而實且病者靈樞甲乙病作疾甲乙疾瀉之作則瀉之其重也靈樞甲乙重作動甲乙注云一作重太陰在下靈樞甲乙作少陰在下膺輸中膺背輸中背膺輸在胸中背輸在背中也平按輸靈樞甲乙作腧肩髆虛者取之上補肩髃肩井等穴曰取之上也平按髆靈樞作膊甲乙作髀重舌刺舌柱以䤵針重舌謂舌下重肉生也舌柱舌下柱以䤵針刺去血也平按䤵靈樞甲乙作鈹手屈而不伸者其病在筋伸而不屈者其病在骨在骨守骨在筋守筋腎足少陰脈主骨可守足少陰脈發會之穴以行補瀉肝足厥陰脈主筋可守足厥陰脈發會之穴以行補瀉也補須一方實深取之希按其痏以極出其邪氣量此補下脫一瀉字方處也欲行瀉者須其瀉處是實然後得為瀉也深取之者令其出氣多也希遲也按其痏者遲按針傷之處使氣泄也平按希靈樞甲乙作稀痏袁刻誤作病注同一方虛淺刺之以養其脈疾按其痏無使邪氣得入行於補者須補處是虛也淺刺者惡其泄氣所以不深也以養其脈者留針養其所取之經也按其痏者按針傷之處疾關其門使邪氣不入正氣不出也邪氣來也堅而疾穀氣來也徐而和針下得氣堅疾者邪氣也徐和者穀氣也平按堅靈樞甲乙作緊脈實者深刺之以泄其氣脈虛者淺刺之使精氣無得出以養其脈獨出其邪氣實者邪氣盛也虛者正氣少也刺諸痛者深刺之諸痛者其脈皆實脈之實滿為痛故刺深也平按靈樞無深刺之諸痛者六字從腰以上者手太陰陽明皆主之從腰以下者足太陰陽明皆主之腰以上為天肺主天氣故手太陰手陽明主之也腰以下為地脾主地土故足太陰足陽明主之也平按靈樞從腰以上者上有故曰二字甲乙兩主之上無皆字病在上者下取之病在下者高取之手太陰下接手陽明手陽明下接足陽明足陽明下接足太陰以其上下相接故手太陰陽明之上有病宜療足太陰陽明故曰下取之足太陰陽明之下有病宜療手太陰陽明故曰高取之也平按注故手太陰陽明下袁刻脫之上二字病在頭者取之足病在腰者取之膕足之三陰三陽之脈從頭至足故病在頭取之足也足太陽脈循腰入膕故病在腰以取膕也病生於頭者頭重生於手者臂重生於足者足重治病者先刺其病所從生者頭手足有病之處其候皆重各審其病生所由以行補瀉也春氣在豪毛人之豪毛中虛故春之陽氣在豪毛平按靈樞無豪字夏氣在膚膚肉上也陽氣在皮肉也平按膚上靈樞甲乙有皮字秋氣在分肉分肉謂膕肉分間也冬氣在筋骨筋附骨上最深故冬陽氣深在筋骨也刺此病者各以其時為齊故刺肥人者以秋冬之齊刺瘦人者以春夏之齊秋冬之齊者刺至筋骨言其深也春夏之齊刺在於皮膚言其淺也平按甲乙為齊下無故字病痛者陰也痛而以手按之不得者陰也深刺之人之病痛以手按之得與病在深在平按甲乙病痛者作刺之痛者病在上者陽也在下者陰也癢者陽也淺刺之衛氣行皮膚之中壅遏作癢故淺刺之也平按甲乙癢者陽也淺刺之七字在病在上者上注衛氣袁刻作沖氣病先起於陰者先治其陰而後治其陽病先起於陽者先治其陽而後治其陰皆療其本也平按靈樞兩起字下無於字刺熱厥者留針反為寒刺寒厥者留針反為熱留久者則無熱動針留之為寒無寒靜針留之為熱也刺熱厥者二陰一陽刺寒厥者二陽一陰所謂二陰者二刺陰也一陽者一刺陽也皮為陽分也肌肉為陰分也刺熱厥者二度刺陰留補其陰也一度刺陽留瀉其陽也刺寒反之平按自刺熱厥者留針反為寒至一刺者陽也甲乙針道終始篇無此二段久病者邪氣入深刺久病者深內而久留之間日而復刺之先調其左右去其血脈刺道畢矣病久益深物理之恆故非深取久留不可去之邪氣不能速出故須間日而取取之氣調左右血絡刺而去之可謂盡刺之理者也平按刺久病者靈樞甲乙作刺此病者凡刺之法必察其形氣形肉未脫少氣而脈又躁躁厥者必為繆刺之以下繆刺之法也形肉未脫察其形也少氣察其氣也脈躁察其脈也有此三種所由必須繆刺大絡左刺右右刺左也散氣可收聚氣可希希散也繆刺之益正氣散而收聚邪氣聚而可散也平按希靈樞甲乙作布恐原抄傳寫之誤深居靜處為針調氣凡有六種深靜一也與神往來去妄心隨作動二也平按與靈樞甲乙作占注隨作二字袁刻缺此本尚完閉戶塞牖魂魄不散去馳散守魂魄三也專意一神精氣不分去異思守精神四也平按不分靈樞甲乙作之分無聞人聲以收其精去異聽守精氣五也必一其神令之在針淺而留之微而浮之以移其神氣至乃休休平和也平針下和氣六也平按令之在針靈樞甲乙作令志在針微而浮之下原抄缺半行細玩殘缺處中間筆畫甚重應是大字經文謹依靈樞甲乙補入以移其神氣至乃休八字男內女外堅巨勿出謹守勿內是謂得氣男者在家故為內也女者出家故為外也是男為內氣女為外氣針下得男內氣堅巨勿令出也得女外氣謹守勿令入內也平按男內女外靈樞注云有作男外女內甲乙作男女內外巨靈樞甲乙作拒三變刺平按此篇自篇首至末見靈樞卷二第六壽夭剛柔篇又見甲乙經卷十第一黃帝問曰余聞刺有三變何謂三變伯高答曰有刺營者有刺衛者有刺寒痹之留經者黃帝問曰刺三者奈何平按靈樞三下有變字伯高曰刺營者出血刺衛者出氣刺寒痹者內熱刺營見血出惡血也刺衛見氣出邪氣也刺痹見熱故曰三變寒溫之氣停留於經絡久留針使之內熱以去其痹也平按注寒溫溫字恐系濕字傳寫之誤黃帝問曰營衛寒痹之為病奈何伯高答曰營之生病也寒熱少氣血上下行衛之生病也氣痛時來時去怫愾賁響風寒客於腸胃之中寒痹之為病也留而不去時痛而皮不行怫愾上扶物反下訢氣反氣盛滿貌賁響腹脹貌也平按氣痛時來時去靈樞作氣通時來時去甲乙作氣血時來去皮不行靈樞甲乙作皮不仁黃帝問曰刺寒痹內熱奈何伯高曰刺布衣者必火焠刺大人者藥熨之平按靈樞甲乙必火焠作以火焠之藥上有以字黃帝問曰藥熨之奈何伯高曰用醇酒二十升蜀椒四升乾薑一升桂一升平按醇酒二十升靈樞作二十斤蜀椒四升靈樞甲乙作一升乾薑一升靈樞作一斤桂一升靈樞作桂心一斤凡四種皆㕮咀漬酒中用綿絮一斤細白布四丈平按甲乙皆㕮咀作各細㕮咀漬酒中作著清酒中四丈下有二尺二字皆並內酒中置酒馬矢溫中蓋封塗勿使泄平按溫靈樞甲乙作熅蓋甲乙作善甲乙泄上有氣字五日五夜出布綿絮曝乾復漬以盡其汁平按甲乙絮上無綿字靈樞曝乾下有之干二字每漬必晬其日乃出干平按乃出干靈樞干下重一干字甲乙作乃出布絮干之並用滓與綿絮復布為復巾長六七尺為六七巾平按與綿絮復布為復巾長六七尺為六七巾甲乙作與絮布長六七尺為六巾即用之生桑炭灸巾以熨寒痹所刺之處平按甲乙所刺作所乘令熱入於病所平按靈樞甲乙入下有至字寒復灸巾以熨之三十遍而止即汗出灸巾以拭身平按靈樞作汗出以巾拭身亦三十遍而止起步內中無見風每刺必熨如此法病已矣此所謂內熱者也酒椒薑桂四物性熱又泄氣故用之熨身皮腠適而可刺也此在冬日血氣不流之時熨之令通也㕮弗禹反咀才與反㕮咀謂調粗細分等也晬祖賴反一日周時也平按如此法病已矣靈樞甲乙無法字矣甲乙作失五刺平按此篇自篇首至末見靈樞卷二第七官針篇又見甲乙經卷五第二凡刺有五以應五臟一曰半刺半刺者淺內而疾髮針令針傷多如拔髮爪以取皮氣此肺之應凡刺不減一分今言半刺當是半分故以拔髮爪欲令淺刺多則恐傷氣也平按毋令針傷多靈樞甲乙作無針傷肉發爪靈樞作毛狀取上無以字甲乙爪作狀二曰豹文刺豹文刺者刺左右前後針之中脈為故以取經絡之血者此心之應也左右前後針痏狀若豹文故曰豹文刺也中經及絡以出血也平按靈樞甲乙左右上無刺字三曰關刺關刺者直刺左右盡筋上以取筋痹慎無出血此肝之應也或曰開刺一曰豈刺刺關身之左右盡至筋上以去筋痹故曰關刺或曰開刺也平按開刺靈樞作淵刺甲乙同惟或曰淵刺又曰豈刺八字在四曰合刺之下四曰合刺合刺者左右雞足針於分肉之間以取肌痹此脾之應也刺身左右分肉之間痏如雞足之跡以合分肉間之氣故曰合刺也平按合刺靈樞甲乙作合谷刺五曰輸刺輸刺者直入直出深內之至骨以取骨痹此腎之應也依於輸穴深內至骨以去骨痹故曰輸刺也平按輸刺甲乙作腧刺五臟刺平按此篇自篇首至末見靈樞卷五第二十五邪篇又見甲乙經卷九自第三至第八等篇邪在肺則病皮膚寒熱上氣喘汗出咳動肩背肺病有五平按皮膚下靈樞有痛字甲乙有痛發二字取之膺中外輸背三椎五椎之旁以手疾按之快然乃刺之取之缺盆中以起之膺中內輸在膺前也膺中外輸肺輸也在背第三椎兩旁心輸在第五椎兩旁各相去三寸按之快然此為輸也肺之五病取於肺輸及肺缺盆中也平按輸靈樞作腧甲乙作俞三椎五椎靈樞作三節五臟甲乙無五椎二字以起之靈樞甲乙作以越之邪在肝則兩脅中痛寒中惡血在內行者善瘛節時腫肝病有四也平按則兩脅中痛甲乙作則病兩脅中痛行者善瘛節時腫靈樞作行善掣節時腳腫甲乙作胻節時腫善瘛取之行間以引脅下行間足厥陰脈滎肝脈也在大趾間肝在脅下故引兩脅下痛與明堂少異也補三里以溫胃中三里足陽明胃脈人病寒中陽虛也故取三里補足陽明即胃中溫也取血脈以散惡血惡血在內上下行者取其病處脈血見者刺而散之也取耳間青脈以去其痹耳間青脈附足少陽脈瘈脈一名資脈在耳本如雞足青脈絡刺出血如豆可以去痹也平按痹靈樞作掣甲乙作瘈注附袁刻作跗邪在脾胃則肌肉痛陽氣有餘陰氣不足則熱中善飢陽氣不足陰氣有餘則寒中腸鳴腹痛陰陽俱有餘若俱不足則有寒有熱皆調於三里陽氣即足陽明也陰氣即足太陰也此脾之七病皆取三里以行補瀉故曰調之平按則肌肉痛靈樞甲乙作病肌肉痛善飢袁刻誤作善肌皆調於三里甲乙作皆調其三里邪在腎則骨痛陰痹陰痹者按如不得腹脹腰痛大便難肩背頸項痛時眩取之湧泉崑崙視有血者盡取之湧泉足少陰脈井足心陷中屈足卷趾宛中崑崙足太陽經在外踝後跟骨上陷中腎之痹病皆取此二穴刺去血也平按則骨痛靈樞甲乙作則病骨痛按如不得作按之而不得頸項痛甲乙作頸項強痛邪在心則病心痛喜悲時眩僕視有餘不足而調之其輸心病三種皆調其手心主經脈之輸也平按甲乙喜悲作善悲而調之其輸作而調其俞五節刺平按此篇自篇首至末見靈樞卷十一第七十五刺節真邪篇自黃帝曰刺節言振埃至血變而止見甲乙經卷九第三自黃帝曰刺節言發矇至必應其針見甲乙經卷十二第五自黃帝曰刺節言去爪至故命曰去爪見甲乙經卷九第十二自黃帝曰刺節言徹衣至疾於徹衣見甲乙經卷七第一自黃帝曰刺節言解惑至疾如解惑見甲乙經卷十第二黃帝問於岐伯曰余聞刺有五節奈何岐伯對曰固有五節一曰振埃二曰發矇三曰去爪四曰徹衣五曰解惑節約也謂刺道節約也此言其名也平按固有五節固字袁刻作刺黃帝曰子言五節余未知其意岐伯曰振埃者刺外經去陽病也以下言刺道五節之意也外經者十二經脈入腑臟者以為內經行於四肢及皮膚者以為外經也平按外經經字靈樞無發矇者刺腑輸去腑病也六腑三十六輸皆為腑輸也去爪者刺關節之支絡也關四肢也四關諸節人余大節也支絡孫絡也平按關袁刻誤作開注人余恐系人身之誤徹衣者盡刺諸陽之奇輸也諸陽奇輸謂五十九刺故曰盡也解惑者盡知調陰陽補瀉有餘不足相傾移也瀉陰補陽瀉陽補陰使平故曰相傾移也黃帝曰刺節言振埃夫子乃言刺外經去陽病余不知其所謂也願卒聞之岐伯曰振埃者陽氣大逆滿於胸中煩瞋肩息大氣逆上喘喝坐伏病惡埃煙䭇不得息以下問答解釋五刺節義埃塵微也謂此三種陽疾惡於埃塵煙氣其病令人氣滿閉塞得喘息言其埃也䭇音噎也平按靈樞甲乙大逆下有上字煩瞋作憤瞋病惡埃煙甲乙作病咽噎不得息請言振埃而疾于振埃也以上言其振埃也刺之去病疾于振埃故曰振埃也平按而靈樞作尚黃帝曰善取之何如岐伯曰取之天容也天容在耳下曲頰後足少陽脈氣所發也黃帝曰其咳上氣窮詘胸痛者取之奈何岐伯曰取之廉泉也詘音屈窮詘氣不申也廉泉在頷下結喉上也廉斂鹽反黃帝曰取之有數乎岐伯曰取天容者無過一里而止取廉泉者血變而止黃帝曰善一里一寸也故明堂刺天容一寸也平按無過一里而止靈樞作無過一里甲乙作深無一里黃帝曰刺節言發矇余未得其意夫發矇者耳無所聞目無所見夫子乃言刺腑輸何使然願聞其故矇莫東反謂目不明也平按輸甲乙作俞腑輸下靈樞有去腑病三字何下有輸字甲乙同岐伯曰妙乎哉問也此刺之約針之極也神明類也刺節發矇謂刺去矇者也神明謂是耳目去矇得明故曰神明類也口說書卷猶不敢及也發矇愈疾之速得於神言書所不及也平按敢靈樞作能請言發矇尚疾於發矇也岐伯望請自言發矇之速也黃帝曰善願手受之平按靈樞作願卒聞之岐伯曰刺此者必於日中刺其聽宮中其眸子聲聞於耳此其輸也平按甲乙日中作白日中聽宮作耳聽注一作聽宮聲聞於耳耳作外黃帝曰善何謂聲聞於耳岐伯曰邪刺以手堅按其兩鼻竅而疾偃其聲必應於針也平按甲乙邪刺作已刺而疾偃其聲作令疾偃其聲必應於針作必應於中黃帝曰善此所謂弗見為之而無目視見而取之神明得者矣日中正陽故開耳目取日中也手太陽脈支者至目銳眥卻入耳中手足少陽脈支者從耳後入耳中出走耳前至目銳眥故此三脈皆會耳目聽宮俱連目中眸子眸子目中瞳子也刺聽宮輸時朦朧速愈故得聲聞於耳也針聽宮時按鼻仰臥者感氣合出於耳目即耳通目明矣此之妙者得之於神明非由有目而見者也黃帝曰刺節言去爪夫子乃言刺關節之支絡願卒聞之岐伯曰腰脊者身之大關節也股胻者人之所以趨翔也莖垂者中身之機陰精之候津液之道也爪謂人之爪甲肝之應也肝足厥陰脈循於陰器故陰器有病如爪之餘須去之也或水字錯為爪字耳腰脊於手足關節為大故曰大關節也陰莖在腰故中身陰莖垂動有造化故曰機也精從莖中出故為陰精為津液道也平按去爪甲乙作去衣股胻者靈樞作肢脛者莖垂者甲乙作莖睪者中身之機靈樞甲乙作身中之機注陰精下所缺二字據經文應作之候二字故飲食不節喜怒不時飲食不節言飲食過度言其喜怒不時反春夏也津液內溢乃下溜於𦤎言飲食多水溢流入陰器囊中也𦤎音高平按甲乙作津液內流而下溢於睪靈樞溜作留水道不通日大不休俯仰不便趨翔不能此病滎然有水不上不下水道既閉日日長大也滎然水聚也不上者上氣不通不下者小便及氣下不泄也平按日大不休甲乙作炅不休息注小便袁刻小誤作水䤵石所取形不可匿常不得蔽故命曰去爪黃帝曰善以下言去爪也蔽塞也言下䤵針使水形不得匿而不通不常閉塞平按䤵靈樞作鈹甲乙常作裳故命曰作名曰黃帝曰刺節言徹衣夫子乃言盡刺諸陽之奇輸未有常處也願卒聞之岐伯曰是陽氣有餘而陰氣不足陰氣不足則內熱陽氣有餘則外熱與熱相薄熱於懷炭外重絲帛衣不可近身又不可近席腠理閉塞不汗舌焦唇槁臘嗌乾欲飲不讓美惡也臟之陰氣在內腑之陽氣在外陰氣在外陰氣不足陽乘之故內熱薄停也重絲帛衣復衣也臘肉乾也內熱甚渴故飲不擇美惡也臘性亦反平按與熱相薄靈樞作內熱相薄甲乙作兩熱相薄外重絲帛靈樞作外畏綿帛甲乙無此句甲乙衣下有熱字又不可近席作身熱不可近席靈樞不汗作則汗不出甲乙作而不汗槁臘甲乙作稿䘁注云黃帝古針經作稿臘嗌乾欲飲靈樞作干嗌燥飲下甲乙無不讓美惡也五字黃帝曰善取之奈何岐伯曰取之其府大杼三痏有刺中膂以去其熱大杼內輸皆是足太陽脈氣所發瀉陽氣之要穴也平按其府靈樞甲乙作天府有刺靈樞作又刺補手足太陰以出其汗熱去汗希疾於徹衣黃帝曰善手太陰主氣足太陰主穀氣此二陰氣不足為陽所乘陰氣不泄以為熱病故瀉盛陽補此二陰陽去二陰得實陰氣得通流液故汗出熱去得愈疾於徹衣故曰徹衣也平按以出其汗靈樞甲乙作以去其汗希靈樞作稀甲乙作晞黃帝曰刺節言解惑夫子乃言盡知調陰陽補瀉有餘不足相傾移也惑何以解之岐伯曰大風在身血脈偏虛虛者不足實者有餘大風謂是痱風等病也輕重不得傾側宛伏手足及身不能傾側也宛謂宛轉也不知東西又不知南北心無知也平按甲乙作不知東西南北乍上乍下乍反復顛倒無常甚於迷惑志昏性失也平按乍反復靈樞作乍反乍復甲乙無乍字黃帝曰善取之奈何岐伯曰瀉其有餘補其不足陰陽平復用針若此疾如解惑盡知陰陽虛實行於補瀉使和也黃帝曰善請藏之靈蘭之室不敢妄出也靈蘭之室黃帝藏書之府今之蘭臺故者也五邪刺平按此篇自篇首至末見靈樞卷十一第七十五刺節真邪篇又自黃帝曰余聞刺有五邪至真氣存見甲乙經卷五第二自請言解論至此所謂引而下之者也見甲乙經卷七第三自大熱偏身至所謂推而散之者也見甲乙經卷七第二自黃帝曰有一脈生數十病者至末見甲乙經卷十第一下篇惟自當是之時善行水者以下至末袁刻及別抄本均缺平從日本仁和寺宮御所藏殘卷十三紙中檢出補入經文楊注缺而復完洵堪寶貴也黃帝曰余聞刺有五邪何謂五邪岐伯曰疾有時癰者有容大者有狹小者有熱者有寒者是謂五邪黃帝曰刺五邪奈何岐伯曰凡刺五邪之方不過五章癉熱消滅腫聚散亡寒痹益溫小者益陽大者必去請道其方五法須別為章也癉熱病也音丹平按時癰靈樞甲乙作持癰有容大者有狹小者甲乙無容狹二字凡刺癰邪無迎隴隴大盛也癰之大盛將有膿不可迎而瀉之也平按無迎隴上甲乙有用鈹針三字易俗移性不得膿詭道更行行去其鄉不安其處所乃散亡易其常行法度之俗移其先有寒溫之性更量膿之所在上下正旁以得為限故曰去其鄉不安於處一病乃散亡也平按詭靈樞作脆甲乙作越行字靈樞甲乙不重處所處字袁刻脫注處一恐是一處傳寫之誤諸陰陽過癰所者取之其輸瀉之諸陰陽之脈過癰所者可取癰之所由之輸瀉之也平按過甲乙作遇靈樞癰下無所字凡刺大邪曰以小泄奪有餘乃益虛慄其道針干其邪肌肉親大邪者實邪也行瀉為易故小泄之益虛取和也於針之道戰慄謹肅以針干邪使邪氣得去肌肉相附也親附也平按大邪下甲乙有用鋒針三字靈樞慄其道作剽其通甲乙慓作標靈樞甲乙無干字袁刻干作於注同視之無有反其真視邪氣無有反其真氣乃止也平按反其真甲乙作乃自真道四字刺諸陽分肉間刺大邪所在也凡刺小邪曰以大補其不足乃無害小邪虛邪也行補為難也故曰大補使其實也平按小邪下甲乙有用員針三字補下有益字視其所在迎之界遠近盡至不得外界畔際也視虛實畔界量真氣遠近須引至虛中令實不得外而不至也平按注須下原不缺袁刻誤空四格侵而行之乃自費侵過也補須實知即止補過即損正氣費損也平按費甲乙作貴注云一作費刺分肉之間也刺小邪所在也凡刺熱邪越而滄出遊不歸乃無病為開道乎刺熱之道瀉越走氣覺滄然熱氣不歸病則愈也平按熱邪下甲乙有用鑱針三字滄靈樞作蒼開道作開通注走氣袁刻缺走字覺上原缺一字謹擬作便闢門戶使邪得出疾乃已闢開也平按闢甲乙作闢凡刺寒邪日以溫徐往疾去致其神門戶已閉氣不分虛實得調真氣存刺寒之道日日使溫徐往而入得溫氣已去疾而出針以致神氣為意也平按寒邪下甲乙有用豪針三字疾去靈樞作徐來黃帝曰官針奈何岐伯曰刺癰者用鈹針刺大者用鋒針刺小者用員利針刺熱者用鑱針刺寒者用豪針刺五邪者九針之中用此五針是所宜也平按甲乙無此一段請言解論與天地相應四時相副人參天地故可為解人法天地故可為解人應天地之數故請言之下有漸洳上生葦蒲此所以知形氣之多少也洳汝據反漸洳潤濕之氣也見葦蒲之茂悴知漸洳之多少觀人形之強弱識血氣之盛衰陰陽者寒暑也熱則滋而在上根荄少汁人氣在外皮膚緩腠理開血氣泄汗大泄肉淖澤春夏陽而暑也草木陽氣滋其枝葉根莖少汁也荄莖也有本荄為葉者非也人亦如之氣溢於外皮腠開湊大汗泄出血氣內竭平按靈樞甲乙滋下有雨字荄甲乙作莖注云靈樞作荄寒則地凍水冰人氣在中皮膚致腠理閉汗不出血氣強肉堅澀秋冬陰而寒也陽氣下降寒氣在地地凍水冰人氣亦然暖氣入臟陰氣在於皮膚故腠理閉塞血肉堅澀也平按以下從殘篇中檢出補入當是之時善行水者不能往冰善穿地者不能鑿凍善用針者亦不能取四厥而脈涘結堅搏不往來者亦未可即柔水之性流故謂之往言水可往而冰不可流人之在冬冷脈肉故不行針也之鑿者發寒之而針傷肌破肉更增他病可不哀歟四厥四肢冬也平按穿地甲乙作窮地四厥作四逆而脈涘結靈樞甲乙作血脈凝結甲乙未可作不可故行水者必待天溫冰釋凍解而水可行地可穿也人脈猶是也治厥者必先熨調和其經常與腋肘與腳項與脊以調之火氣通血脈乃行然後視其病脈淖澤者刺而平之若行水穿地者必待春夏也冬月用針者須姜椒桂酒之巾熨令經脈淖澤調適然後可行針凡兩掌兩腋兩肘兩腳膕膝項之與脊之經脈所行要處熨通脈道也平按甲乙凍解上有窮地者必待五字而字下無水可行三字穿作窮熨下有火以二字常靈樞甲乙作掌據本注亦宜作掌恐傳抄之誤以調之甲乙作以調其氣火氣通靈樞作火氣已通甲乙作大道已通堅緊者破而散之氣下乃止此所以解結者也病之堅緊因適破散因經平按散之甲乙作決之用針之類在於調氣氣之不調則病故療病者在於調氣也氣積於胃以通營衛各行其道胃受水穀以生於氣故水穀之氣積於此也衛氣起胃之營氣起於胃之內口營行於脈中衛行脈外今用針調於胃氣通於營衛使各行其道也宗氣留於海其下者注於氣街谷入於胃其氣清者上注於肺濁者下流於胃胃之氣上出於口以為噫氣肺之宗氣留積氣海乃胸間動氣也動氣下者注於氣街生肺脈者也平按甲乙留於海作留積在海其上者走於息道肺之清氣積於海者走於息道以為呼吸也平按甲乙作上行者注於息道故厥在於足宗氣不下脈中之血涘而止弗之火調弗能取之厥謂逆冷胸之動氣不循脈行下至於足故曰涘而止也冬日不用火調不可取也平按涘而止靈樞甲乙作凝而留止甲乙弗能取之作針弗能取用針者必先察其經絡之實虛切如循之按而彈之視其變動者乃後取而下之用針之法必先察經絡虛實實則切循其脈虎則按其所針之處以手彈之視其變動然後取而下之也平按切如循之靈樞甲乙作切而循之變動靈樞甲乙作應動取下靈樞有之字六經調者謂之不病雖病謂之自已也三陽三陰六經相得不可有病雖客邪為病必當自已也一經上實下虛而不通者此必有橫絡盛加於大經令之不通視而瀉之此所謂解結者也一經十二經中隨是何經也大經隨身上下故為從也絡脈旁引故為橫也正經上實下虛者必是橫絡受邪盛加大經以為病者必視瀉之故為解結也平按甲乙瀉之下有通而決之四字上寒下熱先刺其項太陽久留之已則熨項與肩胛令熱下合乃止所謂推而上之者也上寒腰以上寒下熱腰以下熱項太陽之太陽脈也久留針者推別熱而使之上也熱既聚於肩項須令和之故熨使下也推熱令上故曰推而上之也平按已則熨靈樞作已刺則熨甲乙作已刺則火熨下合合字甲乙注云一本作冷上熱下寒視其虛脈而陷下於經絡者取之氣下乃止此所謂引而下之者也腰以上熱腰以下冷視腰以下有虛脈陷於余經及絡者久留針使氣下乃止故曰引而下之者也平按陷下靈樞作陷之大熱遍身狂而妄見妄聞妄言視足陽明及大絡取之足陽明主氣其氣強盛狂妄見聞及妄言多因此脈故取陽明正經及絡以去之也平按狂而妄見妄聞妄言甲乙作故狂言而妄見妄聞虛者補之血實者瀉之因令偃臥居其頭前以兩手四指俠按頸動脈久持之卷而切推下至缺盆中復上如前熱去乃止所謂推而散之者也足陽明上實下虛為狂等病補下虛經也上之血絡盛而實者可刺去血以瀉之因令偃臥以手按人迎之脈下至缺盆中復上來去使熱氣泄盡乃可休止故曰推而散之也有本為腹上如前恐錯也平按血實者靈樞作血而實者甲乙作血如實者因令偃臥靈樞作因其偃臥俠按頸動脈靈樞俠作挾甲乙作按其頸動脈復上靈樞甲乙作復止黃帝曰有一脈生數十病者或痛或癰或寒熱或癢痹或不仁變化無窮其故何也岐伯曰此皆邪氣之所生也上經十二經脈生病各異此言一脈生數十種病變化無窮者十二經生病非無有至於變化亦不可窮故欲取者甚須審察不可輕然以定是非也平按靈樞或寒熱作或寒或熱或癢痹作或癢或痹十二刺佚
