body:
  text: 卷第十六診候之三虛實脈診黃帝問於岐伯曰余聞虛實以決死生願聞其情岐伯曰五實死五虛死人之所病五實具有者不泄當死所病五虛具有者不下食當死也黃帝曰何謂五實五虛岐伯曰脈盛其皮熱腹脹前後不通免心瞀此謂五實人迎脈口脈大洪盛一實也皮膚溫熱陽盛二實也心腹脹滿三實也大小便不通四實也悶瞀不醒五實也免心音悶瞀木候反𤷎目也脈細皮寒氣少泄注利前後飲食不入此謂五虛人迎脈口脈少細一虛也皮膚寒冷陽虛二虛也心腹少氣三虛也大小便利四虛也飲食不下五虛也黃帝曰其時有生者何也岐伯曰漿粥入胃泄注止則虛者活漿是谷液為粥止利具有五虛粥得入胃即虛者可生也身汗得後利則實可活此其候也服藥發汗或利得通則實者可活也黃帝問岐伯曰願聞虛實之要虛實是死生之本故為要也岐伯對曰氣實形實氣虛形虛此其常也反此者病氣謂衛氣也形身也谷盛氣盛谷虛氣虛此其常也反此者病食多入胃曰谷盛也胃氣多曰氣盛也脈實血實脈虛血虛此其常也反此者病脈謂人迎寸口脈也血謂經絡血也黃帝曰如何而反岐伯曰氣虛身熱此謂反衛氣虛者陰乘必身冷今氣虛其身更熱故為逆也谷入氣少此謂反谷不入氣多此謂反食多入胃者胃氣還多食不入胃胃氣還少此為順也食多入胃胃氣反少食不入胃胃氣反多此為逆也脈盛血少此謂反脈少血多此謂反寸口人迎脈盛經絡血盛寸口人迎脈少經絡血少此為順也寸口人迎脈盛而血反少寸口人迎脈少而經絡血多此為逆也氣盛身寒者病得之傷寒氣虛身熱者得之傷暑衛氣盛者其身當熱今反身冷此以傷寒所致也衛氣虛者其身當冷今反熱者此以傷熱所致也谷多而氣少者得之有所脫血居濕下也多食當噫胃氣多也而反少者此為脫血虛劣安臥處濕濕傷脾氣故少氣也谷入少氣多者邪在胃及與肺也食少當胃氣少也而反多者因胃及肺受於邪氣以為呼吸故氣多也脈小血多者飲中熱也寸口人迎脈小絡絡之血當少今反多者因傷熱飲故經絡血盛也脈大血少者脈有風氣水漿不入此之謂也寸口人迎脈大經脈之血應多今反少者因脈有邪氣漿水之液不得入脈故血少也夫實者氣入也夫虛者氣出也以下方刺之法邪氣入中為實也正氣出中為虛也地實者熱也地虛者寒也地者行於補瀉病之處者也以手捫循其地熱者所病即實可行瀉也其地冷者所病即虛宜行補也入實者左手開針空左手以針刺入於實行其瀉已可徐出針用左手開其針空令氣得出以為瀉也入虛者左手閉也右手刺入於虛行其補已可疾出針用左手閉其針空使氣不出以為補也黃帝問曰何謂虛實岐伯答曰邪氣盛則實精氣奪則虛風寒暑濕客身盛滿為實五臟精氣奪失為虛也何謂重實曰所謂重實者言大熱病氣熱脈滿是謂重實傷寒熱病大熱曰實經絡盛滿故曰重實也問曰經絡俱實如何何以治之答曰經絡皆實是絡急而尺緩也皆當俱治之故曰滑則順澀則逆脈寸口陽也尺脈陰也脈急寒多也尺緩熱多也寸口是陽今反急寒尺地是陰冷反為熱是為經絡皆實可俱瀉之經絡雖實脈滑氣盛為順易已脈澀氣少為逆難已也夫虛實者皆從其物類終始五臟骨肉滑利可以長久萬物之類虛實終始皆滑利和調物得久生也是以五臟六腑筋脈骨肉柔弱滑利可以長生故曰柔弱者生之徒者也問曰寒氣暴上脈滿實如何答曰實如滑則生實如逆則死矣雖實柔滑可生也實而寒溫澀死之徒也問曰其形盡滿何如答曰舉形盡滿者脈急大堅尺滿而不應也如是者順則生逆則死舉身滿悶曰形盡滿也寸口之脈寒氣盛堅然尺脈不應其滿悶然手足溫者順療之易已故生手足寒者逆故死也問曰何謂順則生逆則死答曰所謂順者手之溫也所謂逆者手足寒也寒氣滿身手足冷者陽氣盡故死手足溫者陽氣在四體漸來通陽氣和則生問曰乳子而病熱脈懸小者何如答曰足溫則生寒則死乳子病熱脈應浮滑而反懸小者足溫氣下故生足寒氣不下逆者而致死也問曰乳子中風病熱者喘鳴肩息者何如答曰喘鳴肩息者脈實大也緩則生急則死乳子中風病熱氣多血少得脈緩熱宣泄故生得急為寒不泄故死也問曰何謂重虛答曰脈氣虛尺虛是謂重虛也寸口脈虛尺地及脈不虛故曰重虛也問曰何以知之答曰所謂氣虛者言無常也尺虛者行步恇然也脈虛者不象陰也恇𤺊方反怯也謂行步虛怯然也重虛者何以知其候也膻中氣虛不足令人無言志定診得尺脈虛者陰氣不足腰腳有病故行步不正也診得寸口之脈虛則手太陰肺虛陰氣不足故曰不象也問曰如此者何如答曰滑則生澀則死寸口雖不得太陰和脈而得溫滑者生寒澀者死也問曰腸澼便血何如答曰身熱則死寒則生血虛陽乘故死血未甚虛其身猶寒所以得生也問曰腸澼下白沫何如答曰脈沉則生脈浮則死脈沉陰氣猶在故生脈浮陰盡陽乘故死也問曰腸澼下膿血何如答曰脈懸絶則死滑大則生脈懸絶陽氣盡絶也故死滑大氣盛猶溫也故生也問曰腸澼之病身不熱何如答曰身不熱脈不懸絶滑大皆曰生懸澀皆曰死以藏期之脈不懸絶陰氣猶在滑大是陽氣盛好故生其脈懸絶澀為寒是為陽絶以其臟之病次傳為死期也問曰癲疾何如答曰脈搏大滑久自已脈小堅急死不治大者氣多血少滑者氣盛微熱以其氣盛微熱故久自瘥脈小氣血俱少堅急為寒是則陽虛陰乘故死之問曰癲疾之脈虛實何如答曰虛則可治實則死癲疾陽盛病也故陽脈盛而實者不離於死陽虛陰和故可療也問曰消疸虛實何如答曰脈實大病久可治脈懸小堅病久不可治死脈實又氣多血少病雖久可療其脈懸絶血氣俱少又脈堅病久不可療當死問曰虛實何如答曰氣虛者肺虛也氣逆足寒非其時則生當其時則死余藏皆如是也氣虛者肺氣虛也脈虛故足寒寒為氣逆也秋時肺王肺氣虛者為死余時肺氣虛不死如有肝氣虛肝氣逆者足逆冷當春時肝氣王時虛者為死非其時為生如此餘臟以為例也問曰脈實滿手足寒頭熱何如答曰春秋則生冬夏則死下則陽虛陰盛故手足冷也上則陰虛陽盛故頭熱也春之時陽氣未大秋時陰氣未盛各處其和故病者遇之得生夏日陽盛陰格則頭熱加病也冬時陰盛陽閉手足冷者益甚也故病遇此時即死也雜診黃帝問岐伯曰診法常以平旦陰氣未動陽氣未散診法在旦凡有五要故須旦以診色脈肺氣行至手太陰十二經絡所有善惡之氣皆集寸口故曰未動未入諸陽脈中故曰未散此為一也飲食未進進飲食已其氣即行善惡散而難知故曰未進食此為二也經脈未盛未進飲食故十二經氣未盛此為三也絡脈調均以經未盛大絡亦未盛故絡脈調均此為四之也氣血未亂故乃可診衛氣營血相參以行其道故名為亂今並未行即氣血未亂此為五也平旦有斯五義故取平旦察色診脈易知善惡之也有過之脈切脈動靜營衛將諸脈善惡行手太陰過寸口時以手切按其脈動靜即知其善惡之也而視精明察五色視其面部及明堂臟腑分肉精明天惡五色之別觀五臟有輸余不足五府強弱形之盛衰五府謂頭背腰膝髓五府者也以此切脈察色視知五臟氣之虛實五府氣之強弱及身形盛衰之也以此參伍決死生之分以此平旦切脈察色知臟腑形氣參伍商量以決人之死生之分之也夫脈者血之府以下切脈也谷入於胃化而為血行於經脈以奉生身故經脈以為血之府之也長則氣治短則氣病寸口之中滿九分者為長八分七分為短也數則為煩心動疾曰數大則病進洪盛曰大上盛則氣高人迎脈不時盛下盛則氣脹寸口脈不盛氣脹充也代則氣衰久而一至為代滑則氣少脈滑利故氣少澀則心痛脈之動難為澀也渾渾單至如湧泉病進如湧泉上衝人手也而絶弊弊綽綽其去如弦絶者死弊弊綽綽未詳脈來卒去比之絃斷此為死候有本絶為化之也夫精明五色者氣之華也次察色者也五行之氣變為精華之色各見於面及明堂部內明堂鼻之也赤欲如以帛裹朱不欲如赭也白欲如白璧之澤不欲如堊也一曰白欲如鵝羽不欲如鹽黃欲如羅裹雄黃不欲如黃土也黑欲如重漆色不欲如炭也一曰如地青欲如青璧之澤不欲如藍青也赭赤土也堊白土阿洛反五色精微象見矣其壽不久精明五色微暗象見者名曰色夭壽命不久之也夫精明者所以視萬物別白黑審短長以長為短以白為黑是精則衰矣萬物精明則黑白辨矣若不精明則黑白不分是夭色也五臟者中之府也中盛滿氣傷恐音聲如從室中言是中氣之濕也次聽聲者也六腑貯於水谷以為外腑五臟藏於精神故為中腑五臟之氣有餘盛滿將有驚恐有傷者乃是中氣得濕上衝胸嗌故使聲重如室中言也言而微終日乃復言者此奪氣也言聲微小又不用言者當是有所奪氣氣少故爾也衣被不斂言語善惡不避親疏者此神明之亂也是其陽明之氣熱盛為病心亂故其身不知所為其言不識善惡以其五神失守故也倉廩所藏是門戶不惡也脾胃之氣失守則倉廩不藏以其咽口門戶不自要約遂食於身不便之物也水泉不止是膀胱不藏也水泉小便也人之小便不能自禁者以浘胞不能藏約故遺尿不止也得守者生失守者死如前之病神明不亂得守者生其神明亂失守者死也之夫五臟身之強也五臟藏神藏神為身主故是身之強也頭者精明之府也頭憊視深精將奪矣頭為一身之天天有日月人之頭有二目五臟之精皆成於目故人之頭為精明府所以精明將奪力極頭傾視深力意視也憊蒲介反背者胸之府背曲肩隨府將壞矣心肺二輸在上當背太陽故背為胸府背曲肩隨而乘胸臆將壞也之腰者腎之府轉搖不能腎將憊矣腎在腰脊之中故腰不隨腎將憊矣憊病也膝者筋之府屈伸不能行則僂跗筋將憊矣身之大筋聚結於膝膝之屈伸不能行則曲腰向跗皆是膝筋急緩故知筋將病也髓者骨之府也不能久立行則掉標骨將憊髓為骨液髓高則脛疼不能久立行則掉標戰動即知骨將病矣得強則生失強則死攝養前之五府得身強者為生失者為死也岐伯曰反四時者有餘為精不足為消上黃帝將問自説其義周備故岐伯言強之得失所以人雖失強反於四時得有餘者則五臟精勝為生人之失強得不足者則五臟消損為死應大過不足為精有餘為消寸口人迎相過一倍以上為應大過也大過得氣不足則五臟精勝氣過有餘則熱故五臟消損之也陰陽不相應病名曰關格人迎寸口四倍以上曰陰陽不相應不相應者陽氣外格陰氣內關之病也診血脈者多赤多熱多青痛多多黑為久痹多赤多黑多青皆見寒熱也身痛面色微黃齒垢黃爪甲上黃黃疸血脈者絡脈也疸音丹內黃病也診目痛赤脈從上下者太陽病足太陽經從目內眥上額故有赤脈從上下貫瞳子者太陽之絡令人目痛當療太陽從下上者陽明病手足陽明之經並從鼻至目內眥故有赤脈從下上者陽明之絡令目有痛當療陽明之也從外走內者少陽病手足少陽經皆從目外來去於目鋭眥走於目內故有赤脈從外入目者少陽之絡令目有痛當療少陽診寒熱赤脈從上下至瞳子見一脈一歲死見一脈半一歲半死見二脈二歲死見二脈半二歲半死見三脈三歲死赤脈從上下者太陽之絡也太陽絡脈從上下至瞳子三脈一時至者至三年死乃至唯見一脈至一年死者三陽者太陽也太陽之氣最大故獨見者至一年死二陽者陽明也至陽明有二絡見其氣不大故二年死一陽者少陽也至少陽有三絡見其陽氣少故得三年死也診齲齒痛按其陽明之脈來有過者獨熱在左左熱在右右熱在上上熱在下下熱手陽明脈從左右手指上行入下齒中上至於鼻足陽明脈從鼻下行入上齒中下至左右足指手足二陽明脈有病經所部過時獨熱者二脈一葙獨偏熱也手足陽明獨熱在左葙者即左葙熱也獨熱在右葙者即右葙熱也得手陽明脈熱即知下齒齲也足陽明左右得熱準手陽明可知然得足陽明熱即知上齒齲也獨熱在頭在左為上在足在右為下準手則足之左右可知齲者上下牙齒腫痛或出膿血此皆因熱風氣所致故得熱為候也據此正經兩葙俱診陽明即太陰兩手俱有如何脾肺獨出於右理必不然也嬰兒病其頭毛皆逆上者必死腎主於血腎腑足太陽脈上頭以榮頭毛嬰兒血衰將死故頭毛逆上也耳間青脈起者瘛痛耳間青脈足少陽膽脈也嬰兒無病則絡陷有病則起起者瘛痛之候也大便赤青辨食泄小者手足寒難已飧泄脈小手足溫易已也嬰兒大便所出青赤辨異者名曰飧泄飧音孫脈小手足冷者飧泄難已脈小為順手足溫陽氣榮四末故易已也黃帝問曰何以知懷子之且生也岐伯曰身有病而無邪脈也以子在身故雖病其病之氣不至於脈故無邪脈也黃帝問岐伯曰診得心脈而急此為何病病形何如答曰病名心疝少腹當有形曰何以言之曰心為牡臟小腸為之使故曰少腹當有形黃帝曰善診得心脈心為陽也急為寒也寒氣在心太陽小腸故少腹有形形疝積者也黃帝曰診得胃脈疝形何如岐伯曰胃脈實則脹虛則泄胃脈軟弱為平今得胃氣實脈即知胃中脹滿若得胃氣虛脈即知泄利胃虛故脈虛也曰病成而變何如人病成極變為他病未知變作何病之也曰風成為寒熱風病在中成極變為諸寒熱病也疸成為消中疸脾胃熱也脾胃內熱日久變為消中消中湯飲內消病也厥成為癲疾陽明熱厥成極上實下虛變為癲疾也久風為飧泄春傷於風在腸胃之間日久變為泄利之病賊風成為癘賊風入腠不泄成極變為癘亦之謂大疾眉落鼻柱等壞之也病之變化不可勝數夫病變為他疾有斯五種若隨心隨物曼衍多端不可勝數但可以智量處調之取中縱醫方千卷未足以為當之也黃帝曰有病厥者診右脈沉左脈不然病主安在岐伯曰冬診之右脈固當沉緊此應四時厥寒厥也左手不得沉緊得浮遲故曰不然也冬陰也右手亦陰也沉緊亦陰也冬時右手得沉緊之脈固當順四時也左浮而遲此逆四時在左當主病診在腎頗在肺當腰痛左陽也浮肺脈也冬時得左手肺脈虛邪來乘故腎病腰痛頗在於肺此即是左手有肺脈之也曰何以言之曰少陰脈貫腎上胃肓絡肺今得肺脈腎為之病故腎為腰痛黃帝曰善腎脈足少陰從腎上膈入肺中故冬時左手得肺脈腎為腰痛也厥陰有餘病陰痹足厥陰肝脈也脈循股陰入毛中環陰器上抵少腹故脈氣有餘者是其陰氣盛故為陰痹者謂陰器中寒而痛不足病生熱痹厥陰脈氣虛者少陽來乘陰器中熱而痛也痹痛之也滑則狐疝風厥陰脈氣滑者陽氣盛微熱以其氣盛微熱乘陰故為狐疝風也風氣也狐夜不得尿日出方得人之所病與狐同故曰狐疝一曰孤疝謂三焦孤腑為疝故曰孤疝也澀則病少腹積厥氣也澀多血少氣微寒以其厥陰多血少氣有寒故少腹中血積厥氣也少陰有餘病皮痹隱軫少陰足少陰腎脈也從足湧泉上貫肝入歸中肺主皮毛故少陰陰氣有餘病於皮痹又病皮中隱軫皮起風疾也不足病腎痹少陰之肺虛受寒濕之氣入腎故為腎痹也滑則病腎風疝少陰氣虛太陽氣乘微熱故為腎風疝痛也澀則病積溲血氣少微寒為血多為血積盛而浘血太陰有餘則病肉痹寒中足太陰脾脈也主肉故太陰盛以為肉痹寒中也不足病脾痹太陰不足即脾虛受邪故為脾痹也滑則病脾風疝得足太陰脈滑則是脾虛陽明氣乘故脾病風疝之也澀則病積心腹時脹滿得太陰脈澀即少氣微寒多血故為血積太陰脈注心中心腹時脹滿也陽明有餘病脈痹身時熱胃足陽明脈正別上至脾入腹裡屬胃散而之脾上通於心故陽明有餘不足心有病也心主於脈是以陽明有餘為脈痹身時之熱者也不足病心痹陽明氣虛不足太陰乘故為心痹滑則病心風疝陽明氣盛微熱故心病風疝也澀則病積時善驚陽明氣虛陰乘微寒血多為積積氣時上衝心故喜驚之也太陰有餘病骨痹身重足太陽膀胱脈也足太陽脈氣有餘盛乘於少陰少陰主骨今少陰病名曰骨痹寒濕在骨故身重之也不足病腎痹太陽虛而不足則少陰腎氣使盛故為腎痹滑則為腎風疝太陽脈滑則陽盛微熱乘腎腎病風疝之澀則病積善時癲疾診得太陽脈澀則少氣微寒多血下為血積也善積氣時上衝頭則為癲疾之也少陽有餘病筋痹脅滿足少陽膽脈也肝主筋也足少陽盛陰病故為筋痹肝病脅滿也不足病肝痹陽虛陰盛故為肝痹也滑則病肝風疝得少陽滑者則少陽氣盛微熱乘肝故肝病風疝也澀則病積時筋急目痛得少陽脈澀少陽氣少微寒多血為積也足少陽脈起目鋭眥故脈寒筋急目痛也脈論孟春始至黃帝燕坐臨觀八極始正風八之氣而問雷公曰陰陽之類經脈之道五中所主何臟最貴八極即八方也八方之風即八風也夫天為陽也地為陰也人為和陰而無其陽衰殺無已陽無其陰生長不止生長不止則傷於陰陰傷則陰災起矣衰殺不已則傷於陽陽傷則陽禍生矣故須聖人在人在天地間和陰陽氣令萬物生也和氣之也道謂先修身為德則陰陽氣和陰陽氣和則八節風調八節風調正則八虛風正於是疵癘不起嘉祥競集此不和所以然而然亦也故黃帝問身之經脈貴賤依之調攝修德於身以正八風之氣斯是廣成所問之道也雷公曰春甲乙青中主肝治七十二日是脈之主時臣以其道最貴雷公以肝主春甲乙萬物之始故五臟脈中謂肝藏脈為貴黃帝曰卻念上下經陰陽從容子所貴最其下也雷公致齋七日復侍坐三陰三陽五臟終始之惣此最為貴肝脈主時為下故雷公自以為未通致齋得詔之也黃帝曰三陽為經三陽足太陽也膀胱脈也足太陽從二目內眥上頂分為四道不項並正別脈上下六道以行於背與身為經也以是諸陽之主故得惣名也二陽為經二陽足陽明脈也以是二陽之惣故得名也足陽明脈胃者脈也為經絡海從鼻而起下咽分為四道並正別脈六道上下行腹綱維於身故曰為維也一陽遊部一陽足少陽膽脈者也足少陽脈以是少陽故曰一陽遊部有三部頭法於天以為上部腰下法地以為下部腰中法人以為中部此一少陽起目外眥絡頭分為四道下缺盆並正別脈上下主經營一節流氣三部故曰遊部也此知五臟終始此三陽脈起於五臟終於五臟故知此脈者知五臟終始之也三陽為表二陰為里一陰至絶作明晦卻具合以攻其理三陽太陽也太陽在外故也為表也二陰少陰也少陰居中故為里也一陰厥陰也厥陰脈至十二經脈絶環之終寸口人迎亦然故曰至絶如此三陽三陰之脈見於寸口人迎表裡作日夜之變卻審委具共相合會以政身之理之也雷公曰受業未能明也雷公自申不通之意黃帝曰所謂三陽者太陽為經三陽脈至手太陰而弦浮而不沉決以度察以心合之陰陽之論太陽惣於三陽之氣衛氣將來至手太陰寸口中見供太以長是太陽平也今至寸口弦浮不沉此為病也如此商量可決之以度數察之以心神也所謂二陽者陽明至手太陰弦而沉急不鼓炅至以病皆死炅音桂兒也此經熱也陽明之氣惣於二陽也陽明脈至於寸口見時浮太而短是其陽明平也今至寸口弦而沉急不鼓是陰擊陽又為熱病熱至故為陽明太陽之病皆死也一陽者少陽也至手太陰上連人迎弦急懸不絶此少陽之病也專陰則死陽氣始生故曰少陽少陽脈至寸口乍疏乍數乍長乍短平也今見手太陰寸口並及喉側胃脈人迎二處之脈並弦急懸微不斷絶是為少陽之病也若弦急實專陰無陽懸而絶者死也三陰者此六經之所主也三陰太陰也六經謂太陰少陰厥陰之脈手足兩葙合有六經脈也此六經脈惣以太陰為主太陰有二足太陰受於胃氣與五臟六腑以為資糧手太陰主五臟六腑之氣故曰六經所主也交於太陰伏鼓不浮上空志心交會也三陰六經之脈脈皆會於手太陰寸口也肺氣手太陰脈寸口見時浮澀此為平也今見寸口伏鼓不浮是夫其常也腎脈足少陰貫脊屬骨絡膀胱從腎貫肝上鬲入肺中從肺出肺心肺氣下入腎志上入心神之空也二陰至脈其氣歸膀胱外連胃脾二陰少陰也少陰上入於肺下合膀胱之腑也外連脾胃者脾胃為臟腑之海主出津液以資少陰少陰在內外與脾胃臟腑相之者也一陰獨至絶氣浮不鼓勾而滑一陰厥陰也厥陰之脈不兼餘脈故為獨也在寸口亦至絶雖浮動不鼓盛也勾實邪來乘也滑者氣盛而微熱之也此六脈者乍陽乍陰六屬相併繆通其五臟而合於陰陽五臟六腑三陰三陽氣之盛衰故見寸口則乍陰乍陽也繆牙也臟脈別走入腑腑脈別走入臟皆交相屬可通臟腑合陰陽之也先至為主後至為客陰陽之脈見寸口時先至為主後至為客也假令先得肝脈肝脈為主後有餘脈來乘即為客也雷公曰臣悉書嘗受傳經脈誦得從容之道以合從容之道以合從容不知次第陰陽不知雌雄三陰三陽經脈容從之道悉書以讀之未知陽造物次第及雄雌之別也從容審理也雷公自謂得審理之經行之合理身之理也黃帝曰三陽為父三陽太陽也太陽陽脈在背管五臟六腑氣輸以生身尊比之於天故為父也二陽為衛二陽陽明也陽明脈在腹經絡於身故為衛一陽為紀一陽少陽也少陽之脈在身兩側經營百節綱紀於身故為紀者之三陰為母三陰太陰也太陰脈氣內資臟腑以生身尊比之內地故為母母也二陰為雌二陰少陰也少陰既非其長又非其下在內居中故為雌也一陰獨使一陰厥陰也厥陰之脈唯一獨行故曰獨使也是二陽一陰陽明主病不脈一陰耎而動九竅皆沉耎當動義蠕動輕動二陽陽明也一陰厥陰也是陽明厥陰二脈至者即陽明為病以陽明不勝厥陰以厥陰蠕動勝陽故九竅沉塞不利也三陽一陰太陽勝一陰不能止內亂五臟外為驚駭三陽太陽也一陰厥陰也診得太陽厥陰之脈是為外陽勝陰陰氣內虛厥陰不能止陽則陽乘於內五臟氣亂外陽復發盛為驚駭之病之二陰一陽病在肺少陰沉勝肺傷脾故外傷四肢二陰少陰也一陽少陽也少陰氣盛少陽氣微少陰脈氣上乘於肺旁及於脾故使四肢不用也二陰二陽皆交至病在腎罵詈妄行癲疾為狂陰二陰少陰也二陽陽明也陰陽明俱至交會則陰虛陽勝遂發為狂罵詈馳走若上實則為癲疾倒僕也二陰一陽病出於腎陽氣客遊於心管下空竅堤閉塞不通四肢別離二陰少陰也一陽少陽也診得少陰少陽二脈是為陰實為病故曰出腎也足少陽正別之脈上肝貫心故少陽客於心管之下陽實為病故心管下空竅皆悉堤障閉塞不通利也心管心系也心腑手太陽之脈絡心循咽抵胃胃主四肢故不通為四肢之病也手足各不用不相得故曰別離之也一陰一陽代絶此陰氣至心上下無常出入不知喉嗌乾燥病在土脾一陰厥陰也一陽少陽也厥陰肝脈也少陽膽脈也少陽之脈上肝貫心診得二脈更代上絶陰脈盛時乘陽至心從心更代上下無常不可定其陽出陰入故曰出入不知也厥陰上抵少腹使胃上貫膈布脅肋循喉嚨故其病喉嗌乾燥病在於脾脾胃同氣也厥陰之氣連土脾胃之也二陽三陰至陰皆在陰不過陽陽氣不能止陰陰陽並絶浮為血瘕沉為膿胕二陽陽明也三陰太陰也至陰脾也足陽明絡脾故與太陰皆在陰也其陰不能過入出土陽陽復不能過土陰是為陰陽隔絶陽脈獨浮故結為血瘕陰脈獨沉結以為膿胕扶反義當腐壞壞陰陽皆壯以下至陰太陰陽明皆盛以下入脾為病陰陽之解上合昭昭下合冥冥診決死生之期遂次含歲年如前經脈陰陽論解解道言其生也上合昭昭陽之明也語其死也下合冥冥陰之暗也如此許診決死生不失其候遂得次第各合日月歲年之期之也雷公曰請問短期黃帝不應雷公復問黃帝曰在經論中指在此經論短斯中者也雷公曰請問短期請問短期之論黃帝曰冬三月之病病合土陽者至春正月脈有死徵皆歸出春冬陰也時有病有陽氣來乘至正月少陽王時陰氣將盡故脈有死其徵死冬三月病皆歸出春春時出王萬物故曰出春也冬三月之病病在理已盡草與柳葉皆殺陰陽皆絶期在孟春理中也冬時陽氣在肉冬之陰氣為陽所傷已盡在草柳葉火時反而死若陰陽隔絶正月時死之者也春三月之病陽病日殺陰陽皆絶期在乾草春為陽也春陽氣王今陽病者是陽衰故死也若陰陽隔絶不相得者至土季秋金氣王時被克而死之也夏三月之病病至陰不過十日陰陽交期在溓水夏陽也至陰脾也夏陽脾病為陽所優故不過脾之成數十日而死若陰陽交擊期在溓水廉檢反水靜也七月水生時之也秋三月之病三陽俱起不治自已陰陽交合者立立不能坐坐不得起三陽獨至期在石水三陽太陽陽明少陽也秋三月病診得三陽之脈同時而起是陽向衰少陰雖病不療自已若陰陽交事一上下故立不能坐不能起也若三陽之脈各別獨至者陽不勝陰故至十月水凍時死也寒甚水凍如石故曰石水也二陰獨至期在盛水也二陰少陰也少陰獨至則陰不勝陽故至春月水解水盛時死之也黃帝坐明堂召雷公問曰子知醫之道乎誦而頗能別別而未能明明而未能章足以治群僚不足至侯主明堂天子所居室也習道有五一誦二解三別四明五章子能誦之未能解別且可行之士群僚不可之進尊貴星與日月光以章經術後世益明上通神農若著至教擬於二皇樹立也雷公所願立天之道以章經術益明後代上通神農至教擬於古之伏羲神農二皇大道也疑當為擬者也黃帝曰善無失此陰陽表裡上下雌雄輸應也試令至誠而道上知天文下知地理中知人事可以長久言其所教合道行之長生久視也以教衆庶亦不疑殆醫道論篇可傳後世可以為寶誠令至傳寶也雷公曰請受道諷誦用解黃帝曰子不聞陰陽傳乎曰不知曰夫三陽太陽為葉上下無常合而病至偏周陰陽三陽太陽也諸陽之行從頭至足若上下行不能依度數合而為病則內傷五臟外害六腑無所不周也雷公問曰三陽莫當請聞其解莫當言其力太黃帝曰三陽獨至者是三陽並至並至如風雨上為癲疾下為漏病亦無期內無正不正中經紀診無上下以書別三陽獨至謂太陽獨至也太陽獨至即太陽陽明少陽並於太陽以太陽為首而至故曰並至也陽氣好升上走於頭如風雨暴疾上盛下虛上盛故為癲疾下虛發為漏病漏病謂膀胱漏泄大小便數不禁守也雷公曰臣治疏踘脫意而已黃帝曰三陽者至陽也積並則為驚病起而如風至如礔礪九竅皆塞陽氣傍洫干嗌喉塞太陰之極以為至陰太陽之極以為至陽也太陽與陽明少陽為惣若別用則無病若並聚惣用則陽氣盛故為驚也驚狂起速故如風也病作甚重如礔礪也陽氣熱盛傍洫上下則九竅不通嗌乾喉塞也洫溢也並於陰則上下無常薄為腸澼陰謂脾腎陽盛並於脾腎則腸胃中氣上下無常若盛氣停薄腸胃之中發為腸澼腸澼下利膿血是傷寒熱者也此謂二陽直心坐不得起臥者身全二陽之病也二陽陽明也陽明正別之脈屬胃散脾上通於心故曰直心陽明脈胃也脾胃生病四肢不用坐臥身重即陽明之病也且以知天下可以別陰陽應四時合之五行上雷公請願受樹天度四時陰陽今已為子具言之耳也黃帝燕坐召雷公而問之曰汝受術誦書善能覽觀雜學及於比類通合道理為余言子所長帝令雷公言己所長五臟六腑膽胃大腸脾胞腦髓涕唾哭泣悲哀水所從行此皆人之所生治之過失也子務明之不以十全即不能知為世所怨脾胃糟粕入於小腸小腸盛受即是脾之胞也並腦髓此衆人有為六腑並泣唾泣諸津液等衆人莫不以此為生也其理生失者子乃欲明理生之術使病者十全而不能明必為天下人所怨也雷公曰臣請誦脈經上下篇甚衆多別異比類由未能以十全也安足以別明之臣之所誦脈經比類甚衆多療疾病猶未能病十全十又安能調人未病之病以為開明乎也黃帝曰子試別通五臟之過六腑之所不知針石之敗毒藥所宜湯液滋味具言其狀悉言以對請問不知誠至審也過不知五臟之失也五臟六腑針石毒藥湯液滋味子所不通者可具言其狀當悉為言對子所不知也雷公問曰肝虛腎虛脾虛皆令人重體煩悗當投毒藥刺灸𥦖石湯液或已或不已請聞其解此三陰藏其脈從足上行太陰少陰上至於口厥陰上至頭頂所以此三陰脈虛多參居為病故令體重煩悗療之有瘥請聞其解也悗音悶也黃帝曰公何年之長而問之少也余真問以自謬也吾問子窈冥子言上下篇以對何也子之年長所問須高今問卑少是所怪也余真問子脈之浮沉窈冥之道子以上下篇中三臟虛理以答余者未為當之也夫脾虛浮似肺腎小浮似脾肝急沉散似腎此皆工之所時亂也然恐從容得也言四臟之脈浮沉相似難以別知名曰窈冥肺脈浮虛如毛脾之病脈浮虛相似腎脈雖沉血氣少時虛浮似脾肝脈弦急沉散似腎脈沉此皆工人時而不知唯有從容安審得之名曰窈冥也若夫三髒土木水參居此童子之所知也問之何也土脾木肝水腎三氣參居受邪令人體重者此乃初學未足深也雷公曰於此有人頭痛筋攣骨重怯然少氣噫噦腹滿時驚不嗜臥此何臟之發也舉此八病問所生處脈浮而弦切之石堅不知其解問以三臟以知比類問三臟之脈浮弦石等比類同異也黃帝曰夫之從容之謂三臟之脈安審知之故曰從容也夫年長則求之其腑五十以上曰長如前三臟脈病有年五十以上者療在六腑以其年長血氣在於六腑之中故求之腑也年少則求之於經男子十六以上女子四十以上血氣在五臟之中故求之臟也今子所言皆夫八風菀熟五臟消鑠傳邪相受八風八邪虛邪風也八邪虛風菀熟次傳入於臟令五臟消也鑠式藥反銷也菀熟言蓄積故為病也夫浮而弦者腎不足也腎脈沉石今反弦浮故腎不足也沉而石者是腎氣內著也腎脈微石是其平也今沉而復石是腎真脈無有胃氣內著骨髓也怯然少氣是水道不得形氣索怯心不足也腎氣虛故腎間動氣微弱致使膀胱水道不得通利也腎間動氣乃是身形性命之氣真氣不足動形取氣故曰形氣乘也咳嗽煩悗是腎氣之逆水道不利氣循腎脈上入心肺故咳嗽煩悗是腎氣之逆也一人之氣病在一臟也若言三臟俱行不在法也此為一人之氣病在腎臟非一人病在腎脾脈肝三臟者也雷公曰於此有人四肢懈惰喘咳血泄愚人診之以為傷肺切脈浮大而緊愚不敢治粗工下𥦖病愈多出血止身輕此何物也子所能治知亦衆多與此病失矣懈惰喘咳泄血而脈當沉細今反洪大而緊愚人雖謂以為肺傷疑不敢療也有粗工不量所以直下𥦖石出血病瘥衆多然於大病不當而出血即能除瘥其義何也黃帝曰譬以鴻飛亦神於天夫聖人治病修法守度授物比類化之冥冥循上及下何必守經鳥行無章故鴻飛而得沖天聖人不守於經適變而有所當故粗工於經雖有所失於病遇所當斯亦不足以為怪也今夫脈浮大虛者是脾氣之外絶去胃外歸陽明也夫二火不勝三水是脈亂而無常也以其脾病其氣不行於胃故脈浮大也脾氣去胃外乘陽明也二火者二陽即陽明也三水者三陰即太陰也今太陽病氣外乘陽明即二火不勝三水也陽明不勝太陰故脈亂無常之也四肢懈惰此脾精之出行脾之精氣出散故出行也出散不營也故四肢懈惰也喘咳者是水氣並陽明也太陽三水並陽明也手陽明絡肺故喘也血泄者脈忽血無所行也陽明血脈盛急不行故嘔血也若夫以為傷肺者由以狂也不引比類是知不明也夫傷肺者脾氣不守胃氣不輕精氣不為使真臟壞決脈旁絶五臟滿泄不衄則嘔此二者不相類譬如天之無形地之無理白與黑相遠矣是吾失過以子知之故不告子明引比類從容是以名曰診經是謂至道輕清也不清胃氣獨也是傷肺泄血與脾虛泄血其理不同以為同者是失也謂子知之不告子者吾之過也如能明引比類安審得之是謂診經道也問曰人之居處動靜勇怯脈亦為之變乎曰凡人之驚恐志勞動靜皆以為變言勇怯之人非直動靜有驚恐志勞其脈亦有喘數也是以夜行則喘喘出於腎夜陰也腎亦陰也夜行志勞陰並破脈喘出腎也淫氣病肺有所墮恐喘出於肝淫邪之氣之先病於肺又因墜墮恐怖有喘者是肺賊邪乘肝肝病為喘之也淫氣客於脾有所驚駭喘出於肺淫邪之氣先客於脾又因有所驚駭脈有喘者是脾虛邪乘肺肺病為喘也淫氣傷於心度水趺僕喘出於腎與骨當是之時勇者氣行已怯者則著而為病腎主水及與骨也淫邪先傷於心又因度水趺僕心悕腎氣盛為賊邪乘心故心病為喘也當爾心病因驚失水僕時勇者壯氣助心正氣得行病得除已怯者因驚失神故曰病而喘之也故曰診病之道觀人勇怯骨肉皮膚能知其情者以為診法診病之道先觀人之五事得其病情者以為診法也故飽甚則汗出於胃汗陰液也人動有所過陽盛反衰所以陰液出也傷飽氣盛反衰故汗出胃也驚而奪精汗出於心驚怖傷神反衰故汗出心也持重遠行汗出於腎持重氣盛傷志反衰故汗出腎者也疾走恐懼汗出於肝疾走恐懼氣盛傷魂反衰故汗出肝也搖體勞苦汗出於脾脾主體內故搖動形體勞苦氣盛反衰汗出於脾也故春秋冬夏四時陰陽生病起過用此為常人於四時飲食勞佚不能自節以生諸病斯乃愚人起過之常也食氣入於胃散精於肝淫氣筋食氣入胃胃之血氣之精散入五臟而獨言肝以肝為木東方春氣為物之先故也淫溢氣為筋者也食入於胃濁氣歸心胃氣分二清者為氣濁者為血心主於血故濁歸於心也淫精於脈脈氣留經心之精甚停留十二大經中也經氣歸於肺肺以主氣故二經脈之氣皆歸於肺也故肺主氣也肺朝百脈十二經脈奇經八脈十五大絡等絡脈皆集肺脈兩手太陰寸口而朝之輸精於皮毛肺氣行於孫絡通輸精氣至皮毛中也毛脈合精行氣於腑毛脈即孫脈也謂孫絡者即精氣和合行於六腑皆肺氣也腑精神留於四臟六腑貯於水谷水穀之氣化為精神留在四臟之中亦肺氣之所行者也氣歸於權衡以平氣口成寸以決死生權衡謂陰陽也以其陰陽之平平於氣口之脈成九分為寸候五臟六腑之脈以決死生也飲食入於胃遊洫精氣上輸於脾脾氣散精上歸於脾肺溝洫通水處也深八尺曰洫四尺曰溝飲食入胃津液遊於肺中比之遊洫精氣上輸與脾脾受氣已上輸與肺有字為洫與溢同從胃流氣入脾非散溢也肺調水道下輸膀胱肺以主氣通津液濁者下行輸與膀胱為溲也水精四布水精血氣也肺行血氣布於四臟也五經並行合於四時五臟陰陽動靜揆度此以為常四臟經脈並肺臟經以為五經也五臟經並行於氣以外合四時之氣內應五臟陰陽動靜以應法度也揆應度應法度之也太陽藏獨至厥喘虛氣逆是陰不足陽有餘也表裡當俱瀉取下輸太陽足太陽即三陽也藏足少陰二陰者一腑藏腎與膀胱脈獨至時厥而復喘虛而氣逆虛者是陰氣不足厥而喘者陽氣有餘也少陰不足微不足也太陽有餘有餘太也故微瀉少陰使其不盛甚瀉太陽使其平也所以表裡俱取下輸下謂是足少陰及足太陽下五輸也陽明臟獨至是陽氣重並也當瀉陽補陰取下輸陽明足陽明也即二陽也藏足太陰三陰者也此一腑藏脾與胃脈獨至寸口陽明為首兼太陰而至寸口者即陽氣重並於陰故瀉足陽明補足太陰也皆取下之五輸也少陽獨至是厥氣也喬前卒大取下輸少陽陽獨至者一陽之過足少陽即一陽也少陽獨至即是厥逆氣至也少陽與厥逆氣至是少陽盛而為過其絡卒太在足外踝之上三寸喬脈付陽穴前以筋骨之間為下輸也太陰藏傳者用省真五脈氣少胃氣不平三陰也宜治下輸補陽瀉陰太陰足太陰也即三陰也臟謂脾臟也傳輸聚不營五即用省少也真五臟脈少於胃氣故曰不本故太陰脈即是三陰者也如此即陰盛陽虛所以須補陽瀉陰取下五輸之也一陰獨嘯獨嘯少陰之厥也陽並於上血脈爭張陰氣歸於腎宜治經絡瀉陽補陰足少陽從耳後入耳中出走耳前所以陽盛耳鳴故曰一陰獨嘯也腎主於耳腎脈少陰也陽盛耳鳴即知少陰厥逆陽盛於上陰氣歸下宜瀉陽補陰經之脈之也二陰至厥陰之治也真虛悁心厥氣留薄發為白汗調食和藥治在下輸二陰少陰也真實也少陰之脈虛厥陰脈實虛者悁心故厥氣停薄於心發為白汗心液也如此可調於食可和於藥可行針石於下五輸別療之也悁居玄反色忿之也太陽藏何象三陽而浮太陽三陽也故脈象三陽之脈浮者是也少陽藏何象一陽滑而不實滑者陽氣盛微熱不實虛也陽明藏何象象心之太浮也象心脈太而浮也太者多少氣之也太陰藏搏言其伏鼓也太陰之脈聚伏鼓動也二陰搏至腎沉不浮少陰之脈聚至沉於骨邊不浮也
