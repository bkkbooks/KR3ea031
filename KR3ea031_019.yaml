body:
  text: 卷第十九設方知古今平按此篇自篇首至末見素問卷四第十四湯液醪醴論篇黃帝問於岐伯曰為五穀湯液及醪醴奈何醪汁澤酒醴宿酒也此並擬以去病為之奈何也平按素問無於岐伯三字岐伯對曰必以稻米炊之稻薪稻米者完稻薪者堅曰此得之天之和高下之宜故能至完伐取得時故能至堅稻米得天之和氣又高下得所故完稻薪收伐得時所以堅實用炊以為醪醴可以療病者也平按曰此得上素問有帝曰何以然岐伯七字之天之和素問作天地之和至堅下有也字黃帝問於岐伯曰上古聖人作湯液醪醴為而不用何也曰上古聖人作為湯液醪醴者以為備耳夫上古作湯液故為而弗服伏羲以上名曰上古伏羲以下名曰中古黃帝之時稱曰當今上古之時呼吸與四時合氣不為嗜欲亂神不為憂患傷性精神不越志意不散營衛行通腠理致密神清性明邪氣不入雖作湯液醪醴以為備擬不為服用者也平按黃帝問於岐伯曰素問作帝曰何也下素問有岐伯二字上古作自古作為作之作中古之世德稍衰也邪氣時至服之萬全上古行於道德建德既衰下至伏羲故曰稍衰也帝王德衰不能以神化物使疵癘不起嗜欲情生腠理開發邪氣因入以其病微故服湯液醪醴稍衰而猶純故因湯液而萬病萬全曰今之世不必已何也不定皆全故曰不必已也平按素問曰上有帝字曰當今之世必齊毒藥攻其中鑱石針艾治其外形弊血盡而功不立者何也廣前問意問意曰良藥可以養性毒藥以療病黃帝不能致德邪氣入深百性疾甚盡齊毒藥以攻其內鑱石針艾以療其外外則形弊內則血氣盡而形不愈其意何也平按素問曰上有岐伯二字外下有也字及帝曰二字曰神不使何謂神不使人之神明有守以營於身即為有使也平按曰上素問有岐伯二字何謂上有帝曰二字曰針石者道也精神越志意散故病不可愈也針石道者行針石者須有道也有道者神不馳越志不異求意不妄思神清內使雖有邪客服之湯液醪醴萬全也平按素問曰上有岐伯二字越作不進散作不治新校正云按全元起本云精神進志意定故病可愈太素云精神越志意散故病不可愈與此正同今精壞神去營衛不可復收今時五臟精壞五神又去營衛之氣去而不還故病不愈何者視欲無窮而憂患不止故精氣施壞營澀衛除故神去之而病之所以不愈也以下釋前精壞神去營衛不行所由也一則縱耳目於聲色樂而不窮二則招憂患於悲怨苦而不休天之道也樂將未畢哀已繼之故精氣施壞營澀衛除神明去身所以雖療不愈也故無恆愚品不可為醫作巫斯之謂也平按視素問作嗜施素問作弛營澀素問作榮泣病下素問無之所以三字知要道平按此篇自篇首至末見靈樞卷七第四十五外揣篇又見甲乙經卷五第七黃帝曰余聞九針九篇余親受其調頗得其意夫九針者始於一而終於九然未得其要道也九篇謂九針章別即為篇非是一部總有九篇也調謂一同指歸要道謂渾一之妙也夫九針者小之則無內九針之道小之有內則內者為小針道非小也故知針道小者小之窮也大之則無外針道之大有外者為大針道非大也故知針道大者大之極也深不可為下針道之深更有下者則針道非深故知針道深者深之深高不可為蓋針道之高更有高者則針道有蓋故知針道高者高之高平按甲乙無深不可為下二句恍惚無窮流溢亡極余知其合於天道人事四時之變也窮之更妙故不可窮也極之愈巧故亡極也天道人事四時之變既然余知針道與之同者也然余願聞雜之毫毛渾束為一可乎余知針理與道變似萬端而願參之同毫釐之細渾之若衆妙之一也同毫釐之細有神使之明若衆妙之一得萬事之畢平按靈樞願下無聞字雜作雜甲乙余上無然字願下無聞雜之毫毛五字束作求岐伯曰明乎哉問也非獨針焉夫治國亦然毫細渾一人道用之針液可以遐年以之保國可以延祚非大聖之明孰能問此平按靈樞針下有道字甲乙無此一段黃帝曰余聞針道非國事也針道去病存己國事即先人後己存身與利人兩異恐針道非理國之要平按靈樞餘下有願字甲乙無此一段岐伯曰夫治國者夫唯道焉非道何可小大深淺雜合而為一乎哉理國安人也針道存身也安人之與存身非道不成故通兩者渾然為一也兩者通道故身國俱理耳夫積小成大故小大不可異也益淺為深故深淺不可殊也針道者即小與淺也理國者即大與深也所以通為一即針道理國得其妙也平按甲乙無夫治國者四字雜作離黃帝曰願卒聞之岐伯曰日與月焉水與鏡焉鼓與響焉以下設日月水鏡鼓響六譬欲窮存身安人微妙之道夫日月之明不失其彰水鏡之察不失其形鼓響之應不後其聲治則動搖應和盡得其情針藥有道故渾一而用巧理國有道故政同而理能是以針藥正身即為內也用之安人即為外也內譬日月水鏡鼓響者也外譬光影形象音聲者也針法存身和性即道德者也攝物安人即仁義者也故理身理國動搖應和盡和群生之情斯乃至真之道也不後者同時者也平按彰靈樞作影依本注亦宜作影治則動搖應和靈樞作動搖則應和自上節黃帝曰願卒聞之至盡得其情甲乙無黃帝曰窘乎哉照照之明不可蔽也其不可蔽者不失陰陽也以陰陽察於內外故照照不可蔽者也平按靈樞照照作昭昭合而察之切而驗之見而得之若清水明鏡不失其形也以內外合而察之以志意切而取驗故得之見而得之見得之明若水鏡之明不相失之也五音不彰五色不明五臟波蕩五音五色即外也五臟即內也以五臟神性波蕩故音色不彰明若是則外內相襲若鼓應桴響之應聲影之似形也舉此三譬以曉物情也襲者因也鼓聲與形為內近也桴影及響為外遠也平按靈樞鼓下有之字自黃帝曰窘乎哉至似形也甲乙無故遠者司外揣內近者司內揣外遠者所司在外以感於內近者所司在內以應於外故曰揣也揣度也是謂陰陽之極天地之蓋請藏之靈蘭之室弗敢使泄是為陰內陽外感應之極理以是天地足蓋無外之大故請藏靈蘭室寶而重之平按靈樞泄作泄下有也字甲乙無請藏之以下十一字知方地平按此篇自篇首至末見素問卷四第十二異法方宜論篇又見甲乙經卷六第二又見日本心醫方卷一治病大體第一黃帝問於岐伯曰醫之治病也一病而治各不同皆愈何也岐伯曰地勢使然五方土地各異人食其土生病亦異療方又別聖人量病所宜一病合以余方療之皆得愈者大聖之巧平按素問然下有也字醫心方無甲乙無此一段故東方之域天地之法始生也魚鹽之地濱海旁水其民嗜魚而食鹹皆安其處美其食天地之法東方為春萬病始生之方也人生魚鹽之地故安其處美其食也平按法素問作所醫心方作法鹽原抄本省作盬醫心方作盬按史記貨殖傳注盬謂鹽直用不煉為盬素問作鹽取人易解謹依素問作鹽甲乙東方上無故字東方下無之域至之地十三字嗜魚素問作食魚食鹹素問作嗜咸甲乙醫心方同甲乙無皆安其處美其食七字醫心方同魚者使人熱中鹽者勝血故其民皆黑色疏理魚性是熱故食之令人熱中鹽水也血者火也水以剋火故勝血而人色黑也平按鹽甲乙作咸醫心方作盬故其病皆為癰瘍其治宜砭石故砭石者亦從東方來熱中疏理之人多生癰瘍病也瘍養良反瘡也砭鐵破癰已成冷石尉其初起此言東方病異療平按為癰瘍甲乙作多壅腫無故砭石下九字西方者金玉之域沙石之處也天地之所收引也其民陵居而多風水土剛強其民不衣而疊篇其民笮食而脂肥故邪不能傷其形體其病皆生於內其治宜毒藥毒藥者亦從西方來笮詐白反西方金亦金玉之所出故為金玉之域也西方為秋故為萬物收引之方也不衣者不以綿為衣而以疊篇其身食物皆壓笮磨碎不以完粒食之人多脂肥腠理致密風寒暑濕外邪不傷而為飲食男女內邪生病故宜用毒藥攻之平按疊篇素問作褐薦按史記貨殖傳索隱云疊毛織也醫心方亦作疊篇旁注云篇竹草也笮食素問甲乙作華食醫心方作笮食注與楊注同又注壓上袁刻脫皆字北方者天地所閉藏之域也其地高陵居風寒冰凍其民樂野處而乳食臟寒生病其治宜灸焫灸焫者亦從北方來北方為冬故為萬物閉藏之方也北方其地漸高是陰中之陰故風寒也所樂之處既於寒所美之食非溫故五臟寒而生病宜以灸焫焫燒也而悅反有本凍為湖量北方無湖也平按冰凍素問甲乙作冰冽生病素問病上有滿字南方者天地所養長陽氣之所盛處也其地汙下水土弱霧露之所聚也其民嗜酸而食胕故其民致理而色赤其病攣痹其治宜微針故九針者亦從南方來南方為夏萬物養長陽盛之方也陽中之陽其地漸下故水土弱霧露之所聚也汙下濕也胕快付反義當腐南方為火色赤故人多赤色也以居下濕多攣痹病故宜用九針也平按素問陽下無氣字地汙下作地下甲乙同醫心方作地窪下旁注云窪與瓜反食胕甲乙作食臊素問新校正云全元起云食魚也中央者其地平以濕天地所生物色者衆中央為土故其地平濕中土之所生物色多平按物色者衆素問作萬物也衆甲乙作物者衆其民食雜而不勞故其病多痿厥寒熱其治宜導引按蹺故按蹺亦從中央出蹺巨紹反人之食雜則寒溫非理故多得寒熱之病不勞則血氣不通故多得痿厥之病故導引按蹺則寒熱咸和血氣流通此非但愈斯二疾萬病皆可用之蹺又九紹反舉平也平按其治宜導引按蹺醫心方作道引無按蹺二字故按蹺素問作導引按蹺故聖人雜合以治各得其所故治所以異而病皆愈者得病之情知治之大體也五方水土生病不同隨療各異聖人即知一病為衆藥所療故以所宜為工得療病之大體也平按得其所下素問甲乙醫心方均有宜字依本注亦應有宜字知形志所宜平按此篇自形樂志苦至出氣惡血見素問卷七第二十四血氣形志篇又見靈樞卷十二第七十八九針論又見甲乙經卷六第二又見日本醫心方卷一治病大體第一自陽明多血氣至末素問靈樞見同前篇又自陽明多血氣至少陰少血多氣靈樞卷十第六十五五音五味篇亦有此文形樂志苦病生於脈治之以灸刺形身之貌也志心之志也心以主脈以其心勞邪氣傷脈心之應也故以灸刺補瀉脈病也形苦志樂病生於筋治之以尉引形苦筋勞邪氣傷筋肝之應也筋之病也醫而急故以尉引調其筋病也藥布尉之引之使其調也平按形苦志樂一段素問在形樂志樂一段下形樂志樂病生於肉治之以針石形志俱逸則邪氣客肉脾之應也多發癰腫故以砭針及石尉調之也山海經曰高氏之山其上多玉有石可以為砭針堪以破癰腫者也平按注多發癰腫腫字袁刻誤作脾形苦志苦病生於咽喝治之以藥形志俱苦勞氣客邪傷氣在於咽喝肺之應也喝肺喘聲也有本作渴故療之湯液丸散藥之也平按咽喝素問作咽嗌甲乙作困竭藥素問作百藥靈樞甲乙作甘藥醫心方引太素仍作藥形數驚恐筋脈不通病生於不仁治之以按摩醪藥是謂五形驚恐主腎形多驚懼邪客筋脈筋脈不通腎之應也痛生筋脈皮膚之間為痹不仁故以按摩醪醴五形言陳其所宜也平按素問筋脈作經絡五形下有志也二字醫心方無是謂五形四字故曰刺陽明出血氣手陽明大腸脈足陽明胃脈也二脈上下連注其氣最強故此二脈盛者刺之血氣俱瀉平按故曰二字素問無甲乙作故志曰刺太陽出血惡氣手太陽小腸脈也足太陽膀胱脈也二脈上下連注津液最多故二脈盛者刺之瀉血邪客之者瀉去惡氣也刺少陽出氣惡血手少陽三焦脈也足少陽膽脈也二脈上下連注其氣最多故此二脈盛者刺之瀉氣邪客之者瀉去惡血也刺太陰出血氣手太陰肺脈也足太陰脾脈也此二太陰與二陽明雖為表裡其氣血俱盛故並瀉血氣也平按素問出血氣作出氣惡血甲乙同素問新校正云按太素云刺陽明出血氣刺太陰出血氣楊上善云陽明太陰雖為表裡其血氣俱盛故並瀉血氣如是則太陰與陽明等俱為多血多氣前文太陰一云多血少氣二云多氣少血莫可的知詳太素血氣並瀉之旨則二說俱未為得自與陽明同爾刺厥陰出血惡氣手厥陰心包絡脈也足厥陰肝脈也與二少陽以為表裡二陽氣多血少陰陽相反故二陰血多氣少是以二厥陰盛以瀉血也邪客之者瀉去惡氣刺少陰出氣惡血手少陰心脈也足少陰腎脈也與二太陽以為表裡二太陽既血多氣少亦陰陽相反二陰氣多血少是以二少陰盛瀉於氣也邪客之者瀉去惡血也平按刺少陰句素問甲乙在刺厥陰前注陰陽上袁刻脫亦字陽明多血氣太陽多血少氣少陽多氣少血太陰多血氣厥陰多血少氣少陰少血多氣此言刺三陰三陽出血出氣差別所以也平按太陰多血氣素問作太陰常多氣少血靈樞作多血少氣甲乙同素問新校正云按甲乙經十二經水篇云太陽太陰血氣多少與素問不同又陰陽二十五人形性血氣不同篇與素問同蓋皇甫疑而兩存之也今考甲乙經陰陽二十五人形性血氣不同篇所云太陰常多血少氣仍與素問異或宋臣所見甲乙經與今本甲乙經不同姑存之以備參考足陽明太陰為表裡少陽厥陰為表裡太陽少陰為表裡是謂足之陰陽也手陽明太陰為表裡少陽心主為表裡太陽少陰為表裡是謂手之陰陽也今知手足陰陽所在平按素問兩太陽少陰為表裡在兩少陽上兩陽明太陰為表裡在兩少陽下注今知手足八字素問將此注作經惟所在作所苦凡治病必先去其血去其所苦伺之所欲然後瀉有餘補不足凡療病法諸有痛苦由其血者血聚之處先刺去之刺去血已伺候其人情之所欲得其虛實然後行其補瀉之法也平按素問血下有乃字靈樞無此一段注血聚聚字袁刻誤作刺知祝由平按此篇自篇首至末見素問卷四第十三移精變氣論篇黃帝問於岐伯曰余聞古之治病者唯其移精變氣可祝由而已也今世治病毒藥治其內針石治其外或愈或不愈何也上古之時有疾但以祝為去病所由其病即已今代之人苦於針藥而療病不愈者為是病有輕重為是方術不妙平按素問無於岐伯三字古之治病者者字素問無而已下無也字岐伯曰往古民人居禽獸之間上古禽獸多而人少人在禽獸之間巢居以避禽獸故稱有巢氏也平按素問曰上有對字人上無民字動作以避寒陰居以避暑以躁勝寒故動作以避寒以靜勝熱故陰居以避暑內無眷慕之纍外無申宦之形此恬惔之世邪不能入也故毒藥不治其內針石不治其外故可移精祝由而已也既為恬惔之世有性莫不恬惔自得恬然自得內無眷慕之情惔然至樂外無申宦之役申宦不役於軀故外物不形眷慕不勞於志故內欲不纍內外恬惔自然泰和外邪輕入何所深哉是以有病以祝為由移精變氣去之無假於針藥也平按申宦素問作伸官惔作憺新校正云全元起伸作臾注既袁刻作此新校正云全元起云祝由南方神當今世不然憂患琢其內苦形傷其外眷慕起於心則憂其內申宦苦其形則傷於外也平按素問世上有之字琢作緣又失四時之逆順寒暑之宜賊風數至陰虛邪朝夕內至五臟骨髓外傷空竅肌膚故所以小病必甚大病必死者故祝由不能已也黃帝曰善夏則涼風以適情冬則求溫以從欲不領四時逆順之宜不依冬夏寒暑之適由是賊風至於腠理虛邪朝夕以傷體虛邪傷體內入臟而客髓賊風開腠外客肌以傷竅所以微疾積而成大病也加而致死苦之針藥尚不能愈況祝由之輕其可遣也平按逆順素問作從逆虛上無陰字知針石平按此篇自篇首至神無營於衆物見素問卷八第二十五寶命全形論篇又見甲乙卷五第四自黃帝曰願問禁數至逆之有咎見素問卷十四第五十二刺禁論篇甲乙同上自黃帝曰願聞九針虛實之道至四方各作解見素問卷十四第五十四針解篇又見甲乙卷五第四及卷五第二惟意是而編次不同自黃帝問岐伯曰有病頸癰者至末見素問卷十三第四十六病能論篇又見甲乙經卷十一第九黃帝問岐伯曰天覆地載萬物悉備莫貴於人人以天地之氣生四時之法成君王衆庶盡欲全形形之所疾莫知其情留淫日深著於骨髓心私患之余欲以針除其疾病為之奈何天地之間人最為貴人君衆庶莫不寶身然不知病之脆微留連骨髓故請療之方也平按所疾素問作疾病患作慮新校正云太素慮作患岐伯曰夫鹽之味鹹者其氣令器津泄弦絶者其音嘶敗木陳者其葉落髮病深者其聲噦言欲識病徵者須知其候鹽之在於器中津泄於外見津而知鹽之有咸也聲嘶知琴瑟之弦將絶葉落者知陳木之已蠹舉此三物衰壞之徵以比聲噦識病深之候也平按木陳者其葉落髮素問作木敷者其葉發新校正引太素亦作木陳者其葉落王履溯洄集所引木陳二句亦無發字注兩徵字素問新校正引楊注均作微袁刻同津下素問新校正所引楊注有液字葉落下者知二字袁刻誤作如人有此三者是謂壞腑毒藥毋嬰治短針毋取此皆絶皮傷肉血氣爭異人有聲噦同三譬者謂是腑壞之候也腑者中腑謂五臟也壞者則聲噦也中腑壞者病之深也其病既深故針藥不能取也以其皮肉血氣各不相得故也平按素問治上無嬰字爭異作爭黑新校正云詳岐伯之對與黃帝所問不相當因引太素自夫鹽之味至血氣爭異一段謂太素與此經只三字不同而注意大異復引楊注自言欲知病徵者至各不相得故也謂楊氏注義與黃帝上下問答義相貫穿王氏解鹽咸器津義雖淵微至於注弦絶音嘶木敷葉發殊不與帝問相協不若楊義之得多也黃帝曰余念其病心為之亂惑反甚其病不可更代百姓聞之為殘賊為之奈何余念微病淫留至深衆庶不知遂著骨髓余痛其心反甚於病不能去已故曰不可更代百姓聞此積微成大壞腑之言莫不以為殘賊之深欲知為之奈何也平按余念其病素問作余念其痛岐伯曰夫人生於地懸命於天天地合氣命之曰人人能應四時者天地為之父母天與之氣地與之形二氣合之為人也故形從地生命從天與是以人應四時天地以為父母也荷主萬物者謂之天子天地所貴者人人之所歸者聖唯聖荷物故號曰天子也平按荷主二字素問作知天有陰陽人有十二節此言天子所知凡有二合四能天有十二時分為陰陽子午之左為陽子午之右為陰人之左手足六大節為陽右手足六大節為陰此為一合也天有寒暑人有虛實十二爻寒暑之氣十一月陽氣漸息陰氣漸消至四月陽氣在盈陰氣正虛至五月陰氣漸息陽氣漸消至十月陰氣在盈陽氣正虛陰陽即為寒暑者也盈虛以為虛實者也人亦如之消息盈虛有虛有實為二合也能經天地陰陽之化者不失四時天地合氣命之曰人故能知天地陰陽變化理與四時合契此一能也能知十二節之理者聖智不能欺知人陰陽十二節氣與十二時同循之而動不可得失雖有聖智不能加也欺加也此二能也平按素問知上無能字欺下有也字能存八動之變者五勝更立八動八節之氣也八節之氣合金木水火土五行之氣更廢更立血氣亦然此三能也能達虛實之數者獨出獨入呿吟至微秋毫在目能達寒暑之氣虛實相移者則壽蔽天地能獨出死地獨入長生其言也呿吟至真微妙之道其智也目察秋毫深細之理此四能也呿音去即露齒出氣平按素問新校正引楊注云呿謂露齒出氣與此同黃帝曰人生有形不離陰陽萬物負陰抱陽沖氣以為和萬物盡從三氣而生故人之形不離陰陽也天地合氣別為九野分為四時月有小大日有短長萬物並至不可勝量虛實呿吟敢問其方從道生一謂之朴也一分為二謂天地也從二生三謂陰陽和氣也從三以生萬物分為九野四時日月乃至萬物一一諸物皆為陰陽氣之所至故所至處不可勝量不可量物並有虛虛實實之談請言其道方道也岐伯曰木得金而伐火得水而滅土得水而達萬物盡然不可勝竭言陰陽相分五行相剋還復相資如金以剋木水以剋火土以剋水始土剋水得水通易餘四時皆然並以所克為資萬物皆爾也平按土得水而達素問水作木而達下素問有金得火而缺水得土而絶二句故針有懸布天下者五也故針等利人之道凡有五利也黔首共飲食莫知之也黔黑也渠廉反人之首黑故名黔首也飲食服用也黔首服用此道然不能得其意也平按飲食素問作餘食新校正云按全元起本餘食作飽食注云愚人不解陰陽不知針之妙飽食終日莫能知其妙益又太素作飲食楊上善云黔首服用此道然不能得其意一曰治神存生之道知此五者以為攝養可得長生也魂神意魄志以神為主故皆名神欲為針者先須理神也故人無悲哀動中則魂不傷肝得無病秋無難也無怵惕思慮則神不傷心得無病冬無難也無愁憂不解則意不傷脾得無病春無難也無喜樂不極則魄不傷肺得無病夏無難也無盛怒者則志不傷腎得無病季夏無難也是以五過不起於心則神清性明五神各安其臟則壽近遐算此則針布理神之旨也乃是崆峒廣成子之道也平按注先須理神也素問新校正引此注作先須治神各安其臟其字原抄作甚依新校正所引作其壽近遐算新校正所引作壽延遐算二曰治養身飲食男女節之以限風寒暑濕攝之以時有異單豹巖穴之害即內養身也實恕慈以愛人和塵勞而不跡有殊張毅高門之傷即外養身也內外之養周備則不求生而久生無期壽而壽長也此則針布養身之極也玄元皇帝曰太上養神其次養形斯之謂也平按養身素問新校正云太素身作形此仍作身注巖穴新校正所引作外雕恕慈作慈恕養身身字均作形壽長作長壽又按注單豹張毅事見淮南子人間訓三曰知毒藥藥為真藥有三種上藥養神中藥養性下藥療病此經宗旨養神養性唯去怵惕之慮嗜欲之勞其生自壽不必假於針藥者也有病生中無出毒藥以為真惡故須知之平按素問藥字不重四曰制𥦖石大小東方濱海水旁人食鹽魚多病癰腫故制𥦖石大小用破癰也平按素問𥦖作砭五曰知輸臟血氣之診輸為三百六十五穴者也臟謂五臟血氣診謂經絡脈診候也平按素問輸作腑五法俱立各有所先此五法各有所長故用之各有所先也今末世之刺虛者實之滿者泄之此皆衆工所共知之粗工守形實者瀉之虛者補之斯乃衆人所知不以為貴也平按素問泄作泄知之作知也若夫法天則地隨應而動者知之者若響隨之者若影刺虛實之道法天地以應萬物若響應聲如影隨形得其妙得其機應虛實而行補瀉也平按素問甲乙動下無者字知作和道無鬼神獨往獨來應天地之動者謂之道也有道者其鬼不神故與道往來無假於鬼神也平按獨往獨來素問甲乙作獨來獨往黃帝曰願聞其道岐伯曰凡刺之真必先治神五臟已定九候已備乃緩存針凡得針真意者必先自理五神五神既理五臟血氣安定九候已備於心乃可存心針道補瀉虛實平按九候已備甲乙作九候已明乃緩存針素問作後乃存針甲乙同衆脈弗見衆凶弗聞外內相得毋以形先病人衆病脈候不見於內諸病聲候不聞於外內外相得為真不唯形之善惡為候也平按弗見素問作不見甲乙作所見弗聞甲乙作所聞可梲往來乃施於人梲五骨反動也先知內外相得之理動而往來乃可施人也平按梲素問甲乙作玩人有虛實五虛勿近五實勿遠五謂皮肉脈筋骨也此五皆虛勿近瀉之此五皆實勿遠而不瀉平按人有虛實甲乙作虛實之要至其當發間不容眴至其氣至機發不容於眴目也容於眴目即失機不得虛實之中眴音舜平按眴素問甲乙作瞚新校正云甲乙瞚作暄全元起本及太素作眴手動若務針耀而眴手轉針時專心一務平按眴素問甲乙作勻靜意視義觀適之變可以靜意無勞於衆物也視其義利觀其適當知氣之行變動者也是謂冥冥莫知其形此機微者乃是火龷早冥衆妙之道淺識不知也見其烏烏見其稷稷從見其飛不見其雜烏烏稷稷鳳凰雄雌聲也鳳凰群雜而飛雄雌相和不見其雜有觀鳳者別其聲殊辨其形異故曰不雜譬善用針者妙見針下氣之虛實瞭然不亂也平按烏烏袁刻誤作鳥鳥雜素問甲乙作誰伏如橫弩起如發機如橫弩者比其智達妙術也起如機者比行之得中平按起如甲乙作起若黃帝曰何如而虛何如而實岐伯曰刺虛者須其實也刺實者須其虛也虛為病者補之須實實為病者瀉之須虛也終氣以至慎守勿失得氣補瀉終時慎之勿使過與不及也平按終素問甲乙作經深淺在志志記也計針下深淺可記之不得有失深淺有失更增其病故須記遠近若一使之得中不可過與不及故曰若一也形如臨深淵手如握虎神無營於衆物行針專務設二喻以比之一如臨深淵更營異物必有顛墜之禍亦如握虎不堅定招自傷之害故行針調氣不可不用心也平按素問甲乙無形字黃帝曰願聞禁數岐伯曰臟有要害不可不察五臟之氣所在須知針之為害至要故欲察而識之肝生於左肝者為木在春故氣生左肺藏於右肺者為金在秋故氣藏右也肝為少陽陽長之始故曰生也肺為少陰陰藏之初故曰藏也平按注生也藏也素問新校正所引楊注無兩也字心部於表心者為火在夏居於太陽最上故為表腎治於裡腎者為水在冬居於太陰最下故為里也心為五臟部主故得稱部腎間動氣內理五臟故曰里也平按注內理五臟素問新校正所引楊注理作治故曰里也里作治脾為之使脾者為土王四季脾行穀氣以資四臟故為之使也胃為之市胃為脾腑也胃貯五穀授氣與脾以資四臟故為市也膈肓之上中有父母心下膈上謂肓心為陽父也肺為陰母也肺主於氣心主於血共營衛於身故為父母也平按注謂肓素問新校正所引楊注作為肓七節之旁中有志心脊有三七二十一節腎在下七節之旁腎神曰志五臟之靈皆名為神神之所以任物得名為心故志心者腎之神也平按志心素問作小心新校正云太素作志心注五臟之靈皆名為神神之所以任物得名為心袁刻脫此十八字物得名為心故志心者腎之神也十三字新校正所引作得名為志者心之神也九字順之有福逆之有咎人之上順血氣下順志心有長生之福逆之有入死地之禍也平按順素問作從黃帝曰願聞九針之解虛實之道請解九針應於九數虛實之道也岐伯曰刺虛則實之者針下熱也刺寒虛者得針下熱則為實和也平按熱也下素問有氣實乃熱也五字滿而泄之者針下寒也刺熱實者得針下寒則為虛和也平按寒也下素問有氣虛乃寒也五字宛陳則除之者出惡血也宛陳惡血平按宛素問甲乙作菀邪勝則虛之者出針勿按也勿按者欲泄其邪氣也徐而疾則實者徐出針而疾按也瀉法徐出針為是只為疾按之即邪氣不泄故為實平按注疾下袁刻重一疾字疾如徐則虛者疾出針而徐按之也補法疾出針為是只是徐徐不即按之令正氣泄故為虛也平按疾如徐素問甲乙作疾而徐言實與虛者寒溫氣多少也言寒溫二氣偏有多少為虛實也若無若有者疾不可知也言病若有若無故難知也平按不可知袁刻作不可不知注故下袁刻增一甚字察後與先者知病先後知相傳之病先後者為虛與實者工守勿失其法刺虛欲令實刺實欲使虛工之守也平按素問無守字若得若失者離其法失其正法故得失難定也虛實之要九針最妙者為其各有所宜要在各有所宜補瀉之時者與氣開閉相合也補閉瀉開合熱為時平按素問閉作闔九針之名各不同形者針官其所之當補瀉九針之形及名別者以官主病之別又補瀉殊用也平按素問官作窮所下無之字瀉下有也字刺其實須其虛者留針陰氣降至乃去針也刺於熱實留針使針下寒無熱乃出針平按素問實上無其字降作隆刺其虛須其實者陽氣降至針下熱乃去針也刺於寒虛留針使針下熱無寒乃出針也平按素問虛上無其字降作隆降之已至慎守勿失者勿變更寒溫之氣降至針下勿令太過不及使之變為余病也平按降之素問作經氣更下有也字深淺在志者知病之內外也下針淺深得氣即知病在臟腑也近遠如一者深淺其候等也深淺得候即知閣中不令過與不及形如臨深淵者不敢墮也恐其失也手如握虎者欲其壯也專務甚也神毋營於衆物者靜志觀病人毋左右視也言志一不亂也義毋邪下者欲瞻病人目制其神令氣易行也不自御神為義邪下平按義毋邪下者下素問有欲端以正也必正其神者二句所謂三里者下膝三寸也所謂付之者舉膝分易見也言三里付陽穴之所在也付陽穴在外踝上三寸舉膝分之時其穴易見也又付三里所在者舉膝分其穴易見也平按付素問作跗新校正云全元起本跗之作低胻太素作付之按骨空論跗之疑作跗上又按素問王注云三里穴名正在膝下三寸䯒外兩筋肉分間極重按之則足跗上動脈止矣故曰舉膝分易見巨虛者搖喬足胻獨陷者也下廉者陷者也在三里下三寸足胻外獨陷大虛之中名曰巨虛巨虛之中上廉足陽明脈與大腸合下廉足陽明脈與小腸合喬高也謂此外踝上高舉處也搖而取之平按素問無搖字喬作蹺獨陷者也作獨陷者陷者也作陷下者也黃帝問岐伯曰余聞九針上應天地四時陰陽願聞其方令可傳於後世而以為常岐伯曰夫一天二地三人四時五音六律七星八風九野此舉天地陰陽之數平按素問而以為常作以為常也人形亦應之針各有所宜故曰九針人形應於九數故曰各別有所宜平按素問人形作身形人皮應天人肉應地人脈應人人之筋應時平按素問筋上無之字人聲應音人陰陽合氣應律人齒面目應星平按素問王注人面應七星所謂面有七孔應之也新校正云此注乃全元起之辭也人出入氣口應風平按素問無口字人九竅三百六十五絡應野言人九分應九數也故一針皮二針肉三針脈四針筋五針骨六針調陰陽七針益精八針除風九針通九竅除三百六十五節氣此之謂也各有所主也人身既應九數行針亦有九別也調陰陽者應六律也益精者益五臟精應七星謂北斗七星除風應八風通九竅應三百六十五節之氣九野者也以其人身有主合之也平按素問謂下無也字注野下袁刻脫者字人心意應八風人邪氣應天地心意邪氣應天地之中八風也平按人邪氣應天地素問作人氣應天人面應七星人發齒耳目五聲應五音六律人陰陽脈血氣應地人肝目應之九九竅三百六十五肝主於目在天為日月其數當九故九竅合九野三百六十五數也平按素問無人面應七星一句新校正云全元起本無九竅下七字人一以觀動靜九數各有九分義故人之一分法動靜也天二以候五色七星應之以候發毋澤也天之二分之義候五色七星分發皆天之候平按素問無也字五音一以候宮商角徵羽五音一分之義以候人之五聲也六律有餘不足應之六律升降以候虛實二地一以候高下有餘地之一分之義以候高下有餘也九野一節輸應之以候閉九野一分之義候三百六十五節氣輸穴閉之不泄也三人變一分候齒泄多血少人九變一分之義候齒及泄多血少平按素問三上有節字一分下有人字十分角之變九數各九之此言十分未詳或字誤十分之義角音之變也五分以候緩急五分之義以候緩急也六分不足六分以候不足三分寒關節三分以候寒關節也平按關袁刻誤作開素問亦作關人九分四時節人寒溫燥濕人第九之分以候四時節寒溫燥濕也平按素問人九分作第九分時下無節字四時一應之以候相反一四時一分以候相反平按相反下袁刻脫一字四方各作解四時一分以候四方作解此之九數一一各有九分取之作解多少不等或取一或取二三四等章句難分但指句而已也平按素問王注云此一百二十四字蠹簡爛文義理殘缺莫可尋究而上古書故且載之以佇後之具本也新校正云詳王氏云一百二十四字今有一百二十三字又亡一字據本書自九竅三百六十五起至四方各作解止與素問校毋澤下本書多一也字三人變一分上本書少一節字下少一人字九分四時下本書多一節字仍止一百二十三字楊氏亦謂章句難分但指句而已則其不可尋究故不自今日始也姑存之以待來者黃帝問岐伯曰有病頸癰者或石治之或以針灸治之而皆已其真安在岐伯曰此同名異等者也同稱癰名針灸石等異療之平按素問針上無以字甲乙其真安在作其治何在異上有而字夫癰氣之息者宜以針開除去息者增長也癰氣長息宜以針刺開其穴瀉去其氣平按素問甲乙去下有之字夫氣盛血聚宜石而瀉之皆所謂同病異治者氣盛血聚未為膿者可以石尉瀉其盛氣也氣盛膿血聚者可以砭石之針破去也平按素問甲乙聚下有者字皆作此知湯藥平按此篇自篇首至末見素問卷四第十四湯液醪醴論篇黃帝問岐伯曰法病之始生也極微極精必先舍於皮膚今良工皆稱曰病成名曰逆則針石不能治也良藥不能及也今良工皆持法守其數親戚兄弟遠近音聲日聞於耳五色日見於目而病不愈者亦可謂不早乎精謂有而不虛也但有病在皮膚微小精實不虛若不療者定成大病故良工稱為病成以其病者精志眷慕於親戚耳目玩樂於聲色日久病成不可療也由其不破於脆微也平按素問法病作夫病必先舍作必先入結持法作得其法可謂作何暇新校正云按別本暇作謂注有而不虛原抄作有而虛不原校作不虛精實不虛虛字袁刻誤作無岐伯曰病為本工為標標本不得邪氣不服此之謂也若本無病則亦無療方故知有病為本然後設工是則以病為本以工為末也標末也風寒暑濕所生之病以為本也工之所用針石湯藥以為標也故病與工相契當者無大而不愈若工病不相符者雖微而不遣故曰不得邪不服也黃帝問曰其病有不從豪毛生而五臟傷以竭有病不以風寒暑濕外邪襲於豪毛腠理入而為病而五臟傷竭此為總言平按素問有上無病字生而作而生傷以竭作陽以竭也新校正云按全元起本及太素陽作傷義亦通津液虛廓腎傷竭也廓空也平按虛廓素問作充郭廓袁刻誤作廊其魂魄獨心傷竭也平按其魂魄獨素問作其魄獨居孤精於內氣耗於外雖有五臟之精而外少吐納之氣耗少也肺傷竭也形別不與衣相保皮膚不仁不與衣相近脾傷竭也保近也平按形別不與衣相保素問作形不可與衣相保此四亟急而動中是氣巨於內而形施於外治之奈何此四候即是五臟傷竭病生於內故曰動中亟數也是為五臟大氣數發病生於內病形施外療之奈何也平按素問亟作極巨作拒注巨大氣也應作巨袁刻作拒岐伯曰卒治權衡卒終也權衡臟腑陰陽二脈也病從內起終須調於臟腑陰陽二脈使之和也平按素問作平治於權衡去宛陳宛陳惡血聚也有惡血聚刺去也莖微動中四亟腎間動氣得和則陰莖微動四竭得生故本標得邪氣服平按素問莖作莝新校正云太素莝作莖與此正同動下無中字亟作極濕衣繆處以復其形繆異也衣肉不相保附故曰繆處調之既得腎氣動已則衣肉相得故曰復其形也平按濕衣繆處素問作溫衣繆刺其處開鬼門五神通之者也潔淨府潔清靜也心之不濁亂精以時命門所藏之精既多以時而有服五湯有五疏修五臟五湯五味湯也藥有五味以合五行相剋相生以為補瀉五氣得有疏通以修五臟也平按素問五湯作五陽有五疏修五臟作已布疏滌五臟故精自生形自盛骨肉相保巨氣乃平黃帝曰善哉腎間動氣人之生命故氣之和則精生精生則形盛形精既盛則骨肉相親於是大氣平和是為病形雖成療之有驗平按注下精生精字袁刻脫知官能平按此篇自篇首至末見靈樞卷十一第七十三官能篇又見甲乙經卷五第四針道篇黃帝問岐伯曰余聞九針於夫子衆多矣不可勝數余推而論之以為一紀余司誦之子聽其理非則語余請受其道令可久傳後世無患得其人乃傳非其人勿言言道之博大不可勝數余學之於子推尋窮問其理十有二載余今司而誦之以示於子其言有不當不可余必當合理余望傳乎所授之人傳之後代使久而利物也平按請受其道靈樞作請正其道岐伯稽首再拜曰請聽聖王之道道在岐伯授之與帝帝得之於神故是聖王之道也黃帝曰用針之理必知形氣之所在帝誦岐伯所授針理章句凡有四十七章形之所在肥瘦氣之所在虛實一也左右上下肝生於左肺藏於右心部於表腎居其里男女左右陰陽上下並得知之二也陰陽表裡五臟為陰居里六腑為陽居表三也血氣多少三陰三陽之脈知其血氣之多少四也行之逆順營氣順脈衛氣逆行五也出入之合血氣有出入合處六也誅伐有過誅伐邪氣惡血七也平按誅靈樞作謀知解結結謂病脈堅緊破而平之八也知補虛瀉實上下之氣能知補瀉上下之氣九也平按靈樞之氣作氣門明於四海審其所在髓血氣谷四海審知虛實所在十也平按靈樞明下有通字審寒熱淋露因於露風生於寒熱故曰寒熱淋露十一也平按靈樞寒上無審字滎輸異處五行滎輸有異十二也平按滎靈樞作以審於調氣審吐納導引以調氣十三也明於經隧經正經奇經也隧諸絡也故曰瀉其經隧無傷其經即其信也十四也左右支絡盡知其會支絡小絡也皆知小絡所歸大絡會處十五也平按靈樞支作肢寒與熱爭能合而調之陰陽之氣不和者皆能和之十六也虛與實鄰和決而通之鄰近也虛實二氣不和通之使平十七也平按靈樞和作知左右不調把而行之明於逆順乃知可治把持也人身左右脈不調者可持左右寸口人迎診而行之了知氣之逆順乃可療之十八也平按靈樞注云把一作犯注了字袁刻脫陰陽不奇故知起時奇分也陰陽之脈相併渾而不分候之知其病起之時十九也審於本末察其寒熱得邪所在萬刺不殆知官九針刺道畢矣妙通標本則知寒熱二邪所在故無危殆是為官主九針之道二十也明於五輸徐疾所在明臟腑之經各有五輸輸中補瀉徐疾所在並須知之二十一也屈伸出入皆有條理行針之時須屈須伸針之入出條數並具知之二十二也言陰與陽合於五行知分陰陽之氣以為五行二十三也五臟六腑亦有所藏五臟藏五神六腑藏五穀二十四也四時八風盡有陰陽各得其位合於明堂各處色部八風八節之風也四時八節之氣各在陰陽之位併合明堂處於五行五色之部明堂鼻也二十五也五臟六腑候五色之部察知五臟六腑二十六也察其所痛左右上下察五色知其痛在五臟六腑上下左右二十七也知其寒溫何經所在知十二經所起寒溫各有主二十八也審尺之寒溫滑澀知其所苦言能審候尺之皮膚二十九也平按靈樞尺作皮膚二字鬲有上下知氣所在谷入於胃清氣上肺故在鬲上濁氣留入胃中在於鬲下三十也平按靈樞鬲作膈知下有其字甲乙作知其氣之所先得其道希而疏之稍深以留之故能徐之為補之道希疏深留徐動其針三十一也平按希靈樞作稀甲乙作布而涿之注云太素作希而疏之靈樞甲乙徐下有入字大熱在上推而下之從下上者引而去之視前病者常先取之視病熱之上下瀉而去之三十二也大寒在外留而補之入於中者從合瀉之寒在皮膚留針使針下熱寒入骨髓亦可留針使熱瀉出寒熱氣三十三也針所不為火之所宜脈之陷下是灸所宜不可針也三十四也平按火靈樞甲乙作灸上氣不足推而揚之下氣不足積而從之上氣不足謂膻中氣少可推補令盛揚盛也下氣不足謂腎間動氣少者可補氣聚積聚也從順也三十五也陰陽皆虛火自當之厥而寒甚骨廉陷下寒過於膝下陵三里陰絡所過得之留止寒入於中推而行之經陷下火即當之火氣強盛能補二虛三十六平按經陷下火即當之靈樞作經陷下者火則當之甲乙作經陷下者即火當之結絡堅緊火之所治絡脈結而堅緊血寒故火攻療三十七也平按靈樞緊作下火之所治作火所治之注攻字袁刻脫不知所苦兩蹺之下男陽女陰良工所禁針論畢矣有病不知所痛可取陰陽二蹺之下二蹺之下男可取陰女可取陽是療不知所痛之病男陽女陰二蹺之脈不可取之三十八也平按男陽女陰靈樞作男陰女陽用針之服必有法則上視天光下司八正以闢奇邪服學習也學用針法須上法日月星辰之光下司八節正風之氣以除奇邪三十九也而觀百姓審於虛實無犯其邪是天之露遇歲之虛救而弗勝反受其殃故曰必知天忌乃言針意而令百姓不犯虛實二邪歲露之忌可謂得針之旨耳天露者歲之八正虛邪風雨也四十也平按靈樞是天之露天上有得字弗勝作不勝法於往古驗於來今觀於火龷早冥通於無窮粗之所不見良工之所貴莫知其形若神倣佛法於往古聖人所行逆取將來得失之驗亦檢當今是非之狀又觀火龷早冥微妙之道故得通於無窮之理所得皆當不似粗工以意唯矚其形不見於道有同良才神使獨鑑其所貴倣佛於真四十一也邪氣之中人也洫泝動形正邪之中人也微先見於色不知於身若無若亡若存在形無形莫知其精洫謂溝渠即腠理也泝謂水之逆流即邪氣入腠理也八正虛邪氣入腠理時振寒起於豪毛動形者也正邪者因身形飢用力汗出腠理開逢虛風中人微而難知莫見其精四十二也平按靈樞洫泝作灑淅不知於身作不知於其身若無上有若有二字其精作其情是故上工之取氣也乃救其萌芽下工守其已成因敗其形邪氣初客未病之病名曰萌芽上工知之其病成形下工知之四十三也是故工之用針也知氣之所在而守其門戶謂知邪氣處氣處於皮膚脈肉筋骨所在守其空穴門戶療之四十四也明於調氣補瀉所在除疾之意所取之處明於調氣補瀉處所是處可補是處可瀉不妄為之四十五也瀉必用員切而傳之平按員甲乙作方注云太素作員切而傳之靈樞甲乙作切而轉之其氣乃行疾入徐出邪氣乃出伸而迎之搖大其穴氣出乃疾補必用方平按方甲乙作員注云太素作方外引其皮令當其門左引其樞右推其膚微旋而徐推之必端以正安以靜堅心無解欲微以留氣下而疾出之推其皮蓋其外門真氣乃存員謂之規法天而動瀉氣者也方謂之矩法地而靜補氣者也樞謂針動也瀉必用方補必用員彼出素問此是九卷方圓之法神明之中調氣變不同故爾四十六也用針之要無忘養神用針之道下以療病上以養神其養神者長生久視此大聖之大意四十七也以上四十七章內經之大總黃帝受之於岐伯故誦之以閲所聞也平按養神靈樞作其神注閲袁刻作明按說文閲察也博雅云閲數也又前漢書文帝紀閲天下之義理多矣注閲猶更歷也亦通雷公問於黃帝曰針論曰得其人乃傳非其人勿言何以知其可傳黃帝曰各得其人任之其能故能明其事雷公曰願聞官能奈何人受命於天各不同性性既不同其所能亦異量能用人則所為必當故因問答以通斯德者也平按注德字袁刻作道黃帝曰明目者可使視也人之所能凡有八種視面部五行變色知其善惡此為第一明人也平按靈樞也作色聰耳者可使聽音聽病人五音即知其吉凶此為第二聰聽人也接疾辭給者可使傳論而語餘人其知接疾其辨敏給此可為物說道以悟人此第三智辨人也平按靈樞接疾辭給者作捷疾辭語者可使傳論而語餘人作可使傳論語安靜手巧而心審諦者可使行針艾理血氣而調諸逆順察陰陽而兼諸方神清性明故安靜也動合所宜明手巧者妙察機微故審諦也此為第四靜慧人也平按靈樞安靜上有徐而二字緩節柔筋而心和調者可使導引行氣身則緩節柔筋心則和性調順此為第五調柔人也調柔之人導引則筋骨易柔行氣則其氣易和也疾毒言語輕人者可使唾癰祝病心嫉毒言好輕人有此二惡物所畏之故可使之唾祝此為第六口苦人也平按靈樞祝作咒爪苦手毒為事善傷者可使按積抑痹爪手苦毒近物易傷此為第七苦手人也各得其能方乃可行其名乃章不得其人其功不成其師無名故曰得其人乃言非其人勿傳此之謂各用其能以有所當故曰得人如不得人道不可傳也平按靈樞章作彰謂下有也字手毒者可使試按龜置龜於器之下而按其上五十日而死矣甘手者復生如故毒手按器而龜可死甘手按之而龜可生但可適能而用之不可知其所以然也此為第八甘手人也平按靈樞器下無之字如故下有也字
