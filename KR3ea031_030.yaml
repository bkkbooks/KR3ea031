body:
  text: 卷第三十雜病平按此卷卷首目錄五十四行袁刻及日本別抄本全佚平從楊惺吾氏所獲仁和寺十三紙中補入目錄末有二行一行重身病三字高一格寫一行上缺三字下有於岐伯曰四字是上缺三字應系黃帝問三字曰下缺一字又下為有重二字又下缺五字又下有此為二字又下缺一字據素問奇病論及甲乙經婦人雜病篇曰下所缺一字應作人重下所缺五字應作身九月而喑五字為下所缺一字應作何則此一行應作黃帝問於岐伯曰人有重身九月而喑此為何正與本書下文病字相接重身病平按此篇自篇首至末見素問卷十三第四十七奇病論篇又見甲乙經卷十二第十黃帝問於岐伯曰人有重身九月而喑此為何從太素殘卷補入病岐伯曰胞之絡脈絕問曰何以言之答曰胞絡繫於腎少陰脈貫腎系舌本故不能言曰治之奈何曰無治也當十月復婦人懷子又名曰重身屬膀不言女子今云胞絡繫於腎少陰上系舌本者以是女子胞絡亦繫於腎故任身九月有胞絡絕者喑不能言至十月胎生還復舊也平按注重身下原缺六字宜空六格袁刻作胞絡脈三字不合膀下原缺一字宜空一格應是胱字袁刻作胱腎腑三字不合女子下原缺一字袁刻作腎十月上袁刻脫至字復下袁刻脫舊也二字刺法曰無損不足益有餘以成疹平按益甲乙作溢以成疹素問作以成其疹甲乙疹作辜注云素問作疹素問疹下有然後調之四字新校正云甲乙及太素無此四字本全元起註文誤書於此當刪去之所謂不足者身羸瘦無用鑱石也益有餘者腹中有形而泄之泄之則精出而病獨擅中也故曰疹成身之羸瘦更用鑱石此為損不足也腹中有形此為有餘益之以成其病斯乃損於有餘為病也益有餘為病知實為病難故須言之平按疹成甲乙作成辜溫暑病平按此篇自篇首至勿止見素問卷九第三十一熱論篇篇末一句見素問卷十六第六十一水熱穴論又見甲乙經卷七第一凡病傷寒而成溫者先夏至日者為病溫後夏至日者為病暑病者當與汗皆出勿止所謂玄府者汗空冬傷於寒輕者夏至以前發於病溫冬傷於寒甚者夏至以後發於病暑暑病熱氣與汗俱出者此為熱去勿止汗之空名玄府者謂腠理也平按素問甲乙病者當與汗作暑當與汗甲乙汗空作汗孔也又素問新校正引楊注發於兩於字均作為四時之變平按此篇自篇首至末見靈樞卷十一第七十四論疾診尺篇又自冬傷於寒至咳嗽見素問卷二第五陰陽應象大論篇又見甲乙卷十一第五四時之變寒暑之勝重陰必陽重陽必陰故陰主寒陽主熱故寒甚則熱熱甚則寒日中陽隴必降為陰夜半陰極必升為陽故曰寒生熱熱生寒此陰陽之變也十一月極寒一陽爻生即寒生熱也五月一陰爻生即熱生寒也故曰冬傷於寒春生癉熱寒冬之氣也傷過多也人之冬月受寒過多至春必屬癉熱之病此為寒生熱也春傷於風夏生飧泄腸澼風春之氣也受風過多極為飧泄腸澼此為風生泄也夏傷於暑秋生痎瘧暑夏之氣也受暑過多極為痎瘧此為暑生瘧也秋傷於濕冬生咳嗽是謂四時之序濕秋之氣也受濕過多極為咳嗽此為濕生咳也此是四時必不可易平按注四時下原抄有必字必下缺三字最下一字下半作文袁刻四時下無必字作之序支三字不合茲於必字下仍空三格息積病平按此篇見素問卷十三第四十七奇病論又見甲乙經卷八第二黃帝問於岐伯曰病脅下滿氣逆行二三歲不已是為何病岐伯曰名曰息積此不妨於食不可灸刺精為引服藥藥不能獨治也黃帝曰善脅下滿肝氣聚也因於喘息則氣逆行故氣聚積經二三歲名曰息積無妨於食而不可灸可以刺引精並服藥藥行不可更刺平按素問逆下無行字精為引素問甲乙作積為導引袁刻作精為導引注可以刺袁刻刺字在可以二字之上可以下有導引二字無精字原抄作可以刺刺下缺一字缺字下有引精二字謹依原抄伏梁病平按此篇見素問卷十一第四十腹中論又見素問卷十三第四十七奇病論又見甲乙經卷八第二黃帝問曰人有身體胕股脛皆腫環臍而痛是為何病岐伯曰病名曰伏梁此風根也不可動動之為水溺清之府頭以下為身四肢曰體胕義當腐也髀外曰股膝下長骨曰脛如此四處皆腐腫並繞臍痛名曰伏梁此伏梁病以風為本也動變發也若有變發可為水病溺冷清之府也平按素問胕作髀不可動上有其氣溢於大腸而著於肓肓之原在齊下故環齊而痛也二十二字本書在後甲乙素問清作澀府作病黃帝問曰病有少腹盛者上下左右皆有根此為何病可治否岐伯曰病名伏梁伏梁何因如得之平按素問作帝曰伏梁因何而得之答曰裹膿血居腸胃之外不可治治之每切按之致死因有膜裹膿血在腸胃外四箱有根在少腹中不可按之故按之痛遂致於死名曰伏梁平按素問甲乙裹下有大字問曰何以然曰此下則因陰必膿血上則迫胃脘出膈使胃脘內癰何以按之致死以其伏梁下因於陰膿血必上迫於胃管上出於膈使胃管生癰故按之下引於陰上連心腹所以致死脘平按素問甲乙必膿血作必下膿血出膈作生膈使胃作挾胃素問新校正云太素挾胃作使胃此人之病難治也居齊上為逆居齊下為順勿動亟奪論在刺法中此風根也其氣溢於大腸而著於肓肓之源在齊下故環齊而痛也如此之病得時必久也亟欺吏反數也此病是風為本其氣溢於大腸之中著於齊下盲原故環臍痛不可輒動數奪奪之致死以居盲原所以齊上為逆也平按此人之病難治也素問甲乙作此久病難治袁刻人字作積人二字齊素問甲乙作臍源素問甲乙作原熱痛平按此篇見素問卷十一第四十腹中論篇又見甲乙經卷七第一中篇黃帝問於岐伯曰病熱者而有所痛者何也曰熱病者陽脈也以三陽之動也人迎一盛少陽二盛太陽三盛陽明在太陽太陽入於陰故痛也在頭與腹乃䐜脹而頭痛黃帝曰善哉陽明血氣最大故人迎三盛得知有病太陽次少故二盛得知次少陽最少故一盛得知熱病為陽太陽在頭故熱病起太陽先受太陽受已下入陽明故陽明次病陽明受已末流少陽故少陽有病太陽入於少陰陽盛陰虛故頭痛陽盛陰虛故腹脹也平按甲乙一盛二盛三盛下均有在字素問在太陽三字作入陰也三字新校正云甲乙經無入陰也三字太陽入於陰故痛也在頭與腹素問甲乙作夫陽入於陰故病在頭與腹脾癉消渴平按此篇見素問卷十三第四十七奇病論篇又見甲乙經卷十一第六黃帝曰有病口甘者名為何何以得之岐伯曰此五氣之溢也名曰脾癉夫五味入於口藏於胃脾為之行其清氣液在脾令人口甘此肥羹之所致也此人必數食甘美而多肥者令人內熱甘者令人滿故其氣上溢轉轉為消渴治之以蘭蘭除陳氣五氣五穀之氣液在脾者五穀液也肥羹令人熱中故脾行涎液出廉泉入口中名曰脾癉內熱氣溢轉為消渴以蘭為湯飲之可以除陳氣也平按素問名為何作病名為何甲乙作病名曰何清氣素問作精氣甲乙作津液液在脾素問甲乙作津液在脾此肥羹之所致也素問甲乙羹作美致作發新校正云太素發作致素問而多下有肥也二字素問甲乙滿上有中字轉字不重消渴甲乙作消癉注云素問作消渴素問甲乙蘭字不重膽癉平按此篇見素問卷十三第四十七奇病論篇又見甲乙經卷九第五黃帝問岐伯曰有病口苦者名為何何以得之岐伯曰病名膽癉平按病下素問甲乙有口苦取陽陵泉六字素問新校正云全元起本及太素無口苦取陽陵泉六字詳前後文勢疑此為誤夫肝者中之將也取決於膽咽為之使此人者數謀慮不決故膽虛氣上溢而口為之苦治之以膽募輸在陰陽十二官相使中膽為肝腑肝為內將取決於膽其人有謀慮不決傷膽氣上膽溢從咽入口口苦名曰膽癉可取膽募日月穴也平按甲乙肝者上有膽者中精之府六字注云素問無此句頭齒痛平按此篇自篇首至齒亦當痛見素問卷十三第四十七奇病論篇又見甲乙經卷九第一自齒痛不惡清飲至末見靈樞卷五第二十六雜病篇又見甲乙經卷十二第六黃帝曰人有病頭痛以歲數不已此安得之是為何病岐伯曰當有所犯大寒內至骨髓髓者以腦為主腦逆故令人頭痛齒亦當痛大寒入於骨髓流入於腦中以其腦有寒逆故頭痛數歲不已齒為骨余故亦齒痛平按素問甲乙歲數作數歲齒亦當痛作齒亦痛齒痛不惡凊飲取足陽明惡凊飲取手陽明上齒雖痛以足陽明穀氣故飲不惡冷可取足陽明下齒痛取手陽明也平按凊靈樞甲乙作清道藏本靈樞作凊頜痛平按此篇見靈樞卷五第二十六雜病篇又見甲乙卷九第一頜痛刺手陽明與頜之盛脈出血頰痛刺陽明曲周動脈見血立已不已按人迎於經立已手陽明上頸貫頰故頰痛皆取之曲周動脈有足陽明無手陽明動脈也平按頜甲乙作頷靈樞作顑頰甲乙作頷靈樞作顑刺陽明靈樞甲乙作刺足陽明按人迎於經甲乙作按經刺人迎項痛平按此篇見靈樞甲乙同上篇項痛不可俯仰刺足太陽不可顧刺手太陽也足太陽脈行項故不可俯仰取之手太陽脈行項左右故不得顧取之也平按甲乙項痛作頭項靈樞顧上有以字喉痹嗌乾平按此篇自篇首至如韭葉見靈樞卷五第二十三熱病篇又見甲乙經卷九第二自喉痹不能言至末見靈樞卷五第二十六雜病篇又見甲乙經第十二第八及卷七第一中篇喉痹舌卷口中乾煩心心痛臂內廉痛不可及頭取手小指次指爪甲下去端如韭葉手之小指次指之端手少陽關衝手心主出屬心包下臑內手少陽從膻中上系耳後故喉痹舌卷口乾煩心心痛及臂內痛皆取之也平按臂內廉痛甲乙作臂表痛注云靈樞及太素俱作臂內廉痛又甲乙取下有關衝在三字韭葉下有許字注繫上原缺一字袁刻作出檢靈樞經脈篇手少陽上項系耳後應作項又注皆取之皆字袁刻誤作者喉痹不能言取足陽明能言取手陽明手陽明脈循缺盆上頭足陽明脈循喉嚨入缺盆故喉痹能言不能言取此二脈療主病者也嗌乾口中熱如膠取足少陰足少陰脈至舌下故口熱取之平按甲乙少陰作少陽目痛平按此篇自篇首至陰喬見靈樞卷五第二十三熱病篇自目眥外決至末見靈樞卷五第二十二癲狂篇又自篇首至末見甲乙經卷十二第四目中赤痛從內眥始取之陰喬目內眥陰喬脈也故取所主之輸也平按喬靈樞甲乙作蹺目眥外決於面者為兌眥在內近鼻者上為外眥下為內眥人之目眥有三外決為兌眥內角上為外眥下為內眥准明堂兌眥為外眥近鼻者為內眥也平按靈樞兌作銳近鼻者下有為內眥三字注准明堂袁刻作唯明堂耳聾平按此篇自篇首至後取足見靈樞卷五第二十四厥病篇又見甲乙十二第五自聾而不痛至末見靈樞卷五第二十六雜病篇甲乙同上耳聾無聞取耳中耳中聽宮角孫等穴也耳鳴取耳前動脈耳前動脈和窌聽會等穴也耳痛不可刺者耳中有膿若有干擿抵耳無聞也耳痛者有二有膿有干擿抵無所聞者不可刺也而有聞聲者可刺擿當狄反抵乃井反平按擿抵靈樞作盯眝二字甲乙亦作擿抵注云一本作盯眝耳聾取手足小指次指爪甲上與肉交者先取手後取足手少陽至小指次指即關衝穴足少陽至足小指次指即竅陰穴也其脈皆入耳中故二俱取之也平按甲乙小指作少指無次指二字注云太素作小指次指耳鳴取手足中指爪甲上左取右右取左先取手後取足手之中指手心主脈明堂不療於耳足之中趾十二經脈並皆不上今手足中指皆療耳鳴今刺之者未詳或可絡至繆刺也平按手足中指靈樞甲乙作手中指聾而不痛取足少陽聾而痛取手陽明足少陽正經入耳手陽明絡脈入耳足少陽主骨益耳故取之也手陽明主氣益耳故痛取之也平按靈樞兩痛字下均有者字衄血平按此篇見靈樞卷五第二十六雜病篇又見甲乙經卷十二第七衄而不衃血流取足太陽衃取手太陽不已刺腕骨下不已刺膕中出血衃血凝血也衃普杯反血不凝熱甚也足太陽起鼻手太陽至目內眥皆因鼻故衄血取之腕骨手腕前起骨名完骨非腕也平按足太陽下甲乙有大衄二字衃取手太陽靈樞甲乙作衄血取手太陽喜怒平按此篇見靈樞卷五第二十六雜病篇又見甲乙經卷九第五喜怒而不欲食言益少刺足太陰怒而多言刺足少陽怒肝木也食脾土也今木剋土故怒不欲食宜補足太陰肝足厥陰怒也足少陽多言也故瀉少陽也平按足少陽甲乙作少陰注云太素作少陽疹筋平按此篇見素問卷十三第四十七奇病論篇又見甲乙經卷四第二上篇黃帝曰人有尺數甚筋急而見此為何病岐伯曰此所謂疹筋者是腹必急白色黑色則病甚尺脈數筋急見出者此為疹筋疹筋筋急腹急此必金水乘肝故色白黑即甚也有本為尺瘦也平按素問尺下有脈字甲乙尺數甚作尺膚緩甚注云一作瘦甚疹筋甲乙作狐筋狐筋者注云狐素問作疹素問甲乙腹上有人字黑色下有見字血枯平按此篇自篇首至末見素問卷十一第四十腹中論篇又見甲乙經卷十一第七黃帝曰有病胸脅支滿者妨於食病至則先聞腥臊臭出清液先唾血四肢清目眩時時前後血病名為何何以得之岐伯曰病名曰血枯此得之少時有所大脫血若醉以入房中氣竭肝傷故使月事衰少不來也血枯病形有八一胸脅支滿二妨於食三病將發先聞腥臊臭氣四流出清液五病先唾血六四肢冷七目眩八大小便時復出血有此八狀名曰血枯之病此得由於少年之時有大脫血若醉入房中氣竭絕傷肝遂使月經衰少或不復來以成此血枯之病也平按甲乙支滿作榰滿清液作清涕黃帝曰治之奈何以何術答曰四烏賊魚骨一䕡茹二物並令三合丸以雀卵大如小豆以五丸為後飯鮑魚汁利脅中及傷肝四四分一一分搗以雀卵為丸食後服之飲鮑魚汁通利脅及補肝傷也平按素問以何術作復以何術賊作鰂䕡作藘新校正云太素藘作䕡並令三合作併合之甲乙烏上無四字骨下無一字並令三合作併合素問甲乙鮑魚上有飲以二字脅中作腸中熱煩平按此篇見素問卷九第三十四逆調論篇又見甲乙經卷七第一上篇問曰人身非常溫也非常熱也為之熱而煩滿者何也曰陰氣少而陽氣勝故熱而煩滿也身體發熱而苦熱而煩是為陽勝故也平按甲乙無為之熱三字素問新校正云甲乙無此三字身寒平按此篇見素問卷九第三十四逆調論篇又見甲乙經卷十第一下篇問曰人身非衣寒也中非有寒也寒從中出者何也曰是人多痹氣而陽氣少而陰氣多故身寒如從水中出焉外衣不單內不覺寒而身冷如從水中出內多寒氣故也平按素問甲乙中非有寒也作中非有寒氣也出者作生者肉爍平按此篇見素問卷九第三十四逆調論篇又見甲乙經卷七第一上篇問曰人有四肢熱逢風寒如灸於火者何也平按於火素問甲乙作如火素問新校正云全元起本無如火二字太素云如灸於火當從太素之文答曰此人者陰氣虛陽氣盛四肢者陽也兩陽相得也陰氣虛少水不能減盛火而陽獨治獨治者不能生長也獨勝而止耳逢風如灸火者是人當肉爍人有四肢先熱若逢風寒更如火灸是人陰虛陽盛以其四肢是陽陽氣更盛四肢二陽合而獨盛消爍肌肉不能生長故曰肉爍平按素問甲乙少下重一少字減作滅如灸火作如灸如火素問新校正云當從太素作如灸於火臥息喘逆平按此篇自篇首至則不得偃臥見素問卷十三第四十六病能論篇自問曰人有逆氣至末見素問卷九第三十四逆調論篇又自篇首至末見甲乙經卷十二第三黃帝問於岐伯曰人有臥而有所不安者何也岐伯曰臟有所傷及精有所乏倚則不安故人不能注懸其病人之病有臥不安者五臟內傷入房太甚泄精過多有所不足故倚臥不安不能懸定病處數起動也平按及精所有乏倚則不安別本乏作之素問作及精有所之寄則安甲乙作及情有所倚則臥不安素問新校正云太素作精所有倚則不安均無乏字本書原抄作及精有所乏倚則不安與楊注泄精過多有所不足故倚臥不安正合袁刻無乏字素問甲乙懸上無注字注太甚袁刻作太盛黃帝曰人之不得偃臥者何也岐伯曰肺者臟之蓋也肺氣盛則脈大大則不得偃臥肺居五臟之上主氣氣之有餘則手太陽脈盛故不得偃臥也問曰人有逆氣不得臥而息無音者有起居如故而息有音者有得臥行而喘者有不得臥不能行而喘者有不能得臥臥而喘者皆何臟使然願聞其故此五皆是人之起居臥之與喘不安之病皆由臟內不和故請示也答曰不得臥而息有音者是陽明之逆也足三陽者下行今逆而上行故息有音陽明為三陽之長故氣下行順而息調失和上行逆而有音此解息有音也陽明者胃脈也胃者六腑之海也其氣亦下行陽明逆不得從其道故不得臥上經曰胃不和則臥不安此之謂也陽明循道逆行息便有音今不依其道逆行故不得臥上經前所說經也平按上經素問甲乙作下經王注下經上古經也夫起居如故息有音者此脾之絡脈逆絡脈不得隨經上下故留經而不行絡脈之病人也微故起居如故而息有音夫絡脈循脈經上下而行絡脈受邪注留於經病人也甚故起居不安息亦有聲今絡脈氣逆不循於經其病也微所以起居如故息有音也平按脾之絡脈素問甲乙作肺之絡脈夫不得臥臥則喘者是水氣之客也夫水者循津液而流者也腎者水臟主津液津液主臥與喘腎為水臟主於胃中津液今有水氣客於津液循之而流津液主臥主喘故津液受邪不能得臥臥即喘也平按甲乙而流作而留素問甲乙津液二字不重少氣平按此篇見靈樞卷五第二十二癲狂篇又見甲乙卷十一第七少氣身漯漯也言吸吸也骨痠體重解不能動補少陰漯漯吸吸皆虛乏狀也骨痠體重皆腎虛耳故補腎足少陰脈於所發之穴補也平按靈樞甲乙解作懈惰少陰作足少陰短氣息短不屬動作氣索補少陰取血絡屬連也索取氣也亦是腎氣虛故補足少陰正經瀉去少陰絡血也平按短氣袁刻作少氣靈樞甲乙少陰上有足字取作去氣逆滿平按此篇自篇首至動脈見靈樞卷五第二十六雜病篇又見甲乙卷九第四自氣滿至氣下乃止見靈樞卷五第二十三熱病篇氣逆上刺膺中陷者與下胸動脈胸下動脈中府等量取也平按下胸甲乙作脅下注胸下動脈袁刻作胸膺氣下動脈原抄無膺氣二字氣滿胸中息喘取足太陰大趾之端去端如韭葉寒則留之熱則疾之氣下乃止足太陰脈起足大趾端隱白穴也平按靈樞韭作薤療噦平按此篇見靈樞卷五第二十六雜病篇又見甲乙經卷十二第一噦以草刺鼻嚏而已無息而疾迎引之立已大驚之亦可疾迎引之者以草刺無息可疾迎更刺引大驚令噦愈平按靈樞甲乙亦可下有已字注令下原缺一字原抄於左方注有動字謹擬作動袁刻空三格不合腰痛平按此篇自篇首至末見素問卷十一第四十一刺腰痛篇又見甲乙經卷九第八惟編次前後略異足太陽脈令人腰痛引項脊尻背如重狀刺其郄中太陽正經出血春無見血項脊尻皆足太陽脈行處故腰痛相引郄中足太陽刺金門足太陽在冬春時氣衰出血恐虛故禁之也少陽令人腰痛如以針刺其皮中循然不可以俯仰不可顧刺少陽成骨之端出血成骨在膝外廉之骨獨起夏無見血少陽足少陽也其脈行頸循脅出氣街以行腰故腰痛不可俯仰反顧成骨膝臏外側起大骨足少陽脈循脾出過故腰痛刺之足少陽在春至夏氣衰出血恐虛故禁之平按素問甲乙循然作循循然不可顧素問作不可以顧甲乙作不可以左右顧成骨甲乙作盛骨獨起下素問甲乙有者字陽明令人腰痛不可顧顧如有見者喜悲刺陽明於骭前三痏上下和之出血秋無見血足陽明支者循喉嚨入缺盆又支者循腹裡下氣街故腰痛不可顧陽明穀氣虛故妄有見虛為肝氣所克故喜悲下循衍外廉故刺之以和上下足陽明在仲夏至秋而衰出血恐虛故禁之也平按素問甲乙不可顧作不可以顧喜悲作善悲骭作䯒新校正云甲乙䯒作骭今本甲乙仍作䯒又注在仲夏上袁刻有脈字足少陰令人腰痛引脊內痛刺足少陰內踝下二痏春無出血出血大虛不可復也足少陰脈上股內後廉貫脊屬腎絡膀胱故腰痛引脊內痛也出然骨之下循內踝之後故取內踝之下少陰與太陽在冬至春氣衰出血恐虛故禁之也平按脊內痛素問甲乙作脊內廉素問新校正云全元起本脊內廉作脊內痛太素亦同此前少足太陰腰痛證並刺足太陰法應古文脫簡也居陰之脈令人腰痛腰中如張弩弦刺居陰之脈在腨踵魚腸之外循之累累然乃針刺之其病令人言嘿嘿然不慧刺之三痏居陰脈在腨踵魚腸之外其處唯有足太陽脈當是足太陽絡也平按居陰素問甲乙作厥陰王注云厥陰一經作居陰是傳寫草書厥字為居也弩上素問甲乙有弓字魚腸作魚腹循之甲乙作循循言素問甲乙作善言素問新校正云詳善言與默默二病難相兼全元起本無善字於義為允嘿嘿素問甲乙作默默解脈令人腰痛引膺目𥇀𥇀然時遺溲刺解脈在引筋肉分間在郗外廉之橫脈出血血變止解脈行處為病與足厥陰相似亦有是足厥陰絡脈平按素問甲乙引膺作引肩𥇀𥇀作䀮䀮引筋作膝筋止上有而字筋肉袁刻肉作內同陰之脈令人腰痛痛如小針居其中弗然腫刺同陰之脈在外踝上絕骨之端為三痏同陰脈在外踝上絕骨之端當是足少陽絡脈也平按小針素問甲乙作小錘素問新校正云太素小錘作小針弗素問甲乙作怫解脈令人腰痛如別常如折腰之狀喜怒刺解脈在郄中結絡如黍米刺之血射似黑見赤血而已前之解脈與厥陰相似今此刺解脈郄中當是取足厥陰郄中之絡也平按如別素問作如引帶甲乙作如裂喜怒素問作善恐甲乙作善怒似黑素問甲乙作以黑素問新校正云按全元起云有兩解脈病源各異恐誤未詳素問此條在同陰之脈上陽維之脈令人腰痛上弗然脈腫刺陽維之脈脈與太陽合腨下間上地一尺所陽維諸陽之會從頭下至金門陽交即是也行腰與足太陽合於腨下間上地一尺之中療陽維腫痛也平按素問甲乙腰痛下重痛字弗作怫下同腫上無脈字上地作去地沖絕之脈令人腰痛痛不可以俯不可以仰則恐僕得之舉重傷腰沖絕絡惡血歸之刺之在郗陽筋之間上郗數寸沖居為二痏出血衝脈循脊裡因舉重衝脈絡絕惡血歸聚之處以為腰痛可刺沖郗陽筋間上數寸沖氣居處平按沖絕素問甲乙作衡絡痛不可以俯不可以仰則恐僕素問作不可以俯仰仰則恐僕甲乙作得悗不得仰仰則恐僕絕絡素問作絡絕甲乙作絡絕傷甲乙筋之間作之筋間會陰之病令人腰痛痛上漯漯然汗汗乾令人慾飲已欲走刺直陽之脈上二痏在喬上郄下下三寸所橫居視其盛者出血刺直陽者有本作會陽喬上郄下橫居絡脈也平按漯漯然甲乙作濈濈然素問甲乙汗下有出字飲下重一飲字二痏作三痏喬作蹺郗下下三寸所素問作郄下五寸甲乙作郄下三所飛揚之脈令人腰痛痛上弗弗然甚則悲以恐刺飛揚之脈在內踝上二寸太陰之前與陰維會足太陽別名曰飛揚有本飛作蜚太陽去外踝上七寸別走足少陰當至內踝上二寸足少陰之前與陰維會處是此刺處也平按二寸素問作五寸新校正云當作二寸太陰素問甲乙作少陰據本注足少陰之前與陰維會處則太陰恐系少陰傳寫之誤昌陽之脈令人腰痛痛引膺目𥇀𥇀然甚則反折舌卷不能言刺內筋為二痏在內踝大筋前太陰後上踝三寸所內筋在踝大筋前太陰後內踝上三寸所大筋當是足太陰之筋內筋支筋在足太陽大筋之前足太陰筋之後內踝上三寸也平按素問內踝作內踝上三寸作二寸散脈令人腰痛而熱熱甚生煩腰下如有橫木居其中甚則遺溲刺散脈在膝前肉分間在絡外廉束脈為三痏散脈在膝前肉分間者十二經脈中惟足厥陰足少陽在膝前主溲故當是此二經之別名在二經大絡外廉小筋名束脈亦名散脈也平按素問甲乙肉上有骨字絡上無在字注膝前袁刻誤作脈前肉裡之脈令人腰痛不可以咳咳則筋攣急刺肉裡之脈為二痏在太陽之外少陽絕骨之後太陽外絕骨後當是少陰為肉裡脈也平按筋攣急素問攣作縮甲乙無急字甲乙之後作之端腰痛挾脊而痛至頭沉沉然目𥄷𥄷欲僵刺足陽明郄出血足陽明在頭下支者起胃下口循腹裡下至氣街腹裡近脊故腰痛刺足陽明郄中出血也平按素問甲乙沉沉作几几𥄷𥄷作䀮䀮僵下有僕字郄下有中字素問新校正云太素作頭沉沉然腰痛上寒刺足太陽陽明上熱刺足厥陰不可以俯仰刺足少陽中熱如喘刺足少陰刺郄中出血腰痛上熱補當腰足太陽足陽明脈腰痛上寒瀉當腰足厥陰脈足少陽主機關不可俯仰取足少陽腰痛中熱如喘氣動可取足少陰郄中出血也平按如喘素問甲乙作而喘注機下袁刻脫關字中熱下原缺一字原抄旁註極字又按註上熱上寒與經文不合疑有誤腰痛引少腹控䏚不可仰刺腰尻交者兩胂上以月生死為痏數髮針立已䏚以沼反胂脊骨兩箱肉也平按兩胂上素問甲乙作兩踝胂上素問立已下有左取右右取左六字腰痛痛上寒取足太陽痛上熱取足厥陰不可以俯仰取足太陽中熱而喘取足少陰膕中血絡前腰痛刺郄中此刺膕中也平按此段甲乙無素問在腰痛引少腹一段之前其文意亦小異素問云腰痛上寒不可顧刺足陽明上熱刺足太陰中熱而喘刺足少陰大便難刺足少陰少腹滿刺足厥陰如折不可以俯仰不可舉刺足太陽引脊內廉刺足少陰新校正云按全元起本及甲乙經並太素自腰痛上寒至此並無乃王氏所添再檢本書此段如上腰痛上寒一段僅不可以俯仰刺足太陽與刺足少陽不同注云前條為刺郄中此刺膕中則此條與上條亦可互相發明也髀疾平按此篇見靈樞卷五第二十四厥病篇又見甲乙經卷十第一下篇髀不可舉側而取之在樞閤中以員利針大針不可足太陽脈過髀樞中即為樞合也平按靈樞甲乙髀上有足字樞合甲乙作樞闔大針不可靈樞作大針不可刺膝痛平按此篇見靈樞卷五第二十六雜病篇甲乙經見同上膝中痛取犢鼻以員利針針發而間之針大如耗刺膝無疑犢鼻足陽明脈氣所發故膝痛取之平按靈樞針字不重痿厥平按此篇見靈樞卷五第二十六雜病篇又見甲乙經卷十第四痿厥為四束悗乃疾解之日二不仁者十日而知毋休病已止四束四肢如束悗煩也平按為四束靈樞甲乙作為四末束甲乙悗作悶𤸇泄平按此篇上節見靈樞卷五第二十三熱病篇又見甲乙經卷七第四下節見靈樞卷五第二十四厥病篇又見甲乙經卷十一第五𤸇取之陰蹺及三毛上及血絡出血𤸇淋也陰蹺上循陰股入陰故取陰蹺所主病者足厥陰脈起大趾叢毛之上入毛中環陰器故𤸇取陰蹺脈所主之輸並取足厥陰脈三毛之上及此二經之絡去血平按靈樞𤸇作癃甲乙作痓病泄下血取曲泉曲泉足厥陰脈之所入也平按泄靈樞甲乙作注如蠱如妲病平按此篇見靈樞卷五第二十三熱病篇又見甲乙經卷八第一男子如蠱女子如妲身體腰脊如解不欲食先取湧泉見血視跗上盛者盡見血蠱音古妲音但女惑男為病男病名蠱其狀狂妄失其正理不識是非醉於所惑男惑女為病女病為妲其狀萎黃羸瘦醉於所惑今有男子之病如蠱女子之病如妲可並取腎之井可息相悅之疾也問曰喜怒憂思乃生於心今以針灸療之不亦迂乎答曰病有生於風寒暑濕飲食男女非心病者可以針石湯藥去之喜怒憂思傷神為病者先須以理清神明性去喜怒憂思然後以針藥裨而助之但用針藥者不可又加身體骨脊解別不欲食者先取足少陰於足下湧泉之輸去血及循少陰於足跗上絡盛之處去血也平按靈樞妲作怛食上有飲字湧泉靈樞甲乙作湧泉癲疾平按此篇自篇首至故令人發為癲疾見素問卷十三第四十七奇病論篇又見甲乙經十一卷第二自癲疾始生先不樂至末見靈樞卷五第二十二癲狂篇甲乙見同上黃帝問岐伯曰人生而有病癲疾者病名為何安得之答曰病名為胎疾此得之在腹中時其母有所大驚氣上不下精氣並居故令人發為癲疾人之生也四月為胎母為人物所驚神氣並上驚胎故生已發為癲疾也平按素問甲乙腹中上有母字故令人作故令子癲疾始生先不樂頭重痛視舉目赤其作極已而煩心候之於顏取手太陽陽明太陰血變而止手太陽上頭在目絡心手陽明絡肺手太陰與手陽明通故不樂頭重目赤心煩取之也平按靈樞甲乙其作甚甲乙無陽明二字癲疾始作而引口啼呼喘悸候之手陽明太陽右僵者政其右左僵者政其左血變而止也手太陽支者別頰上䪼抵鼻手陽明挾口故啼呼左右僵皆取之也平按靈樞甲乙悸下有者兩僵字均作強政其右作攻其左政其左作攻其右又按注皆取之也則兩政字恐系攻字傳抄之誤癲疾始作而反僵因脊痛候之足太陽陽明手太陽血變而止足太陽挾脊足陽明耳前上至額顱在頭手太陽繞肩甲交肩上故反僵脊痛取之也平按靈樞而反僵作先反僵陽明下有太陰二字治癲疾者常與之居察其所當取之處病至視之有過者即瀉之置其血於瓠壺之中至其發時血獨動矣不動灸窮骨二十五壯窮骨者胝骨也病有過者視其絡脈病過之處刺取病血盛之瓠壺中至其發時血自動不動者灸窮骨也平按二十五壯靈樞作二十壯甲乙作三十壯胝骨甲乙作尾骶骨癲疾者頷齒諸輸分肉皆滿而骨居汗出煩悗嘔多涎沫其氣下泄不治居處也骨之癲疾不可療候有八頷齒輸及分肉間骨處汗出煩悗嘔多涎沫氣下泄有此八候是骨癲疾死不可療也平按靈樞頷作顑甲乙而骨居作而骨居強直悗作悶靈樞涎沫作沃沫注有此八候袁刻此誤作死筋癲疾身卷攣急大刺項大經之大杼脈嘔多液沫氣下泄不治身卷攣急大者是足太陽之病宜刺項之大經足太陽脈大杼之穴若嘔液沫氣下泄死不可療也平按靈樞甲乙疾下有者字卷靈樞作倦甲乙急下有脈字杼下無脈字液靈樞作沃甲乙作涎脈癲疾暴僕四肢之脈皆脹而縱脈滿盡刺之出血不滿灸俠項太陽灸帶脈於腰相去三寸諸分肉本輸嘔多沃沫氣下泄不治癲疾暴前倒僕四肢脈皆脹滿而縱緩者可刺去其血若不脹滿可灸太陽於項療主病者又灸當十四椎相去三寸分肉之間療主癲疾之輸也平按靈樞甲乙癲疾下有者字俠上有之字靈樞俠作挾甲乙灸帶脈上有又字沃作涎注灸下二字原不全玩其剩處似帶脈二字袁刻作腰取二字恐誤據經文應作帶脈二字治癲疾者病發如狂者死不治僵仆倒而不覺等謂之癲馳走妄言等謂之狂今癲疾發而若狂病甚故死不療也平按靈樞癲上無治字病作疾驚狂平按此篇自篇首至末見靈樞卷五第二十二癲狂篇又見甲乙經卷十一第二治狂始生先自悲喜忘喜怒喜恐者得之憂飢治之取手太陽陽明血變而止及取足太陰陽明人之狂病先因憂結之甚不能去解於心又由飢虛遂神志失守則自悲喜忘喜怒喜恐乘即發於狂病雖得之失志然因療之心腑手太陽肺腑手陽明也足太陰陽明主谷亦可補此二脈以實憂飢虛損即愈也平按靈樞甲乙悲下有也字三喜字甲乙均作善靈樞作苦怒善恐手太陽靈樞甲乙作手太陰狂始發少臥不飢自高賢也自辨智也自尊貴也喜罵詈日夜不休治之取手陽明太陽太陰舌下少陰視脈之盛者皆取之不盛者釋之手陽明絡肺手太陽絡心手太陰屬肺主氣故少臥自高等皆是魄失氣盛故視脈盛者皆瀉去之及舌下足少陰脈盛者互瀉去之平按喜罵靈樞甲乙作善罵視下靈樞無脈字注互袁刻作亦狂喜驚喜笑好歌樂妄行不休者得之大恐治之取手陽明太陽太陰此三脈乃是狂驚歌樂妄行所由准推可知也平按靈樞喜驚喜笑作言驚善笑甲乙作善驚善笑狂目妄見耳妄聞喜呼者少氣之所生也治之取手太陽太陰陽明足太陰頭兩頷狂而少氣復生三病因此四經故皆取之也平按甲乙足太陰作足太陽頭上有及字靈樞頷作顑狂者多食喜見鬼神喜笑而不發於外者得之有所大喜治之取足太陰陽明太陽復取手太陰太陽陽明不發於外者不於人前病發也得之大喜者甚憂大喜並能發狂然大喜發狂與憂不同即此病形是也手足太陰手足陽明手足太陽是療此病所由故量取之以行補瀉也平按靈樞甲乙喜見喜笑作善見善笑復取作後取狂而新發未應如此者先取曲泉左右動脈及盛者見血食頃已不已以法取之灸骶骨二十壯曲泉肝足厥陰脈穴平按靈樞食頃作有頃厥逆平按此篇自篇首至末見靈樞卷五第二十二癲狂篇自篇首至立快者是也見甲乙經卷七第三自內閉不得溲至末見甲乙經卷九第十厥逆為病也足暴凊胸若將別腹若將以刃切之煩而不能食脈小大皆清緩取足少陰凊取足陽明凊則補之溫則瀉之厥逆之病足冷胸痛心悶不能食其脈動之大小皆多血少氣緩而溫者可取足少陰輸穴瀉其熱氣足之寒者取足陽明輸穴補其陽虛也平按靈樞甲乙將別作將裂脈小大皆凊作脈小大皆澀暴凊凊取足陽明凊則補之三凊字今本靈樞及甲乙經均作清明趙府居敬堂靈樞均作凊腹作腸刃作刀緩作暖厥逆腹滿脹腸鳴胸滿不得息取之下胸二肋咳而動手者與背輸以指按之立快者是也厥逆胸滿不得息可量取下胸二肋咳而動手之處謂手太陰中府輸也厥逆腹滿脹腸鳴量取背胃及大小腹輸療主病者也平按靈樞滿脹作脹滿二肋作二脅甲乙動下有應字輸作俞靈樞作腧注背胃據經文應作背輸袁刻作背輸內閉不得溲刺足少陰太陽與骶上以長針氣逆取其太陰陽明厥甚取少陰陽明動者之經足少陰太陽主於便溲故厥便溲閉取此陰陽二經輸穴療主病者若加氣逆可取手足太陰陽明療主病者若此閉及氣逆厥甚可取手足少陰陽明二經動脈療主病者也平按靈樞厥下有陰字厥甚取少陰甲乙作厥甚取太陰厥死平按此篇自篇首至末見素問卷十三第四十七奇病論篇又見甲乙經卷九第十一黃帝問岐伯曰有𤸇者一日數十溲此不足也身熱如炭火頸膺如格人迎躁盛喘息氣逆此有餘也太陰脈微細如髮者此不足也其病安在名為何病岐伯曰病在太陰其藏在胃頗在肺病名曰厥死不治此得五有餘二不足也問曰何謂五有餘二不足答曰所謂五有餘者五病之氣有餘也二不足者亦二病之氣不足也今外得五有餘內得二不足者此其身不表不里亦明死矣𤸇淋也人有病一日數十溲腎氣不足也手太陰脈如發肺氣不足也此則二臟不足也身熱如火一有餘也頸及膺二氣盛如格三有餘也頸前胃脈人迎躁盛四有餘也喘息氣逆五有餘也人之遇病外有五有餘內有二不足者病在手足太陰藏於胃中動之於肺非定在於表裡名曰厥死之病不可療也平按素問甲乙炭下無火字其藏在胃作其盛在胃甲乙五病之氣無五字素問甲乙亦二病之氣不足也作亦病氣之不足也亦明死矣甲乙作亦死證明矣又按本注缺二有餘一條素問王注云外五有餘者一身熱如炭二頸膺如格三人迎躁盛四喘息五氣逆也陽厥平按此篇自篇首至末見素問卷十三第四十六病能論篇又見甲乙經卷十一第二黃帝曰有病喜怒者此病安在平按素問甲乙喜怒作怒狂在作生新校正云太素怒狂作善怒岐伯曰生於陽問曰陽何以使人狂答曰陽氣者因暴折而難決故喜怒病名陽厥平按喜怒素問甲乙作善怒問曰何以知之答曰陽明者常動巨陽少陽不動而動太疾此其候也足陽明人迎脈常動有病名陽厥以陽氣暴有折損不通故狂而喜怒以其太陽少陽不動而大疾以為候也平按甲乙巨陽作太陽素問甲乙不動下重不動二字注有病袁刻作有疾不動而大疾袁刻動誤作通問曰治之奈何答曰衰其食即已夫食入於陰長氣於陽故奪之食即已使之服之以生鐵落為飲夫生長氣椎鐵落自下氣疾衰其食者少食也穀氣熱故推入腹內陰中長盛陽所以憎於狂病故奪於情少食令服生鐵落病則愈矣生鐵落鐵漿也平按衰其食素問作奪其食新校正云甲乙經奪作衰太素同落素問作洛夫生長氣椎鐵落素問甲乙作夫生鐵落者又按生長氣椎鐵五字頗費解當必有誤原抄如是故仍之風逆平按此篇見靈樞卷五第二十二癲狂篇又見甲乙經卷十第二下篇風逆暴四肢腫身漯漯唏然時寒飢則煩飽則喜變取手太陰表裡足少陰陽明之經肉凊取榮骨凊取井也手太陰為里手陽明為表二經主氣肉者土也榮者火也火以生土故取榮溫肉也骨者水也井者木也水以生木以子實母故取井溫骨也平按靈樞甲乙支作肢喜變作善變凊今本靈樞及甲乙均作清趙府本靈樞作凊甲乙榮作營風痓平按此篇見靈樞卷五第二十三熱病篇又見甲乙經卷七第四風痓身反折先取足太陽及膕中及血絡中有寒取三里足太陽行腰脊故身痓反折取其脈所生輸穴及膕中正經視血絡黑也可取足陽明三里之輸也平按靈樞痓作痙血絡下有出血二字甲乙血絡下有出血痓三字酒風平按此篇見素問卷十三第四十六病能論篇又見甲乙經卷十第二下篇黃帝問曰病者身體懈惰汗出如浴惡風少氣此為何病答曰名曰酒風問曰治之奈何岐伯曰以澤瀉術各十分麋銜五合以三指撮為後飯飲酒汗出得風名曰酒風先食後服故曰後飯也平按素問甲乙病者作有病五合以三指撮作五分合以三指撮素問王注云飯後藥先謂之後飯與此注不同經解平按此篇見素問卷十三第四十六病能論篇所謂深之細者其中手如針摩之切之聚者堅也博者大也上經者氣之通天也下經者言病之變化也診脈所知中手如針此細之狀也切按也上經言上通天之氣下經言下病之變化也又自腰以上隨是何經之氣以為上經自腰以下以為下經上經通於天氣下經言其變化也平按素問針下有也字氣上有言字金匱者決死生也金匱之章作決死生之論也揆度者切度之奇恆者言奇病也所謂奇者使奇病不得以四時死者也恆者得以四時死者也所謂揆者方切求也度者得其病處也以四時度之也得病傳之至於勝時而死此為恆也中生喜怒令病次傳死者此為奇也揆者方將求病所在揆量之也度者得其病處更於四時度其得失也平按方切求也下素問有言切求其脈理也七字注令病次傳死者素問新校正引楊注作令病次傳者無死字又按素問王注云凡言所謂者皆釋未了義今此所謂尋前後經文悉不與此篇義相接似今數處少成文義者終是別釋經文世本既缺第七二篇應彼缺經錯簡文也古文斷裂繆續於此身度平按此篇自篇首至末俱見素問卷八第二十八通評虛實論篇惟自問曰形度至何以知其度也一節在後脈浮而澀二句在前與甲乙經卷七第一中篇同在經文春秋則生冬夏則死之下詳素問新校正云按甲乙經移續於此舊在後帝曰形度骨度脈度筋度何以知其度也下王氏以為錯簡移附於此據新校正所云則本書編次與舊時無異也問曰形度骨度脈度筋度何以知之其度也曰脈浮而澀澀者而身有熱者死也形骨筋等有病於身節度可診脈而知故脈浮而澀者身必有熱身熱脈浮澀者死也平按素問甲乙而身上無者字經絡虛實平按此篇自篇首至末見素問卷八第二十八通評虛實論篇又見甲乙經卷七第一中篇問曰絡氣之不足經氣有餘何如答曰絡氣不足經氣有餘脈熱而尺寒秋冬為逆春秋為順治主病者絡虛經實何以得知絡為陽也經為陰也寸為陽也外也尺為陰也內也秋冬陰也春夏陽也絡氣不足陽氣虛也經氣有餘陰氣盛也於秋冬時診寸口得緩脈尺之皮膚寒為逆春夏緩脈尺之皮膚寒為順緩脈熱也以秋冬陽氣在內陰氣在外春夏陰氣在內陽氣在外故也於尺寸在內時寒熱取經絡虛實也平按素問甲乙脈下有口字素問順作從問曰經虛絡滿何如答曰經虛絡滿者尺熱滿脈寒澀此春夏則死秋冬則生滿盛也經虛絡盛春夏診得尺之皮膚熱盛寸口得急脈為逆故死秋冬得尺熱脈急故生脈急多寒脈緩多熱也平按素問甲乙脈下有口字死生上無兩則字問曰治此者奈何答曰絡滿經虛灸陰刺陽經滿絡虛刺陰灸陽經虛陰虛故灸陰絡滿陽滿故刺陽也經滿陰滿故刺陰絡虛陽虛故灸陽也禁極虛平按此篇見甲乙經卷七第一中篇問曰秋冬無極陰春夏無極陽者何謂也答曰無極陽者春夏無數虛陽虛陽則狂無極陰者秋冬無數虛陰陰虛則死數音朔春夏是陽用事秋冬是陰用事陰陽用事之時行針者不可數虛陽數虛陽者陽極發狂數虛陰者陰極致死也平按甲乙虛陽虛陽作虛陽明陽明虛虛陰陰虛作虛太陰太陰虛順時平按此篇自篇首至末見素問卷八第二十八通評虛實論篇又此篇前一段見甲乙經卷七第一中篇後一段見甲乙經卷十一第九問曰春極治經絡夏極治經輸秋極治六腑冬則閉塞者用藥而少針石處所謂少用針石者非癰疽之謂也癰疽不得須時春夏秋三時極意行針冬時有癰疽得極余寒等病皆悉不得故不用稱其時也春時陽氣在於皮膚故取絡脈也夏時在於十二經之五輸故取輸也秋氣在於六腑諸輸故取之也冬氣在於骨髓腠理閉塞血脈凝澀不可行於針與砭石但得飲湯服藥癰疽以是熱病故得用針石也以癰疽暴病不得須間失時不行針石也平按素問甲乙極作亟素問閉塞下重閉塞二字處作也須時素問作頃時回三字因癰不知不致按之不應手乍來乍已刺手太陰旁三與嬰絡各二有因癰生不痛不知不得其定按之不應其手乍來似有乍去似無者此是肺氣所為可取手太陰脈有主此病輸旁三刺之及纓脈足陽明之輸主此病者二取之平按素問甲乙因癰不知不致作癰不知所嬰絡作纓脈據本注應作纓脈素問三下有痏字刺瘧節度平按此篇自篇首至過之則失時見素問卷十第三十六刺瘧篇自瘧不渴至末見靈樞卷五第二十六雜病篇又見素問刺瘧篇惟文義略有不同又見本書二十五卷十二瘧篇又自篇首至末見甲乙經卷七第五瘧病脈滿大急刺背輸用中針旁五胠輸各一適肥瘦出其血滿盛也脈大多氣少血也急多寒也瘧病寸口脈盛氣多血少而寒可取背輸有療瘧者用中針刺輸旁五取及胠輸兩脅下胠中之輸有療瘧者左右各一取之取之適於肥瘦出血多少旁左右箱也平按素問甲乙瘧下無病字輸作俞五素問作伍瘧脈小而實急灸脛少陰刺指井脈小者血氣皆少瘧病診得寸口之脈血氣皆少而實而多寒可灸足少陰療瘧之輸並指有療瘧之井也平按素問甲乙無而字瘧脈滿大急刺背輸用第五針胠輸各一適行至於血也第五䤵針以取大膿今用刺瘧背輸可適行至血出而已也平按用第五針胠輸各一素問作用五胠俞背俞各一甲乙經無此條素問新校正云經文與次前經文重複王氏隨而注之別無義例不若士安之精審不復出也瘧脈緩大虛便用藥所宜不宜用針脈緩者多熱瘧病診寸口脈得多熱多氣少血虛者可用藥用藥者取所宜之藥以補也平按便用藥所宜素問作便宜用藥凡治瘧者先發如食頃乃前可以治過之則失時此療瘧時節也平按素問甲乙無前字瘧不渴間日而作取足陽明渴而日作取手陽明瘧不渴取足陽明渴取手陽明皆取所主輸平按瘧不渴間日而作取足陽明素問作刺足太陽本書十二瘧篇同新校正云按九卷云足陽明太素同檢今本靈樞亦云取足陽明是不渴間日而作之瘧可取足太陽陽明二處故十二瘧楊注謂治寒瘧本篇謂取所主輸也刺腹滿數平按此篇自篇首至按之立已見靈樞卷五第二十六雜病篇自腹暴至末見素問卷八第二十八通評虛實論篇又自篇首至足厥陰見甲乙經卷九第九自腹滿大便不利至末見甲乙經卷九第七少腹滿大上走胃至心泝泝身時寒熱小便不利取足厥陰水氣聚於少腹上走至於心下泝泝惡寒寒熱小便不利下熱也是足厥陰所由故取其輸穴也平按靈樞少腹作小腹走胃甲乙作走胸泝泝靈樞作淅淅甲乙作索索然腹滿大便不利腹大上走胸嗌喘息喝喝然取足少陰此皆足少陰脈所行之處故取其脈之輸穴有本少陰為少陽平按上走靈樞作亦上走甲乙無喘息二字注云靈樞有喘息二字足少陰甲乙作足少陽腹滿食不化腹向向然不便取足太陰腹滿食不化腹虛脹不大便皆足太陰脈所主故取之輸穴也平按甲乙化下無腹字不便靈樞作不能大便甲乙作不得大便足太陰甲乙作足太陽腹痛刺臍左右動脈已刺按之立已不已刺氣街已刺按之立已腹痛足陽明脈所主故臍左右動脈足陽明動也氣街亦是足陽明動脈故不已取之也平按甲乙氣街下無已刺二字腹暴滿按之不下取太陽經絡經絡者則人募者也少陰輸去脊椎三寸旁五用員利針足太陽與足少陰為表裡足少陰上行貫肝膈發腹諸穴故腹暴滿故取太陽經絡經脈絡脈人之盛募之氣腹滿亦取足少陰之輸夾脊相去三寸輸旁五取之作員利針募有本為幕也平按甲乙暴下有痛字素問太陽上有手字經絡二字不重則人募者也作胃之募也甲乙作取太陽經絡血者則已無人募者也四字少陰上有又刺二字素問王注云太陽為手太陽經絡之所生故取中脘穴即胃之募也新校正云楊上善注云足太陽其說各不同未知孰是刺霍亂數平按此篇見素問卷八第二十八通評虛實論篇又見甲乙經卷十一第四霍亂刺輸旁五足陽明及上旁三霍亂刺主療霍亂輸旁可五取之及足陽明下脈與上有療霍亂輸旁可三取之也平按輸旁五素問王注云取少陰俞旁志室穴新校正引楊注云刺主霍亂輸旁五取之刺癇驚數平按此篇見素問卷八第二十八通評虛實論篇又見甲乙經卷十二第十一刺癇驚脈五針手太陰各五刺經太陽五刺手少陽經絡者旁一寸足陽明一寸上踝五寸刺三針之刺癇驚脈凡有五別手太陰五取之又足太陽輸穴五取之又手少陽經絡旁三取之又足陽明旁去一寸上踝五寸三針之平按手太陰甲乙作手足太陰素問手少陽作手少陰甲乙作手足少陰素問甲乙兩一字下均無寸字三針下無之字又按素問王注自針手太陰以下主治霍亂新校正云按別本注云悉不主霍亂甲乙經太素均為刺驚癇王注為刺霍亂者非也又注經絡旁三取之別本作經絡旁一寸以下穴位取之刺腋癰數平按此篇見素問卷八第二十八通評虛實論篇又見甲乙卷十一第九腋癰大熱刺足少陽五刺癰而熱手心主三刺手太陰經絡者大骨之會各三足少陽脈下胸絡肝屬膽循脅裡在腋下故腋脅之間有癰大熱可刺足少陽脈之穴五取之熱而不已刺手心主脈其脈循胸下腋三寸上抵腋故腋癰三取之又取手太陰經絡各三大骨之會者手太陰脈循臂內上骨下廉即為經絡會處也平按刺癰而熱素問甲乙作刺而熱不止注之穴上原缺二字上一字不全下一字作主謹擬作所主二字袁刻作輒筋二字病解平按此篇自篇首至末見素問卷八第二十八通評虛實論篇又見甲乙經卷十一第六及卷十二第五等篇凡治消癉僕擊偏枯痿厥氣滿發逆肥貴人則膏粱之疾也此之六種是肥貴人膏粱所發之病平按痿厥氣滿發逆甲乙作厥氣逆滿四字膈塞閉絕上下不通暴憂之病此之四種因暴愁憂所生之病膈塞膈中塞也閉謂七竅閉也謂噫與下使之氣即上下也暴厥而聾不通偏塞也閉內內不通風也內留著也暴厥耳聾偏塞也內氣暴滿薄不從於內中風病也以脾氣停壅不順於內故瘦留著也平按不通偏塞也素問甲乙作偏塞閉不通內氣暴薄也閉內內不通風也內留著也素問甲乙作不從內外中風之病故瘦留著也蹠跛寒風濕之病也風濕之氣生於蹠跛痹病蹠之石反跛有本為跂也久逆生病平按此篇見素問通評虛實論篇又見甲乙卷十一第二黃疸暴痛癲疾厥狂久逆之所生此之五病氣之久逆所生平按甲乙黃疸作貫疽注云素問作黃疸暴痛作暴病狂上無厥字六腑生病平按此篇見素問甲乙同上篇五臟不平六腑閉塞之所生六腑受穀氣傳五臟故六腑閉塞臟不平也腸胃生病平按此篇見素問同上篇又見甲乙卷十二第五頭痛耳鳴九竅不利腸胃之所生腸胃之脈在頭在於七竅故腸胃不利頭竅病也經輸所療平按此篇見素問同上篇又見甲乙經卷十一第九暴癰筋濡隨外分而痛魄汗不盡胞氣不足治在經輸筋濡者謂筋濕也隨分痛者隨分肉間痛也魄汗者肺汗也胞氣不足者謂膀胱之胞氣不足也此之五病可取十二經輸療主病者也平按濡素問作緛隨下素問甲乙無外字
