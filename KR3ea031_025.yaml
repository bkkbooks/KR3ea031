body:
  text: 卷第二十五傷寒熱病決平按此篇自篇首至末見素問卷九第三十一熱論篇又見甲乙經卷七第一黃帝問於岐伯曰今夫熱病者皆傷寒之類也夫傷寒者人於冬時溫室溫衣熱飲熱食腠理開發快意受寒腠理因閉寒居其寒極為熱三陰三陽之脈五臟六腑受熱為病名曰熱病斯之熱病本因受寒傷多亦為寒氣所傷得此熱病以本為名故稱此熱病傷寒類也故曰冬傷於寒春為溫病也其病夏至前發者名為病溫夏至後發者名為病暑也平按注腠理開發袁刻脫開字或愈或死皆以病六七日間陰陽二經同感三日而遍臟腑營衛不通復得三日故極後三日所以六七日間死也平按素問皆以上有其死二字下無病字其愈皆以十日以上何也不知其解願聞其故其不至臟腑兩感於寒者至第七日即太陽病衰至九日三陽病衰至十日太陰病衰至十二日三陰三陽等病皆衰故曰其愈皆十日以上其理未通故請聞之也岐伯曰巨陽者諸陽之屬也巨大也一陽為紀少陽也二陽為衛陽明也三陽為父太陽也故足太陽者三陽屬之故曰諸陽之屬也平按甲乙巨作太下同其脈連於風府故為諸陽主氣人之傷於寒也則為病熱熱雖甚不死其兩感於寒而病者必不免於死足太陽脈直者從巔入絡腦還出別下項其風府在項入髮際一寸則太陽之氣連風府也諸陽者督脈陽維脈也督脈陽脈之海陽維維諸陽脈總會風府屬於太陽故足太陽脈為諸陽主氣所以人之此脈傷於寒者極為熱病者也先發於陽後發於陰雖熱甚不死陰陽兩氣時感者不免死也黃帝曰願聞其狀岐伯曰傷寒一日巨陽受之故頭項腰脊皆痛寒之傷多極為熱者初病發日必是太陽受熱之為病故曰一日太陽受之所以一日陽明少陽不受熱者以其太陽主熱又傷寒熱加故太陽先病也頭項腰脊並是足太陽脈所行之處故皆痛也平按素問作頭項痛腰脊強新校正云甲乙及太素作頭項腰脊皆痛今本甲乙作頭項腰脊背強注云素問無背字注腰脊袁刻脫脊字二日陽明受之陽明主肉其脈挾鼻絡於目故身熱而鼻乾不得臥陽明二陽故次受病脾之太陰主肌胃之陽明主肉其脈從鼻絡目內眥下行入腹至足手陽明下屬大腸上挾鼻孔故病身熱鼻乾不得臥也平按素問甲乙身熱下有目疼二字注至足足字或疑衍袁刻脫按胃為足陽明從頭至腹走足此足字當屬上句與至字連讀恐非衍文三日少陽受之少陽主骨其脈循脅絡於耳故胸脅痛耳聾肝足厥陰主筋三焦手少陽與膀胱合膀胱腎腑表裡皆主骨足少陽起目鋭眥入絡耳中下循胸脅下至於足手少陽偏屬三焦從耳後入耳中故病耳聾胸脅痛也平按主骨素問作主膽新校正云全元起本膽作骨元起注云少陽者肝之表肝候筋筋會於骨是少陽之氣所榮故言主於骨甲乙及太素並作骨三經皆受病而未入通於腑也故可汗而已三經三陽經也熱在三陽經中未滿三日未至於腑當以針藥發汗而已三經之病三日外至腑可以湯藥泄而去平按素問三陽下有經絡二字而未入通於腑作而未入於臟新校正云全元起本臟作腑元起注云傷寒之病始入於皮膚之腠理漸勝於諸陽而未入腑故須汗發其寒熱而散之太素亦作腑甲乙亦作腑注云素問作臟四日太陰受之太陰脈布胃中絡於嗌故腹滿而嗌乾一陰為獨決厥陰也二陰為雌少陰也三陰為母太陰也太陰為大故先受熱太陰脈從足入腹屬脾絡胃膈挾咽連舌本手太陰起於中焦下絡大腸故腹滿嗌乾也五日少陰受之少陰脈貫腎絡肺系舌本故口熱舌乾而渴足少陰直者從腎上貫肝膈入肺中循喉嚨挾舌本故口熱舌乾而渴也平按素問甲乙口熱作口燥六日厥陰受病厥陰脈循陰器而絡於肝故煩滿而囊縮足厥陰脈環陰器抵於少腹挾胃屬肝絡膽故煩滿囊縮也平按受病素問甲乙作受之三陰三陽五臟六腑皆病營衛不行腑臟不通則死矣平按素問甲乙皆病作皆受病腑臟作五臟其不兩感於寒者七日巨陽病衰頭痛少愈八日陽明病衰身熱少愈九日少陽病衰耳聾微聞如此兩感三陰三陽臟腑皆病營衛閉塞故至後三日則死不兩病者至第七日太陽病衰至第九日少陽病衰也十日太陰病衰腹如故則思食飲欲食太陰脾主穀氣故病愈腹減思飲食也平按素問甲乙腹下有減字食飲作飲食無欲食二字十一日少陰病衰渴止不滿舌乾已而咳足少陰脈入肺挾舌本故病愈渴止舌乾已也咳者肺氣通也平按甲乙無不滿二字已而咳作乃已二字素問咳作嚏十二日厥陰病愈囊從少腹微下厥陰之脈病愈大氣已去故囊漸下也平按素問甲乙愈作衰從作縱大氣皆去病日已矣至十二日大熱之氣皆去故所苦日瘳矣黃帝曰治之奈何岐伯曰治之各通其臟脈病日衰已量其熱病在何臟之脈知其所在即於脈以行補瀉之法病衰矣其未滿三日者可汗而已其滿三日者可瀉而已未滿三日熱在三陽之脈皮肉之間故可汗而已也三日以外熱入臟腑之中可服湯藥泄而去也黃帝曰熱病已愈時有所遺者何也岐伯曰諸遺者熱甚而強食之故有所遺若此者皆病已衰而熱有所藏因其穀氣相薄而熱相合故有所遺強多也遺余也大氣雖去猶有殘熱在臟腑之內外因多食以穀氣熱與故熱相薄重發熱病名曰餘熱病也平按素問甲乙而熱相合而作兩黃帝曰善治遺奈何岐伯曰視其虛實調其逆順可使必已逆者難已順者易已陰虛補之陽實瀉之必使其愈以為工也平按順素問作從黃帝曰病熱當何禁岐伯曰病熱少愈食肉則復多食則遺此其禁也肉熱過谷故少食則復谷熱少肉故多食為遺也黃帝曰其兩感於寒者其脈應與其病形如何足太陽足少陰表裡共傷於寒故曰兩感冬日兩感於寒以為病者脈之應手及病成形其事何如也平按兩感上素問有病字岐伯曰兩傷於寒者病一日則巨陽與少陰俱病則頭痛口乾煩滿冬感寒時陰陽共感至其發時還同時發也故至春發一日則太陽少陰俱病也足太陽上頭故頭痛也手少陰上挾咽足少陰挾舌本手太陽絡心循咽故令口乾手少陰起於心中足少陰絡心手太陽絡心故令煩滿平按素問新校正云傷寒論作煩滿而渴四字病二日則陽明與太陰俱病則腸滿身熱不食譫言譫諸閻反多言也手陽明屬大腸足陽明屬胃足太陰屬脾絡胃手太陰絡大腸循胃故令腸滿身熱不食多言也平按素問甲乙作不欲食譫言素問王注謂妄謬而不次新校正云楊上善云多言也與此正合病三日則少陽與厥陰俱病則耳聾囊縮厥水漿不入則不知人手足少陽皆入耳中故令耳聾足厥陰環陰器足少陽繞毛際手少陽曆三焦故令囊縮厥也手少陽布膻中足少陽下胸中足厥陰循喉嚨後手厥陰起胸中屬心包故令漿水不下不知人也平按素問甲乙厥上有而字六日而死三陰三陽俱病氣分更經三日皆極故六日死也黃帝曰五臟已傷六腑不通營衛不行如是之後三日乃死何也氣分極者臟傷腑塞營衛停壅後三日死其故何也岐伯曰陽明者十二經之長也其氣血盛故不知人三日其氣乃盡故死胃脈足陽明主谷血氣強盛十二經脈之主余經雖極此氣未窮雖不知人其氣未盡故更得三日方死也平按素問甲乙經下有脈字熱病說平按此篇自篇首至傷肺則死見素問卷九第三十三評熱病論篇自篇首至飲之湯見甲乙卷七第一中篇唯編次前後小異自黃帝問曰勞風為病至傷肺則死見甲乙卷十一第七自偏枯身偏不用至末見靈樞卷五第二十三熱病篇自偏枯身偏不用至浮而取之見甲乙卷十第二下篇自熱病熱三日而氣口靜至末見甲乙卷七第一中篇黃帝問於岐伯曰有病溫者汗出輒復熱而脈躁疾不為汗衰狂言不能食病名為何岐伯曰病名陰陽交交者死汗者陰液也熱者陽盛氣也陽盛則無汗汗出則熱衰今出而熱不衰者是陽邪盛而復陰起兩者相交故名陰陽交也黃帝曰願聞其說請說陰陽交爭死之所由岐伯曰人所以汗出者皆生於穀穀生於精今邪氣交爭於骨肉而得汗者是邪卻而精勝也精勝則當食而不復熱熱者邪氣也汗者精氣也今汗出而輒復熱者是邪勝也精者谷之精液謂之汗也傷寒邪氣謂之熱也今邪氣與精氣交爭於骨肉之間精勝則邪卻邪勝則精消今雖汗出而復熱者是邪戰勝精故致死也平按熱者邪氣也素問甲乙作復熱者邪氣也不能食者精毋精毋疸也而留者其儘可立而傷也熱邪既勝則精液無精液無者唯有熱也疸熱也其熱留而不去者五臟六腑儘可傷之能食也平按精毋精毋疸也素問甲乙作精無裨也而留者素問作病而留者甲乙作熱而留者新校正云甲乙作而熱留者其儘可立而傷素問甲乙作其壽可立而傾注儘可傷之能食也句費解疑能食也上脫故不二字是夫熱論曰汗出而脈尚躁盛者死今脈不與汗相應此不勝其病也其死明矣夫汗出則可脈靜今汗出脈猶躁盛是為邪勝明矣知定死也平按是夫素問作且夫甲乙無熱論曰三字脈下無尚字注知定死也袁刻脫此四字狂言者是失志失志者死志者記也腎之神也腎間動氣人之生命動氣衰矣則神志去之故死也今見三死不見一生雖愈必死汗出而熱不衰死有三候一不能食二猶脈躁三者失志汗出而熱有此三死之候未見一生之狀雖瘥必死又有三分之死未見一分之生也平按甲乙作此有三死黃帝問於岐伯曰有病身熱汗出煩滿煩滿不為汗解此為何病身熱煩滿當為汗解今不解故問平按甲乙作病身熱汗出而煩滿不解者何也岐伯曰汗出而身熱者風也汗出而煩滿不解者厥也病名曰風厥風熱開於腠理為汗非精氣為汗故身熱不解名為風也煩心滿悶不解名厥病也有風有厥名曰風厥也問曰願聞之答曰巨陽主氣故先受邪少陰與其為表裡也得熱則上從之從之則厥腎間動氣足太陽所王足太陽與足少陰表裡故太陽先受邪氣循脈而上於頭得熱則足太陽上者從之受熱即為上熱下寒以為厥逆汗出不解煩滿之病也問曰治之奈何答曰表裡刺之飲之湯可刺陰陽表裡之脈以攻其外飲之湯液以療其內此為療風厥之法也平按素問甲乙湯上有脹字黃帝曰勞風為病何如岐伯曰勞風法在肺下其為病也使人強上冥視晚唾出若涕惡風即振寒此為勞中之病也勞中得風為病名曰勞中亦曰勞風肺下病居處也強上好仰也冥視晚晚遲也謂閣眼遲視不見也唾若涕者唾如膿也不用見風見風即便振寒此為勞中之病狀也平按素問甲乙視下無晚字即振寒作而振寒勞中作勞風素問新校正云楊上善云冥視謂閣眼視不明也與此小異千金冥視作目眩問曰治之奈何答曰以救俯仰此病多為俯仰故救之巨陽引精者三日中者五日不精者七日微出青黃涕其狀如稠膿大如彈丸從口中若鼻孔中出不出則傷肺傷肺則死以針引巨陽精者三日俯仰即愈引陽明精者五日少陽不精引之七日方有青黃濁涕從口鼻中出其病得愈若不出者上傷於肺不免死也平按素問甲乙中者作中年者素問新校正云甲乙作中若五日今本甲乙仍作中年者五日千金作候之三日及五日中不精明者是其症也與此不同又微出素問甲乙作咳出如下無稠字素問鼻下無孔字甲乙孔作空偏枯身偏不用而痛言不變知不亂病在分腠之間巨針取之益其不足損其有餘乃可復也偏枯病有五別有偏一箱不收一也有偏不痛此不用並痛二也其言不異於常三也神智不亂四也病在分肉間五也具此五者名曰偏枯病也平按靈樞知不亂作志不亂甲乙作智不亂痱為病也身無痛者四肢不收知亂不甚其言微知可治甚則不能言不可治也痱扶非反風病也痱風之狀凡有四別身無痛處一也四肢不收二也神智錯亂三也不能言四也具此四者病甚不可療也身雖無痛四肢不收然神不亂又少能言此可療也俗稱此病種種名字皆是近代醫人相承立名非古典也平按注此病袁刻病誤作痛病先起於陽後入於陰者先取其陽後取其陰浮而取之療法先取其本後取其標不可深取也平按病下袁刻脫先字浮而取之甲乙作必審其氣之浮沉而取之熱病三日而氣口靜人迎躁者取之諸陽五十九刺以瀉其熱而出其汗實其陰以補其不足者三陽受病未入於陰至三日也未入於陰故氣口靜也三陽已病故人迎躁也人迎謂是足陽明脈結喉左右人迎脈者也以諸陽受病故取諸陽五十九刺瀉其熱氣以陽並陰虛故補陰也平按實其陰實字原抄缺下半袁刻作瀉恐誤靈樞甲乙作實本注云故補陰也亦宜作實身熱甚陰陽皆靜者勿刺也其可刺者急取之不汗則泄所謂勿刺者有死徵也陰陽之脈皆靜謂為陰陽交爭是其死徵故不可刺也非陰陽爭宜急取之若不泄汗即泄利也平按汗下靈樞有出字熱病七八日脈口動喘而眩者急刺之汗且自出淺刺手指間七日太陽病衰八日陽明病衰二陽病衰氣口之脈則可漸和而脈喘動頭眩者熱猶未去汗若出急刺手小指外側前谷之穴淺而取之汗不出可深刺之平按靈樞甲乙作手大指間與楊注異熱病七八日脈微小病者溲血口中乾一日半而死熱病至七八日二陽病衰其脈則可漸和而微小者即熱甚所以溲血口乾一日半死脈小者內熱消疸之候也平按注而微小者袁刻而作脈脈代者一日死熱病七八日脈代者內氣絶候故一日死熱病已得汗而脈尚躁喘且復熱勿庸刺喘甚者死熱病已得汗其脈當調猶尚躁喘且復身熱此陰陽交不可刺也刺之者危喘甚熱盛者死不須刺也平按靈樞汗下有出字勿庸刺作勿刺膚熱病七八日脈不躁躁不數數後三日中有汗三日不汗四日死未曾刺者勿庸刺之熱病七八日二陽病衰故脈不躁雖躁不數者至後三日合十二日三陰三陽熱衰故汗出愈也若從九日至十二日汗不出者十三日死計後三日者三日後也又曰十二日厥陰衰日即便汗出如其不出至十三日為後三日從九日後以為四日也雖未刺之不須刺也庸有本為膚平按甲乙躁字不重靈樞甲乙上數字作散未曾刺者靈樞刺作汗甲乙作未汗二字庸靈樞作腠熱病先身澀倚煩悗干唇嗌取之以第一針五十九刺膚脹口乾寒汗身熱甚皮膚粗澀也傾倚不安煩悶唇咽乾內熱肺熱病狀也第一針鑱針也應肺針頭大末鋭令無得深入以瀉陽氣故用之五十九刺以瀉諸陽之氣及皮膚脹口乾令汗出也平按倚煩悗干唇嗌靈樞作欹而熱煩悗干唇口嗌甲乙作煩而熱煩悶唇嗌乾靈樞甲乙取之下有皮字九下無刺字膚脹上甲乙有熱病二字汗下靈樞甲乙有出索脈於心不得索之水水者腎也十四字注鋭字袁刻作細熱病嗌乾多飲善驚臥不能定取之膚肉以第六針五十九索肉於脾不得索之木木肝也熱病嗌乾多飲喜驚臥不得安肉病者可以第六員利針員利針應脾故用取之膚肉五十有九於脾輸穴以求其肉不得求於肝輸穴也以肝為木剋土故名也平按靈樞作臥不能起甲乙作臥不能安九下靈樞有目眥青三字甲乙有刺目眥赤四字熱病而胸脅痛手足躁取之筋間以第四針於四逆筋闢目浸索筋於肝不得索之金金肺也熱病胸脅痛手足動筋之病可以第四針應肝故於筋間針於四逆筋闢目浸求肝輸穴不得於肺輸穴以求筋也以其肺金剋木肝也索求也闢筋攣也目浸目眥淚出也平按而胸脅痛靈樞作面青胸痛四針下甲乙重針字筋闢作筋躄熱病先膚痛窒鼻充面取之皮以第一針五十九窒鼻鼻塞也充面麵皮起也膚痛鼻塞麵皮起皆是肺合皮毛熱病者也第一鑱針大其頭鋭其末令無得深入但去皮中之病故五十九取之皮也平按先膚痛先字袁刻誤作充苛軫鼻索皮於肺不得索之火火者心也苛賀多反鼻病有本作苟熱病殃苛軫在於鼻鼻主於肺故此皮毛病求於肺輸不得求之心輸以其心火克肺金也平按軫鼻甲乙作鼻乾自上文熱病先膚痛至此段心也靈樞甲乙在熱病先身澀之上熱病數驚瘛瘲而狂取之脈以第四針急瀉有餘者癲疾毛髦去驚瘛瘲狂此為血病故取之脈第四針者鋒針也刃參隅應心可以瀉熱出血痼癲疾及毛髦落皆得愈也平按瘛甲乙作瘈髦靈樞甲乙作發索血於心不得索之水水腎也血脈索於心輸不得索之腎輸者水剋火也熱病身重骨痛耳聾而好瞑取之骨以第四針五十九骨病食齧齒耳青索骨於腎不得索之土土脾也一云脊強身重骨痛耳聾好瞑皆腎之合骨熱病故取骨第四針鋒針也長一寸六分鋒其末主瀉熱出血故用五十九刺並療食齧齒耳青等骨痛求之腎輸穴不得求脾之輸穴以土剋水也平按靈樞甲乙九下有刺字食上有不字青下甲乙有赤字一云脊強四字靈樞甲乙無熱病不知所痛不能自收口乾陽熱甚陰頗有寒者熱在髓死不治陽熱病者其陽脈熱甚陰脈頗寒也此人熱在髓中必死不療平按所痛甲乙作所病下有耳聾二字靈樞同熱病頭痛顳顬目瘈脈善衄厥熱也取以第三針視有餘不足寒熱痔熱病頭痛顳顬及目邊脈瘈善衄此為厥熱者也第三針匙針也狀如黍粟之鋭長二寸半主按脈取氣令邪氣獨出故並用療厥熱寒熱痔病平按目瘈脈靈樞作目𤬓脈痛甲乙作目脈緊厥熱下靈樞甲乙有病字熱病體重腸中熱取之以第四針於其輸及下諸指間索氣於胃絡得氣體重腸中熱胃熱病也第四針鋒針也此胃熱病以鋒針取胃輸及手足指間八處胃絡以得氣為限也平按輸靈樞作腧甲乙作俞熱病挾臍痛急脅胸滿取之湧泉與陰陵泉以第四針針嗌挾臍痛脾經熱病也胸脅滿腎經熱病也可以鋒針取此二穴也平按靈樞甲乙痛急脅胸滿作急痛胸脅滿嗌下有里字熱病汗且出及脈順可汗者取之魚際太泉大都太白瀉之則熱去補之則汗出汗出太甚取踝上橫脈以止之熱病汗出及脈順不逆可令汗者取魚際在手大指本節後內側太泉在掌後陷者中大都在足大趾本節後陷中太白在足內側核骨下陷中此之四穴並是手足太陰療熱之穴故皆瀉去其熱還於此穴補取其汗出太甚取踝上橫脈量是足太陰於踝上見者可取之以止其汗也平按靈樞甲乙太泉作太淵本書系避唐諱作泉踝上作內踝上注及脈順及字袁刻誤作反熱病已得汗而脈常躁盛此陰脈之極也死其得汗而脈靜者生熱病得汗熱去即須脈靜而躁盛者是陰極無陰故死得汗脈靜者熱去故脈靜而生也平按靈樞甲乙常躁盛作尚躁盛熱病者脈常盛躁而不得汗者此陽脈之極也死脈盛躁得汗靜者生熱病不得汗脈常盛躁者是陽極盛脈故死得汗脈靜者生也平按靈樞常作尚熱病不可刺者有九一曰汗不出大顴發赤噦者死顴鼻左右高處也平按甲乙不可刺者有九作死候有九赤下無噦字注云太素云汗不出大顴發赤者必不反而死與本書稍異二曰泄而腹滿甚者死三曰目不明熱不已者死目是五臟之精五臟之氣和則目精必明也四曰老人嬰兒熱而腹滿者死五曰汗不出歐下血者死平按歐下血甲乙作嘔血六曰舌本爛熱不已者死七曰咳而衄汗不出出不至足者死平按汗不出甲乙作汗出八曰髓熱者死九曰熱而痓者死熱而痓者腰折瘛瘲齒噤齘也折腰強反折也齘故介反開口難齒相切也平按靈樞痓作痙甲乙腰下有反字瘛作瘈齘作齗外臺祕要亦作齘凡此九者不可刺也此九死徵故不可刺也所謂五十九刺者兩手外內側各三凡十二痏五指間各一凡八痏足亦如是頭入發一寸旁三分各三凡六痏更入發三寸邊五凡十痏耳前後口下者各一項中一凡六痏巔上一痏干軌反傷也素問熱輸五十九穴其經皆指稱其穴此九卷五十九刺但言手足內外之側及手足十指之間入頭髮際一寸左右合有十六處更入三寸左右合有十處耳前後口下項中有一巔上有一合有七處更不細指處所量謂刺之以去其熱不定皆依穴也又數刺處乃有六十三處五十九者以舉大數為言耳平按巔上一下靈樞有囟會一髮際一廉泉一風池二天柱二十五字甲乙同注云甲乙經原缺此穴今按靈樞經文補之據此則甲乙原文與本書正同五臟熱病平按此篇自篇首至末見素問卷九第三十二刺熱篇又見甲乙經卷七第一肝熱病者小便先黃腹痛多臥身熱熱爭則狂言及驚脅痛手足躁不安臥肝脈足厥陰環陰器故熱小便黃也上行挾胃故身熱多臥臥不安也肝動語言也故熱爭狂言及驚也其脈屬肝絡膽故脅痛也肝脈出足上連手厥陰今熱故手足躁也平按脅痛素問作脅滿痛甲乙作胸中脅滿痛安上均有得字庚辛甚甲乙大汗氣逆則庚辛死金以剋木故庚辛甚也甲乙木王故大汗也餘四仿此加氣逆者則庚辛死也平按注王袁刻作旺加作如刺足厥陰少陽其頭痛員員脈引沖頭足厥陰足少陽表裡行臟腑之氣故刺之也厥陰上額與督脈會於巔故頭痛員員脈引沖頭員都耕反頭切痛也平按素問甲乙頭上有逆則二字心熱病者先不樂數日乃熱熱爭則卒心痛煩俯喜嘔頭痛面赤無汗心主喜樂熱病將發故不樂數日乃熱手少陰脈起心中挾咽系目系手太陽至目內外眥故熱甚心痛煩悗喜嘔頭痛面赤無汗也平按甲乙無卒痛二字悗喜素問甲乙作悶善注內外眥袁刻脫外字按手太陽脈支者上頰至目鋭眥別者抵鼻至目內眥故云內外眥也至壬癸甚丙丁大汗氣逆則壬癸死刺手少陰太陽手少陰太陽此心臟腑表裡脈也脾熱病者先頭重顏痛心煩欲嘔身熱熱爭則腰痛不用腹滿泄兩頷痛脾腑之陽明脈循髮際至額顱故頭重顏痛一曰頰足陽明亦循頰也及兩頷痛足太陰脈注心中故心煩也足陽明下循喉嚨下膈屬胃絡脾主肌故欲嘔身熱腹滿泄也足陽明之正入腹裡屬胃故腰痛不用也平按顏痛心煩素問作頰痛煩心顏青新校正云甲乙太素云脾熱病者先頭重顏痛無顏青二字與此同不用素問甲乙作不可用俯仰五字甲乙甚戊己大汗氣逆則甲乙死刺足太陰陽明平按太陰袁刻誤作太陽肺熱病者先淅然起毛惡風舌上黃身熱熱爭則喘咳痹走胸膺背不得太息頭痛不甚汗出而寒肺主毛腠內熱淅然起毛惡風也肺熱上熏故舌上黃也肺主行氣於身故身熱也肺以主咳在於胸中故熱爭喘咳痹走胸膺此為熱痹痛行胸中不得太息也肺熱沖頭以肺脈不至故頭痛不甚也有本為堪言氣衝甚故頭痛甚也冷汗雖出無發熱也平按淅然起毛素問作淅然厥起毫毛甲乙作悽悽然厥起皮毛惡風素問甲乙作惡風寒痹均作痛不甚素問作不堪丙丁甚庚辛大汗氣逆則丙丁死刺手太陰陽明其血如大豆立已肺熱之病取肺大腸表裡輸穴出血如豆言其少也恐泄氣虛故不多也腎熱病者先腰痛胻痠苦渴數飲食身熱熱爭則項痛而強胻寒且痠足下熱不欲言其項痛員員淡淡腎足少陰脈上腨內出膕內廉貫脊屬腎絡膀胱上貫肝膈入肺中循喉嚨挾舌本故熱病先腰痛胻痠苦渴數飲也足太陽脈別項本支行背合有四道以下合膕貫腨至足小趾外側故身熱項強痛而足胻寒且痠也足少陰起於足心故足下熱也從肺出絡心故熱不欲言也淡徒濫反動也謂不安動也平按其項痛素問甲乙作其逆則項痛素問淡下有然字甲乙無淡淡二字戊己甚壬癸大汗氣逆則戊己死刺足少陰太陽平按素問太陽下有諸汗者至其所勝日汗出也十一字與下重復新校正云宜刪去肝熱病者左頰先赤心熱病者顏先赤平按甲乙顏下有頷字脾熱病者鼻先赤肺熱病者右頰先赤腎熱病者頤先赤病雖未發見其赤色者刺之名曰治未病次言熱病色候也五臟部中赤色見者即五臟熱病之徵熱病已有未成未發斯乃名為未病之病宜急取之平按注熱病之徵袁刻徵作微熱病從部所起者至其期而已部所者色部所也假令赤色從肝部起刺之順者相傳還至肝部本位病已也平按素問甲乙期上無其字袁刻部下有中字注從肝部起脫部字其刺之反者三周而已重逆則死刺之不順其氣傳之三周而已若刺之更反死矣諸當汗出者至病所勝日汗大出病之勝者第七日是病所勝也又如肝病至甲乙日是病之勝日也平按病素問作其諸治熱病已飲之寒水乃刺之必寒衣之居寒多身寒而止諸病熱病以寒療之凡有四別一飲寒水使其內寒二刺於穴令其脈寒三以寒衣使其外寒四以寒居令其體寒以四寒之令身內外皆寒故熱病止也平按已素問作以甲乙作先居寒多素問甲乙作居止寒處熱病先胸脅痛手足躁刺足少陽手太陰病甚為五十九刺足少陽脈下頸合缺盆下胸中貫膈絡肝屬膽循脅裡過季脅下外輔骨之前下抵絶骨循足跗下至趾間手太陰上屬肺從肺出腋下故胸脅痛手足躁刺此二脈也平按痛下甲乙有滿字手太陰素問甲乙作補足太陰王注云補足太陰之脈當於井滎取之新校正云足太陰全元起本及太素作手太陰楊上善云手太陰上屬肺從肺出腋下故胸脅痛又引靈樞熱病之文以此決知作手太陰者為是熱病先手臂痛刺手陽明太陰而汗出手陽明行於手表太陰行在手裡故手臂痛刺此陰陽表裡二脈取汗也平按先素問甲乙作始素問汗出下有止字熱病始於頭首者刺項太陽而汗出項太陽者足太陽從巔入腦還出挾項以下挾脊故熱病始頭首刺此太陽輸穴出汗也平按刺甲乙作先取二字汗出下素問有止字詳自上節熱病先手臂痛至本節而汗出甲乙編次在後此節下素問有熱病始於足脛者刺足陽明而汗出止十五字新校正云此條素問本無太素亦無今按甲乙添入與本書合熱病者先身重骨痛耳聾好瞑刺足少陽病甚為五十九刺足少陽脈起目鋭眥絡身骨節入耳中故熱病先身重耳聾好瞑所以取此脈之輸穴者也有本為足少陰也平按素問甲乙足少陽作足少陰熱病先眩胃熱胸脅滿刺足少陰少陽太陽之脈足太陽起目內眥上額交巔入腦足少陽起目鋭眥下胸循脅裡足少陰從腎上貫肝膈入肺中故眩胃熱胸脅滿刺此三脈者也平按胃熱胃素問甲乙作冒色榮顴骨熱病也赤色榮顴此之三脈皆生於骨故此三脈為病有赤色榮顴者骨熱病也平按素問王注謂太陽合火故見色赤新校正云楊上善云赤色榮顴者骨熱病也與王注不同榮未夭日令且得汗待時自已赤色未夭之日且得汗者至勝時病自得已也平按夭素問作交日作曰王注云曰者引古經法之端由也令素問甲乙作今新校正云甲乙太素作榮未夭下同與厥陰脈爭見者死期不過三日其熱病氣內連腎足太陽水也足厥陰木也水以生木木盛水衰故太陽水色見時有木爭見者水死以其熱病內連於腎腎為熱傷其數至三日故死也平按素問甲乙病下無氣字腎下有少陽之脈色也六字素問王注云病或為氣恐字誤也若赤色氣內連鼻兩旁者是少陽之脈色非厥陰色何者腎部近於鼻也新校正云詳或者欲改腎作鼻按甲乙太素並作腎楊上善云太陽水也厥陰木也水以生木木盛水衰故太陽水色見時有木爭見者水死以其熱病內連於腎腎為熱傷故死本舊無少陽之脈色也六字乃王氏所添王注非當從上善之義據此則本書足證素問王注之失少陽之脈色榮頰筋熱病也榮未夭日令且得汗待時自已與少陰脈爭見者死足少陽膽脈也足少陽部在頰赤色榮之即知筋熱病也當榮時且得汗者至其木時病自已也少陽為木少陰為水少陽脈見之時少陰爭見者是母勝子故肝木死也平按筋素問作前王注云頰前即顴骨下近鼻兩旁也新校正云太素甲乙前字作筋楊上善云足少陽部在頰赤色榮之即知筋熱病也死字下素問有期不過三日五字王注云少陰脈來見亦土敗而木賊之新校正云詳或者欲改少陰作厥陰按甲乙太素作少陰楊上善云少陽為木少陰為水少陽色見之時少陰爭見者是母勝子故木死王作此注亦非舊本及甲乙太素並無期不過三日五字此是王氏成足此文據此則本書之存足糾正素問王注不少也三椎下間主胸中熱明堂及九卷背五臟俞並以第三椎為肺俞第五椎為心俞第七椎為膈俞第九椎為肝俞第十一椎為脾俞第十四椎為腎俞皆兩箱取之當中第三椎以上無療臟熱故五臟俞及候五臟熱並第三椎以下數之第三椎以上與頰車相當候色第三椎下間肺俞中間可以瀉熱也平按素問甲乙三椎上有熱病氣穴四字四椎下間主膈熱五椎下間主肝熱六椎下間主脾熱七椎下間主腎熱四椎下間計次當心心不受邪故乘言膈也次第推之下間各主一臟之熱不同明堂通取五臟之輸者也平按膈素問作膈中甲乙作胃中腎熱下素問甲乙並有榮在骶也四字榮在項上三椎陷者中頰下逆椎為大瘦從肺輸以上三椎在項故曰項上三椎即大椎上陷者中也當頰下迎椎故曰逆椎逆迎也是為頰下當椎前有色見者腹有大瘦病者也平按素問甲乙無榮在二字甲乙陷上有骨字素問甲乙逆椎作逆顴大瘦作大瘕下牙車為腹滿下牙車色見者腹滿病也椎後為脅痛大椎左右箱為椎後有色見者脅痛也平按椎後素問甲乙作顴後頰上者膈上者也頰以上無椎可准故頰以上有色者主膈上也五臟痿平按此篇自篇首至末見素問卷十二第四十四痿論篇又見甲乙經卷十第四又自陽明者五臟六腑之海至足痿不用見本書卷十第二帶脈篇問曰五臟使人痿何也痿者屈弱也以五臟熱遂使皮膚脈筋肉骨緩痿屈弱不用故名為痿然五臟之熱使人有痿何如也曰肺主身之皮毛心主身之血脈肝主身之筋膜脾主身之脂肉腎主身之骨髓欲明五臟之痿先言五臟所主也膜者人之皮下肉上膜肉之筋也平按素問甲乙脂肉作肌肉注欲明袁刻作欲知故肺氣熱葉焦則皮毛膚弱急薄著則生痿闢肺熱即令肺葉焦乾外令皮毛及膚弱急相著生於手足痿闢不用也平按素問肺下無氣字膚素問甲乙作虛甲乙焦下復有焦字著下復有著字闢作躄下同心氣熱則下脈厥而上上則下脈虛虛則生脈痿樞折挈脛瘲而不任地心主血脈心藏氣熱令下血脈厥逆而上下脈血氣上行則下脈虛故生脈痿樞折腳脛瘲緩不能履地平按素問瘲作縱甲乙挈作瘈瘲作腫肝氣熱則膽泄口苦筋膜乾膜乾則急而攣發為筋痿攣者筋寒急有熱膜筋干為攣如筋得火捲縮為攣伸為瘲故為筋痿也平按甲乙膽下有熱字素問甲乙筋膜乾三字重急上有筋字脾氣熱則胃干而渴肌肉不仁發為肉痿脾胃相依故脾熱則胃乾燥故肉不仁發為肉痿也腎氣熱則腰脊不舉骨枯而髓減發為骨痿腎在腰中所以腎氣熱腰脊不舉骨幹熱煎髓減故發為骨痿也問曰何以得之曰肺者臟之長也為心之蓋有所失亡所求不得發則肺喝喝則肺熱葉焦故五臟因肺熱葉焦發為痿闢此之謂也肺在五臟之上是心之蓋主氣故為臟之長也是以心有亡失求之不得即傷於肺肺傷則出氣有聲動肺葉焦五臟因肺葉焦熱遂發為痿闢也平按甲乙失亡作亡失袁刻亡誤作已喝素問甲乙作鳴故下素問有曰字甲乙無故五臟因肺熱葉焦此之謂也十二字又注肺在袁刻誤作肺上悲哀太甚胞絡絶絶則陽氣內動發則心下崩數溲血故本病曰大經空虛發為脈痹傳為脈痿胞絡者心上胞絡之脈心悲哀太甚則令心上胞絡脈絶手少陽氣內動有傷心下崩損血循手少陽脈下尿血致令脈虛為脈痹傳為脈痿平按素問甲乙胞絡絶三字重脈痹均作肌痹素問新校正云楊上善云胞絡者心上胞絡之脈詳經注中胞字俱當作包全本胞作肌思想無窮所願不得者意淫於外入房太甚宗筋施縱發為筋痿及為白淫故下經曰筋痿者生於使內思想所愛之色不知窮已無涯之心不遂所願淫外心深入房太甚遂令陰器施縱也陰為諸筋之宗故宗筋傷則為筋痿婦人發為白淫經曰者已說之經引之為證也使內者亦入房平按素問甲乙施作弛生於使內作生於肝使內也有漸於濕以水為事若有所留居處相濕肌肉濡漬痹而不仁發為肉痿故下經曰肉痿者得之濕地漸漬也濕處停居相漬致肌肉痹而不仁遂使肉皆痿瘲也名曰肉痿也平按甲乙相濕作傷濕有所遠行勞倦而逢大熱而渴渴則陽明氣內代則熱合於腎腎者水臟也今水者不勝火則骨枯而髓虛故足不任身發為骨痿故下經曰骨痿生於大熱也勞倦逢於大熱渴則陽明內代者陽明主谷其氣熱盛復有外熱來加陽明之脈內即代絶內外熱盛下合水腎水不勝火故骨枯髓竭骨枯髓竭故足不任身發為骨痿平按素問甲乙內代作內伐素問合於腎作舍於腎甲乙髓虛作髓空發為骨痿作熱發為骨痿問曰何以別之五臟痿有外內何候知其別異也曰肺熱者色白而毛敗白是肺色毛肺之所主也心熱者色赤而絡脈溢赤是心色絡脈心之所主也絡脈脹見為溢也平按甲乙赤作青肝熱者色蒼而爪枯蒼青也青為肝色爪肝所主也脾熱色黃而肉濡動黃為脾色肉脾所主也平按素問甲乙濡作蠕腎熱者色黑而齒熇熇當為槁色黑齒枯槁也黑為腎色齒腎所主也故毛敗脈溢爪枯肉濡動齒槁者即知五臟熱痿也平按熇素問甲乙作槁問曰如夫子言可矣論言治痿者獨取陽明何也曰陽明者五臟六腑之海也主潤宗筋宗筋者束骨肉而利機關衝脈者經之海也主滲灌溪谷與陽明合於筋陰總宗筋之會會於氣街而陽明為之長皆屬於帶脈而絡於督脈故陽明虛則宗筋縱帶脈不引故足痿不用陽明胃脈胃主水穀流出血氣以資五臟六腑如海之資故陽明稱海從於臟腑流出行二十八脈皆歸衝脈故稱衝脈為經脈之海是為衝脈以陽明水穀之氣與帶脈督脈相會潤於宗筋所以宗筋能管束肉骨而利機關宗筋者足太陰少陰厥陰三陰筋及足陽明筋皆聚陰器故曰宗筋故陽明為長若陽明水穀氣虛者則帶脈不能控引於足故足痿不用也平按素問甲乙束骨肉無肉字經之海作經脈之海本書帶脈篇同筋陰作宗筋陰陽四字氣街甲乙作氣衝黃帝曰治之奈何答曰各補其滎而通其輸調其虛實和其逆順則宗筋脈骨肉各以其時受日則病已矣黃帝曰善五臟熱痿皆是陰虛故補五臟陰經之滎陰滎水也陰輸是木少陽也故熱痿通其輸也各以其時者各以其時受病之日調之皆愈也平按輸素問甲乙作俞筋脈上無則宗二字受日作受月王冰注云時受月謂受氣時月如肝王甲乙心王丙丁之類皆王氣法不若此注之明顯瘧解平按此篇自篇首至末見素問卷十第三十五瘧論篇又見甲乙經卷七第五又見靈樞卷十二第七十九歲露論又見巢氏病源卷十一瘧病諸候惟編次稍異黃帝問於岐伯曰夫㾬瘧者皆生於風其蓄作有時何也㾬者有云二日一發名㾬瘧此經但夏傷於暑至秋為病或云㾬瘧或但云瘧不必日髮間日以定㾬也俱應四時其形有異以為㾬耳因腠理開發風入不泄藏蓄合於四時而發日之辰又異其故何也平按㾬素問巢氏作痎素問新校正云按甲乙經云夫瘧疾皆生於風其以日作以時發何也與此文異太素同今文並自㾬者有云至以為㾬耳全引楊注惟注中俱應四時作但應四時又注㾬者下袁刻脫有云二字巢氏作痎瘧者夏傷於暑也其病秋則寒甚冬則寒輕春則惡風夏則多汗者然其蓄作有時岐伯曰瘧之始發先起於豪毛伸缺乃作寒栗寒栗鼓頷腰脊痛寒去則外內皆熱頭如破渴欲飲寒瘧髮狀凡有七別一起豪毛謂毛立二為伸缺三為寒栗四腰脊痛五內外熱六頭痛甚七渴飲水寒瘧之狀有斯七別也平按豪毛素問甲乙作毫毛巢氏作毫末寒栗二字俱不重素問甲乙脊下有俱字渴欲飲素問作渴欲冷飲甲乙作渴欲飲水巢氏作頭痛而渴欲飲黃帝曰何氣使然願聞其道請問寒瘧發之所以也岐伯曰陰陽上下交爭虛實更作陰陽相移也陽並於陰則陰實而陽明虛陽明虛則寒栗鼓頷巨陽虛則腰脊頭項痛三陽俱虛陰氣勝陰氣勝則骨寒而痛寒生於內故中外皆寒寒氣藏於腸胃之外皮膚之內舍於營氣至於春時陰陽交爭更勝更衰故虛實相移也三陽俱並於陰則三陽皆虛虛為陰乘故外寒陰氣強盛盛故內寒內外俱寒湯火不能溫也平按腰脊素問巢氏作腰背陽盛則外熱陰虛則內熱外內皆熱則喘而渴欲飲陰極則陽盛陽盛則外熱陰極則陰虛陰虛則陽乘故內熱外內俱熱甚於栗炭冰水不能涼故渴而欲飲也平按欲飲素問甲乙作故欲冷飲此得之夏傷於暑熱氣盛藏於皮膚之內腸胃之外此營氣之所舍也此言其日作所由也皮膚之內腸胃之外脈中營氣是邪之舍也平按此得之素問甲乙作此皆得之此令人汗出空疏平按汗出空疏素問無出字新校正云全元起本作汗出空疏甲乙太素並同腠理開因得秋氣汗出遇風乃得之以浴平按乃得之以浴素問乃作及甲乙作得浴二字水氣舍於皮膚之內與衛氣並居衛氣者晝日行陽此氣得陽而出得陰而內薄是以日作邪舍營氣之中令人汗出開其腠理因得秋氣復藏皮膚之內與衛氣居衛晝行於陽夜行於陰邪氣與衛俱行以日日而作也平按晝日行陽素問作晝日行於陽夜行於陰甲乙同惟晝下無日字而出素問甲乙作而外出是以上素問甲乙有內外相薄四字黃帝曰其間日而作何也岐伯曰其氣之舍瀉內薄於陰陽氣獨發陰邪內著陰與陽爭不得出是以間日而作其邪氣因衛入內內薄於陰共陽交爭不得日日與衛外出之陽故間日而作也平按瀉素問甲乙作深注入內下原重內字袁刻脫交爭下袁刻有不得出三字黃帝曰善其作日晏與其日早何氣使然岐伯曰邪氣客於風府循𦛗而下衛氣一日一夜大會於風府其明日日下一節故其作也晏此先客於脊背也每至於風府則腠理開開則邪入邪入則病作此以日作稍益晏者也其出於風府日下一椎二十一日下至骶骨因衛氣從風府日下故作也晏晚也骶丁禮反尾窮骨也平按素問甲乙𦛗作膂一椎均作一節二十一日素問作二十五日二十二日入於脊內注𦛗之脈其氣上行九日出於缺盆之中其氣日高故日益早邪與衛氣下二十一椎日日作晚至二十二日邪與衛氣注於督脈上行氣上高行故其作也早平按二十二日素問作二十六日注𦛗之脈作注於伏膂之脈甲乙巢氏伏膂作伏沖素問新校正云全元起本二十五日作二十一日二十六日作二十二日甲乙太素並同其內薄於五臟橫連膜原也其道遠其氣深其行遲不能與衛氣俱行偕出故間日乃作偕俱也膜原五臟皆有膜原其邪氣內著五臟之中橫連五臟膜原之輸不能與衛氣日夜俱行陰陽隔日一至故間日作也平按膜原素問甲乙作募原素問新校正云全元起本募作膜太素巢元方並同舉痛論亦作膜原又甲乙衛氣作營氣素問偕出作皆出黃帝曰夫子言衛氣每至於風府腠理乃發發則邪入邪入則病作今衛氣日下一節其氣之發也不當風府其日作奈何項髮際上風府之空衛氣之行日日而至若下二十一節復上方會風府日作則不相當通之奈何也平按注若下二十一節袁刻作若其下一節岐伯曰風無常府衛氣之所發也必開其腠理氣之所舍即其府高已黃帝曰善哉無常府者言衛氣發於腠理邪氣舍之即高同風府不必常以項髮際上以為府也故衛氣發腠理邪舍之處其病日作也平按素問岐伯曰下有此邪氣客於頭項循膂而下者也故虛實不同邪中異所則不得當其風府也故邪中於頭項者氣至頭項而病中於背者氣至背而病中於腰脊者氣至腰脊而病中於手足者氣至手足而病衛氣之所在與邪氣相合則病作故八十八字新校正云全元起本及甲乙太素自此邪客於頭項至下則病作故八十八字並無氣之所舍即其府高已素問作邪氣之所合則其府也新校正云甲乙巢元方則其府也作其病作黃帝曰夫風之與瘧也相似同類而風獨常在而瘧得有休者何也因腠理開風入臟內至時而發名之為瘧然則風之與瘧異名同類其瘧日有休時風府常在未愈其意何也平按有休者素問甲乙作有時而休者岐伯曰經留其處衛氣相順經絡沉以內薄故衛留乃作經絡停留之處衛氣過之經脈與衛氣相順故經脈內薄停處衛氣亦留衛氣與風留處發動為瘧所以其風常在瘧有休作也平按經留其處素問作風氣留其處甲乙作風氣常留其處衛氣相順素問甲乙作故常在瘧氣隨六字沉以內薄甲乙作次而內傳故衛留乃作素問甲乙作故衛氣應乃作袁刻留作氣三瘧平按此篇自篇首至末見素問卷十第三十五瘧論篇與上篇相接又見甲乙經卷七第五又見巢氏病源卷十一瘧病諸候惟編次先後略異黃帝曰瘧先寒後熱何也岐伯曰夏傷於大暑汗大出腠理開發因遇夏淒滄之小寒寒迫之平按小寒寒迫之素問作水寒二字新校正云甲乙太素水寒作小寒迫之據此則本書下寒字疑衍藏於腠理皮膚之中秋傷於風病盛矣夫寒者陰氣也風者陽氣也先傷於寒而後傷於風故先寒而後熱夏遇小寒藏於腠理皮膚之中至秋復傷於風先遇於寒故先寒也後傷於風故後熱此為寒瘧也平按病盛矣素問甲乙作則病成矣後熱下素問甲乙有病以時作名曰寒瘧八字黃帝曰先熱而後寒何也岐伯曰此先傷於風而後傷於寒故先熱而後寒亦以時作名曰溫瘧其但熱而不寒陰氣絶陽氣獨發則少氣煩悗手足熱而欲歐名曰疸瘧此二種瘧略示所由廣解在下平按素問甲乙絶上有先字歐作嘔素問煩悗作煩冤黃帝曰夫經言有餘者瀉之不足者補之今熱為有餘寒為不足夫瘧之寒也湯火不能溫也及其熱也冰水不能寒也此皆有餘不足之類也當是時良工不能止也必須其時自衰平按素問作必須其自衰甲乙作必待其自衰乃刺之其故何也願聞其說岐伯曰經言無刺熇熇之氣無刺渾渾之脈無刺漉漉之汗故其為病逆不可治此言病發盛時不可取也平按熇熇之氣氣字素問甲乙作熱新校正云全元起本及太素熱作氣夫瘧之始發也陽氣並於陰當是之時陽虛而陰盛外無氣故先寒栗陰氣逆極則復出之陽陽與陰復並於外則陰虛而陽實故熱而渴夫瘧氣者並於陽而陽勝並於陰則陰勝陰勝則寒陽勝則熱瘧風寒氣也不常病極則復至平按瘧風寒氣也不常病極則復至素問作瘧者風寒之氣不常也病極則復王注云復謂復舊也言其氣發至極還復如舊至字連下文病之發也作句新校正云甲乙作瘧者寒風之暴氣不常病極則復至全元起本及太素作瘧風寒氣也不常病極則復至至字連上句與王氏之意異病之發也如火熱風雨不可當也故經言曰方其盛時勿敢必毀因其衰也事必大昌此之謂也此言取其衰時有益者也平按素問甲乙熱字上有之字下有如字盛時下無勿敢二字新校正云太素作勿敢必毀與此同夫瘧之未發也陰未並陽陽未並陰因而調之真氣得安邪氣乃已故工不能治其已發為其氣逆也此言取其未病之病未盛之時也平按素問甲乙邪氣乃已作邪氣乃亡別本亦作亡黃帝曰善工之奈何早晏何如晏晚也療瘧之要取之早晚何如也平按素問工作攻岐伯曰瘧之且發陰陽之且移也必從四末始陽以傷陰從之故先其時堅束其處令邪氣不得入陰氣不得出後見之在孫絡盛堅而血者皆取之此直往而取未得並者也此言療之在早不在於晚也夫瘧之作也必內陰外陽相入相併相移乃作四肢為陽臟腑為陰瘧之將作陽從四肢而入陰從臟腑而出二氣交爭陰勝為寒陽勝為熱療之二氣未並之前以繩堅束四肢病所來處使二氣不得相通必邪見孫絡皆刺去血此為要道也陽以傷者陽虛也陰從之者陰並也平按素問甲乙陽以傷以作已後見之作審候見之直往素問作真往新校正云真往甲乙作其往太素作直往黃帝曰病不發其應何如瘧病有休有作其應何氣也平按素問甲乙病作瘧岐伯曰瘧氣者必更盛更虛隨氣所在病在陽則熱脈躁在陰則寒脈靜極則陰陽俱衰衛氣相離則病得休衛氣集則復病瘧氣不與衛氣聚故得休止若瘧氣居衛與衛氣聚者則其病復作故病不發者不與陰陽相併故也平按隨氣所在素問作當氣之所在也黃帝曰時有間二日或至數日發或渴或不渴其故何也夫瘧之作遲數不同或不間日謂一日一發也或有間日隔日而發也或間二日三日一發也或至數日一發四日以去有一發也諸間二日以去溫瘧人多不識不以為瘧宜審察之以行補瀉也岐伯曰其間日者邪氣與衛氣客於六腑而時相失不能相得故休數日乃作瘧氣衛氣俱行行至六腑穀氣有時盛衰致令二氣相失數日乃得一集集時即發故至數日乃作也平按而時相失素問作而有時相失甲乙作而相失瘧者陰陽更勝或甚或不甚或渴或不渴陰盛寒甚不渴陽勝熱甚故渴也平按或渴上素問甲乙有故字黃帝曰論言夏傷於暑秋必㾬瘧今瘧不必應何也夏傷於暑秋必㾬瘧今瘧之發不必要在秋時四時皆發其故何也平按甲乙無論言二字㾬瘧素問作病瘧新校正云按生氣通天論並陰陽應象大論俱作痎瘧注不必要在秋時要字袁刻作應亦通岐伯曰此應四時者也其病異形者反四時者也或夏傷於暑或冬傷於寒以為瘧者至其發時皆應四時但病形異也其俱以秋病者寒甚以冬病者寒不甚以春病者缶公風以夏病者多汗缶公於路反畏缶公也言同傷寒暑俱以四時為瘧也秋三月時陰氣得勝故熱少寒甚也冬三月時陽生陰衰故熱多寒少也春三月時風甚故惡風也夏三月時溫熱甚故多汗也平按素問甲乙無俱字缶公均作惡黃帝曰夫溫瘧與寒瘧各安舍舍何臟問寒溫二瘧所居之臟也平按素問夫下有病字各安舍舍何臟作而皆安舍舍於何臟甲乙作其在何臟岐伯曰溫瘧者得之冬中風寒氣藏於骨髓之中平按寒下甲乙巢氏重寒字至春則陽氣大發邪氣不得出因遇大暑腦髓鑠脈內銷澤平按邪氣不得出甲乙作不能出素問作不能自出脈肉銷澤素問甲乙作肌肉消巢氏作脈肉消釋腠理發泄因有所用力邪氣與汗偕出平按因素問甲乙作或偕作皆此病藏於腎其氣先從內出之於外如是則陰虛而陽盛則病矣衰則氣復反入入則陽虛陽虛則寒矣故先熱而後寒名曰溫瘧此言溫瘧所舍之臟謂冬三月時因腠理開得大寒氣深入至於骨髓藏於腎中至春陽氣雖發亦不能出在內銷於腦髓銷澤脈肉發泄腠理有因用力汗出其寒氣從內與汗俱出是則陰虛陰虛陽乘內盛為熱故先熱也熱極復衰反入於內外陽復虛陽虛陰乘為寒所以後寒故曰溫瘧也平按則病矣素問作陽盛則熱矣甲乙作陽盛則熱衰矣又注陽虛陰乘別本無陽虛二字黃帝曰疸瘧者何如岐伯曰疸瘧者肺之素有熱氣盛於身厥逆上中氣實而不外泄因有所用力腠理開風寒舍於皮膚之內分肉之間而發發則陽氣盛氣盛而不衰則病矣疸熱也素先也人之肺中先有熱氣發於內熱內熱盛而不衰以成疸瘧之病也平按肺之素有熱素問甲乙無之字巢氏素作系厥逆上素問作厥逆上衝巢氏作上下其氣不反之陰故但熱不寒寒氣內藏於心而外舍分肉之間令人銷鑠脫肉故命曰疸瘧黃帝曰善哉為寒氣所發熱氣不反之陰故但熱不寒神引寒氣藏心而舍分肉之間故能銷鑠脫肉令人瘦瘠然則無寒獨熱故曰疸瘧也平按不反之陰素問作不及於陰新校正云全元起本及太素作不反之陰巢元方作不及之陰寒氣寒字素問甲乙不重銷鑠素問作消爍甲乙作消鑠巢氏同十二瘧平按此篇自足太陽瘧至末見素問卷十第三十六刺瘧篇篇首瘧而不渴至為五十九刺素問刺瘧篇編次在後又自篇首至末見甲乙經卷七第五又見巢氏病源卷十一瘧病諸候惟編次小異黃帝曰瘧而不渴間日而作奈何岐伯曰瘧而不渴間日而作刺足太陽渴而間日作刺足少陽溫瘧者汗不出為五十九刺足太陽在陰主水故不渴間日發也足少陽在陽故渴而間日作也此二皆寒瘧也溫瘧傷寒所為故汗不出以五十九刺也平按自黃帝曰瘧而不渴至岐伯曰素問甲乙無此十六字刺足太陽甲乙經云九卷曰取足陽明素問刺太陰今本素問作刺足太陽新校正云九卷云刺足陽明太素同刺足少陽甲乙經云九卷曰取手少陽素問刺足少陽今本素問作刺足少陽新校正云九卷云刺手少陽太素同據新校正所引則太素與九卷同與素問異今本書云刺足太陽刺足少陽與九卷異與素問同又檢今本靈樞雜病篇云瘧不渴間日而作取足陽明渴而日作取手陽明再檢本書卷三十刺瘧節度篇與靈樞同與甲乙素問新校正所引亦不盡同與本篇所云刺太陽刺足少陽亦異細玩楊注本篇云此二皆寒瘧刺瘧節度篇云取所主輸故不盡同也足太陽瘧令人腰痛頭重寒從背起先寒後熱渴渴止汗出難已日刺郤中出血足太陽脈從頭下背下腰邪客之故寒從背起明堂足太陽合委中療經瘧狀與此同也平按渴渴止汗出素問作熇熇暍暍然熱止汗出新校正云全元起本甲乙經太素巢元方並作先寒後熱渴渴止汗出與本書合日刺郤中素問巢氏無日字甲乙作間日作刺膕中足少陽瘧令人身體解㑊寒不甚熱不甚惡見人見人心惕惕然熱多汗汗出甚刺足少陽足少陽脈羈終身之支節故此脈病身體解㑊足少陽與厥陰合故寒熱俱不甚惡見人也若熱多即汗出甚也可取足少陽風池丘墟等穴也平按解㑊巢氏作解倦甲乙無熱不甚三字汗字素問甲乙巢氏均不重疑衍足陽明瘧令人先寒灑淅灑淅寒甚久乃熱熱去汗出喜見日月光火氣乃快然刺陽明跗上足陽明兩陽合明故汗出喜見日月光明見之快心也足跗上足陽明脈行也平按灑巢氏作灑日下無月字素問刺下有足字甲乙跗上下有及調衝陽四字巢氏作刺足陽明腳膚上足太陰瘧令人不樂好太息不嗜食多寒熱汗出病至則喜歐歐已乃衰即取之足太陰脈從胃別上膈注心中故瘧令人不樂好太息也脾胃主食故脾脈病不嗜食其脈入腹屬脾絡胃上膈挾咽故病將極喜歐歐已乃衰時即宜取之也平按甲乙多寒熱作多寒少熱歐素問甲乙巢氏並作嘔取之下甲乙有足太陰三字足少陰瘧令人吐歐甚多寒熱熱多寒少欲閉戶而處其病難已足少陰脈貫肝膈入肺中從肺出絡心注胸中故足少陰瘧令人吐歐甚則寒熱俱多於余經瘧其足少陰為陽乘之故熱多寒少以其腎陰脈傷故欲閉戶而處病難已也平按甲乙作嘔吐甚多寒少熱巢氏作久寒熱難已下甲乙有取太溪三字足厥陰瘧令人腰痛少腹滿小便不利如癃狀非癃已數小便意恐懼氣不足腸中邑邑刺足厥陰足厥陰脈環陰器抵少腹故腰痛少腹滿小便不利如癃癃淋也小便不利如淋也其脈屬肝絡膽膽為足厥陰府故膽傷恐懼氣不足腸中邑邑也可刺足厥陰五輸中封等穴也平按非癃已素問甲乙作非癃也巢氏作非癃狀也數小便意素問作數便意新校正云甲乙數便意三字作數噫二字邑邑素問甲乙巢氏並作悒悒肺瘧者令人心寒寒甚熱間喜驚如有見者刺手太陰陽明以上言經病為瘧以下言臟病瘧肺以逼心故肺病心寒喜驚妄有所見宜取肺之臟腑表裡之脈也平按喜驚如有見者素問甲乙作善驚如有所見者巢氏作如是有見者心瘧者令人煩心甚欲得清水及寒多寒不甚熱甚刺手少陰心中煩熱故欲得冷水及欲得寒以其是陽得寒發熱故使得寒多也其寒不甚其熱甚也心經手少陰受病遂令心煩非心受病人心有神不可多受邪氣非脈不受邪也故令煩心療在手少陰少海之穴也平按及寒多寒不甚熱甚素問作反寒多不甚熱六字新校正云太素云欲得清水及寒多寒不甚熱甚與此同甲乙作寒多不甚熱巢氏作乃寒多寒不甚熱肝瘧令人色倉倉然太息其狀若死者刺足厥陰見血肝瘧病甚則正色見故倉倉然也倉青也病甚氣奔故太息出之可取肝之經絡見血得愈也平按倉倉素問甲乙巢氏均作蒼蒼甲乙無太息二字脾瘧令人疾寒腹中痛熱則腸中鳴已汗出刺足太陰脾脈足太陰脈屬脾絡胃連腸以穀氣盛故寒疾腹痛腸鳴可取脾之經脈大都公孫商丘等穴也平按素問無疾字甲乙作病字腎瘧令人灑灑腰脊痛宛轉大便難目詢詢然手足寒刺足太陽少陰詢請也謂有詢請舉目求之詢詢舉目視專也灑音洗謂惡寒也腎脈貫脊屬腎絡膀胱故腰脊痛宛轉大便難也其脈從腎上貫肝膈肝脈入目故詢詢然又或為眩腎腑膀胱足太陽脈起目內眥故令目眩也足少陰太陽上連手之少陰太陽故手足寒也取此腎之臟腑二脈也平按灑灑下素問有然字甲乙作悽悽然目詢詢然素問甲乙作目眴眴然巢氏作目眩眴眴然胃瘧令人疸病也喜飢而不能食食而支滿腹大刺足陽明太陰橫脈出血疸音旦內熱病也胃受飲食飲食非理致有寒熱故胃有瘧也胃脈足陽明屬胃絡脾故胃中熱喜飢不能食腹擆滿也足陽明大絡即大橫脈也平按疸病素問甲乙巢氏均作且病新校正云太素且病作疸病素問喜作善甲乙作寒善瘧以發身方熱刺跗上動脈開其空立寒以前諸瘧中溫瘧將欲熱時可刺足跗上動脈動脈即衝脈為五臟六腑之海故刺之以療十二瘧也開空者搖大其穴熱去立寒也或寒衰方熱也平按空下素問有出其血三字甲乙有出血二字瘧方欲寒刺手陽明太陰足陽明太陰以前諸瘧之中寒瘧可刺手足陽明太陰手陽明脈商陽三間合谷陽溪偏歷溫溜五里等足陽明神庭開明天樞解溪衝陽陷谷厲兌等手太陰列缺太泉少商足太陰大都公孫商丘等穴或熱衰方寒也平按諸瘧上素問有瘧脈滿大至則失時也八十九字本書在第三十卷刺瘧節度篇新校正云詳自瘧脈滿大至則失時也全元起本在第四卷中王氏移續於此本書無此八十九字則素問為王氏所移益信諸瘧而脈不見者刺十指間見血血去必已先視身之熱赤如小豆者盡取之十二種瘧各有絡脈見者依刺去之若絡不見足陰陽脈刺足十趾間手陰陽脈不見刺手十指間皆出血必已又諸瘧將衰身上有如赤小豆結起者皆刺去之也平按甲乙而脈不見而作如赤上素問甲乙無熱字十二瘧者其發各不同時察其病形以知其何脈之病也先其病發時如食項而刺之此言通療十二種瘧並於瘧未發先一食之頃刺之必已一刺則衰二刺則知三刺則已一刺病衰病人未覺有愈二刺知愈其病未盡三刺病氣都盡也不已刺舌下兩脈出血不已刺郤中盛經出血有刺項以下夾脊者必已舌下兩脈者廉泉也如前刺之不已可變法刺凡有三刺一刺舌下足少陰脈任脈廉泉之穴二刺膕內委中檢無郤中或可刺於膕內郤穴委中之中足太陽盛經出血三刺項下夾脊足太陽大杼譩嘻等穴平按素問甲乙有刺項以下作又刺項已下注膕內郤穴內字袁刻作中刺瘧者必先問其病之所先發者先刺之先問者問其瘧發之先欲療其始問而知之也平按必先問先字袁刻脫頭先痛及重先刺頭上先取督脈神庭上星囟會百會等穴及兩頜兩眉間出血兩頜眉間取絡出血平按兩頜素問甲乙均作兩額先項背痛者先刺之先起項及背者先刺項及背療瘧之處也先腰脊痛者刺郤中出血刺委中之郤也先手臂痛者先刺陰陽十指間手表里陰陽之脈十指之間也平按素問甲乙陰陽十指間作手少陰陽明十指間新校正云別本作手陰陽全本亦作手陰陽先足胻痠痛者先刺足陽明十趾間出血足陽明為三陽之長故刺足十趾間出血皆稱足陽明也平按素問甲乙胻作脛風瘧之發則汗出惡風刺三陽經背輸之血此風瘧狀也風瘧候手足三陽經之背輸有瘧於穴處取之平按之發素問作瘧發甲乙三陽上有足字胻痠痛甚按之不可名曰胕髓以鑱鑱絶骨出其血立已身體小痛刺之諸陰之井毋出血間日一刺人足胻痠痛按之不可名曰胕髓之病可以鑱鑱出血也五臟諸陰之井起於木宜取勿出血也有本髓為體平按胕髓下素問有病字甲乙作肘髓病以鑱鑱絶骨素問甲乙作以鑱針針絶骨素問刺之之字作至陰二字
