body:
  text: 卷第五卷首缺人合平按此篇自注文不足二節故得懷子也以上殘脫不完篇目亦不可考故自黃帝問於伯高曰至以抱人形謹從靈樞卷十第七十一邪客篇補入自天有陰陽以下至天地相應者見靈樞邪客篇黃帝問於伯高曰願聞人之肢節以應天地奈何伯高答曰天圓地方人頭圓足方以應之天有日月人有兩目地有九州人有九竅天有風雨人有喜怒天有雷電人有音聲天有四時人有四肢天有五音人有五臟天有六律人有六腑天有冬夏人有寒熱天有十日人有手十指辰有十二人有足十指莖垂以應之女子不足二節以抱人形以上從靈樞邪客篇補入不足二節故得懷子也天有陰陽人有夫妻歲有三百六十五日人三百六十五節平按靈樞人下有有字地有高山人有肩膝地有深谷人有腋膕戈麥反曲腳也地有十二經水人有十二經脈地有云氣人有衛氣地有草蔖千古反草名也又死草也平按雲氣原抄云字下半不全只餘上半雨字按素問陰陽應象大論云地氣上為云此云地有云氣正合袁刻因靈樞作泉脈遂作泉氣恐誤蔖靈樞作蓂人有豪毛天有晝晦人有臥起天有列星人有齒牙地有小山人有小節地有山石人有高骨地有林木人有幕筋地有聚邑人有䐃肉歲有十二月人有十二節地有時不生草人有母子此人所以與天地相應者幕當為膜亦幕覆也膜筋十二經筋及十二筋之外裹膜分肉者名膜筋也人身上有二十六形應天地之形也平按靈樞齒牙作牙齒時上有四字陰陽合平按此篇自篇首至此之謂也見靈樞卷七第四十一陰陽系日月篇篇中間自在上者為陽至蒼色一段經文楊注原抄殘缺平於日本仁和寺宮御藏本殘卷十三紙中檢出證以靈樞陰陽系日月篇經文補入生於火故及有肝肝者之間而此篇缺處復完亦幸事也自此之謂也下黃帝曰至末見素問卷二第六陰陽離合論又見靈樞卷二第五根結篇又見甲乙經卷二第五黃帝曰余聞天為陽地為陰日為陽月為陰其合之於人奈何岐伯曰腰以上為天腰以下為地故天為陽地為陰夫人身陰陽應有多種自有背腹上下陰陽有臟腑內外陰陽有五臟雄雌陰陽有身手足左右陰陽有腰上下天地陰陽也足之十二脈以應十二月月生於水故在下者為陰腰下為地故兩足各有三陰三陽應十二月故十二脈也人身左右隨是一邊即有十二脈者天地通取也月為太陰之精生水在地故為陰也平按靈樞足上有故字脈上有經字手之十指以應十日日生於火故在上者為陽日為太陽之精生火在天故為陽也平按日生於火靈樞作日主火黃帝曰合之於脈奈何岐伯曰寅者正月生陽也主左足之少陽未者六月主右足之少陽卯者二月主左足之太陽午者五月主右足之太陽辰者三月主左足之陽明巳者四月主右足之陽明此兩陽合於前故曰陽明從寅至未六辰為陽從申至醜六辰為陰十一月一陽生十二月二陽生正月三陽生三陽已生能令萬物生起故曰生陽生物陽氣正月未大故曰少陽六月陽氣已少故曰少陽二月陽氣已大故曰太陽五月陽氣猶大故曰太陽三月四月二陽合明故曰陽明也平按正月下靈樞有之字申者七月生陰也主右足之少陰醜者十二月主左足之少陰酉者八月主右足之太陰子者十一月主左足之太陰戌者九月主右足之厥陰亥者十月主左足之厥陰此兩陰交盡故曰厥陰五月一陰生六月二陰生七月三陰生三陰已生能令萬物始衰故曰生陰生物七月陰氣尚少故曰少陰十二月陰氣已衰故曰少陰八月陰氣已大故曰太陰十一月陰氣猶大故曰太陰九月十月二陰交盡故曰厥陰厥盡也平按七月下靈樞有之字甲主左手之少陽己主右手之少陽乙主左手之太陽戊主右手之太陽景主左手之陽明丁主右手之陽明此兩火併合故為陽明甲乙景丁戊己為手之陽也庚辛壬癸為手之陰也甲乙為少陽者春氣浮於正月故曰少陽己為夏陽將衰故曰少陽甲在東方故為左也己在中宮故為右也乙戊為手太陽者乙為二月陽氣已大故曰太陽戊夏陽盛故為太陽乙在東方戊在中宮故有左右也景丁為陽明者景為五月丁為六月皆是南方火也二火合明故曰陽明也平按景靈樞作丙唐人避太祖諱丙為景猶諱淵為泉也注夏陽將衰夏衰二字因蟲蝕不全玩其剩處與夏衰二字相近證以上注陽氣已少故曰少陽陰氣已衰故曰少陰於義亦合謹擬作夏衰二字庚主右手之少陰癸主左手之少陰辛主右手之太陰壬主左手之太陰故足之陽者陰中之少陽也足之陰者陰中之太陰也庚癸為少陰者十二辰為地十干為天天中更有陰陽故甲乙等六為陽庚辛等四為陰庚為七月申陰氣未大故曰少陰癸為十二月醜陰氣將終故曰少陰辛壬為太陰者辛為八月酉陰氣已大故曰太陰壬為十一月子陰氣盛大故曰太陰心主厥陰之脈非正心脈於十干外無所主也足為陰也足之有陽陰中少也足之有陰陰中大也平按注八月下原缺一字證以上注七月申則此八月應是酉字謹擬作酉又注十干干字原缺右方疑是干字謹擬作干手之陽者陽中之太陽也手之六陽乃是腰以上陽中之陽故曰太陽手之陰者陽中之少陰也手之六陰乃是腰以上陽中之陰陽大陰少故曰少陰腰以上者為陽腰以下者為陰此上下陰陽也其於五臟也心為陽中之太陽肺為陽中之少陰以上上下陰陽此為五臟陰陽心肺居鬲以上為陽肝脾腎居鬲以下為陰故陽者呼心與肺也陰者吸脾與腎也心肺俱陽心以屬火故為陽中太陽也心肺俱陽肺以屬金故為陽中少陰也平按注陰者吸者字原缺據上文陽者呼當是者字謹擬作者肝為陰中之少陽脾為陰中之至陰腎為陰中之太陰三臟居鬲以下為陰肝臟屬木故為陰中少陽也脾在鬲下屬土耳以居下故為陰中至陰腎下屬水故為陰中之太陰也平按素問六節藏象論謂肺為陽中之太陰腎為陰中之少陰肝為陽中之少陽新校正引太素肺為陽中之少陰腎為陰中之太陰肝為陰中之少陽以證素問王注之失其說甚詳檢素問卷三第九六節藏象論王注下新校正自知黃帝曰以治之奈何岐伯曰正月二月三月人氣在左無刺左足之陽春之三月人三陽氣在左足王處故不可刺也四月五月六月人氣在右無刺右足之陽夏之三月人三陽氣在右足王處故不可刺也七月八月九月人氣在右無刺右足之陰秋之三月人三陰氣在右足王處故不可刺也十月十一月十二月人氣在左無刺左足之陰冬之三月人三陰氣在左足王處故不可刺也黃帝曰五行以東方為甲乙木主春春者蒼色蒼色有肝肝者主足厥陰也今乃以甲為左手少陽不合於數何也岐伯曰此天地之陰陽也非四時五行之以次行也且夫陰陽之者有名而無形故數之可十離之可百散之可千推之可萬此之謂也五行次第陰陽以甲為厥陰上下天地陰陽以甲為陽者良以陰陽之道無形無狀裁成造化理物無窮可施名以名實故數之可十推之可萬也平按靈樞主春作王春蒼色二字不重有肝作主肝主足厥陰作足厥陰無主字可十十字原缺原校補推之推字袁刻誤作椎注同謹更正黃帝曰余聞天為陽地為陰日為陽月為陰三百六十五日成一歲人亦應之今聞三陰三陽不應陰陽其故何也三陰三陽之數各三不應天地日月陰陽二數何也黃帝非不知之欲因問廣衍陰陽變化無窮之數也平按素問黃帝下有問字六十下無五字今下無聞字岐伯曰陰陽者數之可十離之可百散之可千推之可萬萬之大不可勝數也然其要一也言陰陽之理大而無外細入無間豪末之形並陰陽雕刻故其數者不可勝數也故陰中有陰陽中有陽陽中有陰陰中有陽然則混成同為一氣則要一也平按素問岐伯下有對字離作推散作數天覆地載萬物方生也二儀合氣也未出地者命曰陰處名曰陰中之陰辨陰陽所謂雄雌者也人之與物未生以前合在陰中未出地也未生為陰在陰之中故為陰中之陰也則出地者命曰陰中之陽所生已生曰陽初生未離於地故曰陰中之陽也陽予之正陰為之主陽氣以為人物生正陰氣以為人物養主也故生因春長因夏收因秋藏因冬失常則天地四塞一氣離為陰陽以作生養之本復分四時遂為生長收藏之用終而復始如環無端謂之常也若失其常四時之施壅塞不行也平按注施袁刻作弛陰陽之變其在人者亦數之可散也散分也陰陽之變俱通內外外物既爾內身之變亦可分為眾可勝數也黃帝曰願聞三陰三陽之離合也別為三陰三陽推之可萬故為離也唯一陰一陽故為合也岐伯曰聖人南面而立古者聖人慾法天地人三才形象處於明堂南面而立以取法焉也前曰廣明後曰太衝太衝之地名曰少陰聖人中身以上陽明為表在前故曰廣明太陰為里在後故廣明下名曰太陰衝脈在太陰之下故稱後曰太衝太衝脈下次有少陰故曰少陰為地以腎最居下故也少陰之上名曰太陽太陽即足太陽是腎之腑膀胱脈也臟陰在內腑陽居外故為上者也太陽根於至陰結於命門至陰是腎少陰脈也是陰之極陽生之處故曰至陰太陽接至陰而起故曰根於至陰上行絡項聚於目也結聚也平按素問根下有起字名曰陰中之陽少陰水中而有此陽氣故曰陰中之陽也中身而上名曰廣明廣明之下名曰太陰身中表之上名曰廣明脾臟足太陰脈從足至舌下太陰脈在廣明裡故為下也廣明為表故為上也太陰之前名曰陽明陽明根起於厲兌結於顙大陽明脾腑之脈在太陰表前從足指厲兌上行聚於顙上額顱顙額也蘇蕩反平按結於顙大素問無此句靈樞作結於顙大顙大者鉗耳也甲乙經作結於頏顙頏顙者鉗大鉗大者耳也原抄本作顙大又本書卷十經脈根結亦作顙大袁刻作顙上名曰陰中之陽人腹為陰陽明從太陰而起行於腹陰上至於顙故為陰中陽厥陰之表名曰少陽少陽根起於竅陰結於窗籠名曰陰中之少陽厥陰之脈起於足大趾藂毛之上循陰股上注於肺陰藏行內也少陽肝腑之脈起足竅陰上聚於耳為表陽腑也以少陽屬木故為陰中少陽也平按素問無結於窗籠四字是故三陽之離合也太陽為關陽明為闔少陽為樞三陽離合為關闔樞以營於身也夫為門者具有三義一者門關主禁者也膀胱足太陽脈主禁津液及於毛孔故為關也二者門闔謂是門扉主關閉也胃足陽明脈令真氣止息復無留滯故名為闔也三者門樞主轉動者也膽足少陽脈主筋綱維諸骨令其轉動故為樞也平按太陽為關關字甲乙經素問靈樞均作開日本抄本均作閞乃關字省文玩楊注門有三義一者門關主禁者也主禁之義關字為長若開字則說不去矣再考靈樞根結篇及甲乙經經脈根結篇於太陽為開之上均有不知根結五臟六腑折關敗樞開闔而走之文本書卷十經脈根結與靈樞甲乙同則是前以關樞闔三者並舉後復以為關為闔為樞分析言之足證明後之為關關字即前之折關關字無疑矣下太陰為關與此同義不再舉再按嘉祐本素問新校正云九墟太陽為關作關三經者不得相失搏而勿傳命曰一陽惟有太陽關者則真氣行止留滯骨搖動也惟有陽明闔者則肉節敗骨動搖也惟有少陽樞者則真氣行止留滯肉節內敗也相得各守所司同為一陽之道也搏相得也傳失所守也平按傳素問作浮願聞三陰岐伯曰外者為陽內者為陰然則中為陰其衝在下者名曰太陰太陰根起隱白結於太倉名曰陰中之陰沖在太陰之下少陰脈上足太陰脈從隱白而出聚於太倉上至舌本是脾陰之脈行於腹陰故曰陰中之陰也平按素問隱上有於字隱白下無結於太倉四字太陰之後名曰少陰少陰根起於湧泉結於廉泉名曰少陰腎脈足少陰從足小指之下入湧泉上行聚於廉泉至於舌本也平按素問無結於廉泉四字名曰少陰作名曰陰中之少陰少陰之前名曰厥陰厥陰根起於大敦結於玉英肝脈足厥陰在少陰前起於大指藂毛之上入大敦聚於玉英上頭與督脈會於巔注於肺中也平按素問無結於玉英四字陰之絕陽名曰陰之絕陰無陽之陰是陰必絕故曰陰之絕陰是故三陰之離合也太陰為關厥陰為闔少陰為樞三陽為外門三陰為內門內門亦有三者一者門關主禁者也脾臟足太陰脈主禁水穀之氣輸納於中不失故為關也二者門闔主開閉者也肝臟足厥陰脈主守神氣出入通塞悲樂故為闔也三者門樞主動轉也腎臟足少陰脈主行津液通諸經脈故為樞者也三經者不得相失也搏而勿沉名曰一陰三陰經脈也三陰之脈搏聚而不偏沉故得三陰同一用也陰陽鍾鍾也傳為一周鍾鍾行不止住兒營衛行三陰三陽之氣相注不已傳行周旋一日一夜五十周也平按素問鍾鍾作山彳黑攵山彳黑攵傳字上無也字有積字氣里形表而相成者也五臟之氣在裡內營形也六腑之氣在表外成形者也平按而相成者也素問作而為相成也四海合平按此篇自篇首至末見靈樞卷六第三十三海論自人亦有四海至逆者必敗見甲乙經卷一第八惟文法微有不同黃帝問岐伯曰余聞刺法於夫子夫子之所言不離於營衛血氣夫十二經脈者內屬於腑臟外絡於支節子乃合之於四海何乎血謂十二脈中血也氣謂十二脈中當經氣也平按靈樞問下有於字支作肢四海下無何字岐伯曰人亦有四海十二經水十二經水者皆注於海海有東西南北命曰四海黃帝曰以人應之奈何岐伯曰人亦有四海黃帝曰請聞人之四海岐伯曰人有髓海有血海有氣海有水穀之海凡此四者所以應四海者也十二經水者皆注東海東海周環遂為四海十二經脈皆歸胃海水穀胃氣環流遂為氣血髓骨之海故也水穀之海比於東海也平按靈樞以人應之奈何下無岐伯曰人亦有四海黃帝曰請聞人之四海十七字黃帝曰遠乎哉夫子之合人天地四海也願聞應之奈何岐伯曰必先明知陰陽表裡營輸所在四海定矣胃脈以為陽表也手太陰足少陰脈為陰里也衝脈為十二經脈及絡脈之海即亦表亦裡也平按營靈樞作滎黃帝曰定之奈何岐伯曰胃者為水穀之海其輸上在氣街下至三里胃盛水穀故名水穀之海胃脈足陽明也足陽明脈過於氣街三里其氣上下輸此等穴也平按甲乙輸作腧下同不再舉衝脈者為十二經之海其輸上在於大杼下出於巨虛之上下廉衝脈管十二經脈大杼是足太陽手太陽脈所發之穴巨虛上下廉則足陽明脈所發之穴此等諸穴皆是衝脈致氣之處故名輸也膻中者為氣之海其輸上在柱骨之上下前在於人迎膻胸中也音檀食入胃已其氣分為三道有氣上行經隧聚於胸中名曰氣海為肺所主手陽明是肺府脈行於柱骨上下入缺盆支者上行至鼻為足陽明循頸下人迎之前皆是膻中氣海之輸也腦為髓之海其輸上在其蓋下在風府胃流津液滲入骨空變而為髓頭中最多故為海也是腎所生其氣上輸腦蓋百會之穴下輸風府也黃帝曰凡此四海者何利何害何生何敗岐伯曰得順者生得逆者敗知調者利不知調者害得生得敗言逆順天也為利為害言調不人也黃帝曰四海之逆順奈何岐伯曰氣海有餘者氣滿胸中急息面赤氣海不足則氣少不足以言有餘謂邪氣益真氣也面赤謂氣上衝面陽脈盛也平按急息靈樞作悗息甲乙作悗急息血海有餘者則常想其身大怫然不知其所病血海不足則常想其身小狹然不知其所病血多脈盛故神想見身大也怫扶弗反怫鬱不安不知所苦也平按怫下甲乙有郁也二字水穀之海有餘者則腹滿脹水穀之海不足則飢不受穀食髓海有餘者則輕勁多力自過其度髓海不足則腦轉耳鳴胻酸眩齋目無所見懈殆安臥腦減不滿顱中故腦易轉喜耳鳴也髓不滿脛中故胻痠疼也腦虛少筋肉血等精液不足故眩冒無所見也髓虛四肢腰無力故懈怠安臥也酸息官反眩元遍反瞑目亂也齋亡到反覆也平按滿脹甲乙作脹滿胻靈樞作脛甲乙作脛胻齋靈樞甲乙均作冒殆均作怠注腰下一字原缺袁刻作脊黃帝曰余以聞逆順調之奈何岐伯曰審守其輸而調其虛實毋犯其害順者得復逆者必敗黃帝曰善輸謂四海之輸平按毋字原缺下半靈樞甲乙均作無應是毋字甲乙無黃帝曰善四字十二水平按此篇見靈樞卷三第十二經水篇又見甲乙經卷一第七惟文法略異黃帝問於岐伯曰經脈十二者外合於十二經水而內屬於五臟六腑天下凡有八十一州此中國州之一也名為赤縣神州每一州之外有一重海水環之海之外有一重大山繞之如此三重海三重山環而圍繞人居其內名曰一州一州之內凡有十二大水自外小山小水不可勝數人身亦爾大脈總有十二以外大絡小絡亦不可數天下八十一州之中唯取中國一州之地用法人身十二經脈內屬臟腑以人之生在此州中稟此州地形氣者也夫十二經水者其大小深淺廣狹遠近各不同五臟六腑之高下小大受谷之多少亦不等相應奈何問其十二經脈取法所由也夫經水者受水而行之此問其臟腑經絡各有司主調養所由十二經水各從其源受水輸之於海故曰受水行也五臟者合神氣魂魄而藏五臟合五神之氣心合於神肝合於魂肺合於魄脾合於營腎合於精五臟與五精神氣合而藏之也平按臟下靈樞甲乙均有之字袁刻同六腑者受谷而行之受氣而揚之胃受五穀成熟傳入小腸小腸盛受也小腸傳入大腸大腸傳導也大腸傳入廣腸廣腸傳出也胃下別汁出膀胱之胞傳陰下泄也膽為中精有木精三合藏而不瀉此即腑受谷行之者也五腑與三焦共氣故六腑受氣三焦行之為原故曰揚也平按注成熟熟字袁刻誤作熱別汁出膀胱五字原缺不完平細玩蟲蝕剩處與此五字相近謹擬作此袁刻作膀胱膀胱四字經脈者受血而營之合而以治奈何刺之深淺灸之壯數可得聞乎營氣從中焦並胃口出上焦之後所謂受氣泌糟粕津液化津液精微注之肺脈中化而為血流十二脈中以奉生身故生身之貴無過血也故營氣獨行於十二經導營身故曰營氣營氣行經如霧者也經中血者如渠中水也故十二經受血各營也平按注津液上一字下半蟲蝕不全袁刻作成細玩上半剩處確非成字宜空一格岐伯答曰善乎哉問也天至高不可度地至廣不可量此之謂也且夫人生天地之間六合之內此天之高地之廣非人力所能度量而至也若夫八尺之士皮肉在此外可度量切循而得也死可解部而視也二儀之大人力不可度量人之八尺之身生則觀其皮肉切循色脈死則解其身部視其臟腑不同天地故可知也平按外可度量袁刻於外下增生字不合靈樞亦無部靈樞作剖其臟之堅脆腑之大小谷之多少脈之長短血之清濁氣之多少十二經之多血少氣與其少血多氣與其皆多血氣與其皆少血氣皆有大數其治以針艾各調其經氣固其常有合乎夫人稟氣受形既有七種不同以針艾調養固有常契不可同乎天地無度量也黃帝曰余聞之快於耳不解於心願卒聞快於耳淺知也解於心深識也平按卒聞下靈樞有之字岐伯答曰此人之所以參天地而應陰陽不可不察正以天地不可度量人參天地故不可不察也足太陽外合於清水內屬於膀胱清水出魏郡內黃縣南經清泉縣東北流入河也平按膀胱下靈樞甲乙均有而通水道焉五字本書在後足少陽外合於渭水內屬於膽渭水出隴西首陽縣鳥鼠同穴山東北至華陰入河過郡四行一千八百七十里雍州浸也足陽明外合於海水內屬於胃海晦也言其水廣博望之晦暗不測崖際故曰海也海即四海也足陽明脈血氣最多合之四海眾水之長也足太陰外合於湖水內屬於脾湖當為虖虖陀水出代郡滷城縣東流過郡九行千三百四十里為幷州川一解云湖當為沽沽水出漁陽郡東南入海行七百五十里此二水亦得為合也平按虖袁刻作雩足少陰外合於汝水內屬於腎汝水出汝南郡定陵縣高陵山東南流入淮過郡四行一千三百四十里也足厥陰外合於沔水內屬於肝沔綿善反沔水出武郡番冡山東流入江也平按沔靈樞甲乙均作澠注武郡武字原抄作武袁刻作南郡考水經注沔水出武都沮縣狼谷應作武手太陽外合於淮水內屬於小腸而通水道焉淮水出南陽郡平武縣桐柏山東南流入海過郡四行三千二百四十里也手少陽外合於漯水內屬於三焦漯湯合反漯水出平原郡東北流入於海又河內亦有漯水出王屋山東南流入河此二水並得為合也手陽明外合於江水內屬於大腸江水出蜀岷山郡升遷縣東南流入海過郡九行七千六百六十里也平按注升遷原抄作外遷據水經注應作升手太陰外合於河水內屬於肺河水出崑崙山東北隅便潛行至蔥嶺于闐國到積石山東北流入海過郡十六行九千四百里也手太陰外合於濟水內屬於心濟水出河東恆縣至王屋山東北流入於河手心主外合於漳水內屬於心包漳水清漳水也出上黨沽縣西北少山東流合濁漳入於海解是濁漳濁漳出於上黨長子縣西發鳩山東流入海也凡此五臟六腑十二經水者皆外有源泉而內有所稟此皆外內相貫如環無端人經亦然十二經水如江出岷山河出崑崙即外有源也流入於海即內有所稟也水至於海已上為天河復從源出流入於海即為外內相貫如環無端也人經亦爾足三陰脈從足指起即外有源也上行絡腑屬臟比之入海即內有所稟也以為手三陰脈從胸至手變為手三陽脈從手而起即外有源也上行絡臟屬腑即內有所稟也上頭以為足三陽脈從頭之下足復變為足三陰脈即外內相貫如環無端也平按外內靈樞甲乙作內外故天為陽地為陰腰以上為天腰以下為地人腰以上為天為陽也自腰以下為地為陰也經脈昇天降地與經水同行故得合也故清以北者為陰湖以北者為陰中之陰清水以北已是其陰湖在清北故為陰中之陰也漳以南者為陽河以北至漳者為陽中陰漳南為陽河北為陰故河北至漳為陽中陰也漯以南至江者為陽中之太陽漯居陽地故為陽中太陽平按太陽太字甲乙無此一州之陰陽所以人與天地相參者也陰陽之理無形大之無外小之無內但人生一州之地形必象之故以一州陰陽合人者也平按州靈樞作隅黃帝曰夫經水之應經脈也其遠近淺深水血之多少各不同合而以刺之奈何問有三意經水經脈遠近一也淺深二也水之與血多少三也然則身經脈有三不同請隨調之岐伯答曰足陽明五臟六腑之海胃受水穀化成血氣為足陽明脈資潤五臟六腑五臟六腑稟成血氣譬之四海滋澤無窮故名為海也其脈大血多氣盛熱壯足陽明脈具有四義故得名海其脈粗大一也其血又多二也其穀氣盛三也陽氣熱四也有此四義故得比於海也平按熱下原缺一字據靈樞甲乙補入刺此者不深弗散刺此道刺中度人足三陽脈足陽明脈須深六分以為深也其脈在皮下深血氣又盛故深六分方得散其氣也不留不瀉血氣既盛留之方得頓而瀉也若熱在皮膚之中聚為病者即疾瀉之故曰熱即疾瀉也足太陽深五分留七呼足少陽深四分留五呼足陽明深六分留十呼足太陰深三分留四呼足少陰深二分留三呼足厥陰深一分留二呼問曰十二經脈之氣並有發穴多少不同然則三百六十五穴各屬所發之經此中刺手足十二經者為是經脈所發三百六十五穴為是四肢流注五臟三十輸及六腑三十六輸穴也答曰其正取四肢三十輸及三十六輸余之間穴有言其脈發會其穴即屬彼脈故取其脈者即是其脈所發之穴也問曰此手足陰陽所刺分數與明堂分數大有不同若為取定答曰此及明堂所刺分數各舉一例若隨人隨病其例甚多不可一概也今足太陽脈在皮肉中有深四分有餘故以刺入五分為例若脈行更有深淺可以意捫循取之為當余皆放此留七呼者此據太陽脈氣強弱以為一例若病盛衰更多少可隨時調之不可以為定也余皆放此也平按足陽明一段靈樞在足太陽上甲乙經陽明太陽下均有多血氣刺四字足少陽下有少血氣刺四字太陰厥陰下均有多血少氣刺五字少陰下有少血多氣刺五字手之陰陽其受氣之道近其氣之來疾其深皆毋過二分其留皆毋過一呼手之六陰從手至胸屬臟絡腑各長三尺五寸手之六陽從手至頭屬腑絡臟各長五尺足之六陰從足至胸屬臟絡腑各長六尺五寸足之六陽從足至頭屬腑絡臟各長八尺此手足十二之脈當經血氣上下環流也然足經既長即血氣環流其道遠也復是陰氣故其行遲也手經既短即血氣環流其道近也復是陽氣故其行疾也以其道近脈淺刺深無過二分也以其氣疾故留之不過一呼也平按其深靈樞甲乙經均作其刺深注從手至胸胸字原缺袁刻作胃據本注下文從足至胸應作胸字其少長小大肥瘦以心撩之命曰法天之常撩力條反取也人之生也五時不同初生為嬰兒能笑以上為孩六歲以上為小十八歲以上為少二十以上為壯五十以上為老今量三十以下為少三十以上為長黃帝之時七尺五寸以上為大不滿七尺五寸為小今時人之大小可以意取之天者理也少長小大肥瘦之變變而不恆以合天為妙此天之常道也賢人以意取之妙合其理故曰法天之常也平按撩甲乙作料注為孩孩字下半蟲蝕細玩上半剩處於孩字為近日本醫心方卷二十五引太素經云小兒初生為嬰能笑為孩兒謹擬作孩袁刻作小復將下文六歲以上為小改作少十八歲以上為少改作壯二十以上為壯改作長與原抄不合又壯下二字原缺據靈樞衛氣失常篇五十以上為老擬作五十二字灸之亦然灸而過此者得惡火即骨枯脈繢刺而過此者則脫氣灸法亦須量人少長大小肥瘦氣之盛衰穴之分寸四時寒溫壯數多少不可卒中失於常理故壯數不足厥疾不瘳若過其限火毒入身諸骨枯槁經脈潰膿名為惡火之病火無善惡火壯傷多故名惡火也平按繢靈樞甲乙經均作澀袁刻作潰據注經脈潰膿當是潰字別本亦作潰黃帝問曰夫經脈之小大血之少多膚之厚薄肉之堅脆及䐃之大小可為度量乎膚皮也䐃臑等塊肉也舉人形有十種不同請設度量閤中之法也平按靈樞少多作多少䐃作膕岐伯答曰其可為度量者取其中度者也不甚脫肉而血氣不衰者也若失度之人瘠瘦而形肉脫者惡可以度量刺乎審切循捫按視其寒溫盛衰而調之是謂因適而為真者也中度者非唯取七尺五寸以為中度亦取肥瘦寒溫盛衰處其適者以為中度瘠音藉也七隻五寸人為中度者量定捫沒屯反摸也平按失度失字靈樞作夫
