body:
  text: 卷第十二卷首缺營衛氣平按此篇自溢於中以上殘脫不完篇目亦不可考其自黃帝曰營氣之道至肺流凡二十字從靈樞甲乙營氣篇補入自溢於中以下至逆順之常也見靈樞卷四第十六營氣篇又見甲乙經卷一第十營氣篇自黃帝曰願聞營衛之所行至末見靈樞卷四第十八營衛生會篇又見甲乙經卷一第十一營衛三焦篇黃帝曰營氣之道內谷為寶谷入於胃乃傳之肺流以上從靈樞甲乙經營氣篇補入平按甲乙經無黃帝曰三字溢於中布散於外谷入胃已精濁下流清精注肺肺得其氣流溢五臟布散六腑也精專者行於經隧常營毋已終而復始是謂天地之紀精專血氣常營無已名曰營氣也故氣從太陰出注於陽明上行至面注足陽明下行至跗注大指間與太陰合以下言營行十二經脈也氣營氣也營氣起於中焦並胃口出上焦之後注手太陰手陽明乃之足陽明也平按出下甲乙有循臂內上廉五字注於陽明靈樞甲乙作注手陽明靈樞無至面二字上行抵脾從脾注心中循手少陰出掖下臂注小指之端合手太陽上行乘掖出䪼內注目內眥上巔下項合足太陽循脊下尻行注小指之端足太陰脈注心中從心中循手少陰脈行也合者合手小指端也上巔下項者十二經中手太陽脈支者別頰上䪼抵鼻至目內眥手太陽脈起目內眥此言上巔者循手太陽氣至目內眥合足太陽之氣與之共行上頂下項然後稱合理亦無違也平按抵脾靈樞作抵髀掖靈樞甲乙均作腋下同不再舉下臂注小指端靈樞無之端二字尻下靈樞甲乙有下字循足心注足少陰上行注腎從腎注心外散於胸中循心注平按注靈樞甲乙作主脈出掖下臂入兩筋之間入掌中出中指之端平按甲乙作手中指還注小指次指之端合手少陽上行注膻中散於三焦從三焦注膽平按膽甲乙作膻出脅注足少陽下行至跗上復從跗注大指間合足厥陰上行至肝從肝上注肺上循喉嚨入頏顙之竅究於畜門其別者平按靈樞甲乙作其支別者上額循巔下項中循脊入骶是督脈也絡陰器上過毛中入臍中上循腹裡入缺盆下注肺中復出太陰此營氣之行逆順之常也問曰肝脈足厥陰上貫膈布脅肋循喉嚨之後上入頏顙連目系上出額與督脈會於巔此言足厥陰脈循喉嚨究於畜門循巔入骶等是督脈者未知督脈與足厥陰脈同異何如答曰足厥陰脈從肝上注肺上循喉嚨上至於巔與督脈會督脈自從畜門上額至巔下項入骶與厥陰不同此言別者上額循巔之言乃是營氣行足厥陰至畜門別於厥陰之脈循督脈上額至巔下項入骶絡陰器上循腹裡入缺盆復別於督脈注於肺中復出手太陰之脈此是營氣循列度數常行之道與足厥陰及督脈各異也頏顙當會厭上雙孔畜門鼻孔也逆順者在手循陰而出循陽而入在足循陰而入循陽而出此為營氣行逆順常也平按此營氣之行甲乙作此營氣之所行也黃帝曰願聞營衛之所行皆何道從行岐伯答曰營出於中焦衛出於上焦夫三焦者上焦在胃上口主內而不出其理在膻中中焦在胃中口不上不下主腐熟水穀其理在臍旁下焦在臍下當膀胱上口主分別清濁主出而不內其理在臍下一寸故營出中焦者出胃中口也衛出上焦者出胃上口也平按從行靈樞作從來甲乙作從始無岐伯答三字黃帝曰願聞三焦之所出前問營衛二氣所出出於三焦未知上焦衛氣出在何處故致斯問平按甲乙無黃帝曰願聞及下岐伯曰十三字岐伯曰上焦出於胃上口並咽以上貫膈布胸中走掖循太陰之分而行還注陽明上至舌咽胃之際名胃上口胃之上口出氣即循咽上布於胸中從胸中之掖循肺脈手太陰行至大指次指之端注手陽明脈循指上廉上至下齒中氣到於舌故曰上至舌也此則上焦所出與衛氣同所行之道與營共行也平按布上靈樞甲乙有而字還注陽明靈樞作還至陽明甲乙作還至手陽明注從胸中從字袁刻作循下足陽明其脈還出挾口交人中左之右右之左上挾鼻孔與足陽明合足陽明下行至足太陰等與營氣俱行也平按下足陽明甲乙作下注足陽明注交人中交字袁刻誤作夾常與營俱行於陽二十五度行於陰亦二十五度一周也故五十周而復大會於手太陰營氣行晝故即行陽也行夜故即行陰也其氣循二十八脈十六丈二尺晝行二十五周夜行二十五周故一日一夜行五十周平旦會手太陰脈也一度有一周五十周為日夜一大周矣上焦衛氣循營氣行終而復始常行無已也平按行於陽二句甲乙作行於陰陽各二十五度一周也作為一周故下有日夜二字復下有始字黃帝曰人有熱飲食下胃其氣未定汗則出或出於面或出於背或出於身半其不循營衛氣之道而出何也岐伯曰此外傷於風內開腠理毛蒸理泄衛氣走之固不得循其道此氣慓悍滑疾見開而出故不得從其道故命曰漏泄蒸之冰反火氣上行也衛氣在於脈外分肉之間腠理傷風因熱飲食毛蒸理泄腠理內開慓芳昭反急也悍胡旦反勇也言衛氣勇急遂不循其道即出其汗謂之漏泄風也平按營衛氣靈樞甲乙無營字命曰甲乙作名曰袁刻脫命字泄靈樞甲乙均作泄黃帝曰願聞其中焦之所出岐伯曰中焦亦並胃口出上焦之後此所謂受氣者泌糟粕承津液化其精微上注於肺脈乃化而為血以奉生身泌音必中焦在胃中口中焦之氣從胃中口出已並胃上口出上焦之後五穀之氣也泌去糟粕承津液之汁化其精微者注入手太陰脈中變赤稱血以奉生身平按甲乙無黃帝曰至岐伯曰十四字靈樞胃口作胃中靈樞甲乙承津液承字均作蒸注五穀上原缺一字依經文擬作受莫貴於此故獨得行於經隧命曰營氣人眼受血所以能視手之受血所以能握足之受血所以能步身之所貴莫先於血故得行於十二經絡之道以營於身故曰營氣也隧道也故中焦營氣也平按命曰營氣甲乙無氣字注中焦下原缺二字因上節問中焦之所出故此處擬作所出二字黃帝曰夫血之與氣異名同類何也岐伯曰營衛者精氣也血者神氣也故血之與氣異名同類焉故奪血者毋汗奪氣者毋血故人生有兩死而毋兩生營衛者人之至精之氣然精非氣也血者神明之氣而神非血也故比之水氣無異也毋血亦死毋氣亦死故有兩死也有血亦生有氣亦生隨有二即生故毋兩生也黃帝曰願聞下焦之所出岐伯答曰下焦者別迴腸注於膀胱而滲入焉故水穀者常並居於胃中成糟粕而俱下於大腸而成下焦滲而俱下濟泌別汁循下焦而滲入膀胱焉迴腸大腸也下焦在臍下當膀胱上口主分別清濁而不內此下焦處也濟泌別汁循下焦滲入膀胱此下焦氣液也膀胱尿脬也平按甲乙無黃帝曰至岐伯答曰十四字而成作而為濟泌作滲泄黃帝曰人飲酒亦入胃谷未熟而小便獨先下何也岐伯答曰酒者熟谷之液也其氣悍以滑故後谷入而先谷出焉其氣悍者酒為熟谷之氣又熱故氣悍平按注又熱袁刻脫又字悍下原缺三字依經文擬作以滑也三字黃帝曰善余聞上焦如霧中焦如漚下焦如瀆此之謂也上焦之氣如霧在天霧含水氣謂如雪霧也漚屋豆反久漬也中焦血氣在脈中潤一頃謂之漚也下焦之氣溲液等如溝瀆流在地也平按注雪字恐系云字傳寫之誤營衛氣行平按此篇自篇首至三飲而已見靈樞卷十第七十一邪客篇又見甲乙經卷十二第三自黃帝曰余聞十二經脈至以數調之見靈樞卷六第四十陰陽清濁篇自黃帝曰願聞人之清濁至以數調之又見甲乙經卷一第十二自黃帝曰經脈十二者至末見靈樞卷六第三十四五亂篇又見甲乙經卷六第四陰陽清濁順治逆亂大論黃帝問伯高曰夫邪氣之客於人也或令人目不瞑不臥出者何氣使然厥邪客人為病目開不得合臥起起也平按目不瞑至使然十一字甲乙作目不得眠者何也七字伯高答曰五穀入於胃也其糟粕精液宗氣分為三隧宗總也隧道也糟粕津液總氣分為三隧故宗氣積於胸中出於喉嚨以貫心肺而行呼吸焉糟粕津液濁穢下流以為溲便其清者宗氣積於膻中名曰氣海其氣貫於心肺出入喉嚨之中而行呼吸一也平按心肺靈樞作心脈營氣者泌其津液注之於脈化而為血以營四末內注五臟六腑以應刻數焉營氣起於中焦泌五穀津液注於肺脈手太陰中化而為血循脈營於手足回五臟六腑之中旋還以應刻數二也衛氣者出其悍氣之慓疾而先行四末分肉皮膚之間而不休者也晝日行於陽夜行於陰其入於陰也常從足少陰之分間行於五臟六腑衛氣起於上焦上行至目行手足三陽已夜從足少陰分上行五臟至晝還行三陽如是行五臟行六腑者夜行五臟之時臟脈絡腑故兼行也以腑在內故三也平按四末上靈樞甲乙有於字不休者也甲乙作不休息也晝下甲乙無日字靈樞無其入於陰也句今厥氣客於臟腑則衛氣獨衛其外衛其外則陽氣瞋瞋則陰氣益少陽喬滿是以陽盛故目不得瞑厥氣邪氣也邪氣客於內臟腑中則衛氣不得入於臟腑衛氣唯得衛外則為盛陽瞋張盛也臟腑內氣不行則內氣益少陽喬之脈在外營目今陽喬盛溢故目不得合也瞑音眠平按臟腑靈樞作五臟六腑甲乙作五臟獨衛其外甲乙作獨營其外衛其外則陽氣瞋至目不得瞑二十五字靈樞作行於陽則陽氣盛陽氣盛則陽蹺陷不得入於陰陰虛故目不瞑二十五字甲乙同惟甲乙陽喬陷作陽喬滿陰虛作陰氣虛故目不瞑作故目不得眠與靈樞小異黃帝曰善治之奈何伯高曰補其不足瀉其有餘調其虛實以通其道而去其邪不足陰氣也有餘外陽氣飲以半夏湯一齊陰陽以通其臥立至以下言半夏湯方以療厥氣厥氣既消內外氣通則目合得臥平按齊靈樞甲乙作劑黃帝曰善此所謂決瀆壅塞經絡大通陰陽和得者也願聞其方溝瀆水壅決之則通陰陽氣塞針液導之故曰決瀆所以請聞其方也伯高曰其湯方以流水千里以外者八升揚之萬遍取其清五升煮之炊以葦薪大沸量秫米一升治半夏五合徐炊令竭為一升半去其滓飲汁一小杯日三稍益以知為度故其病新發者覆杯則臥汗出則已矣久者三飲而已飲湯覆杯即臥汗出病已者言病愈速也三飲者一升半為一齊久病三服即瘥不至一齊新病一服即愈也平按大沸大字靈樞甲乙均作火黃帝曰余聞十二經脈以應十二經水十二經水者其五色各異清濁不同人之血氣若一應之奈何十二水謂涇渭海湖汝沔淮漯江河濟漳此十二水十二經所法以應五行故色各異也江清河濁即清濁不同也若如也人血脈如一若為彼十二經水也平按十二經水四字靈樞不重岐伯曰人之血氣苟能若一則天下為一矣惡有亂者乎人之血氣苟能一種無差者不可得應於十二經水正以血脈十二經不同故得應於十二經水所以有相亂也黃帝曰余問一人非問天下之眾岐伯曰夫一人者亦有亂氣天下之眾亦有亂氣其為一耳非直天下眾人血脈有亂一人自有十二經脈故有亂也平按其下原缺一字靈樞作合袁刻作理黃帝曰願聞人氣之清濁岐伯曰受谷者濁受氣者清受谷之濁胃氣也受氣之清肺氣也清者注陰陰肺也濁者注陽陽胃也濁而清者上出於咽穀氣濁而清者上出咽口以為噫氣也清而濁者則下行穀氣清而濁者下行經脈之中以為營氣平按則下行甲乙作下行於胃清濁相干命曰亂氣清者為陰濁者為陽清濁相干則陰陽氣亂也平按命甲乙作名黃帝曰夫陰清而陽濁濁者有清清者有濁別之奈何問清濁之狀也平按別上靈樞有清濁二字岐伯曰氣之大別氣之細別多種今言其大略耳清者上注於肺谷之清氣上注於肺濁者下流於胃谷之濁者下流於胃胃之清氣上出於口胃中谷氣濁而清者上咽出口以為噫氣肺之濁氣下注於經內積於海注肺清而濁氣下注十二經並積膻中以為氣海而成呼吸也黃帝曰諸陽皆濁何陽獨甚乎諸陰皆清諸陽皆濁諸陽之脈皆濁未知何經獨受中之濁也岐伯曰手太陽獨受陽之濁胃者腐熟水穀傳與小腸小腸受盛然後傳與大腸大腸傳過是為小腸受穢濁最多故小腸經受陽之濁也手太陰獨受陰之清其清者上走空竅肺脈手太陰受於清氣其有二別有清清之氣行於三百六十五絡皆上於面精陽之氣上行目而為精其彆氣走耳而為聽其宗氣上出於鼻而為臭其濁氣出於唇口為味皆是手太陰清氣行之故也平按空竅甲乙作孔竅注精陽二字袁刻作清其濁者下行諸經手太陰清而濁者下入於脈行十二經中也諸陰皆清足太陰獨受其濁六陰之脈皆清足太陰以是脾脈脾主水穀濁氣故足太陰受陰之濁也平按注脾主主字上半蟲傷不全下半剩土字當是主字剩文袁刻作上黃帝曰治之奈何岐伯曰清者其氣滑濁者其氣澀此氣之常也故刺陽者深而留之刺陰者淺而疾之清濁相干者以數調之諸經多以清者為陽濁者為陰此經皆以谷之悍氣為濁為陽谷之精氣為清為陰有此不同也故人氣清而滑利者刺淺而疾之其氣濁而澀者刺深而留之陰陽清濁氣並亂以理調之理數然也平按靈樞刺陽作刺陰刺陰作刺陽甲乙同疾之甲乙作疾取之黃帝曰經脈十二者別為五行分為四時何失而亂何得而治岐伯曰五行有序四時有分相順則治相逆則亂相順者十二經脈皆有五行四時之分諸攝生者攝之當分則為和為順乖常失理則為逆為亂也黃帝曰何謂相順平按甲乙有而治二字岐伯曰經脈十二者以應十二月十二月者分為四時四時者春夏秋冬其氣各異營衛相隨陰陽已和清濁不相干如是則順而治營在脈中衛在脈外內外相順故曰相隨非相隨行相隨和也黃帝曰何謂逆而亂岐伯曰清氣在陰濁氣在陽清氣在於脈內為營為陰也濁氣在於脈外為衛為陽也營氣順行脈衛氣逆行營衛氣順逆十二經而行也衛之悍氣上至於目循足太陽至足指為順行其悍氣散者復從目循手太陽向手指是為逆行也此其常也平按靈樞甲乙脈上無行字清濁相干亂於胸中是謂大悗悗音悶陽氣入陰陰氣入陽即清濁亂也營氣逆行衛氣順行即逆順亂也故氣亂於心則煩心密嘿俯首靜伏密嘿煩心不欲言也俯首低頭靜伏也平按嘿甲乙作默亂於肺則俯仰喘喝接手以呼肺手太陰脈行臂故肺氣亂肺及臂手悶所以接手以呼也平按接甲乙作按亂於腸胃則為霍亂腸胃之中營衛之氣相雜為亂故為霍亂霍亂卒吐利也亂於臂脛則為四厥四厥謂四肢冷或四肢熱也亂於頭則為厥逆頭重眩僕厥逆頭重謂頭寒或熱重而眩僕也平按頭重甲乙作頭痛注一作頭重黃帝曰五亂者刺之有道乎岐伯曰有道以來有道以去審知其道是謂身寶有道者理其亂使從其道黃帝曰善願聞其岐伯曰氣在於心者取之手少陰經心主輸氣在於心取手少陰經者上經云心不受邪今氣在心若為不受邪也若言邪在心之包絡即應唯療手心主之經何為心病二經俱療故知心者亦受邪也輸謂手少陰手心主二經各第三輸也平按其下原缺一字靈樞作道袁刻作旨少陰經心主輸靈樞甲乙作少陰心主之輸氣在於肺取之手太陰滎足少陰輸手太陰滎肺之本輸足少陰輸乃是腎脈以其腎脈上入於肺上下氣通故上取太陰滎下取足少陰輸氣在於腸胃取之足太陰陽明下者取三里足太陰脾脈也脾胃腑藏陰陽氣通故腸胃氣亂取足太陰也陽明之脈是胃本經胃之上輸在背下輸在三里也平按下者靈樞甲乙作不下者氣在於頭取之天柱大杼足太陽脈行頭天柱大杼並是足太陽脈氣所發故取之也不知取足太陽滎輸取前二穴不覺愈者可取足太陽第二滎穴及第三輸也氣在於臂足先去於血脈後取陽明少陽之滎輸手足四厥可先刺去手足盛絡之血然後取於手足陽明滎之與輸及手足少陽滎及輸也平按靈樞足下有取之二字血上無於字黃帝曰補瀉若何岐伯曰徐入徐出謂之導氣補者徐入疾出瀉者疾入徐出是謂通導營衛之氣使之和也補瀉無形所以謂之同精是非有餘不足也亂氣之相逆也補瀉雖復無形無狀所以同欲精於氣之是非有餘不足及亂氣之逆也故精者補瀉之妙意使之和也黃帝曰光乎哉道明乎哉論請著之玉板命曰治亂黃帝贊岐伯之言有二一則所言光揚大道二則所論開道巧便故請傳之不朽也平按自黃帝曰光乎哉至末甲乙無營五十周平按此篇自黃帝曰余願聞五十營至末見靈樞卷四第十五五十營篇又見甲乙經卷一第九氣息周身五十營四時日分漏刻篇黃帝曰余願聞五十營岐伯答曰天周二十八宿宿三十六分此據大率言耳其實弱三十六分平按甲乙無餘願聞三字靈樞營下有奈何二字人氣行一周謂晝夜周一千八分其實千分耳據三十六全數𪒟之故𪒟八分也宿各三十五分七分分之五則千分也知必然者下雲氣行一周日行二十分氣行再周日行三十分人晝夜五十周故知一千分也平按千上靈樞甲乙無一字注日行三十分當系四十分之誤玩下經文自明日行二十八分人經脈上下左右前後二十八脈周身十六丈二尺日行二十分人經脈一周言八分者誤也以上下文會之可知也平按日行二十八分分字靈樞作宿甲乙無此句以應二十八宿漏水下百刻以分晝夜以二十八脈氣之周身上應二十八宿漏水之數晝夜之分俱周遍故人一呼脈再動氣行三寸一吸脈亦再動氣行三寸呼吸定息氣行六寸一息之間日行未一分故不言日行之數十息氣行六尺日行二分一息六寸十息故六尺也二分謂二十七分分之四分也人氣十息行亦未一分也十三息半則一分矣平按注四分據下注十息得二十七分之二十此四字恐系二十之誤二百七十息氣行十六丈二尺氣行交通於中一周於身下水二刻日行二十分十息六尺故二百七十息氣行一百六十二尺又日行二十分者十息得二十七分之二十百息得二百二百息得四百二百七十息得五百四十分以二十七除之則為二十分矣平按二十分靈樞作二十五分甲乙作二十分有奇五百四十息氣行再周於身下水四刻日行四十分倍一周身之數平按四十分甲乙作四十分有奇二千七百息氣行十周於身下水二十刻日行五宿二十分十倍一周故日行二百分也宿各三十六分故當五宿二十分也由此言之故知五十周以一千分為實也平按二十分甲乙作二百十分有奇一萬三千五百息氣行五十營於身水下百刻日行二十八宿漏水皆盡脈終矣此人晝夜之息數氣行二十八脈之一終與宿漏相畢平按甲乙經注引王冰曰此略而言之也細言之則常以一千周加一分又十分之六乃奇分盡也所謂交通者並行一數謂二手足脈氣並行而以一數之即氣行三寸者兩氣各三寸也而二氣之行相交於中故曰交通上有交通之文故云所謂也故五十營備得盡天地之壽矣壽即終之義也天地以二十八宿下水百刻為一終也氣凡行八百一十丈即二十八脈相續五十周之數也平按靈樞無氣字衛五十周平按此篇自篇首至末見靈樞卷十一第七十六衛氣行篇甲乙經同上黃帝問於伯高曰願聞衛氣之行出入之合何如伯高答曰歲有十二月日有十二辰子午為經卯酉為緯天周二十八宿而面有七星四七二十八星房卯為緯虛張為經經云虛張為經者錯矣南方七宿星為中也平按甲乙天周二十八宿而面有七星作天一面七宿周天七字面有靈樞作一面房卯卯字靈樞甲乙均作昴是故房至畢為陽昴至尾為陰經云昴至尾為陰便漏心宿也平按尾靈樞甲乙均作心陽主晝陰主夜故衛氣之行一日一夜五十周於身晝日行於陽二十五周夜行於陰二十五周於五臟晝行手足三陽終而復始二十五周夜行五臟終而復始二十五周也平按於五臟上靈樞甲乙重周字是故平旦陰氣盡陽氣出於目目張則氣上行於頭循項下足太陽循背下至小指之端行於五臟陰氣盡也衛氣出目循足太陽氣出於目也小指之端足小指外側端也其散者別於目銳眥平按別於目銳眥甲乙作分於目別下手太陽下至小指之端外側其散者別目銳眥下足少陽注小指次指之間以上循手少陽之分平按分下靈樞甲乙有側字下至小指次指之間平按靈樞甲乙無次指二字別者至耳前合於頜脈注足陽明下行至跗上入五指之間其散者從耳下下手陽明大指之間入掌中眥才詣反目崖一曰目眶散者衛之悍氣循足太陰脈而有餘別故曰散者別目銳眥目外決眥也目之銳眥有手太陽無足太陽今言別者足太陽脈繫於目系其氣至於銳眥故衛氣別目銳眥下手太陽至小指之端外側也行此手足太陽一刻時也衛之悍氣別者循足少陽至小指次指之間別者循手少陽至於小指次指之間二刻時也衛之悍氣別者合於頜脈謂足陽明也入五指間者謂足陽明絡散入十指間故刺瘧者先刺足陽明十指間也手陽明偏歷大絡斜肩髃上曲頰偏齒其別者從齒入耳故衛別於耳下下手陽明至大指間入掌中者手陽明脈不入掌中而言入者手陽明脈氣雖不至掌中衛之悍氣循手陽明絡至掌中三刻時也平按頜靈樞甲乙作頷說文頜頤也唐韻音頷亦通其至於足也入足心出內踝下行陰分復合於目為一周衛之悍氣晝日行手足三陽已從於足心循足少陰脈上復合於目以為行陽一周如是晝日行二十五周也平按此一段二十二字袁刻混入注中查靈樞甲乙均有此文應作大字為經余小字為注是故日行一舍人氣行一周於身與十分身之八以下俱言行陽二十五周人氣行身一周復行第二周內十分之中八分即日行之一舍也日行二舍人氣行三周於身與十分身之六日行三舍人氣行於身五周與十分身之四日行四舍人氣行於身七周與十分身之二日行五舍人氣行於身九周日行六舍人氣行於身十周與十分身之八日行七舍人氣行於身十二周於身與十分身之六日行十四舍人氣行二十五周於身有奇分十分身之四人氣晝日行陽二十五周於身有奇分十分身之二言四誤也平按身之四靈樞作二楊注言四誤也按上文日行七舍人氣行身十二周與十分身之六此十四合倍七舍則十二周與十分身之六亦復倍之當為二十五周與十分身之二陽盡而陰受氣矣其始入於陰常從足少陰注於腎腎注於心衛之陽氣晝日行三陽二十五周已至夜行於五臟二十五周腎脈支者從肺出絡心故衛氣循之注心者也衛氣夜行五臟皆從能克注於所克之臟以為次也心注於肺心脈直者手少陰復從心系卻上肺故衛氣循心注肺者也肺注於肝肝脈支者復從肝別貫膈上注肺故衛氣循肺注肝者也肝注於脾肝脈挾胃胃脈絡脾故得肝脈注於脾也脾復注於腎為一周脾脈足太陰從下入少腹氣生於腎故衛氣循之注腎者也是故夜行一舍人氣行於陰臟一周與十分藏之八亦如陽之行二十五周而復合於目前行陽中日行一舍人氣行身一周復行後周十分身之八分此夜行一舍人氣行陰臟一周復行後周十分藏之八與前行陽二十五周數同亦有二十五周合五十周復合於目終而復始也平按陰臟甲乙作身注一云陰臟合於目甲乙作會於目陰陽一日一夜合有奇分十分身之二與十分藏之二行陽奇分十分身之二行陰奇分亦有十分藏之二其數同也平按兩二字甲乙均作四注云亦作二是故人之所以臥起之時有早晏者奇分不盡故也黃帝曰衛氣之在於身也上下往來不以期候氣而刺之奈何平按不以期甲乙作無已其伯高曰分有多少日有長短春秋冬夏各有分理然後常以平旦為紀以夜盡為始是故一日一夜水下百刻二十五刻者半日之度也常如是毋已日入而止隨日之長短各以為紀而刺之謹候其時病可與期失時反候百病不治故曰刺實者刺其來也刺虛者刺其去也此言氣存亡之時以候實虛而刺之刺實等衛氣來而實者可刺而瀉之衛氣去而虛者可刺而補之平按自謹候其時至以候實虛而刺之數句甲乙編次在後是故謹候氣之所在而刺之是謂逢時補瀉之道必須候於邪氣所在刺之病在三陽必候其氣之加在於陽分而刺之病在於三陰必候其氣之加在於陰分而刺之病在手足三陽刺之可以用療陽病之道也病在三陰刺之可以取療陰病之道也平按加在於陽分與加在於陰分靈樞無兩加字兩分字甲乙刺之下有謹候其時病可與期失時反候百病不除十六字水下一刻人氣在太陽在太陽者在手足太陽也水下二刻人氣在少陽在少陽者謂是手足少陽水下三刻人氣在陽明在陽明謂是手足陽明也水下四刻人氣在陰分水下五刻人氣在太陽水下六刻人氣在少陽水下七刻人氣在陽明水下八刻人氣在陰分水下九刻人氣在太陽水下十刻人氣在少陽水下十一刻人氣在陽明水下十二刻人氣在陰分水下十三刻人氣在太陽水下十四刻人氣在少陽水下十五刻人氣在陽明水下十六刻人氣在陰分水下十七刻人氣在太陽水下十八刻人氣在少陽水下十九刻人氣在陽明水下二十刻人氣在陰分水下二十一刻人氣在太陽水下二十二刻人氣在少陽水下二十三刻人氣在陽明水下二十四刻人氣在陰分水下二十五刻人氣在太陽此半日之度也從房至畢十四舍水下五十刻日行半度回行一舍水下三刻與七分刻之二回行一舍水下三刻與七分刻之四言七分刻之二者錯矣置五十刻以十四舍除之得三刻十四分之八法實俱半之得七分之四也平按甲乙日行半度回行一舍八字作從昴至心亦十四度水下五十刻終日之度也日行一舍者二十三字七分刻之二作十分刻之四注云素問十作七又靈樞刻之二作刻之四大要曰常以日之加於宿上也人氣在太陽衛氣行三陽上於目者從足心循足少陰脈上至目以為一刻若至於夜便入腎常從腎注於肺晝夜行臟二十五周明至於目合五十周終而復始以此為淮不煩註解也平按甲乙無曰字之加作加之氣上有則知二字註上至目及至於目兩目字原本均作日平按上注衛氣循少陰脈上復合於目以為行陽一周又本篇經文人氣行於陰臟亦如陽之行二十五周而復合於目據此則日字當系目字傳寫之誤是故日行一舍人氣行三陽與陰分常如是無已與天地同紀紛紛𤽉𤽉終而復始一日一夜下水百刻而盡矣紛孚云反亂也𤽉普患反謂衛氣行身不息紛紛𤽉𤽉無有窮期也平按𤽉𤽉原抄作昐昐查昐方文切日光也𤽉普巴切謂雜亂紛紜也與注無有窮期之義近靈樞甲乙均作𤽉𤽉注均云普巴切擬作𤽉𤽉又甲乙盡矣下有故曰刺實者刺其來刺虛者刺其去此言氣之存亡之時以候虛實而刺之也三十字
