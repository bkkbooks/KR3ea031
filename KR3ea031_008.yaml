body:
  text: 卷第八卷首缺經脈之一平按此篇自余則二字以上殘脫篇目亦不可考故自盛有二字上從靈樞卷三第十經脈篇及甲乙經卷二第一上篇補入自余則二字以下至末見靈樞經脈篇又見甲乙經卷二第一上篇雷公問於黃帝曰禁脈之言凡刺之理經脈為始平按靈樞始下有營其所行制其度量內次五臟外別六腑四句願聞其道平按靈樞聞上有盡字其道下有黃帝曰人始生先成精精成而腦髓生骨為幹脈為營筋為剛肉為牆皮膚堅而毛髮長谷入於胃脈道以通血氣乃行雷公曰願卒聞經脈之始生五十七字黃帝答曰經脈者所以決死生處百病調虛實不可不通也平按靈樞曰上無答字決上有能字通下無也字肺手太陰之脈起於中焦下絡大腸還循胃口上膈屬肺從肺系橫出腋下下循臑內行少陰心主之前下肘中循臂內上骨下廉入寸口上魚循魚際出大指之端其支者從腕後直出次指內廉出其端是動則病肺脹滿膨膨然而喘咳缺盆中痛甚則交兩手而瞀此為臂厥是主肺所生病者咳上氣喘渴煩心胸滿臑臂內前廉痛厥掌中熱氣盛有從靈樞甲乙經補入余則肩背痛肺氣盛故上衝肩背痛也風寒汗出中風不浹數缺肺脈盛者則大腸脈盛天有風寒之時猶汗出臟中身外汗少故曰不浹祖夾反謂潤洽也有本作汗出中風小便數而缺陰陽之氣上下相引故多缺也平按不浹數缺靈樞作小便數而缺甲乙同又缺袁刻誤作次注有本袁刻作本有氣虛則肩背痛寒盛氣衝滿肩背痛也肩背元氣虛而痛也陽虛陰並故肩背寒也平按肩背下原抄重一背字靈樞甲乙經均不重疑衍少氣不足以息溺色變肺以主氣故肺虛少氣不足以息也大腸脈虛令膀胱虛熱故溺色黃赤也溺音尿為此諸病手太陰脈氣為前諸病也盛則瀉之虛則補之八十一難曰東方實西方虛瀉南方補北方何謂也然金木水火土當更相平東方木也木欲實金當平之火欲實水當平之土欲實木當平之金欲實火當平之水欲實土當平之東方者肝也肝實則知肺虛瀉南方補北方南方火者木之子也北方水者木之母也水以勝火子能令母實母能令子虛故瀉火補水欲令金去不得干木也平按注欲令金去不得干木也句難經無去字干作平滑注云金不得平木不字疑衍復云經曰一臟不平所勝平之東方肝也西方肺也東方實則知西方虛若西方不虛則東方安得過實或瀉或補要亦抑其甚而濟其不足損過就中之道越人之意蓋謂東方過於實而西方之氣不足故瀉火以抑其木補水以濟其金是乃使金得與木相停故曰欲令金得平木也若曰欲令金不得平木則前後文義窒礙竟說不通使肝不過肺不虛復瀉火補水不幾於實實虛虛耶據此則本注去字不字疑衍原抄干字當系平字傳寫之誤熱則疾之熱盛沖膚閉而不通者刺之搖大其穴瀉也寒則留之有寒痹等在分肉間者留針經久熱氣當集此為補也陷下則灸之經絡之中血氣減少故脈陷下也火氣壯火宣補經絡故宜灸也不盛不虛以經取之八十一難云不盛不虛以經取之是謂正經自病不中他邪當自取其經前盛虛者陰陽虛實相移相傾而他經為病有當經自受邪氣為病不因他經作盛虛若爾當經盛虛即補瀉自經故曰以經取之盛者則寸口大三倍於人迎虛者則寸口反小於人迎厥陰少陽其氣最少故寸口陰氣一盛病在手足厥陰人迎陽氣一盛病在手足少陽少陰太陽其氣次多故寸口陰氣二盛病在手足少陰人迎陽氣二盛病在手足太陽太陰陽明其氣最多故寸口陰氣三盛病在手足太陰人迎陽氣三盛病在手足陽明所以厥陰少陽氣盛一倍為病少陰太陽二倍為病太陰陽明三倍為病是以寸口人迎隨陰陽氣而有倍數候此二脈知於陰陽氣之盛也其陰陽虛衰寸口人迎反小准此可知也大腸手陽明之脈手陽明脈起手之指端上行下屬大腸通行大腸血氣故曰大腸手陽明脈也起於大指次指之端手陽明與手太陰合手太陰從中焦至手大指次指之端陰極即變為陽如此陰極陽起陽極陰起行手頭及足如環無端也平按甲乙經端下有外側二字循指上廉出合谷兩骨之間掌骨及大指本節表兩骨之間也上入兩筋之中循臂上廉入肘外廉上臑外前廉手三陰行臑內手三陽行臑外陽明行臑外前楞也平按上臑外前廉甲乙經作上循臑外廉上肩出髃前廉髃音隅角也兩肩端高骨即肩角也又五口反平按出髃前廉靈樞甲乙經作出髃骨之前廉上出於柱骨之會上下入缺盆柱骨謂缺盆骨上極高處也與諸脈會入缺盆之處名曰會也手陽明脈上至柱骨之上復出柱骨之下入缺孟也絡肺下鬲屬大腸腑氣通臟故絡臟屬腑也平按鬲靈樞作膈下同其支者從缺盆上頸貫頰入下齒中還出俠口交人中左之右右之左上俠鼻孔頸項前也交謂相交不相會入也平按上頸甲乙經作直上至頸俠靈樞均作挾下同是動則病齒痛䪼腫齒痛謂下齒痛也䪼謂面顴秀高骨也專劣反平按䪼靈樞作頸今本甲乙經作頰正統本甲乙經作頸是主津所生病者八十一難云邪在血血為所生病血主濡之也是為血及津液皆為濡也津汗也以下所生之病皆是血之津汗所生病也平按難經云經言脈有是動有所生病是以動者氣也所生病者血也邪在氣氣為是動邪在血血為所生病氣主響之血主濡之氣留而不行者為氣先病也血壅而不濡者為血後病也故先為是動後為所生也滑注謂此脈字非尺寸之脈乃十二經隧之脈每脈中輒有二病者蓋以有在氣在血之分也平又按靈樞甲乙津下有液字注津汗袁刻作津液目黃口乾鼽衄喉痹肩前臑痛大指次指痛不用手陽明經是腑陽脈多為熱痛故循經所生七種病也鼻孔引氣故為鼽也鼻形為鼽也有說鼽是鼻病者非也氣盛有餘則當脈所過者熱腫是動所生之病有盛有虛盛者此脈所過之處熱及腫也虛則寒栗不復陽虛陰並故寒栗也不復不得復於平和也為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者則人迎大三倍於寸口虛者則人迎反小於寸口胃足陽明之脈起於鼻交頞中平按頞中下靈樞有旁納太陽之脈六字甲乙經納作約下循鼻外入上齒中還出挾口環唇下交承漿卻循頤後下廉出大迎循頰車上耳前過客主人循髮際至額顱其支者從大迎前下人迎循喉嚨入缺盆下鬲屬胃絡脾足陽明脈起於鼻下行屬胃通行胃之血氣故曰胃足陽明脈也手陽明經從手上挾鼻孔到此而起下行至於足指名足陽明經十二經脈行處及穴名備在明堂經具釋之也客主人即上開穴也頞阿葛反鼻莖也顱音盧胃腑通氣入臟故屬胃絡脾也平按頞顱靈樞甲乙經頞作額注上開穴本書氣府篇客主人各一楊注云一名上關穴甲乙經卷三第十一謂上關一名客主人在耳前上廉開口有孔手少陽足陽明之會素問氣穴論篇及氣府論王注均同則開字當系關字傳寫之誤其直者從缺盆下乳內廉下俠齊入氣街中其支者起胃口下循腹裡下至氣街中而合以下髀抵伏兔胃傳食入小腸處名胃下口此脈一道從缺盆下乳內廉膚肉之中下俠齊至氣銜中前者一道從缺盆屬胃今從胃口下下行與氣街中者合為一脈而下抵至也丁禮反平按俠齊靈樞作挾臍靈樞甲乙經髀下均有關字菟均作兔下膝入臏中膝脛頭也臏膝之端骨也頻忍反下循胻外廉下足跗入中指內間胻古孟反平按下循胻外廉袁刻脫此五字胻靈樞作脛其支者下膝三寸而別以下入中指外間其支者別跗上入大指間出其端脈從氣街下行至足指間凡有三道平按下膝三寸膝字靈樞作廉是動則病灑灑振寒灑灑惡寒貌音洗謂如水灑洗寒也平按灑灑甲乙經作悽悽然三字善伸數缺顏黑凡缺及多伸或為陽上陰下人之將臥陰陽上下相引故數缺顏額陽也黑陰也陰氣見額陽病也平按伸靈樞作呻病至則惡人與火聞木音則惕然而驚心欲動至甚也陽明土也土惡木故病甚惡木音也陽明主肉血盛故惡火也陽明厥喘悶悶故惡人也平按音靈樞作聲獨閉戶牖而處陰靜而暗陽動而明今陰氣加陽故欲閉戶獨處也平按牖上靈樞甲乙經有塞字甚則欲上高而歌棄衣而走陽盛故也賁向腹脹是為䯒厥向音鄉謂陽氣賁聚虛滿為腹脹也以陽盛於腳故欲登高棄衣而走名為䯒厥也平按向靈樞甲乙經均作響䯒靈樞作骭今本甲乙經作臂正統本甲乙經作骭是主血所生病者狂瘧溫淫汗出陽明主肉血為肉液故亦主血也淫過也謂傷寒熱病溫熱過甚而熱汗出也平按瘧甲乙經作瘈鼽衄口喎唇疹頸腫喉痹衄出血也不言鼻衄而言鼽衄者然鼻以引氣也鼽鼻形也鼻形之中出血也疹唇癢瘡音緊平按疹甲乙經作緊腹外腫膝臏腫痛陽明一道行於腹外一道行於腹內腹內水穀行通故少為腫腹外衛氣數壅故腹外多腫也平按腹外腫靈樞甲乙經作大腹水腫循膺乳街股伏兔䯒外廉足跗上皆痛中指不用上七處並是足陽明脈所過故循上七處痛者是陽明脈病也股髀內陰股也足中指內外間陽明脈支所至故脈病中指不用也平按街上靈樞有氣字甲乙經同注七處痛處字袁刻誤作虛足中指指字袁刻脫氣盛則身以前皆熱足陽明脈唯行身前故脈盛身前皆熱也其有餘於胃則消穀善飢溺色變脈氣有餘身前故身前皆熱若有餘胃中故善飢溺變也平按變靈樞甲乙經均作黃氣不足則身以前皆寒栗胃中寒則脹滿有餘身前胃中有熱有飢不足身前胃中寒栗脹滿陽氣有餘陰氣不足陽氣不足陰氣有餘今但舉一邊為例耳為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者則人迎大三倍於寸口虛則人迎反小於寸口脾足太陰之脈足太陰脈起於足大趾端上行屬脾通行脾之血氣故曰脾足太陰脈者也起於大指之端循指內側白肉際過核骨後核胡革反人足大趾本節後骨名為核骨也平按核靈樞甲乙經作核上內踝前廉十二經脈皆行筋肉骨間惟此足太陰經上於內踝薄肉之處脈得見者也上腨內循脛骨後交出厥陰之前內踝直上名為內外踝直上名為外脛後腓腸名為腨太陰從內踝上行八寸當脛骨後交出厥陰之前上行之平按腨靈樞作踹脛甲乙經作胻上循膝股內前廉入股屬脾絡胃膝內之股近膝名膝股近陰處為陰股也平按靈樞無循字入股股字作腹甲乙經同上鬲挾咽連舌本散舌下其支者復從胃別上鬲注心中舌下散脈是脾脈也是動則病舌強食則歐胃脘痛脘胃腑也脘音管也平按靈樞甲乙經舌下均有本字歐作嘔腹脹善噫得後出餘氣則快然如衰寒氣客胃厥逆從下上散散已復上出胃故為噫也谷入胃已其氣上為營衛及膻中氣後有下行與糟粕俱下者名曰餘氣餘氣不與糟粕俱下壅而為脹今得之泄之故快然腹減也平按出餘二字靈樞甲乙經均作與甲乙經如衰作而衰身體皆重身及四肢皆是足太陰脈行胃氣營之若脾病脈即不營故皆重也是主脾所生病者舌本痛脾所生病太陰脈行至舌下故舌本痛也體不能動搖脾不營也食不下煩心心下急痛脾脈注心中故脾生病煩心心急痛也平按痛甲乙經作寒瘧溏瘕泄溏食消利也瘕食不消瘕而為積病也泄食不消飧泄也水閉脾所生病不營膀胱故小便不利也黃疸不能臥強缺內熱身黃病也脾胃中熱故不得臥也將缺不得缺名曰強缺平按靈樞甲乙經疸均作疸缺均作立不能臥甲乙經作不能食唇青股膝內腫厥大指不用或痹不仁不能用也平按內腫厥甲乙經作內腫痛厥大指上靈樞甲乙經均有足字為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者則寸口大三倍於人迎虛者則寸口反小於人迎心手少陰之脈起於心中出屬心系下鬲絡小腸十二經脈之中餘十一經脈及手太陽經皆起於別處來入臟腑此少陰經起自心中何以然者以其心神是五神之主能自生脈不因余處生脈來入故自出經也肺下懸心之系名曰心系余經起於余處來屬臟腑此經起自心中還屬心系由是心神最為長也問曰九卷心有二經謂手少陰心主手少陰經不得有輸手少陰外經受病亦有療處其內心臟不得受邪受邪即死又九卷本輸之中手少陰經及輸並皆不言今此十二經脈及明堂流注少陰經脈及輸皆有若為通精答曰經言心者五臟六腑之大主精神之舍其臟堅固邪不能客客之則心傷心傷則神去神去即死故諸邪之在於心者皆在心之包絡包絡心主脈也故有脈不得有輸也手少陰外經有病者可療之於手掌兌骨之端又恐經脈受邪傷臟故本輸之中輸並手少陰經亦復去之今此十二經脈手少陰經是動所生皆有諸病俱言盛衰並行補瀉及明堂流注具有五輸者以其心臟不得多受外邪其於飲食湯藥內資心臟有損有益不可無也故好食好藥資心心即調適若惡食惡藥資心心即為病是以心不受邪者不可受邪也言手少陰是動所生致病及明堂有五輸療者據受內資受外邪也言手少陰是受邪故有病也平按注若為通精精字原校作釋又注是動所生生字袁刻誤作致及明堂及字袁刻作又其支者從心系上挾咽系目系筋骨血氣四種之精與脈合為目系心脈繫於目系故心病閉目也其直者復從心系卻上肺上出掖下下循臑內後廉行太陰心主之後下肘內循臂內後廉抵掌後兌骨之端其小指掌後尖骨謂之兌骨也平按上出掖下靈樞作下出腋下掖靈樞甲乙經均作腋下同不再舉下肘內甲乙經作下肘中內廉兌靈樞作鋭下同入掌內廉循小指之內出其端掌外將側名曰外廉次掌內將側名內廉也平按靈樞甲乙經廉上有後字是動則病嗌乾心痛渴而欲飲為臂厥心經病心而多熱故渴而欲飲其脈循臂故是動為臂厥之病也平按靈樞甲乙經為上有是字是主心所生病者目黃脅痛臑臂內後廉痛厥掌中熱痛也其脈上掖近脅故脅痛也臑臂內後廉脈行之處痛及厥也厥氣失逆也平按脅痛甲乙經作脅滿痛為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者則寸口大再倍於人迎虛者則寸口反小於人迎小腸手太陽之脈手太陽脈起於手指上行入缺盆下屬小腸通小腸血氣故曰小腸手太陽脈也起於小指之端循手外側上捥出踝中人之垂手大指著身之側名手內側小指之後名手外側足脛骨與足捥骨相屬之處著脛骨端內外高骨名曰內外踝手之臂骨之端內外高骨亦名為踝也手太陽脈貫踝也平按捥靈樞甲乙經作腕考腕與捥通直上循臂下骨下廉臂有二骨垂手之時內箱前骨名為上骨外箱後骨名為下骨手太陽脈行下骨下將側之際故曰下廉也平按靈樞骨上無下字甲乙經同出肘內側兩骨之間上循臑外後廉手陽明上臑外前廉手少陽循臑外此手太陽循臑外後廉手三陰脈行於臑內手三陽脈行於臑外此為異也平按靈樞兩骨作兩筋出肩解肩臂二骨相接之處名為肩解繞肩甲交肩上入缺盆肩兩肩也甲兩甲也兩箱之脈各於兩箱繞肩甲已會於大椎還入缺盆此為正也有說兩箱脈來交大椎上會大椎穴以為交者經不言交不可用也平按甲靈樞作胛甲乙經同缺盆下甲乙經有向腋下三字絡心循咽下鬲抵胃屬小腸其支者從缺盆循頸上頰至目兌眥卻入耳中其支者別頰上䪼抵鼻至目內眥脈絡心循咽而下抵著胃下屬於小腸上至顴䪼旁抵鼻孔至目內眥目眥有三目之內角為內眥外角為兌眥崖上為上眥也平按兌靈樞甲乙經均作鋭下其支者支字正統甲乙經作直內眥下靈樞甲乙經均有斜絡於顴四字注有三三字袁刻誤作二是動則病嗌痛頜腫不可以顧肩似拔臑似折臂臑痛若折者也平按頜靈樞甲乙經均作頷是主液所生病者耳聾目黃頰腫頸頷肩臑肘臂外後廉痛兩大骨相接之處有穀精汁補益腦髓皮膚潤澤謂之為液手太陽主之邪氣病液遂循脈生諸病也為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者則人迎大再倍於寸口虛者則人迎反小於寸口膀胱足太陽之脈足太陽脈起目內眥上頭下項挾脊屬膀胱通膀胱血氣故曰膀胱足太陽脈也起於目內眥上額交顛上其支者從顛至耳上角其直者從顛入絡腦還出別下項循肩髆內挾脊抵腰中入循膂絡腎屬膀胱其支者從腰中下貫臀入膕中顛頂也頂上有骨空太陽入骨空絡腦還出也髆音博臀音屯尻之厚肉也平按靈樞甲乙經顛均作巔貫臀上靈樞有挾脊二字甲乙經有會於後陰四字其支者從髆內左右別下貫胂過髆樞胂挾脊肉也似真反髀樞謂髀骨尻骨相抵相入轉動處也平按支正統本甲乙經作直髆甲乙經作膊胂靈樞甲乙經均作胛甲乙經注云一作髖胂下靈樞甲乙經均有挾脊內三字又注髀骨髀字相抵相字袁刻均脫循髀外後廉下合膕中以下貫腨出外踝之後循京骨至小指外側京骨謂外踝下近前高骨也京高大也平按後廉上靈樞有從字腨作踹甲乙經同是動則病沖頭痛目似脫項似拔脊痛腰似折髀不可以回膕如結腨如裂是為踝厥膕腨之病者皆是太陽行踝之後為厥失逆病也結謂束縛也平按甲乙經脊下無痛字折下無髀字回靈樞作曲甲乙經同注為上別本有所字是主筋所生病者痔瘧狂顛疾頭亞項痛目黃淚出鼽衄項背腰尻膕腨腳皆痛小指不用足太陽水生木筋也故足太陽脈主筋者也所以邪傷於筋因而飽食筋脈橫解腸澼為痔也平按顛靈樞作巔亞靈樞作漾注音信頂門也甲乙經作囟音同疑是古囟字之誤項痛甲乙經作項頸間痛為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者則人迎大再倍於寸口虛者則人迎反小於寸口腎足少陰之脈足少陰脈上行屬腎通行腎之血氣故曰腎足少陰脈也起於小指之下邪趣足心出於然骨之下足太陽腑脈至足小指而窮足少陰臟脈從小指而起是相接也然骨在內踝下近前起骨是也平按趣靈樞作走循內踝之後別入跟中少陰脈行至內踝之後別分一道入足跟中也平按注足跟二字袁刻誤作骨陷二字以上腨內出膕內廉貫脊屬腎絡膀胱貫脊謂兩箱二脈皆貫脊骨而上各屬一腎共絡膀胱平按甲乙經膕下有中字其直者從腎上貫肝鬲入肺中循喉嚨挾舌本直貫肝鬲而過稱貫即舌下兩旁脈是也平按舌本下甲乙經注云一本云從橫骨中挾臍循腹裡上行而入肺其支者從肺出絡心注胸中從肺下行循心系絡於心注胸中也是動則病飢不欲食面黑如地色少陰脈病陰氣有餘不能消食故飢不能食也以陰氣盛面黑如地色也平按面黑如地色靈樞作面如漆柴甲乙經作面黑如炭色咳唾則有血喝喝如喘唾為腎液少陰入肺故少陰病熱咳而唾血雖唾喉中不盡故呼吸有聲又如喘也喝呼葛反平按咳甲乙經作咳如喘作而喘坐而欲起起目𥇀𥇀如無所見少陰貫肝肝脈系目今少陰病從坐而起上引於目目精氣散故𥇀𥇀無所見也莫郎反平按起字靈樞甲乙經不重𥇀𥇀作𥉂𥉂心如懸病飢狀足少陰病則手少陰之氣不足故心如懸飢狀也平按病靈樞甲乙經作若氣不足則善恐心惕惕如人將捕之是為骨厥腎主恐懼足少陰脈氣不足故喜恐心怵惕前之病是骨厥所為厥謂骨精失逆惕恥激反謂懼也平按氣不足至捕之甲乙經無此十四字是主腎所生病者口熱舌乾咽腫上氣嗌乾及痛煩心心痛黃疸腸澼熱成為疸謂腎臟內熱發黃故曰黃疸也腎主下焦少陰為病下焦大腸不和故為腸澼也平按疸靈樞甲乙經作疸脊股內後廉痛委厥嗜臥津液不通則筋弛好臥也平按委靈樞甲乙經均作痿足下熱而痛少陰虛則熱並故足下熱痛也平按而痛下甲乙經有灸則強食生肉緩帶被髮大杖重履而步十六字本書及靈樞均在後為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之灸則強食生食不盛不虛以經取者亦以經取灸也故療腎所生之病亦有五法自火化以降並食熟肉生肉令人熱中人多不欲食之腎有虛風冷病故強令人生食豕肉溫腎補虛腳腰輕健人有患腳風氣食生豬肉得愈者衆故灸腎病須食助之一也緩帶帶若急則腎氣不適故須緩帶令腰腎通暢火氣宣行二也被髮足太陽脈從頂下腰至腳今灸腎病須開頂被髮陽氣上通火氣宣流三也平按注從頂頂字袁刻作項開頂頂字袁刻脫大杖足太陽脈循於肩髆下絡於腎今療腎病可策大杖而行牽引肩髆火氣通流四也重履而步燃磁石療腎氣重履引腰腳故為履重者可用磁石分著履中上弛其帶令重履之而行以為輕者可漸加之令重用助火氣若得病愈宜漸去之此為古之療腎要法五也盛者則寸口大再倍於人迎虛者則寸口反小於人迎心主手厥陰心包之脈心神為五臟六腑之主故曰心主厥陰之脈行至於足名足厥陰行至於手名手厥陰以陰氣交盡故曰厥陰心外有脂包裹其心名曰心包脈起胸中入此包中名手厥陰故心有兩經也心中起者名手少陰屬於心包名手厥陰有脈別行無別臟形三焦有氣有脈亦無別形故手厥陰與手少陽以為表裡也平按心包下靈樞有絡字甲乙經無心包二字起於胸中出屬心包下鬲歷絡三焦自有經歷而不絡著手厥陰既是心臟之腑三焦腑合故屬心包經歷三焦仍絡著也三焦雖復無形有氣故得絡也其支者循胸出脅下掖三寸上抵掖下下循臑內行太陰少陰之間入肘中下臂行兩筋之間入掌中循中指出其端其支者別掌中循小指次指出其端循胸出脅之處當掖下三寸然後上行抵掖下方下循臂也太陰少陰既在前後故心主厥陰行中間也平按循中指上甲乙經無入掌中三字是動則病手熱肘攣掖腫甚則胸中滿心淡淡大動面赤目黃淡徒濫反水搖又動也平按靈樞甲乙經手熱均作手心熱肘攣均作臂肘攣急胸中滿均作胸脅支滿心淡淡均作心中憺憺目黃下均有喜笑不休四字大動趙府本靈樞作火動是心主脈所生病者煩心心痛掌中熱心包既病故令煩心心痛平按心主心字靈樞甲乙經無為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者則寸口大一倍於人迎虛者則寸口反小於人迎三焦手少陽之脈上焦在心下下膈在胃上口主內而不出其理在膻中中焦在胃中口不上不下主腐熟水穀其理在臍旁下焦在臍下當膀胱上口主分別清濁主出而不內其理在臍下一寸上焦之氣如雲霧在天中焦之氣如漚雨在空下焦之氣如溝瀆流地也手少陽脈是三焦經隧通行三焦之血氣故曰三焦手少陽脈也起於小指次指之端上出兩指之間循手表出臂外兩骨之間上貫肘循臑外上肩而交出足少陽之後入缺盆上肩交足少陽行出足少陽之後方入缺盆也平按手表下靈樞甲乙經均有腕字布膻中散絡心包下鬲遍屬三焦遍甫見反散布膻中也有本布作交者檢非也三焦是氣血脈是形而言屬者謂脈氣相入也平按靈樞絡作落遍作循其支者從膻中上出缺盆上項系耳後直上出耳上角以屈下頰至䪼其支者從耳後入耳中出走耳前過客主人前交頰至目鋭眥系古帝反有本作俠也平按系靈樞作系甲乙經作俠下頰頰字甲乙經作額兌靈樞作鋭下同不再舉是動則病耳聾渾渾淳淳嗌腫喉痹渾渾淳淳耳聾聲也平按淳淳靈樞甲乙經作焞焞是主氣所生病者汗出目鋭眥痛頰痛耳後肩臑肘臂外皆痛小指次指不用氣謂三焦氣液平按頰痛痛字甲乙經無不用甲乙經作不為用為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者則人迎大一倍於寸口虛者則人迎反小於寸口膽足少陽之脈足少陽脈起目鋭眥下行絡肝屬膽下行至足大趾三毛通行膽之血氣故曰膽足少陽脈也平按注屬膽二字袁刻脫起於目鋭眥上抵角下耳後循頸行手少陽之前至肩上卻交出手少陽之後入缺盆角謂額角也項前曰頸足少陽脈從耳後下頸向前至缺盆屈回向肩至肩屈向後復回向頸至頸始入缺盆是則手少陽上肩向入缺盆肩上自然交足少陽也足少陽從頸前下至缺盆向肩即是行手少陽前也至肩交手少陽已向後回入缺盆即是行手少陽之後也平按靈樞甲乙經角上有頭字注至肩交手少陽已已字袁刻誤作也其支者從耳後入耳中出走耳前至目鋭眥後其支者別目鋭眥下大迎合手少陽於䪼下加頰車下頸合缺盆以下胸中貫鬲絡肝屬膽大迎在曲頷前一寸二分骨陷者中足少陽至大迎已向䪼與手少陽合已卻邪下向頰車加頰車已然後下頸至缺盆與前直者合頰車在大迎上曲頰端有本云別目鋭眥迎手少陽於䪼無大合二字以義置之二脈雙下不得稱迎也平按於䪼下靈樞甲乙經作抵於䪼下循脅裡出氣街繞毛際橫入髀厭中街街道也足陽明脈及足少陽脈氣所行之道故曰氣街股外髀樞名曰髀厭也其直者從缺盆下掖循胸過季脅下合髀厭中脅有前後最近下後者為季脅有本作肋平按厭靈樞甲乙經均作厭以下循髀太陽出膝外廉下外輔骨之前直下抵絶骨之端下出外踝之前循足跗上入小指次指之間膀胱足太陽脈從髀外下足因名髀太陽輔骨絶骨窮也外踝上陽輔穴也平按太陽太字靈樞甲乙經無其支者別跗上入大指之間循大指歧內出其端還貫爪甲出三毛其足少陽脈出大指端還出回貫甲復出三毛一名藂毛在上節後毛中也平按歧下靈樞甲乙經有骨字爪上甲乙經有入字是動則病口苦善太息心脅痛不能反側膽熱苦汁循脈入頰故口苦名曰膽痹脈循胸脅喜太息及心脅皆痛也平按反側靈樞作轉側甚則面塵體無膏澤足少陽反熱是為陽厥甚謂陽厥熱甚也足少陽起面熱甚則頭顱前熱故面塵色也陽厥少陽厥也平按面塵靈樞作面微有塵甲乙經作面微塵足少陽反熱靈樞甲乙經作足外反熱是主骨所生病者頭角顑痛目鋭眥痛水以主骨骨生足少陽故足少陽痛病還主骨也額角在髮際也頭角謂頂兩箱額角後高骨角也顑謂牙車骨上抵顱以下者名為顑骨平按角靈樞作痛甲乙經作面顑靈樞作頷甲乙經同注牙車骨牙字袁刻作口缺盆中腫痛掖下腫馬刀俠嬰汗出振寒瘧脈從缺盆下掖故掖下腫復從頰車下頸故病馬刀俠嬰也馬刀謂癰而無膿者是也汗出振寒瘧等皆寒熱病是骨之血氣所生病也平按馬字上甲乙經有痛字嬰靈樞甲乙經均作癭胸脅肋髀膝外至脛絶骨外踝前及諸節皆痛小指次指不用足少陽脈主骨絡於諸節故病諸節痛也平按胸下甲乙經有中字至脛袁刻誤作至經為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者則人迎大一倍於寸口虛者則人迎反小於寸口肝足厥陰之脈足厥陰脈從足指上行環陰器絡膽屬肝通行肝之血氣故曰肝足厥陰脈也起於大指藂毛之上循足跗上廉去內踝一寸上踝八寸交出太陰之後上膕內廉循陰股入毛中環陰器抵少腹挾胃屬肝絡膽上貫鬲布脅肋髀內近陰之股名曰陰股循陰器一周名環也平按靈樞甲乙經藂作叢上循上均有際字上踝甲乙經作外踝陰股靈樞甲乙經作股陰靈樞環作過少腹作小腹絡膽下正統本甲乙經有其直者從肝五字循喉嚨之後上入頏顙連目系上出額與督脈會於巔喉嚨上孔名頏顙督脈出兩目上巔故與厥陰相會也其支者從目系下頰裡環唇內其支者復從肝別貫鬲上注肺肺脈手太陰從中焦起以次四臟六腑之脈皆相接而起唯足厥陰脈還回從肝注於肺中不接手太陰脈何也但脈之所生稟於血氣血氣所生起中焦倉廩故手太陰脈從於中焦受血氣已注諸經脈中焦乃是手太陰受血氣處非是脈次相接之處故脈環周至足厥陰注入脈中與手太陰脈相接而行不入中焦也是動則病腰痛不可以俯仰丈夫頽疝婦人少腹腫腰痛甚則嗌乾面塵肝合足少陽陽盛並陰故面塵色也平按頽靈樞作㿉甲乙經作㿗塵下靈樞甲乙經均有脫色二字是主肝所生病者胸滿歐逆飧泄狐疝遺溺閉𤸇脈抵少腹挾胃故生飧泄也狐夜不得尿至明始得人病與狐相似因曰狐疝有本作頽疝謂偏頽病也𤸇篆文麻字此經淋病也音隆平按甲乙經飧泄作洞泄遺溺作遺精閉𤸇作癃閉為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者則寸口大一倍於人迎虛者則寸口反小於人迎經脈病解平按此篇見素問卷十三第四十九脈解篇又按素問新校正云詳此篇所解多甲乙經是動所生之病雖復少有異處大概則不殊矣太陽所謂腫腰脽痛者正月大陽寅寅大陽也脽尻也音誰也十一月一陽生十二月二陽生正月三陽生三陽生寅之時其陽已大故曰大陽也正月陽氣出在上一陽在地下深牙初發也二陽在地中淺牙出也三陽在地上出故曰正月陽氣出在上也平按注二牙字袁刻均誤作少而陰氣盛陽未得自次也故腫腰脽痛三陰猶在地上未沒故陰氣盛也以陰氣盛隔陽氣未得次第專用故發腫於膚肉生痛於腰也偏虛為跛者正月陽凍解地氣而出也所謂偏虛者冬寒頗有不足者故偏虛故跛正月已有三陽故凍解陽氣出於地也先有三陰故猶有冬寒陽氣不足也人身亦爾半陽不足故偏虛跛謂左腳偏跛也平按素問偏虛為跛者上有病字凍上有氣字故跛作為跛也頗有下袁刻脫不足者三字注故凍解三字袁刻在出於地也下所謂強上者陽氣大上而爭故強上三陽向盛與三陰戰得大得上而陰猶爭也平按素問所謂強上四字下有引背二字注得上得字袁刻作德所謂耳鳴者陽氣萬物上而躍故耳鳴正月陽氣令萬物勇躍鳴上故生病氣上衝耳鳴也平按上而躍素問作盛上而躍所謂甚則狂癲疾者陽盡在上而陰氣從下下虛上實故癲疾二陽爻與三陰爭而三陽俱勝盡在於頭為上實三陰從下即為下虛於是發病脫衣登上馳走妄言即謂之狂僵仆而倒遂謂之顛也平按素問故癲疾作故狂巔疾也所謂浮為聾者皆在氣也診人迎之脈得三陽浮者皆是太陽之氣為聾也所謂人中為喑者陽氣已衰故為喑太陽之氣中傷人者即陽大盛盛已頓衰故為喑也喑不能言也平按人中素問作入中內奪而厥則為喑痱此腎虛也陽氣外衰故但為喑也左腎氣內虛奪而厥者則為喑痱音肥風病不能言也謂四肢不用喑不能言心無所知甚者死輕者生可療也平按痱素問作俳注左腎左字袁刻作有少陰不至少陰不至者厥也少陰腎脈也足少陰脈不通則血氣不資於腎故厥為喑痱也平按少陰不至四字素問不重少陽所謂心脅痛者言少陽戌也戌者心之所表也手少陽脈絡心包足少陽脈循脅裡故少陽病心脅痛也戌為九月九月陽少故曰少陽也戌少陽脈散絡心包故為心之所表平按二戌字素問均作盛九月陽盡而陰氣盛故心脅痛陰氣已盛陽氣將盡少陽為病故心脅痛也平按陽盡素問作陽氣盡所謂不可反側者陰氣藏物也物藏則不動故曰不可反側九月物藏靜而不動陰之盛也故病不能反側也所謂甚則躍者九月萬物盡衰草木畢落而墮也則氣去陽而之陰躍勇動也甚謂九月陰氣外盛故萬物之氣極畢墮落則萬物之氣去陽之陰也平按注九月下袁刻脫陰氣二字而陽之下長也故曰躍陰氣盛於地上陽氣在於地下勇動萬物之根令其內長也平按而陽上素問有氣盛二字袁刻有氣盛灸三字陽明所謂灑灑振寒者陽明三陽之長也午為五月陽之盛也在於廣明故曰陽明平按灑灑素問作灑灑下同不再舉陽明者午也五月盛陽之陰也五月盛陽一陰爻生即是陽中之陰也陽盛而陰氣加之故灑灑振寒一陰始生徑猛加陽故灑灑振寒也所謂脛腫而股不收者五月盛陽之陰也陽者衰於五月而陰氣一下與陽始爭故脛腫而股不收腰以上為陽腰以下為陰五月有一陰氣在下始生與陽交爭陽強實於上陰弱虛於下故脛腫股不收也平按陰氣一下素問作一陰氣上所謂上喘為水者曰陰氣下下復上上則邪客於臟腑間故為水五月陽明一陰為病謂上喘咳水病者也一陰上下胸腹之中不依常度遂邪隨陰氣客於腑臟之間故為水病也平按陰氣下下復上素問作陰氣下而復上注常度度字袁刻作處所謂胸痛少氣者水在臟腑也水者陰氣也陰氣在中故少氣火為陽氣水為陰氣水在臟腑之間故陽氣少也平按素問水在臟腑作水氣在臟腑故少氣作故胸痛少氣也所謂甚則厥惡人與火聞木音惕然而驚者陽與陰氣相薄水火相惡故惕然而驚陽明脈氣與陰氣俱盛水火相惡故惕然驚也木勝土故聞木音惕然驚也所謂志欲獨閉戶牖而處者陰陽相薄也陽盡而陰盛也故欲獨閉戶牖居陰陽相爭更勝陽盛已衰次陰氣盛故好閉戶牖獨居暗處也平按志欲志字素問無所謂病重至則欲乘高而歌棄衣而走者陰陽復爭而外並於陽也故使之棄衣而走陰陽相爭陰少陽多陰並外陽故欲棄衣走也平按病重至重字素問無所謂客孫脈則頭痛鼻鼽腹腫者陽明並於上上者則其孫脈太陰也故頭痛鼻鼽腹腫太陰經脈至於舌下太陰孫絡絡於頭鼻故陽明並於太陰孫絡至鼻鼽腹腫也平按則其孫脈素問脈作絡太陰所謂病脹者曰太陰者子也十一月萬物氣皆藏於中故曰病脹以十一月陰氣大故曰太陰陰氣內聚陽氣外通十一月陰氣內聚雖有一陽始生氣微未能外通故內病為脹也所謂上走心為噫者曰陰氣盛而上走陽陽者陽明絡屬心故曰上走心為噫十一月有五陰爻故陰氣盛也太陰在內所以為下也陽明居外所以為上也陽明之正上入腹裡屬胃散之脾上通於心故陽明絡屬心者也寒氣先客胃中復有厥氣從胃上散其厥氣復出胃之中上口胃以連心故曰上走心為噫也平按陰氣盛素問無氣字袁刻脫盛字而上走陽陽者素問作而上走於陽明所謂食則嘔者曰物盛滿而上溢故嘔胃中食滿陽氣消之今十一月一陽力弱未能熟消故胃滿而溢謂之歐此嘔吐也平按注食滿袁刻誤作氣滿一陽一字袁刻脫所謂得後與氣則快然而衰者曰十一月陰氣下衰而陽氣且出故曰得後與氣則快然而衰陽氣未大故腹滿為脹陰氣向下一陽引之故得後便及泄氣快然腹減平按而衰兩而字素問均作如十一月素問作十二月少陰所謂腰痛者曰少陰者腎也七月萬物陽氣背傷故腰痛七月秋氣始至故曰少陰十一月少陰之氣大三月少陰已厥故少陰至腎七月之時三陰已起萬物之陽已衰太陽行腰太陽既衰腰痛也平按七月素問作十月背傷作皆傷注故少陰至腎袁刻脫陰字所謂上氣咳上氣喘者曰陰氣在下陽氣在上諸氣浮無所依從故嘔咳上氣喘也此腎咳也陰陽二氣不和各在上下故諸陽氣浮無所依好為嘔咳上氣喘也平按素問上氣咳作嘔咳諸氣浮作諸陽氣浮所謂邑邑不能久立坐起則目𥇀𥇀無所見者萬物陰陽不定未有主也秋氣始至微霜始下而方殺萬物陰陽內奪故曰目𥇀𥇀無所見也七月陰陽氣均未有定主秋氣始至陽氣初奪故邑然悵望不能久立又陰陽內各不足故從坐起目𥇀無所見也有本作露但白露即霜之微也十月已降甚霜即知有本作十月者非也平按邑邑素問作色色新校正云色色二字疑誤坐上素問有久字𥇀𥇀作䀮䀮注悵望悵字袁刻誤作脹所謂少氣喜怒者陽氣熱不治陽氣不得出肝氣當治而未得也故喜怒者名曰前厥少陰氣用也則陽氣熱而不用故不得出也肝以主怒少陰用時肝氣未得有用故喜怒也喜怒之病名曰前厥者也平按陽氣熱不治素問無熱字作陽氣不治二句故喜怒者作善怒善怒者前厥作煎厥注肝以主怒肝字袁刻誤作所所謂恐如人將捕之者秋氣萬物未得畢去陰氣少陽氣入陰陽相薄故恐七月萬物少衰未至枯落故未得畢去也始涼未寒故陰氣少也其時猶熱故陽氣入也然則二氣相薄不足進退莫定故有恐也平按陽氣入原抄脫入字謹依素問及本注補入所謂惡聞食臭者胃無氣故惡聞食臭也七月陽衰胃無多氣故惡聞食氣也所謂面黑地色者秋氣內奪故變於色也七月三陽已衰三陰已起然陽去陰來不已則陰強陽弱故奪色而變平按注而變袁刻誤作而起所謂咳則有血者陽脈傷也陽氣未盛於上腹滿則咳故血見於鼻也七月金主肺也肺主咳也不咳則已咳則傷陽陽傷血脈故腹滿見血於鼻中也平按腹滿則咳素問作而脈滿滿則咳六字厥陰所謂頽疝婦人少腹腫者曰厥陰者辰也三月陽中之陰也邪在中故曰頽疝少腹腫三月陰氣將盡故曰厥陰三月為陽厥陰脈在中故曰陽中之陰邪客厥陰之脈遂為頽疝頽謂丈夫少腹寒氣成積陰器之中而痛也疝謂寒積氣上入少腹而痛也病在少腹痛不得大小便病名曰疝也平按頽素問作㿗注上入小腹袁刻脫上字所謂腰脊痛不可以俯仰者三月一振榮華而萬物一俯而不仰也振動也三月三陽合動而為春萬物榮華低枝垂葉俯而不仰故邪因客厥陰腰脊痛俯不仰也所謂釘𤸇膚脹者曰陰一盛而脹陰脹不通故曰頽𤸇毒熱客於厥陰故為釘腫邪客於陰器遂為𤸇病小便難也客於皮膚中因為膚脹三月為陽陰氣一在而盛故陰器腫脹陰器腫脹不通故為頽𤸇也平按素問釘作㿗膚上有疝字一盛作亦盛而脹陰脹不通作而脈脹不通故曰㿗𤸇作故曰㿗𤸇疝也所謂甚則嗌乾熱中者陰陽相薄而熱則干故曰嗌乾也甚謂厥陰邪氣盛也厥陰之脈挾胃屬肝絡膽上入頏顙故陰陽相薄熱中而嗌乾也平按素問無則干二字陽明脈解平按此篇見素問卷八第三十陽明脈解篇又見甲乙經卷七第二黃帝問於岐伯曰陽明之脈病惡人與火聞木音則惕然而驚鐘鼓不為動聞木音而驚者願聞其故岐伯對曰陽明者胃之脈也胃者土也故聞木音而驚者土惡木也十二經脈而別解陽明者胃受水穀以資臟腑其氣強大氣和為益之大受邪為病之甚故別解之平按素問甲乙經黃帝問下無於岐伯三字陽明之脈作足陽明之脈鐘鼓不為動聞木音而驚者甲乙經作欲獨閉戶牖而處黃帝曰善其惡火何也岐伯曰陽明主肉其血盛邪客之則熱熱甚則惡火其惡人何也岐伯曰陽明厥則喘如悗悗則惡人悗武盤反此經中為悶字平按主肉甲乙經作主肌肉其血盛素問作其脈血氣盛甲乙經作其血氣盛則喘如悗悗則惡人素問作則喘而悗悗則惡人甲乙經作則喘悶悶則惡人又惡人下甲乙經有陰陽相薄陽盡陰盛故欲獨閉戶牖而處十六字注云按陰陽相搏至此本素問脈解篇士安移續於此黃帝曰善或喘而死者或喘生者其故何也岐伯曰厥逆連臟則死連經則生連臟病深故死連經病淺故生黃帝曰善陽明病甚則棄衣而走登高而歌或至不食數日逾垣上屋所上非其素時所能也病反能何也岐伯曰四肢者諸陽之本也邪盛則四肢實實則能登高其棄衣何也岐伯曰熱盛於身故棄衣而走其罵詈不避親疏而歌者何也岐伯曰陽盛則使人不欲食故妄言素先也其人非是先有此能因陽明病故也手足陽明之脈盛實好為登陟以其熱悶所以棄衣也平按所上素問作所上之處甲乙經無此句病反能何也袁刻作病反何能也罵詈上素問有妄言二字陽盛下素問作則使人妄言罵詈不避親疏而不欲食不欲食故妄走也甲乙經作故妄言罵詈不避親疏
