body:
  text: 卷第二十三九針之三量繆刺平按此篇自篇首至末見素問卷十八第六十三繆刺論篇又見甲乙經卷五第三黃帝問岐伯曰余聞繆刺未得意也何謂繆刺岐伯曰夫邪之客於形也必先舍於皮毛留而不去入舍於孫脈留而不去入舍於絡脈留而不去入舍於經脈內連五臟散於腸胃陰陽更盛五臟乃傷此邪之從皮毛而入極於五臟之次也此陰陽二邪俱盛從於皮毛至於五臟故以五臟為次也平按甲乙無留而不去入舍於孫脈九字陰陽更盛素問甲乙作陰陽俱感如此則治其經焉今邪客於皮毛入舍於孫絡留而不去閉塞不通不得入於經流溢於大絡而生奇病焉平按素問新校正云全元起云大絡十五絡也夫邪客大絡者左注右右注左上下與經相干布於四末其氣無常處不入於經輸命曰繆刺如此至經可療經之脈輸若邪客皮毛孫絡溢於大絡而生奇病左右相注與經相干乃至於布四末其氣居無常處而不入經可以繆刺之平按輸素問甲乙作俞命曰甲乙作名曰注生奇病生字袁刻作主黃帝曰願聞繆刺以左取右以右取左為之奈何其與巨刺何以別之此問繆刺巨刺之異平按甲乙無願聞繆刺為之奈何二句素問無為之二字岐伯曰邪客於經也左盛則右病右盛則左病先言巨刺也邪氣中乎經也左箱邪氣有盛則刺右之盛經以刺左右大經故曰巨刺巨大也病亦有易移者左病未已而右脈先病如此者必巨刺之必中其中經非絡脈也左箱病已右箱次病名後病今左箱病之未已即右箱病起故曰先病名曰易移如此之類可巨刺之平按病亦有易移者素問作亦有移易者注云甲乙作病易且移今本甲乙作亦有易且移者左病未已素問甲乙作左痛未已必中其中經素問甲乙作必中其經故絡病者其痛與經脈繆處故名曰繆刺矣痛病在於左右大絡異於經絡故名繆繆異也平按甲乙注云巨刺者刺其經繆刺者刺其絡黃帝曰願聞繆刺奈何取之如何以上請廣言繆刺也平按注以上恐系以下傳抄之訛岐伯曰邪客於足少陰之絡令人卒心痛暴脹胸脅支滿足少陰直脈從腎上入肺中支者從肝出絡心注胸中故卒心痛也從腎而上故暴脹也注於胸中胸脅支滿也以足少陰大鐘之絡旁經而上故少陰脈行處絡為病也平按甲乙支作反毋積者刺然骨之前出其血如食頃而已左取右右取左病新發者五日已聚陽病也積陰病也其所發之病未積之時刺然骨前出血也然骨在足內踝下大骨刺此大骨之前絡脈也平按出其血素問甲乙無其字素問左取右上有不已二字五日上有取字病新發袁刻作新病發邪客於手少陽之絡令人喉痹舌卷口乾煩心臂內廉痛手不及頭刺小趾次指爪甲上內去端如韭葉各一痏壯者立已老者有頃已左取右右取左此新病數日者也手少陽外關之絡從外關上繞臂內廉上注胸合心主之脈胸中之氣上熏故喉痹舌卷口乾煩心臂內廉痛手不上頭也老者氣血衰故有頃已也平按手少陽甲乙作手少陰注云一作陽煩心素問甲乙作心煩小指素問甲乙作手中指素問王注云謂關衝穴少陽之井也新校正云關衝穴出手小指次指之端今言中指者誤也注外關袁刻誤作外開甲乙經外關手少陽絡在腕後二寸陷者中別走心者邪客於足厥陰之絡令人卒疝暴痛刺足大趾爪甲上與肉交者各一痏男子立已女子有頃乃已左取右右取左足厥陰亟溝之絡其別者循脛上鼻結於莖故病卒疝暴痛也疝痛者陰之病也女子陰氣不勝於陽故有頃已也平按注亟溝查足厥陰無亟溝甲乙經云蠡溝足厥陰之絡在足內踝上五寸別走少陽亟溝恐系蠡溝傳抄之訛又注循脛上鼻素問王注作循脛上睪鼻恐系睪字傳抄之誤又注故病袁刻誤作故痛邪客於足太陽之絡令人頭項痛肩痛刺足小趾爪甲上與肉交者各一痏立已不已刺外踝下三痏左取右右取左足太陽支正之絡別者上走肘絡肩髃故頭項痛也足小趾甲上與肉交處此絡所出處也外踝下亦此絡行處也平按右取左下素問甲乙有如食頃已四字邪客於手陽明之絡令人氣滿胸中喘息而支胠胸中熱刺手大指次指爪甲上去端如韭葉各一痏左取右右取左如食頃已手陽明偏歷之絡其支者上臂垂肩髃上曲頰不言至於胸胠而言胸胠痛者手陽明之正膺乳別上入柱骨下走大腸屬於肺故胸滿喘息支胠胸熱也以此推之正別脈者皆為絡平按注柱骨甲乙作巨骨在肩端上行兩叉骨間陷者中手陽明蹺脈之會邪客於臂掌之間不可得屈刺其踝後先以指按之痛乃刺之以月死生為痏數月生一日一痏二日二痏十六日十四痏腕前為掌腕後為臂手外踝後是手陽明脈所行之處有脈見者是手陽明絡臂掌不得屈者取此絡也平按二日二痏下素問甲乙有十五日十五痏六字邪客於陽蹺令人目痛從內眥始刺外踝之下半寸所合各二痏左刺右右刺左如行十里頃而已陽蹺從足上行至目內眥故目痛刺足外踝之下中脈所生絡也平按注中脈當系申脈傳寫之訛素問王注謂申脈穴陽蹺之所生也甲乙經申脈陽蹺所生在足外踝下陷者中別本亦作中人有所墮墜惡血在內腹中滿脹不得前後先飲利藥此上傷厥陰之脈下傷少陰之絡刺足內踝之下然骨之前血脈出血刺足跗上動脈不已刺三毛上各一痏見血立已左刺右右刺左人有墮傷惡血在腹中不得大小便者可飲破血之湯利而出之若不愈者可刺足內踝之下大骨之前足少陰之絡又取三毛厥陰之絡平按惡血在內素問作惡血留內甲乙作惡血留於內血脈出血素問新校正疑血脈脈字是絡字之誤刺足跗上甲乙無足字左刺右右刺左甲乙刺作取善悲善驚不樂刺如右方厥陰之脈入眼故傷厥陰虛而善悲及不樂也志主驚懼故傷少陰之脈令人驚喜俱用前方刺三處也平按善悲善驚素問作善悲驚甲乙作善驚善悲邪客於手陽明之絡令人耳聾時不聞刺手大指次指爪甲上去端如韭葉各一痏立聞不已刺中指爪甲上與肉交者立聞其不時聞者不可刺也手陽明偏歷之絡別者入耳會於宗脈故邪客令人耳聾也不時間者病成不可療平按時不聞素問甲乙聞下有音字刺中指爪甲上素問王注疑是小指爪甲上新校正以王氏之説非是詳素問注中耳中生風者亦刺之如此數左刺右右刺左人覺耳中有風出者是邪客手陽明絡故用方同之平按生風袁刻誤作出風左刺右右刺左甲乙刺作取痹往來行無常處者在分肉間痛而刺之以月死生為數有痹往來手陽明絡分肉間為痛痹也從月一日至十五日為月生也從十六日至三十日為月死也平按痹上素問甲乙有凡字往來行甲乙作行往來用針者隨氣盛衰以為痏數針過其月數則脫氣不及月數則氣不瀉左刺右右刺左病已止不已復刺如法用針之數隨氣盛衰盛則益數衰則減數輒過其數必即脫氣不增其數邪氣不瀉增減病仍不愈刺如前法也平按月數素問甲乙作日數病已止不已甲乙作病如故三字月生一日一痏二日二痏十五日十五痏十六日十四痏月生氣血漸增故其痏從增至十五日也十六日後月減人氣漸衰故從十四痏減至月盡名曰月死也平按素問二痏下有漸多之三字十四痏下有漸少之三字邪客於足陽明之絡令人鼽衄下齒寒刺中指爪甲上與肉交者各一痏左刺右右刺左足陽明豐隆之絡別者上絡頸合諸經之氣下絡喉嗌故從鼽入於下齒所以邪客令人鼽衄下齒冷也手陽明經入下齒中足陽明經入上齒中不入下齒今言齒寒者足陽明絡入下齒也又尋絡之生病處不是大絡行處者乃是大絡支分小絡發病者也平按素問絡作經下齒作上齒中趾作中趾次趾王注謂中趾當是大趾傳寫之誤甲乙經注云素問注云刺大趾次趾新校正云按甲乙經云刺足中趾爪甲上無次趾二字蓋以大趾次趾為中趾義與王注同平按繆刺乃刺絡所生病故上文經云絡病者其痛與經脈繆處故名曰繆刺王氏以足陽明之絡作經故下齒亦作上齒復以中趾為大趾次趾之誤謂宜刺厲兌穴是直以絡病為經病矣不若楊注為允邪客於足少陽之絡令人脅痛咳汗出刺足小趾次趾爪甲上與肉交者各一痏不得息立已汗出立止咳者溫衣飲食一日已左刺右右刺左病立已不已復刺之如法又足少陽光明之絡去足踝五寸別走厥陰下絡足跗不至於脅足少陽正別者入季脅之間循胸裡屬膽散之上肝貫心上挾咽故脅痛也貫心上肺故咳也貫心故汗出也與肉交處刺絡邪客處不得息者亦肺病也肺以惡寒故刺出血已須溫衣暖飲食也平按脅痛下素問甲乙有不得息三字甲乙無次趾二字邪客於足少陰之絡令人咽痛不可內食無故善怒氣上走賁上刺足下中央之脈各三痏凡六刺立已左刺右右刺左足少陰大鐘之絡別者旁經上走心包故咽痛不能內食也少陰正經直者上貫肝膈絡既旁經而上故善怒氣走賁上也賁膈也足下中央有湧泉穴少陰脈也平按素問咽作嗌賁素問王注謂氣奔新校正引難經謂胃為賁門楊玄操云賁膈也與此注同素問王注非是注足下袁刻誤作足上邪客於足太陰之絡令人腰痛引少腹控䏚足太陰公孫之絡別者入絡腸胃足太陰別上至髀合於陽明與別俱行上絡於咽貫舌中故舌中央脈者即足太陰別脈者也此絡既言至髀上行則貫腰入少腹過䏚所以腰痛引少腹控䏚者也平按素問此節上有嗌中腫至左刺右右刺左二十九字本書在後邪客於手足少陰太陰之上王氏以為錯簡而遷於此節之上不可以仰息刺其腰尻之解兩胂之上以月死生為痏數髮針立已左刺右右刺左尻解之兩胂上此絡之腰刺也胂以真反平按仰息袁刻誤作作息以月上素問甲乙有是腰俞三字新校正云全元起本舊無此三字邪客於足太陽之絡令人拘攣背急引脅而痛內引心而痛足太陽飛揚之絡去踝七寸別走少陽不至腰膕足太陽正別入膕中其一道下尻五寸別入於肛屬於膀胱散之腎從膂當心入散直者從膂上於項復屬太陽故邪客拘攣背急引脅引心痛平按內引心而痛素問無此五字新校正云全元起本及甲乙經均有此五字據此則本書與全本同刺之從項始數脊椎挾背疾按之應手而痛刺之旁三痏立已脊有二十一椎以兩手挾脊當椎按之痛處即是足太陽絡其輸兩旁各刺三痏也平按應手而痛刺之素問而痛作如痛甲乙刺之作刺入邪客於足少陽之絡令人留於樞中痛髀不舉刺樞中以豪針寒則久留針以月死生為痏數立已又足少陽光明之絡去踝五寸別走少陰不至樞中足少陽正別繞髀入毛際合厥陰別者入季肋間故髀樞中久痛及髀不舉也留停久也豪針如毫毛也如蟲虻喙也靜以徐往微養之久留以取痛痹也平按不舉素問作不可舉甲乙作不得氣為痏數素問無痏字治諸經刺之所過者不痛則繆刺之刺十二經所過之處不痛者病在於絡故繆刺也平按甲乙諸經上無治字不痛素問甲乙作不病耳聾刺手陽明不已刺其通脈出耳前者巨刺手陽明並商陽等穴不已巨刺手太陽出走耳聽會之穴也平按甲乙通脈作過脈齒齵刺手陽明不已刺其脈入齒中者立已刺手陽明輸三間等穴不已刺手陽明兌端穴平按刺手陽明下甲乙有立已二字素問齒中下無者字注兌端穴查甲乙經手陽明無兌端穴惟手三里穴在曲池下二寸按之肉起兌肉之端兌端恐即手三里穴邪客於五臟之間其病也脈引而痛時來時止視其病脈繆刺之於手足爪甲上視其脈出其血間日一刺一刺不已五刺已五臟之脈引而有痛視其左右病脈所在可繆刺之手足爪甲上十二經脈井之絡脈故取之也亦是取經井以療絡病也平按病脈脈字素問無繆傳刺上齒足陽明絡左病右痛右病左痛可刺上齒足陽明絡平按素問刺作引齒唇寒痛視其手背脈血者去之足陽明中指爪甲上一痏手大指次指爪甲上各一痏立已左取右右取左手陽明脈入下齒中還出挾口交人中足陽明脈入上齒中還出挾口環唇下交承漿故取手陽明血絡以去齒唇痛也足中趾爪甲上足陽明絡故亦取之手大指次指爪甲上亦是手陽明絡故亦取之皆視其病左右繆刺之平按齒唇寒痛甲乙無痛字注云素多一痛字足陽明上甲乙有刺字嗌中腫不能內唾時不能出唾者繆刺然骨之前出血立已左刺右右刺左足少陰經出然骨而上肺中循喉嚨挾舌本故嗌中腫刺然骨前絡脈也平按素問此節在邪客於足太陰之絡之上唾者下無繆字甲乙左刺右右刺左刺作取邪客於手足少陰太陰足陽明絡此五絡皆會於耳中上絡左角手少陰足少陰手太陰足太陰足陽明此五經脈手少陰通里入心中系舌本孫絡至耳中足少陰經至舌本皮部絡入耳也手太陰正別從喉嚨亦孫絡入耳中足太陰經連舌本下散舌下亦皮部絡入耳中足陽明經上耳前過客主人前亦皮部絡入耳中此之五絡入於耳中相會通已上絡於左角左角陽也五絡俱竭令人身脈皆動而形無知也其狀如尸厥此之五絡為身綱紀故此脈絶諸脈亂動形不知人與尸厥死之相似非尸厥也平按其狀若尸厥素問甲乙作其狀若尸或曰尸厥刺足大趾內側甲下去端如韭葉此刺足太陰隱白穴也平按甲下素問甲乙作爪甲上後刺足心刺足少陰湧泉穴也後刺足中趾甲上各一痏刺足陽明厲兌穴也平按中趾下素問甲乙有爪字後刺手大指之內去端如韭葉刺手太陰少商穴也平按之內素問作內側後刺少陰兌骨之端各一痏立已刺手少陰神門穴也此前五刺皆中其經穴以調絡病平按此節上素問有後刺手心主五字王注謂中衝穴新校正謂甲乙不刺手心主此五絡亦不及手心主王氏相隨注之非是不已以竹筒吹其兩耳鬄其左角之發方寸燔治飲以美酒一杯不能飲者灌之立止鬄恥歷反除也耳中五絡會處也左角五絡絡處也平按甲乙耳下有中字鬄作剔素問竹筒作竹管方寸作方一寸凡刺之數必先視其經脈切而順之審其虛實而調之不調者經刺之不調者偏有虛實也偏有虛實者可從經穴調其氣也平按切而順之順素問作從甲乙作循有痛而經不病者繆刺之循經候之不見有病仍有痛者此病有異處故左痛刺右等名曰繆刺因視皮部有血絡者盡取之此繆刺之數也繆刺之處皮部絡邪血皆刺去之名曰繆刺之法數法也平按因甲乙作目素問因視下有其字甲乙同量氣刺平按此篇自篇首至末見靈樞卷十第六十七行針篇自或神動而氣先針行至末又見甲乙經卷一第十六黃帝問於岐伯曰余聞九針於夫子而行之百姓百姓之血氣各不同形或神動而氣先針行或氣與針相逢或針已出氣獨行或數刺乃知或髮針而氣逆或數刺病益劇凡此六者各不同形願聞其方岐伯曰重陽之人其神易動其氣易往也夫為針之法以調氣為本故此六者問氣之行也平按甲乙無黃帝問至各不同形二十八字病亦劇作病益甚重陽之人作重陽之盛人黃帝曰何謂重陽之人岐伯曰重陽之人熇熇蒿蒿言語善疾舉足善高重陽之人謂陽有餘也熇相傳許嬌反熇熇蒿蒿言其人疏恍也平按熇熇甲乙作矯矯蒿蒿靈樞作高高注恍袁刻作恍心肺之臟氣有餘陽氣滑盛而揚故神動而氣先行五臟陰陽者心肺為陽肝脾腎為陰故心肺有餘為重陽也重陽之人其神才動其氣即行以陽氣多也故見持針欲刺神動其氣即行不待針入其人與之刺微為易也黃帝曰重陽之人而神不先行者何也自有重陽要待針入其氣方行故須問之平按甲乙無此一節岐伯曰此人頗有陰者黃帝曰何以知其頗有陰也岐伯曰多陽者多喜多陰者多怒數怒者易解故曰頗有陰其陰陽之合難故其神不能先行也欲知重陽仍有陰者候之可知但人多陽者其心多喜多陰者多怒仍有數怒易解即是重陽有陰人也重陽有陰人其氣不得先針行平按合上靈樞甲乙有離字黃帝曰其氣與針相逢奈何岐伯曰陰陽和調而血氣淖澤滑利針入而氣出疾而相逢也陰陽和平之人以其氣和故針入即氣應相逢者也黃帝曰針以出而氣獨行者何氣使然岐伯曰其陰氣多而陽氣少陰氣沉而陽氣浮沉者藏故針以出氣乃隨其後故獨行也多陰少陽之人陰氣深而內藏故出針後氣獨行也平按靈樞針以出作針已出陽氣浮沉者藏作陽氣浮者內藏甲乙同黃帝曰數刺乃知者何氣使然岐伯曰此人多陰而少陽其氣沉而氣注難故數刺乃知也知者病愈也其人陰多陽少其氣難宣故數刺方愈也平按氣注難靈樞甲乙作氣往難據上文經云其氣易往恐系往字傳寫之誤黃帝曰針入而逆者何氣使然岐伯曰其氣逆與其數刺病益甚者非陰陽之氣浮沉之勢也此皆粗之所敗工之所失其形氣無過焉刺之令人氣逆又刺之病甚者皆是醫士不知氣之浮沉非是陰陽形氣之過也量順刺平按此篇自篇首至末見靈樞卷八第五十五逆順篇自刺法曰無刺熇熇之熱至不治已病見甲乙經卷五第一自伯高曰兵法無迎逄逄之氣至與脈相逆者又見日本醫心方卷一黃帝問伯高曰余聞氣有逆順脈有盛衰刺有大約可得聞乎設此三問為調氣之要也伯高對曰氣之逆順者所以應天下陰陽四時五行也一知逆順謂知四時五行逆順之氣依而刺也平按靈樞天下作天地脈之盛衰者所以候血氣之虛實有餘不足二知候脈謂候寸口人迎血氣虛實也刺之大約者必明知病之可刺與其未可刺與其已不可刺也三知刺法謂知此病可刺此未可刺此不可刺也約法也黃帝曰候之奈何伯高曰兵法無迎逄逄之氣逄蒲東反兵氣盛也平按醫心方兵法下有曰字無擊堂堂之陳刺法曰無刺熇熇之熱熇呼篤反熱熾盛也堂堂兵盛貌兵之氣色盛者未可即擊待其衰然後擊之刺法亦爾邪氣盛者消息按摩折其大氣然後刺之故曰無刺熇熇熱也無刺漉漉之汗漉漉者血氣泄甚大虛故不可刺之也無刺渾渾之脈渾渾濁亂也凡候脈濁亂者莫知所病故不可刺也無刺病與脈相逆者形病脈不病脈病形不病名曰相反逆反也黃帝曰候其可刺奈何伯高曰上工刺其未生者也內外二邪雖有未起病形刺之以為上工也其次刺其未盛者也已成微病未為盛者刺之以為上工者也平按未盛甲乙作未成其次刺其已衰者病雖已衰未即能愈刺之以為中工者也下工刺其方襲也與其形之盛者也與其病之與脈相逆者也方正方襲重也正病重疊病形復盛病脈相反刺之以為下工者也故曰方其盛也勿敢毀傷刺其已衰事必大昌言工有損益也故曰上工治不病不治已病此之謂也不病未病之病也已病已成病也平按治不病靈樞甲乙作未病甲乙無此之謂也四字疽癰逆順刺平按此篇自篇首至末見靈樞卷九第六十玉版篇自黃帝曰病生之時至末又見甲乙經卷十一第九黃帝曰余以少針為細物也夫子乃上合之於天下合之於地中合之於人余以為過針之意矣願聞其説九針微細之道以合三才之大余恐太過也物道也平按少針靈樞作小針乃下有言字岐伯曰何物大於針者乎夫大於針者唯五兵者焉五兵者死備也非生之備也且夫人者天地之鎮塞也其可不參乎夫治人者亦唯針焉夫針與五兵其孰小乎夫人之為天地鎮塞貴莫大焉兵有五者一弓二殳三矛四戈五戟死之之具也九針雖小生人之器也聖人用之理於百姓孰為小道故大之無外小之無內細入無間令人久壽者其惟九針乎平按非生之備也靈樞作非生之具天地之鎮塞也靈樞無塞字注五兵周禮夏官司兵掌五兵鄭司農云五兵者戈殳戟酋矛夷矛又步卒之五兵無夷矛而有弓矢與此略異黃帝曰病生之時有喜怒不測飲食不節陰氣不足陽氣有餘營氣不行乃發為疽癰癰生所由凡有四種測度也喜怒無度爭氣聚生癰一也飲食不依節度縱情不擇寒溫為癰二也臟陰氣虛腑陽氣實陽氣實盛生癰三也邪客於血聚而不行生癰四也癰疽一也癰之久者敗骨名曰疽也平按靈樞甲乙病生之時作生病之時陰陽氣不通兩熱相薄乃化為膿針小能取之乎以下言生膿所由也邪客於皮膚之中寒溫二氣不和內外兩熱相擊腐肉故生於膿恐小針不能取之平按不通上靈樞無氣字甲乙兩熱作而熱岐伯曰聖人不能使化者為邪之不可留也故兩軍相當旗幟相望白刃陳於中野者此非一日之謀也能使其人令行禁止卒無白刃之難者非一日之務也須久之方得也平按靈樞邪之作之邪須久之方得也作須臾之得也自聖人不能使化者至須久之方得也甲乙無此一段夫至使身被癰疽之病膿血之聚者不亦離道遠乎夫癰疽之生也膿血之成也不從天下不從地出積微之所生也故聖人之治自於未有形也愚者遭其已成也幟昌志反幡也聖人不能使身化為病者以聖人理之未亂其邪不可留於身也故譬白刃陳於中野謀之在久士卒無難習之日遠癰疽不生調中多日故身遭癰疽之病去和性之道遠矣夫積石成山積水成川積罪成禍積氣成癰非從天下地出皆由不去脆微故得斯患也聖人不爾於國理之未亂於身約之於未病不同愚人渴而掘井斗方鑄兵也平按甲乙無不從天下不從地出八字積微作積聚故聖人之治自於未有形也靈樞作故聖人自治於未有形也甲乙作自治於未形注白刃袁刻刃字作仞聖人不爾爾誤作亦斗方鑄兵方作而黃帝曰其以有形不子遭膿以成不子見為之奈何遭逢也子百姓帝以百姓如子者也言不逢者癰之有形百姓不能逢知也癰之有膿百姓亦不見為之奈何也平按其以有形不子遭膿以成不子見靈樞作其已形不豫遭膿已成不豫見甲乙作其已有形膿已成岐伯曰膿以成十死一生癰生於節背及腹內膿成不可療故十死一生平按以靈樞甲乙作已故聖人不使以成而明為良方故聖人明為良方癰微之時療之弗使成也平按不使以成靈樞作弗使已成著之竹帛使能者踵之傳之後世無有終時者為其不遭子也著之竹帛為於百姓不能逢知癰疽者平按踵之靈樞作踵而子作豫自上文故聖人不使至遭子也甲乙無黃帝曰其以有膿血而後遭子可造以小針治乎癰之生於背及節與腹內已有膿血後百姓逢知小針可得療否也平按其以有膿血靈樞以作已甲乙作已成二字而後遭子靈樞作而後遭乎甲乙無此四字可造靈樞作不導之三字甲乙無造字岐伯曰以小治小者其功小以大治大者多害故其以成膿者其唯砭石排鋒之所取也以小針療癰之小難瘥故曰其功小也以大針療膿成大傷以處多故得出膿害傷也是以膿成唯須砭扉也平按以大治大多害甲乙作以大治大者其功大以小治大者多害大以成膿者靈樞甲乙作已成膿血者砭石靈樞甲乙作砭石扉靈樞甲乙作鈹注難瘥袁刻作難愈黃帝曰多害者其不可全乎多害者砭扉之傷即至死也岐伯曰其在逆順焉逆者多傷至死順者出膿得生也黃帝曰願聞逆順岐伯曰以為傷者白眼青黑眼小是一逆也內藥而嘔是二逆也腹痛渴甚是三逆也肩項中不便是四逆也音嘶色脫是五逆也除此者為順矣先有五傷後行扉者為逆也先無五傷膿成行扉為順也嘶先妻反聲破也平按白眼甲乙作白睛歐靈樞甲乙作嘔除此下有五字量絡刺平按此篇自篇首至末見靈樞卷六第三十九血絡論篇又見甲乙經卷一第十四黃帝曰願聞奇邪而不在經者岐伯曰血絡是也邪在血絡奇絡之中故曰奇邪也平按經者下甲乙有何也二字黃帝曰刺血絡而僕者何也血出而射者何也血出黑而濁者何也血清半為汁者何也髮針而腫者何也血出多若少而面色蒼蒼然者何也髮針面色不變而煩悶者何也多出血而不動搖者何也願聞其故刺絡有此八種之異請解所以也平按靈樞血出黑作血少黑血清半為汁者靈樞甲乙作血出清而半為汁者血出多若少靈樞甲乙作若多若少煩悶靈樞作煩悗多出血甲乙作出血多岐伯曰脈氣盛而血虛者刺之則脫氣脫氣則僕脈中氣多血少血持於氣刺之氣血俱出其血先虛而復脫氣氣血俱奪故僕也平按盛靈樞甲乙作甚血氣俱盛而陰氣多者其血滑刺之則射之陽氣多者其血滑刺之血射此為陰氣多者陰多為澀故陰字錯也平按射下靈樞甲乙無之字陽氣蓄積久留而不瀉者其血黑以濁故不能射熱氣久留癰蒸故血黑而濁也平按蓄積靈樞作畜積甲乙作積蓄新飲而液滲於絡而未合和血也故血出而汁別焉其不新飲者身中有水久則為腫新水未變為血所以別行舊水留而不瀉以為水腫平按未合和血甲乙作未和合於血陰氣積於陽則其氣因於絡故刺之血未出而氣先行故腫陰氣久積陽絡之中刺之陰血澀而未行陽氣先行故腫陰陽之氣新相得而未和合因而瀉則陰陽俱脫表裡相離故脫色面蒼然得遇也陰陽成和則表裡相持未合刺之故俱脫離所以脫色面色青平按瀉下靈樞甲乙有之字甲乙寫作瀉蒼然靈樞作蒼蒼然注成袁刻作咸亦通刺之血多色不變而煩悶者刺絡中虛經虛經之屬於陰者陰脫故煩悶刺絡血者邪盡血變血多其色不變其心悶者以其刺屬臟虛經陰氣有脫致使心悶也平按血多靈樞作血出多甲乙無血多色三字中虛經靈樞甲乙作而虛經陰陽相得而合為痹者此為內溢於經外注於絡如是者陰陽俱有餘雖多出血弗能虛也陰陽相共受邪為痹是為陰陽俱盛故出血不虛也平按外注於絡甲乙外上有而字黃帝曰相之奈何岐伯曰血脈盛者堅橫以赤上下無處小者如針大者如擆即而瀉之萬全相候也陰陽俱盛其候如何陰陽內經盛溢必注於絡故候堅橫盛絡瀉之萬全者也平按靈樞甲乙無處作無常處如擆作如筋即而瀉之甲乙作刺而瀉之地無失數失數而反各如其度數理也若失理而反取者各如前之度平按地靈樞甲乙作故反甲乙作返黃帝曰針入如肉著者何也岐伯曰熱氣因於針則針熱熱則肉著針故堅焉膚肌氣熱故令針熱則肉著轉之為難可動針久留熱去針寒自然相離也平按針入如肉著者靈樞作針入而肉著者甲乙作針入肉著注肉著袁刻誤作內著雜刺平按此篇自篇首至人迎候陽見靈樞卷四第十九四時氣篇自刺家不診至末見素問卷十四第五十五長刺節論篇又自篇首至必深以留之見甲乙經卷五第一自風水膚脹至盡取之見甲乙經卷八第四自飧泄至熱行乃止見甲乙經卷十一第四自溫瘧至五十九刺見甲乙經卷七第五自轉筋於陽至皆卒針見甲乙經卷十一第四自徒水至百三十五日見甲乙經卷八第四自著痹至取其里骨見甲乙經卷十第一自為骭脹中至虛補之見甲乙經卷九第七自癘風者至無食他食見甲乙經卷十一第九自腹中常鳴至三里見甲乙經卷九第七自少腹控皋至以調之見甲乙經卷九第八自善嘔至以去其邪見甲乙經卷九第五自飲食不下至則散而去之見甲乙經卷九第七自少腹病腫至取三里見甲乙經卷九第九自治癰腫者至為故止見甲乙經卷十一第九自病在小腹至炅病已也見甲乙經卷九第九自病在筋至骨熱病已見甲乙經卷十第一自病在諸陽脈至病已止見甲乙經卷十一第二自病風至百日而已見甲乙經卷七第一中篇自病大風至末見甲乙經卷十第二黃帝問於岐伯曰夫四時之氣各不同形百病之起皆有所生灸刺之道何者可寶一則四時不同二則生病有異灸刺總而要之何者為貴平按靈樞寶作定下同注云一本作寶岐伯對曰四時之氣各有所在灸刺之道得氣穴為寶灸刺所貴以得於四時之氣也平按甲乙氣穴上無得字故春取經血脈分肉之間甚者深刺之間者淺取之春時人氣在脈謂在經絡之脈分肉之間故春取經血脈分肉之間也平按甲乙故春取經血脈分肉之間作故春刺絡脈諸滎大經分肉之間深刺作深取夏取盛經孫絡取分間絶皮膚夏時人氣經滿氣溢孫絡受血皮膚充實故夏取盛經孫絡又取分腠以絶皮膚也平按甲乙絡上無孫字夏作長夏分間袁刻作分肉秋取經輸邪氣在腑取之合秋時天氣始收腠理閉塞皮膚引急故秋取臟相之輸以瀉陰邪取腑經之合以瀉陽邪也平按輸靈樞作腧甲乙作俞靈樞無氣字冬取井滎必深以留之冬時蓋藏血氣在中內著骨髓通於五臟故取井以下陰氣逆取滎以實陽氣也平按甲乙冬取井滎作冬取井諸俞之分必深作欲深風水膚脹為五十九痏腹皮之血者盡取之以下雜刺有此風水刺一也風水及膚脈刺水穴為五十九痏又盡刺去腹皮絡血也平按靈樞風水上有溫瘧汗不出為五十九痏十字本書在後水作㽷五十九痏作五十七痏甲乙注云靈樞作五十七刺腹皮靈樞甲乙作取皮膚三字飧泄補三陰之上補陰之陵泉皆久留之熱行乃止飧泄刺二也飧泄病虛冷皆補足三陰上取關元等下取陰陵泉也平按甲乙三陰之作三陰交靈樞甲乙陵泉上無之字溫瘧汗不出為五十九刺此溫瘧刺三也溫瘧寒熱病也故刺熱輸五十九痏也轉筋於陽理其陽卒針之轉筋於陰理其陰皆卒針轉筋刺四也六陽轉筋即以燔針刺其陽筋六陰轉筋還以燔針刺其陰筋也平按兩理字靈樞作治靈樞甲乙陽下無卒針之三字皆卒針作皆卒刺之徒水先取環谷下三寸以扉針之已刺而針之筒而內之入而復之以盡其水必堅束之緩則煩惌束急則安靜間日一刺之水盡乃止飲閉藥方刺之時徒飲之方飲無食方食無飲無食他食百三十五日惌紆元反此水刺法五也環谷當是臍中也臍下三寸關元之穴也扉關元內筒引水水去人虛當堅束身令實復飲補藥飲之與食相去而進間日刺之不可頓去水盡乃止禁如藥法一百三十五日乃得愈徒空也空飲無食也平按以扉針之靈樞作以鈹針針之甲乙作扉針刺之已刺而針之筒而內之靈樞作已刺而筒之而內之甲乙作而藏之引而內之入而復之甲乙作入而復出水靈樞甲乙均作㽷必堅束之靈樞無束之二字緩則煩惌靈樞緩上有來字惌作悗甲乙作悶束急靈樞作來急飲閉藥甲乙作飲則閉藥著痹不去久寒不已卒取其里骨此著皮刺六也卒針燔針準上經卒當為焠刺痹法也里骨謂與著痹同里之骨名曰里骨以其痹深故取此骨也平按里骨靈樞作三里骨卒取其里骨甲乙作為肝痹三字注云一作骭痹為骭脹中不便取三里盛瀉之虛補之骭脹刺七也骭腳脛也脛寒為脹取三里補瀉為要也平按為骭靈樞作為干甲乙無此二字脹靈樞作腸甲乙作腹盛虛下甲乙均有則字癘風者索刺其腫上以刺以鋭針鋭其處按出其惡氣腫盡乃止常食方食無食他食此癘風刺八也索蘇作反散也刺癘風腫上也已復鋭頭之針以鋭其處去針以手按之出其惡氣食如禁法也平按索靈樞作素以刺靈樞甲乙作已刺以鋭針鋭其處靈樞作以鋭針針其處甲乙作以吮其處惡氣甲乙作惡血腹中常鳴氣上衝胸喘不能久立邪在大腸刺賁之原巨虛上廉三里大腸氣上衝刺九也大腸手陽明脈絡肺下膈屬大腸故邪氣在大腸循手陽明脈上衝胸不能久立也賁膈也膈之原出鳩尾也巨虛上廉與大腸合以足陽明上連手陽明故取巨虛上廉並取三里也平按常鳴甲乙作雷鳴上衝作常沖賁靈樞甲乙作盲少腹控皋引腰脊上衝心邪在小腸者連皋系屬於脊貫肝肺絡心系氣盛則厥逆上衝腸胃動肝散於肓結於臍故取之肓原以散之小腸上衝刺十也皋音高小腸傳脊左環葉積其注於回腸者外傳於臍上小腸之脈絡心循咽下膈抵胃屬小腸故得連皋系屬於脊貫肝肺絡心系也是以邪氣客小腸氣盛則厥逆上衝腸胃動於肝氣散於肓結於臍也取肓原肓原脖胦也齊上一寸五分也平按皋靈樞甲乙作睪甲乙小腸者上有小腸也三字動肝靈樞作熏肝甲乙作熏肝肺散於肓甲乙肓作胸齊靈樞甲乙均作臍刺太陰以豫之小腸脈貫肺故取手太陰五輸療前病之穴取厥陰以下小腸脈貫肝故取肝脈足厥陰療前病五輸之穴也平按靈樞甲乙作以下之取巨虛下廉以去之巨虛下廉與小腸合故取之按其所過之經以調之調所過之經補瀉之善歐歐有苦長太息心中濟濟恐人將捕之邪在膽逆在胃膽液泄則口苦胃氣逆則歐苦故曰歐膽者取三里以下胃氣逆刺少陽血絡以閉膽部調其虛實以去其邪口苦刺十一也長太息者太息長也膽熱之病恐懼故如人將捕之也邪在膽者熱邪在於膽中溢於苦汁胃氣因逆遂歐膽口苦名曰膽疸故取三里以下胃之逆氣取膽脈少陽調其虛實以去熱邪也平按歐靈樞甲乙作嘔濟濟靈樞作憺憺甲乙作淡淡歐苦甲乙作嘔苦汁胃氣逆甲乙作胃逆以閉膽部靈樞作以閉膽逆卻甲乙作以閉膽逆飲食不下鬲塞不通邪在胃管在上管則刺抑而下在下管則散而去之飲食不下刺十二也邪在胃管則令膈中氣塞不通飲食不下之候邪在上管刺胃之上口之穴抑而下之邪在下管刺胃之下口之穴散而去之也平按鬲靈樞作膈管靈樞甲乙均作脘而下均作而下之少腹病腫不得小便邪在三焦約取之足太陽大絡視其絡脈與厥陰小絡結而血者腫上及胃管取三里腹脹不通刺十三也邪在三焦約而不通故少腹腫不得大小便可刺足太陽大絡及足厥陰孫絡結聚之血可刺去之又刺腫上及取胃管並刺三里也平按少腹病腫靈樞作小腹痛腫甲乙作少腹腫痛絡脈上甲乙有結字睹其色察其目知其散復者視其目色以而知病之存亡取病存亡刺十四也散則病亡復則病存也平按以而知病之存亡靈樞無而字恐衍一其形聽其動靜者持氣口人迎專務不散則一其形也移神在脈則聽動靜也氣口則手太陰寸口脈人迎則足陽明人迎脈也平按一靈樞作一視其脈堅且盛且滑者病日進脈濡者病持下諸經實者病三日已氣口候陰人迎候陽氣口藏脈故候陰也人迎府脈故候陽也平按靈樞視上有以字濡作軟持下作將下刺家不診聽病者言在頭疾頭痛為藏針之刺至骨病已無傷骨肉及皮皮者道也陽刺入一旁四不診刺十五也所刺之家病人自知病之所在不復須診更不為診即為針之故曰藏針藏針之法刺至骨部不得傷於骨肉皮部皮者乃是取其刺骨肉之道不得傷余處也刺頭病者頭為陽也甚寒入腦以為頭疾痛病故陽刺之法正內一旁內四療氣博大者也本作陰刺者字誤耳平按疾頭痛素問作頭疾痛為藏針之素問新校正云全元起本無藏字素問病已下有上字陽刺作陰刺新校正云甲乙經陽刺者正內一旁內四陰刺者左右卒刺之此陰刺疑是陽刺與此正同四下素問有處字注更不為診袁刻脫為字治寒熱深專者刺大臟迫臟刺背俞也寒熱刺十六也大臟肺臟也肺臟之形大如四臟故曰大臟刺肺寒熱之法近臟刺之刺於背俞迫近也平按素問背下重一背字刺之迫臟臟會腹中寒熱氣去而止與刺之腰發臟而泄出血刺背俞迫臟刺之使臟氣會通腹中寒熱氣盡乃止並刺腰中淺發其臟氣出其血也平按素問熱下無氣字腰作要發臟而泄出血作髮針而泄出血注臟氣會通袁刻脫氣字治癰腫者刺癰上視癰小大深淺刺大者多血深之必喘內藏為故止癰腫刺十七也刺癰之法當癰上刺之大者深之小者淺之便喘內藏以出血為故藏賊郎反平按癰腫癰上素問癰均作腐新校正云全元起本及甲乙經腐作癰素問深之上有小者二字必喘內藏為故止作必端內針為故正新校正云甲乙經云刺大者多而深之必端內針為故正病在小腸者有積刺腹臍以下至少腹而止刺夾脊刺兩旁四椎間刺兩髂髀季脅肋間道腸中熱下氣已腸積刺十八也髂客罵反腰骨兩箱也小腸傳脊下連皋系外傳於臍故小腸有積刺於臍腹下至少腹並脊椎間及季肋間也平按病在小腸者素問作病在少腹刺腹臍以下作刺皮𩩻以下髂髀作髂髎道腸中熱下氣已作導腹中氣熱下已新校正云皮𩩻應作皮䯏䯏骨端也謂臍下橫骨之端全元起本作皮髓元起注臍旁埵起也亦未為得病在小腹痛不得大小便病名曰疝得之寒刺少腹兩股間刺腰髁骨間刺而多之盡炅病已也髁口化反痛疝刺十九也得寒者得之於寒多刺此五處得熱便愈也炅音桂也平按素問痛上重一腹字得之寒刺少腹兩股間甲乙作得寒則少腹脹兩股間冷髁作腂病在筋攣諸節痛不可以行名曰筋痹刺筋上為故刺分間不可中骨也病起筋炅病已止筋痹刺二十也筋絡諸節故筋攣諸節皆痛不可中其骨部以病起筋所以筋熱已止也平按攣諸節痛素問甲乙作筋攣節痛分間作分肉間炅甲乙作熱病在肌膚盡痛痛痹傷於寒濕刺大分小分多髮針而深之熱以為故肌膚痹刺二十一也寒濕之氣客於肌中名曰肌痹可刺肉之大分小分之間也平按肌膚下素問甲乙復有肌膚二字痛痹二字素問甲乙作名曰肌痹四字熱以作以熱無傷筋骨傷筋骨癰發若變諸分盡熱病已止刺肌肉分者不得傷骨筋之部傷骨筋之部發為癰也刺肌痹者若得諸分肉間盡熱即病已也平按癰發甲乙作寒發病在骨骨重不可舉骨髓痠痛寒氣至名曰骨骨痹深者刺無傷脈肉為故至其大分小分骨熱病已骨痹刺二十二也邪客在骨骨重痠痛名曰骨痹刺之無傷脈肉之部至得刺其骨部大小分間也平按痹上重骨字素問甲乙不重當系衍文至其大分小分素問作其道大分小分甲乙作其道大小分病已下素問甲乙有止字病在諸陽脈且寒且熱諸分且寒且熱名曰狂刺之虛脈視分分盡熱病已而止狂病刺二十三也陽並陽明太陽等故曰諸陽脈身及四肢諸分且有寒熱名之為狂刺法補其虛陰令分分皆熱得平病也平按分字素問甲乙不重病初發盛一發不治日一發不治四五發名曰癲病刺諸其分諸脈其尤寒者以針調之病已止癲病刺二十四也一發不療者謂得癲病一盛發已有經數時不發不療之者後更發時有一日一發不療之者後更發時一日之中四五度發之名曰癲病刺法待其發已刺諸分諸脈以針補甚寒者病已有本為月一發也平按素問甲乙盛作歲日一發作月一發四五發上有月字刺諸其分諸脈其尤寒者以針調之病已止素問作刺諸分諸脈其無寒者以針調之病已止甲乙作刺諸分其脈尤寒者以針補之病風且寒且炅汗出一日數過先刺諸分理絡脈汗出且寒且熱三日一刺百日而已寒熱刺二十五也風成為寒熱一日數度寒熱並汁刺諸分腠絡脈復且寒且熱三日一刺分劑也平按炅下袁刻脫汗出二字炅上素問甲乙有熱字病大風骨節重鬚眉隨落名曰大風刺肌肉為故汗出百日刺骨髓汗出百日凡二百日鬚眉生而止大風刺二十六也刺肌肉之部及骨髓部各經百日二百日已以鬚眉生為限也平按鬚眉隨落素問作鬚眉墮甲乙作鬚眉墜止下素問甲乙有針字
