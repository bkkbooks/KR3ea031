body:
  text: 卷第二十四補瀉天忌平按此篇自篇首至末見素問卷八第二十六八正神明論篇新校正云八正神明論又與太素知官能篇大意同文勢小異檢本書十九卷知官能篇與本篇天忌及下篇本神論文意多同亦可互證又自是故天寒無刺五句見甲乙經卷五第一黃帝問於岐伯曰用針之服必有法則焉今何法何則岐伯曰法天則地合以天光服事也光為三光黃帝曰願卒聞之岐伯曰凡刺之法必候日月星辰四時八正之氣氣定乃刺之定者候得天地正氣曰定定乃刺之是故天溫日明則人血淖液而衛氣浮故血易瀉氣易行天寒日陰則人血涘泣而衛氣沉也淖大卓反濡甚也謂血濡甚通液也衛氣行於脈外故隨寒溫而邪浮沉滑澀泣音漝平按涘泣素問作凝泣氣易行袁刻誤作氣日行注脈外袁刻誤作脈中月始生則血氣始精衛氣始行血氣者經脈及絡中血氣者也衛氣者謂是脈外循經行氣也精者謂月初血氣隨月新生故曰精也但衛氣常行而言始行者亦隨月生稱曰始行也月郭滿則血氣盛肌肉堅脈中血氣及肉皆隨月堅盛也月郭空則肌肉減經絡虛衛氣去形獨居是故所以因天時而調血氣者也經脈之內陰氣隨月皆虛經絡之外衛之陽氣亦隨月虛故稱為去非無衛氣也形獨居者血氣與衛雖去形骸恆在故曰獨居故謂血氣在於時也是故天寒無刺天溫無疑天溫血氣淖澤故可刺之不須疑也平按甲乙天寒作大寒天溫作大溫無疑作無凝月生無瀉月滿無補月生血氣始精微弱刺之虛虛故不可瀉月滿人氣皆盛刺之實實故不可補也月郭空無療是謂得時而調之無療者治之亂經故無療也是謂得時法也平按無療素問甲乙均作無治因天之序盛虛之時移光定位正立而待之正立待之伺其氣也故曰月生而瀉是謂臟虛月生臟之血氣精微故刺之重虛也平按臟虛素問新校正云全元起本臟作減當作減月滿而補血氣揚溢經有留止命曰重實揚溢盛也月滿刺之經溢流血故曰重實也平按經有留止素問作絡有留血月郭空而治是謂亂經陰陽相錯真邪不別沉以留止外虛內亂淫邪乃起月郭空者天光盡也肌肉並經絡及衛氣陰陽皆虛真邪氣交錯相似不能別無刺之則邪氣沉留絡脈外虛經脈內亂於是淫邪得起也平按注無刺之無字恐衍黃帝曰星辰八正何候岐伯曰星辰者所以制日月之行也日月之行度有以二十八宿為制度也八正者所以候八風之虛邪以時至者四時者所以分春秋冬夏之氣所在以時調之也以八方正位候八種虛邪之風也四時者分陰陽之氣為四時以調血氣也八正之虛邪而避之勿犯也以身之虛而逢天之虛兩虛相感其氣至骨入則傷五臟工候救之弗能傷也故曰天忌不可不知也形及血氣年加皆虛故曰身虛身虛與虛邪相感為病入深故至於骨傷五臟也法天候之以禁故曰天忌也平按注身虛身虛與虛邪相感袁刻作身之虛虛與虛邪相感黃帝曰善本神論平按此篇自篇首至末見素問卷八第二十六八正神明論篇與上篇相接自瀉必用方以氣方盛至末又見甲乙經卷五第四黃帝曰其法星辰者余以聞之願聞法往古者也帝問師古攝生之道岐伯曰法往古者先知針經也往古伏羲氏始畫八卦造書契即可制針經攝生救病之道驗於來今者先知日之寒溫月之盛虛也以候氣之浮沉而調之於身觀其立有驗也制針經之旨獲驗於來今者由先知寒溫盛虛以候脈氣浮沉次用針調之以取其驗也觀於冥冥者言形氣營衛之不形於外形之肥瘦血氣盛衰營衛之行不見於外故曰冥冥也平按營素問作榮而工獨知之以與日之寒溫月之盛虛四時氣之浮沉參伍相合而調之工常先見之然而不形於外故曰觀於冥冥焉以下解觀也工人以神得彼形氣營衛之妙不可知事參伍相合調之符合外不知故曰觀冥冥平按以與日之寒溫素問無與字通於無窮者可以傳於後世無窮者謂血氣之妙也有通之者可傳於萬代不通之者以殺生人故不能傳之是故工之所以異也然不形見於外故俱不能見之良工觀於冥冥所知衆妙俱不可知之平按不形袁刻作形不視之無形嘗之無味故曰冥冥若神倣佛冥冥之道非直目之不可得見亦非舌所得之味若能以神倣佛是可得也此道猶是黃帝之玄珠罔象通之於倣佛虛邪者八正之虛邪氣也正邪者身形飢若用力汗出腠理開逢虛風其中入微故莫知其情莫見其形胃中無谷曰飢飢及汗出虛因腠理開虛風得入虛風入時難知故曰冥冥也平按素問身形下無飢字其中入微作其中人也微上工救其萌芽必先知三部九候之氣盡調不敗救之萌芽未病之病病之微也先知三部九候調之即療其微故不敗也平按必先知素問知作見不敗救之素問作不敗而救之故曰下工救其已成者言不知三部九候之氣以相失有因而疾敗之疾者言其速也平按素問故曰下有上工二字下工下有救其已成救其已敗八字之氣以相失作之相失三字有因而疾敗之作因病而敗之也知其所在者知診三部九候之病脈處而治之故曰守其門戶焉莫知其情而見其邪形也但察三部九候得其病脈見其邪形即便療之以守其門戶更不須問其情也黃帝問於岐伯曰余聞補瀉未得其意岐伯曰瀉必用方方者以氣方盛也以月方滿也以日方溫也以身方定也以息方吸也而內針方正也氣正盛時月正滿時日正溫時身正安時息正吸時此之五正是內針時也乃復候其方吸而轉針之此之一正是乃轉針時也乃復候其方呼也而徐引針故曰瀉必用方其氣乃行焉此之一正是出針時也瀉用七法即邪氣行出也平按其方呼也而徐引針袁刻呼誤作吸引誤作出補者必用其員者行也行者移也刺必中其營復以吸也員之與方行針齊實也行補之法刺中營氣留針補也因吸出針移氣使氣實也平按補者必用其員者行也素問作補必用員員者行也甲乙作補者行也營素問甲乙作榮吸下均有排針二字故員與方也排針也員之與方行針之法皆推排針為補瀉之平按排針素問作非針王注云所言方員者非謂針形正謂行移之義檢本書知官能篇經云瀉必用員補必用方與此不同楊注云員謂之規法天而動瀉氣者也方謂之矩法地而靜補氣者也瀉必用方補必用員彼出素問此是九卷方員之法神明之中調氣變不同故爾據此則方員之義一言其法一言其用不必執也養神者必知形之肥瘦營衛血氣之盛衰血氣者人之神不可不謹養也養神之道一者須知形之肥瘦二者須知營衛二氣所行得失三者須知經絡血有盛衰知此三者調之神自養矣平按營素問甲乙作榮黃帝曰妙哉論也妙者言得其神之精祕者也辭合人形於陰陽四時虛實之應冥冥之期其非夫子孰能通之言微妙之辭以人形合於陰陽一也合於四時二也合於虛實三也合於冥冥四也非夫子窮微極妙之通孰能為此論也平按素問合上無辭字然夫子數言形與神何謂形何謂神願卒聞之知形為粗知神為細粗細莫辨故須問之岐伯曰請言形形乎形目冥冥形乎形者言唯知病之形與形不見其妙故曰冥冥也平按冥冥甲乙作瞑瞑問其所痛索之於經惡然在前言粗無知問病所以診索經脈何能知其病之在前平按素問問其所痛作問其所病甲乙作捫其所痛惡然素問甲乙作慧然據本注何能知其病之在前應作惡平聲按之不得復不知其情故曰形按人迎寸口不知病情故但知形黃帝曰何謂神岐伯曰請言神神乎神不耳聞目明心開為志先能知心神之妙故曰神乎神也神知則既非耳目所得唯是心眼開於志意之先耳平按素問甲乙不耳聞作耳不聞為志先作而志光慧然獨悟口弗能言神得內明言名之所不能及也平按甲乙悟作覺俱見獨見衆庶俱見而工獨見平按俱見素問甲乙作俱視適若昏昭然獨明若風吹雲故曰神適將若在昏中昭然獨明又解起惑除若風吹雲如斯得者因謂之神也平按甲乙適作象三部九候為之原九針之論不必存三部九候為神得之原九針之論粗而易行故不必存真邪補瀉平按此篇自篇首至末見素問卷八第二十七離合真邪論篇又見甲乙經卷十第二上篇黃帝問於岐伯曰余聞九針九篇夫子乃因而九之九九八十一篇余盡以通其意矣八十一篇者此經之類所知之書篇數也經言氣之盛衰左右傾移以上調下以左調右有餘不足補瀉於滎輸余皆以知之矣以前所知書中義也平按素問無皆以二字此皆營衛之氣傾移虛實之所生也非邪氣之從外入於經也余願聞邪氣之在經也其病人何如取之奈何言前八十一篇所説之義與余請異者經所説唯道十二經脈營衛二氣自相傾移虛實所生不言外邪入經為病故今請之平按營衛之氣傾移素問作營衛之傾移甲乙無此一段邪氣之在經也甲乙無氣字岐伯對曰夫聖人之起度數也必應天地起於人身法度以應天地也平按甲乙無此一段故天有宿度地有經水人有經脈天地和溫則經水安靜天寒地凍則經水涘泣天暑地熱則經水沸卒風暴起則經水波湧而隴起言天地陰陽氣之度數也平按素問甲乙涘泣作凝泣沸下有溢字波湧甲乙作波舉夫邪之入於脈也寒則血涘泣暑則氣血淖澤言人之身應寒暑度數平按涘泣素問甲乙作凝泣氣血淖澤素問甲乙無血字虛邪因而入客也亦如經水之得風也因暑之時腠理開發邪得入也邪入脈變如風動水也經之動脈其至也亦時隴起十二經之動脈至於動處動也邪氣至時亦皆有波隴波隴者邪氣動正氣其行於脈中循循然輑牛忿反輑車前橫木循車行也邪循脈行曰輑有本作軺非也平按甲乙無其行二字素問甲乙無輑字王注云循循一為輴輴其至寸口也時大時小大則邪至小則平邪氣循營氣至於寸口故太陰脈大無邪則太陰脈平和故曰小也平按寸口下素問甲乙有中手二字其行無常處在陰與陽不可為度尺脈為陰寸口為陽今邪入變亂而難知故不可為度也循而察之三部九候卒然逢之早遏其路吸則內針無令氣忤審察循三部九候於九候之中卒然逢之知病處所即於可刺之穴以指按之令得遏因病人吸氣內針無令邪氣能逆忤之也平按循素問作從靜以久留無令邪布吸則轉針以得氣為故候呼引針呼盡乃去大氣皆出故命曰瀉靜留針於穴中持之勿令邪氣散布余處因病人吸氣轉針待邪氣至數皆盡已徐引出針邪之大氣皆盡因名為瀉也黃帝曰不足者補之奈何岐伯曰必先捫而循之先上下捫摸知病之所在一切而散之以指揣切令邪不聚二推而按之推而令動以手堅按三彈而怒之以指彈之使其瞋起四也搔而下之以手搔摩令其瞋氣得下一曰搯徒勞反彈已搯令下之五也平按素問甲乙搔作抓通而取之切按搔而氣得通已然後取之六也平按取甲乙作散外引其門以閉其神疾出針已引皮閉門使神氣不出神氣正氣七也針之先後有此七法呼盡內針一呼一內故曰呼盡內針至分寸處也靜以久留以氣至為故如待所貴不知日莫伺氣如待情之所貴之者以得為期平按莫素問甲乙作暮其氣以至適人自護其正氣已至適人自當愛護勿令泄也平按適人素問作適而甲乙作適以候吸引針氣不得出各在其處推闔其門令神氣存故命曰補候病人吸氣疾引其針即不得使正氣泄令各在其所虛之處速閉其門因名曰補瀉必吸入呼出欲瀉其邪氣也補必呼入吸出欲閉其正氣不令出也平按神氣甲乙作真氣注云素問作神氣故命上素問甲乙有大氣留止四字黃帝問於岐伯曰候氣奈何岐伯曰夫邪氣去絡入於經也合於血脈中其寒溫未和如湧波之起也時來時去故不常在故曰方其來也必按而止之止而取之無逢其沖而瀉之外邪入身先至皮毛絡中留而不泄出絡入經其入經也與經中血氣共合邪之寒溫未與正氣相得遂波湧而起去來不常居也故候逢之按使止而不動然後以針刺之不得刺其盛沖瀉法比之不擊逄逄之陳平按素問甲乙夫邪氣去絡無氣字合於血脈中作舍於血脈之中寒溫未和作寒溫未相得甲乙無逢其沖作無迎其沖真氣者經氣經氣大虛故曰其來不可逢此之謂也經氣者謂十二經脈正氣者也正氣大虛與邪俱至宜按取邪氣刺之不可逢而刺也平按其來甲乙作其氣注云素問作其來故曰候邪不審大氣已過瀉之則真氣脫脫則不復邪氣復至而病益蓄故曰其往不可追此之謂也候邪大氣不審按之不著刺之則脫真氣邪氣更至病亦蓄聚故曰邪氣往而不可追也平按邪氣復至甲乙復作益不可挂以發者待邪之至時而髮針瀉矣若先若後者血氣已盡其病不下故曰知其可取如發機不知其可取如扣錐故曰知機之道不可挂以發不知機者叩之不發此之謂也以毛髮挂機發速而往言氣至智者髮針亦爾不失時也平按血氣已盡素問甲乙同素問新校正云全元起本作血氣已虛盡當作虛不下素問作不可下又素問甲乙不知其可取作不知其取注髮針袁刻誤作髮針黃帝問曰補瀉奈何岐伯曰此攻邪也疾出以去盛血而復其真氣虛亦是邪故補亦稱攻也瀉熱之法不可久留疾出其針去其盛血復其真氣也平按攻邪袁刻誤作政邪此邪新客未有定處推之則前引之則止溫血也刺出其血其痛立已黃帝曰善定處積為疾也溫熱也邪之新入未有定處有熱血刺去痛愈平按素問新邪下有溶溶二字則止下有逆而刺之四字其痛作其病自上文黃帝問曰補瀉奈何至黃帝曰善甲乙無此一段黃帝問於岐伯曰真邪以合波隴不起候之奈何前言真邪未合有波隴起未知真邪已起其氣何如也平按注已起據經文已應作不岐伯曰審捫循三部九候之盛虛而調之察其左右上下相失及相減者審其病臟以期之察其左右謂察三部九候左右兩箱頭及手足上下其脈有相失及相減以之審於五臟之病與之死生之期也平按甲乙無察其左右至以期之十九字不知三部者陰陽不別天地不分不知天為陽也地為陰也人為陰陽也故曰不彆氣也不分者不分形也天以候天地以候地人以候人調之中府以定三部足厥陰天足少陰地足太陰人以候肝腎脾胃三種地也手太陰天手陽明地手少陰人以候肺胸心三種人也兩額動脈之天兩頰動脈之地耳前動脈之人以候頭角口齒耳目三種天也中府五臟也欲調五臟之氣取定天地人三部九候也故曰刺不知三部九候病脈之處雖有大過且至工不能得禁也誅罰無罪命曰大惑病脈之處即是九候經絡邪之居脈以不知病脈則雖有死過之粗至工之醫永不能禁也誅罰生人不知無過稱曰大惑不知三部九候大惑罪有六種也平按不能得禁素問無得字甲乙無能字無罪素問甲乙作無過反亂大經真不可復亂經損真罪之一也用實為虛以邪為真妄解虛實罪之二也平按甲乙真作正注云素問作真用針無義反為氣賊奪人正氣義理也用針不知正理反為氣賊傷人正氣罪之三也以順為逆營衛散亂針道為順錯行為逆妄刺營衛故令其亂罪之四也平按素問順作從真氣已失邪獨內著亡正得邪罪之五也絶人長命豫人夭殃故不知三部九候不能長久針殺生人罪之六絶人長命又有三不知三部九候所以絶人長命一也因不知合之四時五行不知以身命合四時五行絶人長命二也平按甲乙因作固注云素問作因因加相勝釋邪攻正故絶人長命矣愚醫不知年加之禁反妄攻正氣故絶人長命三也長命者盡壽也邪新客來也未有定處推之則前引之則止逢而瀉之其病立已言知三部九候取之必效平按素問甲乙邪下有之字虛實補瀉平按此篇自篇首至末見素問卷十七第六十二調經論篇又見甲乙經卷六第三黃帝問於岐伯曰余聞刺法言有餘瀉之不足補之何謂有餘何謂不足為刺之道唯有補法余已略聞然未悉之故曰何謂也岐伯對曰有餘有五不足又有五帝欲何問乎舉五數也黃帝曰願盡聞之聞五數也岐伯對曰神有餘有不足氣有餘有不足血有餘有不足形有餘有不足志有餘有不足列五數也凡此十者其氣不等也神氣血形志各有補瀉故有十數名曰不等又此十種補瀉極理以論隨氣漫衍變化無窮故曰不等平按甲乙神有餘作神有有餘下氣血形志同黃帝問曰人有精氣津液四肢九竅五臟十六部三百六十五節乃生百病百病之生皆有虛實今夫子乃言有餘有五不足亦有五何以生之乎九竅五臟以為十四四肢合手足故有十六部如此人身之數皆有虛實有餘不足者是亦衆多未知生病其數何如也平按百病之生袁刻脫百字岐伯對曰皆生於五臟五臟為身之內主用攝身病無理不盡故曰皆生五臟者也平按自上節人有精氣至皆生於五臟甲乙無夫心藏神心藏神者心藏於脈以舍神今藏神者言所舍也肺藏氣肺藏氣者肺藏於氣氣以舍魄今藏氣者言其舍也肝藏血血藏於肝以舍魂今藏血者亦言其舍平按魂下袁刻多魄字脾藏肉脾藏肉者脾主於肉故曰藏肉非正藏肉脾於營以為正也脾藏營營以舍意及智二神以脾營血穀氣最大故二神舍也平按注智袁刻作志腎藏志而此成形腎藏志者腎藏於精精以舍志今藏志者言所舍也腎有二枚在左為腎在右為命門腎以藏志命門藏精故曰腎藏精者也八十一難精亦名神故有七神又此五藏心藏脈者脈通經絡血氣者也脾藏營者通營之血氣者也肝藏血者言其血有發眼之明也五神藏於五臟而共成身形也平按甲乙無而此成形四字志意通內連骨髓而成身形五臟意是脾神通於營氣志是腎神通於三焦原氣別使皆以內連骨髓成身形及五臟故意志者所以御精神收魂魄者也平按甲乙通下有達字而成身形五臟作而成形三字五臟之道皆出於經隧以行血氣五臟之道皆出於十二經絡之隧以行營衛血氣也平按隧甲乙作渠下同血氣不和百病乃化變而生於血氣故守經隧焉營衛不和百病還生血氣之中故守經隧以調血氣者也平按素問甲乙化變作變化而生下無於血氣三字黃帝曰神有餘不足何如岐伯對曰神有餘則笑不休神不足則憂神有餘不足憂笑者神病候也平按憂素問作悲王注云一為憂誤也甲乙注云素問作悲王冰曰作憂者誤素問新校正云按甲乙及太素並全元起注本並作憂皇甫士安云心虛則悲悲則憂楊上善云脾之憂在心變動也肺之憂在肺之志是則肺主秋憂為正也心主於憂變而生憂也血氣未並五臟安定神不定則邪客於形洫泝起於豪毛未入於經絡也故命曰神之微以下言神病微也夫神者身之主也故神順理而動則其神必安神安則百體和適和則腠理周密周密則風寒暑濕無如之何故終天年而無不道者也若忘神任情則哀樂妄作作則喜怒動形動則腠理開發腠理開則邪氣競入競入為災遂成百病夭喪天年也既不能善攝而病生者可除於晚微故邪之初客外則始在皮毛未入經絡內則血氣未得相併五臟安定洫泝之於豪毛名曰神之微病也洫謂毛孔也水逆流曰泝謂邪氣也邪氣入於腠理時如水逆流於洫也平按素問甲乙無神不定則四字洫泝素問作灑淅甲乙作悽厥詳見素問新校正又注百體袁刻脫百字下競入競字亦脫曰泝曰字誤作四黃帝問曰補瀉奈何岐伯對曰神有餘則瀉其小絡之血出血勿之深斥毋中其大經神氣乃平斥齒亦反推也勿深推也神之有餘氣淺故刺小絡出血也斥者深則觸其大經者也神不足視其虛絡切而致之刺而利之毋出其血毋泄其氣以通其經神氣乃平神之不足則虛故刺而不泄也平按素問切作按甲乙利作和黃帝問曰刺微奈何岐伯對曰按摩勿釋著針勿斥微即未病之病也夫和氣之要莫先按摩之以手按摩之邪氣得泄神氣得通微邪得泄何得須以針斥之移氣足神氣乃得復黃帝曰善按摩使神氣至踵則邪氣復遁去之也平按移氣足素問作移氣於不足甲乙作移氣於足素問新校正云甲乙太素作移氣於足無不字楊注云按摩使氣至於踵據此則本書移氣下脫一於字想系傳寫脫漏黃帝曰氣有餘不足奈何岐伯對曰氣有餘則喘咳上氣不足則息利少氣息利少氣以肺氣不足則出入易故呼吸氣少而利也血氣未並五臟安定以下言其氣微也皮膚微病命曰白氣微泄肺臟外主皮膚內主於氣今外言其皮膚病其內言於氣之微病五色氣中肺為白氣泄者肺氣泄也黃帝曰補瀉奈何岐伯對曰氣有餘則瀉其經隧經隧者手太陰之別從手太陰走手陽明乃是手太陰向手陽明之道故曰經隧隧道也欲通臟腑陰陽故補瀉之皆取其正經別走之絡也平按經隧甲乙作經渠素問新校正引此處楊注無故曰經隧隧道也七字欲通作欲道故補瀉之皆取其正經作故補瀉皆從正經毋傷其經瀉其陰經別走之絡不得傷正經也平按素問新校正引此注絡作路毋出其血毋泄其氣瀉太陰別走經隧者不得出血出氣也所謂瀉陰實者也不足者則補其經隧毋出其氣刺太陰經之別走之絡以補太陰不令氣泄於外所謂補陰虛也補瀉陽經亦如陰經法也黃帝曰刺微奈何岐伯對曰按摩勿釋出針視之曰我將深之適人必革精自伏釋停發也革改也夫人聞樂至身心欣悅聞痛及體情必改異欣悅則百體俱縱改革精志必拒拒則邪精消伏也平按我將甲乙作故將適人作適入精下素問甲乙有氣字注異字原缺袁刻作人恐誤素問新校正引此注作異據此補入又注邪精消伏新校正引作邪氣消伏邪氣散亂毋所伏息邪氣伏已邪精散於腠理無由更聚也平按散亂甲乙作亂散伏息素問甲乙作休息氣泄腠理真氣乃相得黃帝曰善邪氣散泄故真氣無亂所以相得也黃帝曰血有餘不足奈何岐伯對曰血有餘則怒不足則悲肝血有餘於肝所以瞋怒肝血不足於目所以多悲也平按悲素問作恐新校正云全元起本恐作悲甲乙及太素並同血氣未並五臟安定孫絡外溢則經有留血言血微邪也平按素問外溢作水溢甲乙經經有作絡有黃帝曰補瀉奈何岐伯對曰血有餘則瀉其盛經出其血不足則補其虛經瀉其盛經出血所以不怒正補其虛今不泄血所以不悲有本視其虛經也平按補其虛經素問作視其虛經甲乙作視其虛內針其脈中久留血至脈大疾出其針毋令血泄內針足厥陰脈中血至針下聚而脈大疾出其針無令血泄所以稱疾也平按久留血至素問作久留而視新校正云甲乙經云久留之血至太素同本書無之字黃帝曰刺留血奈何岐伯對曰視其血絡刺出其血無令惡血得入於經以成其病黃帝曰善刺去血脈遂無令惡血入經中故無血邪微病也平按甲乙刺留下無血字其病素問作其疾黃帝曰形有餘不足奈何岐伯對曰形有餘則腹脹溲不利不足則四肢不用形者非唯身之外狀名形舉體皆名溲四肢不隨也有本經溲者經即婦人月經也平按溲上素問甲乙有涇字素問新校正云楊注涇作經婦人月經也又按本注四肢不隨上恐有脫誤因原抄如此故仍之血氣未並五臟安定肌肉濡動命曰微風濡動者以體虛受風腠理內動命曰微風也平按濡動素問甲乙作蠕動甲乙注云一作溢素問新校正云全元起本及甲乙蠕作溢太素作濡黃帝曰補瀉奈何岐伯對曰形有餘則瀉其陽經不足則補其陽絡陽經絡足陽明經及絡也或為陽營非也黃帝曰刺微奈何岐伯對曰取分肉間無中經毋傷其絡可中分肉之間衛氣不可傷足陽明經絡之脈也平按經上素問甲乙有其字衛氣得復邪氣乃索黃帝曰善分肉之間衛氣行處邪氣已散衛氣復得也索散也黃帝曰志有餘不足奈何岐伯對曰志有餘則腹脹餐泄志腎神氣也有餘即少腹脹滿飲食不消為餐泄也平按餐素問甲乙作飧注餐袁刻誤作食不足則厥足逆冷也血氣未並五臟安定骨節有動骨節動者腎志病微也平按甲乙動作傷黃帝曰補瀉奈何岐伯對曰志有餘則瀉然筋血者出其血不足則補其復留然筋足少陰營在足內踝之下名曰然谷足少陰經無然筋當是然谷下筋也復留足少陰經在足內踝上三寸此二皆是志之脈穴故瀉然筋之血補復留之氣平按素問無出其血三字新校正云按甲乙經及太素云瀉然筋血者出其血楊注云然筋當是然谷下筋再詳諸處引然谷者多雲然骨之前血者疑少骨之二字前字誤作筋字復留素問甲乙作復溜黃帝曰刺未並奈何岐伯對曰即取之毋中其經以邪乃能立虛黃帝曰善未並者志微病以病是微未中於經但刺經氣所發之穴邪氣立虛者也平按以邪素問作邪所甲乙作以去其邪虛實所生平按此篇自篇首至末見素問卷十七第六十二調經論篇與上篇相接又見甲乙經卷六第三亦接上篇黃帝曰余以聞虛實之形不知其何以生形狀也虛實之狀已聞於上虛實所生猶未知之故復請也平按素問以聞作已聞甲乙無餘以聞三字岐伯對曰氣血以並陰陽相傾氣亂於衛血留於經十二經氣亂衛氣也十二經血留於營經也或曰血流也平按素問甲乙血留作血逆血氣離居一實一虛血氣相併離於本居處故各有虛實也夫血氣者異名同類相得成和今既相併一實一虛虛實所生是所由者也血並於陰血並足太陰脈及足少陰脈也氣並於陽乃為驚狂氣並足陽明脈及足太陽脈也血氣皆盛故發驚狂也血並於陽氣並於陰乃為炅中血並足陽明氣並足太陰為熱中病也炅熱也血並於上氣並於下心煩悗喜怒血盛上衝心故心煩悶而喜怒悗則悶同也平按悗素問作惋甲乙作悶喜素問甲乙作善血並於下氣並於上氣亂心善忘氣盛亂心故善忘也平按氣亂心善忘甲乙作亂而喜忘注云素問作善忘今本素問仍作亂而喜忘黃帝曰血並於陰氣並於陽於是血氣離居何者為實何者為虛血氣離居相併未知二經虛實何定也平按於是素問甲乙作如是岐伯對曰血氣者喜溫而惡寒寒則泣不能流溫則消而去之是故氣之所併為血虛血之所併為氣虛也血之與氣皆惡於寒故脈有寒則泣而不流者溫則消釋而去是以氣寒則血來並之以為血虛則氣為實也若血寒則氣來並之以為氣虛則血為實也平按是故故字袁刻作知黃帝曰人之所有者血與氣耳今夫子乃言血併為虛氣併為虛是毋實乎人之所生唯血與氣今夫子但言血氣有虛不言其實是為人之血氣不足請申其意也岐伯對曰有者為實毋者為虛故氣並則毋血血並則毋氣今血與氣相失故為虛焉血並則血有氣毋氣並則氣有血毋是以言虛不無其實論實不廢其虛故在身未曾無血氣也所言虛者血氣相併相失為虛相得為實耳絡之與孫脈俱輸於經大絡孫絡俱輸血氣入於大經則大經血氣俱實者也平按輸甲乙作注注云一作輸血與氣並則為實焉血與氣並走於上則為大厥厥則暴死復反則生不反則死大經血氣皆實走膈以上以下無氣故手足逆冷卒暴死也手足還暖復生不還則死也平按復反上素問甲乙皆有氣字黃帝曰實者何道從來虛者何道從去虛實之要願聞其故血氣何道來入此經為實何道而去此經為虛也岐伯對曰夫陰與陽皆有輸會陽注於陰陰滿之外臟腑陰陽之脈皆有別走輸會相通如足陽明從豐隆之穴別走足太陰太陰從公孫之穴別走足陽明故曰外也陰陽旬平以充其形甲子一日一迎為旬旬迎也陰陽之脈五十迎無多少者名曰旬平旬平和氣以充其身形也平按旬平素問作勻平甲乙作紃平九候如一命曰平人九候之動不先後又不相反故曰若一和氣若一故人得和平平按注九候袁刻作九脈夫邪之至生也平按素問無至字甲乙作所或生於陰或生於陽其生於陽者得之風雨寒暑其生於陰者得之飲食起居陰陽喜怒陰五臟也陽六腑也風雨寒暑外邪從外先至六腑故曰生於陽也飲食起居男女喜怒內邪生於五臟故曰生於陰也黃帝曰風雨寒暑之傷人奈何平按素問甲乙無寒暑二字岐伯對曰風雨之傷人也先客於皮膚傳入於孫脈孫脈滿則傳入於絡脈絡脈滿乃輸於大經脈血氣與邪並客於分腠之間其脈堅大故曰實此先言風雨二邪也人因飢虛汗出腠理開發風雨之氣因客腠理次入孫絡次入大絡次入大經客腠理時所客之脈堅而且大故得稱實也平按乃輸素問作則輸甲乙作乃注實者外堅充滿不可按按之則痛所客之處外堅按之則痛以其氣實故也平按不可按素問作不可按之黃帝曰寒濕之氣傷人奈何平按素問甲乙無氣字岐伯對曰寒濕之中人也皮膚收肌肉堅營血泣衛氣去故曰虛也次論寒濕之氣也雨氣上侵濕氣下入有斯異也略不言暑耳寒濕中人致虛有四皮膚收者言皮膚急而聚也肌肉堅者肌肉堅而不迎也營血泣者邪氣至於脈中故營血泣也衛氣去者邪氣至於脈外衛氣不行故曰去也衛去之處即為虛也平按皮膚收素問作皮膚不收新校正云全元起云不收不仁也甲乙及太素作皮膚收無不字堅下素問甲乙有緊字注故曰去也袁刻去誤作澀虛者懾闢氣不足血泣懾紙輒反分肉間無衛氣謂氣不足也平按懾素問作聶新校正云甲乙作攝太素作懾素問無血泣二字甲乙作血澀按之則氣足以溫之故快然而不痛黃帝曰善分肉之間既無衛氣故寒按之益損所以氣足又溫故快然也黃帝曰陰之生實奈何岐伯對曰喜怒不節則陰氣上逆上逆則下虛下虛則陽氣走之故曰實人有喜怒不能自節故怒則陰氣上陰氣上則上逆或嘔血或不能食陰氣既上則是下虛下虛則陽氣乘之故名曰陰實也平按素問新校正云經文喜怒不節則陰氣上逆疑剩喜字玩下文喜則氣下自知黃帝曰陰之生虛奈何岐伯對曰喜則氣下天寒則氣聚溫則氣散怒則氣上喜則氣下此物理之常也喜則氣和志達營衛之行通利故緩而下也悲則氣消消則脈虛因寒飲食寒氣熏臟則血泣氣去故曰虛夫人悲者則心系急肺布葉舉兩焦不通營衛不行熱氣在中故正氣消散經絡空虛也又因寒飲寒食寒氣熏臟臟之血泣其氣移去故為虛也平按脈虛素問甲乙作脈空虛熏臟素問作熏滿甲乙作動臟注兩焦兩字袁刻誤作雨黃帝曰經言陽虛則外寒陰虛則內熱經言八十一篇經也腑脈虛者陰氣乘之故外寒也臟脈虛陽氣乘之故內熱也陽盛則外熱陰盛則內寒余以聞之矣不知其所由然六腑主外為陽故陽盛外熱也五臟主內為陰故陰盛為寒余已前聞然未知所由然也岐伯對曰陽受氣於上焦以溫皮膚分肉之間今寒氣在外則上焦不通不通則寒獨留於外故寒栗陽衛氣也衛出上焦盡行陽二十五周以溫皮膚分肉之間今陽虛陰乘留於外故外寒也平按注盡行二十五周考前經衛五十周云衛氣之行一日一夜五十周於身晝日行於陽二十五周據此則盡字疑是晝字傳寫之誤黃帝曰陰虛生內熱奈何岐伯對曰有所勞倦形氣衰少穀氣不盛上焦不行下脘不通胃熱熏中故內熱內熱之病所由有五一則有所勞倦致虛二則形體及氣不足三則胃中無食四則上焦衛氣不行五則腸胃不得相通脘古緩反胃腑也下脘胃下口也由此五種衛熱熏中故內熱也平按下脘甲乙作下焦胃熱熏中素問作胃氣熱熱氣熏胸中甲乙作胃氣熱熏胸中注由此袁刻作有此黃帝曰陽盛而外熱奈何岐伯對曰上焦不通利皮膚緻密腠理閉塞不通衛氣不得泄越故外熱外熱之所由有三上焦出氣之處不通利一也皮膚致而腠閉二也衛氣不得泄於腠理三也有此所由故外熱也平按閉塞下素問有玄府二字新校正云甲乙太素無玄府二字黃帝曰陰盛而生內寒奈何岐伯對曰厥氣上逆寒氣積留於胸中而不瀉不瀉則溫氣去寒獨留則血涘泣血涘泣則脈不通其脈盛大以澀故中寒寒中有四一則寒厥積胸二則溫去寒留三則血凝脈壅四則脈大汗澀有此所由故寒中也平按積下素問甲乙無留字涘泣素問甲乙作凝泣脈不通甲乙作腠理不通黃帝曰陰之與陽血氣以並病形以成刺之奈何問療已成之病平按陰之與陽素問作陰與陽並岐伯對曰刺此者取之經隧取血於營取氣於衛用形哉因四時多少高下刺已成病法有三別一則刺於大經別走之道隧道也別走之道通陰陽道也二則刺於脈中營血三則刺於脈外衛氣用針之狀須因四時之氣觀病輕重髮針多少又須量病高下所在取之令中不同刺微之易也平按經隧甲乙作經渠黃帝曰血氣以並病形以成陰陽相傾補瀉奈何岐伯對曰瀉實者氣盛乃內針夫瀉者以其邪氣實盛故須瀉也仍以掐之令下然後刺之不盛何瀉故譬無擊逄逄之陳者也平按以並以成甲乙以作已針與氣俱內以開其門如利其戶針與氣俱出精氣不傷邪氣乃下外門不閉以出其病搖大其道如利其路是謂大瀉必切而出大氣乃屈人之吸氣身上有孔閉處皆入聚於腎肝呼氣之時有孔開處氣皆從心肺而出比囊之呼吸也針開孔時病人吸氣故針與氣俱入內也針得入已搖大其穴因呼出針故針與邪氣俱出勿傷正氣也平按以出其病素問甲乙病作疾黃帝曰補虛奈何岐伯對曰持針勿置以定其意持針勿置於肉中先須安神定意然後下針若醫者志意散亂針下氣之虛實有無皆不得知故須定意也平按注安神定意袁刻意作志候呼內針人之呼氣身上有孔其氣皆出故所針孔氣出之時內針欲令有氣從針而入不使氣泄所以候呼內針者也氣出針入針空四塞精無從去呼氣出時針入穴者欲使針空四塞不泄正氣也平按注入穴袁刻穴作空方實而疾出針氣入針出方正也候氣正實疾出針熱不得環夫虛者多寒得熱為補環轉也疾出針使針下熱氣不得轉也平按素問甲乙環作還閉塞其門邪氣布散精氣乃得存動無後時出針已去縱邪不出盡自然布散消亡精氣獨在無病動於後時也平按動無後時素問作動氣候時近氣不入遠氣乃來是謂追之行補之時非其補處近氣不失遠氣亦來至此集也已虛之氣引令實故曰追也黃帝曰夫子言虛實有十生於五臟五臟五脈耳夫十二經脈皆生百病今夫子獨言五臟夫十二經脈者皆絡三百六十五節節有病必被經脈經脈之病皆有虛實何以合之節即氣穴也但十二經脈被三百六十五穴則三百六十五穴所生之病甚多非唯五臟五脈獨生十種虛實者平按皆生百病素問作皆生其病新校正云甲乙云皆生百病太素同岐伯對曰五臟者故得六腑與為表裡經絡支節各生虛實內有五臟外有六腑腑臟經絡表裡諸支節是生虛實其亦甚多不相違也視其病所居隨而調之病在血調之脈病在氣調之衛病在肉調之分肉病在筋調之筋燔針劫刺其下及與急者視三百六十五節所生病處量其虛實隨而調之調者調於五臟所主脈衛分肉筋骨也平按素問其病上無視字病在血調之脈作病在脈調之血新校正云全元起及甲乙作病在血調之脈檢今本甲乙仍作病在脈調之血又素問甲乙病在氣上有病在血調之絡六字調之筋下有病在骨調之骨六字病在骨卒針藥尉卒窮也痛痹在骨窮針深之至骨出針以藥尉之以骨病痛深故也尉法上經已説也平按卒素問甲乙作焠病不知其所痛兩蹺為上諸骨病不定知於病之所在者可取足少陰兩陰蹺兩陰蹺是足少陰別足少陰脈主骨者也上者勝也平按素問甲乙無其字注諸骨諸字袁刻作痛身形有痛者九候莫病則繆刺之審三部九候竟無病狀然身形有痛者此絡左右有病可繆刺也平按素問甲乙無者字病在於左而右脈病者則巨刺之病在左經是右經病也故刺右經為巨刺也平按病在於左素問作痛在於左必謹察其九候針道備矣為刺之道以察九候為先者針道畢矣
