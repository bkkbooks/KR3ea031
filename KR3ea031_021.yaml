body:
  text: 卷第二十一九針之一九針要道黃帝問岐伯曰餘子萬民養百姓而收其租稅余哀其不終屬有疾病餘欲勿令被毒藥無用砭石欲以微針通其經脈調其血氣營其逆順出入之會令可傳於後世五方療病各不同術今聖人量其所宜雜令行之取十全故次言之子者聖人愛百姓猶赤子也中有邪傷屬諸疾病不終天年有療之者行於毒藥或以砭石傷膚毒藥損中可九種微針通經調氣以傳後代也必明為之法令終而不滅久而不絶法令即針經法也易用難忘毒藥砭石粗術之法難用易忘九種針要道易用難忘也為之經紀可為微針之經紀也異其篇章可為微針篇目章句也別其表裡取其腑輸為表臟輸為里為之終始微針之數始之於一終之九也令各有形先立針經願聞其情為前五法必須各立形狀立前五形之本須作仿經法故請先立針經欲聞敘針之情也岐伯曰臣請推而次之令有綱紀始於一而終於九請言其道次之者推九針之序綱紀之次也小針之要易陳而難入也粗守形工守神神乎神客在門未視其疾惡知其源刺之微在速遲粗守關工守機機之動不離空空中之機清靜以微其來不可迎其往不可追知機道者不可掛以發不知機者抧之不發知其往來要與之期粗之暗乎眇哉工獨有之往者為逆來者為順明知逆順正行無問迎而奪之惡得無虛追而濟之惡得無實但九針要道下成解中自當其釋也之迎之隨之以意和之針道畢矣逆順察之於陰陽迎奪施之於補瀉凡用針者虛則實之滿則泄之宛陳則除之邪勝則虛之大要曰徐而疾則實疾而徐則虛言實與虛若有若無察後與先若亡若存為虛與實若得若失言以意調於補瀉則針道可窮矣也虛實之要九針最妙補瀉之時以針為之五方別療莫先於針所以補瀉以針為之也瀉曰必持而內之放而出之排陽出針疾氣得泄凡瀉之道內針必持出針必放之搖火其穴排陽耶而出針疾病之氣得泄謂之瀉也按而引針是謂內溫血不得散氣不得出以手按其所針引之後暖氣內聚以心持針不令營血得散外閇其門令衛氣不得泄出謂之補也補曰隨隨之意若忘之隨氣呼吸而微動針之也若行若悔如蚊虻上欲去欲作為行悔也針在皮膚之中去來微動如彼蚊虻止又皮膚微覺有之也如留如還針在皮膚之中若似留停人如還去此皆言其候氣者也去如絶弦得氣已去即此補陰補得之也即疾出針如絶弦者言其速也令左屬右其氣故止左手按穴右手行針內氣已補右手出針左手閇門使氣相續不滅也屬續也外門已閇中氣乃實痏孔為外門也補已不泄故內氣得實也必無留血急取誅之補者留其氣也不可留於客邪血也邪血留者可刺去之故曰急誅之也持針之道堅者為實持針不堅則氣散不從針正指直刺針無左右刺者欲中其病若針入左右不當於穴其病不愈也神在秋豪秋豪謂秋時兔新生豪毛其端鋭微也謂怡神在針端調氣故曰神在秋豪也屬意病者念其針下病無邪也審視血脈刺之無殆審視十二經脈及諸絡虛實刺之無殆也殆危也方刺之時必在懸陽及與兩衡神屬勿去知病存亡以所言方刺之時先觀氣色者也懸陽鼻也懸于衡下也鼻為明堂五臟六腑氣色皆見明堂及與眉上兩衡之中故將針者先觀氣色知死生之候然後刺也血所在輸橫居視之獨滿切之獨堅血脈絡脈也有脈橫居輸穴之中視之滿實切之獨堅者是橫居絡脈也夫氣之在脈也邪氣在上濁氣在中清氣在下故針陷脈則邪氣出針中脈則濁氣出針太深則邪氣反沉病益甚故曰皮肉筋脈各有所處病各有所含針各有所宜各不同形各以任其所宜無實實無虛虛無損不之而益有餘是謂重病病益甚取五脈者死取三脈者恇奪陰者死奪陽者狂針害畢矣恇區方反怯也氣少故怯針害者言前所禁甚也刺之而氣不至無問甚數刺之氣至乃去之勿復針針各有所宜各不同形任其所為刺之要氣至而有效效之候若風之吹雲照乎若見蒼天刺之道畢矣針入不得其氣無由補瀉故轉針以待氣不問其數也得氣行補瀉已即便出針其病愈速故譬惡風吹雲見蒼天也黃帝曰願聞五臟六腑所出之處岐伯曰五臟五輸五五二十五輸六腑六輸六六三十六輸經脈十二絡脈十五凡二十七氣以上下所出為井所溜為滎所注為輸所行為經所入為合也二十七氣所行皆有五輸節之交三百六十五會知其要者一言而終不知其要流散無窮所言節者神氣之所遊行出入也非皮肉筋骨也睹其色察其目知其散復一其形聽其動靜知其邪正右主推之左推之而御持之氣至而去凡將用針必先診脈視氣之劇易乃可以治病五臟之氣已絶於內而用針者又實其外是謂重竭重竭則必其死其死也靜治之者輒反其氣取掖與膺五臟之氣已絶於外而用針者又實其內是謂逆厥逆厥則必死也躁治之者反取四末言刺必須診也刺之害中不去則精泄不中而去則致氣精泄則病甚而恇致氣則生為癰瘍不中病中精故精泄不中病病雖暫去史致弗氣為癰瘍也精泄病甚故恇也九針要解所謂易陳者易言也難入者難著於人也言者甚易行之難著粗守形者守刺法也工守神者守人之血氣有餘不足可補瀉也守刺規矩之形故粗守血氣中神明故工也神客者正邪共會也神者正氣也客者邪氣神者玄之所生神明者也神在身中以為正氣所以身中以神為主故邪為客也邪來乘於正故為會也在門者邪循正氣之所出入也門者腠理也循正氣在腠理出入也未睹其疾者先知正邪何經之病未睹病之已成即能先知正邪之發在何經脈中也惡知其原者先知何經之病所取之處也先知何注有病之微療之處所惡知言不知也刺之微在數遲者徐疾之意也刺之微妙之機在於徐疾也數疾也粗守關者守四肢而不知血氣正邪之往來也五臟六腑出於四肢粗守四肢臟腑之輸不知營衛正之與邪往來虛實故為粗也工守機者知守氣也機弩牙也主射之者守於機也知司補瀉者守神氣也機之動不離其空者知氣之虛實用針之徐疾也以因於空所以機動由於孔穴知神氣虛實得行徐疾補瀉也空中之機清靜以微者針已得氣密意守氣勿失也神在孔穴針頭候得氣已神清志靜密意守氣行於補瀉不令有失故為微也其來不可迎者氣盛不可補也氣盛不可補之補之實實也其往不可追者虛不可以瀉也氣往而虛不可瀉之瀉之虛虛也不可掛以發者言氣易失也利機掛以絲髮其機即發神氣如機微邪之氣如發微邪來觸神氣之謂之掛也微邪來至神智即知名曰智機不知即失故曰易也叩之不發者言不知補瀉之意血氣已盡而不下也不知機者謂鈍機也鈍機也叩之不發謂無智之人行於補瀉邪氣至而不知有害血氣皆盡而疾不愈下愈也知其往來者知氣之逆順盛虛也要與之期者知氣可取之時也知虛實可取之時為知往來要期也粗之暗乎者冥冥不知氣之微密也眇哉上獨有之者蓋知針意也往者為逆者言氣之虛而少少者逆來為順言形氣平者順也明知逆順正行無問者知所取之處也往者氣散故少氣逆也來者氣集故氣實順也明知氣之逆順即行補瀉更亦不須問者謂善知處也迎而奪之者瀉也追而濟之者補也迎而奪之致虛追而濟之令實故皆不可所謂虛則實之者氣口虛而當補之也診寸口脈虛當補所由之經也滿則泄之者氣口盛而當瀉之也診寸口脈實當瀉所由之經也宛陳則除之者去血脈也宛陳謂是經及絡脈聚惡血也邪勝則虛者言諸經有盛者皆瀉其邪也有客邪在諸經皆瀉去也徐而疾則實者言徐內而疾出也此言其補疾而徐則虛者言疾內徐出也此言其瀉實與虛若有若無者言實者有氣也虛者無氣也若有氣實若無氣虛也察後與先若亡若存者言氣之虛實補瀉之先後也察其氣之已下與尚存也若先實者瀉而已之令後虛也若先虛者補而存之便後實也為虛與實若得若失者言補則佖然若有得也瀉則恍然若有失也補之得於神氣故佖然也佖文一反色儀和也瀉失於邪氣故恍然也夫氣之在脈也邪氣在上者言邪氣之中人也高故在上也高在頭風熱邪氣多中人頭也故曰在上也濁氣在中者言水穀皆入於胃其精氣上注於肺濁氣留於腸胃言寒溫不適飲食不節而病於腸胃故命曰濁氣在中也谷入於胃化為二氣清而精者上注於肺以成呼吸行諸經隧其濁者留於腸胃之間因於飲食不調為病故曰在中也清氣在下者言清濕地之氣中人也必從足始故曰邪氣在上濁氣在中清氣在下清寒氣也寒濕之氣多從足上故在下也針陷脈則邪氣出者取之上上謂上脈頭及皮膚也針中脈則濁氣出者取陽明合也中者中脈謂之陽明是胃脈也陽明之合者胃足陽明合三里至巨虛上廉與大腸合至巨虛下廉與小腸合也針太深則邪氣反沉者言淺浮之疾不欲深刺也深則邪從之入故曰反沉也針過其分邪從針入病更益深故曰反沉也皮肉筋脈各有所處言經絡各有所生也言經在筋肉絡在皮膚也取五脈者死言病在中氣不足但用針盡大瀉其諸陰之脈也五臟中虛用針者大瀉五臟之脈陰絶故死也取三脈者恇言盡瀉三陽之氣令病人恇然不復也一時盡三陽之脈陽絶故恇然不復也奪陰者死言取尺之五里五往者也五里在肘上不在尺中而言尺之五里者寸為陽尺為陰也陰尺動脈動於五里故曰取尺五里也五往者五瀉也奪陽者狂正言奪陽陽虛故狂此為禁之正言睹其色察其目知其散復觀其明堂五色察其目之形色則病之聚散可知也復聚也一其形聽其動靜者言工知相五色於目有知調尺寸小大緩急滑澀以言所病也相五色於目謂一其形也相目之形有五色別以知一形也調尺寸之脈六變謂聽其動靜也聽動靜者謂神思脈意也知其邪正者知論虛邪與正邪之風正邪者謂人因飢虛用力汗出腠理開發逢風入者名曰正邪也虛邪者謂八正虛邪氣也右主推之左持而御之者言持針而出入也右手推針出入左手持而御也氣至而去之者言補瀉氣調而去之也氣若不至久而待之氣若至者依數行補瀉去其實虛也調氣在於終始一者持心持心在於終始故為一也節之交三百六十五會者脈絡之滲灌諸節者也數人骨節無三百六十五此名神氣遊行出入之處為節非皮肉筋也故絡脈滲灌三百六十五空穴以為節會也所謂五臟之氣已絶於內者脈口氣內絶不至反取其外之病處與陽經之合有留針以致陽氣陽氣至則內重竭即死也矣其死無氣以動矣故靜所謂五臟之氣已絶於外者脈口氣外絶不致反取四末之輸有留針以致其陰氣陰氣至則陽氣反入入則逆逆則死也陰氣有餘故八十一難五臟氣已絶於內者謂腎肝之氣為陰在內也而醫之用針反實心肺心肺為陽也陰氣虛絶陽氣盛實是為實實虛虛故死心肺為外心肺之氣已絶用針者實於腎肝亦為實實虛虛所以致死之也所以察其目者五臟使五色循明目為五臟使候也循增也察目五色增明即知無病者也循明則聲章聲章者言聲與生平異五色增明異常明五聲辨章別於生平蓋是旡病之候也諸原所生五臟有六腑六腑有十二原八十一難五臟皆以第三輸為原各二以為十原也又取手少陰經第三輸二為十二原六腑皆收井滎輸經四穴之後別立一原六腑各二為十二原然則五臟六腑合有二十四原原者臍下腎間動氣人之生命也十二經之根本也故名為原三瞧行原氣經營五臟六腑故三瞧者原氣之別使也行氣故五臟第一輸故第三輸名原六腑以第四穴為原夫原氣者三瞧之尊號故三瞧行原氣止第四穴輸名為原也今五臟六腑有十二原者言五臟六腑各有十二原也合而言之亦有二十四原文言六腑有十二原者後人妄加二字耳十二原出於四關四關主治五臟五臟有疾常取之十二原十二原者五臟之所以稟三百六十五節氣味者也四關四肢也此中唯言五臟有十二原生病所由不言六腑十二原也五臟在內原在於外故五臟有腑皆從外入所以五臟皆稟十二原也以其三百六十五節交會穴中谷之氣味皆在中會也五臟有疾也應出於十二原而原各有所出原之脈氣皆出其第三輸明知其原睹其應而知五臟之害矣明知十二原所出之處又知內應五臟則妙達五臟所生之害也陽中之少陰肺也其原出於大渕大渕二日夕少陰故曰陽中少陰也陽中之太陽心也其原出於大陵大陵二日中太陽故曰陽中太陽也陽中之少陽肝也其原出於太衝太衝二日出初陽故曰陽中之少陽也陰中之太陰腎也其原出於太溪太溪二夜半重陰故曰太陰也陰中之至陰脾也其原出於太白太白二上為四臟陰之至極故曰至陰也膈之原出於鳩尾鳩尾一膈氣在於鳩尾之下故鳩尾為原也肓之原出於脖胦脖胦一肓謂下肓在臍一寸脖薖忽反胦於桑反謂胦臍也凡此十二原者主治五臟六腑之有疾者也脹取三陽飧泄取三陰脹取六腑三陽原也泄取五臟三陰原也之今夫五臟之有疾也譬猶刺客邪入身其猶刺也猶汗也五志藏神其猶汗也猶結也陰陽積聚其猶結也猶閉也血氣不流其猶閉也刺雖久猶可拔也汗雖久猶可雪也結雖久猶可解也閉雖久猶可決也或言久疾之不可取者非其說也夫善用針者其取疾也猶拔刺也猶雪汗也猶解結也猶決閉也疾雖久猶可畢也言不可者未得其術也三陽不通其猶閉也不得其術者言上工所療皆愈也刺熱者如手探湯刺熱者決瀉熱氣不久停針徐引針使病氣疾出故如手探湯言其疾也刺寒清者如人不欲行刺寒者久留於針使溫氣集補故如人行遲若不行待氣故也陰有陽疾者取之下陵三里正往無殆氣下乃止不下復始諸腸以為陰陽有疾也疾高而內者取之陰之陵泉疾高而外者取之陽之陵泉所病在頭等為高根原在脾足太陰內者故取太陰第三輸陰陵泉也所病在頭為高其原在膽足少陽外故取足少陽第三輸陽陵泉也九針所象黃帝曰余聞九針於夫子衆多博大矣余猶不能寤敢問九針焉生何因有名九針法於三才故曰博大岐伯曰九針者天地之大數始於一而終於九故曰一以法天二以法地三以法人四以法四時五以法五音六以法六律七以法七星八以法八風九以法九野此言其博大也黃帝曰以針應九之數奈何岐伯曰夫聖人之起天地之數也一而九之故以立九野九而九之九九八十一以起黃鐘數焉以針應數黃鐘即起於一也之一者天也天陽也五臟之應天者肺也肺者五臟六腑之蓋也皮者肺之合人之陽也故為之治針必以大其頭而鋭其末令無得深入而陽氣出二者地也地者土也人之所以應土者肉也故為之治針必筒其身而員其末令無傷肉分傷則氣竭三者人也人之所以成生者血脈也故為之治針必大其身而員其末令可以按脈勿陷以致其氣令邪氣獨出四者時也時者四時八風之客於經絡之中為痼病者也故為之治針必筒其身而鋒其末令可以瀉熱出血而痼病竭以下言九針有法象也此一名鑱針卒鋭之者令其易入大其頭使不得深也二者員針員其末如雞卵也三者匙針員其末者末如黍粟之鋭也四者鋒針筒其身如筒之員也鋒其末者針末三隅利也五者音也音者冬夏分分於子午陰與陽別寒與熱爭兩氣相薄合為癰膿者也故為之治針必令末如劍鋒可以取大膿名曰䤵針六者律也律者調陰陽四時而合十二經脈虛邪客於經絡而為暴痹者故為之治針必令尖如耗且員且鋭中身微大以取暴氣名曰員利針也耗毛也毛形且員且鋭中身微大也七者星也星者人之七竅邪客於經而為痛痹舍於經絡者也故為之治針令尖如蚊虻喙靜以徐往微以久留正氣因之真邪俱往出針而養者也況羽反即移反喙詡穢反口嘴也名曰豪針也養者久留也八者風也風者人之股肱八節也八正之虛風八風傷人內舍於骨解腰脊節腠之間為深痹者也故為之治針必長其身鋒其末可以取深邪遠痹名曰長針鋒利也九者野也野者人之節解皮膜之間也淫邪流洫於身如風水之狀而留不能過於機關大節者也故為之治針令尖如梃其鋒微員以取大氣之不能過於關節者也名曰大針也大節十二大節也梃當為窱小破竹也黃帝曰針之長短有法乎岐伯曰一曰鑱針者取法於布針去木半寸卒鋭之長一寸六分主熱在頭身也二曰員針取法於絮針筒其身而卵其鋒長一寸六分主治分間氣三曰匙針取法於黍粟之鋭長三寸半主按脈取氣令邪出四曰鋒針取法於絮針筒其身鋒其末長一寸六分主癰熱出血五曰䤵針取法於劍鋒廣二分半長四寸主大癰膿兩熱爭也六曰員利針取法於耗微大其末反小其本令可深內也長一寸六分主取癰暴痹者七曰豪針取法於豪毛長一寸六分主寒痛痹在絡者也八曰長針取法於綦針長七寸主取深邪遠痹者九曰大針取法於鋒針其針微員長四寸主取大氣不出關節者針形畢矣此九針小大長短之法也此言九針之狀並言所療之病鑱仕咸反匙釘奚反針形也䤵披眉反綦奇眉反也凡針之名各不同形一曰鑱針二曰員針三曰匙針四曰鋒針五曰䤵針六曰員利針七曰豪針八曰長針九曰大針鑱針者頭大末鋭主瀉陽氣員針者鋒如卵形揩摩分間令不得傷肌以瀉分氣匙針者鋒如黍粟之鋭主按脈勿陷以致其氣鋒針者刃參隅參音三也以發痼疾䤵針者末如劍鋒以取大膿員利針者尖如耗且員且鋭中身微大以取暴氣豪針者尖如蚊虻喙靜以徐往微以久留之而養以取痛痹長針者鋒利身博音團可以取遠痹大針尖如梃其鋒微員以瀉機關之水九針畢此言九針用法
