body:
  text: 卷第十一輸穴本輸平按此篇自篇首至末見靈樞卷一第二本輸篇自肺出少商以下散見於甲乙經卷三第二十四至三十五等篇惟意義多同而編次前後文法繁簡有異自肺合大腸至所合者也見甲乙經卷一第三黃帝問於岐伯曰凡刺之道必通十二經脈之所終始手之三陰始之於胸終於手指手之三陽始於手指終之於頭足之三陽始起於頭終之於足足之三陰始起於足終之於腹平按經脈靈樞作經絡絡脈之所別起十五絡脈皆從臟腑正經別走相入平按別起靈樞作別處五輸之所留止各從井出留止於合平按靈樞無止字五臟六腑之所與合五臟六經為里六腑六經為表表裡合也平按靈樞無五臟二字四時之所出入秋冬陽氣從皮外入至骨髓陰氣出至皮外春夏陰氣從皮外入至骨髓陽氣出至皮外臟腑之所流行臟腑出於營衛二氣流行於身也平按靈樞臟腑作五臟流行作溜處闊數之度營衛所行闊數度量淺深之狀絡脈為淺經脈為深高下所至願聞其解經脈高上於頭下至於足此之九義並請聞之岐伯答曰請言其次次者井滎輸經合等陰陽五行次第也肺出少商少商者手大指內側也為井肺脈從臟而起出至大指次指之端今至大指之端還入於臟此依經脈順行從手逆數之法也井者古者以泉源出水之處為井也掘地得水之後仍以本為名故曰井也人之血氣出於四肢故脈出處以為井也手足三陰皆以木為井相生至於水之合也手足三陽皆以金為井相生至於土之合也所謂陰脈出陽至陰而合陽脈出陰至土而合也平按指下靈樞甲乙經有端字井下靈樞有木字溜於魚際魚際者手魚也為滎腕前大節之後狀若魚形故曰手魚也脈出少商溢入魚際故為滎也焉迥反注於太泉太泉者魚後下陷者之中也為輸輸送致聚也八十一難曰五臟輸者三焦行氣之所留止故肺氣與三焦之氣送致聚於此處故名為輸也平按太泉靈樞甲乙作太淵說見前下字靈樞作一寸二字輸作腧甲乙作俞下同不再舉行於經渠經渠者寸口之中也動而不居為經寸口之中十二經脈歷於渠洫故曰經渠居停也太陰之脈動於寸口不息故曰不居經者通也肺氣至此常通故曰經也平按行於經渠上千金有過於列缺為源六字入於尺澤尺澤者肘中之動脈也為合手太陰經也如水出井以至海為合脈出指井至此合於本臟之氣故名為合解餘十輸皆放於此諸輸穴名義已明堂具釋也心出中衝中衝者手中指之端也為井溜於勞宮勞宮者掌中中指本節之內間也為滎明堂一名五星也掌中動脈也平按心甲乙作心主靈樞井下有木字注於大陵大陵者掌後兩骨之間方下者也為輸平按為輸下千金有過於內關為源六字兩骨之間方下者也甲乙作兩筋間陷者中行於間使間使道兩筋之間三寸之中也有過則至無過則止為經方下陷中也三寸之中者三寸之際也有虛實之過則氣使至此無過不至故止也明堂此手心主經下有手少陰五輸此經所說心不受邪故手少陰無輸也平按道上靈樞有之字入於曲澤曲澤者肘內廉下陷者之中也屈而得之為合手心主經也肝出大敦大敦者足大趾之端及三毛之中也為井足大趾端及三毛皆是大敦厥陰脈井也平按屈而得之甲乙作屈肘得之手心主靈樞作手少陰井下靈樞有木字溜於行間行間者大指之間也為滎明堂足厥陰脈動應手也平按靈樞大指上有足字注於太衝太衝者在行間上二寸陷者之中也為輸明堂本節後二寸或一寸半陷中也平按靈樞行間上無者在二字行於中封中封者在內踝前一寸半陷者中也使逆則宛使和則通搖足而得之為經氣行曰使宛不伸也塞也明堂內踝前一寸仰足而取之陷者中伸足乃得之也平按千金過於中封為源行於中郤為經與此不同入於曲泉曲泉者輔骨之下大筋之上也屈膝而得之為合足厥陰經也明堂在膝內輔骨下大筋上小筋下陷中也脾出隱白隱白者足大趾之端內側也為井溜於太都太都者本節之後下陷者之中也為滎注於太白太白者核骨之下也為輸核骨在大指本節之後然骨之前高骨是也核莖革反平按靈樞井下有木字太都作大都核袁刻誤作腕注同注核莖革反袁刻無此四字行於商丘商丘者內踝下陷者之中也為經明堂足內踝下微前平按行於商丘上千金有過於公孫為源六字入於陰之陵泉陰之陵泉者輔骨之下陷者之中也屈伸而得之為合足太陰經也膝下內側輔骨下也平按靈樞無屈字太陰下無經字腎出湧泉湧泉者足心也為井明堂一名地衝也平按湧泉靈樞甲乙作湧泉井下靈樞有木字溜於然谷然谷者然骨之下也為滎明堂一名龍泉在足內踝前起大骨下陷中即此大骨為然骨注於太溪太溪者內踝之後跟骨之上陷者之中也為輸明堂跟骨上動脈也平按靈樞太溪作大溪陷下無者之二字為輸下千金有過於水泉為源六字行於復留復留者上踝二寸動而不休也為經明堂一名昌陽一名伏白足少陰脈動不休也平按復留甲乙作復溜踝上靈樞甲乙有內字二寸下甲乙有陷者中三字入於陰谷陰谷者輔骨之後大筋之下小筋之上也按之應手屈膝而得之為合足少陰經也明堂在膝內輔骨之後按應手謂按之手下覺異也膀胱出於至陰至陰者足小指之端也為井明堂在足小指外側去爪甲角如韭葉也平按靈樞井下有金字溜於通谷通谷者本節之前為滎明堂通谷者小指外側本節前陷中也平按前下靈樞有外側也三字注於束骨束骨者本節之後也為輸明堂在足小指外側本節後陷中也平按後下靈樞有陷者中三字過於京骨京骨者外踝之下也為原齊下動氣者人之生命十二經之根本也故名曰原三焦者原氣之別使主行三氣經營五臟六腑故原者三焦之尊稱也是以五臟六腑皆有原也肺之原出太泉心之原出大陵也肝之原出太衝脾之原出太白腎之原出大溪手少陰經原出神門掌後兌骨之端此皆以輸為原者以輸是三焦所行之氣留止處也六腑原者膽原出丘虛胃原出衝陽大腸原出合骨小腸原出完骨膀胱原出京骨三焦原出陽池六腑者陽也三焦行於諸陽故置一輸名原不應五時也所以腑有六輸亦與三焦共一氣也平按外踝靈樞作外側大骨四字原千金作源下同行於崑崙崑崙者在外踝之後跟骨之上也為經入於委中委中者膕中也為合委而取之足太陽經也明堂在膕中央約文中動脈也平按之上下甲乙有陷中細脈動應手七字靈樞膕中也也作央太陽下無經字膽出於竅陰竅陰者足小指次指之端也為井明堂足小指次指端去爪甲角如韭葉平按井下靈樞有金字溜於俠溪俠溪者小指次指之間也為滎明堂小指次指歧骨間本節前陷中平按小指上靈樞有足字注於臨泣臨泣者上行一寸半陷者中也為輸明堂在足小指次指本節皮間陷者中去俠溪一寸半也平按注皮間甲乙作後間過於丘虛丘虛者外踝之下陷者之中也為原明堂外踝下如前陷者中去臨泣三寸也平按虛靈樞甲乙作墟下陷上靈樞有前字注去臨泣三寸甲乙作去臨泣一寸行於陽輔陽輔者外踝之上輔骨之前及絶骨之端也為經明堂無及及即兩處也平按輔骨上甲乙有四寸二字端下甲乙有如前三分去丘虛七寸九字入於陽之陵泉陽之陵泉者在膝外陷者中也為合伸足而得之足少陽經也明堂在膝下外廉也平按靈樞外膝作在膝伸下無足字胃出於厲兌厲兌者足大趾之內次指之端也為井明堂去爪甲角如韭葉也平按井下靈樞有金字溜於內庭內庭者次指外間陷者中也為滎明堂足大趾次指外間也平按外間下靈樞無陷者中三字注於陷谷陷谷者中指內間上行二寸陷者之中也為輸明堂足大趾次指外間本節皮陷者中去內庭二寸也平按陷谷者下靈樞有上字注皮字甲乙作後過於衝陽衝陽者足跗上五寸陷者中也為原搖足而得之明堂一名會原足跗上五寸骨間動脈上去陷谷三寸也平按跗甲乙作趺行於解溪解溪者上衝陽一寸半陷者中也為經明堂衝陽後一寸半腕上也入於下陵下陵者膝下三寸胻外三里也為合復下三寸為巨虛上廉也復下三寸為巨虛下廉也大腸屬上小腸屬下足陽明胃脈也大腸小腸皆屬於此足陽明經也人膝如陵陵下三寸一寸為一里也三里以下三寸之下上下處上際為上廉下際為下廉以在胻骨外側故名為廉足陽明脈行此虛中大腸之氣在上廉中與陽明合小腸之氣在下廉中與陽明合故曰大腸屬上小腸屬下也平按靈樞胻下有骨字上復下二字下有三里二字下復下二字下有上廉二字皆屬於此作皆屬於胃三焦者上合於手少陽出於關衝關衝者手小指次指之端也為井溜於掖門掖門者小指之間也為滎注於中渚中渚者本節之後也為輸過於陽池陽池者在腕上陷者之中也為原陽池明堂一名別陽在手表腕上陷中也平按靈樞井下有金字掖作液甲乙作腋之間上靈樞有次指二字之後下有陷中者三字行於支溝支溝者腕上三寸兩骨間陷者中也為經入於天井天井者在肘外大骨之上陷者中也為合屈時而得之明堂在肘外大骨之後肘後一寸兩筋間陷中也平按靈樞腕上作上腕而得之作乃得之三焦下輸在於足太陽之前少陽之後出於膕中外廉名曰委陽此太陽之絡也手少陽經也上焦如霧中焦如漚下焦如瀆此三焦之氣上下皆通故上輸在背第十三椎下兩旁各一寸半下輸在此太陽之間出膕外廉足太陽絡三焦下行氣聚之處故曰下輸也平按靈樞足太陽作足大趾足三焦者太陽之所將太陽之別也上踝五寸而別入貫腨腸出於委陽並太陽之正入絡膀胱下焦腨遄免反腓腸也腎間動氣足太陽將原氣別使三焦之氣出足外側大骨下赤白肉際陷中為原上踝五寸別入貫腨腸出委陽並太陽之正入腹絡膀胱下焦即膀胱也原氣太陽絡於膀胱節約膀胱使溲便調也以此三焦原氣行足故名足三焦也平按靈樞三焦上無足字太陽之所將作少陽太陰之所將注云一本作太陽盛則閉𤸇虛則遺溺遺溺則補閉𤸇則瀉小腸上合於手太陽出於少澤少澤者小指之端也為井明堂一名少吉去爪甲下一分陷中平按靈樞盛作實小腸上有手太陽三字井下有金字溜於前谷前谷者手小指本節之前陷者中也為榮明堂在手小指外側中也平按小指靈樞作外廉注於後溪後溪者本節之後也為輸明堂在手小指外側本節後陷中也平按本節上靈樞有在手外側四字過於完骨完骨者在手外側腕骨之前也為原明堂在手外側腕前起骨下陷中即此起骨為腕骨此經名完骨胡端反平按完骨靈樞甲乙作腕骨行於陽谷陽谷者在兌骨之下陷者中也為經明堂在手外側腕中兌骨之下也平按兌靈樞作鋭入於小海小海者在肘內大骨之外去肘端半寸陷者之中也伸臂而得之為合手太陽經也明堂屈肘乃得之平按靈樞端上無肘字大腸上合於手陽明出於商陽商陽者大指次指之端也為井明堂一名而明一名絶陽大指次指內側去爪甲角如韭葉也平按靈樞井下有金字溜於二間二間在本節之前為滎明堂二間在手大指次指本節前內側陷中也平按為滎上靈樞作溜於本節之前二間八字注於三間三間在本節之後為輸明堂一名少谷在手大指次指本節後內側陷中也平按此節靈樞作注於本節之後三間為輸過於合谷合谷者在大指之間也為原明堂一名虎口在大指歧骨間也平按大指下靈樞有歧骨二字行於陽溪陽溪者在兩筋之間陷者中為經明堂一名中槐在腕中上側兩筋間也平按兩筋之間甲乙作腕中上側兩旁間七字注中槐甲乙作中魁入於曲池曲池者在肘外輔曲骨之中也屈肘而得之為合手陽明經也是謂五臟六腑之輸五五二十五輸六六三十六輸心不受邪手少陰無輸故五臟各輸有二十五輸依明堂手少陰有五輸總有三十輸六腑有原輸故有三十六輸皆是臟腑之氣送致聚於此穴故名為輸也平按靈樞無曲池者三字輔曲骨之中作輔骨陷者中甲乙作輔骨肘骨之中屈肘靈樞作屈臂六腑皆出足三陽上合於手者也六腑足陽明脈上合手陽明足太陽上合手太陽足少陽上合手少陽也缺盆之中任脈也名曰天突次任脈之側動脈足陽明也名曰人迎二次脈手陽明也名曰扶突二次脈手太陽也名曰天窗二次脈足少陽也名曰天容二次脈手少陽也名曰天牖二次脈足太陽也名曰天柱二次脈項中央之脈督脈名曰風府二掖內動脈手太陰也名曰天府掖下三寸手心主也名曰天池此言脈在胸項頸掖之下次以任脈在陰居於前中督脈在陽處於後中任之左右六陽為次兩側掖下二陰所行此之十輸脈之要者也平按靈樞天突下有一字自此以下凡次字上有二三四五六七等字本書原抄均有小二字旁注於左項中央靈樞作頸中央風府下原本仍有小二字靈樞無掖靈樞作腋注胸項袁刻作胸頂刺上關者呿不能缺上關開口有空刺之有傷不得開口故不能缺也呿邱庶反張口也刺下關者缺不能呿下關合口有空刺之有傷不得合口故不能呿也刺犢鼻者屈不能伸犢鼻在膝臏下骭上俠解大筋中刺之傷筋筋病屈不能伸也明堂無禁也刺內關者伸不能屈內關在掌後去腕二寸別走手少陽手心主絡明堂無禁刺之傷骨骨傷伸不能屈也平按內關靈樞作兩關者字袁刻誤作音手陽明次在其外不至曲頰一寸手陽明從缺盆上頸貫頰入下齒中不至曲頰故去曲頰一寸是也平按手陽明上靈樞有足陽明挾喉之動脈也其腧在膺中十四字其外靈樞作其腧外手太陽當曲頰手太陽循頸上頰頰曲頰也近牙車是也足少陽在耳下曲頰之後足少陽支從耳後出走耳前至目鋭眥後故在耳下曲頰後是手少陽出耳後上加完骨之上手少陽上項挾耳後故直上出耳上角完骨在耳後故上加完骨上是也足太陽挾項大筋之中髮際兩大筋中髮際此太陽輸也陰尺動脈在五里五輸之禁陽為寸故陰為尺陰尺之中五臟動脈在肘上五里五輸大脈之上明堂云五里在肘上三寸手陽明脈氣所發行向里大脈中央禁不可刺灸十壯左取右右取左大脈五臟大脈氣輸也故禁刺不禁灸也肺合大腸大腸傳導之腑也傳導糟粕令下也心合小腸小腸者受盛之腑也胃化糟粕小腸受而盛也肝合膽膽者中精之腑也膽不同腸胃受傳糟粕唯藏精液於中也脾合胃胃者五穀之腑也受五穀之味也腎合膀胱膀胱者津液腑也膀胱盛尿故曰津液之腑也平按腑上靈樞有之字少陰屬腎腎上連肺故將兩臟矣足少陰脈貫肝入肺中故曰上連也腎受肺氣腎便有二將為兩臟八十一難曰五臟亦有六者謂腎有兩臟也平按靈樞少陰作少陽兩臟下無矣字三焦中瀆之腑也水道出屬膀胱是孤之腑也中謂臟腑中也下焦如瀆從上焦下氣津液入於下焦下焦津液流入膀胱之中無藏為合故曰孤腑也平按靈樞出下有焉字此六腑之所與合者也腑之聚也五穀清濁氣味皆聚於中故六皆名腑孤腑內與六腑氣通故曰合也春取絡脈諸滎大經分肉之間甚者深取間者淺取之春時陽氣始生微弱未能深至經中故取絡脈及取諸滎並大筋分肉之間也夏取諸輸孫絡肌肉皮膚之上陽氣始長熱熏腠理內至於經然猶脈疲氣弱故取諸輸孫絡之分腠理肌肉皮膚之上也平按注然猶猶字袁刻誤作後秋取諸合余如春法陰氣始殺猶未能盛故取於輸及以合也春時陰氣衰少為弱陽氣初生為微秋時陽氣衰少為弱陰氣始生為微病間故如春法取絡滎大經分間亦隨病間甚淺深為度也平按注故如春法上原本有病間二字疑衍冬取諸井諸輸之分欲深而留之冬時足少陰氣急緊足太陽伏沉故取諸井以下陰氣取滎以實陽氣皆深為之者也此四時之序依於四時行療次序氣之所處隨於四時人氣在處也病之所舍隨於四時邪之居所也平按居所袁刻作所居臟之所宜也療五臟病依四時所宜也轉筋者立而取之可令遂已人立筋病痛聚故立燔針刺之痿厥者張而刺之可令立快手足痿厥開張即得其輸然後刺之變輸平按此篇自篇首至味主合見靈樞卷七第四十四順氣一日分為四時篇又見甲乙經卷一第二自問曰春取絡脈至末見素問卷十六第六十一水熱穴論篇又見甲乙經卷五第一上篇黃帝曰余聞刺有五變以主五輸願聞其數岐伯曰人有五臟臟有五變變有五輸故五五二十五輸以應五時五時謂春夏長夏秋冬也平按甲乙輸作腧下同無餘聞刺有以主六字靈樞臟有五變作五臟有五變變有五輸作五變有五輸黃帝曰願聞五變岐伯曰肝為牡臟其色青其時春其音角其味酸其日甲乙心為牡臟其色赤其時夏其日丙丁其音徵其味苦脾為牝臟其色黃其時長夏其日戊己其音宮其味甘肺為牝臟其色白其音商其時秋其日庚辛其味辛腎為牝臟其色黑其時冬其日壬癸其音羽其味鹹是謂五變肝心屬於木火故為牡臟脾肺腎屬於土金水故為牝臟牝牡五臟五色五時五音五味故有二十五之變也平按甲乙無黃帝至岐伯曰十字其日甲乙在其音角之上其音商在其日庚辛之下注二十五之變二十字袁刻誤作其黃帝曰以主五輸奈何岐伯曰臟主冬冬刺井冬時萬物收藏故五臟主冬也井為木也木春也春時萬物始生如井中泉水冬時萬物始萌如井水深未出而刺之者刺井微也平按甲乙無黃帝至岐伯曰十二字靈樞無岐伯曰三字色主春春刺滎春時萬物初生鮮華故五色主春滎火也火夏也夏時萬物滎長如水流溢春時萬物始生未榮而刺之者亦刺滎微也時主夏夏刺輸夏時萬物榮華四時之勝故五時主夏輸土也土長夏也長夏之時萬物盛極如水致聚夏時榮未盛極而刺之者亦刺輸微也音主長夏長夏刺經長夏萬物榮盛音律和四時之序故五音主於長夏經金也金秋也秋時萬物將衰長夏之時萬物盛而未衰而刺之者亦刺經微也味主秋秋刺合秋時萬物皆熟衆味並盛故五味主秋也合水也水冬也冬時萬物收藏如水之入海秋時萬物收而未藏而刺之者亦刺合微也是謂五變以主五輸是萬物五變主五行輸也黃帝曰諸原安合以致六輸五變合於五輸原之一輸與何物合平按六輸甲乙作五腧岐伯曰原獨不應五時以經合之以應其數故六六三十六輸六腑者陽也人之命門之氣乃是腎間動氣為五臟六腑十二經脈性命根故名為原三焦者原氣之別使通行原之三氣經營五臟六腑故原者三焦之尊稱也不應五時與陽經而合以應其數故有六六三十六輸也黃帝曰何謂臟主冬時主夏音主長夏味主秋色主春願聞其故岐伯曰病在藏者取之井井木也井主心下滿是肝為滿也冬時心下滿病刺其井者遣其本也病變於色者取之滎滎火也滎主身熱是心為熱也春時身熱之病刺其滎者亦遣其本也平按甲乙滎作營病時間時甚者取之輸輸土也輸主體重節痛時間時甚是脾為病也夏時體重節痛時間時甚刺其輸者亦遣其本也病變於音者取之經經滿而血者經金也金主喘咳寒熱經血而滿是肺為病也長夏喘咳寒熱經血而滿刺其經者亦遣其本也平按經滿經字甲乙注云亦作絡病在胃及以飲食不節得病者取之於合合水也合主逆氣而泄是腎為病也秋時飲食不節逆而泄刺其合者亦遣其本也平按胃甲乙注云亦作胸故命曰味主合故味病主合也是謂五變黃帝曰善以原不應五時故有五變也平按靈樞無黃帝曰善四字甲乙同問曰春取絡脈分肉何也答曰春者木始治肝氣生肝氣急其風疾經脈常深其氣少不能深入故取絡脈分肉間也絡脈浮淺經脈常深春時邪在絡脈分肉間故取之也平按肝氣生素問作肝氣始生甲乙同曰夏取盛經分腠何也曰夏者火始治心氣始長脈瘦氣弱陽氣流溢熏熱分腠內至於經故取盛經分腠絶膚而病去者邪居淺也陽氣獨盛故脈瘦氣弱也熱氣內至於經外熏分腠故取盛經分腠淺處也平按流素問作留新校正云別本一作流熏熱分腠甲乙作血溫於腠所謂盛經者陽脈也三陽盛經也夏日其經熱盛故取其盛經部內分腠曰秋取經輸者何也曰秋者金始治肺將初殺金將勝火陽氣在合陰氣初勝濕氣及體陰氣未盛未能深入故取輸以瀉陰邪取合以虛陽邪陽氣始衰故取於合經輸者謂經之穴也秋病在輸者故取其輸以瀉陰邪陽衰在合故取於合以虛陽邪也平按初殺素問甲乙作收殺陰氣初勝甲乙無初字及體甲乙作反體故取於合下甲乙有是謂始秋之治變也素問新校正亦引此文曰冬取井滎何也曰冬者水始治腎方閉陽氣衰少陰氣緊巨陽伏沉陽脈乃去緊盛也巨陽足太陽氣伏沉在骨也平按緊素問甲乙作堅盛二字故取井以下陰逆取滎以實陽氣故取井滎春不鼽衄此之謂也井為木也滎為火也冬合之時取井滎者冬陰氣盛逆取其春井瀉陰邪也逆取其夏滎補其陽也故冬無傷寒春不鼽衄也平按以實陽氣素問新校正云全元起本實作遣甲乙千金作通此之謂也句甲乙作是謂末冬之治變也素問新校正亦引此文腑病合輸平按此篇見靈樞卷一第四邪氣臟腑病形篇自五臟六腑之氣至此胃脈也見甲乙經卷四第二下篇自大腸腑者至取三里見甲乙經卷九第七自小腸病者至取巨虛上廉見甲乙經卷九第八自三焦病者至取之委中央見甲乙經卷九第九自膽病者至陽陵泉見甲乙經卷九第五自刺此者必中氣穴至末見甲乙經卷五第一下篇惟自大腸以下甲乙經文義雖同編次前後小異黃帝曰余聞五臟六腑之氣滎輸所入為合今何道從入入安連過願聞其故問臟腑脈之滎輸之合行處至處也平按輸甲乙作俞今靈樞甲乙均作令連過甲乙作從道無願聞其故及下岐伯答七字岐伯答曰此陽脈之別入於內屬於腑者也此言合者取三陽之脈別屬腑者稱合不取陰脈以陽脈內屬於腑邪入先至於腑後至於臟故也黃帝曰滎輸與合各有名乎岐伯答曰滎輸治外經合治內腑五臟六腑滎輸未至於內故但療外經之病此言合者唯取陽經屬內腑者以療內腑病也平按甲乙外下有髒字黃帝曰治內腑奈何岐伯答曰取之於合黃帝曰合各有名乎岐伯答曰胃合入於三里胃氣循足陽明脈合於三里故胃有病取之三里療胃腑也平按靈樞無入字大腸合入於巨虛上廉大腸之氣循胃足陽明脈合巨虛上廉故大腸有病療巨虛上廉也小腸合入於巨虛下廉小腸之氣循足陽明脈合巨虛下廉故小腸有病療巨虛下廉也三焦合入於委陽三焦之氣循足太陽合於委陽故三焦有病療於委陽也膀胱合入於委中膀胱之氣循足太陽脈下合委中故膀胱有病療於委中也平按中下靈樞甲乙均有央字膽合入於陽陵泉膽氣循足少陽脈下合陽陵泉故膽有病療陽陵泉也黃帝曰取之奈何答曰取之三里者低跗取之巨虛者舉足取之委陽者屈伸而索之委中者屈而取之陽陵泉者正立豎膝豫之齊下至委陽之陽取之取諸外經者揄伸而從之以下取六合之輸療內府法也正立則膝豎揄與朱反引也平按甲乙索作取屈而取之作屈膝而取之靈樞豎上無立字伸作申黃帝曰願聞六腑之病六腑與六輸而合療內腑之病而未知腑病之形也岐伯曰面熱者足陽明病以下言手足陽明病面熱陽明脈起面故足陽明病面熱為候也魚絡血者手陽明病手陽明脈行於魚後故魚絡血見手陽明病候也兩跗之上脈堅若陷者足陽明病此胃脈也足陽明下足跗入大指間故跗上脈緊若陷足陽明病候平按靈樞堅若二字作豎大腸病者腸中切痛而鳴濯濯冬日重感於寒則泄當齊而痛不能久立與胃同候取巨虛上廉以下言六腑病形並取穴所在當齊痛者回腸大腸也大腸當齊故病當齊痛也與胃同候者大腸之氣與胃足陽明合巨虛上廉故同候之濯徒角反腸中水聲也平按則泄靈樞作即泄甲乙無此二字胃病者腹䐜脹胃管當心而痛上交兩脅鬲咽不通飲食不下取之三里胃管當心痛者胃脈足陽明之正上至髀入於腹裡屬胃散脾上通於心上循咽其足陽明大絡循脛骨外廉上絡頭故胃管及當心而痛上交於脅鬲中並咽並不得通也平按胃管靈樞甲乙作胃脘上交靈樞作上肢甲乙作上榰鬲靈樞作膈小腸病者少腹痛腰脊控尻而痛時窘之後小腸當少腹附脊左環葉積故少腹腰脊控尻而痛時急之䐜大便之處也平按少腹靈樞作小腹控尻靈樞甲乙作控睪注左環左字袁刻誤作空當耳前熱若寒甚若獨眉上熱甚小腸手太陽上䪼至目鋭眥卻入耳中故小腸病循此寒及熱也平按甲乙耳上無當字眉靈樞甲乙作肩及手小指次指之間熱若脈陷者此其候手太陽也取巨虛下廉手太陽脈出行之處故此處熱脈陷以為候也平按靈樞太陽下有病字三焦病者腹氣滿少腹尤堅不得小便窘急尤甚也平按甲乙腹下有脹字尤堅作尤甚堅溢則為水留則為脹候在足太陽之外大絡絡在太陽少陽之間亦見於脈取之委陽下焦溢則為水也太陽少陽之間三焦下輸委陽也平按靈樞水上無為字留則作留即委陽甲乙作委中膀胱病少腹偏腫而痛以手按之則欲小便而不得偏腫者大腹不腫也此府病也平按則欲靈樞作即欲肩上熱若脈陷及足小指外側及脛踝後皆熱若脈陷取之委中央膀胱足太陽脈起目內眥上額下項循脛踝後至足小指外側故膀胱病循脈行處熱及脈陷以為候也平按肩上甲乙作眉上注云一本作肩靈樞外側作外廉取之委中央甲乙經作取委中膽病者善太息膽病則魂神不暢故好太息也口苦嘔宿汁膽熱溢水精故口苦嘔宿膽汁平按汁甲乙作水心下淡淡恐如人將捕之膽病心動怖畏故如人將捕也平按甲乙恐上有善字靈樞無如字嗌中吤吤然數唾候在足少陽之本末吤吤謂閡咽嗌之中如有物閡也居薤反足少陽本在竅陰之間標在窗籠即本末也平按數唾甲乙作數咳唾靈樞唾下無候字亦視其脈之陷下者灸之其寒熱也取之陽陵泉脈陷下者寒故灸之也寒熱取陽陵泉通行針灸也黃帝曰刺之有道乎岐伯曰刺此者必中氣穴毋中肉節中氣穴則針遊於巷中肉節則肉膚痛以下行針法也中於肉者不著分肉之間中於節者不針骨穴之內皆不遊巷也巷謂街巷空穴之處也平按遊靈樞作染注云一作遊肉膚靈樞甲乙作皮膚補瀉反則病益篤虛而瀉之實而補之故曰反也中筋則筋緩中筋不中其痛則筋傷無力故緩也邪氣不出與真氣相薄亂而不去反還內著用針不審以順為逆黃帝曰善若中肉節及中於筋不當空穴邪氣不出與真氣相薄正邪相亂更為內病也以其用針不審乖理故也平按與真氣相薄靈樞作與其真相搏甲乙作與真相薄注內病袁刻誤作內痛氣穴平按此篇自篇首至天府下五寸見素問卷十五第五十八氣穴論自問曰少陰何以主腎至夫寒甚則生熱見素問卷十六第六十一水熱穴論自問曰少陰何以主腎至名曰風水見甲乙經卷八第五自黃帝問於岐伯曰願聞五臟之輸至須其火滅也見靈樞卷八第五十一背腧篇自欲知背輸至灸刺之度也見素問卷七第二十四血氣形志篇自黃帝問於岐伯曰余以知氣穴之處至末見素問卷十五第五十八氣穴論又見甲乙經卷三第一黃帝問岐伯曰余聞氣穴三百六十五以應一歲未知其所謂願卒聞之三百六十五穴十二經脈之氣發會之處故曰氣穴也平按素問無岐伯二字無謂字岐伯稽首再拜曰窘乎哉問也其非聖帝孰能窮其道焉固請溢意盡言其處黃帝捧手遵循而卻曰夫子之開余道也目未見其處耳未聞其數而目以明耳以聰矣遵循音逡巡窮究尋也溢意縱志也處三百六十五穴也捧手端拱也遵循而卻服應之動也雖未即事見聞因言具知故已聰明也平按素問拜下有對字固作因遵循作逡巡岐伯曰此所謂聖人易語良馬易御黃帝曰非聖人易語也世言其真數開人意也帝言岐伯以有聖德言其實理雖非聖帝亦可知矣平按素問非上有餘字真上無其字意下無也字今余所方問者此真數也如發蒙解惑未足以論也然余願夫子溢志盡言其處今皆解其意請藏之金匱不敢復出余所問者但可發蒙解惑而未足以為至極之論也唯願夫子縱志言之藏之不敢失墜也平按素問方作訪今皆二字作令岐伯再拜而起曰臣請言背與心相控而痛所治天突與十椎及上紀下紀上紀者胃脘也下紀者關元也任脈上於脊裡為經絡海其浮而外者循腹裡當齊上胸至咽喉絡唇口故背胸相控痛者任脈之痛也此等諸穴是任脈所貫所以取之也平按素問上紀下無下紀二字邪擊陰陽左右如此其病前後痛澀胸脅而痛不得息不得臥上氣短氣偏痛脈滿起邪出尻脈絡胸支心貫鬲上肩加天突邪下肩交十椎下藏量此脈行處生病皆是督脈所為下藏者下絡腎臟也平按素問邪擊上有背胸二字擊作系而痛作痛而絡胸下有脅字十椎下無藏字藏輸五十穴五臟各有五輸合二十五輸此一箱手足為言今兩箱合論故有五十穴也府輸七十二穴六腑各有六輸此三十六輸此亦一箱手足為言兩箱合論故有七十二穴也熱輸五十九穴水輸五十七穴頭上五行行五五五二十五穴中侶兩旁旁五凡十穴大杼上兩旁各一凡二穴平按素問大杼作大椎王注未詳新校正云按大椎上旁無穴大椎下旁穴名大杼目瞳子浮白二穴兩髀厭中二穴平按素問厭下有分字犢鼻二穴耳中多所聞二穴眉本二穴完骨二穴項中央一穴枕骨二穴上關二穴大迎二穴下關二穴天桂二穴巨虛上下四穴平按四穴上素問有廉字曲牙二穴天突一穴天府二穴天牖二穴扶突二穴天窗二穴肩解二穴關元一穴委陽二穴肩貞二穴肩髃二穴平按素問肩髃作喑門齊一穴肓輸二穴平按素問肓輸作胸俞二穴作十二穴背輸二穴膺輸二穴平按素問二穴作十二穴分肉二穴踝上橫骨二穴平按素問無骨字陰陽喬四穴凡三百六十五穴針之所由行也以上九十九穴通療諸病也平按素問凡三百六十五穴針之所由行也十三字在天府下五寸之下水輸在諸分熱輸在氣穴寒輸在兩骸厭中二穴以上言三種輸穴之所在骸核皆反骨也別本為骩於靡反骨端曲兒也平按素問寒下有熱字大禁二十五在天府下五寸三百六十五穴中有大禁者五里穴也在臂天府以下五寸五五二十五往瀉此穴氣氣盡而死故為大禁也問曰少陰何以主腎腎何以主水問少陰之脈主之所由也答曰腎者至陰也至極也腎者陰之極也陰者盛水也陰氣舍水故曰盛水平按素問甲乙陰上有至字腎者少陰少陰者冬脈也一曰肺者量為不然也少陰亦盛也少陰之脈盛屬於冬分也平按素問甲乙腎者少陰作肺者太陰也故其本在腎其末在肺皆積水也腎脈少陰上入肺中故曰末在肺也所以腎之與肺母子上下俱積水也問曰腎何以能聚水而生病腎為至陰聚水未知何由生病答曰腎者胃之關閉關閉不利故聚水而從其類上下溢於皮膚故為胕腫胃主水穀胃氣關閉不利腎因聚水肺氣之應溢於皮膚故為胕腫胕扶府反與腐同義也平按素問甲乙胃之關閉作胃之關也關閉不利作關門不利胕腫下有肘腫者聚水而生病也九字問曰諸水皆生於腎乎答曰腎者牝臟也地氣上者屬於腎而生水液故曰至牝陰也地氣陰氣也陰氣盛水上屬於腎生於津液也故以腎為極陰也平按素問甲乙至下有陰字勇而勞甚則腎汗出汗出逢風內不得入其臟而外不得越於皮膚客於六腑行於皮膚傳為胕腫本之於腎名曰風水勇者腰脊用力勞甚腎上腠開汗出邪風因入其風往來內不得入府之餘藏外不得泄府之皮膚聚水客於六腑之中行於皮傳為胕腫其本腎風所為名曰風水也平按素問逢風作逢於風入其臟作入於臟腑六腑作玄腑行於皮膚作行於皮里風水下有所謂玄府者汗空也八字問曰水輸五十七處者是何所主也答曰腎輸五十七穴積陰之所聚也水所從出入也以下言水輸也腎為積陰故津液出入也皆腎為主也平按素問是何所主也作是何主也尻上五行行五者此皆腎輸也尻上五行合二十五輸者有非腎脈所發皆言腎輸以其近腎並在腎部之內腎氣所及故皆稱腎輸也平按素問此皆腎輸也作此腎輸故水病下為胕腫大腹而上為喘呼不得臥者標本俱病也故肺為喘呼腎為水腫標為肺也本為腎也肺為喘呼腎為水腫二臟共為水病故曰俱病也平按素問胕腫作胻腫注共為水病袁刻共誤作其肺為逆故不得臥肺以主氣肺病氣逆故曰水病不得臥也平按素問無故字分之相輸受者水氣之所留也腎以主水肺以主氣故曰分之二氣通聚故曰相輸受也相輸受者水之與氣並留止也平按素問分之相輸受者作分為相輸俱受者伏兔上各二行行五者此腎之所沖也伏兔以上各二行者左右四行合有二十輸者皆是腎氣足少陰旁衝脈所沖之輸也平按素問所沖二字作街袁刻二行上脫各字所沖二字誤作所腫三陰之所交結於腳者也踝上各一行行六者足三陰脈交結腳者從踝以上左右各有一行行六輸合有十二輸故聰有五十七穴也此腎脈之下行者也名曰太衝衝脈上出於頏顙下者注足少陰大絡以下伏行出跗循跗故曰腎脈下行名曰太衝也平按素問太作大凡五十七穴者皆臟陰之終也水之所客也是等諸穴皆腎之陰臟所終之輸水客之舍也平按皆藏陰之終也素問作皆藏之陰絡黃帝問於岐伯曰夫子言治熱病五十九輸餘論其意未能別其處也願聞其處因聞其意岐伯曰頭上五行行五以越諸陽之熱逆者以下言熱輸也人頭為陽故頭上二十五輸以起諸陽熱者平按素問別上有領字大杼膺輸缺盆背輸此八者以瀉胸中之熱杼除呂反膺輸膺中輸也背輸肺輸此八前後近胸故瀉胸中熱也氣街三里巨虛上下廉此八者以瀉胃中之熱此八皆是胃脈足陽明所貫之輸故瀉胃中熱氣也雲門髃骨委中髓空此八者以瀉四肢之熱雲門近肩髃骨在肩並向手臂也委中在膕髓空在腰一名腰輸皆主於腳故瀉四肢之熱也五臟輸旁五此十者以瀉五臟之熱皆太陽五臟之輸左右各有五輸故有十輸以瀉五臟之熱也凡此五十九穴者皆熱之左右也皆熱病左右之輸也問曰人傷於寒而傳為熱何也答曰夫寒甚則生熱夫陽極則降陰極則升是以寒極生熱熱極生寒斯乃物理之常也故熱病號曰傷寒就本為名耳黃帝問於岐伯曰願聞五臟之輸出於背者五臟之輸者有在手足今者欲聞背之五輸也平按輸靈樞作腧素問作俞上下均同岐伯對曰胸中大輸在杼骨之端杼骨一名大杼在於五臟六腑輸上故是胸之膻中氣之大輸者也肺輸在三椎之間心輸在五椎之間鬲輸在七椎之間肝輸在九椎之間脾輸在十一椎之間腎輸在十四椎之間皆俠脊相去三寸所輸尸句反送致也此五臟輸俠脊即椎間相去遠近皆與明堂同法也平按靈樞鬲作膈椎均作焦俠作挾即欲而驗之按其處應中而痛解乃其輸也以下言取輸法也縱微有不應寸數按之痛者為正平按即欲而驗之靈樞作則欲得而驗之灸之則可刺之則可氣盛則瀉之虛則補之以火補者勿吹其火須自滅也以火瀉者疾吹其火傅其艾須其火滅也針之補瀉前後數言故於此中言灸補瀉火燒其處正氣聚故曰補也吹令熱入以攻其病故曰瀉也傅音付以手擁傅其艾吹之使火氣不散也平按刺之則可靈樞作刺之則不可欲知背輸先度其兩乳間中折之更以他草度去其半已即以兩禺相柱也乃舉以度其背令其一禺居上齊脊大椎兩禺在下當其下禺者肺之輸也復下一度心輸也復下一度右角肝輸也左角脾輸也復下一度腎輸也是謂五臟之輸灸刺之度也以上言量背輸法也經不同者但人七尺五寸之軀雖小法於天地無一經不盡也故天地造化數乃無窮人之輸穴之分何可同哉昔神農氏録天地間金石草木三百六十五種法三百六十五日濟時所用其不録者或有人識用或無人識者蓋亦多矣次黃帝取人身體三百六十五穴亦法三百六十五日身體之上移於分寸左右差異取病之輸實亦不少至於扁鵲灸經取穴及名字即大有不同近代秦承祖明堂曹子氏灸經等所承別本處所及名亦皆有異而除疴遣疾又復不少正可以智量之適病為用不可全言非也而併為非者不知大方之論所以此之量法聖人設教有異未足怪之也平按其半其字素問無禺均作隅柱作拄右角肝作左角肝左角脾作右角脾注草木袁刻誤作草本秦承祖袁刻秦誤作奏差異袁刻作著異日本醫心方亦作差黃帝問於岐伯曰余以知氣穴之處遊針之居願聞孫絡溪谷亦有所應乎岐伯曰孫絡三百六十五穴會以應一歲以下言孫絡之會也十五絡脈從經脈生謂之子也小絡從十五絡生乃是經脈孫也孫絡與三百六十五穴氣會以法一歲之氣也平按素問余以作余已以洫奇邪以通營衛洫謂溝洫水行處也孫絡行於奇邪營衛之氣故曰洫火逼反平按洫素問作溢甲乙作灑營素問甲乙作榮下同稽留營洫氣濁血著外為發熱內為少氣若稽留營血洫中不行遂令血濁血著皮膚髮熱營衛不行故曰少氣也平按稽留營洫素問作榮衛稽留衛散營溢八字氣濁素問作氣竭甲乙無稽留至岐伯曰四十五字疾瀉毋怠以通營衛見而瀉之毋問所會如此孫絡血氣洫道不通有血之處即疾瀉之以通營衛不須求其輸會而生疑慮黃帝曰善願聞溪谷之會岐伯曰分肉之大會為谷肉之小會為溪肉分之間溪谷之會以行營衛以會大氣以下言分肉相合之間自有大小大者稱谷小者名溪更復小者以為溝洫皆行營衛以舍邪之大氣也平按分肉之大會素問甲乙均無分字以會大氣甲乙會作舍邪溢氣壅脈熱肉敗營衛不行必將為膿以下言氣壅成熱以為癰疽邪氣客此溪谷溝洫之間滿溢留止營衛氣壅脈熱肉腐稱為癰膿也內消骨髓外破大䐃留於節腠必將為敗氣壅為熱消骨破䐃留於骨節聚於腠理以為癰疽遂至敗亡也平按素問䐃作膕腠作湊積寒留舍營衛不居塞肉縮筋時不得伸內為骨痹外為不仁以下言寒氣留積溪谷溝洫為痹不仁也平按塞肉素問作卷肉新校正云全元起本作寒肉袁刻誤作寒內時不得伸時字素問作肋肘二字命曰不足大寒留於溪谷寒氣留積為痹不仁者命曰陽氣不足大寒留於溪谷溝洫故也溪谷三百六十五會亦應一歲人之大小分肉之間有三百六十五會也平按素問會上有穴字其小痹淫溢循脈往來微針所及與法相思寒濕之氣入於腠理以為微痹淫溢流於脈中循脈上下往來為痛可用小針相司為當平按相思依本注應作相司素問作相同注寒濕袁刻作寒熱黃帝曰善乃闢左右再拜而起曰今日發蒙解惑藏之金匱不敢復出乃藏之金蘭之室署之曰氣穴所在帝以道尊德貴屈敬故也金蘭之室藏書府也岐伯曰孫絡之脈別經者其血盛而當瀉者亦三百六十五脈並注於絡傳注十二絡脈非獨十四絡脈也舉可瀉孫絡注大絡之數也並注於十二皮部絡也十二別走絡脈並任督二脈為十四絡也脾之大絡從脾而出不從脈起故不入數言諸孫絡傳注十二之絡非獨注於十四絡也平按注並注於十二皮部絡也袁刻作並注皮部十二絡也內解瀉於中者十脈解別也其諸絡脈別者內瀉十脈也十脈謂五臟脈兩箱合論故有十也氣府平按此篇見素問卷十五第五十九氣府論篇又見甲乙經卷三第一至第二十二惟文法編次與此不同足太陽脈氣所發者七十三穴兩眉頭各一攢竹穴二也平按七十三穴素問作七十八穴王注云兼氣浮薄相通言之當言九十三穴非七十八穴正經脈會發者七十八穴浮薄相通者一十五穴則其數也與本書經文及楊注均異入發項二寸間半寸額上入發一寸後從項入發一寸故曰入發項二寸間亦有一寸半處故曰半寸也平按素問項上有至字二寸間半寸作三寸半旁五相去二寸其浮氣在皮中者凡五行明堂旁相去一寸半有此不同也其浮氣足太陽浮氣在此五行穴之下也平按二寸素問作三寸王注謂大杼風門二穴所在新校正謂是說下文浮氣之在皮中五行行五之穴況大杼在第一椎下兩旁風門又在第二椎下上去髮際非止三寸半其誤甚明據此則本書楊注為得素問王注為失矣行五五五二十五二十五穴者面上五脈上頭併入發一寸以上周通高處當前橫數於五脈上凡有五處處各五穴當前謂亞會前項百會後頂強間五也督脈兩旁足太陽脈五處承光通天絡卻玉枕左右十也足太陽兩旁足少陽脈臨泣目窗正營承靈腦空左右十也太陽為二陽之總故皆為太陽所營二十七也平按注亞會素問甲乙作囟會亞字當是古囟字之誤項中大筋兩旁各一兩旁天柱二穴二十九也風府兩旁各一天牖二穴三十一也平按注天牖二穴素問王注作風池二穴新校正云按甲乙經風池足少陽陽維之會非太陽之所發此注於九十三數外更剩前大杼風門及此風池六穴俠脊以下至尻二十一節十五間各有一大椎以下至尻尾二十一節十五間兩旁各有一輸為三十輸六十一也平按素問俠脊作俠背尻下有尾字各有一作各一王注云十五間各一者今中誥孔穴圖經所存者十三穴左右共二十六穴謂附分魄戶神堂譩嘻膈關魂門陽綱意舍胃倉肓門志室胞肓秩邊十三也甲乙經所載背自第二椎兩旁俠脊各三寸行至二十一椎下兩旁俠脊凡二十六穴其穴名自附分以下與王注同惟甲乙經云自第二椎兩旁本書楊注云自大椎以下不能無異且經云十五間各一楊注云十五間兩旁各有一輸與經文正合惜未詳析穴名耳委中以下至足小指旁六輸從足小指上至委中有井滎輸原經合等左右十二輸等七十三也平按素問委中上有五臟之俞各五六腑之俞各六十二字六輸上有各字足少陽脈氣所發者五十二穴兩角上各二兩角上等天衝曲鬢左右四穴也平按五十素問作六十耳前角上各一頷厭左右二穴六也平按素問耳前上有直目上髮際內各五八字頷厭袁刻誤作領厭客主人各一一名上關二穴八也平按客主人上素問有耳前角下各一鋭發下各一十一字下關各一下關耳前動脈二穴十也平按下關上素問有耳後陷中各一六字耳下牙車之後各一大迎一名髓空二穴十二也平按注大迎二穴素問王注作頰車二穴缺盆各一缺盆一名天蓋二穴十四掖下三寸脅下下至胠八間各一掖下左右三寸間泉液輒筋天池三穴脅下至胠章門維道日月三穴正經氣發也腹哀大橫此二穴正經雖不言發近此三正經氣也帶脈五樞此二穴少陽彆氣至也上窖一穴少陽脈絡別至也左右二十二三十六穴也是則掖下三寸為脅脅下八間之外為胠則胠脅之言可別矣平按素問下字不重本注左右共二十二穴素問王注左右共十八穴無腹哀大橫左右四穴上窖作居髎髀樞中旁各一環跳居髎左右四穴四十也平按注居髎素問王注無膝以下至足小指次指各六輸足少陽井等六輸左右十二五十二也足陽明脈氣所發者六十二穴額顱髮際旁各三頭維本神曲差左右六穴也平按六十二素問作六十八注本神曲差二穴素問王注作懸顱陽白二穴面鼽骨空各一鼽渠留反鼻表也有云鼻塞病非也顴窖二穴八也明堂雖不言氣發之陽明正別上䪼系目系故至顴窖也平按注顴窖素問王注作四白大迎之骨穴各一左右二十穴也平按素問骨穴作骨空各一下素問有人迎各一四字缺盆外骨各一天窖左右二穴十二也天窖足陽明大絡至此穴也平按素問骨下有空字注天窖素問作天髎膺中骨間各一膺中膺窗也左右二穴十四也平按注膺窗左右二穴素問王注作膺窗等六穴蓋謂氣戶庫房屋翳乳中乳根並膺窗而六也俠鳩尾之外當乳下三寸俠胃腕各五乳根不容承滿梁門關門左右十穴二十四也平按素問腕作脘王注無乳根穴有太乙穴俠齊廣三寸各三太乙滑肉天樞左右六穴三十也平按素問王注無太乙穴有外陵穴滑肉作滑肉門甲乙同下齊二寸俠之各六外陵太巨水道歸來府舍衝門左右十二穴四十二也太陰脈穴更無別數所以亦入陽明也平按素問各六作各三王注只水道太巨歸來三穴無外陵府舍衝門三穴查府舍衝門均屬太陰故本注云云氣街動脈各一氣街左右二穴四十四平按氣街甲乙作氣衝伏兔上各一髀關二穴四十六三里以下至足中指各八輸分上所在穴空井滎等六輸及巨虛上下廉左右十六穴六十二也巨虛上廉足陽明與大腸合巨虛下廉足陽明與小腸合故左右合有十六也平按分上素問作分之手太陽脈氣所發者二十六穴三十錯為二十字也平按二十素問作三十目內眥各一睛明左右二穴巨骨下骨穴各一巨骨左右二穴四也平按巨骨上素問有目外各一鼽骨下各一耳郭上各一耳中各一十八字巨骨下素問無下骨二字曲掖上骨穴各一曲垣左右二穴六也平按注曲垣素問王注作臑俞柱骨出陷者各一肩井二穴八也平按出陷素問作上陷上天容四寸各一足太陽近天容手太陽脈未至天容謂天容字錯未詳所發左右八穴十六平按天容素問作天窗王注謂天窗竅陰四穴本注疑天容字錯考甲乙經天窗手太陽脈氣所發據此則天容乃天窗之誤肩解各一秉風左右二穴十八肩解下三寸者各一天宗臑輸肩貞左右六穴二十四平按素問無者字王注有天宗二穴無臑輸肩貞四穴肘以下至於手小指本各六輸六輸左右十二穴三十六也平按素問無於字手陽明脈氣所發者二十二穴鼻穴外廉項上各一迎香天窗左右四穴天窗去手陽明絡近故得其氣也平按素問鼻穴作鼻空各一作各二素問王注有扶突二穴無天窗二穴大迎骨空各一大迎左右二穴六也柱骨之會各一柱骨左右二穴八也上出柱骨之會上下入缺盆中過此二穴故得其氣也平按注柱骨二穴素問王注作天鼎二穴禺骨之會各一肩髃二穴十也平按素問禺作髃肘以下至手大指次指本各六輸肘下六輸左右十二穴二十二也平按素問王注有三里而遺曲池新校正已辨其誤手少陽脈氣所發者三十三穴鼽骨下各一顴窖二穴平按三十三素問作三十二注窖作髎眉本各一絲竹空左右二穴四也平按素問眉本作眉後角上各一頷厭左右二穴六也平按注頷厭袁刻誤作領厭素問王注作懸釐下完骨後各一天容左右二穴八也平按天容素問王注作天牖項中足太陽之前各一大椎大杼左右及中三穴十一平按注大椎大杼左右及中三穴素問王注作風池二穴扶突各一扶突左右二穴十三也扶突近手少陽經也平按扶上素問有俠字注扶突左右二穴王注謂天窗二穴肩貞各一肩貞左右二穴十五肩貞下三寸分間各一肩窖臑會消濼左右六穴二十一也肩窖臑會近手少陽也平按注肩窖素問王注作肩髎消濼袁刻作消鑠肘以下至手小指次指本各六輸六輸左右十二穴三十三也一曰二十八者數不同也疑其錯督脈氣所發者二十六穴項中央三項中央者項內也非唯當中也故項內下行喑門一天柱二為三也上行風府一風池二為三總有六穴也督脈上入風池即為信也平按二十六素問作二十八中央三作中央二下有髮際後中八面中三八字大椎以下至尻二十節間各一骶下凡二十一節脊椎法骶竹尸反此經音低尾窮骨從骨為正大椎至骶二十一節有二十間間有一穴則二十六穴也明堂從兌端上項下至喑門有十三穴大椎以下至骶骨長強二十一節有十一穴凡二十四穴督脈氣所發與此不同未詳也平按素問至尻下無二十節間各一六字有尾及旁十五穴至七字任脈之氣所發者十八穴喉中央二廉泉天突二穴也平按素問十八作二十八中央二下有膺中骨限中各一七字鳩尾下三寸胃腕五寸胃腕以下下至橫骨八寸一一腹脈法鳩尾以下至橫骨一尺六寸寸有一穴有十六穴並以前有一十八穴也明堂中央任脈氣所發穴合有二十六此經從旋機以下至庭中穴合六此經從旋機以下至橫骨雖發下分寸復與明堂不同亦未詳也平按素問胃腕作胃脘八寸作六寸一一作半一五臟之輸各五凡五十穴足少陰舌下厥陰毛中急脈各一五臟之輸有二十五兩箱合論故有五十足少陰至舌下一穴亦不與明堂同厥陰毛中急脈當是同骨故有五平按素問無五臟之輸各五凡五十穴十字有下陰別一目下各一下唇一齦交一衝脈氣所發者二十二穴俠鳩尾外各半寸至齊寸一俠齊下旁各五分至橫骨寸一腹脈法也五十一字在足少陰上手少陰各一陰陽喬各一手足諸魚際氣所發者凡三百六十五穴手少陰左右二穴陰喬所生照海陽喬所起申脈左右四穴手魚際足魚際足太陰脈太白二十穴總二十六脈有三百八十四穴此言三百六十五穴者舉大數為言過與不及不為非也三百八十四穴乃是諸脈發穴之義若准明堂取穴不盡仍有重取以此骨空平按此篇自篇首至末見素問卷十六第六十骨空論篇自督脈起少腹至治督脈見甲乙經卷二第二又見本書督脈篇黃帝問於岐伯曰余聞風者百病之始也以針治之奈何岐伯曰風從外入令人振寒汗出頭痛身重惡風寒治在風府調其陰陽不足則補有餘則瀉風為百病之源風初入身凡有五種一者振寒二者汗出三者頭痛四者身重五者惡風寒觀虛實取之風府風府受風要處也平按素問無於岐伯三字惡風寒作惡寒注觀上所缺一字謹擬作須大風頸項痛刺風府風府在上椎大風謂眉鬢落大風病也在上椎者大椎上入腦戶而至風府大風汗出灸譩嘻譩嘻在背下俠脊旁三寸所厭之令病者呼譩嘻譩嘻應手從風增風刺眉頭上譩一之反下嘻火之反謂病聲也風起則風病發故曰從風皆取於攢竹也平按增風素問作憎風失枕在肩上之橫骨間失枕為病可取肩上橫骨間謂柱骨間平按素問無之字折使揄臂齊肘正灸脊中除䏚絡季脅引少腹而痛折使中也謂使引臂當肘灸脊中除䏚絡季脅與少腹相引痛病也平按素問䏚上無除字脹刺譩嘻譩嘻在足太陽故大腸脹刺譩嘻也腰痛不可以轉搖急引陰卵刺九窖與痛上九窖在腰尻分間八窖與腰輸為九窖此經窖字音聊空穴也平按素問九窖均作八髎鼠瘻寒熱還刺寒府寒府在膝外解營寒熱府在膝外解之營穴也名曰麩關也瘻音漏也平按膝上素問有附字取膝上外者使之拜取足心者使之跪凡取膝上外解使拜者屈膝伏也取湧泉者屈膝至地身不伏為跪也平按使之跪下素問有任脈者起於中極之下以上毛際循腹裡上關元至咽喉上頤循面入目衝脈者起於氣街並少陰之經俠齊上行至胸中而散任脈為病男子內結七疝女子帶下瘕聚衝脈為病逆氣裡急督脈為病脊強反折凡八十一字督脈起少腹以下骨中央女子入系庭孔其孔溺孔之端骨中尻下大骨空中也下入骨空中女子系尾穴端男子循陰莖也平按素問督脈下有者字起下有於字其絡循陰器合纂間繞纂後別繞臀至少陰與巨陽中絡者合少陰上股內後廉貫脊屬腎與太陽起於目內眥督脈絡也繞陰器合於纂間繞纂後復合然後亦分為二道繞臀至足少陰及足太陽二絡合足少陰之經上陰股後廉至脊屬腎尋足太陽脈從頏顙上至目內眥而出也上額交巔上入絡腦還出別下項循肩髆內俠脊抵腰中入循膂絡腎而止其男子循莖下至纂與女子等從目內眥出已兩道上額至頂上相交已左右入腦中還出兩箱別下項各循肩髆之內俠脊下至腰中各循脊膂還復絡腎從頏顙出兌端上鼻上下項下至骶骨氣發於穴余行之處並不發之穴也平按素問顛作巔絡腎下無而止二字纂作篡說見前注上額至頂頂袁刻作項頏顙袁刻誤作頑顙其少腹直上者貫齊中央上貫心入喉上頤環唇上系兩目之下中央有人見此少腹直上者不細思審謂此督脈以為任脈殊為未當也此生病從少腹上衝心而痛不得前後為沖疝其女子不字𤸇痔遺溺嗌乾督脈生病治督脈此八種病循督脈而生故療督脈之穴也平按素問不字作不孕治在骨上甚者在齊下營以下言療督脈穴骨上量是骶骨骨上督脈標也齊下營者督脈本也營亦穴處也其上氣有音者治其喉中央在缺盆中者有音上氣喘鳴聲也喉中央廉泉也缺盆中央天突穴也其病上衝喉者治漸漸者上俠頤上俠頤者是大迎穴道也平按素問治下有其字蹇膝伸不屈治其楗伸不得屈骨病蹇紀偃反在髀輔骨以上橫骨以下名楗也坐而膝痛治其機俠䯘骨相接之處為機立而暑解治其厭關人立支節解處熱治其厭關厭關骸關也膝骨相屬屈伸之處也平按厭關素問作骸關注骸關上袁刻脫關字膝骨相屬袁刻作痛引膝骨查原抄本膝骨上缺一字膝骨下不缺袁刻將膝骨上所缺一字作痛引二字又將膝骨下相字遺落與原本不合平擬將膝骨上所缺一字作與文義較順膝痛痛及母指治其膕母指小母指也足少陰足太陽皆行膕中至足小指故療其膕也平按母指素問作拇指坐而膝痛如物隱者治其關膕上髀樞為關也膝痛不可屈伸治其背內背內謂足太陽背輸內也連䯒若折治陽明中輸窖膝痛不得屈伸連腳䯒其痛若折者療足陽明中輸謂是巨虛上廉也窖輸穴也平按素問䯒作胻輸窖作俞髎若別治巨陽少陽滎若䯒痛若別可治足太陽足少陽二脈滎穴也平按陽滎素問作陰滎淫濼不能久立治少陽之維在外踝上四寸濼羅各反淫濼膝胻痹痛無力也外踝上五寸足少陽光明穴也少陽維者在四寸中也平按素問淫濼下有脛酸二字外踝上四寸作外上五寸輔骨上橫骨下為楗俠髖為機膝解為骸關俠膝之骨為患骸骸下為輔輔上為膕膕上為關項橫骨為枕膝輔骨上橫骨下為楗當膝解處為骸也項橫骨項上頭後玉枕也髖孔昆反又音完平按素問患骸作連骸項作頭水輸五十七穴者尻上五行行五伏兔上兩行行五左右各一行行六穴前已言水輸今復重言者此言水骨空水輸主骨故重言也平按素問一行下有行五踝上各一行七字髓空腦後三分在顱際兌骨之下一在新纂下一在項中復骨下平按三分趙府本素問作五分腦上有在字兌作鋭新纂作齦基項下有後字一在脊骨上空在風府上脊骨下空在尻骨下空數髓空在面挾鼻或骨空右口下當兩肩兩髆骨空在髆中之陽臂骨空在陽去踝四寸兩骨之間平按素問在陽作在背陽兩骨下有空字股骨上空在股陽出上膝四寸胻骨空在輔骨之上端股際骨空在毛中動脈下尻骨空在髀骨之後相去四寸遍骨有滲理毋髓空易髓無空言骨上有空五穀津液入此骨空資腦髓也此骨空種數所在難分此皆可知者不可知者故置而不數也兩肩有本為唇也平按素問動下無脈字遍骨作扁骨滲理下有腠字毋髓空空字作孔
