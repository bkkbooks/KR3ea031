body:
  text: 卷第十五診候之二色脈診平按此篇自篇首至失神者亡黃帝曰善見素問卷四第十三移精變氣論篇自黃帝曰余聞揆度奇恆至診要畢矣見素問卷四第十五玉版論要篇自診病之始至末見素問卷三第十五臟生成篇又見甲乙經卷六第九五味所宜五臟生病大論又見甲乙經卷四第一下篇黃帝問於岐伯曰余欲臨病人觀死生決嫌疑欲知其要如日月之光可得聞乎聞決死生之要也平按素問無黃帝問於岐伯曰六字注決字袁刻誤作次岐伯曰色脈者上帝之所貴也先師之所傳也上古之時使貸季理色脈而通神明合之金木水火土四時陰陽八風六合不離其常變化相移以觀其妙以知其要上帝上古帝王者也貸季上古真者也上帝使貸季調理人之色脈令通神明外合五行四時陰陽八風六合等物變化常道深觀常道物理之妙能知深妙色脈之用也平按素問上古下無之時二字貸上有僦字六合六字原缺謹依素問補入欲知其要則色脈是矣安生未病之要無加色脈故為要也平按注加字袁刻作如色以應日脈以應月帝求其要則其要已形色外見為陽故應日也脈血內見為陰故應月也日應三百六十日也月應十二月也故知色脈以為要也平按素問帝求作常求要已作要也夫色脈之變化以應四時之勝此上帝之所貴以合於神明也所以遠死而近生也四時和氣為勝上代帝王貴為帝道用合神明以寶於生所以遠死長生久視也平按素問色下無脈字之勝作之脈上道以長命曰聖王上帝理色脈通神明合於常道長生久視者稱曰聖王也平按上道素問作生道中古之治病病至而治之湯液十日以去八風五痹之病未病之病至已方服湯液以其病微故十日病除也平按素問病字不重十日不已治以草荄草荄之枝本末為眇標本已得邪氣乃服荄古來反草根莖也眇亡紹反藥草根莖療病之要也服湯液十日不已可服藥草根莖枝葉丸散醪醴又得病本藥末故邪氣皆伏也平按素問上荄字作蘇為眇作為助暮代之治病也則不然治不本四時不知日月不審逆順病形已成乃欲微針治其外湯液治其內前云上古中古黃帝之時即以為暮代下黃帝曰上古中古當今之時即其信也療病者療已病之病也暮代療病與古不同凡有五別一則不知根尋四時之療二則不知色脈法於日月之異三則不審病之逆順四則不知病成未成五則不知所行療方故欲以微針湯液去其已成之病也平按素問暮代作暮世逆順作逆從粗工凶凶以為可攻舊病未已新病復起凶許容反惡勇也以微針小液攻已成之病更加他病不工而勇於事故曰凶也平按凶下原缺一字應據素問仍作凶袁刻不重舊病素問作故病黃帝曰願聞要道岐伯曰治之要極無失脈色用之不惑治之大則逆順倒行標本不得亡神失國去故就新乃得真人言失知色脈不知損益也平按逆順倒行素問作逆從到行黃帝曰余聞其要於夫子夫子言不離脈色脈色此余之所知也平按脈色二字素問作色脈不重岐伯曰治之極於一黃帝曰何謂一岐伯曰一者因得之黃帝曰奈何岐伯曰閉戶塞牖系之病者數問其情以順其意得神者昌失神者亡黃帝曰善一得神也得神謂問病得其意也得其意者加之針藥去死得生故曰昌也平按素問順作從黃帝曰余聞揆度奇恆所指不同用之奈何岐伯曰揆度者度病之淺深也奇恆者言奇恆病切求其病得其處知其淺深故曰揆度也奇者有病不得以四時死故曰奇也恆者有病以四時死不失其常故曰恆也平按言奇恆病素問作言奇病也請言道之至數五色脈變揆度奇恆道在於一神轉不回回則不轉乃失其機數理也請言道其至理其至理者五色五脈之變揆度奇恆之機道在其一謂之神轉神轉者神清鑑動之謂也若鑑而不動則不通物變故失機平按請素問新校正云全元起本作謂回素問作回至數之要迫近以微著之玉版命曰合生機神動物之理者近於萬物機微之妙故書玉版命曰合於養生之機也平按生機素問作玉機注養生養字袁刻誤作義客色見上下左右各在其要人之五時正王色上相乘色見名曰客色客色見面上下左右各當正色所乘要處者有病也平按客色素問作容色新校正云全元起本容作客其色見淺者湯液主治十日已其見深者必齊主治二十一日已其見大深者醪酒主治百日已其色夭面兌不為治五色各有二種一者生色赤如雞冠二者死色赤如衃血其赤色輕淺不如雞冠此有病也其病最輕故以湯液十日得已赤色復深不如雞冠其病次輕故以湯液二十一日方已赤色大深不如雞冠其病將重故以藥醪百日方瘥赤色如衃血其病必死面兌赤色皆不可瘳也兌尖小謂面瘦無肉也平按色夭上素問無其字治上無為字兌素問作脫夭袁刻作赤百日盡已然脈短氣絕死病溫最甚死色大深者療經百日然脈短氣來絕者亦死病溫脈短氣絕亦死也平按素問已下無然字最作虛色見上下左右各在其要上為逆下為順女子右為逆左為順男子左為逆右為順要色見生病之處謂是色部上下左右也上者部上下者部下左者部左右者部右凡相剋之色見者見部上為逆部下為順見女子部右當要故為逆也見女子部左非其要故為順也見男子部左要處故為逆也見男子部右非其要處故為順也平按順素問作從易重陽死重陰死陰陽反他治在權衡相奪奇恆事也陰陽反他揆度事也陰盛反陽為病陽盛反陰為病還用陰陽權衡虛實補瀉相奪此為奇恆事也直知陰陽反他此為揆度事也平按素問揆度上無陰陽反他四字搏脈痹闢寒熱之交脈動之時二脈相搏附而動不能相去者此為痹闢之病是寒熱之氣相交搏也平按闢素問作躄脈孤為消陰陽之脈各獨見為孤如足少陽脈氣獨見無厥陰者病為消癉也平按注消癉袁刻作消痹虛為泄為奪血病泄利奪血者其脈虛也平按虛為泄素問作氣虛泄孤為逆虛為順陰陽各獨見其時盛者為逆獨見虛者氣易和故為順也行奇恆之法以太陰為始行所不勝曰逆逆則死行所勝曰順順則活太陰肺手太陰脈主氣者也欲行補瀉權衡相奪之法以太陰五行之氣以為始也行五行氣於不勝被他乘克故為逆死也行於所勝能克於他故為順也假令肝病以金療之即行所不勝也以土療之即行所勝也平按素問太陰下無為字順作從八風四時之勝終而復始八風克勝四時代勝平為終始也逆行一過不復數診要畢矣八風四時順行所勝也若逆行一勝為一過也再過為死故不數也假令肝病肺氣來乘為一過再過即死也故不至於數也此為診要理極故為畢也平按素問數上有可字注肺氣袁刻作肺脈診病之始五決為紀欲得其始先建其母所謂五決者五脈也診五臟之脈以知其病故為其母母本也平按素問得作知是以頭痛癲疾下虛上實過在少陰巨陽甚則入腎腎脈足少陰為里臟也膀胱脈足太陽為表腑也少陰在舌本以下太陽在頭故為上也少陰虛太陽實故為頭痛癲疾也此之二脈盛則入臟也平按少陰上素問甲乙有足字巨陽甲乙作太陽注少陰虛陰字袁刻作陽徇蒙招尤目扁虛耳聾下實上虛過在少陽厥陰甚則入肝徇蒙謂眩冒也招尤謂目招搖頭動戰尤也尤音宥過者少陽脈虛厥陰實也平按扁虛未詳素問作冥甲乙作瞑恐系瞑字傳寫之訛少陽上素問甲乙有足字又素問新校正云王注徇蒙言目暴疾而不明義未甚顯徇蒙者謂目瞼瞤動疾數而蒙暗也腹滿䐜脹支鬲胠下厥上冒過在足太陰陽明脾臟胃腑二經病也平按支鬲胠甲乙作支滿胠脅素問作支鬲胠脅䐜袁刻作瞋咳嗽上氣厥在胸中過在手陽明太陰肺臟大腸腑二經病平按厥甲乙作病注云素問作厥心煩頭痛病在鬲中過在手巨陽少陰手太陽上頭故頭痛也心臟小腸腑二經病也後之三脈皆有入臟略而不言也平按此一段甲乙作胸中痛支滿腰脊相引而痛過在手少陰太陽注引素問與本書同夫脈之小大滑澀浮沉可以指別也寸口六脈之形指下得之故曰指別五臟之象可以類推皮肉筋脈骨等五臟外形故為象也五脈為五象之類推脈可以知也平按注五象袁刻作五臟上醫相音可以意識五色微診可以目察能合脈色可以萬全耳聽五音目察五色以合於脈用此三種候人病者所為皆當故得萬全也平按上醫素問作五臟赤脈之至也喘而堅診之有積氣在中時害於食名曰心痹心脈手少陰屬火色赤故曰赤脈赤脈夏脈夏脈如鉤其氣來盛去衰以為平好今動如人喘又堅故有積氣在胸中滿悶妨食名曰心痹積者陰氣聚者陽氣積者五臟所生聚者六腑所成積者其始有常處聚者發無根本無所留止也平按診之素問甲乙作診曰得之外疾思慮而心虛故邪從之得之急疾思慮外事勞傷心虛邪氣因襲不從內傳以為痹也平按注心虛心字原缺謹依經文作心白脈之至也喘而浮上虛下實驚有積氣在胸中喘而虛名曰肺痹寒熱肺脈手太陰屬金也色白故曰白脈白脈秋脈秋脈如浮其氣來輕虛以浮來急去散以為平好今雖得浮然動如人喘即知肺氣並心心實故驚肺虛故有積氣在於胸中出氣多噓名曰肺亦以肺虛故病寒熱也平按驚有有字甲乙作為得之醉而使內以因酒醉力意入房喘呼傷肺之所致也黃脈之至也大而虛有積氣在腹中有厥氣名曰厥疝女子同法脾脈足太陰屬土色黃故曰黃脈黃脈好者代而不見惡者見時脈大而虛即知積氣在於腹中腹中厥氣名曰厥疝男女同病平按黃脈一段素問在青脈一段下注同病袁刻同誤作內得之疾使四肢汗出當風脾主四肢急促用力四肢汗出受風所致青脈之至也長而左右彈有積氣在心下支胠名曰肝痹肝脈足厥陰屬木色青故曰青脈青脈春脈春脈如弦氣來濡弱軟虛而滑端直以長以為平好今青脈至長而左右彈即知有積氣在心下支胠而妨名曰肝痹平按甲乙左上有弦字注妨下袁刻有食字得之寒濕與疝同法腰痛足清頭痛得之因於寒濕足冷而上以成其病與疝病同足厥陰脈從足循少腹上頭故腰足頭痛平按甲乙注云一本雲頭脈緊黑脈之至也上堅而大有積氣在腹中與陰名曰腎痹腎脈足少陰屬水色黑故曰黑脈黑脈冬脈冬脈如營其氣來沉而搏以為平好今黑脈至上堅而大即知有積氣在腹中及陰中名曰腎痹平按腹中素問作小腹甲乙作少腹得之沐浴清水而臥得之因以冷水沐發及洗浴而臥也凡相五色之奇脈面黃目青面黃目赤面黃目白面黃目黑者皆不死相前五色異脈先相於面五色者見面得黃色目之四色見於面者以土為本故皆生平按注以土為本袁刻土作上面青目赤肝病心乘名曰實邪面赤目白心病肺乘名曰微邪面青目黑肝病腎乘名曰虛邪面黑目白腎病肺乘亦曰虛邪面赤目青者心病肝乘名曰虛邪平按素問無者字皆死此之五色皆為他克不得其時不療皆死但色難知且依一義如此也平按素問死字下有也字色脈尺診平按此篇自篇首至末見靈樞卷一第四邪氣臟腑病形篇又見甲乙卷四第二上篇黃帝曰邪之中人其病形何如岐伯答曰虛邪之中身也洫泝動形正邪之中人也微先見於色不知於身若有若無若亡若存有形無形莫知其情黃帝曰善虛邪謂八虛邪風也正邪謂四時風也四時之風生養萬物故為正也八虛之風從虛鄉來傷損於物故曰虛風虛正二風性非穀氣因腠理開輒入故曰邪風虛邪中人入腠理如水逆流於洫毛立動形故為人病正邪中人微而難識先見不覺於身故輕而易去也平按甲乙無黃帝曰至岐伯答曰十六字洫泝靈樞甲乙作灑浙甲乙無若有若無四字黃帝問岐伯曰余聞之見其色知其病命曰明按其脈知其病命曰神問其病而知其處命曰工余願聞之見而知之按而得之問而極之為之奈何察色之明按脈之神審問之工為診之要故並請之平按甲乙無此一段及下岐伯答曰四字問其病問字原抄作間謹依靈樞及本注作問岐伯答曰夫色脈與尺之相應也如桴鼓影響之相應也不得相失也桴伏留反擊鼓槌也答中色脈及尺以為三種不言問也色謂面色脈謂寸口尺謂尺中也五臟六腑善惡之氣見於色部寸口尺中三候相應如槌鼓形影聲響不相失也如肝色面青寸口脈弦尺膚有異內外不相失也平按尺之下甲乙有皮膚二字此亦本末根葉之出候也故根死則葉枯矣此則尺地以為根莖色脈以為枝葉故根死枝葉枯變平按甲乙根上無故字注莖袁刻作基色脈形肉不得相失也形肉即是尺之皮膚色脈尺膚三種不相失也故知一則為工知二則為神知三則神且明矣故但知問極一者唯可為工知問及脈二者為神知問及脈並能察色稱曰神明也平按注可原作有旁改作可袁刻可有二字並列非是黃帝問曰願卒聞之岐伯答曰平按甲乙無色脈形肉至岐伯答曰三十九字色青者其脈弦青為肝色弦為肝脈故青弦為肝表也問色脈尺三種之異今但答色脈不言尺者以尺變同脈故也色赤者其脈鉤赤為心色鉤為心脈赤鉤為心表也色黃者其脈代黃為脾色代為脾脈黃代為脾表也色白者其脈毛白為肺色毛為肺脈白毛為肺表也色黑者其脈石黑為腎色石為腎脈黑石為腎表也石一曰堅堅亦石也見其色而不得其脈反得其相勝之脈則死矣假令肝病得見青色其脈當弦反得毛脈是肺來乘肝被克故死餘臟准此也得其相生之脈則病已矣假令肝病見青色雖不見弦而得石脈石為腎脈是水生木是得相生之脈故病已也黃帝問岐伯曰五臟之所生變化之病形何如岐伯答曰必先定其五色五脈之應其病乃可別也欲知五臟所生變化之病先定面之五色寸口五脈即病可知矣黃帝問曰色脈已定別之奈何岐伯答曰調其脈之緩急小大滑澀而病變定矣雖得本臟之脈而一脈便有六變觀其六變則病形可知矣平按小大甲乙作大小病變作病形注矣字袁刻脫黃帝問曰調之奈何岐伯答曰脈急者尺之皮膚亦急脈急者寸口脈急也尺之皮膚者從尺澤至關此為尺分也尺分之中關後一寸動脈以為診候尺脈之部也一寸以後至尺澤稱曰尺之皮膚尺皮膚下手太陰脈氣從臟來至指端從指端還入於臟故尺下皮膚與尺寸脈六變同也皮膚者以手捫循尺皮膚急與寸口脈同脈緩者尺之皮膚亦緩寸口脈緩以手捫循尺皮膚緩也脈小者尺之皮膚亦減而少氣寸口脈小尺之皮膚減而少氣也脈大者尺之皮膚亦賁而起寸口脈大尺之皮膚賁起能大一曰亦大疑是人改從大平按亦賁而起甲乙作亦大脈滑者尺之皮膚亦滑按寸口脈滑即尺皮膚亦滑平按脈滑上甲乙有脈沉者尺之皮膚亦沉九字脈澀者尺之皮膚亦澀寸口脈來蹇澀尺之皮膚亦澀不滑也凡此六變者有微有甚故善調尺者不待於寸口寸口與尺各有六變而六變各有微甚可審取之前調寸口脈六變又調於尺中六變方可知病若能審調尺之皮膚六變即得知病不假診於寸口也平按靈樞甲乙變上無六字寸下無口字善調脈者不待於色善調寸口之脈知病亦不假察色而知也能參合而行之者可以為上工上工十全九行二者為中工中工十全七行一者為下工下工十全六察色診脈調尺三法合行得病之妙故十全九名曰上工但知尺寸二者十中全七故為中工但明尺一法十中全六以為下工也平按甲乙上工中工下工不重全下均有其字尺診平按此篇自篇首至末見靈樞卷十一第七十四論疾診尺篇又見甲乙經卷四第二上篇惟編次小異黃帝問於岐伯曰余欲無視色持脈獨調其尺以言其病從外知內為之奈何無視面之五色無持寸口之脈唯診尺脈及尺皮膚帝欲從外知內病生所由岐伯答曰審其尺之緩急小大滑澀肉之堅脆而病形定矣尺之緩急等謂尺脈及尺皮膚緩急小大滑澀六種別也肉堅脆者謂尺分中肉之堅脆也知此八者即內病可知也平按注即內病即字袁刻誤作知視人之目果上微癰如新臥起狀其頸脈動時咳按其手足上窅而不起者風水膚脹也目果眼瞼也癰微腫起也頸脈足陽明人迎也動不以手按之見其動也窅焉蓼反深也不起者手足腫脈按之久而不起如按泥也此為風水膚脹者平按目果靈樞作目窠甲乙無自黃帝問至膚脹也一段尺濕以淖澤風也尺分之中有潤故濕也淖澤光澤也此風之候也平按尺下靈樞甲乙有膚字濕靈樞作滑甲乙作溫注云一作滑以靈樞作其尺肉弱者解㑊安臥解㑊懈惰也尺肉耎弱者身體懈惰而欲安臥平按㑊下甲乙有也字脫肉者寒熱不治骨寒熱病羸瘦脫肉不可療也平按甲乙熱下有也字無不治二字注云一本下作不治尺膚滑澤脂者風也尺之膚滑而潤澤有脂者內有風也平按靈樞滑下有而字甲乙無滑脂二字風下有痹字尺膚澀者風痹尺膚澀者內寒故有風痹也平按甲乙無此句尺膚粗如枯魚之鱗者水泆飲也泆飲謂是甚渴暴飲水泆腸胃之外皮膚之中名曰泆飲尺分之膚粗如魚鱗者以為候也尺膚熱甚脈盛躁者病濕也尺分皮膚甚熱其一寸之內尺脈盛躁濕病候也平按濕靈樞甲乙作溫依下篇尺寸診云尺熱曰病溫應作溫袁刻亦作溫其脈盛而滑者汗且出也一寸之內尺脈盛而滑者汗將出平按靈樞汗作病尺膚寒甚脈小者泄少氣也尺膚冷尺脈小者其病泄利又少氣也平按甚靈樞作其甲乙脈小作脈急注云一作小尺膚火匡然先熱後寒者寒熱也按尺皮膚先熱後冷病寒熱也平按火匡然靈樞作炬然甲乙作燒灸人手四字注云一作炬然尺膚先寒久持之而熱者亦寒熱候者也尺皮膚先冷久持乃熱亦是寒熱之病也平按靈樞甲乙無候字肘所獨熱者腰以上熱當肘皮膚獨熱者即腰以上至頭熱也手所獨熱者腰以下熱肘前獨熱者膺前熱腕以前為手也手之獨熱主腰以下熱從肘向手為肘前獨熱者主胸前熱也平按腰以下甲乙作腰以上注云一作下肘後獨熱者背熱從肘向肩為肘後肘後皮膚熱者主肩背熱也平按背上靈樞甲乙有肩字臂中獨熱者腰腹熱從肘至腕中間為臂當臂中央熱腰腹熱也肘後粗以下三四寸者腹中有蟲從肘後下向臂三四寸許皮膚粗起是腹中有蟲之候也平按粗甲乙作廉靈樞甲乙寸下有熱字腹均作腸掌中熱者腸中熱掌中寒者腹中寒掌中冷熱主大腹小腹冷熱平按腸靈樞甲乙作腹魚上白肉有青血脈者胃中有寒青脈主寒故胃中寒平按魚上甲乙作魚際尺火匡然熱人迎大者當奪血尺之皮膚火匡然而熱喉邊人迎復大於常者奪血之候也平按甲乙尺下有膚字火匡靈樞甲乙作炬尺堅大脈小甚少氣悗有因加立死尺之皮膚堅而賁大寸脈反少主於少氣而悗若更因加少氣悗者立當死也平按甚下甲乙有則字靈樞無因字有因加甲乙作有加者注反少依經文應作反小尺寸診平按此篇自篇首至末見素問卷五第十八平人氣象論篇又見甲乙經卷四第一惟編次小異黃帝問岐伯曰平人何如對曰人一呼脈再動人一吸脈亦再動命曰平人平人者不病也醫不病故為病人平息以論法也平人病法先醫人自平一呼脈再動一吸脈再動是醫不病調和脈也然後數人之息一呼脈再動一吸脈再動即是彼人不病者也若彼人一呼脈一動一吸脈一動等名曰不及皆有病也故曰醫不病為病人平息者也平按素問甲乙一吸上無人字命曰上有呼吸定息脈五動閏以太息十一字醫不病上素問有常以不病調病人七字甲乙有常以不病之人以調病人十字以論法也素問作以調之為法五字甲乙作以調之三字人一呼脈一動人一吸脈一動者曰少氣呼吸皆一動名曰不及故知少氣平按一吸上素問甲乙無人字人一呼脈三動一吸脈三動而躁及尺熱曰病溫尺不熱脈滑曰風澀曰痹脈之三動以是氣之有餘又加躁疾尺之皮膚復熱即陽氣盛故為病溫病溫先夏至日前發也若後夏至日發者病暑也一呼三動而躁尺皮不熱脈滑曰風脈澀曰痹也平按甲乙無一吸脈三動五字躁下素問甲乙無及字風上有病字素問澀上有脈字甲乙無澀曰痹三字人一呼脈四至曰死四至陽氣獨盛陰氣絕衰故死平按四至素問作四動以上甲乙同脈絕不至曰死以手按脈一來即絕更不復來故死乍疏乍數曰死乍疏曰陰乍數曰陽陰陽動亂不次故曰死也平人之常氣稟於胃胃者平人之常氣也人無胃氣曰逆逆曰死和平之人五臟氣之常者其氣各各稟承胃氣一一之臟若無胃氣其脈獨見為逆故致死平按無胃氣上甲乙作人常廩氣於胃脈以胃氣為本十二字春胃微弦曰平胃者人迎胃脈也五臟之脈弦鉤代浮石皆見於人迎胃脈之中胃脈即足陽明脈主於水谷為五臟六腑十二經脈之長所以五臟之脈欲見之時皆以胃氣將至人迎也胃氣之狀柔弱是也故人迎五脈見時但弦鉤代毛石各各自見無柔弱者即五臟各失胃氣故脈獨見獨見當死春脈胃多弦少曰微微曰平人弦多胃少曰肝病弦多胃少即肝少穀氣故曰肝病也但弦無胃曰死肝無穀氣致令肝脈獨見故死也胃而有毛曰秋病春胃見時但得柔弱之氣竟無有弦然胃中有毛即是肝時有肺氣來乘以胃氣弦故至秋有病平按注故至秋故字袁刻誤作欲毛甚曰金病春得毛脈甚於胃氣以金剋火故曰金病也平按金素問甲乙作今注火字恐系木字傳寫之訛臟真散於肝肝臟筋之氣臟真者真弦脈也弦無胃氣曰散弦脈不能自散以其肝臟散無胃氣所以真臟散於肝也故肝藏神藏於魂也肝藏氣者藏筋氣也平按素問甲乙筋下有膜字夏胃微鉤曰平夏脈人迎胃多鉤少曰微鉤微鉤曰平也鉤多胃少曰心病心病食少穀氣少令脈至人迎鉤多胃少故知心病也平按注令字袁刻作今但鉤無胃曰死心病害食心無穀氣致令鉤無胃氣故死胃而有石曰冬病心火也夏心王時遂得腎脈雖有胃氣唯得石冬時當病以水剋火石甚曰今病夏有胃氣雖得石脈至秋致病今夏得石脈甚少胃氣賊邪來克故曰今病藏真痛於心心藏血脈之氣心無胃氣即心有痛病致令藏真脈見人迎故曰臟真痛於心也故心藏神藏於神氣也心藏氣藏血脈之氣也平按痛素問甲乙作通長夏胃微耎弱曰平胃少弱多曰脾病耎而免反柔也長夏六月也脾行胃氣以灌四臟故四臟脈至於人迎皆有胃氣即四臟平和也若脾病不得為胃行氣至於人迎即四臟之脈各無胃氣故四臟有病也問曰長夏是脾用事此言胃氣不言脾者何也答曰脾為其君不可自見是以於長夏時得胃氣者即得脾氣故於長夏胃氣見時微有不足名曰平好若更胃少復虛弱者即是脾病致使胃氣少而虛弱也平按胃少弱多素問作弱多胃少甲乙作耎弱注為胃行氣袁刻作氣行若更胃少復虛弱者袁刻胃作至復作腹但代無胃曰死人之一呼出心與肺脈有二動一吸入肝與腎脈有二動人呼吸已定息之時脾受氣於胃輸與四臟以為呼吸故當定息脾受氣時其脈不動稱之曰代代息也當代之時胃氣當見若脈代時無胃氣則脾無穀氣所以致死也耎弱有石曰冬病長夏脾胃見時中有腎脈是為微邪來乘不已至秋當病也平按注至秋秋字依經文應作冬弱甚曰今病脾胃之脈虛弱其穀氣微少故即今病也平按弱甲乙作耎注云素作弱臟真傳於脾脾藏肌肉之氣脾臟真脈謂之唯代之無胃氣唯代之脈從脾傳來至於人迎也故脾臟藏神藏於意也脾臟藏氣藏肌肉氣也平按傳素問甲乙作濡注之無胃氣之字袁刻作若秋胃微毛曰平秋時人迎胃多毛少曰平人也胃少毛多曰肺病穀氣少也平按胃少毛多素問甲乙作毛多胃少但毛無胃曰死真臟見脈毛而有弦曰春病肝來乘肺是邪來乘不已至春木王之時當病平按注是邪依上下注應作微邪弦甚曰今病有胃無毛但有弦者是木反剋金故曰今病臟真高於肺以行營衛陰泄曰死臟真之脈見時高於肺藏和平之氣高過也肺為陰也無胃之氣既過肺之和氣即是肺傷肺主行營衛肺既傷已即是陰氣泄漏故致死也平按陰泄曰死素問甲乙作陰陽也三字冬胃微石曰平冬人迎脈胃耎弱氣多石脈微者名曰平人胃少石多曰腎病腎少穀氣故令耎弱氣少堅石脈多故知腎病平按胃少石多素問作石多胃少但石無胃曰死臟真脈見故致死也石而有鉤曰夏病石脈水也鉤脈火也石脈見時有鉤見者微邪來乘不已至夏當病也鉤甚曰今病雖有胃氣鉤甚所以今病也臟真下於腎腎藏骨髓之氣腎為五臟和氣之下今腎無胃氣乃過下於腎也故腎臟藏神藏於志也腎臟藏氣骨髓氣也自此以上即是人迎胃脈候五臟氣也胃之大絡名曰虛里貫鬲絡肺出於左乳下其動應衣下診胃絡之脈虛音墟虛里城邑居處也此胃大絡乃是五臟六腑所稟居處故曰虛里其脈出左乳下常有動以應衣也平按應衣甲乙作應手注胃絡之脈脈字原缺右方左方有月字當是脈字袁刻作法脈宗氣盛喘數絕者則病在中宗尊也此之大絡一身之中血氣所尊故曰宗氣其脈動如人喘數而絕者病在臟中也平按脈宗氣素問作脈宗氣也甲乙作脈之宗氣也結而橫有積矣此脈結者腹中有積居也積陰病也絕不至曰死此虛里脈來已更不復來是胃氣絕所以致死平按曰死下素問有乳之下其動應衣宗氣泄也十一字新校正云按全元起本無此十一字甲乙經亦無本書在後欲知寸口脈太過與不及寸口之脈中手短者曰頭痛上來診人迎法以下診寸口法故曰欲知診寸口之脈有病唯有太過與不及也口者氣行處也從關至魚一寸之處有九分之位是手太陰氣所行之處故曰寸口其脈之動不滿九分故曰短也短者陽氣不足故頭痛也平按甲乙無欲知寸口脈太過與不及十字乳之下其動應於衣宗氣泄乳下虛里之脈若陽氣盛溢其脈動以應衣是為宗氣泄溢者也寸口之脈中手長者足脛痛寸口之脈過九分以上曰長長者陽氣有餘陰氣不足故脛痛也喘數絕不至曰死長而喘所以致死平按素問無此句寸口脈中手如從下上擊者曰肩背痛脈從下向上擊人手如從下有物上擊人手是陽氣盛陽脈行於肩背故知肩背痛也平按如從下上擊者素問作促上擊者甲乙作促上數者注云素問作擊又按從下下字袁刻作物寸口脈中手沉而緊者曰病在中沉緊者陰脈也病在於臟故沉緊也平按素問無中手二字緊作堅寸口脈浮而盛者病在外浮盛陽也病在於腑故浮盛也寸口脈沉而弱曰寒熱及疝瘕少腹痛沉陰氣盛也弱陽氣虛也陰盛陽虛故有寒熱疝瘕病少腹痛也寸口之脈沉而橫堅曰胠下有積腹中有橫積痛其脈沉橫而堅者陰盛故知胠下有積積陰病也橫指下脈橫也胠側箱即下穴處也又其陰病少腹中有橫積也平按素問無堅字胠下素問甲乙作脅下甲乙沉作緊注云素問作沉而橫腹中上甲乙無有積二字注即下穴處也別本作腋下耎處也寸口脈盛滑堅者病曰甚在外寸口陽也滑亦陽也堅為陰也陽盛陰少故病曰甚在六腑也平按寸口下素問有脈沉而喘曰寒熱七字本書在後脈小實而堅者病曰甚在內小實為陰堅亦為陰故病曰甚在五臟也平按素問無曰甚二字有胃氣而和者病曰無他寸口之脈雖小實堅若有胃氣和之雖病不至於困也平按素問無此條甲乙有胃氣上有病甚二字脈小弱以澀者謂之久病小弱以澀是陰陽虛弱故是久病脈澀浮而大疾者謂之新病澀為陰也浮大陽也其脈雖澀而浮流利即知新病平按澀浮而大疾素問作滑浮而疾甲乙作浮滑而實大注云素問作浮而疾脈滑曰風氣虛而行利即是風府之候也平按素問脈滑上有脈急者曰疝瘕少腹痛九字本書在後注風府別本作風病脈緩而滑曰熱中緩滑陽也指下如按緩繩而去來流利是熱中候者脈澀曰痹澀陰也按之指下澀而不利是寒濕之氣聚為痹也脈盛而緊曰脹寸口脈盛緊實者是陰氣內積故為脹也脈順陰陽病易已人迎脈口大小順四時者雖病易愈也平按順素問作從脈逆陰陽脫者病難已人迎寸口大小不順四時既逆陰陽故病難已也平按素問無脫者二字脈逆四時病難已春夏人迎小於寸口秋冬寸口小於是人迎即知是脈反四時故病難已也平按此條素問作脈得四時之順曰病無他脈反四時及不間藏曰難已甲乙同惟脈字作按寸口三字難已作死脈急者曰疝瘕少腹痛按其脈如按弓弦是陰氣積故知疝瘕少腹痛也寸口脈沉而喘曰寒熱沉陰氣也脈動如人喘者是為陽也即知寒熱也平按素問此條在前有橫積痛下臂多青脈曰脫血臂尺地也尺地絡脈青黑為寒即知脫血以其陽虛陰盛乘陽故脈青尺脈緩澀者謂之解㑊安臥緩為陽也澀為陰以從關至尺取一寸以為尺部尺部又陰以陰氣多懈惰安臥也平按注以從關以字袁刻脫尺脈盛謂之脫血尺脈盛謂陰氣盛陽氣虛故脫血也平按上安臥二字素問王注作屬下尺脈盛解釋尺澀脈滑謂之多汗尺之皮膚粗澀尺之脈滑是謂陽盛陰虛數故泄汗也尺寒脈細謂之後泄尺之皮膚冷尺脈沉細是為內寒故後泄也脈尺粗常熱者謂之熱中脈之尺地皮膚粗又常熱是其熱中也肝見庚辛死心見壬癸死脾見甲乙死肺見丙丁死腎見戊己死是謂真臟見皆死真臟各見被克之時故皆死也頸脈動疾喘咳曰水頸脈是胃脈人迎也人迎常動今有水病故動疾可見喘咳也有本為腎脈動也目果微腫如臥起之狀曰水目果目上下瞼也瞼之微腫水之候平按素問果作裹臥下有蠶字足脛腫曰水寒濕氣盛故足脛腫水之候也目黃者曰黃疸也三陽脈在目故黃疸熱病目為黃也疸多但反平按足脛二句素問在面腫曰風之下溺黃安臥者曰黃疸腎及膀胱中熱安臥不勞者黃疸病候也平按素問黃下有赤字已食如飢者胃疸也胃中熱消食故已食如飢胃疸病面腫曰風風陽也諸陽在面故風病面先腫也女子手少陰脈動甚者任子也手少陰脈心經脈也心脈主血女子懷子則月血外閉不通故手少陰脈內盛所以動也平按素問任作妊注月血袁刻作經血脈有逆順四時未有臟形寸口人迎且逆且順即四時未有真臟脈形也春夏而脈瘦者秋冬浮大春夏人迎微大為順今反瘦小為逆秋冬人迎微小為順今反浮大為逆也平按浮大下素問有命曰逆四時也六字風逆而脈盛脈盛者風熱之病也平按盛素問作靜泄而脫血風熱之病虛故多脫泄血脫也脈實者病在中是陽虛陰實故病在五臟平按素問脈實二字屬上文實下無者字脈虛者病在外陰虛陽實故病在六腑也平按素問脈虛二字屬上文虛下無者字脈澀堅皆難治命曰反四時者也脈澀及堅二者但陰無陽故皆難療名曰反四時之脈也平按素問新校正云自前未有臟形春夏至此五十三字與後玉機真藏論文相重本書見十四卷四時診脈篇人以水穀為本故人絕水穀則死反四時之脈無水穀之氣者致死脈無胃氣亦死所謂無胃氣者但得真臟脈不得胃氣也所謂肝不弦腎不石也雖有水穀之氣以臟有病無胃氣者肝雖有弦以無胃氣不名乎弦也腎雖有石以無胃氣不名乎石故不免死也平按肝不弦上素問有脈不得胃氣者六字太陽脈至鴻大以長以手按人迎脈鴻大以長者是太陽也即手足太陽小腸膀胱脈之狀也平按鴻素問甲乙作洪注人迎脈別本作尺脈少陽脈至乍疏乍數乍短乍長按之乍疏乍數乍短乍長者少陽脈也即手足少陽三焦及膽脈之狀平按乍疏乍數素問甲乙作乍數乍疏陽明脈至浮大而短是謂三陽脈也按之浮大而短者陽明脈也即手足陽明胃及大腸之候也是謂三陽脈之形平按素問甲乙無是謂三陽脈也六字素問新校正云詳無三陰脈應古文闕也按難經云太陰之至緊大而長少陰之至緊細而微厥陰之至沉短以敦五臟脈診平按此篇自肝脈弦至是謂五臟脈見素問卷七第二十三宣明五氣篇又見甲乙經卷四第一經脈上篇自平心脈來至腎死見素問卷五第十八平人氣象論篇甲乙同上自岐伯曰心脈揣堅而長至身寒有痹見素問卷五第十七脈要精微論篇又見甲乙經卷四第一中下篇自黃帝曰請問脈之緩急至調其甘藥見靈樞卷一第四邪氣臟腑病形篇又見甲乙經卷四第二病形脈診下篇自肝滿腎滿至末見素問卷十三第四十八大奇論篇自肝滿腎滿至偏枯又見甲乙經卷十一第八自心脈滿大至末又見甲乙經卷四第一經脈下篇肝脈弦心脈勾脾脈代肺脈毛腎脈石是謂五臟脈肝心脾三脈素問九卷上下更無別名肺脈稱毛又名浮腎脈稱石又名營是五脈同異若隨事比類名乃眾多也平按素問肝脈上有五脈應象四字五臟下有之字甲乙無是謂五臟脈五字平心脈來累累如連珠如循琅玕曰心平心脈夏脈也夏日萬物榮華故其脈來累累如連珠以手按之如循琅玕之珠以為平和之脈也而稱勾者曲也珠連高下不如弦直故曰勾也平按素問平心脈上有夫字甲乙無平字曰心平作曰平夏以胃氣為本胃為五臟資糧故五時之脈皆以胃氣為本也病心脈來喘喘連屬其中微曲曰心病病心脈來動如人喘息連屬然指下微覺曲行是謂心之病脈者也平按甲乙無夏以胃氣為本病心脈來十字喘喘作累累曰心病作曰病下同死心脈來前曲後居如操帶勾曰心死心脈來時按之指下覺初曲後直如操捉帶勾前曲後直曰心死脈居直也平按甲乙無死心脈來四字前曲作前鉤曰心死作曰死下同平肺脈來厭厭聶聶如落榆莢曰肺平秋以胃氣為本厭伊葉反聶尼䔾反厭厭聶聶如人以手按已落榆莢得之指下者曰肺平脈也平按甲乙平肺脈來作肺脈來落榆莢作循榆葉曰肺平作曰平無秋以胃氣為本六字病肺脈來不下不上如循雞羽曰肺病按於毛脈如人以手摩循雞翅之羽得於心者以為肺之病脈也平按甲乙無病肺脈來四字不下不上素問作不上不下甲乙同死肺脈來如物之浮如風之吹毛曰肺死脈之動也如芥葉之浮於水若輕毛而逐風移如斯得者曰死脈者也夫五色有形目見為易五聲無形耳知為難五脈之動非耳目所辨斯最微妙唯可取動指下以譬喻之亦得在於神不可以事推之也平按甲乙無死肺脈來四字素問吹上無之字甲乙同注以譬喻之亦得在於神之亦二字原抄作亦知二字平按亦知恐系之亦二字顛倒謹擬作之亦之字屬上句讀平肝脈來濡弱招招如揭長竿曰肝平春以胃氣為本揭奇哲反高舉也肝之弦脈獨如琴瑟調和之弦不緩不急又如人高舉行竿之梢招招勁而且耎此為平也平按甲乙肝脈上無平字素問濡作耎竿下有末梢二字甲乙同無春以胃氣為本六字病肝脈來盈實而滑如循長竿曰肝病盈滿實也肝氣實滑如循長竿少於胃氣故肝有病也平按甲乙無病肝脈來四字死肝脈來急而益勁如新張弦曰肝死肝真臟脈來勁急猶如新張琴瑟之弦無有濡弱是無胃氣故為死候也平按甲乙無死肝脈來四字素問弦上有弓字甲乙同平脾脈來和柔相離如雞踐地曰脾平長夏以胃氣為本按脾脈和柔胃氣也相離中間空者代也如雞行踐地跡中間空也中間代者善不見也平按甲乙脾脈上無平字曰下無脾字無長夏以胃氣為本七字脈下袁刻脫來字病脾脈來實而盈數如雞舉足曰脾病實而盈數如雞之舉足爪聚中間不空聚而惡見比之無代故是脾病也平按甲乙無病脾脈來四字曰下無脾字死脾脈來堅兌如鳥之喙如鳥之距如水之流如屋之漏曰脾死按脾脈來堅尖聚兌而不相離上觸人指如鳥喙如水流動如屋漏之滴人指脾脈死候也平按甲乙無死脾脈來四字堅兌素問作銳堅鳥之喙素問甲乙鳥作烏千金作雞如屋之漏素問甲乙在如水之流上平腎脈來喘喘累累如旬按之而堅曰腎平冬以胃氣為本旬平也手下堅實而平此為石脈之形故為平也有本為揣揣果果之也平按甲乙腎脈上無平字如旬素問作如鉤甲乙同曰下甲乙無腎字無冬以胃氣為本六字病腎脈來如引葛按之而益堅曰腎病腎之病脈按之如按引葛逐指而下也益堅始終堅者是謂腎平初耎後堅故是腎病也平按甲乙無病腎脈三字曰下無腎字死腎脈來發如奪索辟辟如彈石曰腎死腎之石脈來指下如索一頭系之彼頭控之索奪而去如以彈石彈指辟辟之狀是腎之死脈候也平按甲乙無死腎脈來四字曰下無腎字發字袁刻脫岐伯曰心脈揣堅而長當病舌卷不能言揣動也長謂寸口脈長一寸也此為心脈盛動堅心脈上至舌下故盛動堅舌卷不能言平按素問甲乙無岐伯曰三字揣素問作搏下同甲乙無當字其耎而散者當消渴自已動而堅者病舌卷耎而散者病消渴以有胃氣故自已由手少陰貫腎絡肺系舌本故也平按甲乙當作病素問消渴作消環新校正云甲乙環作渴肺脈揣堅而長當病唾血肺脈浮短今動堅長知血絡盛傷故唾血也平按甲乙無當字其耎而散者當病灌汗至令不復散發以肺氣虛故脈耎散也虛故腠理相逐汗出如灌至令不復也平按甲乙無當字素問至令作至今肝脈揣堅而長色不青當病墜若搏因血在脅下令人善喘肝脈耎而弦今動堅而長其色又不相應者是人當有墜傷墜傷損血在脅下又令喜喘故也平按甲乙無當字素問甲乙善喘作喘逆若耎而散者其色澤當病溢飲溢飲者渴暴多飲而易入肌皮腸胃之外易音亦若脈耎散色又光澤者當因大渴暴飲水溢腸胃之外易入肌皮之中名曰溢飲之病也平按若耎而散其色澤素問甲乙作其耎而散色澤者甲乙暴渴作渴渴易作溢胃脈揣堅而長其色赤當病折髀胃脈耎弱今動堅長又他色來克當病折髀以足陽明脈行髀故也平按甲乙無當字其耎而散者當病食痹臏痛胃虛不消水穀故食積胃中為痹而痛又脈行膝故病膝臏痛臏膝端骨也平按素問無臏痛二字甲乙無當字臏痛作痛髀脾脈揣堅而長其色黃當病少氣脾脈耎弱今動堅長雖得本色以其陽虛故病少氣平按甲乙無當字注陽虛袁刻作陽盛其耎而散色不澤者當病足胻腫若水狀足太陰脈循胻故脾虛色不澤者胻腫若水之狀也平按甲乙無當字腎脈揣堅而長其色黃而赤當病折腰腎脈沉石今動堅長黃色賊邪及赤色微邪來克故病腰痛以足少陰脈營腰故也平按素問赤下有者字甲乙有者字無當字其耎而散者當病少血至今不復陰盛太陽氣虛故少血得之在久至今不復也平按甲乙無當字今作令以下素問有帝曰論得心脈至以其勝治之愈也百六十七字新校正云此一段全元起本在湯液篇據此則本書無此一段與全元起本同黃帝問於岐伯曰故病五臟發動因傷色各何以知其久暴至之病乎其病發於五臟有傷其候五色何以知其久病新暴之別平按素問黃帝問於岐伯曰作帝曰曰下有有字傷下有脈字甲乙無此一段岐伯對曰悉乎哉問也故其脈小色不奪者新病也邪始入於五脈故脈小未甚傷於血氣故部內五色不奪是知新病平按素問故作徵下同甲乙無岐伯至故其十一字故其脈不奪其色奪者久病也脈為其本色為標也本受邪氣已方受與標故脈本不奪色甚奪者知是久病平按甲乙無故字及二其字故其脈與五色俱奪者此久病也內之五脈外之五色二俱奪者知病已成在久平按甲乙無故其二字久上無此字故其脈與五色俱不奪者新病也人之有病五脈五色二俱不奪者其病未行血氣故知新病也平按甲乙無故其二字故肝與腎脈並至其色蒼赤當病擊傷不見血見血而濕若水中也弦石俱至而色見青赤其人當病被擊內傷其傷見色故青赤也若被擊出血血濕若居水中者此為候也平按素問甲乙肝上無故字見血而濕作已見血濕尺內兩旁則季脅也從關至尺澤為尺也季脅之部當在尺中央兩旁不在尺外兩旁季脅有病當見此處尺外以候腎尺中兩旁之外以候兩腎之有病當見此部也尺裡以候腹中自尺內兩中間總候腹中跗上以候胸中跗當為膚古通用字故為跗耳當尺裡以上皮膚以候胸中之病平按素問作附上左外以候肝內以候膈右外以候胃內以候脾上附上右外以候肺內以候胸中左外以候心內以候膻中甲乙同前候前後候後當此尺裡跗前以候胸腹之前跗後以候背後平按素問甲乙作前以候前後以候後跗上膈上也當尺裡跗上皮膚以候膈上也一曰竟上疑錯膈下者腹中事也當尺裡膚上以下以為膈下之分即腹中事平按附上膈上也膈下者腹中事也素問作上竟上者胸喉中事也下竟下者少腹腰股膝脛足中事也甲乙同惟脛下無足字粗發者陰不足陽大有餘為熱中跗之下也尺之皮膚文理粗發者是陰衰陽盛熱氣熏膚致使皮膚粗起故為熱中平按素問粗發作粗大陽下無大字熱中下無跗之下三字甲乙同來疾去徐者上實下虛為厥癲疾來疾陽盛故上實也去徐陰虛故下虛也上實下虛所以發癲疾也來徐去疾上虛下實為惡風上虛受風故惡風也有俱沉細數者少陰厥沉細皆陰故沉細數少陰厥逆平按素問甲乙有上有故中惡風者陽氣受也九字俱上有脈字沉細數散者寒熱也沉細陰也散為陽故病寒熱也浮而散者為眴僕眴玄遍反目搖諸浮而躁者皆在陽則為熱其右躁者在左手浮躁皆陽故在陽則為熱也諸陽絡脈左者絡右右者絡左故其右躁而病本在左手也平按而躁素問作不躁甲乙作而不躁右躁素問甲乙作有躁手上均無左字諸細而沉者皆在陰則為骨痛細之與沉皆是陰脈主於骨痛其有靜者在足其脈沉細仍靜者在足骨痛也數動一代者病在陽之脈溏泄及便膿血三動已去稱數數動一代息者陽脈虛也故數動一息即是陰實陽虛故溏泄便膿血也平按素問脈下無溏字有也字甲乙有也字無溏泄及便膿血六字注三動袁刻作三陽諸過者切之澀者陽氣有餘也陽氣有餘稱過陽過之脈應浮而滑更澀者以其陽氣太盛故極反成澀平按甲乙無諸過者切之五字澀上有其字滑者陰氣有餘也陰脈沉澀今反滑者以陰過極反成滑也陽氣有餘為身熱無汗陽盛有餘極反為陰外閉腠理故汗不出其身熱也陰氣有餘為多汗身寒陰氣有餘極反為陽外開腠理故汗多出其身寒也平按身寒下素問有陰陽有餘則無汗而寒九字推而外之內而不外有心腹積推而內之外而不內者有熱五臟為內陰也六腑為外陽也用針者欲瀉陰補陽即推而外也而內實難瀉即內而不外故知心腹病積也欲瀉陽補陰即推而內之也而外實難瀉即外而不內故知外有熱平按有熱素問作身有熱也甲乙作中有熱也推而上之上而不下腰足凊推而下之下而不上者頭項痛上為頭項下為腰足推下向上氣不能下故知腰足冷也推上向下氣不能上故知頭項痛也平按素問凊作清甲乙同上而不下甲乙作下而不上下而不上作上而不下按之至骨脈氣少者腰脊痛而身寒有痹脈之沉細按之至骨少得其氣即知有寒腰脊為痛身寒痹也平按素問身下無寒字甲乙同黃帝曰請問脈之緩急小大滑澀之病形何如請問五臟之脈各有六變以候病形岐伯曰臣請言五臟之變病也心脈急甚者為瘛心脈鉤脈緩大滑等三變為熱陽也急小澀等三變為寒陰也夏時診得心脈如新張弦急甚者寒也筋脈急痛以為瘛也下言急者皆如弦急非急疾也平按變病靈樞作病變甲乙無臣請言五臟之變病也九字瘛下靈樞甲乙有瘲字微急為心痛引背食不下其心脈來如弦微急即脈微弦急心微寒故心痛引背心輸而痛胸下寒咽中不下食也緩甚為狂笑心脈緩甚者緩為陽也緩甚熱甚也熱甚在心故發狂多笑微緩為伏梁在心下上下行時唾血心脈微緩即知心下熱聚以為伏梁之病大如人臂從齊上至於心伏在心下下至於齊如彼橋梁故曰伏梁其氣上下行來衝心有傷故時唾血平按時上靈樞有行字甲乙有行有二字大甚為喉吤心脈至氣甚氣上衝於喉咽故使喉中吤吤而鳴也吤古介反微大為心痹引背善淚出心脈微盛發風濕之氣衝心為痹痛痛後引背輸及引目系故喜淚出也平按甲乙淚下無出字小甚為善噦小為陰也小甚心之氣血皆少心氣寒也心氣寒甚則胃嚥氣有聚散故為噦也噦於月反微小為消癉小而不盛曰微小者陰也心氣內熱而有寒來擊遂內熱更甚發為消癉癉熱也內熱消瘦故曰消癉癉音丹滑甚為善渴滑陽也陽氣內盛則中熱喜渴也微滑為心疝引齊少腹鳴陽氣盛內有微熱衝心之陰遂發為心疝痛引少腹腸鳴者也澀甚為喑澀陰也澀者血多氣少心主於舌心脈血盛上衝於舌故喑不能言也微澀為血溢維厥耳鳴癲疾微澀血微盛也血微盛者溢於鼻口而出故曰血溢維厥血盛陽維脈厥也陽維上衝則上實下虛故為耳鳴癲疾肺脈急為癲疾肺脈毛脈有弦急是為冷氣上衝陽瞋發熱在上上實下虛故為癲疾平按急下靈樞甲乙有甚字微急為肺寒熱怠惰咳唾血引腰背胸若鼻宿肉不通肺以惡寒弦急即是有寒乘肺肺陽與寒交戰則二俱作病為肺寒熱也肺病不行於氣身體怠惰肺得寒故發咳咳甚傷中故唾血咳復引腰及背輸而痛肺病出氣壅塞因即鼻中生於宿肉也平按宿靈樞甲乙作息緩甚為多汗緩為陽也肺得熱氣外開腠理故為多汗微緩為痿漏風頭以下汗出不可止肺脈行於兩手肺得於熱故手痿緩又肺脈不上於頭故肺之熱開腠自頭以下漏風汗不止也平按漏風靈樞作瘻偏風甲乙同止上無可字大甚為脛腫肺氣甚故曰肺大甚也肺脈手太陰與足太陰相通足太陰行脛故肺氣熱甚上實下虛故為脛腫也微大為肺痹引胸背起惡日肺氣微大又得秋時寒氣故發為痹痛前引胸後引背輸以是陰病故引胸背起不用見日光也惡焉故反平按靈樞甲乙日下有光字小甚為泄肺之氣血小甚即是氣寒即是胃氣甚不消水穀故泄利矣微小為消癉腸肺之氣血微小也虛寒傷肺反為熱病消肌肉也滑甚為息賁上氣滑甚陽氣盛也陽盛擊陰為積左右箱近膈猶如覆杯令人上氣喘息故曰息賁賁膈也音奔微滑為上下出血陽氣微盛則內傷絡脈絡脈傷則上下出血陽絡傷則上衄血陰絡傷則下泄血也澀甚為歐血氣為陽也血為陰也澀為陽也今得澀脈即知血盛衝於肺腑陽絡陽絡傷便歐血也平按歐靈樞甲乙作嘔微澀為鼠瘻在頸支腋之間下不勝其上其能喜酸微澀血微盛也血微盛者循肺腑手陽明脈上脛為瘻又循肺手太陰脈下支腋之間為瘻其脈下虛不勝上實金實遂欲剋木為味故喜酸也酸木味也平按其能喜酸靈樞作其應善酸矣甲乙作甚能善酸肝脈急甚為惡言診得弦脈急者是寒氣來乘於肝魂神煩亂故惡出言語也平按靈樞甚下有者字甲乙注云惡言一作忘言微急為肥氣在脅下若覆杯肝脈微急是肝受寒氣積在左脅之下狀若覆杯名曰肥氣緩甚為喜歐緩甚者肝熱氣衝咽故喜歐也平按喜歐靈樞甲乙作善嘔微緩為水瘕痹也陽氣微熱肝氣壅塞飲溢為水或結為瘕或聚為痹大甚為內癰善嘔衄大甚氣盛熱氣結為內癰也肝氣上逆故喜嘔喜衄微大為肝痹陰縮咳引少腹微大少陽微盛擊肝乃為陰病肝痹者也陰寒故筋縮又發肝咳循厥陰下引少腹痛平按陰縮陰字原抄脫謹據靈樞甲乙補入袁刻作筋縮據注應作筋縮小甚為多飲肝脈小甚是為氣血皆少故渴而多飲也微小為消癉微小氣血俱少有寒氣衝肝氣遂發熱為癉消肌肉滑甚為頹疝滑甚少陽氣盛也少陽氣盛則肝虛不足發為頹疝丈夫小腹中為塊下衝陰痛平按頹靈樞作㿉甲乙作㿗微滑為遺溺陽氣微盛陰虛不禁故為遺寒也平按注寒依經文應作溺澀甚為溢飲肝脈澀者肝氣血多寒也肝血多而寒不得泄溢入腸胃皮膚之外故為溢飲也微澀為瘛攣筋微澀血多而寒即厥陰筋寒故瘛急而攣也平按靈樞筋下有痹字甲乙瘛作瘈瘲脾脈急甚為瘛瘲診得代脈急甚多寒為病手足引牽來去故曰瘛瘲也平按甲乙瘛作瘈微急為鬲中食飲入而還出後沃沫微急者微寒也脾氣微寒即脾胃中冷故食入還嘔出大便沃冷沫也鬲中當咽冷不受食也平按鬲靈樞作膈注即袁刻作則緩甚為痿厥緩甚者脾中虛熱也脾中主營四肢脾氣熱不營故曰四肢痿弱厥逆冷也微緩為風痿四肢不用心慧然若無病微緩脾中微熱也脾中有熱受風營其四肢令其痿弱不用風不入心故心慧然明瞭安若無病平按支靈樞甲乙作肢大甚為擊僕脾脈大甚是脾氣盛血里當是被擊或是倒僕有傷故發此候微大為疝氣腹裡大膿血在腸胃之外脾氣微大即知陰氣內盛為疝大腹裡膿血在腸胃之外也小甚為寒熱脾脈小甚氣血皆少是病諸寒熱病也微小為消癉微小氣血俱少故多內熱熱消肌肉也滑甚為頹𤸇滑甚者陽氣盛熱也陰氣虛弱發為頹𤸇𤸇淋也音隆平按頹𤸇靈樞甲乙作㿉癃微滑為蟲毒蛔蠍腹熱微滑陽氣微盛有熱也蛔胡灰反腹中長蟲也蠍胡竭反謂腹中蟲如桑蠹也陽盛有熱腹內生此二蟲為病絞作腹中平按注桑蠹袁刻作長蠹澀甚為腸頹頹徒回反脈澀氣少血多而寒故冷氣衝下廣腸脫出名曰腸頹亦婦人帶下病也平按頹靈樞作潰甲乙作㿗注云一作潰微澀為內潰多下膿血微澀是血多聚於腹中潰壞而下膿血也腎脈急甚為骨癲疾診得石脈急甚者是謂寒氣乘腎陽氣走骨而上上實下虛故骨癲也平按甲乙骨下有痿字微急為沉厥足不收不得前後微急者腎冷發沉厥之病足腳沉重逆冷不收膀胱大腸壅閉大小便亦不通平按靈樞沉厥下有奔豚二字甲乙奔豚二字在沉厥上緩甚為折脊陽氣盛熱陰氣虛弱腎受寒氣致令腰脊痛如折微緩為洞洞者食不化下嗌還出腎脈從腎而上貫肝膈循喉嚨故腎有熱氣則下津液不通上衝喉嗌通洞不禁其食入腹還出平按二洞字下甲乙均有泄字大甚為陰痿大甚多氣少血太陽氣盛少陰血少精血少故陰痿不起也平按注精字袁刻誤作積起下脫也字微大為石水起齊以下至少腹垂垂然上至胃管死不治太陽氣盛血少津液不得下通結而為水在少腹之中垂垂少腹垂也其水若至胃脘盛極故死也平按靈樞少腹作小腸垂垂作腄腄管作腕甲乙少腹作小腹小甚為洞泄腎氣小甚是血氣皆少也腎之血氣皆少則上下俱冷故食入口還出故曰洞泄微小為消癉血氣俱少是謂陰虛陽盛熱為消癉滑甚為𤸇頹滑甚太陽熱甚少陽虛而受寒故為𤸇頹也平按靈樞頹作㿉甲乙作癰㿗微滑為骨痿坐不能起起目毋所見微滑太陽微盛熱入骨髓發為骨痿骨弱坐不能起也太陽自目內眥而起上衝於目故目無見也平按靈樞甲乙目上有則字甲乙所見下有視黑丸三字澀甚為大癰澀甚多血少氣不宣故聚為大癰微澀為不月沉痔微澀者血微盛也血多氣少不通故女月經不得以時下也又其氣少血聚復為廣腸內痔也沉內也黃帝曰病之六變者刺之奈何問前五脈各有六變補瀉之道平按甲乙曰上無黃帝二字病之六變作病亦有甚變岐伯曰諸急者多寒脈之弦急由於多寒有甚有微即五臟急合有十種故曰諸急自余諸變皆放此也緩者多熱由其當藏多熱致脈遲緩大者多氣少血由其當藏氣多血少致令脈有洪大小者血氣皆少由其當藏血氣皆少故令脈衰小也滑者陽氣盛微有熱由其當藏陽盛熱微故令脈有滑疾也澀者多血少氣微有寒由其當藏血多氣少微寒故令脈澀是故刺急者深內而久留之寒則氣深來遲故深內而久留也刺緩者淺內而疾髮針以其熱熱退氣淺行疾故淺內疾發平按以其熱靈樞甲乙作以去其熱刺大者微瀉其氣毋出其血大者氣多故須微瀉以其少血故不出血刺滑者疾髮針而淺內之以瀉其陽氣而去其熱以其氣盛而微熱故淺內針仍疾發之平按甲乙寫作瀉刺澀者必中其脈隨其逆順而久留之必先捫而循之已髮針疾按其痏毋令其血出以和其脈脈澀即多血也以其多血故先須以手捫循然後刺之中其脈血隨其逆冷者久而留針以其氣少恐其泄氣故髮針已疾按其痏痏於軌反謂瘡瘢之也平按捫靈樞甲乙作按以髮針以作已甲乙其血出作出血脈上有諸字注逆冷依經文應作逆順諸小者陰陽形氣俱不足勿取以針調其甘藥諸脈小者五臟之陰六腑之陽及骨肉形並其氣海之氣四者皆悉虛少若引陰補陽是則陰竭引陽補陰即使陽盡陰陽既竭形氣又微用針必死宜以甘味之藥調其脾氣脾胃氣和即四臟可生也平按小上甲乙無諸字調其甘藥靈樞作而調以甘藥也甲乙作而調之以甘藥肝滿腎滿肺滿皆實皆為腫此三臟之滿實皆為癰腫平按皆為腫素問甲乙作即為腫肺之癰喘兩脅滿肺以主氣故肺生癰有喘也肺脈上膈近脅故肺癰脅滿也平按素問癰作雍脅作胠甲乙作脛注云素問作胠肝癰兩胠滿臥則驚不得小便兩胠謂在側箱兩肋下空處肝腑足少陽脈行在脅下故肝癰兩胠滿也足少陽別脈上肝貫心故熱盛為癰因即心驚也肝脈環陰故肝病熱甚不得小便有本作小和字誤平按癰素問作雍甲乙胠作脅下二字腎癰胠下至少腹滿脛有大小髀胻大跛易偏枯督脈上至十四椎屬於帶脈行兩胠故從兩胠至少腹滿以少陰脈虛受病行於兩腳故脛大小脾胻大跛左右二腳更病故為易也又為偏枯病也胻稱膝胻股胻髀胻謂胻通膝上下也平按癰素問作雍胠作腳甲乙胻作脛無大字心脈滿大癇瘛筋攣心脈滿實仍大是則多氣熱盛故發小兒癇病以其少血陰氣不足故寒而筋攣也平按甲乙瘛作痓下同肝脈小急癇瘛筋攣小則陰陽二氣不足急即為寒是為虛寒熱乘為癇及寒為筋攣肝脈驚暴有所驚駭脈不至若喑不治自已肝至有驚氣者是因驚魂失喑不言或脈不至皆不療自已也平按驚暴素問作騖暴甲乙作騖暴腎脈小急肝脈小急心脈不鼓皆為瘕腎肝二脈小急及心脈不鼓皆內虛寒氣故為瘕也平按素問甲乙不鼓上有小急二字腎脈大急沉肝脈大急沉皆為疝腎肝二脈大為多氣少血急沉皆寒是為寒氣內盛故為疝病也平按腎脈大急沉上素問有腎肝並沉為石水並浮為風水並虛為死並小弦欲驚二十一字新校正云詳腎肝並沉至下並小弦欲驚全元起本在厥論中王氏移於此本書見卷二十六經脈厥篇據此則本書與全元起本同心脈揣滑急為心疝揣動也滑陽氣盛而微熱急為多寒心氣寒寒盛而微熱寒勝故結為心疝也平按揣素問作搏下同肺脈沉揣為肺疝肺脈應虛浮今更沉寒多故為肺疝也平按肺疝下素問有三陽急為瘕三陰急為疝二陰急為癇厥二陽急為驚二十一字新校正云詳三陽急為瘕至為驚全元起本在厥論王氏移於此本書見卷二十六寒熱相移篇脾脈外鼓沉為腸闢久自已脾脈向外鼓外鼓仍沉沉寒為利胃氣強盛故久自已也平按闢素問甲乙作澼下同肝脈小緩為腸闢易治肝脈氣血雖少胃氣強盛故療易瘥也腎脈小揣沉為腸闢下血溫身熱者死腎脈氣血俱少仍冷利下血者胃氣虛冷故死下血溫身熱皆胃氣散去也平按素問血字重甲乙溫作濕注素問作溫心肝闢亦下血二臟同病者可治其身熱者死熱見七日死心肝二氣共為腸闢下血是母子相扶故可療也身熱以胃氣散去遠至七日死平按可治下素問甲乙有其脈小沉澀為腸澼八字熱見甲乙作熱甚注云素問作熱見胃脈沉鼓澀胃外鼓大心脈小堅急皆鬲偏枯男子發左女子發右不喑舌轉可治三十日起其順者喑三歲起年不滿二十者三歲死胃脈足陽明陽也胃脈反更沉細鼓動而澀澀寒也其脈向外而鼓其氣傷多如此診得足陽明脈沉鼓而寒向外鼓而氣多又得心脈血氣俱少堅實而寒然則胃之與心二者同病名鬲偏枯男子發於左箱女子發於右箱若喑不能言舌不轉者死若能言轉舌者療之三十日能行雖喑舌轉順者三年得瘥若年不至二十得前病者三年而死也平按甲乙轉下有者字順素問甲乙作從脈至而揣血衄身有熱者死脈至而動又陽虛衄血身體應冷而衄血身熱虛為逆故死也平按血衄甲乙作衄血素問熱上無有字脈來懸勾浮為脈鼓夏秋二脈並至以為脈鼓平按浮為脈鼓素問作浮為常脈甲乙作浮者為熱脈至如喘名曰氣逆者不知與人言氣厥不知言也平按氣厥者素問甲乙作暴厥暴厥者脈至如數使人暴驚三四日自已卒驚不療三四日自已也平按如數甲乙作而數脈至浮合浮合如數一息十至以上是與經氣予不足微見九十日死浮合之脈經氣不足微而見九十日即死也平按素問甲乙是下無與字足下有也字脈至如火新燃是心精之予奪也草乾死心脈如鉤今如火新燃是心脈急疾火精奪故至草乾水時被克而死平按新燃素問作薪然甲乙作新然素問甲乙死上有而字脈至如散採肝氣予虛也木葉落死肝脈如弦今散如五采變見不定是為肝木氣之虛損至木葉落金時被克而死有本為藂棘散葉也平按散採素問作散葉甲乙作藂棘脈至省容者脈寒如鼓也是腎氣予不足也懸去棗華死腎脈如石今如省容寒而鼓動是為腎之水氣有傷故至棗華土時被克而死也平按省容素問甲乙作如省客脈寒素問作脈塞脈至如丸泥胃精予不足也榆莢落而死莢兼牒反如豆莢等草實胃脈耎弱今反如丸泥干堅之丸即是胃土氣之有損故至榆莢木時而死也脈至如橫格是膽氣予不足也禾熟而死膽脈如弦今如橫格之木即是木之膽氣有損故至禾熟秋金時被克而死也脈至如弦縷胞精予不足也病善言下霜而死不言可治心胞脈至如鉤今如弦之縷線散而不聚是為心胞火府有損故至霜雪水時被克而死不好言者心氣未盡故可療也脈至如交莢交莢者左右旁至也微見三十日而死莢兼牒反如豆莢等草實也脈至如相交左右旁至是次轉故微見三十日死也平按莢素問作漆甲乙作棘注次轉二字疑有誤脈至如泉浮鼓胞中太陽氣予不足也少氣味韭華死足太陽是腎之府脈今如泉之浮鼓而動即膀胱胞氣水之不足故至韭莢華土時被克而死一曰韭英也平按泉上素問有湧字甲乙有湧字胞中素問甲乙作肌中韭華死素問作韭英而死甲乙作韭花生而死脈至如委土之狀按之不得肌氣予不足五色先見黑白累發死脾脈代如雞足踐地中間代絕今按止如委土之狀無有脾胃耎弱之氣又先累見黑白之色是肺腎來乘故死也平按委土素問作頹土不得甲乙作不足累發素問作壘發脈至如懸離懸離者浮揣切之益大十二輸之予不足也水凝而死亟浮實切之益大此是懸離之狀懸離脈見即五臟六腑十二經輸氣皆不足十二經輸皆屬太陽故至水凍冬時而死亟急也病至水凝而死亟居力反平按懸離素問作懸雍甲乙作懸癰素問新校正云按全元起本懸雍作懸離元起注云懸離者言脈與肉不相得也水凝甲乙作水凍素問無亟字甲乙同脈至如偃刀偃刀者浮小急按之堅急大五臟宛熟寒熱獨並於腎也如此其人不得坐立春而死浮之小急按之堅急大者此是偃刀之狀也浮手取之即小為氣血俱少按之堅實急大多氣少血即知五臟宛熟寒熱之氣唯並於腎至春實邪來乘致死平按素問浮下有之字急大作大急宛熟作菀熟甲乙作寒熱注云素作菀熟脈至如丸滑不直手按之不得也膽氣予不足也棗葉生而死直當也脈如彈丸按之不可當於指下此是滑不直膽氣病脈狀也至於孟夏棗葉生實邪來乘而死平按膽原抄作瞻注同疑是膽字之誤素問甲乙作大腸查大腸為肺之腑屬金膽為肝腑屬木本注云至於孟夏棗葉生實邪來乘而死按五十難曰邪從前來者為實邪滑氏本義云我生者相氣方實也居吾之前而來為邪故曰實邪孟夏火旺之時為木所生乃木之實邪應從膽為是再按上注並於腎至春實邪來乘致死腎為水臟水來生木為腎之實邪其義正同脈至如華者令人善恐不欲坐臥行立常聽小腸予不足也季秋而死脈之浮散故如華也心腑小腸虛小故多恐坐臥不安心虛耳中如有物聲故恆聽至於季秋為肺氣來乘遂致於死也平按如華甲乙作如舂
