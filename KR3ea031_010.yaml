body:
  text: 卷第十經脈之三督脈平按此卷自卷首至兩目之下中以上原抄殘脫平於日本仁和寺宮御殘卷十三紙中檢出證以素問骨空論篇及本書骨空篇甲乙經奇經八脈篇補在經文央字楊注督脈起於少腹之上而脫處復完惟篇中楊注缺蝕過多無由補入不無遺憾謹依缺處計字空格以存真相自經文央字以下見素問卷十六第六十骨空論篇又見甲乙經卷二第二並本書骨空篇岐伯曰督脈起於少腹以下骨中央女子入系庭孔其孔溺孔之端此脈起少腹循陰器上至目內眥復上額交巔入腦還出別下項挾脊入循膂絡腎然後別從腎上而還至於腎九卷別於畜門上額循巔下項脊入骶絡陰器入齊中上入缺盆二經相證督脈之逆顯然又按考古本竟於此為任脈之言而有不識以此督腹八十一難云起下極之輸並脊上行至於風府為陽脈之聚義亦同也庭孔溺孔之端孔也平按起於少腹於字本書骨空篇無素問端下有也字其絡循陰器合篡間繞篡後督脈之絡出庭孔別左右循男女陰器於篡間合復繞於篡後也篡音督此後也平按篡甲乙經作纂本書骨空篇亦作纂注音督義未詳查骨空論類注云篡交篡之義謂兩便爭行之所前後二陰之間金鑑云篡者橫骨下兩股之前相合共結之凹前後兩陰之間是篡當依甲乙經及本書骨空篇作纂為合說文篡似組而赤蓋兩陰之間有一道縫處其狀如纂組故謂之纂日本醫家丹波元簡已有此說似較篡奪之篡於義為長特採入以備參考又注此下所缺三字平擬作兩陰前三字別繞臀至少陰與巨陽中絡者合少陰上股內後廉貫脊屬腎從篡後復別兩箱繞臀行至足少陰與足太陽中絡者合於少陰行於股復貫脊屬腎也與太陽起於目內眥從腎與足太陽上行起於目內眥也上額交顛上入絡腦還出別下項循肩髆內挾脊抵腰中入循膂絡腎而止其男子循莖下至篡與女子等督脈與太陽兩道上至目內眥上額至顛相交已入腦還出別為兩箱下項復循左右肩髆之內挾脊抵腰循膂絡於二腎方止男女皆同也舊來相傳為督脈當脊中唯為一脈者不可為正也平按顛素問甲乙經作巔髆甲乙經作膊素問無而止二字又按八脈考督脈又別自腦下項循肩胛與手足太陽少陽會於大抒第一椎下兩旁去脊中一寸五分陷中內挾脊抵腰中入循膂絡腎足證本注別兩箱循左右肩髆之是舊傳只一脈當脊中者非也其少腹直上者貫齊中央上貫心入喉上頤環唇上系兩目之下中央督脈起於少腹以下至額前者從少腹至腎上行還來至腎而止此從少腹直上至兩目之下也貫齊貫心入喉上頤皆為一道也環唇以上覆為二道各當目下直瞳子故曰中央也平按少腹甲乙經作小腹齊中央甲乙經作臍中中央兩目之下中央甲乙經作兩目之中此生病從少腹上衝心而痛不得前後為沖疝從少腹上衝心痛前後之脈為病不得前後便沖疝病也其女子不字𤸇痔遺溺嗌乾督脈生病治督脈不字母子不産病也𤸇痔遺溺脈從陰器上行至咽故為此等病也任脈衝脈行處相似故須細別督脈生病療之於督脈勿療任脈也有本無痔字平按不字素問甲乙經均作不孕又按素問王注謂衝任督三脈異名同體甲乙經注云素問言督脈似謂任沖多聞闕疑故並載以貽後之長者云帶脈平按此篇自篇首至屬帶脈見靈樞卷三第十一經別篇又見甲乙經卷二第一下篇又見本書卷九經脈正別篇自陽明者至末見素問卷十二第四十四痿論篇又見甲乙經卷十第四足少陰之正至膕中別走太陽心而合上至腎當十四椎出屬帶脈八十一難云帶脈起於季脅為回身一周既言一周亦周腰脊也故帶脈當十四椎束帶腰腹故曰帶脈也平按太陽下靈樞甲乙經均無心字當字上半為蟲蝕只剩下半田字據靈樞甲乙經及本注應作當椎靈樞作顀注季脅袁刻作季肋原抄及難經均作脅又束帶腰腹袁刻作束腰帶腹陽明者五臟六腑之海也主潤宗筋宗筋者束肉骨而利機關陽明主於水谷故為臟腑之海能潤宗筋約束骨肉利諸機關也平按束肉骨素問甲乙經均作主束骨衝脈者經脈之海也主滲灌溪谷陽明以為臟腑海衝脈血氣壯盛故為經脈之海主滲灌骨肉會處益其血氣與陽明合於筋陰總宗筋之會會於氣街而陽明為之長皆屬於帶脈而絡於督脈衝脈與陽明二脈合於陰器總聚於宗筋宗筋即二核及莖也復會於左右氣街以左右陽明為主共屬帶脈仍絡於督脈以帶脈為控帶也平按筋陰素問甲乙經作宗筋陰陽四字氣街甲乙經作氣衝故陽明虛則宗筋縱帶脈不引故足痿不用陽明穀氣虛少則宗筋之莖施縱帶脈不為牽引則筋脈施舒故足痿陰陽喬脈平按此篇自篇首至其不當數者為絡見靈樞卷四第十七脈度篇又見甲乙經卷二第二自陰喬陽喬至則瞑目見靈樞卷五第二十一寒熱病篇又見本書二十六卷寒熱雜說又見甲乙經卷十二第四自邪客於足陽喬至末見素問卷十八第六十三繆刺論篇又見甲乙經卷五第三黃帝問曰喬脈安起安止何氣營此喬亦作蹺禁嬌反皆疾健兒人行健疾此脈所能故因名也喬高也此脈從足而出以上於頭故曰喬脈問其終始之處及問此脈何藏之氣也平按喬靈樞甲乙經均作蹺營此靈樞作榮水甲乙經作營也岐伯對曰喬脈者少陰之別起於然骨之後上內踝之上九卷經云喬脈從足至目各長七尺五寸總二喬當一丈五尺則知陰陽二喬俱起於跟皆至目內眥別少陰於然骨之後行於跟中至於照海上行至目內眥者名為陰喬起於跟中至於申脈上行至目內眥者名曰陽喬故八十一難曰陰陽二喬皆起跟中上行陰喬至咽交灌衝脈陽喬入於風池皆起跟中上行是同入目內眥至咽中與衝脈交此猶言二脈行處不言二脈終處二脈上行終於目內眥以為極也然骨之後即跟中也九卷與八十一難左右並具兩喬丈尺義皆同也是足少陰別脈也然骨跟中下少前大起骨也平按注皆起跟中跟字袁刻誤作限又注是足少陰上所缺六字平擬作然骨之後跟中六字又跟中下所缺一字平據甲乙經擬作陷袁刻作之直上循陰股入陰上循胸裡入缺盆上出人迎之前入鼽屬目內眥合於太陽陽喬而上行入陰者陰喬脈入陰器也此是足少陰之別名為陰喬入缺盆上行陽喬從風池腦空至口邊會地倉承泣與陰喬於目鋭眥相交已別出入鼽至目內眥陰喬與太陽陽喬三脈合而上行之也平按上出人迎甲乙經作上循人迎入鼽甲乙經作上入鼽靈樞作入頄正統本甲乙亦作入頄氣並相還則為濡目氣不營則目不合陰陽二氣相併相還陰盛故目中淚出濡濕也若二氣不相營者是則不和陽盛故目不合也平按氣並甲乙經作氣相併營靈樞作榮下同黃帝問曰氣獨行五臟不營六腑何也帝問陰臟少陰別者陰喬脈所營謂陽氣不營六腑故致斯問也岐伯曰氣之不得毋行也陰陽二氣相注如環故不得毋行也如水之流如日月之行不休故陰脈營其臟陽脈營其腑如環之無端莫知其紀終而復始水之東流回環天地故行不休也日月起於星紀終而復始故行不止也三陰之脈營臟注陽三陽之脈營府注陰陰陽相注如環比水之流日月之行終而復始莫知其紀也平按注日月起於星紀日月二字原不全依經文當是日月二字其流溢之氣內溉臟腑外濡腠理此謂二喬之氣黃帝問曰喬脈陰陽何者當數平按靈樞甲乙經陰陽作有陰陽當數作當其數岐伯答曰男子數其陽女子數其陰當數者為經其不當數者為絡黃帝曰善男子以陽喬為經以陰喬為絡女子以陰喬為經以陽喬為絡也平按當數者上甲乙經重其陰二字陰喬陽喬陰陽相交陽入陰出陰陽交於兌眥陽氣盛則瞋目陰氣盛則瞑目二喬交於目內眥陽喬之氣從外入內陰喬之氣從內出外陽喬脈盛目瞋不合陰喬脈盛則目瞑不開矣平按兌眥靈樞作目鋭眥邪客於足陽喬令人目痛從內眥始二喬交於目鋭眥俱至目內眥故邪客痛從是內眥起也平按注鋭眥下所缺一字據上注陽喬與陰喬於目鋭眥相交已應作已字從是內眥起是字恐系目字傳寫之誤任脈平按此篇自篇首至末見靈樞卷十第六十五五音五味篇自衝脈任脈至故須不生見甲乙經卷二第二惟編次前後稍異自黃赤者至末見甲乙經卷一第十六黃帝曰婦人之毋須者毋血氣乎欲明任脈衝脈之故因問以起岐伯曰任脈衝脈皆起於胞中上循脊裡為經絡海此經任脈起於胞中紀絡於唇口皇甫謐録素問經任脈起於中極之下以上毛際循腹裡上關元至咽喉呂廣所注八十一難本言任脈與皇甫謐所録文同檢素問無此文唯八十一難有前所說又呂廣所注八十一難本云任脈起於胞門子戶挾臍上行至胸中九卷又云會厭之脈上經任脈但中極之下即是胞中亦是胞門子戶是則任脈起處同也八十一難一至胸中一至咽喉此經所言別絡唇口又云會厭之脈上經任脈是循胸至咽言其行處未為終處至脈絡唇口滿四尺五寸方為極也又八十一難任脈亦又明堂言目下巨窖承泣左右四穴有陽喬脈任脈之會則知任脈亦有分歧上行者也又任沖二脈上行雖別行處終始其經是同也舊來為圖任脈唯為一道衝脈分脈兩箱此亦不可依也此脈上行為經絡海任維諸脈故曰任脈胞下為膀胱膀胱包尿是以稱胞即尿脬也胞門與子戶相近任沖二脈起於中也脊裡謂不行皮肉中也十二經脈奇經八脈十五絡脈皮部諸絡皆以任沖二脈血氣為大故為海平按任脈衝脈靈樞甲乙經作衝脈任脈者循脊靈樞作循背海上靈樞甲乙經均有之字又注任脈亦下所缺二字據難經任脈起中極之下上毛際循腹裡上關元至咽喉擬作上行二字又上經任脈兩經字袁刻均作於分脈兩箱脈字作腋不行皮肉中行字作下皮部諸絡絡字作脈其浮而外者循腹上行會於咽喉別而絡唇口任沖二脈從胞中起分為二道一道後行內著脊裡而上一道前行浮外循腹上絡唇口也平按靈樞腹下有右字血氣盛則充膚熱肉血獨盛則淡滲皮膚生豪毛任沖之血獨盛則淡聚滲入皮膚生豪及毛毛即鬚髮及身毛也平按淡滲甲乙經作滲灌今婦人生有餘於氣不足於血以其數脫血故也任沖之脈不營其口唇故須不生焉婦人氣多血少任沖少血故不得營口以生豪毛也平按今婦人生靈樞生上有之字甲乙經無今生二字數脫上甲乙經有月水下三字脫血下有任沖並傷四字須上有髭字黃帝曰士人有其傷於陰陰氣絶而不起陰不用然其須不去其故何也宮者之所獨去何也願聞其故也士人或有自傷其陰不能復起然髭鬚不落宮刑之法傷者陰亦不起何因須獨去之也平按陰不用甲乙經作陰不為用宮靈樞甲乙經均作宦下同按注宮刑之法尚書呂刑五刑中有宮刑即腐刑宦說文訓仕左傳宦三年矣訓學雖後世有宦官惟聞有自宮而為宦者未嘗設有宦刑宮刑二字連稱應以宮字為允岐伯曰宮者去其宗筋傷其衝脈血瀉不復肉膚內結口唇不營故須不生人有去其陰莖仍有髭鬚去其陰核須必去者則知陰核並莖為宗筋也去其宗筋瀉血過多膚肉結澀內不營其口以無其血故須不生也平按寫甲乙經作瀉肉膚靈樞甲乙經作皮膚口唇均作唇口須上甲乙經有髭字黃帝曰其病天宮者未嘗被傷不脫於血然其須不生其故何也岐伯曰此故天之所不足也其任沖不盛宗筋不成有氣無血口唇不營故須不生人有天然形者未嘗被傷其血不脫而須不生者此以天然不足於血宗筋不成故須不生也平按其病靈樞作有病注天然形袁刻形作刑黃帝曰善哉乎聖人之通萬物也若日月之光影音聲之鼓響聞其音而知其形其非夫子孰能明萬物之精見表而知里睹微而識著瞻日月而見光影聽音聲而解鼓響聞五聲而通萬形察五色而辨血氣者非岐伯至聖通萬物之精孰能若此也是故聖人視其真色黃赤者多熱氣青白者少熱氣黑色者多血少氣表內不誤故曰真色黃赤太陽陽明之色故多熱也青白少陽陽明之色故少熱也黑為陰色故多血少氣也平按真色靈樞作顏色美眉者太陽多血通鬒極發者少陽多血美須者陽明多血此其時然也太陽之血營眉故美眉之人即知太陽多血少陽之血營通鬒故少陽行處通鬒多則知少陽多血也通鬒頰上毛也須美者則知陽明多血須謂頤下毛也乃是其見眉須則知血氣多少也平按通鬒極發靈樞甲乙經作通髯極發注乃是其見眉須袁刻脫其須二字夫人之常數太陽常多血少氣少陽常多氣少血陽明常多血氣厥陰常多氣少血少陰常多血少氣太陰常多血氣此天之常數也手足少陰太陽多血少氣以陰多陽少也手足厥陰少陽多氣少血以陽多陰少也手足太陰陽明多血氣以陰陽俱多穀氣故也此又授人血氣多少之常數也平按陽明常多血氣靈樞甲乙經作多血多氣袁刻作多血少氣太陰常多血氣靈樞作常多血少氣衝脈平按此篇自篇首至孰能噵之見靈樞卷六第三十八逆順肥瘦篇又見甲乙經卷二第二自黃帝曰願聞人之五臟至末見素問卷十一第三十九舉痛論篇黃帝曰脈行之逆順奈何血氣相注如環無端未知行身逆順如何也岐伯曰手之三陰從臟起手夫衝脈亦起於胞中上行循腹而絡唇口故經曰任脈衝脈皆起於胞中上絡唇口是為衝脈上行與任脈同素問衝脈起於關元隨腹直上呂廣注八十一難本云衝脈起於關元隨腹裡直上至咽喉中皇甫謐録素問云衝脈起於氣街並陽明之經挾臍上行至胸中而散此是八十一難說檢素問無文或可出於別本氣街近在關元之下衝脈氣街即入關元上行雖不言至咽其義亦同也素問又云衝脈與陽明宗筋會於氣街即衝脈與陽明宗筋會氣街已並陽明之經而上其義不異也九卷經又云衝脈者十二經之海也與少陰之本絡起於腎下出於氣街循陰股內廉邪入膕中循脛骨內廉並少陰之經下入內踝之後入足下其別者邪入踝出屬跗上入大指之間注諸絡以溫足脛此脈之常動者也前云衝脈十二經海黃帝謂跗上動者為足少陰岐伯別之以為衝脈常動前云上絡唇口此云上出頏顙此云注少陰大絡出氣街前云起於腎下出氣街此云下至內踝之屬而別前云入內踝之後入足下前云出屬跗上入大指間此云出跗屬下循跗入大指間其義並同也沖壯盛兒其脈起於臍下一道下行入足指間一道上行絡於唇口其氣壯盛故曰衝脈也脈從身出向四肢為順從四肢上身為逆也臟謂心肺心肺在內故為陰也心肺之陰起於三脈向手故曰手之三陰從臟走手此為從陰之陽終為陽中之陰也平按起靈樞甲乙經均作走注上行循腹袁刻脫行字至咽喉中袁刻脫中字注少陰大絡袁刻脫注字出氣街袁刻脫出字沖壯盛兒袁刻作則沖壯興盛上身為逆袁刻身作行手之三陽從手至頭手之三陰之脈從臟受得血氣流極手指端已變而為陽名手三陽從手上頭此為從陽之陽終為陽中之陽者也平按至靈樞甲乙經作走足之三陽從頭走足手之三陽至頭曲屈向足至足指端從陽之陰終為陰中之陽也平按頭甲乙經作項足之三陰從足走腹足之三陽下行至足指極已變而生足之三陰上至胸腹從陰之陰終為陰中之陰也復從臟走手如環無端黃帝曰少陰之脈獨下行何也足之三陰從足上行常見跗上動脈謂是足少陰下行動脈故致斯問也平按注足少陰少字袁刻誤作三岐伯曰不然臍下腎間動氣人之生命是十二經脈根本此衝脈血海是五臟六腑十二經脈之海也滲於諸陽灌於諸精故五臟六腑皆稟而有之則是臍下動氣在於胞也衝脈起於胞中為經脈海當知衝脈從動氣生上下行者為衝脈也其下行者雖注少陰大絡下行然不是少陰脈故曰不然也平按注根本本字袁刻作者又衝脈起於胞中至從動氣生袁刻脫此十八字夫衝脈者五臟六腑之海也五臟六腑皆稟焉其上者出於頏顙滲諸陽灌諸精衝脈氣滲諸陽血灌諸精精者目中五臟之精平按精甲乙經作陰其下者注少陰之大絡出之於氣街循陰股內廉入膕中伏行䯒骨內下至內踝之屬而別其下者並於少陰之經滲三陰其前者伏行出跗屬下循跗入大指間滲諸絡而溫肌肉故別絡結則跗上不動不動則厥厥則寒矣脛骨與跗骨相連之處曰屬也至此分為二道一道後而下者並少陰經循於小絡滲入三陰之中其前而下者至跗屬循跗下入大指間滲入諸陽絡溫於足脛肌肉故衝脈之絡結約不通則跗上衝脈不動不動則衛氣不行失逆名厥故足寒也平按氣街甲乙經作氣衝入膕中甲乙經作斜入膕中䯒靈樞作骭甲乙經作髀內踝之屬靈樞甲乙經屬上有後字並於少陰並甲乙經作至三陰上原脫滲字據本注補入跗屬甲乙經作屬跗則跗上不動袁刻脫上字又注衛氣袁刻作沖氣黃帝曰何以明之帝謂少陰下行至跗常動岐伯乃言衝脈下行至跗上常動者未知以何明之令人知也岐伯曰以言噵之切而驗之其非必動然後乃可以明逆順之行也欲知衝脈下行常動非少陰者凡有二法一則以言談噵衝脈少陰有動不動二則以手切按上動者為衝脈不動者為少陰少陰逆而上行衝脈順而下行則逆順明也平按以言靈樞作五官二字噵靈樞作導道藏本靈樞作噵甲乙經作道黃帝曰窘乎哉聖人之為道也明於日月徹於豪釐其非夫子孰能噵之窘急也聖人知慧通達之明於日月故能徹照豪釐之微如此非岐伯之鑑誰能言也平按徹靈樞作微黃帝曰願聞人之五臟卒痛何氣使然或動喘應手者奈何岐伯對曰寒氣客於衝脈衝脈起於關元隨腹直上則脈不通則氣因之故喘動應手矣平按動喘素問作喘動直上二字下素問有寒氣客三字脈不通下素問復有脈不通三字陰陽維脈平按此篇見素問卷十一第四十一刺腰痛篇又見甲乙經卷九第八陽維之脈令人腰痛痛上弗然脈腫刺陽維之脈脈與太陽合腨下間上地一尺所飛陽之脈在內踝上二寸太陰之前與陰維會八十一難云陽維起於諸脈之會則諸陽脈會也陰維起於諸陰之交則三陰交也陽維維於陽綱維諸陽之脈也陰維維於陰綱維諸陰之脈也陰陽不能相維則倀然失志不能自持陽不維於陽陰不維於陰也陽維陰維綺絡於身溢蓄不能還流溉灌諸經血脈隆盛溢入八脈而不還也腨下間上地一尺所即陽交穴陽維郤也陰維會即築賓穴陰維郤也平按素問甲乙經弗然脈腫作怫然腫上地作去地素問二寸作五寸素問甲乙經太陰作少陰陰維會作陰維之會經脈標本平按此篇見靈樞卷八第五十二衛氣篇又見甲乙經卷二第四黃帝曰五藏者所以藏精神魂魄也腎藏精也心藏神也肝藏魂也肺藏魄也脾藏意智為五藏本所以不論也六腑者所以受水穀而行化物者也膽之府唯受所化木精汁三合不能化物也今就多者為言耳平按行化甲乙經無行字其氣內入於五臟而外絡支節六腑穀氣化為血氣內即入於五臟資其血氣外則行於分肉經絡支節也平按入於二字靈樞作干甲乙經作循其浮氣之不循經者為衛氣其精氣之行於經者為營氣六腑所受水穀變化為氣凡有二別起胃上口其悍氣浮而行者不入經脈之中晝從於目行於四肢分肉之間二十五周夜行五臟二十五周一日一夜行五十周以衛於身故曰衛氣其谷之精氣起於中焦亦並胃上口行於脈中一日一夜亦五十周以營於身故曰營氣也陰陽相隨外內相貫如環之無端混乎孰能窮之浮氣為陽為衛隨陰從外貫內精氣為陰為營隨陽從內貫外也陰陽相貫成和莫知終始故如環無端也平按混乎靈樞甲乙經作亭亭淳淳乎然其分別陰陽皆有標本虛實所離之處夫陰陽之氣在於身也即有標有本有虛有實有所歷之處也能別陰陽十二經者知病之所生十二經脈有陰有陽能知十二經脈標本所在則知邪入病生所由也知候虛實之所在者能得病之高下十二經脈上實下虛病在下下實上虛病在其上虛實為病高下可知也平按靈樞甲乙經無知字知六腑之氣街者能解經結挈紹於門戶街六腑氣行要道也門戶輸穴也六腑陽也能知六腑氣行要道即能挈繼輸穴門戶解結者也紹繼也平按解上靈樞甲乙經有知字經結挈靈樞作結契二字甲乙經作結無經挈二字能知虛實之堅耎者知補瀉之所在知虛為耎知實為堅即能瀉堅補耎也耎而免反柔也平按甲乙經無能字實靈樞作石耎靈樞作軟甲乙經作濡能知六經標本者可以無惑於天下三陰三陽故曰六經也標本則根條知六經脈根條則天下皆同所以不惑者也岐伯曰博哉聖帝之論臣請盡意悉言之贊帝所知極物之理也盡意欲窮所知也悉言欲極其理也平按甲乙經無盡意二字足太陽之本在跟以上五寸中標在兩緩命門命門者目也血氣所出皆從臟腑而起今六經之本皆在四肢其標在掖肝輸以上何也然氣生雖從腑臟為根末在四肢比天生物流氣從天根成地也跟上五寸當承筋下足跟上是足太陽脈為根之處也其末行於天柱至二目內眥以為標末也腎為命門上通太陽於目故目為命門緩大也命門為大故也平按緩靈樞甲乙經作絡足少陽之本在竅陰之間標在窗籠之前窗籠者耳也足少陽脈為根在竅陰其末上出天窗支入耳中出走耳前即在窗籠之前也以耳為身窗舍籠音聾故曰窗籠也足陽明之本在厲兌標在人迎頰下上俠頏顙足陽明之為根厲兌其末上至人迎頰下也平按甲乙經頰下上俠作上挾二字靈樞無下上二字足太陰之本在中封前上四寸之中標在背輸與舌本足太陰脈出足大趾端內側行於內踝下微前商丘上於內踝近於中封中封雖是厥陰所行太陰為根此中封之前四寸之中也末在背第十一椎兩箱一寸半脾輸及連舌本散在舌下也平按甲乙經無上字輸靈樞甲乙經均作腧下同不再舉又按靈樞足陽明足太陰兩段在足厥陰後足少陰之本在內踝下二寸中標在背輸與舌下兩脈足少陰脈起小指下邪起趣足心至內踝下二寸為根也末在背第四椎兩箱一寸半腎輸及循喉嚨挾舌本也平按二寸靈樞甲乙經作上三寸注第四椎據本書氣穴篇及靈樞背腧篇應作第十四椎一寸半袁刻誤作一尺半又按甲乙經足少陰一段在足少陽前足厥陰之本在行間上五寸所標在背輸足厥陰脈起於大指藂毛之上行大指歧內行間上五寸之中為根也末在背第九椎兩箱一寸半肝輸也平按甲乙經足厥陰一段在足太陰前手太陽之本在外踝之後標在命門之上三寸手太陽脈起於小指之端循手外側上腕出外踝之後為根也手腕之處當大指者為內踝當小指者為外踝也其末在目上三寸也平按三寸靈樞甲乙經均作一寸手少陽之本在小指次指之間上二寸標在耳後上角下外眥手少陽脈起於小指次指之端上出兩指間上二寸之中為根也末在耳後完骨枕骨下髮際上出耳上角下至外眥也平按二寸甲乙經作三寸注出兩指間出字袁刻作在手陽明之本在肘骨中上至別陽標在頰下合於鉗上手陽明脈起大指次指之端循指上廉至肘外廉骨中上至背臑背臑手陽明絡名曰別陽以下至肘骨中為手陽明本也末在頰下一寸人迎後扶突上名為鉗鉗頸鐵也當此鐵處名為鉗上渠廉反平按頰靈樞作顏甲乙經作腋手太陰之本在寸口之中標在掖內動脈手太陰脈出大指次指之端上至寸口為根也末在掖下天府動脈也平按掖靈樞甲乙經作腋內動脈靈樞脈作也甲乙經內上有下字手少陰之本在兌骨之端標在背輸手少陰脈出於手小指之端上至腕後兌骨之端神門穴為根也末在於背第五椎下兩旁一寸半心輸問曰少陰無輸何以此中有輸答曰少陰無輸謂無五行五輸不言無背輸也故此中有背輸也若依明堂少陰有五輸如別所解也平按兌靈樞作鋭注末在於背袁刻脫於字答曰少陰無輸袁刻無作天手心主之本在掌後兩筋之間二寸中標在腋下三寸手心主脈出中指之端上行至於掌後兩筋之間間使上下二寸之中為根也末在掖下三寸天池也平按甲乙經無二寸中三字靈樞掖下重下字凡候此者下虛則厥下盛則熱痛上虛則眩上盛則熱痛此謂本標也下則本也標即上也諸本陽虛者手足皆冷為寒厥諸本陽盛則手足熱痛為熱厥也諸標陰虛則為眩冒諸標陰盛則頭項熱痛也平按甲乙經下虛上有主字下盛則熱痛靈樞甲乙均無痛字故實者絶而止之虛者引而起之陰陽盛實絶瀉止其盛也陰陽虛者引氣而補起也平按實靈樞作石請言氣街街道也補瀉之法須依血氣之道故請言之也胸氣有街腹氣有街頭氣有街胻氣有街胸腹頭胻四種身之要也四處氣行之道謂之街也平按胻靈樞作脛甲乙經作䯒故氣在頭者止之於腦腦為頭氣之街故頭有氣止百會也平按止甲乙經作上下同氣在胸者止之膺與背輸膺中肺輸為胸氣之街故胸中有氣取此二輸也平按甲乙經胸下有中字氣在腹者止之於背輸與衝脈於齊左右之動者脾輸及臍左右衝脈以為腹氣之街若腹中有氣取此二輸也平按動下靈樞甲乙經有脈字氣在胻者止之於氣街與承山踝上下三陰氣街並與承山至踝上下以為胻氣之街若胻有氣取此三處也平按上下靈樞甲乙經作上以下取此者用豪針取此四街之氣宜用第七豪針也平按注四街袁刻誤作四時必先按而在久應於手乃刺而豫之刺氣街法也皆須按之良久或手下痛或手下脈動應手知已然後豫行補瀉之平按在久二字甲乙經作久存之三字注或手下痛袁刻脫手字或手下脈動袁刻作動脈所治者謂頭痛眩腹中痛滿暴脹頭痛眩僕可止之於腦頭氣街也腹中痛等取之於胸及腹氣街也平按治甲乙經作刺腹中痛滿靈樞甲乙經作腹痛中滿及有新積痛可移者易已也積不痛者難已也胸腹之中有積病而可移者易已積而不痛不可移者難已也平按積痛痛字甲乙經無經脈根結平按此篇見靈樞卷二第五根結篇又見甲乙經卷二第五岐伯曰天地相感寒暖相移陰陽之道孰少孰多推前後皆有其問此中義例須說岐伯即亦不待於問也二儀之氣交泰故曰相感陰盛移為陽陽盛移為陰故陰陽之氣不可偏為多少也平按暖靈樞作暖甲乙經作熱注岐伯二字袁刻脫陰道偶而陽道奇陽為天道其數奇也陰為地道其數偶也發於春夏陰氣少而陽氣多陰陽不調何補何瀉有病發於春夏春夏陽多陰少是為陰陽不調若為補瀉也發於秋冬陽氣少而陰氣多陰氣盛而陽氣衰則莖葉枯槁濕而下㴆陰陽相移何補何瀉有病發於秋冬秋冬陰多陽少陽氣衰故莖葉枯槁陰氣盛故津液㴆根是亦陰陽相移多少不同若為補瀉也平按濕而下㴆靈樞甲乙經作濕雨下歸考㴆與浸同漬也奇邪離經不可勝數風寒暑濕百端奇異侵經絡為病萬類千殊故不可勝數也離歷也不知根結五臟六腑折關敗樞開闔而走陰陽大失不可復取根本也結系也人之不知根結是臟腑之要故邪離經脈折太陽骨節關亦敗少陽筋骨維樞及開陽明之闔胃及太陽氣有失泄也良以不知根結令關樞闔不得有守故陰陽失於綱紀病成不可復取也平按注骨節關關字袁刻誤作開又關樞闔袁刻誤作開樞闔九針之要在於終始故知終始一言而畢不知終始針道絶滅終始根結也知根結之言即一言也平按要字上靈樞有玄字故知靈樞作故能知甲乙經作能知絶滅靈樞作咸絶甲乙經作絶矣太陽根於至陰結於命門此太陽根結與標本同唯從至陰上跟上五寸為本有異耳平按命門下靈樞甲乙經有命門者目也五字陽明根於厲兌結於顙大顙大者鉗耳也此與標本終始同也平按顙大甲乙經作頏顙少陽根於竅陰結於窗籠亦與標本同也平按窗籠下靈樞有窗籠者耳中也六字甲乙經同惟無中字太陽為關陽明為闔少陰為樞三陰三陽之身為門營衛身也門有三種一者門關比之太陽二者門扉比之陽明三者門樞比之少陽也平按為關靈樞甲乙經均作為開說見前陰陽合篇注身上所缺二字謹擬作脈於二字關折則肉節殰而暴疾起矣故暴病者取之太陽視有餘不足殰者肉宛燋而弱太陽主骨氣為關故骨氣折肉節內敗殰音獨胎生內敗曰殰肉節內敗故暴病起暴病起者則知太陽關折所以調太陽也平按殰靈樞作瀆甲乙經作潰緩二字肉宛燋靈樞作皮肉宛膲甲乙經作皮肉緩膲注骨氣折下袁刻脫肉節內敗四字闔折則氣無所止息而痿疾起矣故痿疾者取之陽明視有餘不足陽明主肉主氣故肉氣折損則正氣不能禁用即身痿厥痿而不收則知陽明闔折也平按疾甲乙經作病無所止息者謂真氣稽留邪氣居之能止氣不泄能行氣滋息者真氣之要也陽明闔折則真氣稽留不用故邪氣居之痿疾起也平按注要下別本有用字樞折則骨繇而不安於地故骨繇者取之少陽視有餘不足少陽主筋筋以約束骨節骨節氣弛無所約束故骨搖骨搖則知少陽樞折也平按甲乙經繇作搖不安作不能安骨繇者節緩而不收所謂骨繇者搖也當竅其本骨節緩而搖動竅音核診候研竅得其病源然後取之也平按不收下甲乙經有者字無骨繇者及所謂骨繇者搖也十字竅靈樞作窮太陰根於隱白結於太倉隱白足大趾端太倉在中管穴與標本不同平按隱白甲乙經作陰白恐誤注中管上所缺一字袁刻作脘按中管穴本書作中管甲乙經作中脘即太倉穴在上脘下一寸居心蔽骨與齊之中乃任脈腹自鳩尾十五穴之一謹擬作腹少陰根於湧泉結於廉泉少陰先出湧泉為根行至踝下二寸中為本上行至結喉上廉泉為結上至舌本及腎輸為標有此不同也平按湧靈樞甲乙經作湧注上至舌本袁刻上作止厥陰根於大敦結於玉英終於膻中厥陰先出大敦為根行至行間上五寸所為本行至玉英膻中為結後至肝輸為標有此不同也平按終靈樞甲乙作絡厥陰一段甲乙經在少陰之前太陰為關厥陰為闔少陰為樞門有二種有內門外門三陰為內門三陽為外門內門關者謂是太陰內門闔者謂是厥陰內門樞者謂是少陰也平按關靈樞甲乙經作開下同說見前關折則倉廩無所輸鬲洞者取之太陰視有餘不足故關折者氣不足而生病太陰主水穀以資身肉太陰脈氣關折則水穀無由得行故曰倉無輸也以無所輸膈氣虛弱洞泄無禁故氣不足而生病也平按靈樞甲乙經鬲作膈洞下復有膈洞二字闔折則氣施而喜悲悲者取之厥陰視有餘不足厥陰主筋厥陰筋氣緩縱則無禁喜悲平按施靈樞作絶甲乙經作弛喜甲乙經作善樞折則脈有所結而不通不通者取之少陰視有餘不足有結者皆取之少陰主骨骨氣有損則少陰之脈不流故有所結不通結即少陰絡結也平按皆取之下靈樞有不足二字足太陽根於至陰流於京骨注於崑崙入於天柱飛陽也輸穴之中言六陽之脈流井滎輸原經合五行次第至身為極今此手足六陽從根至入流注上行與本輸及明堂流注有所不同此中根者皆當彼所出此中流者皆當彼所過唯手太陽流不在完骨之過移當彼經陽谷之行疑其此經異耳此中注者皆當彼行唯足陽明不當解溪之行移當彼合下陵亦謂此經異耳此中入者並與彼不同六陽之脈皆從手足指端為根上絡行至其別走大絡稱入入有二處一入大絡一道上行至頭入諸天柱唯手足陽明至頸於前人迎扶突流注以所出為井此為根者井為出水之處故根即井也天柱挾項大筋外廉陷中足太陽之正經也飛陽在足外踝上七寸足太陽之大絡也平按流靈樞作溜下同不再舉注稱入入三字袁刻空三格足少陽根於竅陰流於丘虛注於陽輔入於天容光明也天容在耳下曲頰後足少陽正經也光明在外踝上七寸足少陽大絡也平按竅陰甲乙經作竅陽足陽明根於厲兌流於衝陽注於下陵入於人迎豐隆也人迎在結喉旁大脈動應手足陽明正經也豐隆在足外踝上八寸骭外廉陷者中足陽明之大絡也手太陽根於少澤流於陽谷注於少海入天窗支正也天窗在曲頰下扶突後動應手陷者中手太陽之正經也支正在腕後五寸手太陽之大絡也平按陽谷甲乙經作暘谷手少陽根於關衝流於陽池注於支溝入天牖外關也天牖在頸缺盆上天容後天柱前完骨下髮際上手少陽正經也外關在腕後三寸空中一寸手少陽之大絡也手陽明根於商陽流於合骨注於陽溪入扶突偏歷也扶突在曲頰下一寸人迎後手陽明正經也偏歷在腕後三寸手陽明之大絡也此所謂根十二經者盛絡者皆當取之此根入經唯有六陽具而論者更有六陰之脈言其略耳此謂根者皆是三經循此十二正經旁有絡脈血之盛者皆當其部內量而取之平按靈樞甲乙經無根字盛絡甲乙經作絡盛
