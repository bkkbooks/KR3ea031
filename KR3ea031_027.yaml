body:
  text: 卷第二十七邪論七邪平按此篇自篇首至末見靈樞卷十二第八十大惑論又自篇首至甚者為惑見甲乙經卷十二第四又自人之喜忘者至故不嗜食也見甲乙卷十二第一自病而不得臥出者至末見甲乙卷十二第三惟編次小異黃帝問於岐伯曰余嘗登於清冷之臺中階而顧匍匐而前則惑余私異之竊內怪之狂瞑獨視安心定氣久而不解獨轉獨眩被髮長跪俯而視之後久之不已卒然自止何氣使然小怪曰異之大異曰怪之瞑目合也俯而視之下直視也何氣使然問其生惑所由也轉有為傳眩有為脆量誤也冷有本為零也平按靈樞嘗登作嘗上狂瞑作獨瞑獨轉作獨傳自止作自上甲乙清冷之臺作青霄之臺中階作中陛而顧作而惑無匍匐至怪之十四字獨瞑獨視作獨冥視之被髮上無獨轉獨眩四字後久之不已作久不已三字岐伯曰五臟六腑之精氣皆上注於目而為之精五臟六腑精液及臟腑之氣清者上升注目以為目之精也平按甲乙無皆字精之果者為眼精之果別稱為眼果音顆平按靈樞果作窠無者字甲乙果作裹骨之精為瞳子腎精主骨骨之精氣為目之瞳子筋之精為黑眼肝精主筋筋氣以為精之黑眼也血之精為絡心精主血血氣以為眼精赤絡其果氣之精為白眼肺精主氣氣之精為白眼平按靈樞果作窠甲乙其果作其絡白眼作白睛肌肉之精則為約束裹擷脾精主肉肉氣之精以為眼之束約裹擷擷胡結反平按甲乙擷作契筋骨血氣之精而與脈併為系上屬於腦後出於項中四氣之精並脈合為目系其繫上屬於腦後出項中故邪中於項因逢其身虛其入深則隨眼系以入於腦則腦轉腦轉則引目系目系急急則目眩以轉矣後曰項前曰頸以目系入腦故邪循目系腦轉目眩也平按甲乙項作頭因作目靈樞入於腦下重入於腦三字甲乙重入字目系目系急急靈樞甲乙作目系急目系急邪中其精所中不相比也則精散精散則視歧故見兩物五精合而為眼邪中其精則五精不得比和別有所見故視歧見於兩物如第二問等也平按邪中其精靈樞作邪其精其精五字甲乙作邪中之精則其精袁刻精誤作經注亦誤目者五臟六腑之精也營衛魂魄之所常營也神氣之所生也故神勞則魂魄散志意亂目之有也凡因三物一為五臟六腑精之所成二為營衛魂魄血氣所營三為神明氣之所生是則以神為本故神勞者魂魄意志五神俱亂也是故瞳子黑眼法於陰白眼赤脈法於陽故陰陽合傳而精明也是以骨精瞳子筋精黑眼此二是肝腎之精故法於陰也果氣白眼及血之赤脈此二是心肺兩精故法於陽也肺雖少陰猶在陽中故為陽也此之陰陽四精和合通傳於氣故曰精明也平按甲乙白眼作白睛合傳作合揣注云靈樞作傳目者心之使也心者神之舍也故神分精亂而不傳卒然見非常之處精神魂魄散不相得故曰惑心藏者心內形也心者神之用神者心之主也故神勞分散則五精亂不相傳卒見非常兩物者也以其精神亂為惑也平按傳靈樞作轉甲乙作揣注云一作轉黃帝曰余疑其然余每之東苑未嘗不惑去之則復余惟獨為東苑勞神乎何其異也清冷之臺在東苑故每往登臺則惑去臺則復於常豈不為彼東苑勞神遂至有惑是所可怪也岐伯曰不然也心有所喜神有所惡卒然相感則精氣亂視誤故惑神移乃復夫心者神用謂之情也情之所喜謂之欲也故情之起欲是神之所惡神之所好心之所惡是以養神須去情欲欲去神安長生久視任心所作則情欲百端情欲既甚則傷神害命斯二不可並行並行相感則情亂致惑若得神移反本則惑解神復平按卒然相感靈樞甲乙感作惑注並行相感袁刻感誤作惑是故間者為迷甚者為惑黃帝曰善間輕也甚重也此為第一惑邪黃帝曰人之喜忘者何氣使然岐伯曰上氣不足下氣有餘腸胃實而心肺虛虛則營衛留於下久不以時上故喜忘矣心肺虛上氣不足也腸胃實下氣有餘也營衛行留於腸胃不上心肺虛故喜忘復有上時又得不忘也此為第二喜忘邪也平按喜忘靈樞甲乙作善忘靈樞久下有之字黃帝曰人之喜飢而不嗜食者何氣使然岐伯曰精氣並於脾熱氣留於胃胃熱則消穀谷消故喜飢胃氣逆上故胃管寒胃管寒故不嗜食也精氣陰氣也胃之陰氣並在脾內則胃中獨熱故消食喜飢胃氣獨熱逆上為難所以胃咽中冷故不能食也此為第三不嗜食邪平按靈樞甲乙喜飢作善飢胃管作胃脘黃帝曰病而不得臥出者何氣使然岐伯曰衛氣不得入於陰常留於陽留於陽則陽氣滿滿則陽蹺盛不得入於陰陰氣虛故目不得瞑矣衛氣晝行陽脈二十五周夜行五臟二十五周晝夜周身五十周若衛行陽脈不入臟陰則陽脈盛則陽蹺盛而不和陰蹺虛也二蹺並至於目故陽盛目不得瞑所以不臥此為第四不得臥邪瞑音眠平按靈樞臥下無出字疑衍甲乙瞑作眠黃帝曰病而目不得視何氣使然岐伯曰衛氣留於陰不得行於陽留於陰則陰氣盛盛則陰蹺滿不得入於陽陽氣虛故目閉焉衛氣留於五臟則陰蹺盛不和惟陰無陽所以目閉不得視也以陽主開陰主閉也此為第五不得視邪也平按病而目靈樞作病目而甲乙作目閉二字留作行行作入注云九卷行作留入作行黃帝曰人之多臥者何氣使然岐伯曰此人腸胃大而皮膚澀而分肉不解焉腸胃大則衛氣留久皮膚澀則分肉不解其行遲夫衛氣者晝日常行於陽夜行於陰故陽氣盡則臥陰氣盡則寤故腸胃大則衛氣行留久皮膚澀分肉不解則行遲留於陰也久其氣不精則欲瞑故多臥腸胃小皮膚滑以緩分肉解利衛氣之留於陽也久故少臥焉其人腸胃能大皮膚能澀大則衛氣停留澀則衛氣行遲留而行澀其氣不精故多臥少寤反之少臥此為第六多臥邪也平按澀靈樞作濕甲乙作澀不精靈樞作不清注多臥邪袁刻邪作者黃帝曰其非常經也卒然多臥者何氣使然岐伯曰邪氣留於上焦上焦閉而不通已食若飲湯衛反留於陰而不行故卒然多臥邪氣留於上焦上焦之氣不行或因飲食衛氣留於心肺故悶而多臥此為第七邪也平按衛反留靈樞作衛氣留久甲乙作衛氣久留黃帝曰善治此諸邪奈何岐伯曰先其腑臟誅其小過後調其氣盛者瀉之虛者補之必先明知其形氣之苦樂定乃取之療此七邪之法先取五臟六腑諸募等臟腑之上諸穴除其微過然後調其臟腑五輸六輸而補瀉之補瀉之前必須明知形氣虛實苦樂之志然後取之平按先其腑臟靈樞作先其臟腑甲乙作先視其腑臟形氣靈樞作形志十二邪平按此篇自篇首至末見靈樞卷五第二十八口問篇又自黃帝曰人之欠者何氣使然至末見甲乙經卷十二第一惟編次小異黃帝間居避左右而問岐伯曰余以聞九針之經論陰陽逆順六經已畢願得口問岐伯避席再拜對曰善乎哉問也此先師之所口傳也間居晏也避去也六經陰陽各有三陰三陽之脈也口傳者文傳得粗口傳得妙謂口決其理也平按靈樞避左右作闢左右以聞作已聞再拜下無對字黃帝曰願聞口傳岐伯曰夫百病之始生也皆生於風雨寒暑陰陽喜怒食飲居處大驚卒恐風雨寒暑居處外邪也陰陽喜怒飲食驚恐內邪也平按願聞袁刻作願問食飲靈樞作飲食血氣分離此內外邪生病所由凡有五別一令血之與氣不相合也陰陽破散二令臟腑陰陽分散也經絡決絶脈道不通三令經脈及諸絡脈不相通也平按靈樞決作厥陰陽相逆衛氣稽留四令陰陽之氣乖和衛氣不行經脈空虛血氣不次乃失其常五令諸經諸絡虛竭營血衛氣行無次第平按靈樞空虛作虛空論不在經者請道其方如上所説論在經者余已知之有所生病不在經者請言其法也黃帝曰人之欠者何氣使然岐伯曰衛氣晝日行於陽夜則行於陰陰者主夜夜者主臥陽者主上陰者主下故陰氣積於下陽氣未盡陽引而上陰引而下陰陽相引故數欠陽氣盡而陰氣盛則目瞑陰氣盡而陽氣盛則寤矣陽氣主晝在上陰氣主夜在下陰氣盡陽氣盛則寤陽氣盡陰氣盛則瞑今陽氣未盡故引陰而上陰氣已起則引陽而下陰陽相引上下故數欠也平按甲乙晝下無日字夜則行於陰無則字靈樞夜下有半字又甲乙陽引作陽氣陰引作陰行則寤下有腎主欠三字瀉足少陰補足太陽瀉於腎脈足少陰實補於膀胱脈足太陽虛令陰陽氣和故欠愈也有本作足太陰黃帝曰人之噦者何氣使然岐伯曰谷入於胃胃氣上注於肺今有故寒氣與新穀氣俱還入於胃新故相亂真邪相攻並相逆復於胃故為噦谷入胃已清氣上注於肺濁氣下留於胃有故寒氣與新穀氣俱入於胃新故真邪在於胃中相攻相逆復從胃出故為之噦平按並相逆靈樞並上有氣字甲乙無並字復於胃靈樞甲乙復下有出字補手太陰瀉足少陰宜補肺脈手太陰瀉腎脈足少陰以足少陰主寒故須瀉之手太陰主氣故先補之平按甲乙補上有肺主噦三字足少陰作足太陰下有亦可以草刺其鼻嚏而已無息而疾引之立已大驚之亦可已二十四字黃帝曰人之唏者何氣使然岐伯曰此陰氣盛而陽氣虛陰氣疾而陽氣徐陰氣盛陽氣絶故為唏唏火幾反笑也陰氣盛而行疾陽氣虛而行徐是以陽氣絶為唏也補足太陽瀉足少陰以腑膀胱太陽氣絶故須補之腎臟少陰氣盛故須瀉之黃帝曰人之振寒者何氣使然岐伯曰寒氣客於皮膚陰氣盛陽氣虛故振寒寒栗補諸陽以陽虛陰盛陽虛故皮膚虛陰盛故寒客皮膚故振寒寒栗宜補三陽之脈黃帝曰人之噫者何氣使然岐伯曰寒氣客於胃厥逆從下上散復出於胃故為噫寒氣先客於胃厥而逆上消散復從胃中出故為噫補足太陰陽明一曰補眉本脾胃腑臟皆虛故補斯二脈眉本是眉端攢竹穴足太陽脈氣所發也黃帝曰人之嚏者何氣使然岐伯曰陽氣和利滿於心出於鼻故為嚏陽之和氣利滿於心中上衝出於鼻故為嚏也補足太陽榮眉本一曰眉上陽虛而利故補陽脈太陽起鼻上兩箱發於攢竹太陽榮在通谷足趾外側本節前陷中黃帝曰人之撣者何氣使然岐伯曰胃不實則諸脈虛諸脈虛則筋肉懈惰筋肉懈惰行陰用力氣不能復故為撣胃氣不實穀氣少也穀氣既少脈及筋肉並虛懈惰因此行陰行陰入房也此又入房用力氣不得復四肢緩縱故名為撣撣云干反牽引也謂身體懈惰牽引不收也平按撣靈樞作嚲音妥下垂也甲乙作軃乃嚲字之訛袁刻諸脈虛下脫諸脈虛三字注穀氣少誤作谷少氣補分肉間筋脈皆虛故取病所在分肉間補之黃帝曰人之哀而涕泣者何氣使然涕泣多目無所見何氣使然也岐伯曰心者五臟六腑之主也涕泣出之所以有三心者神用臟腑之主一也目者宗脈之所聚上液之道也手足六陽及手少陰足厥陰等諸脈湊目故曰宗脈所聚大小便為下液之道涕泣以為上液之道二也平按注以為上液之道袁刻脫以字口鼻者氣之門戶也目者惟是液之道也口鼻二竅氣液之道三也故悲哀愁憂則心動心動則五臟六腑皆搖搖則宗脈盛宗脈盛則液道開液道開故涕泣出焉有物相盛遂即心動以其心動即心臟及餘四臟並六腑亦皆搖動臟腑既動臟腑之脈皆動臟腑宗脈搖動則目鼻液道並開以液道開故涕泣出也平按宗脈盛靈樞甲乙盛作感又注有物相盛盛疑係感字傳寫之誤液者所以灌精而濡空竅者也故上液之道開泣出不止則液竭液竭則精不灌精不灌則目無所見矣故命曰奪精五穀液以灌目五穀之精潤於七竅今但從目鼻而出不止則竭也諸精不得其液則目眼無精故目無所見以奪精也平按泣出不止靈樞甲乙作則泣泣不止補天柱經俠項天柱經足太陽也天柱俠項後髮際大筋外廉陷中足太陽脈氣所發故補之平按項靈樞甲乙作頸甲乙頸下有俠頸者頭中分也七字本書在後黃帝曰人之太息者何氣使然岐伯曰憂思則心系急心系急則氣道約氣道約則不利故太息以申出憂思勞神故心系急心系連肺其脈上迫肺系肺係為喉通氣之道既其被迫故氣道約不得通也故太息取氣以申出之平按申靈樞甲乙作伸補手少陰心主足少陽留之手少陰手心主二經皆是心經足少陽膽經以心系急引於肝膽故二陰一陽並須留針以緩黃帝曰人之涎下者何氣使然岐伯曰飲食者皆入於胃胃中有熱熱則蟲動蟲動則胃緩胃緩則廉泉開故涎下蟲者谷蟲在於胃中也廉泉舌下孔通涎道也人神守則其道不開若為好味所感神者失守則其孔開涎出也亦因胃熱蟲動故廉泉開涎因出也平按涎甲乙作豸補足少陰腎足少陰脈上挾舌本主於津涎今虛故涎下是也黃帝曰人之耳中鳴者何氣使然岐伯曰耳者宗脈之所聚也故胃中空則宗脈虛虛則下溜脈有所竭者故耳鳴人耳有手足少陽太陽及手陽明等五絡脈皆入耳中故曰宗脈所聚也溜脈入耳之脈溜行之者也有竭不通虛故耳鳴也補客主人手大指爪甲上與肉交者手陽明入耳過客主人也手大指爪甲上手太陰脈是手陽明之裡此陰陽皆虛所以耳鳴故並補之平按甲乙無爪字黃帝曰人之自齧舌者何氣使然岐伯曰此厥逆走上脈氣輩至也輩類也厥逆之氣上走於頭故上頭類脈所至之處即自齧舌也平按甲乙齧作齧輩作皆少陰氣至則齧舌少陽氣至則齧頰陽明氣至則齧唇矣視主病者則補之腎足少陰脈厥逆至於舌下則便齧舌手足少陽脈厥逆行至於頰即便齧頰手足陽明厥逆行至於唇即便齧唇此輩諸脈以虛厥逆故視其所病之脈補也凡此十二邪者皆奇邪之走空竅者也故邪之所在皆為之不足此十二邪皆令人虛故曰奇邪空竅謂是輸竅者也此之邪氣所至之處損於正氣故令人不足為病也平按甲乙十二作十四故上氣不足腦為之不滿耳為之善鳴頭為之傾目為之瞑頭為上也邪氣至頭耳鳴頭不能正目暗者也平按靈樞善鳴作苦鳴傾上有苦字瞑作眩中氣不足溲便為之變腸為之喜鳴腸及膀胱為中也邪至於中則大小便色皆變於常及腸鳴也平按喜靈樞作苦甲乙作善袁刻亦作善下氣不足則為痿厥足悶補足外踝下留之邪氣至足則足痿厥撣緩其足又悶可補之外踝之下一本刺足大趾間上二寸留之平按靈樞為上有乃字足悶作心悗甲乙作心悶急下有刺足大趾上二寸留之本書在後黃帝曰治之奈何岐伯曰腎主為欠取足少陰肺主為噦取手太陰足少陰唏者陰與陽絶故補足太陽瀉足少陰振寒補諸陽噫補足太陰陽明嚏補足太陽眉本撣因其所在補分肉間泣出補天柱經俠項俠項者頭中分也平按靈樞項作頸太息補手少陰心主足少陽留之涎下補足少陰耳鳴補客主人手大指爪甲上與肉交者自齧頰平按靈樞頰作舌視主病者則補之目瞑項強足外踝下留之痿厥足悶刺足大趾間上二寸留之一曰足外踝下留之以下委言療方與陽者陰盛不絶不可瀉不得言與可為盛也頭中分者取宗脈所行頭中之分撣痿厥同為一病名字有異此文信之也平按目瞑項強靈樞作目眩頭傾足上有補字足悶作心悗邪客平按此篇自篇首至末見素問卷十一第三十九舉痛論篇又自五臟六腑固盡有部至青黑為痛見甲乙經卷一第十五黃帝問岐伯曰余聞善言天者必有驗於人人之善言天者是人必法天以言人故有驗於人也善言古者必有合於今以今尋古為今法故必合於今善言人者必厭於己善言知人必先足於己乃得知人不足於己而欲知人未之有也平按素問厭上有有字如此則道不惑而要數極所謂明矣如此人有三善之行於道不惑所以然者得其要理之極明達故也數理也今余問於夫子令可驗於己令之可言而知也視而可見捫而可得令驗於己如發蒙解惑可得聞乎先自行之即可驗於己也然後問其病之所由故為言而知之也察色而知故為視而知之也診脈而知故為捫而可得斯為知者先驗於身故能為人發蒙於耳目解惑於心腑於此之道可以聞否平按素問令可驗於己令之可言而知也十二字作令言而可知五字如發蒙作而發蒙岐伯再拜曰帝何道之問黃帝曰願聞人之五臟卒痛何氣使然岐伯曰經脈流行不止環周不休寒氣平按氣有本作風入焉經血稽遲泣而不行客於脈外則血少客於脈中則氣不通故卒痛矣平按素問入焉經血稽留作入經而稽留故卒痛矣作故卒然而痛黃帝曰其痛也或卒然而止者或常痛甚不休者或痛甚不可按者或按之而痛止者或按之而無益者或喘動應手者或心與背相應而痛者平按素問相應作相引或心脅肋與少腹相引而痛者平按素問脅上無心字或腹痛引陰股者或痛宿昔成積者或卒然痛死不知人有間復生者平按素問有間作有少間或腹痛而悗悗歐者或腹痛而復泄者或痛而閉不通者股外為髀髀內為股陰下之股為陰股也悗音悶也平按素問或腹痛而悗悗歐者作或痛而嘔者注陰股袁刻誤作陰病凡此諸痛各不同形別之奈何凡此十四別病十三寒客內為病一種熱氣客內為閉皆為痛病不知所由故須問之平按諸痛袁刻作諸病岐伯對曰寒氣客於腸外則腸寒寒則縮卷卷則腸絀急絀急則外引小絡故卒然痛得炅則痛立已矣因重中於寒則痛久矣絀褚律反縫也謂腸寒捲縮如縫連也腸絀屬腸經之小絡散絡於腸故腸寒絀急引絡而痛得熱則立已炅熱也平按素問腸均作脈卷作蜷立已作立止寒氣客經脈之中與炅氣相薄則脈滿滿則痛而不可按也寒氣稽留炅氣從上則脈充大而血氣亂故痛不可按也痛不可按之兩義解之一寒熱薄於脈中滿痛不可得按二寒下留熱氣上行令脈血氣相亂故不可按也平按素問故痛作故痛甚寒氣客於腸胃之間募原之下而不得散小絡急引故痛按之則氣散故痛止矣腸胃皆有募有原募原之下皆有孫絡寒客腸胃募原之下孫絡引急而痛故按之散而痛止平按素問而不得散作血不得散故痛止作故按之痛止寒氣客於挾脊之脈則深按之不能及故按之無益挾脊脈督脈挾脊故曰挾脊脈也督脈挾於脊裡而上行深故按之不及所以按之無益者也寒氣客於衝脈衝脈起於關元隨腹直上則脈不通不通則氣因之故喘動應手矣關元在臍下小腹下當於胞故前言衝脈起於胞中直上邪氣客之故喘動應手有本無起於關元下十字也平按素問直上下有寒氣客三字寒氣客於背輸之脈則脈泣泣則血虛虛則痛其輸注於心故相引而痛按之則熱氣至至則痛止矣背輸之脈足太陽脈也太陽心輸之絡注於心中故寒客太陽引心而痛按之不移其手則手熱故痛止平按素問則脈泣作則血脈澀注於心袁刻誤作主於心注寒客太陽袁刻誤作寒客大腸寒氣客於厥陰厥陰之脈者絡陰器繫於肝寒氣客於脈中則血泣脈急引脅與少腹矣厥陰肝脈屬肝絡膽布脅肋故寒客血泣脈急引脅與少腹痛也平按素問客於厥陰下有之脈二字引脅與少腹作故脅肋與少腹相引痛厥氣客於陰股寒氣上及少腹血泣在下相引故痛厥氣客在陰股陰股之血凝泣故其氣上引少腹而痛也平按素問故痛作故腹痛引陰股寒氣客於五臟厥逆上泄陰氣竭陽氣未入故卒然痛死不知人氣復反則生矣寒氣入五臟中厥逆上吐遂令陰氣竭絶陽氣未入之間卒痛不知人陽氣入臟還生也寒氣客於腸募關元之間絡血之中血泣不得注於大經血氣稽留留不得行故卒然成積矣腸謂大腸小腸也大腸募在天樞臍左右各二寸原在手大指之間小腸募在臍下三寸關元原在手外側腕骨之前完骨寒氣客此募原之下血絡之中凝泣不行久留以成積也平按素問腸募關元作小腸募原卒然作宿昔此節在寒氣客於五臟上寒氣客於腸胃厥逆上出故痛而嘔矣寒客腸胃其氣逆上故痛嘔吐也寒氣客於小腸不得成聚故後泄腹痛矣寒客小腸不得成於積聚故後利腹痛也熱氣留於小腸小腸中疸熱焦竭則故堅幹不得出矣熱氣留止小腸之中則小腸中熱糟粕焦竭干堅故大便閉不通矣平按素問小腸中疸熱作腸中痛疸熱堅上無故字不得出下有故痛而閉不通六字注留止袁刻作留於黃帝曰所謂言而可知者也視而可見奈何岐伯曰五臟六腑固盡其部視其五色黃赤為熱白為寒青黑為痛此所謂視可見者也五臟六腑各有色部其部之中色見視之即知臟腑之病此則視而可見者也平按甲乙青黑為痛在黃赤為熱上黃帝曰聞而可得奈何岐伯曰視其主病之脈堅而血皮及陷下者可聞而得也視脈及皮之狀問其所由故為聞而得也平按素問聞作捫據上文捫而可得應作捫血下無皮字黃帝曰善邪中平按此篇自篇首至末見靈樞卷一第四邪氣臟腑病形篇又見甲乙經卷四第二上篇黃帝問岐伯曰邪氣之中人也奈何岐伯曰邪氣之中人也高黃帝曰高下有度乎岐伯曰身半以上者邪中之也身半以下者濕中之也高者上也身半以上風雨之邪所中故曰中於高也風為百病之長故偏得邪名也身半以下清濕之邪濕最沉重故襲下偏言也平按靈樞也高作高也甲乙以下作已下故曰邪之中人也無有恆常中於陰則留於腑中於陽則留於經邪中於臂胻之陰獨傷陰經流入中臟臟實不受邪客故轉至留於六腑者也中於頭面之陽循三陽經下留陽經故曰無常也平按靈樞無恆字留作溜甲乙經經作藏黃帝曰陰之與陽也異名同類上下相會陰陽異名同為氣類三陽為表居上三陰為里在下表裡氣通故曰相會經絡之相貫如環無端三陰之經絡脈別走入於三陽三陽之經絡脈別走入於三陰陰陽之氣旋回周而復始故曰無端邪之中人也或中於陰或中於陽上下左右無有恆常其故何也經絡相貫周環自是常理邪之中人循行亦可與經絡同行然中於陰陽上下左右生病異者其故何也岐伯答曰諸陽之會皆在於面人之方乘虛時及新用力若熱飲食汗出腠理開而中於邪手足三陽之會皆在於面人之受邪所由有三一為乘年虛時二為新用力有勞三為熱飲熱食汗出腠理開有此三虛故邪中人平按靈樞人之二字作中人也三字若下無熱字中面則下陽明中項則下太陽中於頰則下少陽其中於膺背兩脅亦中其經邪之總中於面則著手足陽明之經循之而下若中頭後項者則著手足太陽之經循之而下若別中於兩頰則著手足少陽之經循之而下若中胸背及兩脅三處亦著三陽之經循經而下也黃帝曰其中於陰奈何岐伯答曰中於陰者常從臂胻始夫臂與胻其陰皮薄其肉淖澤故俱受於風獨傷其陰以下言邪中於陰經也四肢手臂及腳胻當陰經上皮薄其肉濁澤故四處俱受風邪所以獨傷陰經下經言風雨傷上清濕傷下者舉多為言其實腳胻亦受風邪也平按注濁澤依經文應作淖澤黃帝曰此故傷其臟乎岐伯曰身之中於風也不必動臟故邪入於陰經其臟氣實邪氣入而不能客故還之於腑是故陽中則溜於經陰中則溜於腑邪之傷於陰經傳之至臟以臟氣不客外邪故還流於六腑之中也故陽之邪中於面流於三陽之經陰之邪中臂胻溜於六腑也平按甲乙客作容溜作留府作腑黃帝曰邪之中臟者奈何前言外邪不中五臟次言邪從內起中於五臟故問起也岐伯曰愁憂恐懼則傷心愁憂恐懼內起傷神故心臟傷也形寒飲寒則傷肺以其兩寒相感中外皆傷故氣逆而上行形寒飲寒內外二寒傷肺以肺惡寒也平按飲寒靈樞作寒飲甲乙作飲冷有所墜墮惡血留內若有所大怒氣上而不下積於脅下則傷肝因墜惡血留者外傷也大怒內傷也內外二傷積於脅下傷肝也平按靈樞甲乙無若字有所擊僕若醉入房汗出當風則傷脾擊僕當風外損也醉以入房汗出內損也內外二損故傷脾也平按甲乙醉上有以字有所用力舉重若入房過度汗出浴水則傷腎用力舉重汗出以浴水外損也入房過度內損也由此二損故傷腎也平按浴水水字袁刻誤作也黃帝曰五臟之中風奈何岐伯曰陰陽俱感邪乃得往黃帝曰善前言五臟有傷次言五臟中風陰陽血氣皆虛故俱感於風故邪因往入也平按甲乙俱感作俱相感黃帝問岐伯曰首面與身形屬骨連筋同血合氣耳天寒則地裂凌冰其卒寒或手足懈惰然其面不衣其故何也首面及與身形兩者皆屬於骨俱連於筋同受於血併合於氣何因遇寒手足冷而懈惰首面無衣不寒其故何也平按袁刻氣下脫耳字岐伯曰十二經脈三百六十五絡其血氣皆上於面而走空竅六陽之經並上於面六陰之經有足厥陰經上面餘二至於舌下不上於面而言皆上面者舉多為言耳其經絡血氣貫通故皆上走七竅以為用也平按注六陽之經袁刻之作六其精陽氣上於目而為精其經絡精陽之氣上走於目成於眼精也平按甲乙氣上有之字靈樞上於目作上走於目為精作為睛甲乙同其彆氣走於耳而為聽別精陽氣入耳以為能聽其宗氣上出於鼻而為臭五臟聚氣以為宗氣宗氣入鼻能知臭也其濁氣出於胃走唇舌而為味耳目視聽故為清氣所生唇舌識味故為濁氣所成味者知味也平按甲乙出上有下字其氣之津液皆上熏於面麵皮又厚其肉堅故熱甚寒不能勝也以其十二經脈三百六十五絡血氣皆上熏面以其陽多其皮堅厚故熱而能寒也平按麵皮靈樞甲乙作而皮熱上靈樞有天字甲乙有大字勝下均有之字邪傳平按此篇自篇首至是謂至治見靈樞卷十第六十六百病始生篇又見甲乙經卷八第二自五邪入至末見素問卷七第二十三宣明五氣篇黃帝問於岐伯曰夫百病之始生也皆生於風雨寒暑清濕喜怒濕從地起雨從上下其性雖同生病有異寒生於外清發於內性是一物起有內外所病亦有不同喜者陽也怒者陰也此病之起也喜怒不節則傷臟心主於喜肝主於怒二者起之過分即傷神傷神即內傷五臟即中內之部也風雨則傷上清濕則傷下三部之氣所傷異類願聞其會風雨從頭背而下故為上部之氣清濕從尻腳而上故為下部之氣所傷之類不同望請會通之也岐伯對曰三部之氣各不同或起於陰或起於陽請言其方或起於陰謂臂胻及尻或起於陽謂面與項膺背及脅請具申之也喜怒不節則傷於臟臟傷則病起於陰陰謂內也清濕襲虛則病起於下風雨襲虛則病起於上足陽並於陰陰虛即清濕襲之故曰病起於下也人之面項陰並於陽氣虛即風雨襲之故曰病在於上也是謂三部至其淫佚不可勝數是謂三部之氣生病不同更隨所因變而生病漫衍過多不可量度也平按佚靈樞甲乙作泆下同黃帝問曰余固不能數故問於天師願卒聞其道諸邪相傳變化為病余知不可數量天師所知固應窮其至數余請卒聞其道天師尊之號也平按靈樞天師作先師岐伯對曰風雨寒熱不得虛邪不能獨傷人卒然逢疾風暴雨而不病者亦無虛邪不能獨傷人必因虛邪之風與其身形兩虛相得乃客其形虛邪即風從虛鄉來故曰虛邪風雨寒熱四時正氣也四時正氣不得虛邪之氣亦不能傷人卒風暴雨雖非正氣不得虛邪之氣亦不能傷人獨有虛邪之氣亦不能傷人必因虛邪之風及身形虛相感故得邪客於形平按亦無虛邪甲乙亦作蓋靈樞同惟邪上有故字相得甲乙作相搏兩實相逢衆人肉堅其中於虛邪也因於天時與其躬身參以虛實大病乃成風雨寒暑四時正氣為實風也衆人肉堅為實形也兩實相逢無邪客病也故虛邪中人必因天時虛風並身形虛合以虛實也參合也虛者形虛也實者邪氣盛實也兩者相合故大病成也平按甲乙衆人肉堅作中人肉間因於天時作因其天時躬身靈樞作身形氣有定舍因處為名邪氣舍定之處即因處以施病名如邪舍形頭即為頭眩等頭病也若舍於腹即為腹痛泄利等病也若舍於足則為足悗不仁之病也上下中外分為三貞上謂頭面也下謂尻足也中謂腹三部各有其外也貞正也三部各有分別故名三貞也平按貞靈樞作員甲乙作真是故虛邪之中人也始於皮膚皮膚緩則腠理開從毛髮入入則柩深深則毛髮立淅然皮膚痛皮膚緩者皮膚為邪所中無力不能收故緩也人毛髮中虛故邪從虛中入也柩久也邪氣逆入久深腠理之時振寒也平按從毛髮入靈樞作開則邪從毛髮入柩靈樞作抵甲乙作稍留而不去則傳舍於絡脈在絡脈之時痛於肌肉其痛之時大經乃代去散邪也孫絡大絡皆稱絡脈也十二經脈行皆代息以大經在肌肉中今肌肉痛故大經代息也平按甲乙則傳舍於絡脈作則舍於絡痛於肌肉作通於肌肉其痛之時作其病時痛時息靈樞時下有息字留而不去傳舍於經在經之時洫泝善驚經脈連於五臟五臟為邪氣所動故其善驚驚即洫泝振寒也泝音訴平按洫泝靈樞作灑淅甲乙同善靈樞作喜留而不去傳舍於輸在輸之時六經不通四肢節痛腰脊乃強輸謂五臟二十五輸六腑三十六輸大經謂三陰三陽也輸在四肢故四肢痛也足太陽及督脈在腰脊邪氣循之故急強也平按輸素問甲乙作俞四肢節痛靈樞作四肢則肢節痛甲乙作四節即痛留而不去傳舍於伏沖在伏沖之時體重身痛衝脈為經絡之海故邪居體重平按傳舍甲乙作伏舍伏衝下靈樞甲乙有之脈二字體重身痛甲乙作身體重痛留而不去傳舍於腸胃舍於腸胃之時賁向腹脹多寒則腸鳴飧泄食不化多熱則溏出糜賁向虛起貌多寒則邪為飧泄多熱則邪為溏糜糜黃如糜也平按向靈樞作響甲乙作向袁刻作響甲乙不化上無食字注貌袁刻誤作也留而不去傳舍於腸胃之外募原之間腸胃之腑外有募原邪傳腸胃之外溢至募原之間也留著於脈稽而不去息而成積脈謂經脈及絡脈也謂邪著於經絡之脈傳入腸胃之間長息成於積病此句是總也平按靈樞甲乙稽下有留字或著孫絡或著絡脈或著經脈或著輸脈或著於伏沖之脈或著於膂筋或著於腸胃之募原上連於緩筋邪氣淫佚不可勝論以下言邪著成積略言七處變化滋章不可復論也輸脈者足太陽脈以管五臟六腑之輸故曰輸脈膂筋謂腸後脊膂之筋也緩筋謂足陽明筋以陽明之氣主緩平按孫絡靈樞作孫脈注滋章袁刻作滋蔓黃帝曰願盡聞其所由然願盡聞者願盡聞於成積所由岐伯曰其著孫絡之脈而成積者其積往來上下臂手孫絡之居也浮而緩不能勾積而止之故往來移行腸間之水湊滲注灌濯濯有音居著也邪氣著於臂手孫絡隨絡往來上下其孫絡浮緩不能勾止積氣臂手之絡行在腸間故邪隨絡脈往來令腸間之水湊滲有聲也濯濯水聲也平按甲乙臂手作擘乎注擘音拍破盡也勾作抅腸間之水作腸胃之外靈樞作腸胃之間水有寒則脈䐜滿雷引故時切痛邪循於絡在腸間時有寒則孫絡䐜滿引腸而作雷聲時有切痛平按靈樞無脈字甲乙脈作腹其著於陽明之經則俠臍而居飽食則益大飢則益小胃脈足陽明之經直者下乳內廉下俠臍入氣街中故邪氣著之飽食則其脈粗大飢少穀氣則脈細小今人稱此病兩絃也平按靈樞俠作挾其著於緩筋也似陽明之積飽食則痛飢則安緩筋足陽明之筋也邪客緩筋是足陽明筋從上下腹俠臍而布似足陽明經脈之積飽則大而痛飢小而安亦邪挾經之大小也平按似袁刻作以注同靈樞亦作似其著於腸胃之募原也痛而外連於緩筋飽食則安飢則痛募謂腸胃腑之募也原謂腸胃腑之原也募原之氣外來連足陽明筋故邪使飽安飢痛也平按注足陽明筋袁刻筋誤作經其著於伏沖之脈者揣揣應手而動發手則熱氣下於兩股如湯沃之狀衝脈下者注少陰之大絡出於氣街循陰股內廉入膕中伏行胻骨內下至內踝之屬而別前者伏行出跗屬下循跗入大趾間以其伏行故曰伏沖揣動也以手按之應手而動發手則熱氣下於兩股如湯沃邪之盛也平按揣揣靈樞甲乙作揣之其著於膂筋在腸後者飢則積見飽則積不見按之弗得膂筋足少陰筋循脊內挾膂在小腸後附脊因飢則見按之可得飽則不見按之難得也平按甲乙弗得作伏得其著於輸之脈者閉塞不通津液不下空竅乾壅輸脈足太陽脈也以管諸輸絡腎屬膀胱故邪著之津液不通大便乾壅不得下於大小便之竅也平按空靈樞作孔甲乙作而空竅乾此邪氣之從外入內從上下者結邪行處也黃帝曰積之始生至其已成奈何岐伯曰積之始生得寒乃生厥上乃成積也夫聚者陽邪積者陰邪也此言病成若言從生陰陽生也故積之始生邪得寒氣入舍於足以為積始也故曰得寒乃生也寒厥邪氣上行入於腸胃以成於積也平按靈樞厥下無上字甲乙上作止黃帝曰成積奈何岐伯曰厥氣生足悗足悗生脛寒脛寒則血脈涘泣寒氣上入腸胃入於腸胃則䐜脹䐜脹則腸外之汁沫迫聚不散日以成積以上言成積所由三別外邪厥逆之氣客之則陽脈虛故脛寒脛脈皮薄故血寒而涘泣涘凝也寒血循於絡脈上行入於腸胃寒血入於腸胃則腸胃之內䐜脹腸胃之外冷汁沫聚不得消散故漸成積也此為生積所由一也平按足悗甲乙作足溢注云靈樞作足悗涘泣靈樞作凝澀甲乙作凝泣寒氣上甲乙作寒熱上下卒然盛食多飲則脈滿起居不節用力過度則絡脈傷陽絡傷則血外溢外溢則衄血陰絡傷則血內溢內溢則便血腸外之絡傷則血溢於腸外腸外有寒汁沫與血相薄則併合涘聚不得散積成矣盛飲多食無節遂令脈滿起居用力過度內絡脈傷若傷腸內陽絡則便衄血若傷腸內陰絡遂則便血若傷腸外之絡則血與寒汁凝聚為積此則生積所由二也平按靈樞盛食多飲作多食飲脈滿作腸滿涘聚靈樞甲乙作凝聚散下有而字卒然外中於寒若內傷於憂怒則氣上逆氣上逆則六輸不通溫氣不行涘血蘊裹而不散津液泣澡著而不去而積皆成矣人之卒然外中於寒以入於內內傷憂怒以應於外內外相搏厥氣逆上陰氣既盛遂令六腑陽經六輸皆不得通衛氣不行寒血凝泣蘊裹不散著而成積所由三也平按憂怒甲乙作憂恐六輸作穴俞涘血蘊裹作凝血縕裹泣澡作凝澀靈樞作澀滲黃帝曰其生於陰者奈何岐伯曰憂思傷心前言積成於陽以下言積成於陰憂思勞神故傷心也重寒傷肺飲食外寒形冷內寒故曰重寒肺以惡寒故重寒傷肺忿怒傷肝肝主於怒故多怒傷肝也醉以入房汗出當風則傷脾因醉入房汗出當風則脾汗得風故傷脾也平按醉以甲乙作醉飽用力過度若入房汗出浴水則傷腎腎與命門主於入房故用力及入房汗出浴水故傷於腎也平按靈樞無水字此外內三部之所生病者也黃帝曰善憂思為內重寒為外入房當風以為內外故合前三部所生病平按靈樞甲乙外內作內外治之奈何岐伯曰察其所痛以知其應有餘不足當補則補當瀉則瀉毋逆天時是謂至治凡積之病皆有痛也故察其痛以候其積既得其病順於四時以行補瀉可得其妙也五邪入邪入於陽則為狂邪入於陰則為血痹邪入於陽搏則為癲疾邪入於陰搏則為喑陽入之於陰病靜陰出之於陽病善怒熱氣入於陽脈重陽故為狂病寒邪入於陰脈重陰故為血痹陽邪入於陽脈聚為癲疾陽邪入於陰脈聚為喑不能言陽邪入陰者則為病好靜陰邪出之於陽陽動故多生怒也平按素問五邪入作五邪所亂則為血痹作則痹邪入於陽搏作搏陽二字邪入於陰搏作搏陰二字怒上無善字新校正云難經云重陽者狂重陰者癲巢元方云邪入於陰則為癲脈經云陰附陽則狂陽附陰則癲孫思邈云邪入於陽則為狂邪入於陰則為血痹邪入於陽傳則為癲痙邪入於陰傳則為痛喑全元起云邪已入陰復傳於陽邪氣盛腑臟受邪使其氣不朝榮氣不復周身邪與正氣相擊發動為癲疾邪已入陽陽今復傳於陰臟腑受邪故不能言是勝正也諸家之説不同故俱載又引全元起云陽入陰則為靜出則為恐千金方云陽入於陰病靜陰出於陽病怒五發陰病發於骨陽病發於血以味病發於氣陽病發於冬陰病發於夏陰之為病發骨疼等陽之為病發於血痹等五味為病發於氣不調等冬陽在內故病發冬夏陽在外故病發夏也平按素問五發作五病所發以味病發於氣作陰病發於肉
