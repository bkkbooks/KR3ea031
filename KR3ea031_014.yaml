body:
  text: 卷第十四卷首缺診候之一平按此篇自形氣相得者生以上殘缺袁刻據素問三部九候論自黃帝問曰余聞九針於夫子至胸中多氣者死補入檢素問原文自上部天至下部人足太陰也一段詳本書篇末乃宋臣林億等所移玩素問新校正自明此篇若據素問篇首補入則上部天至下部人足太陰也一段未免重復茲據素問及甲乙經帝曰決死生奈何以下補入證以新校正云全元起本名此篇為決死生於義亦合自形義相得以下見素問卷六第二十三部九候論又見甲乙經卷四第三三部九候篇帝曰決死生奈何岐伯曰形盛脈細少氣不足以息者危形瘦脈大胸中多氣者死以上從素問三部九候論及甲乙經三部九候篇補入形氣相得者生形盛氣盛形瘦氣細者得生三也參伍不調者病謂其人形氣有時相得有時不相得參類品伍不得調者其人有病四也以三部九候皆相失者死三部九候不得齊一各各不同相失故死五也平按素問甲乙無以字上下左右之脈相應參舂者病甚三部九候之脈動若引繩前後也今三部在頭為上三部在足為下左手三部為左右手三部為右脈之相應參動上下左右更起更息氣有來去如碓舂不得齊一又舂其脈上下參動東恭反所以病甚六也平按素問甲乙參上有如字上下左右相失不可數者死上下左右脈動各無次第數動脈不可得者脈亂故死七也中部之候雖獨調與衆藏相失者死肺心胸中以為中部診手太陰手陽明手少陰呼吸三脈調和與上下部諸臟之脈不相得者為死八也平按衆袁刻作諸中部之候相減者死中部手太陰手陽明手少陰三脈動數一多一少不相同者為死九也目內陷者死五臟之精皆在於目故五臟敗者為目先陷為死也以上十候決死生也黃帝曰何以知病之所在病之所在在於死生與決死生亦不易也但決有多端故復問也岐伯對曰察其九候獨小者病獨大者病獨疾者病獨遲者病獨熱者病獨寒者病脈獨陷者病以次復有一十八候獨小大等即為七也九候之脈上下左右均調若一故偏獨者為病也平按察下素問甲乙無其字以左手上去踝五寸而按之右手當踝而彈之其應過五寸以上藚然者不病脈和調也人當內踝之上足太陰脈見上行至內踝上八寸交出厥陰之後其脈行胃氣於五臟故於踝上五寸以左手按之右手當踝彈之左手下藚調動其人不病為候八也藚藚動不盛也藚而勉反平按素問左手下有足字甲乙有於左足三字按之上素問無而字下有庶字右手下有足字藚素問甲乙作蠕蠕又檢素問宋臣林億等引全元起注云內踝之上陰交之出通於膀胱繫於腎腎為命門是以取之以明吉凶今文少一而字多一庶字及足字王注以手足皆取為解殊為穿鑿當從全元起注舊本及甲乙經為正其應疾中手渾渾然者病彈之左手之下渾渾動而不調者病其候九也中手徐徐者病其應上不能至五寸者彈之不應者死足太陰血氣微弱彈之徐徐者有病不至五寸不應其手者為死十也平按徐徐下素問甲乙有然字脫肉身不去者死去者行也脫肉羸瘦身弱不能行者為死十一也平按原抄無不字據本注應有素問甲乙均作不去謹補入中部乍疏乍數者死中部謂手太陰手陽明手少陰乍有疏數為死十二也其脈代而勾者病在絡脈中部之脈手太陰秋脈也手少陰夏脈也秋脈王時得於脾脈土來乘金名曰虛邪故為病也夏脈王時得脾脈者土來乘火名曰實邪故為病也夏脈其病皆在絡脈可刺去血為病十三也平按其脈代三字甲乙作代脈二字九候之相應也上下若一不得相失一候後則病二候後則病甚三候後則病危所謂後者應不俱也察其病臟以知死生之期九候上下動脈相應若一不得相失忽然八候相應俱動一候在後即有一失故病二候在後不與七候俱動即為二失故病甚也三候在後不與六候俱動即為三失故病危也三候在後為病宜各察之是何臟之候候之即知所候之臟病有間甚死生之期三候在後為病有三失為十六也平按素問甲乙病臟作腑臟必先知經脈然後知病脈真臟脈見勝者死欲依九候察病定須先知十二經脈及諸絡脈行所在然後取於九候候諸病脈有真臟脈無胃氣之柔獨勝必當有死為十七也平按勝者死素問作者勝死甲乙作者邪勝死也五字注無胃氣無字袁刻誤作見足太陽氣絶者其足不可屈伸死必戴眼足太陽脈從目絡頭至足故其脈絶腳不屈伸戴目而死為十八也黃帝曰冬陰夏陽奈何九候之脈並沉細絶微為陰也然極於冬分故曰冬陰九候之脈盛躁喘數故為陽也極於夏分故曰夏陽請陳其理也岐伯對曰九候之脈皆沉細懸絶者為陰主冬故以夜半死深按得之曰沉動猶引線曰細來如斷繩故曰懸絶九候之脈皆如此者陰氣勝陽氣外絶陰氣獨行有里無表死之於冬陰極時也夜半死者陰極時也此一診也盛躁而喘數者為陽主夏以日中死其氣洪大曰盛去來動疾曰躁因喘數而疾故曰喘數九候皆如此者皆陽氣勝陰氣內絶陽氣獨行有表無里死之於夏陽極時也日中死者陽極時也此為二診是故寒熱者以平旦死脾病寒熱死於平旦平旦木也木克於土故脾病至平旦死此為三診也平按是故寒熱者以平旦死九字原抄在注二診下均作小字混入注中應據素問甲乙作經方與本注三診之義合袁刻於九字中依素問甲乙加一病字作大字移刻與上經文以日中死相連復於二診下仍存此九字於注中既嫌重復亦失真相茲於注二診下將原抄小字改書大字作經庶上注二診下注三診眉目朗然又寒熱下素問甲乙有病字寒熱上甲乙無是故二字熱中及熱病以日中死肺中熱傷寒熱病皆是陽病故死於日中陽極時也此為四診也平按病下素問甲乙有者字注日中二字袁刻重極下脫時字風病者以日夕死風為肝病酉為金時金克於木故日夕死此為五診也平按風病素問甲乙作病風病水者以夜半死水病陰病也夜半子時陰極死也此為六診其脈乍疏乍數乍遲乍疾以日乘四季死脾者土也王於四季平和時脈在中宮靜而不見有病見時乍疏乍數故以日乘四季時死也平按素問疾下有者字無以字甲乙有者字形肉已脫九候雖調猶死土為肉也肉為身主故脈雖調肉脫故死此為七診也平按甲乙調下有者字七診雖見九候皆順者不死所言不死者風氣之病及經間之病似七診之病而非也故言不死若有七診之病其脈候亦敗者死矣必發噦噫雖有七診死徵九候之脈順四時者謂之不死言七診見脈順生者謂風及氣並經脈間有輕之病見徵似於七診非真七診所以脈順得生若有七診其脈覆敗不可得生五臟先壞其人必發噦而死也平按素問順作從經間素問甲乙作經月必審問其故所始所病與今之所方病候病之要凡有四種一者望色而知謂之神也二者聽聲而知謂之明也三者尋問而知謂之工也四者切脈而知謂之巧也此問有三一問得病元始謂問四時何時而得飲食男女因何病等二問所病謂問寒熱痛熱痛癢諸苦等三問方病謂問今時病將作種種異也平按其故所始所病素問甲乙作其所始病而後切循其脈先問病之所由然後切循其脈以取其審切謂切割以手按脈分割吉凶循謂以手切脈以心循歷脈動所由故曰切循其脈也平按切上素問有各字注分割袁刻作分別視其經絡浮沉經謂十二經並八奇經絡謂十五大絡及諸孫絡切循之道視其經脈浮沉絡脈浮沉沉者為陰浮者為陽以知病之寒溫也以上下逆順循之其脈疾者不病其脈遲者病脈不往來者死皮膚著者死上謂上部下謂下部亦上謂咽之左右下謂手之左右寸口脈從臟起下向四肢者名之為順脈從四肢上向臟者稱之為逆切循上下順逆之脈疾行應數謂之不病上下有失遲不應數謂之病也手之三陰為往三陽為來足之三陽為往三陰為來皆不往來謂之死也人之氣和皮肉相離絶徑強相著者死也平按順素問甲乙作從往下甲乙有不字黃帝曰其可治者奈何前帝所言多有死候故問有病可療者三也岐伯對曰經病治其經孫絡病者治其孫絡以下言有可療病也邪在經者取其經邪在孫絡取孫絡也平按素問治其孫絡作治其孫絡血甲乙無二孫字血病身有痛者而治其經絡大經大絡共為血病身體痛者經與大絡皆治之也平按甲乙無血病二字袁刻病誤作痛真病者在奇邪奇邪之脈則繆刺之真正也當臟自受邪病不從傳來故曰正病奇邪謂是大經之上奇大絡也宜行繆刺左右平取也平按真病素問甲乙作其病留瘦不移節而刺留久也久瘦有病之人不可頓刺可節量刺之平按刺下素問甲乙有之字上實下虛者切順之索其經絡脈刺出其血以通之上實下虛可循其經絡之脈血之盛者皆刺去其血通而平之平按切上素問甲乙無者字切下有而字順素問作從以通之素問作以見通之甲乙作以通其氣瞳子高者太陽不足戴眼者太陽絶此決死生之要不可不察也太陽之脈為目上綱故太陽脈足則目本視也其氣不足急引其精故瞳子高也其脈若絶瞼精痿下故戴目也此等皆是決生死之大要不可不察也手指及手外踝上五寸指間留針前太陽不足及足太陽絶者足太陽脈也此療乃是手太陽脈者以手之太陽上下接於目之內眥故取手之太陽療目高戴也取手小指端及手外踝上五寸小指之間也平按留上素問無間字此節素問注謂錯簡文上部天兩額之動脈也上部地兩頰之動脈也上部人耳前之動脈也上部之天兩額足少陽陽明二脈之動候頭角氣上部之地兩頰足陽明在大迎中動候口齒氣上部之人目後耳前手太陽手少陽足少陽三脈在和窖中動候耳目之氣也中部天手太陰也中部地手陽明也中部人手少陰也中部之天手太陰脈動在中府天府俠白尺澤四處以候肺氣中部之地手陽明脈檢經無動處呂廣注八十一難云動在口邊以為候者候大腸氣中部之人手少陰動在極泉少海二處以候心氣也下部天足厥陰也下部地足少陰也下部人足太陰也下部之天足厥陰脈動在曲骨行間衝門三處以候肝氣下部之地足少陰脈動在大溪一處以候腎氣下部之人足太陰脈動在中府箕門五里陰廣衝門雲門六處以候脾氣十二經脈手心主無別心藏不入九候手太陽手少陽足太陽足少陽足陽明此五皆是五臟表經候臟知表故不入越於九候也平按自上部天至下部人足太陰也素問新校正依甲乙經編次移前四時脈形平按此篇自篇首至末見素問卷六第十九玉機真臟論篇又見甲乙經卷四經脈第一上篇黃帝問岐伯曰春脈如弦何如而弦岐伯曰春脈者肝脈也東方木也萬物所以始生也故其氣來濡弱軟虛而滑端直以長故曰弦反此者病凡人之身與天地陰陽四時之氣皆同故內身外物雖殊春氣俱發肝氣春王故春脈來比草木初出其若琴絃之調品者不大緩不大急不大虛不大實不澀不曲肝氣亦然濡潤柔弱軟小浮虛輕滑端直而尺部之上長至一寸故比之弦軟如遄反平按素問甲乙濡弱作耎弱軟虛作輕虛注調品袁刻作調和黃帝曰何如而反岐伯曰其氣來實而強此謂大過病在外其氣來不實而微此謂不及病在中其春脈堅實徑直名為來實而強此為春脈少陽有餘邪在膽腑少陽故曰在外一曰而弦疑非也其春脈厥陰脈來雖然不實而更微弱此為不足邪在肝臟厥陰故曰在中也黃帝曰春脈大過與不及其病皆何如岐伯曰大過則令人喜忘忽忽眩冒而癲疾春脈大過以邪在膽少陽少陽之脈循胸裡屬膽散之上肝貫心又抵角上頭故喜忘忽忽眩冒而癲也平按喜忘素問甲乙作善忘新校正云按氣交變大論云木大過甚則忽忽善怒忘當作怒其不及則令人胸痛引背下則兩脅胠滿黃帝曰善哉肝虛則胸痛引背兩脅胠滿皆肝臟病也胠去居反腋下三寸以下脅也脅不至八間之外胠也平按胸痛甲乙作胸滿注云一作痛注胸痛胸字袁刻誤作胃黃帝問岐伯曰夏脈如鉤何如而鉤岐伯對曰夏脈者心脈也南方火也萬物所以盛長也故其氣來盛去衰故曰鉤反此者病夏陽氣盛萬物不勝盛長遂復垂下故曰鉤也夏脈從內起上至於手不勝其盛回而衰遲故比之鉤也黃帝曰何如而反岐伯曰其氣來盛去亦盛此謂大過病在外其氣來不盛去反盛此謂不及病在中來去俱盛太陽氣盛也邪在少陽太陽故曰在外也其來不盛陽氣有衰脈行衰遲去反盛者陰氣盛實病在心臟也故曰病在中平按素問新校正云詳越人肝心肺腎四臟脈俱以強實為太過虛微為不及與素問不同黃帝曰夏脈大過與不及其病皆何如岐伯曰大過則令人身熱而骨痛為浸淫腎主骨水也今太陽大盛身熱乘腎以為微邪故為骨痛浸淫者滋長也平按骨痛素問作膚痛其不及則令人煩心上見噬唾下為氣黃帝曰善哉陽虛陰盛故心煩也心脈入心中系舌本故上見噬唾噬市滯反謂嚼唾也氣謂廣腸泄氣也平按素問噬作咳氣下有泄字甲乙同黃帝問於岐伯曰秋脈如浮何如而浮岐伯對曰秋脈者肺脈也西方金也萬物所以收也故其氣來輕虛以浮其氣來急去皆散故曰浮反此者病秋時陽氣已衰陰氣未大其氣輕虛其來以急其去浮散故曰如浮也平按素問甲乙收下有成字其氣來急去皆散作來急去散黃帝曰何如而反岐伯曰其氣來毛而中央堅兩旁虛此謂大過病在外其氣來毛而微此謂不及病在中其脈來如以手按毛毛中央堅此為陽盛病在大腸手陽明故曰在外如手按毛毛中央微肺氣衰微故曰在中也黃帝曰秋脈大過與不及其病皆何如岐伯曰大過則令人氣逆而背痛溫溫然府陽氣盛則氣逆連背痛溫溫然熱不甚也平按素問甲乙氣逆作逆氣溫溫作慍慍其不及則令人喘呼而咳上氣見血下聞病音黃帝曰善哉肺氣不足喘呼咳而上氣唾而有血下聞胸中喘呼氣聲也平按呼下素問有吸少氣三字甲乙有少氣二字黃帝問於岐伯曰冬脈如營何如而營岐伯對曰冬脈腎脈也萬物所以藏也故其氣來沉以搏故曰營反此者病營聚也謂萬物收藏歸根氣亦得深搏骨沉聚內營故曰如營也平按萬物上應脫北方水也四字依前春夏秋三段經文均有東方木南方火西方金等句宜據素問甲乙補入沉以搏甲乙作沉以濡按素問新校正云搏當從甲乙經作濡以脈沉而濡濡古軟字乃冬脈之平調脈若沉而搏擊於手則冬脈之太過脈又引越人云冬脈石者北方水也萬物之所藏盛冬之時水凝如石故其脈來沉濡而滑故曰石也黃帝曰何如而反岐伯曰其氣來如彈石者此謂大過病在外其脈如石以為平也彈石謂令石脈上來彈手如石擊手如彈之以石謂腎太陽氣有餘病在膀胱太陽故曰在外也其氣去如毛者此謂不及病在中腎氣不足故其氣去按之如按於毛病在於腎故曰在中一曰如數也平按如毛素問甲乙作如數黃帝曰冬脈大過與不及其病皆何如岐伯曰大過則令人解㑊腹痛而少氣不欲言大過足太陽盛太陽之脈行頭背腳故氣盛身解㑊也解音懈㑊相傳音亦謂怠惰運動難也太陽既盛腎陰氣少氣少故不欲言也平按腹痛素問甲乙作脊脈痛不及則令人心如懸病飢脊中痛少腹滿小便變黃帝曰善哉腎脈上入於心故腎虛心如懸狀如病於飢當脊中腎氣不足故痛也又小腹虛滿小便變色也平按心如懸病飢素問甲乙作心懸如病飢飢下素問有䏚中清三字甲乙無脊中痛以下三句黃帝曰四時之序逆順之變異矣然脾脈獨何主乎四時四臟氣候脈之逆順弦鉤浮營大過不及等變異多端已聞之矣然四臟之脈於四時而王未知脾脈獨主何時也平按素問順作從岐伯曰脾者土也孤臟以灌四旁者也孤尊獨也五行之中土獨為尊以王四季脾為土也其味甘淡為酸苦辛鹹味液滋灌四旁之臟其脈在關中宮獨四時不見故不主時也黃帝曰然則脾之善惡亦可得見乎岐伯曰善者不可見惡者可見善謂平和不病之脈也弦鉤浮營四脈見時皆為脾胃之氣滋灌俱見故四臟脈常得和平然則脾脈以他為善自更無善也故曰善者不可見也惡者病脈也脾受邪氣脈見關中診之得知故曰可見也平按注惡者病脈也五字袁刻脫黃帝曰惡者何如可見也岐伯曰其來如水流者此謂大過病在外其來如鳥之啄者此謂不及病在中當關指下有脈如水之流動即脾氣大過也此陽氣病在胃足陽明故曰在外其脈來時如鳥啄指此為脾虛受病故曰在中一曰鳥距如鳥距隱人指也平按素問甲乙在外下無其來二字啄均作喙黃帝曰夫子之言脾之孤臟也中央土也以灌四旁其大過與不及其病皆何如岐伯曰大過則令人四肢不舉胃氣雖盛脾病不為行氣四肢故曰四肢不舉也其不及則令人九竅不通名曰重強脾虛受病不得行氣於九竅故不通也不行氣於身故身重而強也巨兩反黃帝懼然起再拜稽首懼敬起也道大於天故受道拜而稽首也平按懼素問作瞿注受道二字袁刻誤作再曰吾得脈之大要天下至數弦鉤浮營等脈大過不及之理名曰脈之大要至數至理也平按素問曰下有善字脈變揆度奇恆道在於一數神轉而不回回則不轉乃失其機至數之要迫近以微唯是血氣一脈隨四時而變故曰脈變方欲切脈以求謂之揆也以四時度之得其病變謂之度也有病不得以四時死者曰奇也得以四時死者曰恆也雖有此二種不同道在一數言一數者謂之神轉神轉謂是神動而營神而營者不可動曲而不動則失神藏機機微也故脈診至理近機微也平按脈上素問有五色二字神轉上素問無數字注謂是是字袁刻作動著之玉版藏之於腑每旦讀之名曰生機書而藏之日日讀之以為攝生機要故曰生機也平按素問於腑作臟腑生機作玉機真臟脈形平按此篇自篇首至末見素問卷六第十九玉機真臟論篇又見甲乙經卷八第一五臟傳病發寒熱篇大骨枯槁大肉陷下胸中氣滿喘息不便其氣動形期六月死真臟見乃豫之期日骨為身干人之將死肉不附骨遂至大骨亦無潤澤故曰枯槁即骨先死也身之小肉皆脫乃至大肉亦陷即肉先死也肺氣虛少邪氣盈胸故喘息不安也喘息氣急肩膺皆動故曰動形也肺病次傳至肺再傷故六月死也此乃不至七傳者也有前病狀真臟未見期六月死真臟脈見即與死期不至六月也古本有作正臟當是秦皇名正故改為真耳真正義同也平按真臟下素問有脈字大骨枯槁大肉陷下胸中氣滿喘息不便內痛引肩項期一月死真臟見乃豫之期日內痛謂是心內痛也心府手太陽脈從肩絡心故內痛引肩項也心不受痛受病不離一月故一月死真臟脈見即不至一月可即與死期也平按真臟下甲乙有脈字大骨枯槁大肉陷下胸中氣滿喘息不便內痛引肩項身熱脫肉破䐃真臟見十月之內死此內痛即脾胃痛也手少陽脈偏應三焦脾胃即中焦也上出缺盆上項故脾胃中痛引肩項也脾主身肉故脾胃病身熱脫肉破䐃者也䐃其溳反前之病狀真臟未見十月以上而死真臟脈見十月內死良以脾胃受於穀氣故至十月而死也平按甲乙身熱作痛熱真臟下有脈字注溳袁刻誤作涓已上袁刻作以上大骨枯槁大肉陷下肩隨內消動作益衰真臟未見期一歲死見其真臟乃豫之期日腎腑足太陽脈循肩髆內故腎病肩隨內藏消瘦也又兩肩垂下曰隨腎間動氣五臟六腑十二經脈之原故腎病動運皆衰也腎間動氣強大故真臟脈未見者腎氣未是甚衰所以期至一年腎氣衰甚真臟即見故與之死日之期也平按素問肩隨作肩髓未見作來見新校正云當作未字之誤期日袁刻作日期注動運袁刻作運動大骨枯槁大肉陷下胸中氣滿肉痛中不便肩項身熱破䐃脫肉目匡陷真臟見目不見人立死其見人者至其所不勝之時則死真臟脈見少陽脈絶兩目精壞目不見人原氣皆盡故即立死真脈雖見目猶見人得至土時而死也平按肉痛素問甲乙作腹內痛注土時未詳素問王注謂不勝之時謂於庚辛之月以金剋木也急虛身卒至五臟絶閉脈道不通氣不往來闢於隨溺不可為期四時虛邪名曰經虛八風從其虛之鄉來令人暴病卒死名急虛身闢於隨溺闢卑至反除也謂不得隨意溺也如此急虛之病亦有生者故不可與為死期也平按身下素問有中字甲乙身上有中字闢於隨溺素問作譬於墮溺甲乙作譬之墮溺其脈絶不來若人一息五六至其形肉不脫真臟雖不見猶死也中於急虛其脈絶而不來有來一息脈五六至不待肉脫及真臟見必當有死也平按若下甲乙無人字素問新校正云按人一息脈五六至何得為死必息字誤當作呼乃是平按一息五六至乃連上文脈絶不來而言以脈絶不來或來而一息五六至復絶不來此即經所謂不滿十動而一代者五臟無氣豫之短期故真臟雖不見猶死真肝脈至中外急如循刀刃凊凊然如按瑟弦色青白不澤毛折乃死凊寒也如以衣帶盛繩引帶不引繩即外急也引繩不引帶即內急也繩帶俱引即內外急也今真肝脈見中外皆急如人以手猶摩刀刃中外堅急令人灑淅寒也又如以手按瑟弦急不調耎者此無胃氣即真肝脈也青為肝色白為肺色是肺乘肝也故青不澤也肺主於氣氣為身本身之氣衰即皮毛不榮故毛折當死也平按素問甲乙凊凊作責責注猶摩猶字恐系循字傳寫之誤真心脈至堅而揣如循薏蟲忽纍纍然其色赤黑不澤毛折乃死薏於極反蟲忽義當苡即十珠也堅而揣者譬人以手循摩薏苡之珠纍纍然堅鉤無胃氣之柔即真心脈也赤為心色黑為腎色是腎乘心也故赤不澤也平按揣素問作搏甲乙堅作緊揣作搏薏蟲忽素問作薏苡甲乙作薏苡子真肺脈至大而虛如毛羽中人膚然其色赤白不澤毛折乃死其真肺脈如毛羽擲來中人皮膚大而浮虛者毛無胃氣即真肺脈也赤為心色白為肺色是心乘肺也故曰不澤也平按素問甲乙如下有以字膚下無然其二字真腎色至揣而絶如循彈石辟辟然其色黃黑不澤毛折乃死揣初委反動也其真腎脈至如石彈指闢打指者營無胃氣即真腎脈也黃為脾色黑為腎色是脾乘腎故黑不澤也平按素問甲乙揣作搏循作指甲乙此段在真脾脈一段下注黃為脾色袁刻為作色真脾脈至弱而乍疏乍數然其色青黃不澤毛折乃死真脾脈至乍疏乍數也疏謂動稀也數謂連動此無胃氣即真脾脈也青為肝色黃為脾色是肝乘脾故黃不澤也平按色上素問甲乙無然其二字諸真臟見者皆死不治臟脈獨見以無胃氣死故不療也平按素問甲乙臟下有脈字又按素問此節下新校正引楊注甚詳四時脈診平按此篇自篇首至名曰逆四時見素問卷六第十九玉機真臟論篇又見甲乙經卷四經脈第一下篇自黃帝問於岐伯曰脈其四時至持脈之大法也見素問卷五第十七脈要精微論篇甲乙同上又自是故陰盛則夢涉大水至肺氣甚則夢哀見甲乙卷六第八正邪襲內生夢大論自春得秋脈至末見素問卷七第二十三宣明五氣篇又見甲乙卷四經脈第一中篇凡治病察其形氣色澤脈之盛衰病之新故乃治之無後其時形之肥瘦氣之大小色之澤夭脈之盛衰病之新故凡療病者以此五診診病使當為合其時不當為後其時也形氣相得謂之可治形瘦氣大形肥氣小為不相得形肥氣大形瘦氣小為相得也脈色澤以浮謂之易已其病人五色浮輕潤澤其病易已平按素問無脈字脈順四時謂之可治四時王脈皆有胃氣無他來克故曰順時平按順素問作從脈弱以滑是有胃氣命曰易治趣之以時四時之脈皆柔弱滑者謂之胃氣依此療病稱曰合時也平按趣之以時素問作取之以時甲乙作治之趨之無後其時形氣相失謂之難治色夭不澤謂之難已脈實以堅謂之益甚脈逆四時謂之不治必察四難而明告之勿趣以時此之四診趣之為難可明告病人宜以變常設於療法不得依常趣之以時也平按謂之不治素問作為不可治無勿趣以時句甲乙無必察四難以下十二字所謂逆四時者春得肺脈夏得腎脈秋得心脈冬得脾脈其至皆懸絶沉澀者命曰逆四時未有臟形四時皆得勝來克己之脈己脈懸絶沉澀失四時和脈雖未有病臟之形不可療也平按命曰甲乙作名曰春夏脈沉澀秋冬而脈浮大此脈反四時也平按素問甲乙春上有於字浮大下素問有名曰逆四時也六字病熱脈凊靜熱病脈須熱而躁也今反寒而靜凊寒也平按素問甲乙無凊字泄而脈大人之泄利脈須小細今為洪大也脫血而脈實病在中人之脫血脈須虛弱今反強實病在中也而脈實堅病在外脫血脈實堅病在外也而脈不實堅為難治名曰逆四時脫血而脈不實不堅難療也以上七診皆逆四時也平按為難治素問作皆難治又按素問新校正云按平人氣象論云病在中脈虛病在外脈澀堅與此相反此經誤彼論為得自未有臟形春夏至此與平人氣象論相重注義備於彼黃帝問於岐伯曰脈其四時動奈何知病所在奈何知病之所變奈何知病乍在內奈何知病乍在外奈何知請問此六者可得聞乎六謂六問此中唯有五問當是脫一問也平按素問請上無知字六作五據本篇下經文此六者持脈之大法應作六楊注云當是脫一問於義正合岐伯對曰請言其與天轉運量下答中文當有六故為六合也人身合天故請言人身與天合氣轉運之道也平按與天轉運素問作與天轉運大也夫萬物之外六合之內天地之變陰陽之應萬物各受一形自萬物一形之外從於六合苞裹之內皆是天地為其父母變化而生故萬物皆與天地之氣應而合也平按素問無夫字甲乙無夫萬物之外五字彼春之暖為夏之暑春夏者陰氣終始也春之三月陽氣之始氣和日暖夏之三月陽盛暑熱乃是春暖增長為之也平按注陰氣終始陰字當是陽字之誤彼秋之急為冬之怒秋冬者陰氣終始也秋之三月陰氣之始風高氣切故名為急冬之三月陰氣嚴烈乃是秋涼增長為之也平按急素問甲乙作忿王注云忿一作急注氣切切字恐是徑字之誤四變之動脈與之上下暖暑急怒是天之運四氣變動人之經脈與彼四氣上下變動亦不異也春夏之脈人迎大於寸口故為上也寸口小於人迎故為下也秋冬之脈寸口大於人迎故為上也人迎小於寸口故為下也此乃盛衰為上下也此答初問也平按注秋冬之脈至故為下也五句袁刻脫依原抄補入以春應中規夏應中矩春三月時少陽之氣用萬物始生未正故曰應規也夏三月時太陽之氣用萬物長正故曰應矩也秋應中衡冬應中權秋三月時少陰之氣用萬物長極故曰應衡也冬三月時太陰之氣用萬物歸根故曰應權也平按衡原抄作沖注同謹依素問甲乙作衡是故冬至四十五日陽氣微上陰氣微下冬至以後陽氣漸長故曰微上陰氣漸降故曰微下也夏至四十五日陽氣微下陰氣微上夏至以後陰氣漸長故曰微上陽氣漸降故曰微下也陰陽有時與脈為期期而相失知脈所分分之有期故知死時陰陽以有四時四時與脈為期為期在於四時相得失處即知四時之脈分在四時之際脈分四時有期則死生之期可知此答第二病所在也平按知脈所分知字原抄作和謹依素問甲乙及本注作知微妙在脈亦不可不察察之有紀從陰陽始欲知人之死生者無勝察之妙察脈綱紀必以陰陽為本也平按素問甲乙無亦字始之有經從五行生陰陽本始有十二經脈也十二月經脈從五行生也生之有度四時為數五行生十二經脈各有法度脈從五行生木生二經足厥陰足少陽也火生四經手少陰手太陽手厥陰手少陽也土生二經足太陰足陽明也金生二經手太陰手陽明也水生二經足少陰足太陽也此為五行生十二經脈法度者春有二經夏有四經季夏有二經秋有二經冬有二經故十二經脈以四時為數也平按素問數作宜新校正云按太素宜作數循數勿失與天地如一得一之誠以知死生於寸關尺三部之中循十二經之脈得其弦鉤浮營四時之氣而不失錯與天地氣宜然為一如此則能了知死生之期也平按循數素問作補瀉誠作情自始之有經至以知死生甲乙無此八句是故聲合五音色合五行脈合陰陽人之音聲合於五音人之形色合於五行人之脈氣合於陰陽此答第三知病之所變也平按注知病知字原抄作之據上經文宜作知是故陰盛則夢涉大水恐懼陽盛則夢大火燔灼陰陽俱盛則夢相殺毀傷上盛則夢飛揚平按素問甲乙無揚字下盛則夢墮墜平按素問甲乙無墜字甚飽則夢豫甚飢則夢取肝氣甚則夢怒肺氣甚則夢哀平按甚素問甲乙作盛素問哀作哭甲乙作哭泣恐懼飛揚短蟲多則夢衆長蟲多則夢相擊破傷凡夢有三種人有吉凶先見於夢此為徵夢也思想情深因之見夢此為想夢也因其所病見之於夢此為病夢也此十一種夢皆病夢也並因陰陽氣之盛衰內有飢飽肝肺氣盛長短蟲多以為夢也此所以因傷致夢即以夢為診也此為夢診可為四答問之脫也平按甲乙無短長蟲多二句素問新校正云詳此二句亦不當出此應他經脫簡文也是故持脈有道虛靜為保持脈之道虛心不念他事凝神靜慮以為自保方可得知脈之浮沉氣之內外也平按甲乙無是故二字保作寶春日浮如魚之遊在皮夏日在膚沉沉乎萬物有餘春時陽氣初開脈從骨髓流入經中上至於皮如魚游水未能周散夏時陽氣榮盛脈從經溢入孫絡膚肉之中如水流溢沉沉盛長萬物亦然茂盛有餘此答第五病在外也平按皮素問甲乙作波秋日下膚蟄蟲將去冬日在骨蟄蟲固密君子居室秋日陽氣從膚漸伏於內故曰下膚蟄蟲趣暖入穴故曰將去是時陰氣從內出在皮膚腠理將開也冬日陽氣內伏蟄蟲閉戶固密君子去堂居室人之脈氣行骨故持脈者深按得之此答第六病乍在內也平按固素問甲乙作周故曰知內者按而紀之知外者終而始之秋冬脈氣為陰在內故按得綱紀春夏脈氣為陽在外故趣得終始也春夏之脈為秋冬脈終即為陽之始也此六者持脈之大法也以為診脈大法春得秋脈夏得冬脈秋得春脈冬得夏脈陰出之陽陽病善怒不治是謂五邪皆同命死不治春得秋脈夏得冬脈皆賊邪來乘也秋得春脈冬得夏脈雖是微邪來乘以秋冬得之陰出之陽交爭者不療也平按素問夏得冬脈下有長夏得春脈五字秋得春脈作秋得夏脈冬得夏脈作冬得長夏脈陰出上有名曰二字甲乙同又甲乙死不治上無命字人迎脈口診平按此篇自篇首至無勞用力也見靈樞卷八第四十八禁服篇又見甲乙經卷四經脈第一上篇自雷公曰病之益甚至傷於食飲見靈樞卷八第四十九五色篇甲乙同上自一日一夜五十營至乍數乍疏也見靈樞卷二第五根結篇甲乙同上自黃帝曰氣口何以獨為五臟主氣至治之無功矣見素問卷三第十一五藏別論篇又見甲乙卷二十二經脈絡脈支別第一下篇自凡刺之道至取之其經見靈樞卷二第九終始篇又見甲乙卷五第五針道終始篇自人迎一盛至命曰關格又見素問卷三第九六節藏象論篇自黃帝問於岐伯曰人病胃管至故胃管為癰帝曰善見素問卷十三第四十六病能論篇又見甲乙卷十一第八邪氣聚於下脘發內癰篇自安臥至末見靈樞卷十一第七十四論疾診尺篇又見甲乙卷十一第六五氣溢發消渴黃疸篇雷公問於黃帝曰細子得之受業通九針六十篇旦暮勤服之近者編絶遠者簡垢然尚諷誦弗置未盡解於意矣南方來者九針之道有六十篇其簡之書遠年者編有斷絶其近年者簡生塵垢言其深妙學久日勤未能達其意也平按遠者靈樞作久者二字近遠二字據注宜互易外揣言渾束為一未知其所謂也揣初委反度也渾戶昆反合也束總要也五臟六腑吉凶善惡其氣在內循手太陰脈總合為一見於寸口外部之中可以手按度量令人得知者未通其意也夫大則無外小則無內大小無極高下無度束之奈何經脈之氣合天地之數與道通洞苞裹六合故大無外也氣貫毫微則小無內也然則無形不可以大小極不可以高下測欲以總為一者殊不可知也平按注與道通洞四字袁刻脫士之才力或有厚薄知慮褊淺不能博大深奧自強於學未若細子細子恐其散於後世絶於子孫也敢問約之奈何褊鞭緬反人之所學未若細子惟恐其至道絶於後代無及子孫故問其要傳之不朽也細子者雷公自謙之辭也平按若上靈樞無未字黃帝答曰善乎哉問也此先師所禁坐私傳之也割臂歃血為盟也子若欲得之何不齊乎平按歃原作𡙇恐傳寫之訛謹依靈樞作歃為盟靈樞作之盟齊作齊下同雷公再拜而起曰請聞命矣於是乃齊宿三日而請曰敢問今日正陽細子願以受盟黃帝乃與俱入齊室割臂歃血黃帝祝曰今日正陽歃血傳方敢背此言者必受其殃雷公再拜曰細子受之黃帝乃左握其手右授之書曰慎之慎之上古貸季傳至岐伯岐伯授之黃帝故貸季為先師也非其人不可授道故須禁之坐私傳也方要道以盟誓授人吾為子言之凡刺之理經脈為始吾方愈病各為其要聖人雜合行之以針為輕小能愈大疾故先言之人之十二經脈奇經八脈十五絡脈經絡於身營衛陰陽氣之經墜生之夭壽莫不由之故為始也平按注墜字恐系隧字傳寫之誤營其所行知其度量刺之理者必須經營循十二經諸絡脈等所行之氣並知脈之長短度量也平按注脈之長短脈字袁刻誤作肺內次五臟別其六腑從於臟腑流出經脈行身外故臟腑稱內知內之道先次五臟內中之陰次別六腑內中之陽也平按注知內袁刻誤作知道審察衛氣為百病母調其虛實乃止瀉其血絡血絡盡而不殆次知衛氣為陽行外受諸邪氣以為百病次欲知經絡虛實實者乃止而瀉之先瀉大小血絡血邪盡已得無危殆也平按虛實下靈樞重虛實二字血絡盡而不殆靈樞作血盡不殆矣雷公曰此皆細子之所以通也未知其所約也黃帝曰夫約方者猶約囊也囊滿不約則輸泄方成弗約則神弗與俱約節量也方法也方以診氣囊以盛氣故得比之囊滿不為節約必泄其氣診法成已不為節約以泄神氣神氣去矣不與周運故曰不俱也雷公曰願為下材者勿滿而約之黃帝曰未滿而知約之以為工不可以天下師焉攝生之道材有上下診法成已節約合理得長生久視材德之上可為天下之師診法未能善成故曰未滿而能節而行得為國師是按脈而知病生所由稱之為工材之不下也平按靈樞天下上有為字雷公曰願聞為工為工是持脈之道故問也黃帝曰寸口主中按此九卷素問肺臟手太陰脈動於兩手寸口中兩手尺中夫言口者通氣者也寸口通於手太陰氣故曰寸口氣行之處亦曰氣口寸口氣口更無異也中謂五臟臟為陰也五臟之氣循手太陰脈見於寸口故寸口脈主於中也人迎主外結喉兩箱足陽明脈迎受五臟六腑之氣以養於人故曰人迎下經曰人迎胃脈也又云任脈之側動脈足陽明名曰人迎明堂經曰頸之大動脈動應於手挾結喉以候五臟之氣人迎胃脈六腑之長動在於外候之知內故曰主外寸口居下在於兩手以為陰也人迎在上居喉兩旁以為陽也九卷終始篇曰平人者不病也不病者脈口人迎應四時也應四時者上下相應俱往俱來也脈口謂是手太陰脈行氣寸口故寸口脈口亦無異也既上下俱往俱來豈以二手為上下也又九卷終始篇云人迎與太陰脈口俱盛四倍以上命曰關格即知手太陰無人迎也又素問第五捲雲胃管癰診岐伯曰當得胃脈沉細胃沉細者氣逆氣逆者人迎甚盛盛則熱人迎者胃脈也逆盛則熱聚於胃口而不行故胃管為癰此經所言人迎寸口之處數十有餘竟無左手寸口以為人迎右手關上以為寸口而舊來相承與人診脈縱有小知得之別注人多以此致信竟無依據不可行也平按注兩胃管管字袁刻均誤作營兩者相應俱往俱來若引繩小大齊等寸口人迎兩者上下陰陽雖異同為一氣出則二脈俱往入則二脈俱來是二人共引一繩彼牽而去其繩並去此引而來其繩並來寸口人迎因呼吸牽脈往來其動是同故曰齊等也春夏人迎微大秋冬寸口微大如此者名曰平人譬彼引繩之動大小齊等細尋其動非無小異故此牽此動之端為大彼端微小彼動之端為大此端微小脈亦如之上下雖一因呼吸而動以春夏之陽秋冬之陰故微有大小春夏陽氣盛實故脈順之微大為平秋冬陰氣盛實故脈順之微大為平平者和氣無病者也平按注故微有大小袁刻脫微字人迎大一倍於寸口病在少陽人迎二倍病在太陽人迎三倍病在陽明計春夏人迎大於寸口少半已去少陽即已有病其病猶微故未言之成倍方言以病成可名故曰病在少陽言一倍等按不病之人寸口人迎脈動大小一種春夏之時人迎之動微大寸口以為平好人迎之脈漸大小半大半至於一倍即知少陽有病少陽盛氣未大故得過陰一倍名曰少陽之病致使人迎之脈一倍大於寸口少陽病氣漸盛過於陰氣二倍名曰太陽之病則人迎之脈二倍大於寸口太陽病氣漸盛過於陰氣三倍名曰陽明之病則人迎之脈三倍大於寸口也平按靈樞病在少陽作病在足少陽一倍而躁在手少陽病在太陽作病在足太陽二倍而躁病在手太陽病在陽明作病在足陽明三倍而躁病在手陽明甲乙二倍作再倍盛則為熱陽氣內盛為熱故人迎脈盛也虛則為寒陽氣內虛陰乘為寒故人迎脈虛也緊則為痛痹其氣動緊似急也此肌肉之間有寒溫氣故為痛痹也平按注寒溫溫字依下注寒濕氣居恐系濕字傳寫之訛代則乍甚乍間代止也脈絶不來故曰代也代者邪氣客於血絡之中隨飲食而變故病乍甚乍間也盛則瀉之人迎一盛者瀉於少陽二盛瀉於太陽三盛瀉於陽明也虛則補之人迎虛者人迎小於寸口也小於寸口一倍補於少陽二倍補於太陽三倍補於陽明也緊痛則取之分肉分肉之間寒濕氣居代則取血絡且飲藥邪在血絡致令脈代可刺去邪血飲湯實之陷下則灸之謂其諸脈血氣不滿陷下不見是中寒故須灸之不盛不虛以經取之名曰經刺不盛不虛正經自病也假令心痛中風得之肝來乘心從後而來名為虛邪飲食勞倦脾來乘心從前來者名為實邪傷寒得之肺來乘心從所不勝來者名曰微邪中濕得之腎來乘心從所勝來者名曰賊邪以上四病皆是他邪為之須視心之虛實補瀉他經傷暑得病起於自藏以為正邪宜療自經故曰以經取之名曰經刺也人迎四倍者且大且數名曰外格死不治人迎三倍各病一陽至四倍其陽獨盛外拒於陰陰氣不行故曰格陽格拒也陽氣獨盛故大而且數以無陰氣獨盛必衰故死不療平按靈樞名曰下有溢陽溢陽為五字必審按其本末察其寒熱以驗其臟腑之病必須審按人迎寸口內外本末察其脈中寒暑然後驗知臟腑中之病也寸口大於人迎一倍病在厥陰寸口二倍病在少陰寸口三倍病在太陰秋冬寸口大於人迎少半已去厥陰即已有病其病猶微故未言之以病成可名故曰病在厥陰言一倍等按不病人寸口人迎脈動大小一種秋冬之時寸口之動微大人迎以為平好寸口之脈至於一倍即知厥陰有病厥陰之氣衰少故得過陽一倍名曰厥陰之病致使寸口之脈一倍大於人迎陰氣雖少得過陽氣二倍名曰少陰之病則寸口之脈二倍大於人迎太陰最大過於陽氣三倍名曰太陰之病則寸口之脈三倍大於人迎也平按靈樞病在厥陰作病在足厥陰一倍而躁在手心主病在少陰作病在足少陰二倍而躁在手少陰病在太陰作病在足太陰三倍而躁在手太陰甲乙二倍作再倍又甲乙無寸口三倍病在太陰八字盛則脹滿寒中食不化寸口陰氣大於人迎三倍病在太陰太陰之病自有虛實是以寸口陰盛則腹中寒氣脹滿有寒中食不化也平按寒中食不化甲乙作寒則食不消化虛則熱中出糜少氣溺色變陰虛陽氣來乘腸胃中熱故大便出強如黃糜少陰氣虛故少氣溺色黃也平按注出強如黃糜袁刻作出糜如黃疽緊則為痹風寒濕氣留於分肉間為痹故令寸口脈緊實也代則乍痛乍止寸口脈動而中止不還曰代邪客分肉致令衛氣之行乍行乍止故令其痛乍有乍止也平按甲乙作代則乍寒乍熱下熱上寒注云太素作代則乍痛乍止盛則瀉之虛則補之下言療方盛瀉之法惟人迎可知也緊則先刺而後灸之緊有痹痛先以痛為輸滎針刺已然後於其刺處灸之平按注滎袁刻作營刺處袁刻作刺後代則取血絡而泄之代則乍痛乍止故刺去邪血之絡也平按而泄之靈樞作而後調之甲乙同注云太素作泄注乍痛袁刻誤作乍病陷下則徒灸之陷下者脈血結於中中有著血血寒故宜灸徒空也諸脈陷下不見是脈中寒血結聚宜空灸之不假先刺也平按徒灸甲乙作從灸注血結袁刻作血倍不假誤作不復不盛不虛以經取之准人迎可知也寸口四倍名曰內關內關者且大且數死不治陰氣三倍大於陽氣病在三陰至於四倍陰氣獨盛內皆閉塞陽不得入故為內關關閉也寸口大而又數即陰氣將絶故死不療也平按內關袁刻誤作內閒注同依原本更正必察其本末之寒溫以驗其臟腑之病必察寸口人迎大小終始寒溫則知內外臟腑之病也平按之寒溫甲乙作察其寒熱通其滎輸乃可傳於大數大數日盛則徒瀉虛則徒補候知五臟六腑病之所在先須針藥通其滎輸然後傳於灸刺大數謂空補瀉之數也平按甲乙大數日盛作大曰盛虛上有小曰二字兩徒字均作從緊則灸刺且飲藥脈之緊者三療俱行緊謂動而中止小數中有還者曰結也陷下則徒灸之准前人迎平按甲乙徒作從不盛不虛以經取之所謂經治者飲藥亦曰灸刺不盛不虛經療之法亦三療俱行之平按亦曰甲乙作亦用脈急則引引挽也寸口脈急可以針導引令和也脈代以弱則欲安靜無勞用力也脈衰代絶至復微弱不欲煩動者宜安靜恬逸不得自勞也平按靈樞代作大甲乙無以弱二字雷公曰病之益甚與其方衰何如問其切脈知病衰甚黃帝曰外內皆在焉外腑內臟並有甚衰故曰皆在切其脈口滑小緊以沉者其病益甚在中脈口陰位也滑為陽也小緊沉者皆為陰也按於脈口得一陽三陰則陰乘陽故病益甚病在五臟故曰在中也人迎氣大緊以浮者其病益甚在外人迎陽位也緊為陰也大浮陽也二陽一陰則陽乘陰故病益甚病在六腑故曰在外也其脈口滑而浮者病日損滑浮皆陽在於陰位而得二陽其氣以和故病日日瘳損也平按滑而浮靈樞作浮滑人迎沉而滑者病日損一陰一陽在於陽位其氣易和故病損其脈口滑以沉者其病日進在內一陰一陽在於陰位故病日漸進在五臟其人迎脈滑盛以浮者其病日進在外滑盛浮等俱為陽也又在陽位名曰太過病增在於六腑也脈之浮沉及人迎寸口氣小大等者其病難已諸有候脈浮沉及人迎寸口中氣大小齊等者是陰陽不得相傾故病難已也平按注相傾袁刻作相顧病之在臟沉而大者易已小為逆人迎寸口之中候之知病在於內五臟中其脈且沉且大是為陰陽氣和雖病易已其脈沉而小者純陰故逆而難已也病之在腑浮而大者病易已候之知病在外六腑中其脈浮而且大得其時易已人迎盛緊者傷於寒人迎盛為陽也緊則為陰也謂冬因蟄寒氣入腠名曰傷寒春為溫病也平按盛緊靈樞作盛堅下同脈口盛緊者傷於食飲盛為陰也脈口盛而緊者是因飢多食傷臟為病也平按靈樞甲乙無飲字一日一夜五十營以營五臟之精不應數者名曰狂生所謂五十營者五臟皆受氣也營氣一日一夜周身五十營於身者也經營五臟精氣以奉生身若其不至五十營者五臟無精雖生不久故曰狂生持其脈口數其至也五十動而不一代者五臟皆受氣矣脈口寸口亦曰氣口五十動者腎臟第一肝臟第二脾臟第三心臟第四肺臟第五五臟各為十動故曰從脈十動以下次第至腎滿五十動即五臟皆受於氣也持脈數法先將不病人之脈口以取定數然後按於病人脈口勘知病人脈數多少謂從平旦陰氣未散陽氣未行按於脈口以取定數也四十動而一代者一臟無氣矣其脈得四十動已至四十一動已去有一代者即五十數少故第一腎臟無氣也三十動而一代者二臟無氣矣其脈得三十動已至三十一動已去有一代者即四十數少故第二肝臟無氣二十動而一代者三臟無氣矣其脈得二十動已至二十一動已去有一代者即三十數少故第三脾臟無氣十動而一代者四臟無氣矣其脈得十動已至十一動已去有一代者即二十數少故第四心臟無氣不滿十動而一代者五臟無氣矣其脈不滿十數有一代者即十數少故第五肺臟無氣豫之短期肺主五臟之氣肺氣既無所以五臟氣皆不至故與之短期也平按豫甲乙作與下同袁刻誤作子要在終始所謂五十動而不一代者以為常也五十動而不一代者蓋是五臟終始常道之要也以知五臟之期也豫之短期者乍數乍疏也與短期者謂五臟脈乍疏乍數不合五十之數故可與之死期也黃帝曰氣口何以獨為五臟主氣謂九候各候五臟之氣何因氣口獨主五臟六腑十二經脈等氣也平按素問甲乙主下無氣字岐伯曰胃者水穀之海也六腑之大也五味入口藏於胃以養五氣氣口亦太陰也是以五臟六腑之氣味皆出於胃變見於氣口胃為水穀之海六腑之長出五味以養臟腑血氣衛氣行手太陰脈至於氣口五臟六腑善惡皆是衛氣所將而來會手太陰見於氣口故曰變見也平按素問甲乙大下有源字五氣作五臟氣故五臟氣入於鼻藏於心肺心肺有病而鼻為之不利也谷入於胃以養五臟上熏入鼻藏於心肺鼻中出入鼻為肺官故心肺有病鼻氣不利也故曰凡治病者必察其上下適其脈候觀其志意與其病能乃拘於鬼神者不可與言至治療病之要必須上察人迎下診寸口適於脈候又觀志意有無無志意者不可為至及說療疾復觀其人病態能可療以否若人風寒暑濕為病乃情繫鬼神斯亦不可與言也平按素問察其上下作察其下三字脈下無候字病下無能字袁刻能誤作態素問新校正云按太素作必察其上下適其脈候觀其志意與其病能與此正合又至治素問作至德惡於鑱石者不可與言至巧治病不許治者病不必治也治之無功矣鑱仕監反鈹也其病非針石不為而惡之者縱岐黃無所施其功其病可療而不許療者縱倉扁不可為其功也平按鑱原抄作鏡據注應作鑱素問作針凡刺之道畢於終始明知終始五臟為紀陰陽定矣凡刺之道其要須窮陰陽氣之終始人之陰陽氣終始者必本五臟以為綱紀以五臟藏神居身故為陰陽氣之綱紀即陰陽定矣陰者主藏陽者主腑陰氣主於五臟在內陽氣主於六腑在外也陽受氣於四末陰受氣於五臟清陽實於四肢濁陰者走於六腑故陽受氣於四末也清陰起於五臟濁陽者營於四肢故陰受氣於五臟也平按甲乙末作肢故瀉者迎之補者隨之知迎知隨氣可令和和氣之方必通陰陽故補瀉之道陰陽之氣實而來者迎而瀉之虛而去者隨而補之人能知此隨迎補瀉之要則陰陽氣和有疾可愈也五臟為陰六腑為陽傳之後代以血為盟敬之者昌慢之者亡無道行私必得夭殃敬其傳方令守道去私也平按靈樞後代作後世甲乙無傳之後代以下六句謹奉天道請言終始言其奉誡因請五臟終始之紀也終始者經脈為紀持其脈口人迎以知陰陽有餘不足平與不平天道畢矣五臟終始紀者謂經脈也欲知經脈為終始者可持脈口人迎動脈則知十二經脈終始陰陽之氣有餘不足也所謂平人者不病不病者脈口人迎應四時也春夏人迎微大寸口秋冬寸口微大人迎即應四時也平按注兩微字原作後依前經文應作微上下相應而俱往俱來也人迎在結喉兩旁故為上也寸口在兩手關上故為下也上下雖別皆因呼吸而動故俱往來也往謂陽出來謂陰入也往來雖別異同時而動故曰俱也平按靈樞甲乙來上無俱字六經之脈不結動也陰陽之脈俱往來者即三陰三陽經脈動而不結本末之寒溫相守司也春夏是陽用事時溫人迎為本也秋冬是陰用事時寒脈口為本也其二脈不來相乘復共保守其位故曰相守司也平按靈樞溫下有之字甲乙作本末相過無之字形肉血氣必相稱也是謂平人形謂骨肉色狀者也肉謂肌膚及血氣者也衰勞減等好即為相稱也如前五種皆為善者為平人平按注血氣下原缺一字上半作四衰勞勞字原校作榮少氣者脈口人迎俱少而不稱尺寸也如是則陰陽俱不足脈口寸口也寸部有九分之動尺部有一寸之動今秋冬寸口反小於人迎即寸口不稱尺寸也春夏人迎反小於寸口即人迎不稱尺寸也如此勘檢則知臟腑陰陽二氣俱少也平按注勘袁刻誤作甚補陽則陰竭瀉陰則陽脫如是者可將以甘藥不愈可飲以至齊夫陽實陰虛可瀉陽補陰陰實陽虛可瀉陰補陽今陰陽俱虛補陽其陰益以竭瀉陰之虛陽無所依故陽脫所以不可得於針石可以甘善湯液將扶補之若不已可至於齊也平按靈樞甲乙無愈字齊作劑注甘善袁刻作甘藥如此者弗灸不已因而瀉之則五臟氣壞矣如此二皆是虛可以湯液補者日漸方愈故曰不久不已若不如此即用針瀉必壞五臟之氣也為不灸於義不順灸當為久也人迎一盛病在足少陽一盛而躁在手少陽病在足少陽足少陽病大於足厥陰一倍故人迎盛於寸口一倍一盛而躁病在於手少陽經也人迎二盛病在足太陽二盛而躁在手太陽躁手道反擾也陽氣漸大在足太陽足太陽病大於足少陰二倍故人迎盛於寸口二倍也人迎三盛病在足陽明三盛而躁在手陽明陽氣更盛在足陽明足陽明病大於足太陰三倍故人迎盛於寸口三倍也平按注足太陰陰字原抄作陽據上注擬作陰人迎四盛且大且數者名曰溢陽溢陽為外格人迎盛至四倍大而動數陽氣盈溢在外格拒陰氣不得出外故曰外格也平按素問作四盛以上為格陽脈口一盛病在足厥陰一盛而躁在手心主足厥陰盛病大於足少陽一倍故脈口盛於人迎一倍也脈口二盛病在足少陰二盛而躁在手少陰足少陰盛病大於足太陽二倍故脈口盛於人迎二倍也脈口三盛病在足太陰三盛而躁在手少陰足太陰盛病大於足陽明三倍故脈口盛於人迎三倍也平按手少陰靈樞甲乙均作手太陰依經文亦應作太當系傳寫之誤脈口四盛且大且數者命曰溢陰為內關內關不通死不治陰氣四盛於陽脈口大而且數陰氣盈溢在內關閉陽氣不得復入名曰內關不可療也人迎與太陰脈口俱盛四倍以上者命曰關格關格者與之短期脈口寸口也陽盛四倍格而不關陰盛四倍關而不格皆與死期脈口人迎俱四倍以上稱曰關格死之將近故與短期此云人迎與太陰脈口即知手太陰脈無人迎也平按關字袁刻均誤作開人迎一盛瀉足少陽而補足厥陰人迎一倍大於脈口即知少陽一倍大於厥陰故瀉足少陽補足厥陰余皆準此也二瀉一補其補瀉法陽盛陰虛二瀉於陽一補於陰陰盛陽虛一瀉於陰二補於陽然則陽盛得二瀉陽虛得二補陰盛得一瀉陰虛得一補療陽得多療陰得少何也陰氣遲緩故補瀉在漸陽氣疾急故補瀉在頓倍於療陽也余放此也平按注放此放字原作故謹擬作放袁刻作做日一取之一取一度補瀉也足太陽盛足少陰虛足少陰盛足太陽虛此二經者氣血最少故二日一補瀉也足少陽盛足厥陰虛足厥陰盛足少陽虛此二經者血氣次多故日一補瀉也足陽明盛足太陰虛足太陰盛足陽明虛此二經者血氣最富故日二補瀉以為例准厥陰血氣最少少陰次多太陰最多此中少陰二日一取厥陰一日一取太陰一日二取或經錯耳必切而驗之必須切診人迎脈口以取驗也躁取之上人迎躁而上行皆在手脈故曰取上取者取於此經所發穴也平按躁靈樞甲乙作疏下同氣和乃止瀉實補虛令陰陽氣和乃止亦為例也人迎二盛瀉足太陽而補足少陰二瀉一補二日一取之必切而驗之躁取之上氣和乃止人迎三盛瀉足陽明而補足太陰二瀉一補日二取之必切而驗之躁取之上氣和乃止脈口一盛瀉足厥陰而補足少陽二補一瀉日一取之必切而驗之躁取之上氣和乃止脈口二盛瀉足少陰而補足太陽二補一瀉二日一取之必切而驗之躁取之上氣和乃止脈口三盛瀉足太陰而補足陽明二補一瀉日二取之必切而驗之躁取之上氣和乃止所以日二取之者太陰主胃大富於穀氣故日二取釋此二經多取所由也平按太陰主胃靈樞作陽明主胃甲乙谷下無氣字人迎脈口俱盛三倍以上命曰陰陽俱溢如是者不開則血脈閉塞氣無所行流淫於中五臟內傷如此者因而灸之則變易而為他疾矣人迎脈口俱三倍以上未至四倍陰陽俱有溺溢當爾之時必須以針開瀉通之若不開者氣無所行淫溢反流內傷五臟不可灸也平按三倍以上甲乙作四倍以上注靈樞作三倍注當爾爾字袁刻作診凡刺之道氣調而止補陰瀉陽夫瀉陰為易補陰為難補陽為易瀉陽為難刺法補陰瀉陽二氣和者即可停止也平按注瀉陰陰字袁刻誤作陽音氣並章耳目聰明反此者血氣不行身中陰陽和者言音清朗吐納和暢故曰並章七竅開通所以耳目聰明反此為逆故血氣不行也平按音氣並章靈樞作音氣益彰甲乙作音聲益彰靈樞甲乙無身中二字注為逆袁刻作者逆所謂氣至而有效者針入膚肉轉而待氣氣至行補瀉而得驗者謂有效也平按效甲乙作效瀉則益虛虛者脈大如其故而不堅也堅如其故者適雖言快病未去也以其有實所以須瀉瀉者益虛損實其實損者其脈大如故而脈中不堅即為損實也若瀉已脈大如故脈中仍堅者去針適雖以損稱快病未除也平按快靈樞作故補則益實實者脈大如其故而益堅也大如其故而不堅者適雖言快病未去也以其有虛所以須補補者補虛益實者也其得實者脈大如故而脈中堅即為得實若補已脈大如故脈不中堅去針適雖快病未愈也故補則實瀉則虛痛雖不隨針病必衰去故補則補虛令實瀉則瀉實令虛補瀉未盡其工去針適雖言瘥病未除也若補瀉窮理其痛雖不隨針去病必衰去也平按針下甲乙有減字必先通十二經脈之所生病而後可得傳於終始矣十二經病所由通之者知諸邪氣得之初始亦知萬病所瘥之終是以可得傳於終始貽諸後代也平按經下甲乙無脈字傳上無得字故陰陽不相移虛實不相傾取之其經是故學者須知陰陽虛實不相傾移者可取十二經脈行補瀉也平按傾袁刻誤作頎注同黃帝問於岐伯曰人病胃管癰者診當何如岐伯曰診此者當得胃脈其脈當沉細沉細者氣逆逆者人迎甚盛盛則熱人迎者胃脈也逆而盛則熱聚於胃口而不行故胃管為癰黃帝曰善胃管癰者胃口有熱胃管生癰也得胃脈者寸口脈也寸口者脈之大會手太陰之動也故五臟六腑十二經脈之所終始也平人手之寸口之中胃脈合浮與大也今於寸口之中診得沉細之脈即知胃有傷寒逆氣故寸口之脈沉細上之人迎洪盛者也盛則胃管熱也上人迎者在喉兩邊是足陽明胃脈者也胃氣逆者則手之寸口沉細喉邊人迎盛大故知熱聚胃口不行為癰紆恭反腫也平按胃管素問甲乙作胃脘沉細甲乙作沉澀素問新校正云太素作沉細安臥小便黃赤脈小而澀者不嗜食安臥小便黃赤脈小澀脾病故不嗜食也平按澀靈樞作澀人病其寸口之脈與人迎之脈大小及其浮沉等者病難已也寸口即脈口也人病寸口之脈秋浮冬沉人迎之脈春小夏大縱病易已四時大小浮沉皆同即四時脈亂故難已也平按靈樞大小作小大等三字
