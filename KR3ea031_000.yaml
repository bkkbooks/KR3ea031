body:
  text: 附篇黃帝內經太素遺文並楊氏原注從王注素問林億等新校正及林億等校正甲乙經脈經與日本醫心方所引考補當在今本所缺七卷中其各書所引仍逐條附注於下以便稽考飲食有常節起居有常度不妄不作以理而取聲色芳味不妄視聽也循理而動不為分外之事平按此條見素問卷一第一上古天真論上古聖人之教也下皆為之上古聖人使人行者身先行之為不言之教不言之教勝有言之教故下百姓仿行者衆故曰下皆為之平按此條見同上身肌宗一真人身之肌體與太極同質故云宗一平按此條見同上有至人者積精全神能至於德故稱至人平按此條見同上帝曰余聞上古聖人論理人形列別臟腑端絡經脈會通六合各從其經氣穴所發各有處名溪谷屬骨皆有分起分部逆從各有條理四時陰陽盡有經紀外內之應皆有表裡信其然乎平按此條見素問卷二第五陰陽應象大論又按新校正云詳帝曰至信其然乎全元起本及太素在上古聖人之教也上在變動為握握憂噦咳栗五者改志而有名曰變動也平按此條亦見素問卷二第五脈生脾平按此條見同上在變動為憂心之憂在心變動肺之憂在肺之志是則肺主於秋憂為正也心主於夏變而生憂也平按此條見素問同上又楊氏此注亦見甲乙經卷一第一東方風傷筋酸傷筋中央濕傷肉甘傷肉南方熱傷氣苦傷氣北方寒傷血咸傷血西方熱傷皮毛辛傷皮毛平按此條見素問同上又按素問新校正云凡此五方所傷太素俱云自傷袁刻云自傷似亦注文中央生濕六月四陽二陰合蒸以生濕氣也平按此條見同上濕生土四陽二陰合而為濕蒸腐萬物成土也平按此條見同上在變動為噦噦氣忤也平按此條見同上燥傷皮毛熱勝燥平按此條見同上寒傷骨平按此條見同上濕勝寒平按此條見同上又按寒傷骨濕傷寒兩條袁刻脫咸傷骨平按此條見同上左右者陰陽之道路也陰氣右行陽氣左行平按此條見同上肖者濯濯平按此條見素問卷三第八靈蘭祕典論神之處平按此條見素問卷三第九六節藏象論又按素問六節藏象論為陽中之太陰新校正引太素太陰作少陰為陰中之少陰新校正引太素少陰作太陰此為陽中之少陽新校正引太素作陰中之少陽三條平從楊惺吾氏所獲日本仁和寺宮御藏本殘卷十三紙中檢出補入本書卷三第二陰陽合篇故此三條不復列入間者環已平按此條見素問卷四第十六診要經終論滑則少氣平按此條見素問卷五第十七脈要精微論又按脈經少氣作氣少白欲如白璧之澤不欲如堊平按此條見同上五臟者中之府也平按此條見同上行則僂跗平按此條見同上象心之太浮也平按此條見素問卷七第二十一經脈別論所謂氣虛者氣虛者膻中氣不足也平按此條見素問卷八第二十八通評虛實論尺滿而不應也平按此條見同上足溫則生寒則死足溫氣下故生足寒氣不下者逆而致死平按此條見同上脈實大病久可治平按此條見同上又按素問王注云久病血氣衰脈不當實大故不可治新校正云詳經言實大病久可治注意以為不可治甲乙經太素全元起本並云可治復引巢元方云脈數大者生細小浮者死袁刻作脈懸小堅病久可治恐誤誦而頗能解解而未能別別而未能明明而未能彰習道有五一誦二解三別四明五彰平按此條見素問卷二十三第七十五著至教論列星辰與日月光此條見同上上通神農著至教擬於二皇平按此條見同上夫三陽太為業平按此條見同上下為漏病漏病謂膀胱漏泄大小便數不禁守也平按此條見同上腎且絶死死日暮也平按此條見同上子誠別而已通五臟之過平按此條見素問卷二十三第七十六示從容論是以名曰診經平按此條見同上為萬民副副助也平按此條見素問卷二十三第七十七疏五過論病深以甚也平按此條見同上始樂始苦平按此條見同上封君敗傷及公候王平按此條見同上氣內為實天地間氣為外氣人身中氣為內氣外氣裁成萬物是為外實內氣營衛裁生故為內實治病能求內氣之理是治病之要也平按此條見同上更名自巧平按此條見素問卷二十三第七十八徵四失論愚心自功平按此條見同上黃帝燕坐臨觀八極正八風之氣而問雷公曰陰陽之類經脈之道五中所主何藏最貴夫天為陽地為陰人為和陰無其陽衰殺無已陽無其陰生長不止生長不止則傷於陰陰傷則陰災起衰殺不已則傷於陽陽傷則陽禍生矣故須聖人在天地間和陰陽氣令萬物生也和氣之道謂先修身為德則陰陽氣和陰陽氣和則八節風調八節風調則八虛風止於是疵癘不起嘉祥竟集此亦不知所以然而然也故黃帝問身之經脈貴賤依之調攝修身於身以正八風之氣平按此條見素問卷二十四第七十九陰陽類論三陽為經二陽為維一陽為遊部三陽足太陽脈也從目內眥上頭分為四道下項並正別脈上下六道以行於背與身為經二陽足陽明脈也從鼻而起下咽分為四道並正別脈六道上下行腹綱維於身一陽足少陽脈也起目外眥絡頭分為四道下缺盆並正別脈六道上下生經營百節流氣三部故曰遊部平按此條見同上伏鼓不浮上空志心肺脈浮澀此為平也今見伏鼓是腎脈也足少陰脈貫脊屬腎上入肺中從肺出絡心肺氣下入腎志上入心神也平按此條見同上一陰獨至一陰厥陰也平按此條見同上二陰一陽病在肺平按此條見同上陰陽皆絶期在孟春平按此條見同上陰陽交期在溓水溓廉檢反水靜也七月水生時也平按此條見同上一上不下寒厥到膝虛者厥也陽氣一上於頭不下於足足脛虛故寒厥至膝平按此條見素問卷二十四第八十方盛衰論若伏空室為陰陽之一平按此條見同上至陽絶陰是為少氣平按此條見同上脾主為衛平按此條見甲乙經卷一第三六腑者胃為之海廣䏖大頸張胸五穀乃容平按此條見同上當候闕中平按此條見甲乙經卷一第十五黑色見於庭平按此條見同上闕上者咽喉也平按此條見同上闕中者肺也平按此條見同上病生於陽者先治其外後治其內平按此條見同上衛氣留於腹中平按此條見甲乙經卷九第四非災風也平按此條見甲乙經卷十第一下篇血氣留積髖皮充肌平按此條見甲乙經卷十一第六有過之脈平按此條見脈經卷一第二滑則氣少平按此條見脈經卷一第十三又按素問脈要精微論氣少作少氣寒氣暴上脈滿實何如曰實而滑則生實而逆則死矣其形盡滿何如曰舉形盡滿者脈急大堅尺滿而不應如是者順則生逆則死何謂順則生逆則死曰所謂順者手足溫也謂逆者手足寒也平按此條見脈經卷四第七一月膏二月脈三月胞四月胎五月筋六月骨七月成八月動九月躁十月生平按此條見日本醫心方卷二十二又按太素卷九第一經脈正別篇楊注云人之受身時一月而膏二月而脈為形之先自三月胞以下不載又按醫心方卷二十四所引太素有玄元皇帝曰人受天地之氣變化而生一月而膏二月而脈三月而胞四月而胎五月而筋六月而骨七月而成形八月而動九月而臊十月而生當系楊注與醫心方卷二十二所引小異導引謂熊頸鳥伸五禽戲等近愈痿躄萬病遠取長生久視也平按此條見日本醫心方卷二十七所引太素楊注
