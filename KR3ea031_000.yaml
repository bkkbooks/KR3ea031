front:
  text: 校正內經太素楊注後序內經太素楊上善注三十卷兩唐志皆著録北宋以還漸多散佚宋志僅存三卷元以來遂鮮稱及之者蓋亡失久矣光緒中葉吾鄉楊惺吾先生始從日本獲唐寫卷子本影鈔以歸存二十三卷桐廬袁忠節公得其書未加詳校即以付刊訛謬滋多未為善本吾姻友蕭北承孝廉精於醫始聚群籍校正其書殫精二十年以成此本余受而讀之蓋合靈樞素問纂為一書編次卷目皆有不同反覆以觀然後知內經十八卷之自有真後人援他書以竄亂素問者固非而據一二淺短之文疑靈樞之出於偽託者亦誤也漢志載黃帝內經十八卷初無素問之名後漢張仲景傷寒論引之始稱素問晉皇甫士安甲乙經序稱針經九卷素問九卷皆為內經與漢志十八卷之數合是素問之名實起於漢晉之間故其書隋志始著於録然隋志雖名九卷已注明梁八卷是其書自梁以來早闕其一卷故全元起注本僅八卷已亡其第七篇是為素問原書最初之本至唐王冰作注不知所據何書妄稱得先師祕本即隋所亡之第七篇竄入本書移易篇第纂為二十四卷是為今素問四庫著録本其書出宋林億等所校正當校正時即謂天元紀大論以下七篇居今素問四卷篇卷浩大不與前後相等所載之事亦不與餘篇相通疑此七篇乃陰陽大論之文王氏取以補素問之闕卷者今按其説未知確否而其文系王氏補入為全元起本所未有則顯而易見蓋林億等校正此書即取全本對勘於王本移易篇第之下注明全元起本在第幾卷獨此七篇篇目之下未經注明全本其引太素楊上善注雖不及引全注之詳亦幾於卷卷有之獨此七篇會無一字引及此可為素問原言無此七篇之確證其不加刪汰者徒以系古醫書過而存之云爾今觀楊氏此書則林億等所引以駁正王注者具在卷中而天元紀大論以下七篇則全書俱無此文此可見楊氏所據以編纂此言之經文即同元起本而全注所據之已闕第七篇本乃系素問原本竄亂之迹明而原言之真出矣此可徵林億等之説之確者也靈樞之名漢隋唐志皆不載宋紹興中錦官史嵩出其家藏舊本送官詳正世始有傳是其書至宋中世而始出故宋志始著於録四庫提要謂即王冰取九靈所改名九靈尤詳於針故皇甫謐名之為針經疑其一經而二名杭堇浦靈樞經跋據隋志所載謂九靈肩九靈針經自針經可合而為一冰以九靈名靈樞不知其何所本觀其文義淺短與素問之言不類疑即出冰之偽託不知內經十八卷醫家取其九卷別為一書名曰素問其餘九卷本無專名張仲景序傷寒論歷引古醫經於素問外稱曰九卷並不標以異名存其實也晉王敘和脈經一同皇甫士安序甲乙經本仲景之意以為內經十八卷即此九卷及素問又以素問亦九卷無以別此經因取其首篇之文謂之鐵經九卷其實針經非九卷之名也故其後仍稱九卷甲乙經內所引靈樞之文其稱皆同於此今觀楊氏此書所引九卷之文不一而足並有引九卷篇名如終始篇者今其文具在靈樞之中可知靈樞之文古只稱為九卷楊氏據之其傳甚古王冰謂靈樞即漢志內經十八卷之九其言確有可徵九靈之文今已不傳不知何若在王氏並未取以更名靈樞固可信也若其文義淺短疑為偽託則不知內經一書雖出黃帝其在古代不過口耳相傳晚周以還始著竹帛大都述自醫師且不出於一手故其文義時有短長今觀其義之深者九卷之古奧雖素問有不逮其淺而可鄙者即素問未嘗不與九卷略同而以源流而論則素問且多出於九卷觀素問方盛衰論言合之五診調之陰陽已在經脈經脈即靈樞篇目王注已言之是素問之文且有出於靈樞之後者素問且宗靈樞而謂靈樞不逮素問乎徒以宋史嵩撰靈樞音釋欲以此九卷配王注素問之數乃分其卷為二十四分其篇為八十一至元間並素問為十二卷又並史嵩靈樞之卷以合素問於是古九卷之名湮後人遂疑靈樞為晚出之書豈知素問自素問九卷自九卷二者同屬古書皆為楊氏所據初不疑其偽託此可證杭氏之説之誤者也北承究心醫書涉覽極博內經不去乎者蓋數十年其校此書也據甲乙經靈樞素問以訂經文之異同據傷寒論巢氏病源論千金方外臺祕要日本醫心方等以證注義之得失體例與素問王注新校正相近其穿穴經論微契聖心雖未知於仲景諸家奚若而用漢學治經義之法於宋賢校醫言之中一義必析其微一文必求其確蓋自林億高保衡以還數百年無此詣精之作可斷言也嘗自謂生平精力盡於此書而決其必傳久客京師一旦書成遂即南歸不肯復出其自信也如此即其書可知矣余懵於醫無以贊之喜其刻之成而得以有傳於世也輒為之僭書於後甲子冬十月姻愚弟周貞亮謹序
