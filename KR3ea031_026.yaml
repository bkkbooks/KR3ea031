body:
  text: 卷第二十六寒熱寒熱厥平按此篇自篇首至末見素問卷十二第四十五厥論篇又見甲乙經卷七第三又見巢氏病源卷十二冷熱病諸候寒熱厥候篇惟編次前後略異黃帝問於岐伯曰厥之寒熱者何也夫厥者氣動逆也氣之失逆有寒有熱故曰厥寒熱也九月反逆氣平按注氣之失逆袁刻之作動岐伯曰陽氣衰於下則為寒厥陰氣衰於下則為熱厥下謂足也足之陽氣虛也陰氣乘之足冷名曰寒厥足之陰氣虛也陽氣乘之足熱名曰熱厥也黃帝曰熱厥之為熱也必起足下何也寒熱逆之氣生於足下令足下熱不生足上何也岐伯曰陽起於五趾之表集於足下而熱於足心故陽勝則足下熱五趾表者陽也足心者陰也陽生於表以溫足下今足下陰虛陽勝故足下熱名曰熱厥也平按陽起於五趾之表素問作陽氣起於足五趾之表新校正云甲乙陽氣起於足作走於足起當作走今本甲乙仍作起按足之三陽從頭走足自以走字為允又素問甲乙表下有陰脈者三字而熱熱字作聚巢氏亦作聚注表者者字袁刻脫今足下今字袁刻作令黃帝曰寒厥之為寒也必從五趾始上於膝下何也岐伯曰陰氣起於五趾之裡集於膝下而聚於膝上故陰氣勝則從五趾至膝上寒其寒也不從外皆從內寒黃帝曰善五趾里陰也膝下至於膝上陽也今陽虛陰勝之故膝上下冷也膝上下冷不從外來皆從五指之裡寒氣上乘冷也平按必從必字袁刻脫始上於膝下素問甲乙作而上於膝者又素問皆從內寒寒作也甲乙無寒字巢氏作皆從內寒與本書同黃帝曰寒厥何失而然厥失也寒失之氣何所失逆致令手足冷也岐伯曰前陰者宗筋之所聚也太陰陽明之所合也春夏則陽氣多而陰氣衰秋冬則陰氣盛而陽氣衰大便處為後陰陰器為前陰也宗總也人身大筋總聚以為前陰也手太陰脈絡大腸循胃口足太陰脈絡胃手陽明脈屬大腸足陽明脈屬胃手足陰陽之脈皆主水穀共以水穀之氣資於諸筋故令足太陰足少陰足厥陰足陽明等諸脈聚於陰器以為宗筋故宗筋太陰陽明之所合也春夏為陽故人足陽明春夏氣盛秋冬為陰故人足太陰秋冬氣盛也平按前陰者宗筋之所聚甲乙作厥陰者衆筋之所聚素問新校正云甲乙作厥陰者衆筋之所聚全元起云前陰者厥陰也與王注異亦自一說巢氏陰上無前字陽氣多多字原抄不全素問甲乙巢氏均作多袁刻作盛陰氣衰衰字素問甲乙均作少此人者質壯以秋冬奪於所用下氣上爭未能復精氣溢下邪氣且從之而上氣居於中陽氣衰不能滲營其經絡故陽氣日損陰氣獨在故手足為之寒此人謂是寒厥手足冷人也其人形體壯盛從其所欲於秋冬陽氣衰時入房太甚有傷故曰奪於所用因奪所用則陽氣上虛陰氣上爭未能和復精氣溢泄益虛寒邪之氣因虛上乘以居其中以寒居中陽氣衰虛夫陽氣者衛氣也衛氣行於脈外滲灌經絡以營於身以寒邪居上衛氣日損陰氣獨用故手足冷名曰寒厥也平按未能復素問作不能復且從之而上素問巢氏且作因甲乙作從而上之氣居於中甲乙作所中二字黃帝曰熱厥何如岐伯曰酒入於胃則絡脈滿而經脈虛脾主為胃行其津液者也陰氣虛則陽氣入陽氣入則胃不和胃不和則精氣竭精氣竭則不營其四肢酒為熱液故人之醉酒先入並絡脈之中故經脈虛也脾本為胃行於津液以灌四臟今酒及食先滿絡中則脾臟陰虛脾臟陰虛則脾經虛脾經既虛則陽氣乘之陽氣聚脾中則穀精氣竭穀精氣竭則不營四肢陽邪獨用故手足熱也此人必數醉若飽已入房氣聚於脾中未得散酒氣與穀氣相搏熱於中故熱遍於身故內熱溺赤夫酒氣盛而慓悍腎氣有衰陽氣獨勝故手足為之熱此具言得病所由此人謂手足熱厥之人數經醉酒及飽食酒谷未消入房氣聚於脾臟二氣相搏內熱於中外遍於身內外皆熱腎陰內衰陽氣外勝手足皆熱名曰熱厥也平按此人必數醉袁刻脫必字素問甲乙飽已作飽以未得散作不得散相搏作相薄巢氏作相併熱於中素問作熱盛於中甲乙無此三字巢氏作熱起於內故內熱溺赤素問甲乙作內熱而溺赤巢氏溺作尿有衰甲乙作日衰素問巢氏並作有衰袁刻作日黃帝問曰厥或令人腹滿或令人暴不知人或至半日遠至一日乃知人者何也令人腹滿及不知人以為失逆稱為厥者請聞所以岐伯曰陰氣盛於上則下虛下虛則腹脹滿上謂心腹也下謂足下也上陽非無有陰下陰非無有陽氣之常也今陰氣並盛於上下虛故腹滿也平按甲乙無脹字巢氏陰氣上有此由二字無則下虛至下節陽氣盛於上十四字陽氣盛於上則下氣重上而邪氣逆逆則陽氣亂亂則不知人黃帝曰善心腹為陽下之陽氣重上心腹是為邪氣逆亂故不知人也平按陽氣盛於上甲乙作腹滿二字注云素問作陽氣盛於上素問新校正云當從甲乙之說何以言之別按甲乙云陽脈下墜陰脈上爭發尸厥焉有陰氣盛於上而又言陽氣盛於上又按張仲景云少陰脈不至腎氣微少精血奔氣促迫上入胸膈宗氣反聚血結心下陽氣退下熱歸陰股與陰相動令身不仁此為尸厥仲景言陽氣退下則是陽氣不得盛於上故知當從甲乙也本書與素問同與甲乙巢氏異姑存以俟考經脈厥平按此篇自篇首至嗌腫痓治主病者見素問卷十二第四十五厥論篇自巨陽之厥至以經取之又見甲乙經卷七第三自足太陰脈厥逆至嗌腫痓治主病者又見甲乙經卷四第一中篇自腎肝並沉至末見素問卷十三第四十八大奇論篇又見甲乙經卷四第一下篇又見本書卷十五五藏脈診篇又自巨陽之厥至腫脛內熱見巢氏病源卷十二冷熱病諸候寒熱厥候篇黃帝曰願聞六經脈之使厥狀病能請聞手足三陰三陽氣動失逆為厥之狀能者厥能為病平按素問厥上無使字注之狀之字袁刻作人岐伯曰巨陽之厥踵首頭重足不能行發為眴僕巨陽太陽也踵足也首頭也足太陽脈從頭至足故太陽氣之失逆頭足皆重以其重故不能行也手足太陽皆入於目故目為眴僕眴胡遍反目搖也平按巢氏巨作太素問甲乙踵作腫甲乙眴作眩陽明之厥則癲疾欲走呼腹滿不能臥面赤而熱妄見妄言足陽明脈從面下入腹至足故陽明氣之失逆癲疾走呼腹滿不得臥面赤而熱妄見妄言皆是陽明穀氣盛熱邪氣所乘故也平按不能臥素問甲乙作不得臥巢氏作不臥面赤上有臥則二字少陽之厥則暴聾頰腫而熱脅痛骭不可以運手足少陽之脈皆入耳中足少陽脈循頰下脅循骭至足故暴聾頰腫脅痛腳骭不可運動也平按骭素問甲乙巢氏均作䯒太陰之厥腹滿䐜脹後不利不欲食食則嘔不得臥足太陰脾脈主於腹之腸胃故太陰脈氣失逆腹滿不利不食嘔不得臥平按注腸胃袁刻作腹胃少陰之厥則舌乾溺赤腹滿心痛手少陰脈絡小腸足少陰脈從足上陰股內廉貫脊屬腎絡膀胱絡心上挾舌本少陰氣逆舌乾溺赤腹滿心痛也平按素問舌作口巢氏溺作尿厥陰之厥則少腹腫痛䐜溲不利好臥屈膝陰縮腫脛內熱足厥陰脈從足上踝八寸趣出太陰後上循股陰入毛環陰器抵少腹挾胃故少陰脈氣失逆少腹痛䐜溲不利好臥屈膝陰縮腫胻內熱有本脛外熱足厥陰脈不行脈外外為誤耳平按䐜溲不利素問作腹脹涇溲不利甲乙作䐜脹涇溲不利巢氏作涇溲不利脛素問甲乙作䯒巢氏內熱作外熱注故少陰脈氣失逆少陰據經文宜作厥陰恐原抄傳寫之誤盛則瀉之虛則補之不盛不虛則以經取之凡六經厥皆量盛虛以行補瀉也足太陰脈厥逆胻急攣心痛引腹治主病者足太陰脈從足上行循胻後屬脾絡胃注心中故足太陰氣動失逆胻急攣心痛引腹也有胻急攣等病者可療足太陰脈所發之穴主療此病者也余仿此問曰前章已言六經之厥今復言之有何別異也答曰二章說之先後經脈厥而主病左右不同故也平按素問甲乙太陰上無足字下無脈字足少陰脈厥逆虛滿歐變下泄青治主病者足少陰脈貫脊屬腎絡膀胱貫肝入肺注胸中故足少陰脈氣失逆心腹虛滿歐吐下利出青色者少腹間冷也平按素問甲乙歐作嘔青作清足厥陰脈厥逆攣腰虛滿前閉譫言治主病者足厥陰環陰器抵少腹循喉嚨入頏顙故足厥陰脈失逆腰攣而虛滿小便閉譫諸閻反多言也相傳乃銜反獨語也平按素問甲乙腰下有痛字譫言甲乙作譫語素問新校正云全元起云譫言者氣虛獨言也三陰俱逆不得前後使人手足寒三日死逆即氣之失逆名曰厥逆足三陰之脈同時失逆必大小便不通手足冷期至三日死也平按注必大小便必字袁刻脫足太陽脈厥逆僵仆歐血善衄治主病者足太陽脈起於鼻旁目內眥挾脊抵腰中絡腎屬膀胱故足太陽脈氣之失逆僵仆歐血善衄後倒曰僵前倒曰僕僵仆有傷故歐血也太陽厥逆連鼻故善衄也平按素問甲乙太陽上無足字下無脈字歐作嘔足少陽脈厥逆機關不利者腰不可以行項不可以顧發腹癰不可治驚者死足少陽脈循頸下腋循胸過季脅合髀厭中下膝外廉下外輔骨之前抵絶骨上外踝之前上跗入小趾次趾間支者貫爪甲遍絡身之骨節機關故少陽氣之失逆機關不利腰是機關故不可行也少陽循頸故項不可顧也脈行脅裡出於氣街發腸癰病猶可療之腸癰氣逆傷膽死也平按素問甲乙少陽上無足字下無脈字機關不利四字重腹癰腹字均作腸據本注亦宜作腸當是傳抄之誤不可治不字素問甲乙同據本注應作猶足陽明脈厥逆喘咳身熱善驚衄歐血不可治驚者死足陽明逆氣乘肺故喘咳也足陽明主身熱逆氣逆身喜驚足陽明起鼻下行屬胃氣逆衄血歐血而不療加有驚者神亂故死也平按素問甲乙陽明上無足字下無脈字歐作嘔素問無不可治驚者死六字手太陰脈厥逆虛滿而咳善歐唾沫治主病者手太陰脈下絡大腸還循胃口上膈屬肺故氣逆而成病平按善歐唾沫素問作善嘔沫甲乙作善嘔吐沫手心主少陰脈厥逆心痛引喉身熱死不熱可治手心主手厥陰心包絡脈起於胸中出屬心包下膈歷絡三焦手少陰脈起心中挾咽上行故二脈失逆心痛引喉也心包之脈歷絡三焦故心受邪而痛遍行三焦致令身熱名真心痛死不可療若身不熱是則逆氣不周三焦故可療之也平按不熱可治素問作不可治甲乙作不熱者可治手太陽脈厥逆聾泣出項不可以顧腰不可以俯仰治主病者手太陽脈起於小指之端上行至肩上入缺盆循頸至目鋭眥卻入耳中故手太陽氣逆耳聾目泣出項不可顧不得俯仰也平按素問甲乙聾上有耳字手陽明少陽脈厥逆發喉痹嗌腫痓治主病者手陽明脈上肩出顒前廉上出柱骨之會上下入缺盆支者從缺盆上貫頰手少陽支者從膻中出缺盆上項系耳後故二脈氣逆喉嚨痹咽嗌腫頸項痓痓身項強直也平按素問新校正云全元起本痓作痙腎肝並沉為石水腎肝雖為下部腎脈沉肝脈浮而強今肝脈與腎脈並沉是陰氣盛腎以主水故為石水石水謂盛冬凝水堅硬如石名曰石水言此水病之甚也硬五猛反強也平按注堅硬堅字袁刻誤作腎又按素問新校正云詳腎肝並沉至下並小弦欲驚全元起本在厥論中王氏移於大奇論據此則本書與全本相同王氏之移經益信並浮為風水浮為陽也風為陽也肝脈浮弦今腎脈與肝脈並浮然腎肝俱陰居於下部故為風水也並虛為死腎肝並虛是為陰陽俱虛為水必死並小弦亦驚脈小者血氣少也腎肝二脈血氣俱少仍弦者是為腎肝皆虛又為脾氣來乘故有驚恐也平按亦驚素問作欲驚甲乙作欲為驚寒熱相移平按此篇自篇首至故得之厥氣見素問卷十第三十七氣厥論篇又見甲乙經卷六第十自三陽急為瘕至末見素問卷十三第四十八大奇論篇又見甲乙經卷四第一下篇腎移寒於脾癕腫少氣五臟病傳凡有五邪謂虛實賊微正等邪從後來名虛邪從前來名實邪從所不勝來名微邪從勝處來名賊邪邪從自起名曰正邪腎移寒於脾此從不勝來也謂腎臟得寒傳與脾臟致令脾氣不行於身故發為癕腫寒傷谷故為少氣也平按脾素問作肝新校正云按全元起本作腎移寒於脾元起注云腎傷於寒而傳於脾脾主肉寒生於肉則結為堅堅化為膿故為癕也血傷氣少故曰少氣甲乙經亦作移寒於脾王因誤本遂解為肝亦智者之一失也癕素問甲乙作癰下同注病傳袁刻作內傳從勝處來袁刻作從所勝來脾移寒於肝癰腫筋攣脾得寒氣傳與肝臟名曰微邪以脾將寒氣與肝肝氣壅遏不通故為癰腫肝以主筋故肝病筋攣者也肝移寒於心狂鬲中肝得寒氣傳於心臟名曰虛邪肝將寒氣與心心得寒氣熱盛神亂故狂鬲也心氣不通也平按素問鬲作隔心移寒於肺肺消者飲一溲二死不治心得寒氣傳與肺者名曰賊邪心將寒氣與肺肺得寒發熱肺焦為渴名曰肺消飲一升溲一升可療飲一升溲二升肺已傷甚故死也平按素問肺消二字重甲乙作為肺消肺消者肺移寒於腎為湧水湧水者按腹下堅水氣客大腸疾行則鳴濯濯如裹囊治主肺者肺得寒氣傳與腎臟名曰虛邪肺將寒氣與腎腎得湧水大腸盛水裹於腹中如帛囊漿壺以肺寒飲為病故療於肺也平按腹下堅素問下作不甲乙作按其腹不堅則鳴作腸鳴如裹囊甲乙作如囊裹漿素問作如囊裹漿水之病也無治主肺者四字脾移熱於肝則為驚衄脾受熱氣傳之與肝名曰微邪脾將熱氣與肝肝血怒盛傷為驚怖衄血也肝移熱於心則死肝受熱氣傳之與心名曰虛邪肝將熱氣與心心中有神不受外邪故令受邪即死也心移熱於肺傳為鬲消心受熱氣傳之與肺名曰賊邪心將熱氣與肺肺得熱氣膈熱消飲多渴故曰膈消也平按鬲甲乙作膈胞移熱於膀胱則癃溺血胞女子胞也女子胞中有熱傳與膀胱尿胞尿脬得熱故為淋病尿血也膀胱移熱於小腸隔腸不便上為口靡隔塞也膀胱水也小腸火也是賊邪來乘故小腸中塞不得大便熱上衝口中爛名曰口靡靡爛也亡之反平按素問隔作鬲靡作糜甲乙亦作糜肺移熱於腎傳為素痙肺受熱氣傳之與腎名曰虛邪肺將熱氣與腎腎得熱氣名曰素痙之病素痙強直不能回轉平按素痙素問甲乙作柔痓腎移熱於脾傳為虛腸闢死不可治腎受熱氣傳之與脾名曰微邪腎將熱氣與脾脾主水穀故脾得熱氣令腸中水穀消竭所以腸虛闢疊不通而死平按闢素問甲乙作澼又肺移熱於腎兩節素問甲乙在胞移熱於膀胱上小腸移熱於大腸為密疝為沉小腸得熱傳與大腸名曰賊邪小腸將熱氣與大腸為病名曰密疝大腸得熱密澀沉而不通故得密沉之名也平按密疝素問甲乙作虙瘕王注謂虙與伏同血澀不利則月事沉滯而不行故云為虙瘕為沉也與楊注異大腸移熱於胃善食而瘦入胃之食亦大腸得熱傳與胃者名曰虛邪大腸將熱與胃胃得熱氣實盛消食故喜飢多食以其熱盛食入於胃不作肌肉故瘦亦義當易也言胃中熱故入胃之食變易消無不為肌肉故瘦平按而瘦入胃之食亦素問胃作謂甲乙作而溲名曰食㑊胃移熱於膽名曰食亦胃得熱氣傳之與膽從不勝來名曰微邪胃將熱氣與膽膽得於胃谷之熱氣令膽氣消易仍名食易平按名曰素問作亦曰甲乙作亦名膽移熱於腦則辛煩鼻淟鼻淟者濁涕下不止傳為衄䁾瞑目故得之厥氣淟他典切垢濁也䁾已結反目眵也腦髓屬腎膽得熱氣傳之與腦從前而來名曰實邪膽將熱氣與腦腦得膽之熱氣鼻煩辛酸流於濁涕久下不止傳為鼽衄眵瞑也瞑開目難也此膽傳之病並因逆熱氣之所致也平按素問甲乙煩作頞淟作淵厥氣素問作氣厥甲乙無氣字注煩袁刻作頻並因袁刻誤作並目三陽急為瘕瘕謂女子宮中病男子亦有瘕而為病凡脈急者多寒三陽謂太陽候得太陽脈急為是陰勝多寒男子為瘕女子為石瘕之病平按素問為瘕下有三陰急為疝五字注瘕謂謂字袁刻脫二陰急為癇厥二陰少陰也候得少陰脈急是為陽與陰爭陽勝發為小兒癇病手足逆冷也二陽急為驚二陽陽明也陽與陰爭少陰勝發大小人驚也平按素問新校正云三陽急為瘕至二陽急為驚全元起本在厥論王氏移在大奇論據此則全本與本書合厥頭痛平按此篇自篇首至後取足少陽陽明見靈樞卷五第二十四厥病篇又見甲乙經卷九第一自厥挾脊而痛至末見靈樞卷五第二十六雜病篇又自厥挾脊而痛至膕中血絡見甲乙經卷七第一中篇又自厥胸滿面腫至末見甲乙經卷七第三厥頭痛面若腫起而煩心取足陽明太陽應有問答傳之日久脫略故也手足陽明及手足太陽皆在頭在面手太陽絡心屬小腸此等四脈失逆頭痛面胕起若腫及心煩故各取此四脈輸穴療主病者平按靈樞太陽作太陰又按足陽明太陽據本注應作手足陽明太陽厥頭痛頭脈痛心悲善泣視頭動脈反盛者刺盡去血後調足厥陰足厥陰脈屬肝絡膽上連目系上出額與腎脈會於巔故氣失逆頭痛頭脈痛心悲善泣視頭動厥陰主悲泣視頭動者視之時頭戰動也脈反盛者絡脈盛可先刺去取血後取厥陰輸穴療主病者也平按甲乙頭脈痛無頭字善泣作喜泣注賢脈恐系督脈之誤厥頭痛貞貞頭重而痛瀉頭上五行行五先取手少陰後取足少陰貞竹耕反貞貞頭痛甚貌手少陰心脈起心中從心系目系足少陰腎脈貫脊屬腎上貫肝入肺從肺出絡心故心氣失逆上衝於頭痛貞貞頭是心神所居故先取心脈輸穴後取腎脈輸穴療主病者平按貞貞甲乙作員員下無頭重二字注靈樞作貞貞又注貫肝入肺袁刻肺誤作脈厥頭痛意善忘按之不得取頭面左右動脈後取足太陰足太陰脈與足陽明合也足陽明循頭面左右動在客主人及大迎皆脾氣所至脾神是意其脈足太陰所以太陰氣之失逆意多善忘所痛在神按之難得可取頭面左右足陽明動脈後取足太陰輸穴療主病者平按甲乙此段在厥頭痛貞貞之上太陰作太陽注云亦作陰厥頭痛頭痛甚耳前後脈湧有熱瀉出其血後取足少陽足少陽膽脈起目鋭眥上抵角下耳後其支從耳後入耳中出走耳前故足少陽氣之失逆頭痛甚耳前後脈湧動者有熱也可刺去熱血後取足少陽療主病者平按甲乙頭痛甚作痛甚脈湧有熱作脈骨熱瀉出作先瀉足少陽作足太陽少陰厥頭痛項腰脊為應取天柱後取足太陽足太陽脈起目內眥上額交巔入絡腦還出下項挾脊抵腰中入循膂絡腎屬膀胱故足太陽氣之失逆頭痛項先痛腰脊相應先取足太陽上天柱之穴後取足太陽下輸穴療主病者平按靈樞甲乙此段在厥頭痛頭痛甚之上項作先項痛三字應下有先字真頭痛頭痛甚腦盡痛手足寒至節死不治頭痛腦痛既甚氣逆故手足冷至節極則死也頭痛不可取於輸者有所擊墜血在於內若內傷痛未已可即刺不可遠取也取輸難愈故曰不可又有擊墜留血可以近療可即刺之不可取其遠輸者也平按輸靈樞作腧甲乙作俞血上靈樞甲乙有惡字內傷靈樞作肉傷可即刺靈樞即作則甲乙刺下有之字頭痛不可刺者大痹為惡日作者可令少愈不可除也頭痛有不可刺者此為大痹在頭惡其日作作發也刺之可令少愈不可除也謂寒濕之氣入腦以為大痹故也平按甲乙惡下有風字除靈樞甲乙作已頭半寒痛先取手少陽陽明後取足少陽陽明手足少陽陽明在頭面左右箱故手脈行近頭足脈行遠頭所以頭之左箱半痛者可刺左箱手之少陽陽明然後刺右箱足之少陽陽明右亦如之也平按甲乙無半字厥挾脊而痛至項頭沉沉然目𥇀𥇀然腰脊強取足太陽膕中血絡頭目項及腰脊膕足太陽脈所行故生病膕中也平按靈樞項作頂𥇀𥇀作𥉂𥉂甲乙至項頭作主頭項沉沉作几几𥇀𥇀作𥉂𥉂厥胸滿面腫唇思思然暴言難甚則不能言取足陽明此皆足陽明脈所行故取足陽明輸療主病者平按唇思思然靈樞作唇漯漯甲乙作肩中熱厥氣走喉而不能言手足清大便不利取足少陰手足清者手少陰與足少陰通故手足冷取足少陰輸療主病者也平按甲乙不能言作不言清上有微字清據注訓冷應作凊為允本書下篇作凊厥而腹向向然多寒氣腹中滎滎便溲難取足太陰腹脹多寒便溲不利皆是足太陰脈所為故取之也平按向向然甲乙作膨膨二字滎滎靈樞作禾呈糸禾呈糸甲乙作爂爂注云音最九墟作滎滎注太陰脈脈字袁刻脫厥心痛平按此篇自篇首至形中上者見靈樞卷五第二十四厥病篇自心痛引腰脊至得之立已見靈樞卷五第二十六雜病篇自心疝暴痛至末見靈樞卷五第二十三熱病篇又自篇首至末見甲乙經卷九第二厥心痛與背相控如從後觸其心傴僂者腎心痛也先取京骨崑崙髮針不已取然谷腎脈足少陰貫脊屬腎絡心故腎氣失逆令心痛控背腎在於後故腎病痛心如物從後觸心而痛脊背傴僂也京骨在足外側大骨下赤白肉際腎腑足太陽脈所過崑崙在足外踝跟骨上足太陽脈所行然骨在足內踝前起大骨下足少陰脈所流故腎心痛皆取之也平按控下靈樞甲乙有善瘛二字傴上甲乙有身字髮針下有立已二字注腎在於後袁刻腎作背厥心痛腹脹胸滿心尤痛甚胃心痛也取之大都太白胃脈足陽明屬胃絡脾脾脈足太陰流於大都在足大趾本節後陷中注於太白在足內側核骨下陷中支者別胃上膈注心中脾胃主水穀水穀有餘則腹脹胸滿尤大也此腑病取於臟輸也平按甲乙腹脹胸滿作暴泄腹脹滿厥心痛痛如錐針刺其心心痛甚者脾心痛也取之然谷太溪然谷足少陰脈所流在足內踝前起大骨下陷中太溪足少陰脈所注在足外踝骨上動脈陷中並是足少陰流注脾氣乘心心痛可療脾之輸穴今療腎足少陰流注之穴者以脾是土腎為水土當剋水水反乘脾脾乃與心為病故遠療病輸也平按靈樞錐上有以字甲乙錐下無針字注足外踝骨上檢甲乙經太溪在足內踝後跟骨上動脈陷中且陰脈行內外踝應是內踝之誤踝下脫後跟二字厥心痛色倉倉如死狀終日不得太息肝心痛也取之行間太衝倉倉青色也肝病也不得太息肝主吸氣今吸氣已痛不得出氣太息也太衝右足大趾本節後二寸陷者足厥陰脈所注平按靈樞甲乙倉倉作蒼蒼注右足右字當系在字傳抄之訛檢甲乙經太衝穴在足大趾本節後二寸或曰一寸五分陷者中素問刺腰痛論注云在足大趾本節後內間二寸陷者中並無左右足之分故知右為在之誤也厥心痛臥若徙居心痛間動作痛益甚色不變肺心痛也取之魚際太泉肺主於氣氣以流動流動之氣乘心故心痛臥若移居至於他處也以氣流動故心痛間也動作益氣所病故益甚也肺氣是心微邪不能令色變魚際在大指本節後內側散脈中手太陰脈之所留太泉在手掌後陷者中手太陰脈之所注也平按徙居靈樞作徒居太泉作太淵說見前真心痛手足凊至節心痛甚旦發夕死夕發旦死心不受邪受邪甚者痛聚於心氣亦聚心故手足冷所以死速也平按凊今本靈樞作清道藏本靈樞作凊甲乙作青心痛不可刺者中有盛聚不可取於輸腸中有蟲瘕及蛂蛔皆不可取小針心痛甚取輸無益者乃是腸中有蟲瘕蛂蛔腸中長蟲也音𦶍可以手按用大針刺之不可用小針平按輸靈樞作腧甲乙作俞蛂靈樞甲乙作蛟心腹痛憹作痛腫聚往來上下行痛有休止腹熱善渴涎出者是蛂蛔也以手聚按而堅持之姑令得移以大針刺之久持之蟲不動及出針也恲腹憹痛形中上者憹聚結也奴通反謂心腹之內蟲聚而痛憹懊憹然也蟲食而聚猶若腫聚也食已而散故休止也又聚擾於胃故熱渴涎出也若蛂相𦶍所以蛔稱蛂也蘵亦恲普耕反滿也謂蟲聚心腹滿如腫聚高起故曰形中上者也平按靈樞心腹作心腸腹熱善渴涎出者靈樞善作喜甲乙作腹中熱渴𧋈者注𧋈音涎姑令靈樞甲乙作無令及出針及靈樞甲乙作乃甲乙無恲腹憹痛形中上者八字恲靈樞音烹注猶若腫聚腫袁刻作種心痛引腰脊欲嘔取足少陰足少陰脈行腰脊上至心故心痛引腰脊欲嘔取少陰脈輸穴也心痛腹脹嗇嗇然大便不利取足太陰足太陰脈主腹故取足太陰輸穴嗇嗇惡寒之貌也平按嗇嗇甲乙作澀澀心痛引背不得息刺足少陰不已取手少陽足少陰脈貫脊絡心手少陽脈主三焦氣故心痛引背不得息取此二經輸穴療主病者也平按手少陽甲乙作手少陰心痛少腹滿上下無常處便溲難刺足厥陰足厥陰脈環陰器抵少腹故少腹滿便溲難取此脈輸穴所主病者平按靈樞甲乙少腹上有引字心痛但短氣不足以息刺手太陰手太陰主於氣息故氣短息不足取此脈療主輸穴心痛當九節刺之不已刺按之立已不已上下求之得之立已明堂第九節下兩旁是肝輸中央是筋縮皆不言療心痛此經言療取之刺此節不已於上下背輸尋之有療心痛取之平按刺之不已靈樞作刺之按已心疝暴痛取足太陰厥陰盡刺去其血絡足太陰注心中足厥陰從肝注肺故心暴疝取此二脈去其血絡也平按甲乙作盡刺之血絡寒熱雜說平按此篇自篇首至末見靈樞卷五第二十一寒熱病篇又自篇首至骨厥亦然見甲乙經卷八第一上篇又自骨痹至補之見甲乙經卷十第一下篇又自身有所傷至關元也見甲乙經卷十第二下篇又自厥痹者至陰經見甲乙經卷十第一下篇又暴喑一節見甲乙經卷十二第二暴聾一節見甲乙經卷七第一中篇暴疸一節見甲乙經卷十二第七又自臂陽明至盛瀉虛補見甲乙經卷十二第六又自足陽明有挾鼻至則瞑目見甲乙經卷十二第四又自寒厥至足太陰少陽見甲乙經卷七第三又舌縱一節見甲乙經卷十二第六又振寒灑灑一節見甲乙經卷七第一中篇又自春取絡脈至治骨髓五臟見甲乙經卷五第一上篇又自身有五部至有癰疽者死見甲乙經卷十一第九下篇又自熱病始手臂者至止之於陰見甲乙經卷七第一中篇又自病始手臂者至項太陽而汗出見素問刺熱篇亦見本書五臟熱病篇又自凡刺之害至末見甲乙經卷五第四皮寒熱皮不可附席毛髮焦鼻槁臘不得汗取三陽之絡補手太陰肺主皮毛風盛為寒熱寒熱之氣在皮毛故皮毛熱不可近席以熱甚故皮毛焦鼻是肺官氣連於鼻故槁臘不得汗也臘肉乾也三陽絡在手上大支脈三陽有餘可瀉之太陰氣之不足補之也平按皮不可附席皮字靈樞作者甲乙太陰作太陽恐誤注寒熱之氣寒字袁刻脫肺官官字原不全因下注唇口為脾官當是官字袁刻作宮肌寒熱肌痛毛髮焦而唇槁臘不得汗取三陽於下以去其血者補太陰以出其汗寒熱之氣在於肌中故肌痛毛髮焦也唇口為脾官氣連肌肉故肌肉熱唇口槁臘不得汗也是為足三陽盛故去其血也足太陰虛故補之出汗平按寒熱下靈樞有者字甲乙有病字太陰上靈樞有足字以出其汗甲乙出作去骨寒熱病無所安汗注不休齒未槁取其少陰於陰股之絡齒已槁死不治骨厥亦然寒熱之氣在骨骨熱故無所安汗注不休也齒槁骨死之候齒不槁者可取足少陰陰股間絡以足少陰內主於骨故也平按甲乙寒下有骨字病作痛未槁作本槁痛已槁作色槁注內主於骨袁刻主誤作寒骨痹舉節不用而痛汗注煩心取三陰之經補之寒濕之氣在於骨節肢節不用而痛汗注煩心名為骨痹是為手足三陰皆虛受諸寒濕故留針補之令濕痹去之矣身有所傷血出多及中風寒若有所墮墜四肢解㑊不收名曰體解取其少腹臍下三結交三結交者陽明太陰也臍下三寸關元也因傷出血多一也中風寒二也有墮墜三也體者四肢也三者俱能令人四肢解墮不能收者名曰體解之病可取之足陽明足太陰於齊下小腸募關元穴也三結者足之三陰太陰之氣在齊下與陽明交結者也平按甲乙血出多作出血多墮墜作墜墮靈樞解㑊作解惰體解作體惰齊靈樞甲乙作臍厥痹者厥氣上及腹取陰陽之絡視主病者瀉陽補陰經失逆之氣從足上行及於少腹取足之陰陽之絡所主之病瀉去其血補足三陰經也頸側之動脈人迎人迎足陽明也在嬰筋之前嬰筋之後手陽明也名曰扶突次脈手少陽脈也名曰天牖次脈足太陽也名曰天柱腋下動脈臂太陰也名曰天府膺前當中任脈謂之天突任脈之側動脈足陽明在嬰筋之前人迎也名足陽明等者十二經脈足太陰屬脾絡胃上膈挾陽明連舌本足少陰從腎上貫膈入肺循喉嚨挾舌本足厥陰屬肝絡膽循喉嚨後上入頏顙連目系上額與督脈會巔支者從目系下頰裡此足三陰至頸項之中所行處深故不得其名足厥陰雖至於頰不當頸項沖處故其穴不得脈名手少陰心脈雖循胸系目系以心不受邪其氣不盛手心主脈從心包循胸出脅腋不至頸項又是心包其氣更不盛故此二脈之穴不得脈名手太陰肺脈以肺居臟上主氣其氣強盛雖不至頸項發於氣穴得於脈名手足三陽手太陽脈雖循頸上頰至目鋭眥以是心腑其氣不盛故穴不得脈名足少陽膽腑脈起目鋭眥下行至胸以膽穀氣不盛故其穴不得脈名唯手足陽明穀氣強盛手少陽三焦之氣有本為足少陽檢例誤耳足太陽諸陽之長所以此之四脈並手太陰入於五部大輸之數也與彼本輸之中脈次多少不同彼中十二經脈之中唯無足之三陰手之少陰手足諸陽皆悉奇經八脈之中有任有督以為脈次此中唯取五大要輸以為差別平按注所行處深袁刻作行處深深又注皆悉下所缺二字細玩余文似具於二字陽逆頭痛胸滿不得息取人迎足陽明從大迎循髮際至額顱故陽明氣逆頭痛也支者下人迎循喉嚨屬胃絡脾故氣逆胸滿不得息可取人迎人迎胃脈主水穀總五臟之氣寸口為陰此脈為陽以候五臟之氣禁不可灸也暴喑氣鯁取扶突與舌本出血手陽明別走大絡乘肩髃上曲頰循齒入耳中會宗脈五絡皆入耳中故耳中脈名宗脈也所以人暴喑氣鯁取此手足之陽明扶突之穴出血得已氣在咽中如魚鯁之狀故曰氣鯁舌本一名風府在項入髮際一寸督脈上今手陽明正經不至風府當是耳中宗脈絡此舌本以血有餘故瀉出也平按氣鯁靈樞鯁作硬甲乙作硬取作刺暴聾氣蒙耳目不明取天牖手少陽從膻中上系耳後支者從耳後入耳中走出耳前至目鋭眥故手少陽病耳暴聾不得明瞭者可取天牖在頭筋缺盆上天容後天柱前完骨下髮際上也平按甲乙蒙下有瞀字不明作不開下有頭頷痛淚出鼻衄不得息不知香臭風眩喉痹十八字取天牖作天牖主之暴攣癇眩足不任身取天柱足太陽脈起目內眥上額交巔入絡腦下挾脊抵腰循膂過髀樞合膕貫腨出外踝後至小趾外側故此脈病暴腳攣小兒癇頭眩足瘻可取天柱天柱挾項後髮際大筋外廉陷者中也平按甲乙攣上有拘字暴疸內逆肝肺相薄血溢鼻口取天府此為大輸五部熱盛為疸手太陰脈起於中焦下絡大腸還循胃口上膈屬肺故此脈病腹暴疸脾胃氣逆肝肺之氣相薄致使內逆血溢鼻口故取天府天府在腋下三寸臂臑內廉動脈此為頸項之間臟腑五部大輸平按疸甲乙作痹大輸靈樞作天牖甲乙此句作此為胃之大腧五部也注云五部按靈樞云陽逆頭痛胸滿不得息取人迎暴喑氣硬刺扶突與舌本出血暴聾氣蒙耳目不明取天牖暴拘攣癇痓足不任身者取天柱暴痹內逆肝肺相薄血溢鼻口取天府此為胃之五大俞五部也今士安散作五穴於篇中此特五部之一耳據此則大輸五部靈樞太素經文本相連屬士安撰甲乙散見於各篇中又此注所引刺扶突今本靈樞作取扶突暴拘攣今本靈樞作暴攣癇痓今本靈樞作癇眩此為胃之五大俞五部也今本靈樞作此為天牖五部與所引略有不同想有別本也臂陽明有入鼽遍齒者名曰人迎下齒齲取之臂惡寒補之不惡寒瀉之臂陽明手陽明也手陽明脈從手上行循臂入缺盆下絡肺支者從缺盆行嬰筋後上頸入至下齒中還出俠鼻起足陽明交額中下入上齒中遂出循頤至大迎支者從大迎下行嬰筋之前至人迎至嬰筋時二經皮部之絡相至二經故臂陽明之氣亦發人迎故稱有入所以下齒齲取於手之商陽穴也惡寒陽虛故補之不惡寒者陽實故瀉之也平按靈樞入鼽作入頄甲乙齒上無遍字人迎靈樞甲乙作大迎甲乙注云靈樞名曰禾窖或曰大迎詳大迎乃是陽明脈所發則當云禾窖是也然而下齒齲又當取足陽明禾窖大迎當試可知耳據此則靈樞甲乙所稱未能確定玩楊注自明又注俠鼻俠字袁刻誤作喉足之太陽有入頰遍齒者名曰角孫上齒齲取之在鼻與鼽前方病之時其脈盛則瀉之虛則補之一曰取之出眉外方病之時盛瀉虛補遍音遍足太陽經起目內眥上額其太陽皮部之絡有下入於頰後遍上齒又入於耳氣發角孫之穴故曰有入所以上齒齲者取之鼻及鼽骨之前有絡見者刺去其血虛則補絡補絡可飲補藥眉外謂足陽明上關穴也上關在耳前上廉起骨開口有空亦量虛實以行補瀉也平按足之太陽甲乙作手太陽入頰靈樞甲乙作入頄靈樞鼽前作頄前眉外作鼻外下無方病之時盛瀉虛補八字足陽明有俠鼻入於面者名曰懸顱屬口對入系目本視有過者取之損有餘益不足反者益甚足陽明大經起鼻交頞下鼻外入上齒中還出俠口交承漿循頤出大迎上耳前循髮際氣發懸顱之穴有皮部之絡與口相當入系目系對當也視此足陽明有餘不足可損益之取之失者反益甚也平按甲乙有俠作又俠靈樞俠作挾甲乙目本下有頭痛引頷取之六字益不足作補不足足太陽有通項入於腦者正屬目本名曰眼系頭目固痛取之在項中兩筋間入腦乃別足太陽經起目內眥上額交巔上其直者從巔入絡腦還出別下項有絡屬於目本名曰目系太陽為目上綱故亦是太陽與目為系今別來屬於頭其氣是通故頭與目有固痛者取於項中足太陽筋兩間別下項者氣之所發大椎穴者大椎在第一椎上陷者三陽督脈之會也平按固痛靈樞甲乙作苦痛注筋兩據經文應作兩筋陰喬陽喬陰陽相交陽入陰出陰陽交於兌眥陽氣盛則瞋目陰氣盛則瞑目二喬皆起於足行至於目是為二喬同向上行何以稱陽入陰出也人之呼氣出為陽也吸氣入為陰也故呼氣之時在口為出於頭足亦出吸氣之時在口稱入於頭足亦入今於目眥言陰陽出入以相交會目得明也所以陽盛目張不能合陰盛則目瞑不得開宜取此二喬也平按喬靈樞甲乙作蹺陽入陰出靈樞作陽入陰陰出陽兌作鋭甲乙作陽氣絶乃瞑陰氣絶則眠寒厥取陽明少陰於足留之失逆寒氣從足而上令足逆冷可取足少陰脈太溪太溪在足內踝後骨上動脈陷中取足陽明脈解溪解溪在足衝陽後一寸半平按靈樞甲乙寒厥一節在熱厥後熱厥取足太陰少陽失逆熱氣從足起者可取足少陽絡光明在外踝上五寸別走厥陰者及足太陰脈療主病者也舌縱涎下煩悗取足少陰足少陰脈從足心上行屬腎絡膀胱貫肝膈入肺循喉嚨挾舌本支者從肺絡心注胸中故其脈厥熱涎下心中煩悗取足少陰然谷穴然谷在足內踝前起大骨下陷者中也平按甲乙涎作𧋈悗作悶取足少陰作陰交主之振寒灑灑鼓頷不得汗出腹脹煩悗取手太陰灑音洗手太陰脈起於中焦下絡大腸還循胃口上膈屬肺別者上出缺盆循喉嚨合手陽明從缺盆上頸貫頰入下齒中肺以惡寒故虛病振寒鼓頷也循胃屬肺故腹脹煩悗悗音悶可取手太陰少商穴少商在手大指端內側去爪甲角如韭葉平按甲乙灑灑作悽悽悗作悶注循胃口循袁刻作從刺虛者刺其去也謂營衛氣已過之處為去故去者虛也補之令實刺實者刺其來也謂營衛氣所至之處為來故來者為實瀉之使虛也春取絡脈春時肝氣始生風疾氣急經氣尚深故取絡脈分肉之間療人皮膚之中病也夏取分腠夏時心氣始長脈瘦氣弱陽氣流於經隧溝洫熏熱分腠內至於經故取分腠以去肌肉之病也秋取氣口秋時肺氣將斂陽氣在合陰氣初勝濕氣及體陰氣未盛故取氣口以療筋脈之病氣口即合也冬取經輸冬時腎氣方閉陽氣衰少陰氣緊太陽沉故取經井之輸以下陰氣取滎輸實於陽氣療於骨髓五臟之病也平按輸甲乙作俞下同凡此四時各以為齊絡脈治皮膚分腠治肌肉氣口治筋脈經輸治骨髓五臟齊音劑也身有五部伏兔一伏兔在膝上六寸起肉足陽明氣發禁不可灸又不言得針此要禁為第一部故生癰疽者死也腓二腓者踹也腓音肥承筋一名踹腸一名直腸脈在踹中央陷中足陽明太陽氣所發禁不可刺故踹為要害之處生癰疽者死也平按甲乙腓作踹無腓者踹也四字靈樞踹也作腨也背三自要輸以上二十一椎兩箱稱背去臟腑甚近皮肉至薄若生癰疽陷而必死也五臟之輸四五臟手足二十五輸當於輸穴生癰疽者死也項五項之前曰頸後曰項三陽督脈在項故項生癰疽致死也五部有癰疽者死癰疽害甚故生人之要處致死病始手臂者先取手陽明太陰而汗出以下言療熱病取脈先後熱病等所起起於四肢及頭故病起兩手者可取手陽明井商陽在手大指次指內側去爪甲角如韭葉以手陽明穀氣盛也及手太陰郤孔最在腕上七寸也病始頭首者先取項太陽而汗出有熱等病起於頭者可取於項足太陽脈天柱之穴天柱在挾項後髮際大筋外陷也病始足胻者先取足陽明而汗出病起足者可取陽明合三里穴三里在膝下三寸胻外廉平按靈樞甲乙胻作脛臂太陰可出汗手太陰脈主氣故出汗取之也平按出汗靈樞作汗出下同足陽明可出汗足陽明主水穀多氣血故出汗取之取陰而汗出甚者止之於陽取陽而汗出甚者止之於陰取陰脈出汗不止可取陽脈所主之穴止若取陽脈出汗不止可取陰脈所主之穴止之也平按甲乙無兩於字凡刺之害中而不去則精泄不中而去則致氣精泄則病甚而恇致氣則生為癰瘍凡行針要害無過二種一種者刺中於病補瀉不以時去針則泄人精氣刺之不中於病即便去針以傷良肉故致氣聚精泄益虛故病甚虛恇恇怯也氣聚不散為癰為瘍也癰疽平按此篇自篇首至此其候也黃帝曰善見靈樞卷十二第八十一癰疽篇又自篇首至藏傷故死矣見甲乙經卷十一第九上篇又自黃帝曰願盡聞癰疽之形至此其候也黃帝曰善見甲乙經卷十一第九下篇又自黃帝問於岐伯曰有病癰腫致痛至可使全黃帝曰善見素問卷十三第四十腹中論篇又自黃帝問曰諸癰腫筋攣至末見素問卷五第十七脈要精微論篇甲乙同上黃帝問於岐伯曰余聞腸胃受谷上焦出氣以溫分肉而養骨節通腠理上焦出衛氣衛氣為陽故在分肉能溫之也氣潤骨節骨節腦髓皆悉滋長故為養也令腠理無癰故為通中焦出氣如露上注溪谷而滲孫脈孫絡津液和調變化而赤為血血和則孫脈先滿滿乃注於絡脈皆盈乃注於經脈出氣謂營氣也經絡及孫絡有內有外內在臟腑外在筋骨肉間谷入於胃精液滲諸孫絡入於大絡大絡入經流注於外外之孫絡以受於寒溫四時之氣入絡行經以注於內令明水穀津液入於孫絡乃至於經也內外經絡行於臟腑臟腑氣和乃得生也平按露甲乙作霧孫絡二字靈樞甲乙不重而赤甲乙作赤而先滿滿乃注於絡脈靈樞作先滿溢乃注於絡脈甲乙滿字不重絡脈下重絡脈二字注滲諸孫絡諸袁刻作於陰陽已張因息乃行行有經紀周有道理與天合同不得休止張張也陰營氣也陽衛氣也神之動也故出入息動息之動也營衛氣行營衛氣行必有經紀營衛周行道理人與天道同運天運非常之道故不休也平按甲乙已張作乃張乃行作而行切而調之從虛去實瀉則不足疾則氣減留則先後從實去虛補則有餘血氣已調形神乃持余已知血氣之平與不平未知癰疽之所從生成敗之時死生之期期有遠近何以度之可得聞乎切專志也用心專至調虛實也瀉者順於虛專去盛實瀉之甚者則不足也氣至因而疾瀉則便氣盛氣至留而不瀉則針與氣先後不相得也若順實唯去於虛補之甚者則有餘也是以切而調之者得之於心不可過虛實也故善調者補瀉血氣使形與神相保守也持者保守也如此調養血氣平與不平言已知之然猶未通癰疽三種之論故請所聞平按形神靈樞作形氣甲乙作神氣平與不平甲乙作至與不至岐伯曰經脈留行不止與天同度與地合紀此言天有度數地有經紀故天宿失度日月薄蝕地經失紀水道流溢草蔖不成五穀不殖徑路不通民不往來巷聚邑居別離異處蔖採古切草名也亦節枯也此言天度地紀有失致損也平按蔖靈樞作萓注云魚飢切詳玉篇萓本作宜鹿蔥也廣韻蔖採古切草死也與楊注節枯之意同較萓義為長血氣猶然請言其故夫血脈營衛同流不休上應星宿下應經數此言人之血氣合於天地平按甲乙星宿作天宿寒氣客於經絡之中則血泣血泣則不通不通則衛氣歸之不得復反故癰腫寒氣化為熱熱盛則腐肉肉腐則為膿膿不瀉則爛筋筋爛則傷骨骨傷則髓消不當骨空不得泄瀉煎枯空虛則筋骨肌肉不相營經脈敗漏熏於五臟臟傷故死矣此言血氣行失有損有病也平按煎枯空虛靈樞作血枯空虛甲乙作則筋骨枯空枯空靈樞營作榮甲乙作親經脈作經絡故死作則死黃帝曰願盡聞癰疽之形與忌日名凡有三問一問癰疽形狀二問癰疽死生忌日三問癰疽名字也岐伯曰癰發於嗌中名曰猛疽猛疽不治化為膿膿不瀉塞咽半日死其化為膿者瀉已已則含豕膏毋冷食三日而已下答癰疽形狀及名並所發處合二十一種一十八種有名有狀有所發處三種但有所發之處無名與狀二十一種中七種無死生忌日餘十四種皆有忌日凡癰疽所生皆以寒氣客於經絡之中令血凝澀不通衛氣歸之寒極化為熱氣成癰疽腐肉為癰爛筋壞骨為疽輕者療之可生重者傷臟致死名猛疽等癰疽之名聖人見其所由立之名狀如下隨變為形亦應不可勝數也近代醫人元不識本名之旨隨意立稱不可為信嗌咽也寒氣客脈之處即發熱以為癰疽無常處也平按瀉已已靈樞無兩已字甲乙作膿瀉已靈樞甲乙含作合膏下無毋宇注熱氣下原缺一字袁刻作鬱積二字不合謹空一格發於頸名曰夭疽其癰大以赤黑不急治則熱氣下入泉液前傷任脈內熏肝肺熏肝肺十餘日而死矣項前曰頸平按泉靈樞甲乙作淵說見前陽氣大發消腦留項名曰腦鑠其色不樂項痛而刺以針煩心者死不治腦後白項平按陽氣靈樞作陽留甲乙留項作溜項鑠靈樞甲乙作爍項痛而刺以針靈樞刺上有如字甲乙作腦項痛如刺以針靈樞治上有可字發於肩及臑名曰疵癰其狀赤黑急治之此令人汗出至足不害五臟癰發四五日逆焫之肩前臂上膕肉名臑發於掖下赤堅名曰米疽治之砭石欲細而長數砭之塗以豕膏六日已勿裹之砭甫廉反識同以石刺病也欲細而長者傷形深也平按靈樞甲乙堅下有者字治之下有以字數砭作疏砭注識同二字袁刻脫其癰堅而不潰者為馬刀俠癭急治之馬刀亦謂癰不膿潰者是也頸前曰嬰也發於胸名曰井疽其狀如大豆三四日起不早治下入腹不治七日死井疽起三四日不療下入腹寒熱不去十日死也平按發於脅上靈樞甲乙有發於膺名曰甘疽色青其狀如谷實栝蔞常苦寒熱急治之去其寒熱十歲死死後出膿一條發於脅名曰敗疵敗疵者女子之病也灸之其病大癰膿治之其中乃有生肉大如赤小豆銼䔖翹草根各一升水一斗六升煮之竭為三升即強飲厚衣坐釜上令汗出至足已敗亦曰改量謂此病生於女子故釜上蒸之出汗即已有本翹松各一升平按甲乙其中上無治之二字䔖上無銼字有治之以三字各一升上有及赤松子根五字竭上有令字為三升作得三升靈樞作為取三升發於股胻名脫疽其狀不甚變而癰膿搏骨不急治三十日死髀內曰股股外曰髀膝上股下骨稱曰股胻也平按靈樞甲乙胻作脛脫疽作股脛疽甲乙變下有色字搏骨作內薄於骨急治之發於尻名曰兌疽其狀赤堅大急治之不治三十日死矣尻脽也脽音誰平按兌靈樞甲乙作鋭三十日日本醫心方作四十日發於股陰名曰赤施不急治六日死在兩股之內不治六十日而死陰下之股平按甲乙施作弛靈樞六日作六十日六十日作十日甲乙同發於膝名曰疵疽其狀大癰色不變寒熱而堅勿石石之死須其柔乃石之者生勿石之者準例皆砭之此唯言石之或以冷石尉之所以堅而不石以其寒聚結聽柔乃石之平按靈樞疵疽作疵癰而堅作如堅石甲乙須其柔作須其色異柔諸癰疽之發於節而相應者不可治也當節生癰膿入節間傷液故不可療也平按甲乙無疽字發於陽者百日死發於陰者四十日死也丈夫陰器曰陽婦人陰器曰陰平按四十日靈樞作三十日發於脛名曰兔齧其狀赤至骨急治不治害人也脛謂膝下脛骨也平按甲乙齧作齧赤作如赤豆三字害人作殺人發於踝名曰走緩其狀色不變數石其輸而止其寒熱不死色不變者肉色不變也石其輸者以冷石尉其所由之輸也平按靈樞甲乙踝上有內字靈樞狀下有癰也二字輸甲乙作俞發於足上下名曰四淫其狀大癰不色變不治百日死足上下者足趺上下也平按靈樞甲乙無不色變三字發於足旁名曰厲疽其狀不大初如小指發急治之去其黑者不消輒益不治百日死旁謂足內外之側也平按初如甲乙作初從之去作去之黑上有狀字不消作不可消發於足趾名曰脫疽其狀赤黑死不治不赤黑不死治之不衰急斬去之活不然則死矣不則死者不斬去死也平按靈樞不衰上無治之二字斬下無去字靈樞甲乙無活字不然甲乙作不去靈樞無然字黃帝曰夫子言癰疽何以別之岐伯曰營衛稽留於經脈之中則血泣而不行不行則衛氣從之從之而不通壅遏而不得行故曰大熱不止熱勝則肉腐肉腐則為膿然不能陷於骨髓骨髓不為焦枯五臟不為傷故命曰癰營衛稽留經脈泣不行者寒氣客之血泣不行衛氣歸在泣血之中也平按甲乙稽留作積留經脈作經絡靈樞從之二字不重甲乙作歸之故曰靈樞作故熱甲乙作故曰熱靈樞骨髓二字不重陷於骨髓甲乙作陷肌膚於骨髓命曰作名曰黃帝曰何謂疽岐伯曰熱氣淳盛下陷肌膚筋髓骨枯內連五臟血氣竭當其癰下筋骨良肉皆毋余故命曰疽癰下者即前之癰甚肌膚肉筋骨髓斯之六種皆悉破壞命之曰疽也平按淳甲乙作純骨枯作骨肉靈樞無骨字竭下甲乙有絶字疽者上之皮夭以堅上如牛領之皮癰者其皮上薄以澤此其候也黃帝曰善此言其癰疽之候異平按甲乙上之作其上夭下有瘀字上如作狀如黃帝問於岐伯曰有病癰腫頸痛胸滿腹脹此為何病何以得之因於癰腫有此三病未知所由故請之也平按素問癰作膺甲乙頸作脛岐伯曰名厥逆因癰腫熱聚氣失逆上上盛故頸痛下虛故胸滿腹脹也平按甲乙作病名曰厥逆注失字袁刻脫曰治之奈何曰灸之則喑石之則狂須其氣並乃可治曰何以然曰陽氣重上有餘於上灸之則陽氣入陰則喑石之則陽氣虛虛則狂須其氣並而治之可使全黃帝曰善灸之喑者陽氣上實陰氣下虛灸之火壯陽盛溢入陰故喑以冷石尉之則陰氣獨盛陽氣獨虛以陽氣獨虛發於狂可任自和然後療之使之全也平按則喑素問作入則喑甲乙同使全甲乙作使愈黃帝問曰諸癰腫筋攣骨痛此皆安生因於癰腫有此二病故請所生平按生甲乙作在袁刻作主岐伯曰此寒氣之腫也八風之變也曰治之奈何曰此四時之病也以其勝治其輸筋骨是陰加以寒氣故為寒腫也此乃四時八正虛風變所為也引其所勝克之則愈也平按治其輸素問作治之愈也甲乙輸作俞蟲癰平按此篇自篇首至末見靈樞卷十第六十八上膈篇又見甲乙經卷十一第八黃帝問於岐伯曰氣為上鬲上鬲者食飲入而還出余已知之矣蟲為下鬲下鬲者食晬時乃出余未得其意願卒聞之晬子內反鬲癰也氣之在於上管癰而不通食入還即吐出蟲之在於下管食晬時而出蟲去下虛聚為癰故須問也平按靈樞鬲作膈上鬲二字不重甲乙入上無飲字岐伯曰喜怒不適飲食不節寒溫不時則寒汁流於腸中流於腸中即蟲寒蟲寒則積聚守於下管守於下管則下管充郭衛氣不營邪氣居之人食則蟲上食蟲上食則下管虛虛則邪氣勝之積聚以留留則癰成癰成則下管約其癰在管內者則沉而痛深其癰在外者則癰外而痛浮癰上皮熱蟲癰之病所由有三一因喜怒傷神不得和適二因縱欲飲食不節三因隨情寒溫不以時受此三因中隨有一種乖和則寒邪汁下流於腸中令腸內蟲寒聚滿下管致使衛氣不得有營邪氣居之又因於食蟲亦上食下管遂虛邪氣積以成癰其癰若在管內其痛則深若管外其痛則浮當癰皮熱以為候也平按甲乙則寒汁流於腸中流作留流於腸中即蟲寒作留則蟲寒管作脘則下管充郭衛氣不營作守下脘則胃腸充郭胃氣不營靈樞則下管充郭作則腸胃充郭虛則邪氣勝之作下管虛則邪氣勝之甲乙勝下無之字有勝則二字靈樞則沉二字作即黃帝曰刺之奈何岐伯曰微按其癰視氣所行以手輕按癰上以候其氣取知癰氣所行有三一欲知其癰氣之盛衰二欲知其癰之淺深三欲知其刺處之要故按以視也平按甲乙無微字先淺刺其旁稍內益深遂而刺之毋過三行候其癰旁氣之來處先漸淺刺後以益深者欲導氣令行也還復也如此更復刺不得過於三行也平按遂靈樞甲乙作還據本注亦應作還當系傳寫之誤察其沉浮以為深淺沉浮淺深也察癰之淺深以行針也平按甲乙作淺深已刺必尉令熱入中日使熱內邪氣益衰大癰乃潰寒汁邪氣聚以為癰故癰塞也令刺已尉之令熱入中者以寒溫使其日有內熱寒去癰潰也以參伍禁以除其內亦可含於豕膏無冷食三日其病已矣參伍揣量也平按甲乙作互以參禁靈樞作伍以參禁恬惔無為乃能行氣夫情有所在則氣有所並氣有所並則不能營衛故忘情恬惔無為則氣將自營也平按靈樞甲乙惔作淡袁刻作淡後以酸苦化谷乃下酸為少陽苦為太陽此二味為溫故食之化谷也平按靈樞酸作咸甲乙此句作後服酸苦化谷乃下膈矣寒熱瘰癧平按此篇自篇首至末見靈樞卷十第七十寒熱篇又見甲乙經卷八第一上篇黃帝問於岐伯曰寒熱瘰癧在於頸掖者皆何氣使生岐伯曰此皆鼠瘻寒熱之毒氣也堤留於脈而不去也風成為寒熱寒熱之變亦不勝數乃至甚者為癰病也今行脈中壅遏遂為瘰癧鼠瘻也堤癰障平按掖靈樞甲乙作腋堤留於脈甲乙作稽於脈注云靈樞稽作隄今本靈樞仍作留無隄字黃帝曰去之奈何岐伯曰鼠瘻之本皆在於臟其末上於頸掖之間其浮於脈中而未內著於肌肉而外為膿血者易去也寒熱之氣在肺等臟中循脈而上發於頸掖不生於項在脈中未在肌肉言其淺也為膿血者外泄氣多故易去也平按甲乙上於作上出脈中作胸中而未內著作未著二字靈樞上於作上出於三字注易去袁刻誤作是去黃帝曰去之奈何岐伯曰請從其本引其末可使衰去而絶其寒熱審按其道以豫之徐來徐往以去之本謂臟也末謂瘻處也道謂臟腑脈行所發穴路也徐往來者動針法也平按奈何下袁刻脫岐伯曰三字其小如麥者一刺知三刺而已療之得愈分劑也黃帝曰決其死生奈何岐伯答曰反其目視之其中有赤脈從上下貫瞳子見一脈一歲死見一脈半一歲半死見二脈二歲死見二脈半二歲半死見三脈三歲而死見赤脈而不下貫瞳子可治以下言死生候也寒熱已成成在太陽太陽為目上綱其脈下見令太陽經溢入絡中甚者併入絡中下貫瞳子瞳子是骨之精為寒熱傷甚故一脈獨貫一歲死也若為二三氣散不獨故二三歲死也雖有赤脈不貫瞳子可得療者以未傷骨精故也灸寒熱法平按此篇自篇首至末見素問卷十六第六十骨空論篇又見甲乙卷八第一上篇灸寒熱之法先取項大椎以年為壯數大椎穴三陽督脈之會故灸寒熱氣取明堂大椎有療傷寒病不療寒熱平按先取素問作先灸次灸厥骨以年為壯數視背輸陷者灸之此脈中血寒而少故取背輸陷也厥骨脊骶骨也有本厥與骨通為一字巨月反平按厥骨素問甲乙作撅骨注此脈袁刻誤作此血與臂肩上陷者灸之臂肩亦取脈陷療寒熱之輸肩貞等穴也平按素問甲乙與作舉兩季脅之間灸之季脅本挾脊京門穴也外踝之上絶骨之端灸之陽輔等穴足小趾次趾間灸之臨泣等穴也平按小趾袁刻作少趾腨下陷脈灸之承山等穴平按腨下甲乙作腨上外踝之後灸之崑崙等穴也缺盆骨上切之堅痛如筋者灸之平按甲乙堅痛作堅動膺中陷骨間灸之𩩲骭骨下灸之平按𩩲骭骨素問甲乙作掌束骨臍下關元三寸灸之毛際動脈灸之膝下三寸分間灸之平按膝下甲乙作臍下三寸作二寸足陽明灸之跗上動脈灸之平按足陽明下素問無灸之二字新校正云按甲乙經全元起本足陽明下有灸之二字並跗上動脈是二穴據此則全本與本書相同但今本甲乙仍無灸之二字巔上動脈灸之平按素問甲乙動脈作一字犬所齧之處灸之三壯即以犬傷痛壯數灸也凡當灸二十七處骭音干𩩲骭穴也衝陽等穴也題云灸寒熱法此總數之二十七處中有依其輸穴亦取氣指而灸之不可為定可量取也平按齧素問作齧甲乙同無三壯二字痛壯數灸也素問作病法灸之甲乙作病法三炷灸之二十七處素問甲乙均作二十九處傷食灸不已者必視其經之過於陽者數刺之輸血藥之也傷食為病灸之不得愈者可刺之刺法可刺大經所過之絡出血及飲藥調之陽絡脈也平按素問灸下有之字之輸作其俞血藥作而藥
