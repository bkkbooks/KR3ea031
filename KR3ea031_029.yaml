body:
  text: 卷第二十九卷首缺氣論平按此篇自堅字以上已佚篇目亦不可考袁刻從靈樞刺節真邪篇自黃帝曰有一脈生數十病者節録補入查自黃帝曰有一脈生數十病者至岐伯曰此邪氣之所生也一段已見本書卷二十二五邪刺篇未免重出茲特從靈樞刺節真邪篇黃帝曰余聞氣者有真氣以下至手按之補於堅字之上其自堅有所結至末見靈樞卷十一第七十五刺節真邪篇又見甲乙經卷十一第九下篇黃帝曰余聞氣者有真氣有正氣有邪氣何謂真氣岐伯曰真氣者所受於天與穀氣並而充身也正氣者正風也從一方來非實風又非虛風也平按甲乙無非實風又四字注云太素云非災風也邪氣者平按甲乙卷十第一下有虛風也三字虛風之賊傷人也其中人也深不能自去正風者其中人也淺合而自去其氣來柔弱不能勝真氣故自去虛邪之中人也灑淅動形起毫毛而發腠理其入深內搏平按搏甲乙作薄下同於骨則為骨痹搏於筋則為筋攣搏於脈中則為血閉不通則為癰搏於肉與衛氣相搏陽勝者則為熱陰勝者則為寒寒則真氣去去則虛虛則寒搏於皮膚之間其氣外發腠理開毫毛搖氣平按搖氣甲乙注云一本作淫氣往來行則為癢留而不去則痹衛氣不行則為不仁虛邪遍容於身半其入深內居營衛營衛稍衰則真氣去邪氣獨留發為偏枯其邪氣淺者脈偏痛虛邪之入於身也深寒與熱相搏久留而內著寒勝其熱則骨疼肉枯熱勝其寒則爛肉腐肌為膿內傷骨內傷骨為骨蝕有所疾前筋筋屈不得伸邪氣居其間而不反發為筋溜平按溜甲乙作瘤下腸溜同有所結氣歸之衛氣留之不得反津液久留合而為腸溜久者數歲乃成以手按之柔已有所結氣歸之津液留之邪氣中之凝結日以易甚連以聚居為昔瘤以手按之以上從靈樞刺節真邪篇節録補入堅息大按之而堅積病久也十四有所結深中骨氣因於骨骨與氣並日以益大則為骨疽先有聚結深至骨邊骨與氣並致令骨壞稱曰骨疽十五也平按甲乙深中骨作氣深中骨日以益作息日以益有所結中於肉氣歸之邪留而不去有熱則化而為膿先有聚氣為熱營邪居熱則壞肉以為癰膿十六平按甲乙中於肉作氣中於肉氣歸之靈樞甲乙作宗氣歸之甲乙為膿上無而字無熱則為肉疽結氣無熱虛邪則壞肉以為肉疽十七也平按甲乙疽上無肉字凡此數氣者其發無常處而有常名也邪氣傷人身無有定處而有斯十七種名也津液平按此篇自篇首至末見靈樞卷六第三十六五癃津液別篇又見甲乙經卷一第十三黃帝問岐伯曰水穀入於口輸於腸胃其液別為五天寒衣薄則為溺與氣天熱衣厚則為汗悲哀氣並則為泣中熱胃緩則為唾邪氣內逆則氣為之閉塞而不行不行則為水脹余知其然也不知其所由生願聞其說輸逆致也水穀入於口逆於腸胃之中化為津液凡有五別則五臟津液凡所言液者通名為津經稱津者不名為液故液有五也此略舉五液請解其義也平按甲乙無餘知其然也願聞其說九字靈樞說作道注逆致逆於別本逆均作送岐伯答曰水穀皆入於口其味有五各注其海五味走於五臟四海肝心二臟主血故酸苦二味走於血海脾主水穀之氣故甘味走於水谷海肺主於氣故辛走於膻中氣海腎主腦髓故咸走髓海也平按甲乙各注作分注津液各走其道目為泣道腠理為汗道廉泉為涎道鼻為涕道口為唾道也故上焦出氣以溫肌肉充皮膚為津上焦出氣出胃上口名曰衛氣溫暖肌肉潤澤皮膚於腠理故稱為津也平按上焦靈樞作三焦甲乙膚下有者字靈樞為下有其字其留而不行者為液水穀精汁注骨屬節中留而不去謂之為液平按靈樞留作流天暑衣厚則腠理開故汗出因熱而腠理開而出者謂之為汗寒留於分肉之間沫聚則為痛寒留分肉之間津液聚沫迫裂分肉所以為痛平按靈樞甲乙沫聚作聚沫天寒則腠理閉氣澀不行水下溜於膀胱則為溺與氣此解溺氣多之所由也平按靈樞澀作濕下溜作下留甲乙作下流五臟六腑心為之主耳為之聽目為之候肺為之相肝為之將脾為之衛腎為之主水平按水靈樞甲乙作外故五臟六腑之津液盡上滲於目心悲氣並則心系急急則肺葉舉舉則液上溢夫心系舉肺不能常舉乍上乍下故呿而泣出矣呿音去身中五官所管津液並滲於目為泣呿者泣出之時引氣張口也平按肺葉舉舉靈樞作肺舉肺舉夫心系舉肺舉字靈樞作與甲乙作急靈樞呿作咳甲乙同泣出甲乙作涎出中熱則胃中消穀谷消則蟲上下作腸胃充郭故緩緩則氣逆故唾出蟲者三蟲也郭者胸臆也谷消之時則蟲動上下腸胃寬充郭中故腸胃緩而氣上所以唾也平按故緩靈樞甲乙作故胃緩五穀之津液和合而為膏者內滲入於骨空補益腦髓而下流於陰平按陰靈樞甲乙作陰股陰陽不和使則液溢而下流於陰髓液皆減而下下過度則虛虛故骨脊痛而胻痠補益腦髓者谷之津液和合為膏滲入頭骨空中補益於腦滲入諸骨空中補益於髓下流陰中補益於精若陰陽過度不得以理和使則精液溢下於陰以其分減髓液過多故虛而腰痛及腳胻痠也平按靈樞甲乙使則作則使陰陽氣道不通四海閉塞三焦不瀉津液不化水穀並於腸胃之中別於回腸留於下焦不得滲膀胱則下焦脹水溢則為水脹臟腑陰陽不得和通則四海閉而不流三焦壅而不瀉其氣不得化為津液水穀並於腸胃不消別於回腸而留下焦不得入於膀胱脹於下焦溢入於身故為水脹也平按並於靈樞作並行此津液五別之順逆此上五別是為津液順逆之義平按順逆靈樞作逆順也水論平按此篇自篇首至末見素問卷二十四第八十一解精微論篇自曰請問哭泣而淚不出者至末見甲乙經卷十二第一黃帝坐明堂雷公曰臣受業傳之以教皆以經論從容形法陰陽刺灸湯液藥滋所行治有賢不肖未必能十全謹聞命矣天地之間四方上下六合宇間有神明居中以明造化故號明堂法天地為室聖明居中以明道教稱為明堂從容者詳審貌也所受太素經論攝生安形詳審之法是謂陰陽刺灸湯液藥滋四種之術莫不要妙然不肖行之不能十全謹受詔命雷公言已領解之平按素問坐作在以教作行教教下無皆字湯下無液字滋所作所滋無謹聞命矣四字注不肖上原缺一字袁刻作有黃帝曰若先言悲哀喜怒燥濕寒暑陰陽婦女若汝也先所言人悲哀等事請問所由者貧富賤貴及諸群下通使臨事之徒使之適於道術聞其命平按素問無黃帝曰三字請問其所以然者卑賤富貴人之形體所從群下通使臨事以適道術謹聞命矣請問其有俯愚僕偏之問不在經者敢問其狀雷公問有偃仆偏問雖合於道然不在經者欲知其狀也平按素問俯作毚偏作漏敢問作欲聞新校正云全元起本僕作朴黃帝曰大矣僕偏所問之義大矣也曰請問哭泣而淚不出者若出而少涕其故何也泣從目下涕自鼻出間為一液也故人哭之時涕泣交連然有哭而無泣縱有泣涕少何也涕洟也平按素問曰作公注縱有泣袁刻有字誤作少黃帝曰在經是此在經已陳之義非僕偏之問也平按素問作在經有也又復問曰不知水所從生涕所從出水者泣也請問涕泣何所從生也平按素問無又曰二字黃帝曰若問此者無益於治工之所知道之所生也若汝也汝之問者無益於人仁義教有益於身道德之道故斯二者道之生也夫心者五臟專精也目者其竅也華色者其榮也是以人有得也則氣知於目有亡也憂知於色是以悲哀則泣下泣下水所由生心為五臟身之總主故為專精目為心之通竅華色為心之榮顯故有得通於心者氣見於目睹目可知其人喜也有亡於己者氣見於色視色可見其人憂也心哀悲者泣下水生也平按得素問作德新校正云太素德作得水宗者精水者至陰至陰者腎之精也宗精之水所由不出者是精持之也輔裹之故水不行也宗本也水之本是腎之精至陰者也則知人之哭泣不出者是至陰本精輔裹持之故不得出之矣平按水宗者甲乙作重精者精水者素問甲乙作積水也積水者六字所由素問甲乙作所以輔下素問甲乙有之字夫水之精為志火之精為神是以目之水不生也水陰精者志也火陰精者神也兩精持之故泣不下也平按夫下甲乙有氣之傳也四字神下素問甲乙有水火相感神志俱悲八字生上無不字故以人彥言曰心悲名志悲心與精共湊目也是以俱悲則神氣傳於心精上不傳於志也而志獨悲故泣出也彥美言也人之美言有當故取以為信也彥言心悲名曰志悲有所以也良以心與精在於目俱為悲者神氣傳於心精不傳於志亦無神持故陰精獨用為悲所以泣水下也平按素問甲乙故以人彥言曰作故諺言曰名下有曰字心與精作志與心精湊下有於字涕泣之者腦腦者陽也髓者骨之充也故腦深為涕故夫志者骨之主也是以水流涕從之者行其類也夫涕之與泣也譬如人之兄弟也急則俱死出則俱亡其志以搖悲是以涕泣俱出而橫行是故涕泣俱出相從志所屬之類也夫涕泣之出本於腦也頭髓為陽充骨之陰也志為骨主腦深為涕涕之與泣同為水類故泣之水出涕即從之比之兄弟有急有出死生是同相隨不離涕泣亦爾志動而悲則涕泣橫之也平按陽也素問作陰也新校正云甲乙經太素陰作陽深素問甲乙作滲行其類也素問作其行類也出則俱亡素問甲乙作生則俱生素問新校正云太素生則俱生作出則俱亡搖悲素問甲乙作早悲相從志素問甲乙作相從者雷公曰大矣請問人哭泣而泣不出者若出而少涕不從何也贊帝所言並重問前哭涕泣之事黃帝曰夫泣不下者哭不悲也不泣者神不慈志不悲陰陽相持泣安能獨來神者為陽志者為陰神之失守故慈志之失守故悲悲故泣出今陰陽相持無失泣安從生也平按不下素問甲乙作不出神不慈下素問甲乙有也神不慈則五字且夫志悲者惋則沖陰沖陰則志去目志去目則神不守精精神去目涕泣出也沖虛也志悲既甚即虛於陰陰虛則志亡志亡去目則可神次守精今神亦去目故涕泣俱出平按甲乙素問惋下重一惋字精神精字原抄作兩點乃上精字重文袁刻誤作二謹依素問甲乙作精注則可神次守精疑有誤袁刻可作不別本作則神不守精且子獨不誦念夫經言乎厥則目無所見夫人厥則陽氣並於上陰氣並於下陽並於上則火獨光陰並於下則手足寒手足寒則脹夫一水不勝兩火故目眥而盲厥逆也人氣逆者陽氣並陰歸上於頭陰氣並陽歸下手足歸下手足則手足冷歸上於頭遂至目盲以其目是陽已是一火下陽並上則是二火志精在目則是一水一水不勝二火故熱盛爭而盲也平按素問甲乙手足寒作足寒兩火作五火故目眥而盲素問無而字甲乙作故目盲是以衛氣之風泣下而止是衛氣將於邪風至目遂令泣下風乃止也平按衛氣之風素問甲乙作氣衝風三字而止作而不止夫風之中目陽氣下守於精是火氣循目也故見風則泣出有以比之天之疾風乃能雨此其類風者陽也火也風之守精是火循目陽氣動陰陰作泣出比天疾風其雨必降之也平按甲乙素問下守作內守循目作燔目天之疾風素問作夫火疾生風新校正云太素作天之疾風乃能雨無生字與此正同甲乙作夫疾風生其類作之類脹論平按此篇自篇首至惡有不下者乎見靈樞卷六第三十五脹論篇又見甲乙經卷八第三自黃帝問於岐伯曰水與膚脹至亦刺去其血脈黃帝曰善見靈樞卷九第五十七水脹篇又見甲乙經卷八第四自黃帝問於岐伯曰有病心腹滿至末見素問卷十一第四十腹中論篇甲乙經見同上黃帝曰脈之應於寸口何如而脹岐伯曰其至大堅以澀者脹脈之大者多血少氣澀者亦多血少氣微寒脈口盛緊傷於飲食以其脈至診有多血少氣微寒即是傷於飲食為脹也平按靈樞其至作其脈甲乙堅下有直字黃帝曰何以知腑臟之脹也岐伯曰陰為臟而陽為腑診得陰脈脹者以為臟脹診得陽脈脹以為腑脹也黃帝曰夫氣之令人脹也在於血脹之中耶腑臟之內乎血脈謂二十八脈也問脹所在也岐伯曰二者皆存焉然非脹之舍也衛氣並脈而行循分肉之間為脹血脈及五臟六腑各脹故曰二者存焉然非脹之所舍之處也平按靈樞二作三注云一作二黃帝曰願聞脹舍岐伯曰夫脹者皆在於腑臟之外排臟腑而郭胸脅脹皮膚故命曰脹以下言其脹舍取之臟腑之外胸脅及皮膚之間氣在其中郭而排之故命曰脹黃帝曰臟腑之在胸脅腹裹之內也若匣匱之藏禁器也各有次舍異名而同處一城之中其氣各異願聞其故以下臟腑居處也禁器比臟腑也胸脅腹裹比之匣匱也次舍者五臟六腑各有居處也臟腑之名雖異同在一郭之中然臟腑俱別請聞同異所由平按甲乙無胸脅腹裹之五字城作域靈樞同其故下有黃帝曰未解其意再問九字岐伯曰夫胸腹者臟腑之城郭也城郭臟腑所處也平按靈樞無城字膻中者主之官也膻中有心肺之氣故是臟腑之官也平按靈樞主之官作心主之宮城甲乙作心主之中宮胃者大倉也胃貯水穀以供故為臟腑大倉也咽喉小腸者傳道也咽傳水穀而入小腸傳之而出喉傳氣之出入故為傳道也平按靈樞道作送胃之五竅者閭里門戶也咽胃大腸小腸膀胱等竅皆屬於胃故是臟腑閭里門戶也廉泉玉英者津液之道也故五臟六腑各有畔界其病各有形狀廉泉乃是涎唾之道玉英復為溲便之路故名津液道也此則臟腑畔界故臟腑病形各異平按甲乙道下有路字營氣循脈為脈脹衛氣並脈循分為膚脹三里而瀉近者一下遠者三下毋問虛實工在疾瀉以下謂營衛二氣為脹營氣循脈周於腹郭為脹名為脈脹衛氣在於脈外旁脈循於分肉之間聚氣排於分肉為腫稱為膚脹三里以為脹之要穴故不問虛實皆須瀉之其病日近者可以針一瀉其日遠者可三瀉之下者脹消也終須疾瀉可不致疑矣平按靈樞營氣循脈下有衛氣逆三字衛氣並脈循分甲乙作衛氣並血脈循分肉三里而瀉甲乙作取三里瀉之一下下字甲乙注云一本作分下同黃帝曰願聞脹形願聞五臟六腑脹形也岐伯曰夫心脹者煩心短氣臥不安平按甲乙安上有得字肺脹者虛滿而喘咳肝脹者脅下滿而痛引少腹脾脹者喜噦四肢急體重不能衣腎脹者腹滿引背怏然腰髀痛氣在臟腑之外排臟腑郭胸脅脹皮膚時煩心短氣臥不安者以為心脹知此五臟六腑脹皆放此各從其臟腑所由脹狀有異耳怏不暢也平按靈樞少腹作小腹喜噦作善噦甲乙作苦噦四肢急靈樞作四肢煩悗甲乙作四肢悶靈樞衣上有勝字怏然靈樞作央央然六腑脹者胃脹腹滿胃管痛鼻聞焦臭妨於食大便難大腸脹者腸鳴而痛濯濯腸中水聲也平按靈樞甲乙胃管作胃脘冬日重感於寒則泄食不化小腸脹者少腹䐜脹引腰而痛膀胱脹者少腹滿而氣癃三焦脹者氣滿於皮膚中殼殼然而不堅膽脹者脅下痛脹口中苦好太息香為脾臭焦為心臭今脾胃之病聞焦臭者以其子病思聞母氣故也殼口角反殼殼貌今殼殼似實而不堅也平按泄食靈樞作飧泄甲乙作泄飧少腹滿靈樞甲乙作小腹滿殼殼靈樞作輕輕好太息作善太息凡此諸脹其道在一明知逆順針數不失一者唯知補瀉也補虛瀉實得中故不失也瀉虛補實神去其室致邪失正真不可定粗之所敗謂之夭命神室心臟也補實瀉虛傷神故神去心室神去心室得於邪氣失其四時正氣致使真僞莫定也補虛瀉實神歸其室久塞其空謂之良工神安其臟故曰歸室神得歸臟自斯已去長閉腠理不令邪入謂上工也黃帝曰脹者焉生何因而有名平按靈樞無名字岐伯曰衛氣之在身也常並脈循分行有逆順陰陽相隨乃得天和衛氣並脈循於分肉有逆有順從目循足三陽下為順從目循手三陽下為逆以衛行有逆順故陰陽氣得和而順也平按靈樞常下有然字甲乙分下有肉字靈樞同五臟更治四時有序五穀乃化然後厥氣在下營衛留止寒氣逆上真邪相攻兩氣相薄乃合為脹五臟屬於五行故五臟更王四時寒暑次序得所五穀入腹得有變化也有寒厥之氣留於營衛之間營衛不行寒氣逆上與正氣相薄交爭憤起謂之為脹平按更治靈樞作更始甲乙作皆治有序靈樞作循敘甲乙作皆敘薄靈樞作搏甲乙乃合為脹作乃舍為脹黃帝曰善何以解惑岐伯曰合之於真三合而得黃帝曰善行補瀉時近者一取合於真氣即得病愈遠者三取合於真氣稱曰解惑之也黃帝問岐伯曰脹論言曰毋問虛實工在疾瀉近者一下遠者三下今有其三而不下其過焉在前言瀉虛補實神去其室今言無問虛實工在疾瀉其故何也所謂初病未是大虛復取三里故工在疾瀉若虛已成又取余穴虛者不可也今至三取不消請言過之所由也岐伯曰此言陷於肉肓而中氣穴者也肉肓者皮下肉上之膜也量與肌膚同類氣穴謂是發脹脈氣所發穴也不中氣穴則氣內閉針其餘處不中脹之氣穴則脹不泄也平按注針袁刻誤作計針不陷肓則氣不行不陷肓膜則氣不行分肉間也不越中肉則衛氣相亂陰陽相遂其於脹也當瀉不瀉氣故不下三而不下必更其道氣下乃止不下復始可以萬全惡有殆者乎針入其皮起而不下其肉則衛氣行而失次陰陽之氣並也遂並也由於當瀉不瀉故三取不下也必須更取余穴以行補瀉以脹消為工故得萬全必無危生之禍也平按不越靈樞甲乙作上越相遂靈樞作相逐甲乙作相逆其於脹也必審其診當瀉則瀉當補則補如鼓之應桴惡有不下者乎言診審者如鼓應桴何有不當者也平按診靈樞作𦙳注音軫黃帝問於岐伯曰水與膚脹鼓脹腸覃石瘕石水何以別此之六病有難分者故請別之也平按甲乙無石水二字靈樞甲乙別下有之字岐伯曰水始起也目果上微癕如臥新起之狀頸脈動時咳陰股間寒足胻癕腹乃大其水已成也以手按其腹隨手而起如裹水之狀此其候也水病之狀候有六別一者目果微腫二者足陽明人迎之脈視見其動不待按之三者脹氣循足少陰脈上衝於肺故時有咳四者陰下陰股間冷五者腳胻腫起六者腹如囊盛水狀按之不堅去手即起此之六種水病候也平按靈樞甲乙目果作目窠微癕作微腫足胻癕靈樞作足脛瘇甲乙作足脛腫注視袁刻作眼黃帝曰膚脹何以候之岐伯曰膚脹者寒氣客於皮膚之間殼殼然不堅腹大身盡腫皮厚按其腹窅而不起腹色不變此其候也次解膚脹凡有五別一者寒氣循於衛氣客於皮膚之間二者為腫不堅三者腹大身腫四者皮厚按之不起窅焉了反深也五者腹色不變膚脹所由與候有斯五別也平按殼殼然靈樞作𪔣𪔣然窅甲乙作腹陷二字鼓脹何如岐伯曰腹身皆大大與膚脹等也色蒼黃腹脈起此其候也次解鼓脹凡有六別所由及候四種同於膚脹五者腹色青黃六者腹上脈絡見出鼓脹之候有此六別也平按腹身皆大靈樞作腹脹身皆大甲乙作腹身皆腫靈樞甲乙倉作蒼脈起作筋起甲乙注云一本作脈腸覃何如岐伯曰寒氣客於腸外與衛氣相薄氣不得營因其所繫瘕而內著惡氣乃起息肉乃生其始也大如雞卵稍以益大至其成也如懷子之狀久者離歲按之則堅推之則移月事以時此其候也次解腸覃水停聚也腸覃凡有六別一者得之所由謂寒客於腸外與衛氣合瘕而為內二者所生形之大小三者成病久近離歷也久者或可歷於年歲四者按之堅硬五者推之可移六者月經時下腸覃所由與狀有斯六種也平按靈樞甲乙相薄作相搏氣不得營甲乙作正氣不得營靈樞營作榮瘕作癖息肉作瘜肉甲乙離歲作離歲月石瘕何如岐伯曰石瘕生於胞中寒氣客於子門子門閉塞氣不通惡血當瀉不瀉衃以留止日以益大狀如懷子月事不以時下次解石瘕凡有四別一者瘕住所在二者得之所由謂寒氣客子門之中惡血凝聚不瀉所致三者石瘕大小形四者月經不以時下石瘕所由與狀有斯四種石水一種缺而不解也平按氣不通靈樞作氣不得通皆生於女子可導而下黃帝曰膚脹鼓脹可刺耶岐伯曰先刺其腹之血絡後調其經亦刺去其血脈黃帝曰善腸覃石瘕二病皆婦人病也水病刺而去之腸覃石瘕可以針刺導而下之未知膚鼓二脹可刺已不先瀉其血絡以去惡血後調其經亦去血絡也平按靈樞腹之血絡作脹之血絡去其血脈作去其血絡黃帝問於岐伯曰有病心腹滿旦食則不能暮食此為何病岐伯曰名為鼓脹曰治之奈何曰治之以雞醴一齊知二齊而已黃帝曰其時有復發者何也岐伯曰此飲食不節故時痛雖然其病且已時當痛氣聚於腹氣滿心腹故旦食暮不能也是名鼓脹可取雞糞作丸熬令煙盛以清酒一斗半沃之承取汁名曰雞醴飲取汗一齊不愈至於二齊非直獨療鼓脹膚脹亦愈有復發者以不慎節飲食故也平按鼓脹素問新校正云太素鼓作谷茲本仍作鼓注同素問甲乙雞醴作雞矢醴齊作劑故時痛作故時有病也時當痛素問作時故當病甲乙作因當風注取汗袁刻作取汁風水論平按此篇自篇首至故月事不來黃帝曰善哉見素問卷九第三十三評熱病論篇自黃帝問於岐伯曰有病龐然至末見素問卷十三第四十七奇病論篇又自篇首至末見甲乙經卷八第五黃帝曰有病腎風者面胕龐然壅害於言可刺不胕扶付反義當腐也龐普江反腎氣損腐令面龐然起壅也而言無聲故曰害言此為腎風之狀可刺以不也平按龐素問甲乙作痝甲乙壅上有腫字注云素問無腫字不甲乙作否岐伯曰虛虛不當刺而刺後五日其氣必至如此狀者腎風之狀腎之重虛之風不可刺也刺之至其水數滿日其病氣當至也除刺之日後取五日合有六日水成數也平按素問甲乙虛虛不當刺而刺作虛不當刺不當刺而刺問曰何如平按素問甲乙作其至何如答曰至必少氣時熱從胸背上至頭汗手熱口乾苦渴不能正偃正偃則咳病名曰風水腎風病氣至者凡有八候一者少氣二時熱三從胸至頭汗出四手熱五口熱六苦渴七不能正偃謂不能仰臥仰臥即咳有此八候候是腎風水病也平按素問時熱下重時熱二字甲乙時下無熱字汗下素問甲乙有出字苦渴下素問有小便黃目下腫腹中鳴身重難以行月事不來煩而不能食二十三字甲乙同惟行上少以字食下重食字袁刻補入正經據本注不應補入仍從原抄為是黃帝曰願聞其說岐伯曰邪之所湊其氣必虛陰虛者陽必湊之故小便黃者中有熱邪湊虛腎氣虛也腎氣既虛則陽氣並之故中有熱小便黃也平按小便黃者中有熱素問作少氣時熱而汗出也小便黃者少腹中有熱也甲乙作少氣時熱而汗出小便黃小便黃者少腹氣熱也不能正偃者胃中不和也正偃則咳甚上迫肺也腎有虛風即胃中不和仰臥氣上迫肺故咳也諸有水氣者其徵見於目下何以言曰水者陰也目下亦陰也腹者至陰之所居也故水在腹者必使目下腫水與目下及腹皆陰故水在腹即目下腫也平按素問甲乙其徵作微腫何以上素問有帝曰二字甲乙有曰字真氣上逆口苦舌乾者故不得正偃正偃則咳清水以水在腹故真氣上逆口苦舌乾正偃則咳咳則吐清水也平按素問甲乙逆下有故字干下無者故二字有臥字咳下有出字諸水病者故不得臥臥則驚驚則咳甚又諸水病仰臥驚則咳甚復為候也平按注復袁刻誤作腹腹中鳴者月事不來病本於胃也薄肝則煩不能食食不下者胃管隔月事不來之病由於胃氣不和故氣薄於肝煩不能食致使胃管隔塞腹中無食故腹鳴也平按素問甲乙無月事不來四字甲乙病作脾素問甲乙薄肝作薄脾胃管作胃脘身重難以行者胃脈在足也胃脈足陽明在足今胃氣不和氣下於足遂令身重足不能行也月事不來者胞脈閉肺屬心而溢於胞中令氣上迫肺心臟不得下通故月事不來黃帝曰善哉胞者任沖之脈起於胞中為經絡海故曰胞脈也膀胱之胞與女子子門之間起此衝脈上至咽喉先過心肺但肺與心共相系屬今胞脈虛邪閉塞下則溢於胞氣上則迫於肺氣不得下故月事不來也平按肺屬心而溢於胞中素問甲乙作胞脈者屬心而絡於胞中令作今心臟作心氣黃帝問於岐伯曰有病龐然如有水氣狀切其脈大緊身無痛者形不瘦不能食食少名為何病岐伯曰病生在腎名為腎風腎風而不能食喜驚驚以心痿者死黃帝曰善哉龐然者麵皮起之貌腎風之狀凡有六別一面龐起二脈大緊三身無痛四形不瘦五食少六喜驚人有此六狀名曰腎風心不痿者可療得生痿者死矣平按如有水氣狀素問無氣字生甲乙作主喜素問甲乙作善驚以素問作驚已甲乙作不已心痿素問甲乙作心氣痿袁刻痿作委咳論平按此篇自篇首至末見素問卷十第三十八咳論篇又見甲乙經卷九第三黃帝問於岐伯曰肺之令人咳何也岐伯曰五臟六腑皆令人咳非獨肺也五臟六腑皆以肺傳與之稱咳為肺咳然臟腑皆有咳也黃帝曰願聞其狀岐伯曰皮毛者肺之合也毛先受邪氣從其合其寒飲食飲食入胃順肺脈上注於肺肺寒外內合邪因而客之為肺咳肺合皮毛故皮毛受於寒邪內合於肺人肺脈手太陰起胃中焦下絡大腸還循胃口上膈肺寒飲寒食入胃寒氣循肺脈上入肺中內外寒邪相合肺以惡寒遂發肺咳之病也平按素問甲乙毛先受邪氣從其合作皮毛先受邪氣邪氣以從其合飲食二字不重順肺脈作從肺脈上注於肺作上至於肺肺寒外內合作則肺寒肺寒則外內合為上缺一字素問甲乙作則袁刻作發注膈下缺一字袁刻作故不合平擬據經文作注字與肺字屬上讀五臟各以其時受病非其時各傳以與之五臟各以王時傷寒肺先受之傳為五臟之咳非其時者又因他臟受寒傳來與之故肺咳之病傳與餘臟稱五臟咳也人與天地相參故臟各治時感於寒則受病微則為咳甚則為泄為痛各以時者五臟各以王時也感於寒者感傷寒也感傷寒病有輕有重輕者為咳重者以為泄及痛痹也平按故臟各治時素問甲乙作故五臟各以治時黃帝曰五臟之咳奈何岐伯曰五臟之久咳乃移於腑以下言肺咳相傳為臟腑咳也五臟之咳近者未虛久者傳為六腑咳也平按素問甲乙無此一段五臟之久咳二句在後脾咳不已上肺先受邪乘春則肝先受之乘夏則心受之乘至陰則脾受之乘冬則腎受之肺以惡寒肺先受寒乘春肝王時肝受即為肝咳若肺先受寒乘於至陰即為脾咳若肺先受寒乘冬即為腎咳平按素問肺先受邪上有乘秋則三字新校正云按全元起本及太素無乘秋則三字疑此文誤多也黃帝曰何以異之以下言問答五臟咳狀也岐伯曰肺咳之狀咳而喘息有音甚則唾血言肺咳狀也心咳之狀咳則心痛喉中介介如哽狀甚則咽喉腫介介喉中氣如哽也平按甲乙介介作喝喝哽素問甲乙作梗咽喉腫素問甲乙作咽腫喉痹肝咳之狀咳則兩胠下痛甚則不可以轉兩胠下以滿脾咳之狀咳則在右脅下痛引肩背甚則不可以動動則咳胠有本作脅也平按兩胠下痛甲乙作胠痛素問作兩脅下痛兩胠下以滿素問作轉則兩胠下滿甲乙胠作脅引肩上素問甲乙有陰陰二字則咳下素問有劇字腎咳之狀咳則腰背相引而痛甚則咳演音涎腎液也謂咳涎出之也平按演素問甲乙作涎黃帝曰六腑之咳奈何安所受病岐伯曰脾咳不已則胃受之胃咳之狀咳而歐歐甚則長蟲出以下問答言六腑咳狀六腑之咳皆臟咳日久移入於腑以為腑咳腑不為咳移入臟者以皮膚受寒內至於肺肺中外寒兩邪為咳移於五臟然後外至於腑故不從腑移入於臟所以脾咳日久移為胃咳長蟲蛔蟲也平按素問甲乙脾咳不已上有五臟之久咳乃移於六腑二句肝咳不已則膽受之膽咳之狀歐歐膽汁歐膽汁者咳引於膽故歐膽口苦也平按歐歐膽汁素問甲乙作咳嘔膽汁肺咳不已則大腸受之大腸咳之狀咳而遺矢遺矢者咳引大腸故遺矢也平按矢素問作失新校正云甲乙遺失作遺矢心咳不已則小腸受之小腸咳之狀咳而氣氣者與咳俱出小腸在上咳引小腸故氣與咳俱發者也平按咳而氣氣者與咳俱出素問甲乙作咳而失氣氣與咳俱失腎咳不已則膀胱受之膀胱咳之狀咳而遺溺咳動膀胱故尿出也平按甲乙遺溺作遺尿久咳不已三焦受之三焦咳之狀咳腹滿不欲食飲三焦無別屬臟與膀胱合故膀胱之咳久而不已腹病滿不欲食也此皆聚於胃管關於肺使人多涕唾而面浮腫氣逆此六腑咳皆以氣聚胃中上關於肺致使面壅浮腫氣逆為咳也平按素問甲乙胃下無管字黃帝曰治之奈何岐伯曰治臟者治其輸治腑者治其合浮腫者治其經黃帝曰善療五臟咳宜療臟經第三輸也療六腑咳者宜療臟經第六合也有浮腫者不可治絡宜療經穴也平按輸素問甲乙作俞
