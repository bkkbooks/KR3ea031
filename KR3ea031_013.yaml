body:
  text: 卷第十三身度經筋平按此篇自篇首至末見靈樞卷四第十三經筋篇又見甲乙經卷二第六經筋篇足太陽之筋起於小指之上結於踝邪上結於膝其下者循足外側結於踵上循根結於膕其別者結於腨外上膕中內廉與膕中並上結於臀上俠脊上項其支者別入結於舌本其直者結於枕骨上頭下顏結於鼻其支者為目上綱下結於鼽其下支者從掖後外廉結於肩髃其支者入掖下上出缺盆上結於完骨其支者出缺盆邪上出於鼽十二經筋與十二經脈俱稟三陰三陽行於手足故分為十二但十二經脈主於血氣內營五臟六腑外營頭身四肢十二經筋內行胸腹郭中不入五臟六腑脈有經脈絡脈筋有大筋小筋膜筋十二經筋起處與十二經脈流注並起於四末然所起處有同有別其有起維筋緩筋等皆是大筋別名凡十二筋起處結處及循結之處皆撰為圖畫示人上具如別傳小指上謂足指表上也結曲也筋行回曲之處謂之結結經脈有卻筋有結也顏眉上也下結於鼽鼽中出氣之孔謂之鼻也鼻形謂之鼽也平按小指上靈樞甲乙有足字邪甲乙作斜俠靈樞作挾顏甲乙作額鼽靈樞作頄出於鼽甲乙作入於鼽注俱稟袁刻誤作同稟膜筋袁刻誤作䐜筋其病小指支跟踵痛膕攣脊反折項筋急肩不舉掖支缺盆紉痛不可左右搖紉女巾反謂轉展痛也平按攣下甲乙有急字紉靈樞甲乙均作紐治在燔針劫刺病脈言針灸之言筋病但言燔針者但針灸湯藥之道多通療百病然所便非無偏用之要也以知為數所以惟知病瘥為針度數如病筋痛一度劫刺不瘥可三四度量其病瘥為數也以痛為輸輸謂孔穴也言筋但以筋之所痛之處即為孔穴不必要須依諸輸也以筋為陰陽氣之所資中無有空不得通於陰陽之氣上下往來然邪入腠襲筋為病不能移輸遂以病居痛處為輸故曰筋者無陰無陽無左無右以候痛也明堂依穴療筋病者此乃依脈引筋氣也名曰仲春痹聖人南面而立上覆於天下載於地總法於道造化萬物故人法四大而生所以人身俱應四大故正月即是少陽以陽始起故曰少陽六月少陽以陽衰少故曰少陽二月大陽以其陽大故曰大陽五月大陽以陽正大故曰大陽三月四月陽明二陽相合故曰陽明十二經筋感寒濕風三種之氣所生諸病皆曰筋痹筋痹燔針為當故偏用之餘脈肉皮筋等痹所宜各異也足少陽之筋起於小指次指之上上結外踝上循胻外廉結於膝外廉其支者起於外輔骨上走髀前者結於伏兔之上後者結於尻其支者起外輔骨凡有二支也故前支上結伏兔後支上走髀結於尻前也平按次指下靈樞無之上二字胻作脛伏兔下甲乙無之上二字其直者上䏚乘季脅上走掖前廉繫於膺乳結於缺盆䏚季脅下也以沼反平按䏚乘靈樞甲乙作乘䏚其直者上出掖貫缺盆出太陽之前循耳後上額角交巔上下走頷上結於鼽其支者結目外眥為外維其病足小指次指支轉筋引膝外轉筋膝不可屈伸膕中筋急前引髀後引尻上乘䏚季脅痛上引缺盆膺乳頸外維太陽為目上綱陽明為目下綱少陽為目外維平按靈樞鼽作頄結目外眥作結於外眥小指上無足字甲乙同膕中靈樞甲乙無中字維筋急從左之右右目不可開此筋本起於足至項上而交至左右目故左箱有病引右箱目不得開右箱有病引左箱目不得開也上過右角並喬脈而行左絡於右故傷左角右足不用命曰維筋相交治在燔針劫刺以知為數以痛為輸名曰孟春痹喬脈至於目眥故此筋交巔左右下於目眥與之並行也筋既交於左右故傷左額角右足不用傷右額角左足不用以此維筋相交故也足陽明之筋起於中三指結於跗上邪外上加於輔骨上結於膝外廉直上結於髀樞上循脅屬脊刺瘧者刺足陽明十指間是知足陽明脈入於中指內間外間脈氣三指俱有故筋起於中指並中指左右二指故曰中三指也有本無三字髖骨如臼髀骨如樞髀轉於中故曰髀樞也其直者上循䯒結於膝其支者結於外輔骨合於少陽直者上循伏兔上結於髀聚於陰器上腹而布至缺盆結布謂分布也平按䯒靈樞甲乙作骭至缺盆結靈樞甲乙作至缺盆而結上頸上俠口合於鼽下結於鼻上合於太陽為目上綱陽明則為目下綱其支者從頰結於耳前太陽為目上綱故得上眥動也陽明為目下綱故得下眥動也其病足中指支䯒轉筋腳跳堅伏兔轉筋髀前腫頽疝腹筋急引缺盆頰口卒噼急者目不合熱則筋施縱目不開寒則目綱上下拘急故開不得合也熱則上下緩縱故合不得開噼音僻平按䯒靈樞作脛甲乙同頽靈樞作㿉腹筋急甲乙作腹筋乃急頰口靈樞甲乙作及頰卒噼作卒口僻靈樞縱上無施字噼袁刻作僻下同據原本更正頰筋有寒則急引頰移口有熱則筋施縱緩不勝故噼足陽明筋挾口過頰故曰頰筋移謂引口離常處也不勝謂熱不勝其寒所以緩口移去故喎噼也平按緩不勝靈樞甲乙作不勝收治之以馬膏膏其急者以白酒和桂以塗其緩者馬為金畜剋木筋也故馬膏療筋急病也桂酒泄熱故可療緩筋也以桑鉤鉤之即以生桑炭置之坎中高下與坐等以膏尉急頰且飲美酒噉美炙不飲酒者自強也為之三拊而已治在燔針劫刺以知為數以痛為輸名曰季春痹以新桑木粗細如指以繩系之拘其緩箱挽急箱仍於壁上為坎令與坐等坎中生桑炭火以馬膏塗其急箱猶須飲酒噉炙和其寒溫如此摩拊飲噉為之至三自得中平噉徒敢反拊摩也音撫平按炭靈樞甲乙作灰噉甲乙作啖美炙靈樞作美炙肉甲乙作炙肉注粗袁刻作銼足太陰之筋起於大指之端內側上結於內踝其直者上結於膝內輔骨膝內下小骨輔大骨者長三寸半名為內輔骨也平按上結於膝靈樞甲乙作上絡於膝上循陰股結於髀聚於陰器陰器宗筋所聚也上腹結於齊循腹裡結於脅散於胸中其內者著於脊循腹裡即彆著脊也平按脅靈樞作肋其病足大趾支內踝痛轉筋痛膝內輔痛陰股引髀而痛陰器紉痛上引齊與兩脅痛引膺中與脊內痛治在燔針劫刺以知為數以痛為輸名曰仲秋痹七月足之少陰始起故曰少陰十二月手之少陰以其陰衰故曰少陰八月足之大陰以其陰大故曰大陰十一月手之大陰以其陰正大故曰大陰九月足之厥陰十月手之厥陰交盡故曰厥陰八月之筋感三氣之病名曰筋痹有本以足大陰為孟春足少陰為仲秋誤耳平按內輔下靈樞甲乙有骨字紉均作紐上引齊與兩脅痛甲乙作上臍兩筋痛仲秋靈樞作孟秋甲乙同本注孟春恐系孟秋傳寫之誤足少陰之筋起於小指之下並太陰之筋邪走內踝之下結於踝與足太陰之筋合而上結於內輔之下平按並上甲乙有入足心三字並下靈樞有足字結於踝靈樞甲乙踝作踵足太陰均作太陽並太陰之筋而上循陰股結於陰器循脊內俠膂上至項結於枕骨與足太陽之筋合其病足下轉筋及所過而結者皆痛及轉筋病在此者主癇痸及痓在外者不能俯在內者不能仰故陽病者腰反折不能俯陰病者不能仰痸充曳反痓擎井反身強急也在此謂在足少陰也在小兒稱癇在大人多稱癲背為外為陽也腹為內為陰也故病在背筋筋急故不得低頭也病在腹筋筋急不得仰身也平按循脊內俠膂甲乙作循膂內俠脊痸醫統本靈樞作瘛道藏本靈樞作瘈甲乙同痓靈樞作痙治在燔針劫刺以知為數以痛為輸在內者尉引飲藥痛在皮膚筋骨外者可療以燔針病在腹胸內者宜用尉法及道引並飲湯液藥等也此筋折紉發數甚者死不治名曰孟秋痹其筋轉痛輕而可為燔針若折曲紉發之甚死而不療也平按靈樞甲乙紉均作紐紐二字孟秋均作仲秋發袁刻誤作緩足厥陰之筋起於大指之上上結於內踝之前上循脛上結於內輔之下上循陰股結於陰器結絡諸筋足三陰及足陽明筋皆聚陰器足厥陰屈絡諸陰故陰器名曰宗筋也平按上循脛甲乙作上衝胻結絡諸筋靈樞無絡字筋甲乙作經其病足大趾支內踝之前痛內輔痛陰股痛轉筋陰器不用傷於內則不起傷於寒則陰縮入傷於熱則縱挺不收治在行水清陰氣其病筋者燔針劫刺以知為數以痛為輔名曰季秋痹婦人挺長為病丈夫挺不收為病陰氣即丈夫陰氣謂陽氣虛也陽氣虛故縮或不收得陰即愈平按陰氣甲乙作陰器其病筋者靈樞甲乙病下有轉字燔上均有治則二字手太陽之筋起於小指之上上結於腕上循臂內廉結於肘內兌骨之後彈之應於小指之上上入結於掖下手小指表名上肘兌謂肘內箱尖骨名曰兌骨應引也其支者後走掖後廉上繞肩甲循頸出足太陽之筋前結於耳後完骨其支者入耳中其直者出耳上下結於顑含感反平按後走掖後廉甲乙作從掖走後廉上繞肩甲作上繞臑外廉上肩胛顑靈樞甲乙均作頷上屬目外眥其病手小指支痛肘內兌骨後廉痛循臂陰入掖下掖下痛掖後廉痛繞肩肩甲引頸而痛應耳中鳴痛引頷目瞑良久乃能視臂臑肉為臂陰也瞑目閉也音眠平按支痛二字甲乙作及頸筋急則為筋痿頸腫寒熱在頸者治在燔針劫刺以知為數以痛為輸其為腫者傷而兌之其支者上曲耳循耳前屬目外眥上額結於角其病當所過者支轉筋治在燔針劫刺以知為數以痛為輸名曰仲夏痹筋痿此之謂也筋痿頸腫者皆是寒熱之氣也故療寒熱筋痿頸腫者可以針傷於兌骨後彈應小指之處兌之令盡兌尖鋭盡端也或為傷復也六月手之少陽正月足之少陽五月手之太陽二月足之太陽四月手之陽明三月足之陽明筋於此時感氣為病故曰仲夏等痹也平按頸筋急頸腫頸字袁刻作頭靈樞甲乙均作頸傷均作復上曲耳耳字靈樞作牙甲乙注同又注筋痿袁刻痿誤作瘻手少陽之筋起於小指次指之端結於腕上循臂結於肘上繞臑外廉上肩走頸合手太陽其支者當曲頰入系舌本其支者上曲耳循耳前屬目外眥上乘頜結於角其病當所過者支轉筋舌卷治在燔針劫刺以知為數以痛為輸名曰季夏痹曲頰在頰曲骨端足少陽筋循頸向曲頰後當曲頰入系舌本謂當風府下舌根後故風府一名舌本也平按腕上趙府本靈樞作腕中曲耳靈樞甲乙作曲牙頜均作頷其病袁刻誤作是病手陽明之筋起於大指次指之端結於捥上循臂上結於肘外上臑結於髃其支者繞肩甲俠脊直者從肩髃上頸其支者上頰結於鼽肩髃肩角也音隅又音偶也平按肘外甲乙無外字上臑作上繞臑肩甲靈樞甲乙均作肩胛鼽靈樞作頄其直者上出手太陽之前上左角絡頭下右顑其病當所過者支痛及轉筋肩不舉頸不可左右視治在燔針劫刺以知為數以痛為輸名曰孟夏痹其筋左右交絡故不得左右顧視今經不言上右角絡頭下左顑或可但言一邊也平按顑靈樞甲乙均作頷支下甲乙無痛及二字手太陰之筋起於大指之上循指上行結於魚後大指表名為上循手向胸為上行也平按魚下甲乙有際字行寸口外側上循臂結於肘中上臑內廉入掖下出缺盆結肩前髃上結缺盆並太陰脈行故在臑也肩端之骨名肩髃是則後骨之前即肩前髃也下絡胸裡散貫賁合賁下下抵季肋賁謂膈也筋雖不入臟腑仍散於膈也平按合賁下甲乙作合脅下下抵季肋靈樞作抵季脅其病當所過者支轉筋痛其成息賁者脅急吐血治在燔針劫刺以知為數以痛為輸息謂喘息肺之積名息賁在右脅下大如杯久不愈令人灑淅振寒熱喘咳發肺癰也平按其成息賁者靈樞甲乙作甚成息賁名曰仲冬痹十二月手之少陰七月足之少陰十一月手之太陰八月足之太陰十月手心主厥陰九月足厥陰筋於此時感氣為病名為仲冬痹也十二經脈足之三陰三陽配十二月手之三陰三陽配甲乙等數與此十二經筋不同良以陰陽之氣成物無方故耳手心主之筋起於中指與太陰之筋並行結於肘內廉上臂陰結掖下下散前後俠脅其支者入掖下散胸中結於賁結於膈也平按與太陰之筋並行甲乙作與太陽之經並行賁靈樞甲乙均作臂其病當所過者支轉筋及胸痛息賁治在燔針劫刺以知為數以痛為輸名曰孟冬痹當此筋所過之處為痹即是所行之筋為病也平按轉筋下靈樞有前字甲乙有痛手心主前五字手少陰之筋起於小指之內側結於兌骨上結肘內廉上入掖交太陰伏乳里結於胸中循賁兌骨謂掌後當小指下尖骨也交手太陰已伏於乳房之裡然後結於胸也平按靈樞甲乙伏乳作挾乳循賁作循臂下繫於齊其病內急心承伏梁下為肘綱其病當所過者則支轉筋筋痛治在燔針劫刺以知為數以痛為輸其成伏梁唾膿血者死不治心之積名曰伏梁起齊上如臂上至心下其筋循膈下齊在此痛下故曰承也人肘屈伸以此筋為綱維故曰肘綱也平按唾甲乙作吐經筋之病寒則筋急熱則施縱不收陰萎不用也凡十二經筋寒則急熱則縱不用之也平按寒則下靈樞有反折二字甲乙同陽急則反折陰急則俯不伸人背為陽腹為陰故在陽之筋急者反折也在陰之筋急則俯而不伸也淬刺者刺寒急熱則筋縱毋用燔針淬千內反謂燒針刺之也問曰熱病皆有行灸筋熱為病何以不用火針答曰皮肉受於熱病脈通而易故須行灸筋自受病通之為難寒熱自在於筋病以痛為輸不依余輸也平按縱下靈樞甲乙有不收二字針下甲乙有急刺二字名曰季冬痹經筋之病下總論十二經筋此之一句屬手少陰筋也足之陽明手之太陽筋急則口目為闢目眥急不能卒視治皆如上方檢手太陽有耳中鳴引頷目瞑之言無口目闢亦可引頷即口目闢也皆用前方寒急淬刺也平按闢靈樞作噼甲乙作僻眥上靈樞無目字骨度平按此篇自篇首至末見靈樞卷四第十四骨度篇又見甲乙經卷二第七骨度腸度腸胃所受篇黃帝問伯高曰脈度言脈之長短何以立之也脈度謂三陰三陽之脈所起之度但不知長短也平按言脈之長短靈樞甲乙作言經脈之長短伯高曰先度其骨節之小大廣狹長短而脈度定矣人之皮肉可肥瘦增減骨節之度不可延縮故欲定脈之長短先言骨度也黃帝問曰願聞衆人之度人長七尺五寸者其骨節之大小長短各幾何聖人賢人及無別與分者之外衆人之骨度量多同故請衆人之度及請中度之人大小長短也平按甲乙無願聞衆人之度六字各上有知字伯高答曰頭之大骨圍二尺六寸衆人之中又為三等七尺六寸以上名為大人七尺四寸以下名為小人七尺五寸名為中人今以中人為法則大人小人皆以為定何者取一合七尺五寸人身量之合有七十五分則七尺六寸以上大人亦準為七十五分七尺四寸以下乃至嬰兒亦準七十五分以此為定分立經脈長短並取空穴自頸項骨以上為頭顱骨以為頭大骨也當其粗處以繩圍也胸圍四尺五寸缺盆以下𩩲骬以上為胸當中圍也平按注𩩲原作髑當系𩩲字傳寫之誤查蔽心者為𩩲骬亦曰鳩尾臆前蔽骨也謹作𩩲別本作𩩲腰圍四尺二寸當二十一椎腰輸之中圍也發所覆者顱至項長尺二寸頭顱骨取發所覆之處前後量也平按所覆所字袁刻誤作至發以下至頤長一尺君子參折髮際以下至頤端量之一尺一尺面分中分為三三分謂天地人君子三分齊等與衆人不同也參三也平按參折靈樞作終折甲乙作參注云又作三又作終結喉以下至缺盆中長四寸頤端橫當結喉端也結喉端至缺盆中不取上下量缺盆以下至𩩲骬長九寸從缺盆中至𩩲骬皮際量也平按𩩲骬説見前靈樞注云音曷於肩骨也恐未安注皮字別抄本亦作歧過則肺大不滿則肺小心肺俱在胸中心在肺間故不言大小也𩩲骬以下至天樞長八寸天樞俠齊故量𩩲骬下但八寸過則胃大不滿則胃小八寸之中亦有脾臟以其胃大故但言胃大小也天樞以下至橫骨長六寸半過則回腸廣長不滿則短橫骨在陰上橫骨回腸大腸也大腸當齊小腸在後附脊齊上故不言之也平按靈樞甲乙則短作則狹短橫骨長六寸半橫量非數下至內輔之上廉長一尺八寸內輔膝下內箱骨輔脛也平按下至內輔之上廉靈樞甲乙作橫骨上廉以下至內輔之上廉注脛袁刻誤作頸內輔之上廉以下至下廉長三寸半內輔骨長三寸半也內輔之下廉以下至內踝長尺三寸內踝以下至地長三寸內踝端至地也膝膕以下至跗屬長尺六寸跗屬以下至地長三寸從膝以下當膝後曲處量也故骨圍大則大過小則不及故頭骨圍大則過於身骨頭骨圍小不及身骨也角以下至柱骨長一尺缺盆左右箱上下高骨名曰柱骨後額角至此柱骨端合有一尺與頤端齊也計柱骨上下長四寸經不言也行掖中不見者長四寸排手而行取掖下不見處以上至柱骨四寸也掖以下至季脅長尺二寸季肋曰季脅季脅以下至髀樞長六寸尻髀二骨相接之處名曰髀樞髀樞以下至膝中長尺九寸當膝側中膝以下至外踝長尺六寸至外踝之中也外踝以下至京骨長三寸京骨以下至地長一寸外踝下如前高骨名曰京骨耳後當完骨者廣九寸耳前當耳門者廣尺三寸頭顱圍有二尺六寸此完骨相去九寸耳門相去尺三寸合有二尺二寸小四寸者各取完骨之前至耳二寸兩箱合有四寸並前即有二尺六寸經不言之也平按廣尺三寸甲乙作廣一尺二寸注云一作三寸兩顴之間相去七寸兩乳之間廣九寸半兩髀之間廣六寸半兩顴兩乳取其端兩髀取中也平按原抄本兩顴右旁有顴巨員反頰骨也七字恐系後人校記非楊注足長尺二寸廣四寸半取足中指至足跟端量之以取長也以尺二長中折處橫量之以取廣也肩至肘長尺七寸從肩端至肘端量也肘至捥長尺二寸半肘端至捥捥者臂手相接之處捥至中指本節長四寸指有三節此為下節故曰本節本節至其末長四寸半從本節端至中指末合四寸半今人取手大指第一節為寸以定針灸分寸者不相當也項發以下至膂骨長三寸半膂骨脊骨從後髮際下至脊端量之也平按膂靈樞作背甲乙作脊三寸半靈樞作二寸半甲乙注云一作二寸膂骨以下至尾骶二十一節長三尺每一節長一尺也故二十一節長三尺也下文具之上節長一寸四分分之一奇分在下舉上一節以為例余皆同也分之一者一寸之外更有餘分之一也其實則七分分之二也平按分之一奇分在下甲乙作分之七奇分之一注一寸下原缺二字據經文當作四分二字故上七節下至於膂骨九寸八分分之七此七節之數也每節一寸四分分之一故七節得九寸八分分之七其實一尺全也何者每節餘分七分分之二七節有餘分十四以七除十四得二分二分並九寸八分故為一尺也此衆人之骨度也所以立經脈之長短也此為衆人骨度多同者為準以立經脈長短也是故視其經絡之在於身也其見浮而堅者其見明而大者多血細而沉者少氣也見而浮堅者絡脈也見而明大者血盛也細而沉者少氣少血或作多氣也平按少氣靈樞甲乙作多氣注見而明大袁刻誤作其見明而大腸度平按此篇自篇首至三十二曲見靈樞卷六第三十一腸胃篇自黃帝曰願聞人之不食至末見靈樞卷六第三十二平人絶谷篇甲乙同上篇黃帝問伯高曰余願聞六腑傳谷者腸胃之大小長短受谷之多少奈何三焦腑傳於穀氣膽腑受於穀精三腸及胃傳谷糟粕傳糟粕者行谷之要故腸胃有六種之別者伯高答曰請盡言之谷之所從出入淺深遠近長短之度黃帝問六種也外更請説四種故曰盡言之也谷行從口曰入泄肛曰出自唇至齒為淺從咽至腸曰深谷至於胃曰近從胃向䐈曰遠腸十六曲曰長咽一尺六寸曰短也唇至齒長九分口廣二寸半齒以後至會厭深三寸半大容五合會厭舌後喉嚨上出氣入鼻口之孔上有肉厭蓋孔開闔氣之出入也咽大二寸半至胃長一尺六寸咽會厭後下食孔也下至胃長一尺六寸平按咽上靈樞有舌重十兩長七寸廣二寸半十一字咽下有門重十兩四字大作廣甲乙同二寸半靈樞作一寸半至胃長一尺六寸原抄長字上脫至胃二字長字下脫一尺二字謹依靈樞甲乙補入胃紆曲屈伸之長二尺六寸大一尺五寸徑五寸大容三斗胃中央大兩頭小伸而度之二尺六寸也圍之有一尺五寸曰大量徑有五寸也容水穀三斗也平按大容三斗靈樞作二斗五升甲乙作三斗五升注云一作二小腸後傅脊左環葉積其注於回腸者外傅於齊上回運環反十六曲大二寸半徑八分分之少半長三丈二尺傅附也糟粕從胃傳入小腸小腸附脊外注回腸於齊上也平按傅靈樞甲乙均作附葉積靈樞作回周疊積甲乙作回周葉積回腸當齊左環回周葉積而下回運環反十六曲大四寸徑一寸少半長二丈一尺回腸大腸也小腸附脊而在後大腸近齊而在前故大腸輸在上小腸輸在其下也平按少半上靈樞甲乙有寸之二字廣腸傅脊以受回腸左環葉積上下闢大八寸徑二寸大半長二尺八寸廣腸白䐈也附脊以受大腸糟粕闢著脊也謂白䐈當中寬八寸上受大腸之處下出泄處皆徑有二寸半總長二尺八寸也平按葉積靈樞作葉脊大半上靈樞甲乙有寸之二字腸胃所入至所出長六丈四寸四分咽之上口為所入廣腸之下以為所出唇齒相去九分齒與會厭相去三寸半會厭至胃咽長一尺六寸胃之終始長二尺六寸小腸終始長二丈一尺廣腸終始長二尺八寸故有六丈四寸四分也平按注小腸終始下原抄作長二丈一尺檢上文經云小腸長三丈二尺回腸長二丈一尺應於小腸終始下補注長三丈二尺回腸終始九字方與經文六丈四寸四分之數合當系傳抄脫此九字也其回曲環反三十二曲胃有一曲小腸十六曲大腸十六曲合而言之計有三十三曲其胃大麴短不入其數故有三十二曲皆以七尺五寸中度之人為準也黃帝曰願聞人之不食七日而死其故何也七日不食而死余時之言既聞腸胃大小未知所盛水穀多少而盡至七日而死之也伯高曰臣請言其故胃大尺五寸徑五寸長二尺六寸橫屈受三斗其中之谷常留者二斗水一斗而滿故事所由水穀合有三斗滿於胃中也平按橫屈受三斗靈樞甲乙作橫屈受水穀三斗五升水一斗而滿均作水一斗五升而滿上焦泄氣出其精微慓悍滑疾上焦之氣從胃上口而出其氣精微慓悍滑疾晝夜行身五十周即衛氣也平按上焦下原缺一字依靈樞甲乙補作泄袁刻作中焦二字又注上焦袁刻作二焦均與原抄不合下焦下溉諸腸下焦別回腸注膀胱譬之溝瀆下溉諸腸膀胱為黑腸及廣腸等也平按諸腸甲乙作泄諸小腸小腸大二寸半徑八分分之少半長三丈二尺受一斗三合合之大半谷四升水六升三合合之大半一二為三則二為大半一為少半也平按受一斗三合合之大半谷四升十二字靈樞甲乙作受谷二斗四升六字回腸大四寸徑一寸平按靈樞甲乙有寸之二字少半長二丈一尺受一斗七升升之半谷一斗水七升升之半升之半半升也平按受一斗七升升之半谷一斗水七升升之半十七字靈樞甲乙作受谷一斗水七升半八字廣腸大八寸徑二寸大半長二尺八寸受九升三合八分合之一廣腸受水穀之數也平按靈樞大半上有寸之二字受下有谷字甲乙同腸胃之長凡長六丈四寸四分受水穀六斗六升六合八分合之一此腸胃所受水穀之數計腸胃所受之數垂升之半合之大半也平按六丈四寸四分靈樞甲乙作五丈八尺四寸受水穀六斗六升六合八分合之一作受水穀九斗二升一合合之大半十三字注垂袁刻作乘其義均未詳平人則不然胃滿則腸虛腸滿則胃虛更滿更虛故氣得上下前之所論乃據腸胃之量受數若言生平之人則腸胃之中盈虛更起不得一時則有前數也食滿胃中則胃實腸虛也腸虛故氣得下也糟入腸中則胃虛腸實也胃虛故氣得上也以其腸胃盈虛氣得上下之也平按注量下所缺一字謹擬作容五臟安定欲資水穀之味故須盈也欲受水穀之氣故待虛也氣味內和故五臟安定也血脈和利氣味通於上下故脈和利精神乃居臟安脈和則五神五精居其臟也故神者水穀之精氣水穀精氣資成五神故水穀竭神乃亡也故腸胃之中常留谷二斗四升水一斗一升計腸胃所受六斗六升六合八分合之一據其盈虛在人常須三斗五升也平按谷二斗四升靈樞作二斗水一斗一升靈樞作一斗五升甲乙作谷二斗四升水一斗五升故平人日再後後二升半一日中五升七日五七三斗五升而留水穀盡矣再後五升還須資食合有三斗五升若一日不食後五升者則少五升也若七日常後七日不食則五升三斗五升皆盡故平人不飲食七日而死者水穀精氣津液皆盡矣故七日而死矣命門所藏謂之精也上焦宣五穀味熏膚充身澤毛如霧露之溉遂謂之氣腠理發泄出汗謂之津穀氣淖澤注於骨骨屬屈伸淖澤補益髓腦皮膚潤澤謂之為液水穀既盡精氣津液四物盡故七日死平按注四物下所缺一字謹依經文作皆脈度平按此篇自篇首至末見靈樞卷四第十七脈度篇又見甲乙經卷二第三脈度篇黃帝問曰願聞脈度先言骨度及腸胃度大小長短於前次當依以論諸脈長短故須問之也平按注依下原缺一字謹擬作次岐伯曰手足之六陽從手至頭五尺手陽明大腸脈也手太陽小腸脈手少陽三焦脈也三脈分在兩手故有六脈余仿此各依營行次第手之三陰足之三陽皆從內起向於手足手之三陽足之三陰皆從外起向於頭此數手足之脈長短故皆從手足向內數之與手脈十二經流注入身數亦同也平按手足之六陽靈樞甲乙均無足字疑衍注向於頭下原缺一字左方剩月旁依經文足之三陰從足走腹擬作腹袁刻作項恐未安與手下原缺三字謹擬作足外起三字五六三丈計手六陽從指端至目循骨度直行得有五尺不取循繞並下入缺盆屬腸胃者循骨度為數去其覆回行者及與支別故有三丈也手之六陰從手至胸中三尺五寸三六丈八尺五六三尺手太陰肺脈也手少陰心脈也手心主心包絡脈也手之三陰皆亦直循骨度從手至胸三尺五寸不取下入屬臟絡腑之者少陰從心系上系目系及支別者亦不取凡二丈一尺足之六陽從足至頂八尺六八四丈八尺足陽明胃脈也足太陽膀胱脈也足少陽膽脈也計人骨度從地至頂七尺五寸所謂八尺者何以其足六陽脈從足指端當至踝五寸故有八尺也亦不取腑臟及支別矣足之六陰從足至胸中六尺五寸六六三丈六尺五六三尺足少陰腎脈也足厥陰肝脈也足六陰脈從足至胸中六尺五寸太陰少陰俱至舌下厥陰至頂及入臟腑數之也平按注足少陰上原缺六字擬作足太陰脾脈也六字袁刻將太陰脾脈補在六陰二字之上陰下復脫脈字與原抄不合又臟腑下原缺五字謹依上下注作與支別亦不五字袁刻於此處既不闕文復脫數之也三字與原抄不合凡三丈九尺喬脈從足至目七尺五寸二七丈四尺二五一尺喬陰陽二喬也起處終處長短是同也按中人七尺五寸二喬脈皆起跟中上七尺五寸若為合數然二喬至目內眥與足太陽合上行絡左右額角故得合數檢少陽筋即知也平按注是同下原缺四字袁刻只空二格不合五寸下原抄直接二喬無缺文袁刻空七格不合跟中上三字下原抄缺四字謹依陰陽喬脈篇擬作至目內眥四字袁刻只空二格不合又額角額字袁刻誤作頗故得合數得字誤作為均依原本更正凡一丈五尺督脈任脈各四尺五寸二四八尺二五一尺上行至頭任脈唯至兩目之下督脈上行至目復上極骶行所其長與任脈不同若為皆有四尺五寸然任脈外循腹上行而絡唇口者督脈取其起於下極之故於脊脊上至風府者以充四尺五寸之數余不入數平按注上行至頭上原缺八字謹依督脈篇擬作督脈起於少腹以下八字極骶上原缺六字謹依督脈篇擬作顛別下項至下六字然任脈下原缺五字謹擬作取其起胞中五字故下原缺一字謹依督脈篇擬作俠凡九尺凡都合十六丈二尺此氣之大經隧也經脈為里支而橫者為絡絡之別者為孫絡孫絡之盛而有血者疾誅之盛者徐瀉之虛者飲藥以補之人之血脈上下縱者為經支而橫者為緯足左右各有十二合二十四脈陰喬陽喬任脈二十八脈在膚肉之裡皆上下行名曰經脈十五絡脈及絡見於皮表橫絡如緯名曰絡脈皆是血氣所稱為隧也凡大小絡虛皆須飲藥補之不可去血去血虛虛不可不禁也平按凡九尺三字原抄作九字依靈樞甲乙及本經上文應作凡九尺三字為孫下靈樞無絡孫絡之四字瀉上無徐字注為緯下原缺二字擬作凡手二字袁刻空六格不合任脈下原缺三字擬作督脈合三字袁刻空五格不合及下原缺一字擬作別袁刻空四格不合所下原缺三字擬作貫注故三字袁刻空五格不合
