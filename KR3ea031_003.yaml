body:
  text: 卷第三卷首缺陰陽平按此篇自傷腫上殘脫篇目亦不可考故自黃帝曰以下至痛形謹依素問卷二第五陰陽應象大論補入自傷腫以下至末見素問陰陽應象大論又見甲乙經卷六第七惟編次小異黃帝曰陰陽者天地之道也萬物之綱紀變化之父母生殺之本始神明之府也治病必求於本故積陽為天積陰為地陰靜陽躁陽生陰長陽殺陰藏陽化氣陰成形寒極生熱熱極生寒寒氣生濁熱氣生清清氣在下則生飧泄濁氣在上則生䐜脹此陰陽反作病之逆從也故清陽為天濁陰為地地氣上為云天氣下為雨雨出地氣云出天氣故清陽出上竅濁陰出下竅清陽發腠理濁陰走五臟清陽實四肢濁陰歸六腑水為陰火為陽陽為氣陰為味味歸形形歸氣氣歸精精歸化精食氣形食味化生精氣生形味傷形氣傷精精化為氣氣傷於味陰味出下竅陽氣出上竅味厚者為陰薄為陰之陽氣厚者為陽薄為陽之陰味厚則泄薄則通氣薄則發泄厚則發熱壯火之氣衰少火之氣壯壯火食氣氣食少火壯火散氣少火生氣氣味辛甘發散為陽酸苦湧泄為陰陰勝則陽病陽勝則陰病陽勝則熱陰勝則寒重寒則熱重熱則寒寒傷形熱傷氣氣傷痛形以上從素問陰陽應象大論補入傷腫既迫痛傷形即便為腫也故先痛而後腫者氣傷形也先邪傷衛氣致痛後形腫者謂衛氣傷及於形也先腫而後痛者形傷氣也邪先客於皮膚為腫而後壅衛氣為痛者謂形傷及於氣也風勝則腫燥勝則乾邪風客於皮膚則為䐜腫也邪熱燥於皮膚則皮乾無汗平按素問甲乙經腫均作動腫下為有熱勝則腫句寒勝則胕扶付反檢義當腐寒勝肉熱肉當腐平按胕素問甲乙經均作浮濕勝則濡陰濕氣盛則多汗也平按濡下素問甲乙經均有瀉字天有四時五行天之用也以生長收藏四時之用以生寒暑燥濕五行所生也有本有風謂具五者也平按濕下素問甲乙經均有風字人有五臟人之有也有五氣以喜怒悲憂恐五氣五臟氣也喜怒等心肺肝脾腎五志者平按有五氣素問作化五氣甲乙經作化為五氣喜上素問甲乙經均有生字故喜怒傷氣內傷者也寒暑傷形外傷者也故曰喜怒不節寒暑過度生乃不固內外傷已生得堅固不道夭者未之有也平按素問無故曰二字此節以上有暴怒傷陰暴喜傷陽厥氣上行滿脈去形十六字甲乙經同重陰必陽重陽必陰故曰冬傷於寒春必病溫傷過多也冬寒陰也人於冬時溫衣熱食腠理開發多取寒涼以快其志者寒入腠理腠理遂閉內行臟腑至春寒極變為溫病也平按病溫顧本素問作溫病趙府本素問仍作病溫春傷於風夏生飧泄春風陽也春因腠理開發風入腠閉內行臟腑腸胃之中至夏飧泄也飧水洗飯也音孫謂腸胃有風水穀不化而出也夏傷於暑秋生痎瘧夏因汗出小寒入腠藏之於內至氣發腠理外閉風氣內發以成痎瘧痎音皆平按素問秋生作秋必注氣發上原缺一字玩經文應作秋袁刻作夏秋傷於濕冬生咳嗽秋多雨濕人傷受濕濕從上下至冬寒並傷肺故成咳嗽也愷代反又邱吏反謂逆氣也平按自此以下素問有帝曰余聞上古聖人至陽在外陰之使也一段其文甚長中間新校正所引太素及楊注甚多當在今本所闕七卷中惜不可考矣黃帝問曰法陰陽奈何陰陽者天地綱紀變化父母養生之道法之以成故問之岐伯答曰陽勝則身熱陽勝八益為實陰勝七損為虛言八益者身熱一益也陰弱陽盛故通身熱也腠理閉二益也陽開腠理過盛則閉而粗三益也熱盛則腠理皮上粗澀也平按而粗素問作喘粗甲乙經作喘息粗為之俯仰四益也熱盛上下故身俯仰平按俯仰甲乙經作後悶汗不出而熱五益也陰氣內絕故汗不出身仍熱干齒六益也熱盛至骨故齒乾也平按素問甲乙經作齒乾以煩悗七益也熱以亂神故煩悶也平按悗素問作冤甲乙經作悶腹滿死八益也熱盛胃中故腹滿也前已七益復加腹滿故致死平按滿甲乙經作脹能冬不能夏以其內熱故能冬之大寒不能夏之小熱平按二能字甲乙作耐陰勝則身寒下言七損也身寒一損也身苦寒汗出二損也無陽禁腠故汗出身常凊三損也凊冷也身皮膚常冷也平按素問甲乙經凊作清袁刻亦作清數慄四損也數數戰慄也而寒五損也戰而復寒也寒則厥六損也寒則手足逆冷也厥則腹滿死七損也前已六損復加冷氣滿腹冷氣滿腹故致死也能夏不能冬寒人遇熱故堪能也平按兩能字甲乙經均作耐此陰陽更勝之變也病之形能也此是陰陽變極之理亦是人之病所能也黃帝問曰調此二者奈何陰陽相勝遂有七損八益虛實不和故謂調之岐伯答曰能去七損八益則二者可調也損者損於身益者益於病若人能修道察同去損益之病則陰陽氣和無諸衰老壽命無窮與天地同極也平按去素問甲乙經均作知不知用此則蚤衰人不修道不去損益則陰陽不調是謂不道不道早衰也平按注不道二字原抄重袁刻刪去不合仍依原抄衰之節年四十而陰氣自半也起居衰矣始衰時節年四十也六腑為陽氣五臟為陰氣人年四十五臟陰氣自半已衰腠理始疏榮華頹落髮鬢頒白行立之起坐臥之居日漸已衰也年五十體重耳目不聰明矣人年五十脾氣衰故體重肝氣衰故目不明腎氣衰故聽不聰也年六十陰痿大氣衰九竅不利人年六十腎氣衰精氣減筋弛故宗筋痿也十二經脈三百六十五絡為大氣也其氣皆上於面而走空竅其精陽氣上於目而為睛其彆氣走於耳而為聽其宗氣上出於鼻而為臭其濁氣出於胃走唇舌而為味今經脈大氣皆衰故九竅不利下虛上實涕泣俱出腰以上為陽以居上也腰以下為陰以居下也年六十者精減陰痿行步無力即下虛上實也神衰失守故涕泣俱出平按出下素問有矣字故曰知之則強知察於同去七損八益其身日強不知則老人察於異有損有益故身速衰也玄元皇帝曰物壯則老謂之不道不道早已此之謂也故同名異邪道理無物不通故同名也物有方殊故異邪也平按故同名異邪句素問作故同出而名異耳注方殊方字疑是萬字之誤智者察同愚者察異察觀也智者反物觀道愚者反道觀物愚者不足智者有餘有餘則耳目聰明身體輕強年老復壯壯者益理愚者觀物有三不足目暗耳聾則視聽不足也體重力衰則身不足也老者日衰壯者日老則壽不足也智者觀道神清性明故三有餘也視聽日勝則耳目有餘也身強體輕則身有餘也年老反同乳子之形年壯更益氣色之理則壽有餘平按素問年老作老者理作治是以聖人為無為之事聖人謂廣成子等也忘物喪我任物之動即為無為之事也平按注無為袁刻作無物樂恬惔之能怡神適性即樂恬惔之能也從欲快志於虛無之守聖人慾無欲之欲志無求之志故從快於虛無不失其道謂之守也故壽命無窮與天地終此聖人之治身也虛無守者其神不擾其性不穢性不穢故外邪不入神不擾故臟腑內與虛無同道與天地齊德遂獲有余無窮之壽也故廣成子語黃帝曰吾以目無所見耳無所聞心無所知神將自守故人盡死而我獨存即其事也斯乃聖人理身之道也平按注臟腑下原抄空一格旁註安欣二字天不足西北故西方陰也而人右耳目不如左明地不滿東南故東方陽也人左手足不如右強也夫天地者形之大也陰陽者氣之大也大形而生萬形則大形以為父母萬形為子也故大形有所不足而生萬物萬物不可足也故人頭法天則右耳目聰明不足也手足法地故左手足便強不足也以其天陽不足西北地陰不足東南故也平按素問西方作西北方東方作東南方黃帝問曰何以然岐伯答曰東方陽也其精並上故上明而下虛故使耳目聰明而手足不便也東方是陽陽氣上升故上實下虛則人左箱上勝下劣也平按素問陽也下有陽者二字並上作並於上並於上六字故上明作則上明西方陰也陰者其精並於下並於下則下盛而上虛故其耳目不聰明而手足便也西方是陰陰氣下沉故下實上虛則人右箱下勝上劣也平按此段原抄無謹據素問補於西方是陰註上故俱感於邪其在上也則右甚在下則左甚此天地陰陽所不能全故邪居之非直左右陰陽虛處耳目手足有所不善然左右俱感於邪虛處獨甚今人患手足左甚耳目右甚即其事也則天地陰陽有所不全人法天地何取可具其全非直人有不全萬物皆爾不可全也故聖人法天則地中順萬物居不得已安於不足是謂攝生之大妙平按注已安下袁刻有居也二字乃因原安字右旁有此二字不宜混入正文故天有精地有形天有氣之精成人耳目地有質之形成人手足天有八紀地有五理故能為萬物父母天有八風之紀紀生萬物地有五行之理理成萬物故為父母也平按理素問作里物下素問有之字清陽上天濁陰歸地故陰陽和也稱為萬物陰陽離也號為天地也是故天地之動靜神明為之紀故能以生長化成收藏終而復始是故以天之動也以地之靜也以神明御之為綱紀也三者備故能為四時生長化成收藏終始者也平按紀上素問有綱字化成二字素問無唯賢人上配天以養頭下象地以養足中象人事以養五臟人頭象天故配天養頭使七竅俱美同七曜之明也足以象地故使五常安同山嶽雙鎮也中身象於人事人有五臟余禽獸等有不具者故象人事以養五臟同真人平按中象象字素問作旁注雙字原缺原校作雙天氣通於肺肺為四臟上蓋是人之天故天氣通肺也地氣通於咽風氣通於肝咽中入食以生五臟六腑故地氣通咽也東方生風風生木木生酸酸生肝故風氣通於肝平按咽素問作嗌雷氣通於心心能覺動四肢百體故雷氣通心也穀氣通於脾五穀滋味入脾故穀氣通脾也平按谷素問作谷雨氣通於腎雨者水也故雨氣通腎也六經為川三陰三陽六經之脈流諸血氣以注腸胃故為川也平按川袁刻作水注同腸胃為海夫海者一則眾川歸之二則利澤萬物腸胃為彼六經所歸又滋百節故為海也九竅為水注聲色芳味如水從外流於上之七竅注入經川溲後糟粕之水從內出下二竅也有本為外注理亦相似平按注經川川字袁刻作水水注之氣以天地為之陰陽聲色芳味之氣從外入內有養故以地為陰也糟粕溲後從內出外得通故以天為陽也平按素問水注二字不重陽之汗以天地雨名之陽發腠理出汗同天地間雨故汗名雨也氣以天地之風前明人汗以天地之雨為名則人之氣以天地之風為名也平按素問氣上有陽之二字風上有疾字風下有名之二字暴氣象雷人身中氣上下有聲故象雷也氣逆象陽無陰之陽即為災故氣逆不和者象於陽也平按氣逆素問甲乙經均作逆氣故治不法天之紀不用地之理則災害至矣為家為國之道不依天之八紀地之五理國有亡破之災身有夭喪之害也故風之至旁如風雨風謂天之邪氣者也邪氣至觸身旁傷人體者如暴風雨入人腠理漸深為病者也平按風上素問有邪字旁素問甲乙經均作疾故善治者治皮毛其次治肌膚其次治筋脈其次治六腑其次治五臟五臟半死半生善者謂上工善知聲色形脈之候妙識本標故療皮毛能愈臟腑之病亦療臟腑能除皮毛之疾故病在皮毛療於皮毛病在五臟療於五臟或病淺而療淺或病深而療深或病淺而療深或病深而療淺皆愈者斯為上智十全者也今夫邪氣始入皮毛之淺遂至五臟之深上工療之有十五死五生者以其陰陽兩感深重故也平按五臟二字袁刻不重五臟下素問有治五臟者四字故天之邪氣感則害五臟謂天降八正虛風從衝上來為損至深故害五臟也平按害下素問有人字水穀之寒溫感則害六腑天地之間資生氣味謂水穀也六腑貯於水谷節之失和次害六腑也平按素問溫作熱害下有於字地之濕氣感則害皮肉筋脈腎為水臟主骨又深少濕未能即傷余之四臟所主皮肉筋脈在外感即先傷未至六腑也故用針者從陰引陽從陽引陰肝臟足厥陰脈實肝腑膽足少陽脈虛須瀉厥陰以補少陽即從陰引陽也若少陽實厥陰虛須瀉少陽以補厥陰即從陽引陰也余例准此平按故下素問有善字以右治左以左治右謂以繆刺刺諸絡脈謂以巨刺刺諸經脈以我知彼謂醫不病能知病人以表知里或瞻六腑表脈以知五臟里脈或瞻聲色之表能知臟腑之裡也以觀過與不及之理見微得過用之不殆寸口之脈過五十動然後一代謂之過不滿五十謂之不及見關格微病得過失也見微過而救人者謂未病之病療十十全故無危殆平按得甲乙經作則善診者按脈善謂上工善能診候診候之要謂按脈平按素問按脈上有察色二字甲乙經同先別陰陽審清濁而知部候按脈之道先須識別五臟陰脈六腑陽脈亦須審量營氣為濁衛氣為清和兩手各有寸關尺三部之別也平按部候素問甲乙作部分別本亦作部分注和兩手和字疑是知字傳寫之誤視喘息聽音聲而知所苦須看病人喘息遲急粗細聽病人五行音聲即知五臟六腑皮毛膚肉筋脈骨髓何者所苦此謂聽聲而知者也平按甲乙音聲作聲音知下有病字觀權衡規矩而知病所在面部有五臟六腑五行氣色觀乎即知病在何臟腑也此謂察色而知也平按規上甲乙有視字在素問作主甲乙作生按尺寸而觀浮沉滑澀而知病所生澀所敕反不滑也人之兩手從關至魚九分為寸也從關至尺一寸為尺也尺寸終始一寸九分為尺寸也凡按脈也者按寸口得五臟六腑十二經脈之氣以知善惡又按尺部得知善惡依此大經竟無關部關者尺寸分處關自無地依秦越人寸口為陽得地九分尺部為陰得地一寸尺寸終始一寸九分亦無關地華佗云尺寸關三部各有一寸三部之地合有三寸未知此言何所依據王叔和皇甫謐等各說不同並有關地既無依據不可行用但關部不得言無然是尺寸分處自無其地脾脈在中有病寄見尺寸兩間至下脈經之中具定是非也按脈之道先別陰陽清濁知部分以次察聲色知病所苦所在始按尺寸觀浮沉等四時之脈以識病源也平按所生下素問有以治二字新校正云按甲乙經作知病所在以治則無過下無過二字續此為句與此正合注尺寸分處袁刻作寸尺分處以治無過以診則不失矣此以診候知病源已然後命諸針艾湯藥等法療諸病者必有祛疾服靈之福定無夭年損傷之罪以其善診則無失也平按甲乙治下有則字不作無故曰病之始起也可刺而已以其善診病之始生即以小針消息去之不用毒藥者此則其微易散者也其盛可待而衰也病盛不可療者如堂堂之陣不可即擊待其衰時然後療者易得去之如瘧病等也平按而衰也素問甲乙作衰而已故曰因其輕而揚之謂風痹等因其輕動道引微針揚而散之因其重而減之謂濕痹等因其沉重燔針按熨漸減損也平按注濕痹袁刻誤作滋痹因其衰而彰之謂癲狂等取其衰時彰瀉去之也形不足者溫之以氣謂寒瘦少氣之徒補其陽氣也精不足者補之以味五臟精液少者以藥以食五種滋味而補養之其高者因而越之風熱實於頭胸因瀉越之其下者引而竭之寒濕實於腰足引瀉竭之中滿者瀉之於內氣脹腸胃之中可以瀉之其有邪者凊以為汗其在皮者汗而發之凊冷也邪腸胃寒熱病氣也或入臟腑或在皮毛皆用針藥以調汗而出之也平按凊素問甲乙作漬形二字袁刻作清今依原抄作凊其慓悍者按而投之慓芳照反急疾也悍胡旦反禁其氣急不散以手按取然後投針也平按投素問甲乙作收其實者散而瀉之諸有實者皆散瀉之審其陰陽以別柔剛陽病治陰陰病治陽夫物柔弱者陽之徒也剛強者陰之徒也陰經受邪流入陽經為病是為陰經為本陽經為標療其本者療於陰經即陽病療陰也陽經受邪准陰療陽也即陰病療陽也人陰陽二經陰經若實陽經必虛陽經若實陰經定虛故陽虛病者宜瀉陰陰實病者宜補陽也定其血氣各守其鄉血實宜決之氣虛宜掣引之須定所病在氣在血各守血氣病之別鄉瀉乃用針刺去實血補乃用針引氣引皮補已縱皮閉門使氣不泄掣死曳反引也平按氣虛甲乙作氣實掣素問作𤙲注縱皮縱字袁刻作從調陰陽平按此篇見素問卷一第三生氣通天論黃帝問於岐伯曰夫自古通天者生之本也古謂上古中古者也調陰陽而攝其生則通天之義上古中古人君攝生莫不法於天地故生同天地長生久視通天地者生之本也不言通地者天為尊也本於陰陽本於天地陰陽之氣天地之間六合之內其氣九州九竅五臟十二節皆通於天氣在於天地四方上下之間所生之物即九州等也九州即是身外物也九竅等物身內物也十二節者謂人四肢各有三大節也謂九州等內外物皆通天氣也平按素問於作乎其生在其氣三謂天地間九州等物其生皆在陰陽及和三氣平按素問在作五別本亦作五謂數犯此者則邪氣傷人此壽之本陰陽分為四時和氣人之縱志不順四時和氣攝生為風寒雨濕邪氣傷也此順三氣養生壽之本也平按素問數上無謂字壽下有命字本下有也字蒼天之氣清靜則志意治蒼天色也氣謂四時和氣者也天地之和氣清而不濁靜而不亂能令人志意皆清靜也平按素問靜作淨夫順之則陽氣固雖有賊邪弗能害也此因時之序也人能順清靜和氣則臟氣守其內腑氣固其外則雖有八正虛風賊邪不能傷也斯因四序之和自調攝也平按素問順上無夫字序下無也字故聖人搏精神或服天氣通神明搏附也或有也聖人令精神相附不失有服清靜之氣通神令清通性令明故得壽弊天地而不道夭平按素問搏作傳服天上無或字通上有而字氣失之則內閉九竅外壅肌肉衛氣散解此謂自傷氣之削也陰氣失和則內閉九竅令便不通外壅肌肉使腠理壅塞也陽氣失和則腠理開解衛氣發泄也此之失者皆是自失將攝故令和氣銷削也平按素問失上無氣字衛原抄作沖據本注應作衛素問亦作衛陽氣者若天與日失其行獨壽不章故天運當以日光明是故陽因上而衛外者也人之陽氣若天與日不得相無也如天不得無日日失其行則天不明也故天之運動要藉日行天得光明也人與陽氣不得相無若無三陽行於頭上則人身不得章延壽命也故身之生運必待陽脈行身以上故壽命章也是以陽上於頭衛於外也平按素問行獨二字作所則折三字上而二字作而上二字因於寒志欲如連樞起居如驚神氣乃浮連數也樞動也和氣行身因傷寒氣則志欲不定數動不住故起居如驚神魂飛揚也平按素問寒下無志字連樞作運樞新校正云全元起本作連樞因於暑汗煩則喘喝靜則多言體若燔炭汗出如散喝漢曷反呵也謂喘呵出氣聲也汗者陰氣也故汗出即熱去今熱汗出而煩擾也若靜而不擾則內熱狂言如此者雖汗猶熱汗如沐浴汗不作珠故曰如散也平按素問如散作而散因於濕首如裹攘大筋濡短小筋施長施長者為痿如而也攘除也人有病熱用水濕頭而以物裹人望除其熱是則大筋得寒濕縮小筋得熱緩長施緩也絕爾反筋之緩瘲四肢不收故為痿也平按素問裹下有濕熱不三字濡作緛施作弛小筋施長下有緛短為拘四字為痿上無者字因陽氣為腫四維相代陽氣而竭因邪氣客於分肉之間衛氣壅遏不行遂聚為腫四時之氣各自維守今四氣相代則衛之陽氣竭壅不行故為腫也平按因陽氣為腫素問作因於氣為腫而竭作乃竭陽氣者煩勞則張精絕闢積於夏使人前厥闢稗尺反夏日陽氣盛時入房過多則陽虛起精絕闢積生前厥之病也闢積闢疊停廢之謂也前厥即前僕也平按前厥素問作煎厥目盲不可以視耳閉不可以聽精絕則腎腑足太陽脈衰足太陽脈起目內眥故太陽衰者即目盲也精絕腎虛則腎官不能聽也潰潰乎若壞都滑滑不止潰胡對反潰潰滑滑皆亂也陽氣煩勞則精神血氣亂若國都亡壞不可止也一曰滑不正則都大也言非直精神血氣潰亂四肢十二大骨痿瘲不正也平按滑滑不止素問作汩汩乎不可止注滑不正則應作都骨不正按原抄滑滑不止右偏有滑滑不止都骨不正八小字陽氣大怒則形氣而絕血宛於上使前厥有傷於筋縱陰並於陽盛怒則衛氣壅絕血之宛陳上並於頭使人有僕故曰前厥並傷於筋故痿瘲也平按陽氣下素問有者字而絕作絕而宛作菀使前厥作使人薄厥其若不容而出汗偏阻使人偏枯阻壞也慈呂反容緩也陽氣盛者必傷筋痿緩其若不緩則冷汗偏出壞身偏枯不隨之病也或偏枯疼者也平按而出汗偏阻素問作汗出偏沮汗出見濕乃生痤疽若汗遍身見濕於風即邪風客於肌肉壅遏營衛傷肉以生痤疽也痤癰之類然小也俗謂之癤子久壅陷骨者為痤疽也平按素問疽作疿膏粱之變足生大釘受如持虛膏粱血食之人汗出見風其變為病與布衣不同多足生大釘腫膏粱身虛見濕受病如持虛器受物言易得也平按素問膏作高釘作丁新校正云按丁生之處不常於足蓋謂膏粱之變饒生大丁非偏著足也又素問持虛下有勞汗當風寒薄為皶郁乃痤十一字陽氣者精則養神柔則養筋衛之精氣晝行六腑夜行五臟令五神清明行四肢及身令筋柔弱也開闔不得寒氣從之乃生大僂腠理有邪開令邪出則開為得也腠理無邪閉令不開即闔為得也今腠理開邪入即便閉之故不得也寒邪入已客於腰脊以尻代踵故曰大僂僂曲也力矩反陷脈為瘻流連肉腠寒邪久客不散寒熱陷脈以為膿血流連在肉腠之間故為瘻平按流素問作留輸氣化薄傳為善畏乃為驚駭輸者各系於臟氣化薄則精虛不守故善畏而好驚也平按素問輸作俞乃作及營氣不順逆於肉理乃生癕癰腫脈肉營氣為邪氣傷不得循脈陰陽相注故逆於肉理敗肉即生癰也平按素問順作從癕作癰注脈肉肉字別本作內魄汗不盡形弱而氣爍穴輸已閉發為風瘧故風者百病之始也魄肺之神也肺主皮毛腠理人之汗者皆是肺之魄神所營因名魄汗夏傷於暑汗出不止形之虛弱氣之衰損淫邪藏於腠理腠理已閉至秋得寒內外相感遂成風瘧而氣爍故邪風者百病始爍式藥反淫邪氣平按素問不盡作未盡清靜則肉腠閉距雖有大風苛毒弗之能客此因時之序也不為躁動毛腠閉距八風不能傷者順四時之序調養故無病也苛害也音柯平按素問距作拒客作害故人病久則傳化上下不並良醫弗為人病雖久得有傳變上下陰陽不並至其所王必當自愈故良醫不為也平按素問病上無人字故陽蓄積病死而陽氣當隔隔者當瀉不亟正治旦乃敗亡故陽病者蓄積不得傳化有其死期者陽脈當隔脈有隔之時當即瀉之不急療者必當死也隔格也亟急也平按旦乃敗亡素問作粗乃敗之別本旦作且注療者別本作療之故陽氣者一日而主外平旦人氣生日中而陽氣隆日西陽氣已虛氣門乃開是故暮而收距毋擾筋骨毋見霧露夫陽者生氣也陰者死氣也故陽氣一日而主外陰氣一夜而主內一日外者分為三時平旦人氣始生為少陽也日中人氣隆盛為太陽也日西人氣始衰為虛陽也陽氣虛者陰氣即開也陰氣開者即申酉戌少陰生也故暮須收距無令外邪入皮毛也亥子丑時即至陰也故至陰時無擾骨也寅卯辰即厥陰也故厥陰時無擾於筋見霧露也陰衰見濕因招寒濕病平按素問開作閉反此三時形乃困薄不順晝夜各三時氣以養生者必為病困迫於身薄迫也岐伯曰陰者藏精而極起者也陽者衛外而為固者也五臟藏精陰極而陽起也六腑衛外陽極而陰固也故陰陽相得不可偏勝也平按素問極起作起亟陰不勝其陽則其脈流薄疾並乃狂陽勝即人迎脈動或停或速是則陰並陽盛發為狂病平按素問脈上無其字陽不勝其陰五臟氣爭九竅不通陰勝則臟氣無衛故外九竅閉而不通也平按五臟上素問有則字是以聖人陳陰陽筋脈和同骨髓堅固氣血皆順如是則外內調和邪不能客耳目聰明氣立如故故聖人陳陰陽使人調內外之氣和而不爭也平按素問順作從外內作內外客作害風客淫氣精乃亡邪傷肝風客淫情之氣遂令陰盛施精不已故精亡也肝脈循陰入肝故精亡傷肝也平按注淫情情字別本作精因而飽食筋脈橫解腸澼為痔澼音僻泄膿血也肝主於筋亦生於血肝既傷已又因飽食穀氣盛迫筋脈解裂廣腸漏泄膿血名之為痔也平按腸澼袁刻誤作傷澼因而一飲則逆氣一者大也既已亡筋傷肝又因大飲則為逆氣之病也平按一素問作大因而強力腎氣乃傷高骨乃壞亡精傷肝復因力已入房故傷腎也腎以藏精主骨腎傷則大骨壞也高大也凡陰陽之要陰密陽固而兩者不和若春無秋若冬無夏因而和之是謂聖度腠理密不泄者乃內陰之力也五臟藏神固者外陽之力也故比四時和氣不得相無也因四時和氣和於身者乃是先聖法度也平按陰密陽固素問作陽密乃固故強不能陰氣乃絕陰氣衰者可以補陰更強入房瀉其陰故陰氣絕也平按故強不能素問作故陽強不能密袁刻於能下加一密字與原抄不合因於露風乃生寒熱精亡肝傷更得寒濕風邪邪風成者為寒熱病也平按素問此段上有陰平陽秘精神乃治陰陽離決精氣乃絕四句後二句本書見下文是以春傷於風邪氣流連乃為洞泄夏傷於暑秋為痎瘧秋傷於濕氣上逆而咳發為痿厥陰陽離決精氣乃絕冬傷於寒春乃病熱洞大貢反疾流也肺惡寒濕之氣故上逆咳也至冬寒濕變熱四肢不用名曰痿厥二氣離分不和故精氣絕也平按素問流連作留連春乃病熱作春必溫病四時之氣爭傷五臟也風寒暑濕四時邪氣爭而不和即傷五臟也陰之生本在五味身內五臟之陰因五味而生也平按素問生上有所字陰之五官陽在五味五臟陰之官也謂眼耳鼻口舌等五官之陽本於五味者也故五味內滋五臟五官於是用強也平按素問官作宮陽作傷是故味過酸肝氣以津肺氣乃絕夫五味者各走其臟得中則益傷多則損故傷酸者能令肝氣下流膀胱胞薄遂成於癃漏泄病也肺氣克肝今肝氣津泄則肺無所克故肺氣無用也平按肺素問作脾味過於咸則大骨氣勞短肌氣抑咸以資骨今咸過傷骨則脾無所克故肌肉短小脾氣壅抑也平按素問肌下有心字味過苦心氣喘滿色黑腎不衛苦以資心今苦過傷心喘滿嘔吐則腎氣無力故色黑而不能衛也平按素問苦作甘腎不衛作腎氣不衡味過於甘脾氣濡胃氣乃厚甘以資脾氣今甘過傷脾氣濡令心悶胃氣厚盛也平按素問甘作苦濡上有不字味過於辛筋脈沮弛精神乃英辛以資肺今辛多傷肺肺以主氣筋之氣壞泄於皮毛也心神克肺氣沮泄神氣英盛浮散無用也平按英素問作央王注作久字解新校正謂此論味過所傷不宜作精神長久解央乃殃也此古文簡略字多假借用也其說為長是故謹和五味則骨正筋柔氣血以流腠理以密謂五味各得其所者則咸能資骨故骨正也酸能資筋故筋柔也辛能資氣故氣流也苦能資血故血流也甘能資肉故腠理密也如是則氣骨以精謹道如法長有天命謹順也如是調養身者則氣骨常得精勝上順天道如先聖法則壽弊天地故長有天命也平按顧本素問氣骨作骨氣趙府本仍作氣骨陰陽雜說平按此篇自篇首至是謂得道見素問卷一第四金匱真言論自黃帝問於岐伯曰人有四經至陰陽相過曰彈見素問卷二第七陰陽別論自凡痹至痹聚在脾見素問卷十二第四十三痹論自陰爭於內至末見素問陰陽別論黃帝問於岐伯曰天有八風經有五風八風發邪氣經風觸五臟八風八正邪風也正月朔日有此八風發為邪氣傷人者也經風八虛風也謂五時八風從虛鄉來觸於五臟舍之為病也平按素問問下無於岐伯三字五風下有何謂岐伯對曰六字發邪下無氣字有以為二字注八正袁刻作八方按前調陰陽篇雖有邪賊句楊注云雖有八正虛風不能傷也依原抄作八正為是邪氣發病所謂得四時之脈者謂得四時相勝之脈以為候平按素問脈作勝別本亦作勝春勝長夏長夏勝冬冬勝夏夏勝秋秋勝春所謂得四時之勝也謂天風經風在身邪氣行於寸口有相勝之候平按素問無得字東風生於春病在肝輸在頸項東風從春生已與肝為病者肝之病氣運致於頸項頸項為春也平按注運致別本作逆致南方風生於夏病在心輸在胸脅胸脅當心故為夏也西方風生於秋病在肺輸在肩背肩背當肺故為秋也北方風生於冬病在腎輸在腰股腰股近腎故為冬也中央為土病在脾輸在脊故精者身之本也脊膂當脾故為仲夏也土為五穀之精以長四臟故為身之本也平按素問輸作俞下同南西北下均無方字故精者身之本也句在後故春氣者病在頭在頭頸項夏氣者病在臟臟謂心腹秋氣者病在肩背肩背為秋氣也冬氣者病在四肢冬為痹厥多在四肢故春喜病鼽衄傷寒春病在頭故喜鼽衄也夏喜病洞泄寒傷風夏病在臟故喜病洞泄寒中也平按素問寒作寒中夏作長夏在仲夏之後仲夏喜病胸脅傷溫夏病在胸脅故喜病胸脅秋喜病風瘧仲夏傷暑者秋喜病風瘧也冬喜病痹厥傷濕冬病故為痹厥故冬不按蹺春不病鼽衄春不病頸項夫冬傷寒氣在於腠理者以冬強勇按蹺多勞困腠理開寒氣入客今冬不作按蹺則無傷寒至春不患熱病鼽衄故春不病頸項者也蹺幾小反強勇兒也平按素問鼽上無病字夏不病洞泄寒中仲夏不病胸脅春傷風時多循於頭入於腑臟故至夏日作飧泄寒中病也所以春無傷風即無夏飧泄之病故至仲夏不病胸脅平按素問夏不病洞泄作長夏在仲夏不病胸脅下秋不病風瘧秋不病肩背胸脅仲夏不傷暑於胸脅至秋無瘧及肩背胸脅病也平按素問無秋不病肩背胸脅句冬不病痹厥飧泄而汗出藏於凊者至春不病溫冬病痹厥飧泄內虛又因汗出寒入藏於內故至春病溫是為冬傷於寒春為溫病所由者也平按凊素問作精藏於凊上素問有夫精者身之本也故八字夏暑汗不出者秋成風瘧小寒入腠理不得汗泄至秋寒氣感而成瘧也此平人脈法地也平人脈法要須知風寒暑濕四氣為本然後候知弦鉤毛沉四時脈也地即本也平按素問無地字岐伯曰陰中有陰陽中有陽平旦至日中天之陽陽中之陽也日中至昏天之陽陽中之陰也子午巳東晝為陽也卯酉巳北夜為陰故平旦至日中陽中之陽也日中至昏陽中之陰也平按岐伯曰素問作故曰昏上有黃字合夜至雞鳴天之陰陰中之陰也雞鳴至平旦天之陰陰中之陽也子午巳西夜為陰卯酉巳南晝為陽故合夜至雞鳴陰中之陰也雞鳴至平旦陰中之陽也故人亦應之人同陰陽故人亦有陽中之陽陽中之陰陰中之陰陰中之陽也夫言人之陰陽則外為陽內為陰皮毛膚肉在外為陽筋骨臟腑在內為陰言人身之陰陽則背為陽腹為陰背在胸上近頭故為陽也腹在胸下近腰故為陰也言人之身五臟中之陰陽則藏者為陰腑者為陽肺肝心脾腎五臟皆為陰膽胃大腸小腸三焦膀胱六腑皆為陽就身之中五臟藏於精神為陰六腑貯於水谷為陽也平按素問言人之身五臟中之陰陽作言人身之臟腑中之陰陽肺肝心脾腎作肝心脾肺腎三焦二字在膀胱下所以欲知陰中之陰而陽中之陽何也為冬病在陰夏病在陽春病在陰秋病在陽所以須知陰陽相在者以其四時風寒暑濕在陰陽也何者冬之所患咳嗽痹厥得之秋日傷濕陰也夏之所患飧泄病者得之春日傷風陽也春之所患溫病者得之冬日傷寒陰也秋之所患咳瘧病者得之夏日傷暑陽也平按注咳瘧恐系痎瘧之誤以上篇夏傷於暑秋為痎瘧也皆視其所在為施針石視瞻候也宜以三部九候瞻知所在然後命於針灸砭石湯藥導引五立療方施之不誤使十全者也故背為陽陽中之陽心也背為陽陽中之陰肺也心肺在膈以上又近背上所以為陽也心以屬火火為太陽故為陽中之陽也肺以屬金金為少陰故為陽中之陰也腹為陰陰中之陰腎也腹為陰陰中之陽肝也腎肝居膈以下又近下極所以為陰也腎以屬水水為太陰故為陰中之陰也肝以屬木木為少陽故為陰中之陽也腹為陰陰中之至陰脾也脾居腹中至陰之位以資四臟故為陰中之陰此皆陰陽表裡外內左右雌雄上下相輸應也故以應天之陰陽也五臟六腑即表裡陰陽也皮膚筋骨即內外陰陽也肝肺所主即左右陰陽也牝臟牡藏即雌雄陰陽也腰上腰下即上下陰陽也此五陰陽氣相輸會故曰合於天也平按素問外內作內外無左右上下四字問曰五臟應四時有放乎答曰有東方青色入通於肝開竅於目藏精於肝精謂木精也汁也三合藏之肝腑膽中也平按素問問曰作帝曰有放乎作各有收受乎其病發驚駭起怒亡魂故驚駭也其味辛肝味正酸而言辛者於義不通有云金剋木為妻故肝有辛氣平按素問辛作酸注而言辛袁刻作有本言辛其類草木五行各別多類故五行中各稱類也草木類同別也其畜雞其穀麥其應四時上為歲星春當歲星是以春氣在頭也其音角頭為身之初首故春氣在也其數八成數八是以知病在筋也其臭臊是知筋位居春故以病在筋也赤色入通於心火生於木心又屬火火色赤故通心平按赤色上素問有南方二字開竅於耳九卷云心氣通舌舌既非竅通於耳藏精於心心有七孔三毛盛精汁三合故病在五臟心為五臟主不得受於外邪受外邪則五臟皆病也其味苦酸酸為苦母並母言之故有苦酸平按素問無酸字其類火其畜羊其谷黍九卷云黃黍味辛苦味克辛仍金火相濟故並言之其應四時其星上為熒惑夏時上為熒惑以知病在脈也脈位居夏故病在脈其音徵其數七成數七也其臭焦黃色入通於脾胃五色皆自通臟不言其腑此言腑者以胃為四臟資糧故兼言也平按素問黃色上有中央二字脾下無胃字開竅於口藏精於脾精脾中散膏半斤主裹血溫五臟也故病在於舌本脾脈足太陽連舌本故夏病在舌本也其味甘其類土其畜牛其谷稷其應四時上為鎮星其脾王四季故季夏上為鎮星也故知病在肉也其音宮其數五脾肉在夏故有病在肉其數五謂生數其臭香白色入通於肺開竅於鼻藏精於肺精肺液也平按白色上素問有西方二字故病在於背肺為陽中之陰在背故病在背其味辛其類金其畜馬其谷稻九卷云粳米味甘黍味辛此中稻辛其應四時上為太白星秋時上為太白星故知病在皮毛皮毛在秋故病在皮毛也其音商其數九其臭腥九為成數黑色入通於腎開竅於二陰二陰謂前後陰也平按黑色上素問有北方二字藏精於腎精謂腎液病在於溪谷其味鹹其類水其畜豕其谷豆肉之大會為谷小會為溪肉分之間溪骨之會腎間動氣為原氣在溪谷間故冬病在也平按素問溪下無谷字豕作彘其應四時上為辰星冬時上為辰星以知病在骨骨氣在冬故病在骨其音羽其數六其臭腐六為成數岐伯曰善為脈者謹察五臟六腑逆順陰陽表裡雌雄之紀臟之心意合之於精非其人勿教非其人勿授是謂得道善候脈者須察臟腑之氣有逆有順陰陽表裡雌雄綱紀得之於心合於至妙然後教於人教於人之道觀人所能妙知聲色之情可使瞻聲察色諸如是等謂其人也教謂教童蒙也授謂授久學也如是行者可謂上合先聖人道也平按素問善上有故字無岐伯曰三字逆順二字作一逆一從四字合之於精作合心於精黃帝問於岐伯曰人有四經十二順四經謂四時經脈也十二順謂六陰爻六陽爻相順者也平按素問黃帝問下無於岐伯三字順作從下同下有何謂岐伯對曰六字四經應四時十二順應十二月肝心肺腎四脈應四時之氣十二爻應十二月十二月應十二脈十二經脈也脈有陰陽十二經脈六陰六陽知陽者知陰知陰者知陽妙知人迎之變即懸識氣口於氣口之動亦達人迎凡陽有五五五二十五陽五臟之脈於五時見隨一時中即有五脈五脈見時皆有胃氣即陽有五也五時脈見即有二十五陽數者也所謂陰者真臟其見則為敗敗必死於五時中五臟脈見各無胃氣唯有真臟獨見此為陰也平按其素問作也又素問死下有也字注為陰為字袁刻作所謂二字所謂陽者胃胞之陰陽胃胞之中苞裹五穀具五臟為糧此則真臟陰為陽故曰胃胞陰陽者也平按素問胞作脘陽上無陰字下有也字別於陽者知病之處陽胃氣也足陽明脈通於胃是以妙別陽明胃氣則諸脈受病所在並知之別於陰者知死生之期妙別五臟之脈即知死生有期三陽在頭三陰在手三陽行胃人迎之脈在頭三陰行太陰寸口之脈在手也所謂一也陰陽上下動如引繩故曰一也別於陽者知病忌時善別胃脈即和胃氣有無禁忌在於四時平按注和別本作知別於陰者知死生之期善別手太陰脈即知真臟脈之有無死生之期謹熟陰陽無與眾謀謹能純熟陰陽脈氣之道決於心者不復有疑故不與眾人謀議也所謂陰陽者去者為陰至者為陽動者為陽靜為陰數者為陽遲者為陰凡陰陽者去靜與遲皆為陰至動與數皆為陽平按素問靜下有者字靜者句在動者句上遲者句在數者句上凡持真臟之脈者肝至懸絕九日死有本為十八日平按素問藏之二字作脈之藏三字九作急十八三字心至懸絕九日死肺至懸絕十日死腎至懸絕五日死脾至懸絕四日死得真臟脈者死然死之期得五臟懸絕已去各以其臟之氣分晝日為數脈至即絕久而不來故曰懸絕平按素問十日作十二日五日作七日問曰二陽之病發心痹有不得隱曲女子不月其傳為息賁三日者死不治二陽者陽明也陽明謂手陽明大腸脈也足陽明胃脈也陽明所發心痹等病也隱曲大小便風消謂風熱病消骨肉也息賁賁隔也為隔息也平按素問曰上無問字痹作脾息賁下無三日二字曰三陽為病發寒熱下為癰腫及為痿厥喘悁其傳為索澤其傳為頹疝三陽太陽也謂手太陽小腸脈也足太陽膀胱脈也太陽所發寒熱等病悁季綿反憂患也索奪也憂恚不已傳為奪人色潤澤也平按素問喘悁作喘㾓曰一陽發病少氣喜咳喜泄傳為心瘛其傳為隔一陽少陽也手少陽三焦脈也足少陽膽脈也少陽發少氣等病隔塞也平按素問喜作善瘛作掣少氣原抄作小氣玩注宜作少素問亦作少又注少陽少字原抄亦作小恐系抄寫之誤謹更正二陽一陰發病生驚駭背痛喜噫喜欠名曰風厥二陽陽明也一陰厥陰也手厥陰心包脈也足厥陰肝脈也此二脈發驚駭等病風厥也平按素問生作主二陰一陽發病喜脹心滿喜氣二陰少陰也手少陰心脈也足少陰腎脈少陰少陽發喜脹等病平按注腎脈下袁刻有一陽少陽也五字三陽三陰發病為偏枯痿易四肢不舉三陽太陽也三陰太陰也手太陰肺脈也足太陰脾脈也太陰發偏枯等病也鼓一陽曰鉤曰鼓一陽少陽也少陽脈至手太陰寸口其脈鼓也鼓脈鼓動也一陽之鼓曰鉤也平按素問鉤下無曰字一陰曰毛一陰厥陰也厥陰脈至之寸口曰毛此陰脈不稱鼓也有本一曰陰曰毛也鼓陽勝隱曰弦脈鼓陽勝於隱曰弦平按素問隱作急別本隱上有陰字鼓陽至而絕曰石至者為陽也鼓陽至絕曰石也陰陽相過曰彈陰陽之脈至寸口相擊曰彈也平按彈素問作溜凡痹之客五臟者肺痹者煩則滿喘而歐邪氣客肺及手太陰故煩滿喘歐也平按素問煩下無則字歐作嘔心痹者不通煩則下鼓暴上氣而喘嗌乾喜噫厥氣上則恐邪氣客心及手太陽故上下不通煩則少腹故脹等病也平按素問不通上有脈字則上有心字喜作善注少腹故脹故恐系鼓字之誤肝痹者夜臥則驚多飲數小便上為演壞邪氣客肝及足厥陰脈厥陰脈系目及陰故臥驚數小便演當涎謂涎流壞中心也平按演壞素問作引如懷三字腎痹者善脹尻以伐踵脊以伐項邪客腎及少陰之脈故喜脹脊曲也平按素問善作喜兩伐字均作代項作頭脹下袁刻有足攣二字原抄無脾痹者四肢懈惰發咳歐汁上為大寒邪客脾及足太陰脈不得營於四肢故令懈惰又發脾咳胃寒歐冷水也平按素問懈惰作解墮歐作嘔寒作塞大腸痹者數飲出而不得中氣喘爭時發飧泄邪客大腸及手陽明脈大腸中熱大便難肺氣喘爭時有飧泄也平按素問腸上無大字出而作而出注爭字原抄作年謹依經文作爭胞痹者少腹膀胱按之兩髀若沃以湯澀於小便上為清涕膀胱盛尿故謂之胞即尿脬脬匹苞反邪客膀胱及足太陽膀胱中熱故按之髀熱下則小便有澀上則鼻清涕出也平按少腹原抄作少腸素問作少腹袁刻作小腸與原抄素問均異謹依素問作少腹兩髀素問作內痛新校正云全元起本作兩髀據此則全元起本與此相合若沃以湯湯字原抄作陽恐傳寫之誤謹依素問作湯別本亦作湯陰氣者靜則神藏躁則消亡五臟之氣為陰氣也六腑之氣為陽氣也人能不勞五臟之氣則五神各守其臟故曰神藏也賊郎反若怵惕思慮悲哀動中喜樂無極愁憂不解盛怒不止恐懼不息躁動不已則五神消滅傷臟者也飲食自倍腸胃乃傷凡人飲食胃實則腸虛腸實則胃虛腸胃更實更虛故得氣通長生久視若飲食自倍則氣不通夭人壽命也此則傷腑也淫氣喘息痹聚在肺淫過也喘息肺所為也喘息過者則肺虛邪客故痹聚也淫氣憂思痹聚在心憂思心所為憂思過者則心傷邪客故痹聚也淫氣歐唾痹聚在腎歐唾腎所為也歐唾過者則腎虛邪客故痹聚也平按歐唾素問作遺溺淫氣渴乏痹聚在肝肝以主血今有渴乏多傷血肝虛故痹聚也平按渴乏素問作乏竭淫氣飢絕痹聚在胃飢者胃少谷也飢過絕食則胃虛故痹聚淫氣雍塞痹聚在脾穀氣過塞則實而痹聚於脾也平按飢絕素問作肌絕下無痹聚在胃淫氣雍塞二句新校正云詳從上凡痹客五臟者至此全元起本在陰陽別論中此王氏所移據此則全元起本與太素同也陰爭於內陽擾於外魄汗未藏四逆而起起則動肺使人喘喝五臟為陰內邪陰氣以傷五臟故曰爭內六腑為陽外邪陽氣以侵六腑故曰擾外皮毛腠理也肺魄所主故汗出腠理名魄汗也藏猶閉也陰陽爭擾汗出腠理未閉寒氣因入四肢逆冷內傷於肺故使喘喝喝喘聲呼割反平按素問動作熏喝作鳴陰之所生和本曰味五臟所生和氣之本曰五味也平按素問味作和是故剛與剛陽氣破散陰氣乃消亡剛與剛陽盛也陽盛必衰故破散也無陽之陰必消亡也淖則剛柔不和經氣乃絕淖亂也音濁言陽散陰消故剛柔不和則十二經氣絕也平按素問此段下有死陰之屬不過三日而死生陽之屬不過四日而死數句本書在後岐伯曰所謂生陽死陰者肝之心謂之生陽木生火也心之肺謂之死陰火剋金也肺之腎謂之重陰少陰重至陰也腎之脾謂之闢陰死不治闢重疊至陰太陰重也結陽者腫四肢結聚結陰者便血一升再結二升三結三升血聚多至三升也陰陽結者針多陰少陽曰石水少腹腫少陰為水故多字誤也平按素問結下無者字針作斜石原抄作右恐誤素問作石腹腫二字原抄缺左方只餘右方復重二字謹依素問作腹腫三陽結謂之消消渴消中也三陽太陽平按素問三陽作二陽注消渴渴字袁刻誤作濁二陽結謂之隔便溲不通也二陽陽明也平按素問二作三三陰結謂之水三陰太陰一陰一陽結謂之喉痹厥陰少陽也陰搏陽別謂之有子陰脈聚陽脈不聚也陰陽虛腸闢陰陽腑臟脈皆虛者腸闢疊死平按素問闢下有死字死陰之屬不過三日而死生陽之屬不過四日而已陰陽死生期也平按素問此數語在經氣乃絕之下四日而已素問作四日而死新校正云按別本作四日而生全元起注本作四日而已俱通詳上下文義作死者非據此則全元起注本與此正合袁刻誤作四日而死陽加於陰謂之汗加勝之也陰虛陽搏謂之崩崩下血也三陰俱搏三十日夜半死太陰總得三陰之氣平按素問三十作二十二陰俱搏十五日夕死少陰總得二陰之氣平按素問十五作十三夕下有時字別本亦有時字一陰俱搏十日平旦死厥陰氣皆來聚故曰俱也平按顧本素問無平旦二字趙府本有三陽俱搏且鼓三日死三陽之脈聚而且鼓三陽三陰俱搏心腹滿發盡不得隱曲五日死二陽俱搏募病溫死不治不過十日死陽明之氣皆聚則陽明募病有本為幕也平按素問募作其
