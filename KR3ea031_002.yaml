body:
  text: 卷第二卷末缺攝生之二順養平按此篇自篇首至不致邪僻見靈樞卷六第二十九師傳篇自夫治民至不致邪僻見甲乙經卷六第二自久視傷血至久所病也見靈樞卷十二第七十八九針論又見素問卷七第二十三宣明五氣篇自春至末見素問卷一第二四時調神大論又見甲乙經卷一第二黃帝曰余聞先師有所心藏弗著於方余願聞而藏之則而行之先師心藏比斫輪之巧不可遂不著於方也又上古未有文著暮代也非文不傳故請方傳之藏而則之平按有所心藏所字原缺之則而行四字原缺謹依靈樞補入注斫輪之巧袁刻巧誤作功不可下原缺二字暮代上原缺三字袁刻不缺謹依原抄以存真相上以治民下以治身先人後己大聖之情也使百姓無病上下和親德澤下流理國之意子孫無憂理家之意傳於後世無有終時可得聞乎言其益遠平按終時別本作終始岐伯曰遠乎哉問夫治民與治自治彼與治此治小與治大治國與治家未有逆而能治者也夫唯順而已矣人之與己彼此大小國家八者守之取全循之取美須順道德陰陽物理故順之者吉逆之者凶斯乃天之道平按岐素問靈樞均作歧下同不再舉治自別本作治身靈樞甲乙經均作自治順者非獨陰陽脈論氣之逆順也百姓人民皆欲順其志也非獨陰陽之道十二經脈營衛之氣有逆有順百姓之情皆不可逆是以順之有吉也故曰聖人無常心以百姓為心也志願也黃帝曰順之奈何岐伯曰入國問俗入家問諱上堂問禮臨病人問所便夫為國為家為身之道各有其理不循其理而欲正之身者未之有也所以並須問者欲各知其理而順之也俗諱禮便人之理也陰陽四時天地之理也存生之道缺一不可故常問之也便宜也謂問病人寒熱等病量其所宜隨順調之故問所便者也平按自上節順者至本節岐伯曰甲乙經無此文注其理二理字袁刻均作禮所便下原抄本有者字袁刻無黃帝曰便病人奈何言何方而知其所便也平按甲乙經病下無人字岐伯曰夫人中熱消疸則便寒寒中之屬則便熱中腸胃中也腸胃中熱多消飲食即消疸病也疸熱也音丹熱中宜以寒調寒中宜以熱調解其便也平按夫人人字靈樞甲乙經均無注疸病下原有也字寒調上原有以字袁刻均無謹依原抄本補入胃中熱則消穀令人懸心善飢齊以上皮熱自此以下廣言熱中寒中之狀胃中熱以消穀虛以喜飢胃在齊上胃中食氣上熏故皮熱也腸中熱則出黃如糜齊以下皮寒陽上陰下胃熱腸冷自是常理今胃中雖熱不可過熱過熱乖常腸中雖冷不可不和不和則多熱出黃腸冷多熱不通故齊下皮寒也平按糜下甲乙經有色字齊靈樞甲乙經均作臍上同胃中寒則䐜脹腸中寒則腸鳴飧泄䐜叱鄰反張起也飧音孫謂食不消下泄如水和飯也冷氣不下故多脹腸中冷而氣轉故腸鳴也平按䐜靈樞作腹甲乙經作填胃中寒腸中熱則脹且泄以上腸胃俱熱俱寒此乃胃寒腸熱俱下時也脹是胃寒泄是腸熱腸中不可熱令熱則腸中不和故脹且泄也平按脹下靈樞有而字注令熱袁刻作今熱胃中熱腸中寒則疾飢少腹痛此胃熱腸寒俱時胃熱故疾飢腸寒故腹痛也平按痛下靈樞甲乙經均有脹字黃帝曰胃欲寒飲腸欲熱飲兩者相逆便之奈何且夫王公大人血食之君驕恣從欲輕人而無能禁之禁之則逆其志順之則加其病便之奈何治之何先胃中常熱故欲滄滄而飲腸中恆冷故欲灼灼而食寒熱乖和則損於性命若從欲則加病逆志則生怒二者不兼故以先為問也平按寒飲靈樞飲作飢岐伯曰人之情莫不惡死而樂生告之以其馭語之以其道示以其所便開之以其所苦雖有無道之人惡有不聽令者乎正可逆志以取其所樂不可順欲而致其所苦故以道語之無理不聽也平按靈樞馭作敗其道作其善示以其所便作道之以其所便聽令者乎作聽者乎注理字疑衍袁刻無黃帝曰治之奈何岐伯曰春夏先治其標後治其本秋冬先治其本後治其標本謂根與本也標末也方昭反謂枝與葉也春夏之時萬物之氣上升在標秋冬之時萬物之氣下流在本候病所在以行療法故春夏取標秋冬取本也黃帝曰便其相逆者奈何謂適於口則害於身違其心而利於體者奈何平按甲乙經相逆作先逆岐伯曰便此者食飲衣服亦欲適寒溫寒無悽悽暑無出汗食飲者熱毋灼灼寒毋滄滄滄滄寒也音倉寒無淒等謂調衣服也熱毋灼等謂調食飲也皆逆其所便也平按悽悽靈樞甲乙經均作悽愴寒溫中適故氣將持乃不致邪僻五臟之中和適則其真氣內守外邪不入病無由生平按將持甲乙經作搏持邪僻下靈樞有也字久視傷血夫為勞者必內有所損然後血等有傷役心注目於色久則傷心心主於血故久視傷血平按注役心役字別本作侵久臥傷氣人臥則肺氣出難故久臥傷肺肺傷則氣傷也久坐傷肉人久靜坐脾則不動不動不使故久坐傷脾脾傷則肉傷也久立傷骨人之久立則腰腎勞損腎以主骨故骨髓傷也久行傷筋人之久行則肝膽勞損肝傷則筋傷也此久所病也平按此久所病也靈樞作此五久勞所病也春三月此謂發陳陳舊也言春三月草木舊根舊子皆發生也天地俱生萬物以榮天之父也降之以德地之母也資之以氣德之與氣俱能生也物因德氣英華開發也夜臥蚤起春之三月主膽肝之府足少陽用事陰消陽息故養陽者至夜即臥順陰消也蚤字古早字旦而起順陽息也平按蚤素問巢氏病源均作早注主膽肝之府袁刻作主肝膽之府謹按主膽二字為句肝之府三字為句膽為足少陽經與足厥陰經肝經為表裡於義既足玩下文小腸心之府注自明廣步於庭被髮緩形以使志生廣步於庭勞以使志也被髮緩形逸以使志也勞逸處中和而生也故其和者是以內攝生者也生而勿殺豫而勿奪賞而勿罰此春氣之應也養生之道也生豫賞者順少陽也殺奪罰者逆少陽也故順成和則外攝生也內外和順春之應也斯之順者為身為國養生道也平按素問應下無也字逆則傷於肝夏為寒為變奉生長者少肝氣在春故晚臥形晚起逸體急形殺奪罰者皆逆少陽也故其為身者逆即傷肝夏為傷寒熱病變也其為國也霜雹風寒災害變也春時內外傷者奉夏生長之道不足也平按素問逆則傷於肝作逆之則傷肝夏為寒為變作夏為寒變奉下無生字巢氏病源夏字下有變字寒下無為變二字注晚臥下形字恐衍文袁刻無夏三月此謂蕃秀蕃伐元反茂也夏三月時萬物蕃滋茂秀增長者也天地氣交萬物英實陰陽氣和故物英華而盛實也平按素問英作華晚臥蚤起夏之三月主小腸心之腑手太陽用事陰虛陽盈故養陽者多起少臥也晚臥以順陰虛蚤起以順陽盈實也平按素問晚作夜無厭於日使志無怒日者為陽故不可厭之怒者為陰故使志無怒之使英成秀使氣得泄使物華皆得秀長使身開腠氣得通泄也平按素問英上有華字泄作泄下同不再舉若所愛在外此夏氣之應也養生之道也內者為陰外者為陽諸有所愛皆欲在陽此之行者應太陽之氣養生之道也平按素問應下無也字生作長巢氏病源同逆之則傷心秋為痎瘧則奉收者少冬至重病蚤臥晚起厭日生怒傷英不秀壅氣在內皆逆太陽氣也故夏為逆者則傷乎心秋為痎瘧奉秋收之道不足得冬之氣成熱中病重也平按素問奉上無則字巢氏病源無則奉收者少冬至重病二句秋三月此謂容平夏氣盛長至秋也不盛不長以結其實故曰容平也天氣以急地氣以明天氣急者風清氣涼也地氣明者山川景淨也蚤臥蚤起與雞俱興秋之三月主肺臟手太陰用事陽消陰息故養陰者與雞俱臥順陰息也與雞俱起順陽消也使志安寧以緩秋形春之緩者緩於緊急秋之緩者緩於滋盛故寧志以緩形平按素問形作刑收斂神氣使秋氣平夏日之時神氣洪散故收斂順秋之氣使之和平也平按注洪袁刻作渙無外其志使肺氣精此秋氣之應也養收之道也攝志存陰使肺氣之無雜此應秋氣養陰之道也平按素問精作清應下無也字巢氏病源同逆之則傷肺冬為飧泄則奉養者少晚臥晚起志不寧者秋時以逆太陰氣秋即傷肺至冬飧泄奉冬養之道少也平按素問奉養作奉藏巢氏病源無則奉養者少句冬三月此謂氣閉藏陰氣外閉陽氣內藏平按素問無氣字巢氏病源同水冰地坼敕白反分也毋擾於陽言居陰分故毋擾陽平按於素問作乎蚤臥晚起冬之三月主腎臟足少陰用事陽虛陰盈故養陰者多臥少起蚤臥順陽虛晚起順陰盈也必待日光使志若伏匿伏匿靜也臥盡陰分使志靜也平按素問匿上有若字若有私意若已有德去寒就溫言十一月陰去陽來故養陰者凡有私意諸有所得與陰俱去順陽而來無相擾也平按有德素問巢氏病源均作有得玩本注亦作得恐系傳寫之訛毋泄皮膚使氣不極此冬氣之應也養藏之道也閉諸腠理使氣不泄極也斯之行者應冬腎氣養陰之道也平按素問不極作亟奪逆之則傷腎春為痿厥則奉生少也早起晚臥不待日光志氣外泄冬為逆者傷腎痿厥奉春養生之道少也痿厥不能行也一曰偏枯也於危反平按素問則奉生少也作奉生者少天氣清靜光明者也天道之氣清虛不可見安靜不可為故得三光七耀光明者也玄元皇帝曰虛靜者天之明也平按靜顧本素問作淨趙府本仍作靜藏德不上故不下天設日月列星辰張四時調陰陽日以曝之夜以息之風以干之雨露濡之其生物也莫見其所養而物長其所殺也莫見其所喪而物亡此謂天道藏德不上故不下者也聖人象之其起福也不見其所以而福起其除禍也不見其所由而禍除則聖人藏德不上故不下也玄元皇帝曰上德不德是以有德即其事也平按素問上作止新校正云別本亦作上上下則日月不明君上情在於己有私修德遂不為德玄元黃帝曰下德不失德是以無德君之無德則令日月薄蝕三光不明也平按素問上下作天明邪害空竅空竅謂三百六十五穴也君不修德和陽氣者則疵癘賊風入人空竅傷害人也陽氣閉塞地氣冒明陽氣失和故令陰氣冒復三光平按兩氣字下素問均有者字云露不精則上應甘露不下陰氣失和致令云露無潤澤之精無德應天遂使甘露不降陰陽不和也言白露者恐後代字誤也平按素問云露作雲霧甘露作白露交通不表萬物命故不施陰陽不得交通則一中分命無由布表生於萬物德澤不露故曰不施也不施則名木多死惡氣發風雨不節甘露不下則菀藁不榮賊風數至暴雨數起天地四時不相保乃道相失則未央絶滅盜誇之君德不施布禍及昆蟲災延草木其有八種一者名木多死謂名好草木不黃而落二者惡氣發謂毒氣疵癘流行於國三者風雨不節謂風不時而起云不族而雨四者甘露不下謂和液無施菀藁當為宛稿宛痿死稿枯也於阮反陳根舊枝死不榮茂五者賊風數至謂風從衝上來破屋折木先有虛者被克而死六者暴雨數起謂驟疾之雨傷諸苗稼七者天地四時不相保謂陰陽乖繆寒暑無節八者失道未央絶滅未央者久也言盜誇之君絶滅方久也平按素問惡氣發作惡氣不發甘露作白露乃道作與道唯聖人順之故身無奇疾萬物不失生氣不竭唯聖人順天藏德不止故有三德一者身無奇疾奇異邪氣不及於身也二者萬物不失澤及昆蟲恩沾草木各得生長也三者生氣不竭生氣和氣也和氣不竭致令云露精潤甘露時降也平按素問順作從疾作病逆春氣則少陽不生而肝氣內變少陽足少陽膽府脈為外也肝臟為陰在內也故腑氣不生臟氣變也逆夏氣則太陽不長心氣內洞太陽手太陽小腸腑脈在外也心臟為陰居內也故腑氣不生臟氣內洞洞疾流泄也逆秋氣則太陰不收肺氣焦漏太陰手太陰肺之脈也腠理豪毛受邪入於經絡則脈不收聚深入至臟故肺氣焦漏焦熱也漏泄也平按焦漏素問作焦滿新校正云焦滿全元起本作進滿甲乙經太素作焦滿玩本注焦熱也漏泄也若作滿於泄字義不合仍從原抄本作焦漏為是逆冬氣則少陰不藏腎氣濁沉少陰足少陰腎之脈也少陰受邪不藏能靜深入至臟故腎氣濁沉不能營也平按濁沉素問作獨沉新校正云詳獨沉太素作沉濁與此亦異甲乙經作濁沉同此失四時陰陽者失萬物之根也陰陽四時萬物之本也人君違其本故萬物失其根平按素問作夫四時陰陽者萬物之根本也是以聖人春夏養陽秋冬養陰以順其根故與萬物沉浮於生長之門聖人與萬物俱浮即春夏養陽也與萬物俱沉即秋冬養陰也與萬物沉浮以為養者志在生長之門也平按順素問作從下同逆其根則伐其本壞其真逆四時之根者則伐陰陽之本也壞至真之道也故陰陽四時者萬物之終始也死生之本也逆之則災害生順之則奇疾不起是謂得道陰為萬物終始之本也陽為萬物始生之源也逆之則災害生入於死地也順之則奇疾除得長生之道也平按甲乙經無四時二字素問奇疾作苛疾道者聖人行之愚者佩之聖人得道之言行之於身寶之於心府也愚者得道之章佩之於衣裳寶之於名利也順陰陽則生逆之則死順之則治逆之則亂生死在身理亂在國反順為逆是謂內格不順四時之養身內有關格之病也是故聖人不治已病治未病不治已亂治未亂此之謂也夫病已成形而後藥之亂成而後治之譬猶渴而穿井鬥而鑄兵亦不晚乎身病國亂未有豪微而行道者古之聖人也病亂已微而散之者賢人之道也病亂已成而後理之者衆人之失也理之無益故以穿井鑄兵無救之失以譬之也平按素問病已成下無形字亂下有已字鑄兵作鑄錐亦不晚乎作不亦晚乎六氣平按此篇見靈樞卷六第三十決氣篇又見甲乙經卷一第十二黃帝曰余聞人有精氣津液血脈余意以為一氣耳今乃辨為六名余不知其所以願聞何謂精一氣者真氣也真氣在人分一以為六別故惑其義也平按靈樞所以下有然字無願聞何謂精句岐伯曰兩神相薄合而成形常先身生是謂精但精及津液與氣異名同類故皆稱氣耳雄雌二靈之別故曰兩神陰陽二神相得故謂之薄和為一質故曰成形此先於身生謂之為精也平按薄靈樞甲乙經均作搏何謂氣下焦如瀆謂之津液中焦如漚謂之為營血上焦如霧為衛稱氣未知所由平按甲乙經無何謂氣岐伯曰六字岐伯曰上焦開發宣五穀味熏膚燻肉充身澤毛若霧露之溉是謂氣上焦開發宣揚五穀之味熏於膚肉充身澤毛若霧露之溉萬物故謂之氣即衛氣也平按靈樞甲乙經均無燻肉二字何謂津岐伯曰腠理發泄汗出腠理是謂津腠理所泄之汗稱之為津平按汗出腠理靈樞作汗出溱溱何謂液岐伯曰穀氣滿淖澤注於骨骨屬屈伸光澤補益腦髓皮膚潤澤是謂液淖卓反濡潤也通而言之小便汗等皆稱津液今別骨節中汁為液故餘名津也五穀之精膏注於諸骨節中其汁淖澤因屈伸之動流汁上補於腦下補諸髓旁益皮膚令其潤澤稱之為液平按穀氣滿靈樞甲乙經作谷入氣滿光澤靈樞作泄澤甲乙經作出泄何謂血岐伯曰中焦受血於汁變化而赤是謂血五穀精汁在於中焦注手太陰脈中變赤循脈而行以奉生身謂之為血也平按中焦受血於汁靈樞作中焦受氣取汁甲乙經作中焦受汁何謂脈岐伯曰壅遏營氣令毋所避是謂脈盛壅營血之氣日夜營身五十周不令避散故謂之脈也平按甲乙經壅作擁黃帝曰六氣者有餘不足氣之多少腦髓之虛實血脈之清濁何以知之六氣之中有餘不足總問也腦髓等別問取其所知也平按注取別本作求岐伯曰精脫者耳聾腎以主耳故精脫則耳聾氣脫者目不明五臟精氣為目故氣脫則目暗津脫則腠理開汗大泄前之二脫言脫所由故有脫也以下三脫直著其脫狀故津脫腠理開汗泄為狀液脫者骨屬屈伸不利色夭腦髓消胻酸耳數鳴骨節相屬之處無液故屈伸不利無液潤澤皮毛故色夭腦髓無補故腦髓消胻酸耳鳴胻衡孟反平按甲乙經骨屬作骨痹靈樞胻作脛血脫者色白夭然不澤其脈空虛此其候也以無血故色白無血潤膚故不澤脈中無血故空虛以為不足虛之狀也平按不澤下甲乙經有脈脫者三字黃帝曰六氣者貴賤何如岐伯曰六氣者各有部主也其貴賤善惡可為常主然五穀與為大海六氣有部有主有貴有賤有善有惡人之所受各有其常皆以五穀為生成大海者也平按與為大海靈樞甲乙經均作與胃為大海也九氣平按此篇見素問卷十一第三十九舉痛論篇又見甲乙經卷一第一黃帝曰余聞百病生於氣也怒則氣上喜則氣緩悲則氣消恐則氣下寒則氣收聚炅則腠理開氣泄憂則氣亂勞則氣耗思則氣結九氣不同何病之生炅音桂熱也人之生病莫不內因怒喜思憂恐等五志外因陰陽寒暑以發於氣而生百病所以善攝生者內除喜怒外避寒暑故無道夭遂得長生久視者也若縱志放情怒以氣上傷魂魂傷肝傷也若喜氣緩傷神神傷心傷也若憂悲氣消亦傷於魂魂傷肝傷也恐以氣下則傷志志傷腎傷也若多寒則氣收聚內傷於肺也若多熱腠理開泄內傷於心也憂則氣亂傷魄魄傷則肺傷也若多勞氣耗則傷於腎思以氣結傷意意傷則脾傷也五臟既傷各至不勝時則致死也皆由九邪生於九氣所生之病也平按素問余聞作余知氣收下無聚字氣泄上無腠理開三字憂作驚新校正云按太素驚作憂與此正合又注傷魄魄傷二魄字原抄作魂原校作魄按經文云肺藏氣氣舍魄又云肺在志為憂作傷魄亦合岐伯曰怒則氣逆甚則歐血及食而氣逆上也因引氣而上故氣逆怒甚氣逆則致歐血及食氣逆上也平按食而氣逆素問作飧泄按新校正云按甲乙經太素作食而氣逆與此正合喜則氣和志達營衛行通利故氣緩焉喜則氣和志達營衛行利故氣緩為病也平按通上素問甲乙經均無行字悲則心系急肺布葉舉兩焦不通營衛不散熱氣在中故氣消肝脈上入頏顙連目系支者從肝別貫膈上注肺肺以主悲中上兩焦在於心肺悲氣聚於肺葉舉心系急營衛之氣在心肺聚而不散神歸不移所以熱而氣消虛也平按素問兩焦不通作而上焦不通新校正云按甲乙經太素作兩焦不通與此正合又王注釋布葉謂布蓋之大葉新校正疑非是復引全元起云悲則損於心心系急則動於肺肺氣系諸經逆故肺布而葉舉安得謂肺布為肺布蓋之大葉據此則全注與本注意合恐則精卻卻則上焦閉閉則氣還還則下焦脹故氣不行雖命門藏精通名為腎脈起腎上貫肝膈入肺中支者從肺絡心注胸中故人驚恐其精卻縮上焦起胃口上上焦既閉不通則氣不得上還於下焦下焦脹滿氣不得行平按精卻甲乙經作神卻又素問新校正云氣不行當作氣下行玩本注仍當作氣不行熱則腠理開營衛通故汗大泄氣不得行或因熱而腠理開營衛外通汗大泄也平按素問甲乙經熱作炅素問故汗大泄作汗大泄故氣泄寒則腠理閉氣不行故氣收聚因營衛不通遇寒則腠理閉塞則氣聚為病也平按寒則腠理閉甲乙經無此三句素問在炅則腠理開三句之前聚素問作矣憂則心無所寄神無所歸慮無所定故氣亂心神之用人之憂也忘於衆事雖有心情無所任物故曰無所寄氣營之處神必歸之今既憂繁氣聚不行故神無歸也慮亦神用也所以憂也不能逆慮於事以氣無主守故氣亂也平按素問甲乙經憂均作驚新校正云太素驚作憂寄素問甲乙經均作倚注心情別本作心精勞則喘喝汗出內外皆越故氣耗人之用力勞乏則氣並喘喝皮腠及內臟腑皆汗以汗即是氣故汗出內外氣衰耗也平按喘喝顧本素問作喘息趙府本作喘且甲乙同內外素問作外內思則身心有所存神有所止氣留而不行故氣結矣專思一事則心氣駐一物所以神務一物之中心神引氣而聚故結而為病也平按身素問甲乙經均無甲乙經存作傷素問止作歸正新校正云按甲乙經歸正二字作止字氣留甲乙經作氣流調食平按此篇自篇首至皆辛見靈樞卷八第五十六五味篇又見甲乙經卷六第九惟編次前後稍異自肝色青至五味所宜見素問卷七第二十二藏氣法時論自黃帝問少俞曰至走肉矣見靈樞卷九第六十三五味論自五味至末見靈樞卷十二第七十八九針論又見素問卷七第二十三宣明五氣篇黃帝曰願聞穀氣有五味其入五臟分別奈何穀氣津液味有五種各入其五臟別之奈何伯高曰胃者五臟六腑之海也水穀皆入於胃五臟六腑皆稟於胃胃受水穀變化以滋五臟六腑五臟六腑皆受其氣故曰皆秉也平按甲乙經伯高曰作岐伯對曰無水穀二字稟下靈樞有氣字五味各走其所喜穀味酸先走肝穀味苦先走心穀味甘先走脾穀味辛先走肺穀味咸先走腎五味所喜謂津液變為五味則五性有殊性有五行故各喜走同性之臟平按甲乙經自穀味酸以下至走腎文法與此不同而義意相類穀氣津液已行營衛大通乃化糟粕以次傳下水穀化為津液清氣猶如霧露名營衛行脈內外無所滯礙故曰大通其沉濁者名為糟粕泌別汁入於膀胱故曰以次傳下也粕頗洛反平按甲乙經穀氣下有營衛俱行四字糟粕上無化字黃帝曰營衛之行奈何因前營衛大通之言故問營衛所行平按甲乙經之行作俱行伯高曰谷始入於胃其精微者先出於胃之兩焦以既五臟別出兩行於營衛之道精微津液也津液資五臟已衛氣出胃上口營氣出於中焦之後故曰兩行道也平按既靈樞甲乙經均作溉行上甲乙經有焦字其大氣之搏而不行者積於胸中命曰氣海出於肺循喉嚨故呼則出吸則入搏謗各反聚也谷化為氣計有四道精微營衛以為二道化為糟粕及濁氣並尿其與精下傳復為一道搏而不行積於胸中名氣海以為呼吸復為一道合為四道也平按甲乙經命曰作名曰靈樞嚨作咽天之精氣其大數常出三入一故谷不入半日則氣衰一日則氣少矣天之精氣則氣海中氣也氣海之中谷之精氣隨呼吸出入也人之呼也谷之精氣三分出已及其吸也一分還入即須資食充其腸胃之虛以接不還之氣若半日不食則腸胃漸虛穀氣衰也一日不食腸胃大虛穀氣少也七日不食腸胃虛竭穀氣皆盡遂命終也平按天之精氣靈樞甲乙經作天地之精氣黃帝曰谷之五味可得聞乎伯高曰請盡言之充虛接氣內谷為寶故因其問請盡言之五穀五穀五畜五果五菜用之充飢則謂之食以其療病則謂之藥是以脾病宜食粳米即其藥也用充飢虛即為食也故但是入口資身之物例皆若是此谷畜果菜等二十物乃是五行五性之味臟腑血氣之本也充虛接氣莫大於茲奉性養生不可斯須離也黃帝並依五行相配相剋相生各入臟腑以為和性之道也案神農及名醫本草左右不同各依其本具録注之冀其學者量而取用也粳米飯甘味苦平無毒稻米味甘溫生平按靈樞粳作粳音庚靈樞甲乙經均無飯字注生原抄作生原校作平麻酸胡麻味甘平麻子味甘平大豆咸大豆黃卷味甘平無毒生大豆味甘平麥苦大麥味鹹溫微寒無毒似穬麥無皮穬麥味甘微寒無毒小麥味甘微寒無毒黃黍辛丹黍米味苦微溫無毒黍米味甘溫無毒五果棗甘大棗味甘平殺烏頭毒生棗味辛李酸仁味苦甘平無毒實味苦平按注仁別本作李栗咸栗味鹹溫無毒杏苦核味甘苦溫花味苦無毒實味酸桃辛核味苦甘平無毒實味酸五畜牛甘肉味甘平無毒犬酸牝犬肉味鹹酸無毒豬咸肉味苦平按甲乙經豬作豕下同羊苦味甘大熱無毒雞辛丹雄雞味甘微溫微寒無毒白雄雞肉微溫烏雄雞肉溫也平按甲乙經牛犬豕羊雞下均有肉字五菜葵甘冬葵子味甘寒無毒黃芩為之使葵根味甘寒無毒葉為百菜主心傷人韭酸味辛酸溫無毒藿咸案別録小豆葉為藿薤苦味辛苦溫無毒蔥辛蔥實味辛溫無毒根主傷寒頭痛汁平五色黃色宜甘青色宜酸黑色宜咸赤色宜苦白色宜辛養生療病各候五味之外色以其味益之也平按甲乙經黃青黑赤白下均無色字凡此五者各有所宜所言五宜者脾病者宜食粳米飯牛肉棗葵脾病食甘素問甘味補苦味為瀉平按所言五宜者靈樞作五宜所言五色者心病者宜食麥羊肉杏薤心病食苦素問鹹味補甘味為瀉腎病者宜食大豆黃卷豬肉栗藿腎病食鹹素問鹹味瀉苦味為補也黃卷以大豆為之肝病者宜食麻犬肉李韭肝病食酸素問酸味瀉辛味為補肺病者宜食黃黍雞肉桃蔥肺病食辛素問辛味瀉酸味為補平按甲乙經黍上無黃字五禁肝病禁辛心病禁咸脾病禁酸腎病禁甘肺病禁苦五味所克之臟有病宜禁其能克之味肝色青宜食甘粳米飯牛肉棗皆甘肝者木也甘者土也宜食甘者木克於土以所克資肝也平按素問無飯字棗下靈樞素問均有葵字心色赤宜食酸犬肉李皆酸心者火也酸者木也木生心也以母資子也平按食酸下素問有小豆二字新校正云太素小豆作麻應依新校正補入犬肉下靈樞有麻字李下素問靈樞均有韭字脾色黃宜食鹹大豆豕肉栗皆咸脾者土也咸者水也土克於水水味鹹也故食鹹以資於脾也平按栗下素問靈樞均有藿字素問此段在肺色白段之下肺色白宜食苦麥羊肉杏皆苦肺者金也苦者火也火克於金也以能克為資也平按杏下素問靈樞均有薤字腎色黑宜食辛黃黍雞肉桃皆辛腎者水也辛者金也金生於水以母資子平按桃下素問靈樞均有蔥字辛散肝酸性收欲得散者食辛以散之酸收肺辛性散欲得收者食酸以收之甘緩脾甘性緩欲得緩者食甘以緩之苦堅心苦性堅欲得堅者食苦以堅之咸濡腎咸性濡欲得濡者食鹹以濡也平按濡素問作耎下同毒藥攻邪前總言五味有攝養之功今説毒藥攻邪之要邪謂風寒暑濕外邪者也毒藥俱有五味故次言之五穀為養五穀五味為養生之主也五果為助五果五味助谷之資五畜為益五畜五味益谷之資五菜為埤五菜五味埤谷之資平按埤素問作充袁刻作稗恐誤氣味合而服之以養精益氣谷之氣味入身養人五精益人五氣也此五味者有辛酸甘苦鹹各有所利或散或收或緩或堅或濡五味各有所利利五臟也散收緩堅濡等調五臟也平按素問五下無味字四時五臟病五味所宜於四時中五臟有所宜五味有所宜平按素問病下有隨字黃帝問少俞曰五味之入於口也各有所走各有所病酸走筋多食之令人癃力中反淋也篆字癃也平按癃漢書高祖本紀年老癃病勿遺作癃乃古文癃字也咸走血多食之令人渴辛走氣多食之令人洞心大貢反心氣流泄疾苦走骨多食之令人變歐甘走肉多食之令人心悗余知其然也不知其何由願聞其故五味各走五臟所主益其筋血氣骨肉等不足皆有所少有餘並招於病其理是要故請聞之平按靈樞歐作嘔下同少俞對曰酸入胃其氣澀以收上之兩焦弗能出入也澀所敕反不滑也酸味性為澀收故上行兩焦不能與營俱出而行復不能自反還入於胃也不出則留於胃中胃中和溫即下注膀胱膀胱之胞薄以濡得酸即縮卷約而不通水道不通故癃既不能出胃因胃氣熱下滲膀胱之中膀胱皮薄而又耎故得酸則縮約不通所以成病為癃癃淋也胞苞盛尿也平按靈樞濡作懦陰者積筋之所終也故酸入走筋人陰器一身諸筋終聚之處故酸入走於此陰器黃帝曰咸走血多食之令人渴何也少俞曰鹹入於胃其氣上走中焦注於脈則血氣走之血與咸相得則血涘血涘則胃汁注之注之則胃中竭竭則咽路焦故舌乾善渴腎主於骨鹹味走骨言走血者以血為水也鹹味之氣走於中焦血脈之中以咸與血相得即澀而不中胃汁注之因即胃中枯竭咽焦舌乾所以渴也咽為下食又通於涎故為路也涘音俟水崖義當凝也平按靈樞血涘血涘四字作凝凝二字汁上有中字舌下有本字血脈者中焦之道也故鹹入而走血矣血脈從中焦而起以通血氣故味之鹹味走於血也黃帝曰辛走氣多食之令人洞心何也少俞曰辛入於胃其氣走於上焦上焦者受氣而營諸陽者也洞通泄也辛氣慓悍走於上焦上焦衛氣行於脈外營腠理諸陽薑韭之氣熏之營衛之氣不時受之久留心下故洞心以薑韭之氣辛熏營衛之氣非時受之則辛氣久留心下故令心氣洞泄也辛者與氣俱行故辛入而與汗俱出矣辛走衛氣即與衛氣俱行故辛入胃即與衛氣汗俱出也黃帝曰苦走骨多食之令人變歐何也少俞曰苦入於胃五穀之氣皆不能勝苦苦入下管三焦之道皆閉而不通故變歐苦是火味計其走血以取資骨令堅故苦走骨也苦味堅強五穀之氣不能勝之故入三焦則營衛不通下焦復約所以食之還出名曰變歐也平按靈樞管作脘齒者骨之所終也故苦入而走骨齒為骨余以楊枝苦物資齒則齒鮮好故知苦走骨故入而復出知其走骨人食苦物入咽還出故知走骨而出歐也黃帝曰甘走肉多食之令人心悗何也少俞曰甘入於胃其氣弱少不能上於上焦而與谷留於胃中甘者令人柔潤者也胃柔則緩緩則蟲動蟲動則令人心悗甘味氣弱不能上於上焦又令柔潤胃氣緩而蟲動蟲動者谷蟲動也谷蟲動以撓心故令心悗悗音悶平按靈樞弱少作弱小於上焦作至於上焦中下無甘字心悗作悗心其氣外通於肉故曰甘入走肉矣脾以主肉甘通於肉故甘走肉也五味所入酸入肝辛入肺苦入心甘入脾鹹入腎淡入胃是謂五味五味各入其臟甘味二種甘與淡也谷入於胃變為甘味未成曰淡屬其在於胃已成為甘走入於脾也平按靈樞無所入二字素問無淡入胃三字新校正云太素又云淡入胃與此正合五走酸走筋辛走氣苦走血咸走骨甘走肉是謂五走九卷此文及素問皆苦走骨咸走血此文言苦走血咸走骨皆左右異具釋於前也五裁病在筋無食酸病在氣無食辛病在骨無食鹹病在血無食苦病在肉無食甘口嗜而欲食之不可多也必自裁也命曰五裁裁禁也筋氣骨肉血等乃是五味所資以理食之有益於身從心多食致招諸病故須裁之平按素問宣明五氣篇注新校正云按太素五禁云肝病禁辛心病禁咸脾病禁酸肺病禁苦腎病禁甘名此為五裁楊上善云口嗜而欲食之不可多也必自裁之命曰五裁按新校正所引太素經文與此小異所引楊注乃本書經文與此亦異壽限平按此篇自篇首至故中年而壽盡矣見靈樞卷八第五十四天年篇自黃帝曰其氣盛衰至末見甲乙經卷六第十二自黃帝問於岐伯曰人年老而無子者至末見素問卷一第一上古天真論黃帝曰人之夭壽各不同或夭或壽或卒死或病久願聞其道問有四意夭壽卒死病久平按靈樞人之夭壽作人之壽夭或夭或壽作或夭壽岐伯曰答中答其得壽餘三略之得壽有九五臟堅固謂五臟形堅而不虛固而不變得壽一也血脈和調謂血常和脈常調得壽二也肌肉解利謂外肌肉肉各有分利得壽三平按注上肉字恐是內字之誤皮膚緻密致大利反謂皮腠閉密肌膚致實得壽四營衛之行不失其常謂營衛氣一日一夜各循其道行五十周營衛其身而無錯失得壽五呼吸微徐謂吐納氣微微不粗徐徐不疾得壽六氣以度行呼吸定息氣行六寸以循度數日夜百刻得壽七六腑化谷胃受五穀小腸盛受大腸傳導膽為中精決三焦司決瀆膀胱主津液共化五穀以奉生身得壽八津液布揚所謂泣汗涎涕唾等布揚諸竅得壽九也平按注涎袁刻作液各如其常故能久長上之九種營身之事各各無失守常不已故得壽命長生久視也平按久長靈樞作長久黃帝曰人之壽百歲而死者何以致之問其得壽所由岐伯曰使道隧以長謂有四事得壽命長使道謂是鼻空使氣之道隧以長出氣不壅為壽一也基牆高以方鼻之明堂牆基高大方正為壽二也通調營衛三部三里三部謂三焦部也三里謂是膝下三里胃脈者也三焦三里皆得通調為壽三起骨高肉滿百歲乃得終也起骨謂是明堂之骨明堂之骨高大肉滿則骨肉堅實為壽四也由是四事遂得百歲終也黃帝曰其不能終壽而死者何如問其夭死平按靈樞自黃帝曰其不能終壽而死者至故中年而壽盡矣一段敘次在形骸獨居而終矣之後岐伯曰其五臟皆不堅夭者亦四五臟皆虛易受邪傷為夭一也使道不長空外以張喘息暴疾使道短促鼻空又大泄氣復多為夭二也平按不長袁刻作不通依原抄更正靈樞亦作不長又卑基牆鼻之明堂基牆卑下為夭三也薄脈少血其肉不實數中風血氣不通真邪相攻亂而相引脈小血少皮肉皆虛多中外邪血氣壅塞真邪相攻引亂真氣為夭四平按靈樞不實作不石中風作中風寒故中年而壽盡矣黃帝曰善黃帝聞夭壽之所由故贊述之也平按故中年而壽盡矣靈樞作故中壽而盡也黃帝曰其氣之盛衰以至其死可得聞乎消息盈虛物化之常故人氣衰時時改變以至於死地各不同形故請陳之也岐伯曰人生十歲五臟始定血氣已通其氣在下故好走二十歲血氣始盛肌肉方長故好趨三十歲五臟大定肌肉堅固血脈盛滿故好步四十歲五臟六腑十二經脈皆大盛以平定腠理始疏榮華頽落髮鬢頒白平盛不搖故好坐血營血也氣衛氣也大盛內盛也始疏外衰平按甲乙經人生作人年始疏作始開頽落作剝落髮鬢作鬢髮靈樞鬢作頗頒作斑又按原抄平盛不搖平字旁有丕彼悲反大也六字疑平盛應作丕盛別本作丕五十歲肝氣始衰肝葉始薄膽汁始減目始不明六十歲心氣始衰喜憂悲血氣懈惰故好臥七十歲脾氣虛皮膚枯八十歲肺氣衰魄離魄離故言喜誤九十歲腎氣焦臟枯經脈空虛百歲五臟皆虛神氣皆去形骸獨居而終矣肝為木心為火脾為土肺為金腎為水此為五行相生次第故先肝衰次第至腎也至於百歲五臟虛壞五神皆去枯骸獨居稱為死也平按始減靈樞作始滅喜憂悲靈樞作苦憂悲甲乙經作乃善憂悲又甲乙經惰作墮皮膚枯作皮膚始枯故四肢不舉魄離二字靈樞不重甲乙經作魂離魄散喜誤靈樞甲乙經均作善誤臟枯甲乙經作臟萎枯靈樞臟上有四字下無枯字又甲乙經百歲上有至字終下有盡字黃帝問於岐伯曰人年老而無子者材力盡邪將天數然材力攝養之力也天數天命之數也平按甲乙經無此一段及下岐伯曰三字岐伯曰女子七歲腎氣盛更齒髮長腎主骨發故腎氣盛更齒髮長平按更齒素問甲乙經均作齒更二七而天癸至任脈通伏衝脈盛月事以時下故有子天癸精氣也任衝脈起於胞中下極者也今天癸至故任脈通也伏沖之脈起於氣街又天癸至故衝脈盛也二脈並營子胞故月事來以有子也平按天癸甲乙經作天水下同伏沖素問作太衝新校正云太素作伏沖下同與此正合三七腎氣平均故真牙生而長極真牙後牙也長極身長也四七筋骨堅髮長極身體盛壯身之筋骨體發無不盛極五七陽明脈衰面始焦發始惰陽明脈起於面行於頭故陽明衰面與發始焦落平按始焦甲乙經作皆焦惰作白素問作墮六七三陽脈衰於上面皆焦發白三陽太陽少陽陽明也三陽脈俱在頭故三陽衰面焦發白平按發白素問作發始白甲乙經無此一段七七任脈虛伏沖衰少天癸竭地道不通故形壞而無子任沖二脈氣血俱少精氣盡子門閉子宮壞故無子平按伏沖衰少素問甲乙經作太衝脈衰少丈夫年八歲腎氣實髮長齒更二八腎氣盛天癸至精氣溢瀉陰陽和故能有子三八腎氣平均筋骨徑強故真牙生而長極四八筋骨隆盛肌肉滿五八腎氣衰發惰齒藁六八陽氣衰於上面焦鬢髮頒白七八肝氣衰筋不能動天癸竭精少腎臟衰形體皆極八八則齒髮去齒藁者骨先衰肉不附故令齒枯也平按寫甲乙經作瀉下同肌肉滿素問甲乙經均作肌肉滿壯陽氣衰於上素問作陽氣衰竭於上腎臟衰甲乙經作腎氣衰腎者生水受五臟六腑之精而藏之故五臟盛乃瀉今五臟皆衰平按素問甲乙經生水均作主水乃瀉均作乃能瀉以下據素問上古天真論及甲乙經形氣盛衰大論補入筋骨解墮天癸盡矣故髮鬢白身體重行步不正而無子耳
