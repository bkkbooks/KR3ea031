body:
  text: 卷第二十八風諸風數類平按此篇自篇首至末見素問卷十二第四十二風論篇又見甲乙經卷十第二上篇黃帝問於岐伯曰風之傷人或為寒熱或為熱中或為寒中或為癘或為偏枯或為賊風也其病各異其名不同風氣一也徐緩為氣急疾為風人之生也感風氣以生其為病也因風氣為病是以風為百病之長故傷人也有成未成傷人成病凡有五別一曰寒熱二曰熱中三曰寒中四曰癘病五曰偏枯此之五者以為風傷變成余病形病名各不同或為賊風者但風之為病所因不同故病名病形亦各異也平按素問甲乙無於岐伯三字傷人下均有也字癘均作厲下均有風字或為賊風也甲乙作其為風也素問作或為風也注急疾袁刻作疾急或內至五臟六腑不知其解願聞其説岐伯曰風氣藏於皮膚間內不得通外不得泄風者喜行而數變言風入於臟腑之內為病遂名臟腑之風風氣藏於皮膚之間內不得通生大小便道外不得腠理中泄風性好動故喜行數變以為病也平按素問甲乙曰上有對字間上有之字喜作善下同風者甲乙作風氣者注生大小便生字恐衍腠理開則灑然寒閉閉則熱而悗風氣之邪得之因者或因飢虛或因復用力腠理開發風入毛腠灑然而寒腠理閉塞內壅熱悶灑音洗如洗而寒也平按灑甲乙作悽閉字素問甲乙不重閉則熱而悗素問悗作悶甲乙作不熱而悶其寒也則衰食飲其熱也銷肌肉故使人怢栗而不能食名曰寒熱其寒不泄在內故不能食其熱不泄在外故銷肌肉也是以使人惡風而不能食稱曰寒熱之病怢栗振寒貌也平按銷肌肉素問甲乙作則消肌肉怢栗甲乙作解㑊素問新校正云全元起本作失味風氣與陽入胃循脈而上至目眥其人肥則風氣不得外泄則為熱中而目黃也以下言熱中病也風氣從皮膚循足陽明之經入於胃中足陽明經從目內眥入屬於胃故循其脈至目內眥以其人肥腠理密實不開風氣壅而不得外泄故內為熱中病目黃也平按與陽入胃素問甲乙作與陽明入胃目眥作目內眥人變瘦則外泄而寒則為寒中而泣出以下言寒中之病也人瘦則腠理疏虛外泄溫氣故風氣內以為寒中足陽明脈虛冷故目泣出也平按素問甲乙瘦上無變字風氣與巨陽俱入行諸脈輸散於分理間沖氣淫邪與衛氣相干其道不利故使肌肉賁䐜而有傷衛氣有所涘而不行故其肉有不仁以下言癘病也巨陽足太陽也風氣之邪與足太陽二氣俱入十二經脈輸穴之中又散於分肉腠理之間其與太陽俱入於輸衝上來者淫邪之氣與衛氣相干致令衛氣澀而不行故肌肉賁起腹脹有所傷也以衛氣凝聚不行故肉不仁也涘義當凝也平按素問甲乙巨陽作太陽輸作俞分理作分肉沖氣淫邪素問無此四字甲乙作衛氣悍邪時五字賁䐜甲乙作膹脹素問作憤䐜傷素問甲乙均作瘍涘素問甲乙作凝癘者營氣熱胕其氣不精故使其鼻柱壞而色敗也皮膚傷潰風寒客於脈不去名曰癘風胕腐也太陽與衛氣在營血之中故濁而熱於胸腹上衝於鼻故鼻鼽骨壞其氣散於皮膚故皮膚潰爛以其邪風寒氣客脈留而不去為病稱曰癘風癘力誓反平按營氣素問甲乙作有榮氣胕甲乙作浮不精素問甲乙作不清傷潰素問甲乙作瘍潰或名曰寒熱言前癘風或名寒熱之病也以春甲乙傷於風者為肝風以夏丙丁傷於風者為心風以季夏戊己傷於邪者為脾風以秋庚辛中於邪者為肺風以冬壬癸中於邪者為腎風春甲乙者木王時也木王盛時衝上風來名曰邪風木盛近衰故衝上邪風來傷於肝故曰肝風余皆仿此平按戊己傷於邪甲乙邪作風庚辛中於邪及壬癸中於邪甲乙均作傷於風風氣中五臟六腑之輸亦為臟腑之風臟腑輸者當是背輸近傷臟腑之輸故曰臟腑之風也平按素問風下無氣字輸素問甲乙作俞各入其門戶之中則為偏風門戶空穴也邪氣所中之處即偏為病故名偏風也平按之中素問作所中甲乙作風之所中風氣循風府而上則為腦風風府在項入髮際一寸督脈陽維之會近太陽入腦出處風邪循脈入腦故名腦病也風入系頭則為目風邪氣入於目系在頭故為目風也平按甲乙入上無風字系素問作係眠寒飲酒中風則為漏風因飲酒寒眠腠開中漏汗故為漏風有本目風眼寒也平按眠寒素問甲乙作眼寒屬上節入房汗出中風則為內風入房用力汗出中風內傷故曰內風也新沐中風則為首風新沐發已頭上垢落腠開得風故曰首風也久風入中則為腸風飧泄皮膚受風日久傳入腸胃之中泄痢故曰腸風外在腠理則為泄風風在腠理之中泄汗不止故曰泄風也故風者百病之長也至其變化為他病也無常方然故有風氣也百病因風而生故為長也以因於風變為萬病非唯一途故風氣以為病長也平按素問甲乙化下有乃字故素問作致新校正云全元起本及甲乙經致字作故攻今本甲乙仍作故下無攻字諸風狀論平按此篇自篇首至末見素問甲乙卷第同前黃帝問於岐伯曰願聞其診及其病能診者既見其狀因知所由故曰診也晝間暮甚等即為狀也咳短氣等即為病能也平按素問無黃問於岐伯五字曰下有五臟風之形狀不同者何十字注既見既字袁刻脫岐伯曰肺風之狀多汗惡風色皏然白時咳短氣晝日則瘥暮則甚診在眉上其色白皏普幸反白色薄也肺風病能凡有七別一曰多汗二曰惡風三曰色白謂面色白薄也四曰嗽咳五曰短氣六曰晝間暮甚以肺主太陰故暮甚也七曰診五色各見其部薄澤者五臟風之候也白肺色也心風之狀多汗惡風焦絶喜怒赫者赤色痛甚則不可快診在口其色赤心風狀能有七一曰多汗二曰惡風三曰焦絶焦熱也絶不通也言熱不通也四曰喜怒五曰面赤色六曰痛甚不安七曰所部色見口為心部也平按喜素問甲乙作善下同素問赫作嚇下無者字痛素問甲乙作病則不可快甲乙作則言不快素問作則言不可快肝風之狀多汗惡風喜悲色微蒼嗌乾喜怒時憎女子診在目下其色青肝風狀能有八一曰多汗二曰惡風三曰喜悲四曰面色微青五曰咽乾六曰喜怒七曰時憎女子八曰所部色見也脾風之狀多汗惡風身體怠惰四肢不欲動色薄微黃不嗜食診在鼻上其色黃脾風狀能有七一曰多汗二曰惡風三曰身體怠惰謂除頭四肢為身體也四曰四肢不用五曰面色微黃六曰不味於食七曰所部色見也腎風之狀多汗惡風面龐然胕腫腰脊痛不能正立其色炲隱曲不利診在頤上其色黑腎風狀能有七一曰多汗二曰惡風三曰面腫四曰腰脊痛五曰面色黑如煙炲炲大才反六曰隱曲不利謂大小便不得通利七曰所部色見頤上腎部也有本為肌上誤也平按龐素問作痝胕素問甲乙作浮素問脊上無腰字甲乙色炲上有其字頤素問甲乙作肌胃風之狀頸多汗惡風飲食不下隔塞不通腹喜滿失衣則䐜脹食寒則泄診瘦而䐜腹大胃風狀能有八一曰頸多汗二曰惡風三曰不下飲食四曰膈不通膈中饐也五曰腹喜滿六曰失覆腹脹七曰食冷則痢八曰胃風形診謂瘦而腹大胃風候也平按診瘦而䐜腹大素問甲乙作診形瘦而腹大素問新校正云按孫思邈云新食竟取風為胃風首風之狀頭面多汗惡風先當風一日則病甚頭痛不可出內至其風日則病少愈首風狀能有三一曰頭面多汗二曰惡風三曰診候不出者不得遊於庭也不內者不得在室也平按甲乙頭面多汗作頭痛面多汗素問先當風作當先風素問甲乙不可下有以字風日日字袁刻脫素問新校正云孫思邈云新沐浴竟取風為首風漏風之狀或多汗常不可單衣食則汗出甚則身汗息惡風衣裳濡口乾喜渴不能勞事漏風狀能有七一曰多汗謂重衣則汗衣單則寒二曰因食汗甚病甚無汗三曰惡風四曰衣裳恆濕五曰口乾六曰喜渴七曰不能勞事也平按素問甲乙身汗息作身汗喘息裳作常素問新校正云孫思邈云因醉取風為漏風其狀惡風多汗少氣口乾善渴近衣則身熱如火臨食則汗流如雨骨節懈惰不欲自勞泄風之狀多汗汗出泄衣上口乾上來其風不能勞事身體盡痛則寒泄風狀能有四一曰多汗汙衣二曰口乾三曰皮上冷也四曰勞則體痛寒也平按泄素問甲乙作泄口乾上來素問作口中乾上漬甲乙作咽乾上漬注汙衣袁刻作泄衣三曰下原缺二字袁刻作液涸素問新校正云孫思邈云新房事取風為內風其狀惡風汗流沾衣裳疑此泄風乃內風也諸風雜論平按此篇自篇首至末見靈樞卷九第五十八賊風篇又見甲乙經卷六第五黃帝曰夫子言賊風邪氣之傷人也令人病焉今有其不離屏蔽不出室內之中卒然病者非必離賊風邪氣其故何也賊風者風從衝上所勝處來賊邪風也離歷也賊邪之風夜來人皆臥雖是晝日不離屏蔽室內不歷賊風邪氣仍有病者其故何也平按室內靈樞甲乙作室穴非必靈樞作非不袁刻脫必字岐伯曰此皆嘗有所傷於濕氣藏於血脈之中分肉之間久留而不去若有所墮墜惡血在內而不去卒然喜怒不節飲食不適寒溫不時腠理閉而不通其開而遇風寒時血氣涘結與故邪相襲則為寒痹其有熱則汗出汗出則受風雖不遇賊風邪氣必有因加而發焉人雖不離屏室之中傷於寒濕又因墜有惡血寒濕惡血等邪藏於血脈中又因喜怒飲食寒溫失理遂令腠理閉塞壅而不通若當腠開遇於風寒則血凝結與先寒濕故邪相因遂為寒痹雖在屏蔽之中因熱汗出腠開受風斯乃屏內之中加此諸病不因賊風者平按其開而遇風寒甲乙無其開二字遇上有適字時血氣涘結素問甲乙作則血氣凝結黃帝曰今夫子之所言者皆病人之所自知也其無所遇邪氣又無怵惕之志卒然而病者其故何也唯有鬼神之事乎因內邪得病病人並能自知仍有自知不遇寒濕之邪又無喜怒怵惕之志有卒然為病當是鬼神為之乎平按其無所遇邪氣甲乙無所字之志靈樞作之所志鬼神上靈樞甲乙有因字注仍有袁刻作因有有岐伯曰此亦有故邪留而未發也因而志有所惡及有所夢慕血氣內亂兩氣相薄其所從來者微視之不見聽而不聞故似鬼神以下答意非無故邪在內亦非無怵惕之志故有所惡即為怒也夢有所樂即為喜也因此兩者相薄故血氣亂而生病所來微細視聽難知衆人謂如鬼神非鬼神也平按靈樞甲乙無夢字薄靈樞作搏黃帝曰其祝而已者其故何也岐伯曰先巫者固知百病之勝先知其病之所從生者可祝而已黃帝曰善先巫知者巫先於人因於鬼神前知事也知於百病從勝克生有從內外邪生生病者用針藥療之非鬼神能生病也鬼神但可先知而已由祝去其巫知之病非祝巫之鬼也平按祝下甲乙有由字固知靈樞甲乙作因知其病之所從生者甲乙作百病之所從者九宮八風平按此篇自九宮八風圖至篇末見靈樞卷十一第七十七九宮八風篇又自風從其沖後來見甲乙經卷六第一平按此圖靈樞坤上無右手二字坤下無戊申己未四字玄委下無宮字兩旁無內脾外肌主弱六字下無謀風二字立秋下無二字兌上無右脅二字兌下無辛酉二字倉果下無宮字兩旁無內肺外皮膚主身燥八字下無剛風二字秋分下無七字乾上無右足二字乾下無戊戌己亥四字新洛下無宮字兩旁無內小腸外手太陽脈主脈絶則溢脈閉則結不通暴死二十一字下無折風二字立冬下無六字坎上無腰尻下窮四字坎下無壬子二字兩旁無內腎外骨肩背膂筋主寒十字汁蟄下無宮字汁作吐下同按西京賦五緯相汁注汁作葉和也亦通下無大剛風三字冬至下無一字艮上無左足二字艮下無戊寅二字天溜下無宮字溜作留右旁無內大腸外兩脅腋骨下支節十一字下無凶風二字立春下無八字震上無左脅二字震下無己卯二字倉門下無宮字兩旁無內肝外筋紉主身濕八字下無嬰兒風三字春分下無三字巽上無左手二字巽下無戊辰己巳四字陰洛下無宮字兩旁無內胃外肉主體重七字下無弱風二字立夏下無四字離上無膺喉首頭四字離下無丙午二字上天下無宮字兩旁無內心外脈主熱六字下無大弱風三字夏至下無九字中央下無五字招搖下無宮字兩旁無六腑膈下三臟應中州九字立秋二玄委平按靈樞有西南方三字秋分七倉果平按靈樞有西方二字立冬六新洛平按靈樞有西北方三字夏至九上天平按靈樞有南方二字招搖五平按靈樞無五字有中央二字冬至一汁蟄平按靈樞有北方二字立夏四陰洛平按靈樞有東南方三字春分三倉門平按靈樞有東方二字立春八天溜平按靈樞溜作留下同有東北方三字太一常以冬至之日居汁蟄之宮四十六日明日居天溜四十六日明日居倉門四十六日明日居陰洛四十五日明日居上天平按靈樞作天宮四十六日明日居玄委四十六日明日居倉果四十六日明日居新洛四十五日明日復居汁蟄之宮從其宮平按從其宮三字靈樞作曰冬至矣太一日遊以冬至之日居吐蟄之宮十八字數所在日從一處至九日復反於一常如是無已終而復始太一徙日平按徙靈樞作移天必應之以風雨以其日風雨則吉歲矣民安少病矣先之則多雨後之則多旱太一在冬至之日有變占在君太一在春分之日有變占在相太一在中宮之日有變占在吏太一在秋分之日有變占在將太一在夏至之日有變占在百姓所謂有變者太一居五宮之日疾風折樹木揚沙石各以其所生占貴賤日視風所從來而占之平按靈樞所生作所主日視作因視從其所居之鄉來為實風主生長養萬物風從其沖後來為虛風傷人者也平按甲乙傷上有賊字主殺主害者也謹候虛風而避之故聖人避邪弗能害此之謂也平按靈樞故聖人避邪弗能害作故聖人日避虛邪之道如避矢石然邪不能害是故太一入從立於中宮乃朝八風以占吉凶也以下言太一從於中宮以朝八風以占吉凶也平按靈樞從作徙風從南方來名曰大弱風其傷人也內舍於心外在於脈其氣主為熱平按靈樞作氣主熱三字風從西南方來名曰謀風其傷人也內舍於脾外在於肌其氣主為弱平按甲乙肌下有肉字風從西方來名曰剛風其傷人也內舍於肺外在於皮膚其氣主為身燥平按靈樞甲乙燥上無身字風從西北方來名曰折風其傷人也內舍於小腸外在手太陽脈脈絶則溢脈閉則結不通喜暴死平按甲乙溢作泄喜靈樞甲乙作善風從北方來名曰大剛之風其傷人也內舍於腎外在於骨與肩背之膂筋其氣主為寒風從東北方來名曰凶風其傷人也內舍於大腸外在於兩脅腋骨下及肢節風從東方來名曰嬰兒之風其傷人也內舍於肝外在於筋紉其氣主為身濕紉女巾反索也謂筋傳之也平按紉靈樞甲乙作紐濕上甲乙無身字風從東南方來名曰弱風其傷人也內舍於胃外在於肉其氣主體重平按於肉靈樞作肌肉甲乙作於肌凡此八風皆從其虛之鄉來乃能病人三虛相薄則為暴病卒死兩實一虛病則為淋洛寒熱犯其兩濕之地則為痿故聖人避邪風如避矢石焉其有三虛而偏中於邪風則為擊僕偏枯矣風從沖後來故稱虛鄉來也三虛謂年虛月虛時虛三虛之中縱使二實但令一虛遇邪猶為淋洛寒熱居處濕地即為痿厥況二虛一實遇邪其病安得不甚若先三虛逢邪遂致擊僕偏枯之病也平按靈樞相薄作相搏甲乙兩實一虛作兩虛一實淋洛靈樞甲乙作淋露避邪風甲乙無風字靈樞無邪字三虛三實平按此篇自篇首至末見靈樞卷十二第七十九歲露篇又見甲乙經卷六第一黃帝問少師曰余聞四時八風之中人也故有寒暑寒則皮膚急而腠理閉暑則皮膚緩而腠理開賊風邪氣因以得入乎將必須八正虛邪乃能傷人乎黃帝謂四時八節虛邪賊風中人要因其暑腠理開時因入傷人故致斯問也平按因以得入乎靈樞甲乙作因得以入乎甲乙八正虛邪作八正風邪少師答曰不然賊風邪氣之中人也不得以時少師答意腠理開者賊風中深腠理閉者賊邪中淺以其賊邪賊害甚也不得以時者暑開之時即入閉之時不入也然必因其開也其入也深其內極也疾其病人卒暴邪之中人若因腠理開者為害有三一則邪入深也二則極人命速三則病死卒暴也平按其入也深靈樞甲乙無也字其內極也疾甲乙極作亟注云亦作極靈樞作其內極病其病人卒暴靈樞甲乙卒上有也字因其閉也其入也淺以留其病人也徐以持也若腠理閉為遇有二一則邪入淺也二則為病死徐持久留之也平按持靈樞甲乙作遲下無也字黃帝曰有寒溫和適腠理不開然有卒病者其故何也少師曰帝弗知邪入乎雖平居其腠理開閉緩急固常有時也平和適也人雖和適而居腠理開閉未必因於寒暑因於月之滿空人氣盛衰故腠理開閉有病不病斯乃人之常也平按固常有時也靈樞作其故常有時也黃帝曰可得聞乎少師曰人與天地相參也與日月相應也人之身也與天地形象相參身盛衰也與日月相應也故月滿則海水西盛日為陽也月為陰也東海陽也西海陰也月有虧盈海水之身隨月虛實也月為陰精主水故月滿西海盛也人血氣精肌肉充皮膚致毛髮堅焦理郤煙垢著當是之時雖遇賊風其入淺亦不深人身盛時法月及與西海皆悉盛實也但賊邪不入凡有六實一曰血氣精而不濁二曰肌肉充實不疏三曰皮膚密緻不開四曰毛髮堅實不虛五曰焦腠理曲而不通三焦之氣發於腠理故曰焦理郤曲也六曰煙塵垢膩蔽於腠理有此六實故賊風雖入不能深也平按靈樞甲乙血氣精作血氣積焦理作腠理靈樞淺下無亦字至其月郭空則海水東盛人血氣虛其衛氣去形獨居肌肉減皮膚緩腠理開毛髮淺焦理薄煙垢落當是之時遇賊風則其入也深其病人也卒暴人身衰時法月及與西海皆悉衰也月空東海盛者陰衰陽盛也凡有八衰一曰血氣虛濁謂當脈血氣虛也二曰衛氣減少謂脈外衛氣去而少也三曰肌肉疏減四曰皮膚虛緩五曰腠理空開六曰毛髮虛淺七曰焦理疏薄八曰理無煙垢有此八虛所以賊邪深入令人卒病也平按靈樞血氣作氣血皮膚緩作皮膚縱毛髮淺作毛髮殘焦理作膲理甲乙無淺焦理三字黃帝曰其有卒然卒死暴病者何邪使然少師曰得三虛者其死暴疾得三實者邪不能傷人也人備三虛其病死暴疾也平按靈樞甲乙卒死作暴死甲乙無暴病二字何邪使然靈樞作何也注暴疾袁刻疾誤作死黃帝曰願聞三虛少師曰乘年之衰人年七歲加於九歲至十六歲名曰年衰如是恆加九歲至一百六皆年之衰也非歲露年以其人實邪不傷故人至此年名曰乘也逢月之空月郭空時人具虛當此虛時故曰逢也平按注虛上所空一字據上文應作八失時之和因為賊風所傷是謂三虛故論不知三虛工反為粗攝養乖於四時和氣非理受於風寒暑濕人之有此三虛故從沖後髮屋折木揚沙走石等賊風至身灑然起於毫毛發於腠理即為賊風傷也平按和下甲乙有人氣乏少四字賊風下有邪氣二字黃帝曰願聞三實少師曰逢年之盛逢年謂不加年衰也遇月之滿十五日時也得時之和雖有賊風邪氣不能危之攝養順於四時和氣人之有此三實縱有賊邪不能傷也平按不能危之甲乙作不能傷也注不能上袁刻有定字黃帝曰善乎哉論明乎哉道請藏之金匱命曰三實然此一夫之論也子之所論皆善者以其內明於道故請藏而寶之此舉一夫之論以類衆人也平按命曰三實靈樞在黃帝曰上八正風候平按此篇自篇首至末見靈樞卷十二第七十九歲露論篇又見甲乙經卷六第一黃帝曰願聞歲之所以皆同病者何因而然前章言人有攝養乖和遇賊邪之失此言同受邪風俱有傷害以為問也平按何因而然甲乙作何氣使然少師曰此八正之候也八正候者八節之正虛邪候也黃帝曰候之奈何少師曰候此者常以冬之至日太一立於汁蟄之宮其至也天應之以風雨風雨從南方來者為虛風賊傷人者也其以夜至者萬民皆臥而弗犯也故其歲民少病九宮經曰太一者玄皇之使常居北極之旁汁蟄上下政天地之常起也汁蟄坎宮名也太一至坎宮天必應之以風雨其感從太一所居鄉來向中宮名為實風主生長養萬物若風從南方來向中宮為沖後來虛風賊傷人者也其賊風夜至人皆寢臥不犯其風人少其病也平按冬之至日靈樞甲乙作冬至之日為虛風甲乙作名曰虛風夜下靈樞甲乙有半字注其感感字恐系風字傳寫之誤其以晝至者萬民懈惰而皆中於虛風故萬民多病虛邪入客於骨而不發於外至其立春陽氣大發腠理開因立春之日風從西方來萬民又皆中於虛風此兩邪相薄經氣絶代懈惰謂不自收節情逸腠開邪客至骨而不外泄至立春日復有虛風從西方衝上而來是則兩邪相薄致經脈絶代以為病也骨有本作胃也平按相薄靈樞甲乙作相搏袁刻誤作兩薄絶代靈樞甲乙作結代故諸逢其風而遇其雨者命曰遇歲露焉因歲之和而少賊風者民少病而少死歲多賊風邪氣寒溫不和民多病而多死矣露有其二一曰春露主生萬物者也二曰秋露主衰萬物者也今歲有賊風暴雨以衰於物比秋風露故曰歲露焉是以實風至也歲和有吉虛風至也歲露致凶也黃帝曰虛邪之風其所傷貴賤何如候之奈何以下言候虛風所傷貴賤故因問起也少師曰正月朔日太一居天溜之宮其日西北風不雨人多死以下具言虛風也平按溜靈樞作留正月朔日平旦北風春民多死者也正月朔日平旦北風行民病死者十有三平按民病死者靈樞甲乙死作多正月朔日日中北風夏民多死者正月朔日夕時北風秋民多死者終日北風大病死者十有六正月朔日風從南方來命曰旱鄉平按自終日以下至旱鄉甲乙無從西方來命曰白骨將將國有殃人多死亡平按命甲乙作名上有而大二字將字靈樞甲乙不重正月朔日風從東南方來髮屋揚沙石國有大災正月朔日風從東南行春有死亡平按靈樞南下有方字甲乙無此二條正月朔日天和溫不風糴賤民不病天寒而風糴貴民多病平按天和溫甲乙作天時和溫無糴賤糴貴四字不病作無病而風作風疾此所以候歲之虛風賊傷人者平按甲乙無此句靈樞無虛字者下有也字二月醜不風民多心腹病三月戌不溫民多寒熱四月巳不暑民多病疸十月申不寒民多暴死諸謂風者皆髮屋折樹木揚沙石起毫毛開腠理平按甲乙寒熱下有病字靈樞甲乙病疸作疸病諸下有所字甲乙樹下無木字開靈樞甲乙作發理下均有者也二字痹論平按此篇自篇首至逢濕則縱黃帝曰善見素問卷十二第四十三痹論篇自黃帝問於岐伯曰周痹之在身也至陰陽之病也見靈樞卷五第二十七周痹篇自問曰人有身寒至不相有也曰死見素問卷九第三十四逆調論篇自風痹淫病至末見靈樞卷五第二十四厥病篇又自篇首至故不為痹黃帝曰善見甲乙經卷十第一上篇自問曰痹或痛或不痛至逢濕則縱黃帝曰善見甲乙經卷十第一下篇自黃帝問於岐伯曰周痹之在身也至轉引而行之見甲乙經卷十第一上篇自問曰人有身寒至是人當攣節見甲乙經卷十第一下篇自問曰人之肉苛者至不相有也曰死見甲乙經卷十二第三自風痹淫病至末見甲乙經卷十第一下篇黃帝問岐伯曰痹安生岐伯曰風寒濕三氣雜至合而為痹風寒濕等各為其病若三氣雜至合而為一病稱為痹平按痹安生甲乙作痹將安生素問作痹之安生雜至合而為痹甲乙作合至雜而為痹其風氣勝者為行痹寒氣勝者為痛痹濕氣勝者為著痹若三合一多即別受痹名故三中風多名為行痹謂其痹病轉移不住故曰行痹三中寒多陰盛為痛故曰痛痹三中濕氣多住而不移轉故曰著痹著住也此三種病三氣共成異於他病有寒有熱有痛不痛皆名為痹也問曰其五者何也平按素問甲乙其五者作有五者答曰以冬遇此者為骨痹以春遇此者為筋痹以夏遇此者為脈痹以至陰遇此者為肌痹以秋遇此者為皮痹冬時不能自調遇此三氣以為三痹俱稱骨痹以冬骨也餘四仿此至陰六月脾所主也問曰內舍五臟六腑何氣使然五時感於三氣以為五痹其義已知而有痹病內舍臟腑之中何氣使然也答曰五臟皆有合病久而不去內舍其合平按素問不去下有者字內舍其合作內舍於其合也甲乙作內舍於合故曰骨痹不已復感於邪內舍於腎筋痹不已復感於邪內舍於肝脈痹不已復感於邪內舍於心肌痹不已復感於邪內舍於脾皮痹不已復感於邪內舍於肺五臟合者五臟五輸之中皆有合也諸脈從外來合五臟之處故合為內也是以骨筋脈肌皮等五痹久而不已內舍於合在合時復感邪之氣轉入於臟入臟者死也平按注入臟者死也袁刻臟誤作腑所謂痹者各以其時重感於寒溫之氣也平按寒溫二字素問甲乙作風寒濕三字又素問此下有凡痹之客五臟者至痹聚在脾一段新校正謂全元起本在陰陽別論中此王氏所移本書在陰陽雜説中諸痹不已亦益於內其風氣勝者其人易已也所謂五痹不已者各以其時而重感賊邪寒溫之氣益內五臟之痹者死益風者易已也平按亦益於內素問甲乙作亦益內也注而重感而字袁刻無問曰其時有死者或疼久者或易已者其故何也痹之輕重無過此三故為問之也平按素問曰下有痹字答曰其入臟者死以臟有神故痹入致死也其留連筋骨間者疼久膈著相系在於筋骨之間故筋骨疼痛也其流皮膚間者易已流行在於皮膚淺處之間動而又淺故易已也平按流素問作留甲乙作留連二字問曰客六腑者何也答曰此亦由其食飲居處而為病本六腑各有輸風寒濕氣中其輸而食飲應之循輸而入各舍其腑以上言痹入臟以下言痹入腑所由風寒濕等三氣外邪中於腑輸飲食居處內邪應內以引外故痹入六腑中其輸者亦腑之合也平按素問甲乙此亦下無由字輸作俞下同問曰以針治之奈何答曰五臟有輸六腑有合循脈之分各有所發各治其遇則病瘳已五臟輸者療痹法取五臟之輸問曰療痹之要以痛為輸今此乃取五臟之輸何以通之答曰有痛之痹可以痛為輸不痛之痹若為以痛為輸故知量其所宜以取其當是醫之意也療六腑之痹當取其合良以臟腑輸合皆有臟腑脈氣所發故伺而誅之平按各治其遇素問作各隨其過甲乙作各治其過袁刻遇作道問曰營衛之氣亦合人痹乎此問營衛二氣何者與三氣合為痹也平按素問甲乙合作令答曰營者水穀之精氣也和調於五臟灑陳於六腑乃能入於脈故循脈之下貫五臟絡六腑營衛血氣循經脈而行貫於五臟調和精神絡於六腑灑陳和氣陳起也故與三氣合以為痹也但十二經臟脈貫臟絡腑腑脈貫腑絡臟皆為營氣何因此所言於營氣唯貫於臟但絡於腑然此所言但舉一邊臟腑之脈貫絡是同之也平按之下素問甲乙作上下注十二經臟脈脈字袁刻誤作腑衛氣者水穀之悍氣也其氣栗疾滑利其不能入於脈故循皮膚之內分肉之間熏於胃募散於胸腹逆其氣則疾順其氣則愈不與寒濕風氣合故不為痹黃帝曰善衛之水穀悍氣其性利疾走於皮膚分肉之間熏於胃募故能散於胸腹壅之則生癰疽之病通之無疾是以不與三氣合而為痹也平按素問甲乙皮膚之內作皮膚之中胃募作盲膜則疾作則病甲乙栗作剽散於胸腹作聚於胸腹注云素問作散問曰痹或痛或不痛或不仁或寒或熱或燥或濕者其故何也三氣為痹之狀凡有其七故請解之答曰痛者其寒氣多有衣寒故為痛內受寒氣既多復衣單生寒內外有寒故痹有痛平按素問甲乙有衣寒故為痛作有寒故痛其不仁者其病久入深營衛之行澀經絡時疏疏而不痛皮膚不營故為不仁其寒者陽氣少陰氣多與病相益故寒仁者親也覺也營衛及經絡之氣疏澀不營皮膚神不至於皮膚之中故皮膚不覺痛癢名曰不仁所感陽熱氣少陰寒氣多與先所病相益故痹為寒也平按素問甲乙其不仁者作其不痛不仁者疏而不痛甲乙作故不痛素問作故不通新校正云甲乙經不通作不痛詳甲乙經此條論不痛與不仁兩事後言不痛是再明不痛之為重也其熱者陽氣多陰氣少病氣勝陽遭陰故為痹熱所感陽熱氣多陰寒氣少陰陽二氣相逢相擊陽盛為病故為痹熱也平按遭甲乙作乘其多寒汗而濡者此其逢濕甚其陽氣少陰氣盛兩氣相感故寒汗出濡所感陽氣少濕與寒氣相感故寒而汗濡衣濕也平按其多寒汗甲乙汗下有出字素問汗上無寒字逢濕甚甲乙甚作勝故寒汗出濡素問無寒字夫痹之為病不痛何也三氣合而為病稱痹而有不痛者其故何也曰痹在骨則重在脈則血涘而不流在筋屈不伸在肉則不知在皮則寒故具此五者則不痛凡痹之類逢寒則急逢濕則縱黃帝曰善三氣為痹所在有五一人具此五者為痹其痹不痛此為不痛之痹有云痹者痛者未為解痹者也不知者不覺不仁也平按甲乙素問涘作凝不知作不仁素問則急作則蟲逢濕作逢熱黃帝問於岐伯曰周痹之在身也上下移徙隨脈上下左右相應間不容空願聞此痛之在血脈之中耶將在分肉之間乎何以致是其痛之移也間不及下針其蓄痛之時不及定治而痛已止矣何道使然願聞其故夫周痹者邪居分肉之間令正氣循身不周邪與周為痹故稱周痹今帝之意言其痹痛循行上下移徙往來無處不至名為周痹岐伯之意言於此痹行於衆處可為衆痹非周痹也間不及下針者痹痛之中未及下針其痛已移也平按注循行上下別本作循形上下岐伯對曰此衆痹也非周痹也黃帝曰願聞衆痹岐伯對曰此各在其處更發更止更居更起以右應左以左應右非能周也更發更休言衆痹在身左右之處更身而發不能周身故曰衆痹居起動靜也黃帝曰善刺之奈何岐伯對曰刺此者痛雖已止必刺其處勿令復起然衆痹在身所居不移但痛有休發故其痛雖止必須刺其痛休之處令不起也平按注令上一字原缺左方右方剩彡字袁刻作三恐誤謹空一格黃帝曰善願聞周痹何如岐伯對曰周痹者在血脈之中隨脈以上循脈以下不能左右各當其所言周痹之狀痹在血脈之中循脈上下不能在其左右不移其處但以壅其真氣使營身不周故名周痹也平按循脈以下靈樞作隨脈以下黃帝曰善刺之奈何岐伯對曰痛從上下者先刺其下以遏之後刺其上以脫之痛從下上者先刺其上以遏之後刺其下以脫之刺周痹之法觀痹從上自下當先刺向下之前使其不得進而下也然後刺其痹後使氣泄脫也有痹從下上者準前可知也平按遏靈樞作過注云亦作遏甲乙作通注云一作遏黃帝曰善此痛安生何因而有名此問周痹之所由並問周痹名之所起也岐伯對曰風寒濕氣客於分肉之間迫切而為沫沫得寒則聚聚排分肉而裂分也分裂則痛三氣以為周痹循脈而行至分肉之間氣聚排迫分肉肉裂而為痛也平按靈樞甲乙而裂分作而分裂痛則神歸之神歸之則熱熱則痛解痛解則厥厥則他痹發則如是痹痛引神即神歸痛神痛不已故熱氣集而痛解此處痛解厥已即余處痛生周痹休發如是以為休起也平按發下靈樞甲乙重一發字注痛生袁刻痛誤作病黃帝曰善余已得其意矣此內不在臟外未發於皮獨居分肉之間真氣不能周故命曰周痹以下解周痹名也平按靈樞甲乙外上有而字命曰甲乙作名曰故刺痹者必先切循其下之六經視其虛實六經三陰三陽也切循痹病之下六經虛實一也平按下之六經甲乙作上下之大經及大絡之血而結不通切循十五大絡知其通塞二也平按靈樞甲乙而結不通作結而不通及虛而脈陷空者調之尉而通其瘈緊轉引而行之黃帝曰善余以得其意矣又得其事也又循其脈知其虛陷者三也然後設以尉法用微尉之令其調適又以導引瘈緊轉引令其氣行方始刺之此為療瘈之要也緊急瘈牽令緩也平按靈樞甲乙調上有而字通下有之字瘈緊靈樞作瘈堅甲乙緊下有者字人九者經絡之理十二經脈陰陽之病也得其事者謂得之人法於九野經絡陰陽之病也平按靈樞九上無人字問曰人有身寒湯火不能熱也厚衣不能溫也然不凍栗此為何病人身體冷而不覺寒其病難知故須問也平按素問熱溫下均無也字此為作是為甲乙同答曰是人者素腎氣勝以水為事太陽氣衰腎脂枯不長一水不能勝兩火腎者水也而主骨故腎不生則髓不能滿故寒甚至骨素先也其人腎氣先勝足太陽腎腑又衰腎脂枯竭不能潤長以其一腎臟腑之水與心肝二陽同在一身為陽所擊一水不勝二陽故反為寒至於骨髓衣火不能溫也平按而主骨素問作而生於骨所以不能凍栗者肝一陽也心二陽也腎孤臟也一水不能勝上二火故不能凍栗者病名曰骨痹是人當攣節雖寒至骨二陽猶勝故不覺寒栗遂為骨痹之病是人當為骨節拘攣也一本攣為變人有此病必節操變改也平按上二火甲乙作上下火素問無上字問曰人之肉苛者何也雖近衣絮猶尚苛也是為何病也答曰營氣虛衛氣實衛氣虛則不仁而不用營衛俱虛則不仁且不用肉如苛也人身與志不相有也曰死苛音柯有本為苟皆不仁之甚也故雖衣絮溫覆猶尚不仁者謂之苛也故知近衣絮溫覆即知覺者為不仁也營虛衛實氣至知覺故猶仁也若營實衛虛者肉不仁也若營衛俱虛則不仁之甚故肉同苛如同也所以身肉不仁甚者與神不能相得故致死也平按素問衛氣虛則不仁而不用作榮氣虛則不仁衛氣虛則不用肉如苛也作肉如故也有下有也字甲乙經曰死作三十日死風痹淫病不可已者足如履冰時如湯入腹中脹脛淫濼煩心頭痛時歐時惋眩以汗出久則目眩悲以喜恐短氣不樂不出三年死人病風痹之病又有此十二狀者不出三年死也平按風痹淫病靈樞病上有濼字湯入腹中靈樞甲乙作入湯中脹脛靈樞作股脛甲乙作肢脛時歐時惋靈樞作時嘔時悗甲乙作時嘔時悶喜恐甲乙作喜怒靈樞無不樂二字
